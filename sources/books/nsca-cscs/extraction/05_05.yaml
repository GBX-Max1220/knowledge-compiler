---

TYPE
Evidence

TITLE
Concurrent Training Effect on Power Development

PAGE
332

SECTION
5.5 — Cardiovascular Adaptations

ORIGINAL TEXT
Power development appears to be negatively affected more than strength during concurrent high-intensity resistance and aerobic endurance training. Häkkinen and colleagues (70) reported similar dynamic and isometric strength increases following 21 weeks of concurrent training or resistance training only; however, the resistance training–only group showed improvements in the rate of force development whereas the concurrent training group did not match this increase. Kraemer and colleagues (94) also showed that a resistance training–only group increased muscle power whereas a combined group did not. The resistance training–only group also increased peak power in upper and lower body tests while the combined group did not. It appears that power development is much more susceptible to the antagonistic effects of combined strength and aerobic endurance training than slow-velocity strength (94).

END

