PAGE
333

SECTION
5.5 — Cardiovascular Adaptations

ORIGINAL TEXT
In trained weightlifters, removing the training stimulus for 14 days did not significantly affect 1RM strength performance in the bench press (−1.7%) and squat (−0.9%), isometric (−7%) and isokinetic concentric knee extension force (−2.3%), or vertical jump performance (1.2%) (108).

END

