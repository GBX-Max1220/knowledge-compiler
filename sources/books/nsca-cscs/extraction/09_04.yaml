TYPE
Recommendation

TITLE
Guidelines for Goal Setting

PAGE
503

SECTION
9.4 — Motivation

ORIGINAL TEXT
In general, guidelines for goal setting include the following:
Long-term goals and short-term goals are interdependent.
Long-term goals provide a sense of meaningfulness and direction for pursuing short-term goals.
The attainment of short-term goals provides a hierarchical sense of mastery and success that builds self-confidence.
Athletes should define process goals to focus on elements of their performance over which they have control.

END

TYPE
Procedure

TITLE
Three-Step Process for Helping Athletes Get Appropriate Support

PAGE
508

SECTION
9.4 — Motivation

ORIGINAL TEXT
First, identify the signs and symptoms of distress related to affect, behavior, and cognitions. Second, determine the duration of distress (lasting greater than 2-3 weeks) and potential disruption (e.g., sleep patterns, nutritional habits, social relationships). Specifically, is the distress temporary or persistent, and how will it affect behaviors outside of sports? Third, determine how to support the athlete.

END

