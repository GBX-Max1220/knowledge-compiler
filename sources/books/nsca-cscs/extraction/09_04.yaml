TABLE 9.1  Signs and Symptoms of Anxiety, Depression, and Stress

Signs Symptoms Distinctive factors
Anxiety Rapid eye movement, Rapid speech, Sweating, Racing heart rate, Shaking or tapping with fingers or toes, Sleep problems | Feeling restless, wound up, on edge, or irritable, Easily fatigued, Difficulty concentrating, Gastrointestinal somatic symptoms, Difficulty controlling feelings of worry, Feelings of impending doom or being out of control, Feeling self-conscious or avoiding situations | Circular thinking, rumination, worry
Depression Depressed mood, Sleep disruption, Decreased movement or coordination, Agitation, Social isolation | Change in appetite, Feelings of guilt, Gastrointestinal somatic symptoms, Hypochondriasis, Rumination about the past | Low energy or mood, hopelessness, and helplessness
Stress Racing heart rate, Agitation, Sleep disturbance, Inability to recover, Appetite changes, Impulsive decision making | Concerns about meeting high standards, Concerns about social obligations, Concerns about wasting time, Concerns about weight, Trouble making decisions, Trouble relaxing, Being lonely | Urgency or heightened arousal

Adapted from Beisecker et al. (2024); Gustavson et al. (2018); Knowles et al. (2021); Rogers et al. (2024); Weber et al. (2023).

END

