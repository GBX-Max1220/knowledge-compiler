Adjustable kettlebells are either plate loaded or shot loaded. In actuality, a plate-loaded kettlebell is simply a handle that is attached to weight plates and is not really a kettlebell even though it is classified as one (28). In contrast, a shot-loaded kettlebell is a hollow version of the more traditional kettlebell. Historically, these kettlebells were filled with sand, water, lead, and even mercury (28). If this type of kettlebell is only partially filled, the shot moves around in the ball, causing an increased training stressor. While popular in the early 20th century, especially with circus strongmen such as the famous Arthur Saxon and Eugen Sandow, this type of kettlebell is not popular in contemporary strength and conditioning.

