TYPE
Definition

TITLE
Landmine exercises

PAGE
1132

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
The landmine resistance training device is a useful device for performing loaded rotational resistance training exercises (4). The performance of this exercise involves placing the end of a standard Olympic barbell (i.e., 20 kg [44 lb]) into a metal cylinder that is attached to a standard squat rack or stand-alone base attachment through a universal joint (4). With this set-up, the barbell is used as a lever and is rotated around the fixed end, allowing for loaded rotational movements to be performed (4). Alternatively, if a purpose-built receptacle is not available, one end of the barbell can be placed in contact with the floor at the corner of a wall and a similar movement pattern can be performed (148). Regardless of the how the barbell is anchored, additional resistance can be added to the free end of the barbell, thus allowing for the application of variable and multiplanar resistance during rotational movements (26, 80, 167).

END

TYPE
Evidence

TITLE
Sled training acute responses

PAGE
1132-1133

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Keogh and colleagues (72) sought to describe the spatiotemporal characteristics of the heavy sled pull, using six resistance-trained subjects with experience in the heavy sled pull. Participants performed 3 25-meter (27 yd) sets of sled pulls with 171.2 kilograms (377 lb), with 3 minutes of rest between sets. Several significant differences were observed between the acceleration (the start through 5 m [5 yd]) and maximum velocity (20-25 m [22-27 yd]) phases, with average velocity, step length, swing time, and a range of segment and joint angles being significantly greater in the maximum velocity than acceleration phase. The fastest trials also had significantly greater step length, swing times, and trunk and knee angles at certain positions than slower trials.

END

TYPE
Evidence

TITLE
Sled pull acute effects on power and hormones

PAGE
1133-1134

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
West (150) examined the acute effects of five sets of 2 × 20-meter (21 yd) reverse sled pulls using loads of 75% of body mass with 11 resistance-trained men. Participants were retested immediately, 15 minutes, 1 hour, 3 hours, and 24 hours after completing the sled pulls. Peak countermovement jump power was significantly decreased and blood lactate significantly increased (peaking at 12.4 mmol/L immediately after) for a period of 1 hour, with no significant changes in creatine kinase at any time point. Testosterone and cortisol tended to increase at 15 minutes after (significant only for testosterone), with no significant changes in the testosterone-to-cortisol ratio observed.

END

TYPE
Evidence

TITLE
Sled pull PAPE effects

PAGE
1134

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Winwood and colleagues (160) and Williams and colleagues (152) have examined the potential of moderate to heavy sled pulls to produce a postactivation potentiation enhancement (PAPE) sprinting effect in adult semi-elite rugby (75%-150% body mass) and adolescent high school soccer players (loads producing a velocity decline of 40%-50% that equated to 66%-70% body mass), respectively. Some significant PAPE effects were observed that resulted in significant reductions in 15-meter (16 yd) sprint times by Williams and colleagues (152) and Winwood and colleagues (160). However, the significant PAPE benefit for Winwood and colleagues (160) was only observed using 75% body mass loads and at 12 minutes after completing the sled pulls. The studies therefore suggest that sled pulls with loads between 66% and 75% of body mass have the potential to produce 15-meter sprint PAPE effects in a variety of running athletes.

END

TYPE
Definition

TITLE
Unilateral training

PAGE
1134-1135

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
When employing training methods, one can use unilateral or bilateral training interventions. These types of training methods can be performed with the upper body or lower body, depending on the targeted outcomes. Common lower body unilateral training exercises include lunges, step-ups, and the single-leg squat, which is sometimes referred to as the Bulgarian split squat. This exercise isolates one leg and is typically used in the preparation of athletes from numerous sports. Typically, these types of exercises are integrated into training programs with varying degrees of emphasis (86) in an attempt to reduce bilateral asymmetries (75) or as a rehabilitation tool (37). They are often used to reduce a bilateral deficit, where asymmetries in force production are observed between unilateral and bilateral movements (67). It has also been demonstrated that bilateral movements exhibit a bilateral facilitation in which voluntary activation of the agonist muscle group increases (12, 117).

END

TYPE
Decision Rule

TITLE
Bilateral facilitation vs. bilateral deficit decision rule

PAGE
1135

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Trained or stronger individuals tend to exhibit a bilateral facilitation, while untrained, injured, or weaker athletes exhibit a bilateral deficit (14). Therefore, based on the bilateral facilitation response, trained individuals should not use unilateral methods as the primary strategy to develop strength. In contrast, unilateral training methods may be useful for strength development with untrained, weaker, and injured individuals (14).

END

TYPE
Recommendation

TITLE
Conclusion — Alternative methods and nontraditional implements

PAGE
1135

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
In designing strength and conditioning interventions, one can use a variety of methods to apply overload. The use of alternative methods and nontraditional implements is increasing in popularity. When choosing to implement these methods, strength and conditioning professionals should consider the benefits and weaknesses of these types of training interventions. Additionally, the level of the athlete dictates whether use of these methods is warranted. For example, a novice athlete or untrained individual may derive a large benefit from doing bodyweight or core stability exercises. Conversely, the trained or elite athlete may experience greater gains with traditional ground-based free weight exercises. With the advanced athlete, the use of variable resistance may also allow for a greater training stimulus to be applied to traditional training methods. If choosing to employ alternative methods or nontraditional element–based training methods, strength and conditioning professionals must always ensure that they teach proper exercise techniques as well as constantly monitor their athletes to ensure that a safe training environment is maintained.

END

TYPE
Procedure

TITLE
Front Plank

PAGE
1137-1138

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Kneel in a prone, quadruped position on the floor. The feet should be hip-width apart or slightly closer, with the palms of the hands flat on the floor shoulder-width apart and the elbows pointing backward.
Drop the elbows to the floor and position them directly under the shoulders.
Move the feet back one at a time to allow the hips and knees to extend so the abdomen and the front of the hips and legs rest on the floor.
Ending Position
Elevate the hips so the ankles, knees, hips, shoulders, and head are in a straight line.
Isometrically hold the torso in a rigid position with the elbows under the shoulders and the head in a neutral position.

END

TYPE
Procedure

TITLE
Side Plank

PAGE
1138-1139

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Lie on the floor on the left side.
Position the left elbow underneath the left shoulder with the left forearm perpendicular to the body.
Stack the right foot on top of the left foot with the right leg evenly on top of the left leg, or place the right foot on the floor immediately in front of the left foot. Also, stack the right arm evenly on top of the right side of the torso.
Position the head in a neutral position with the eyes focused forward.
Ending Position
Elevate the hips off the floor so the left ankle, knee, hip, and shoulder are in a straight line.
Isometrically hold the torso in a rigid position with the left elbow under the left shoulder and the head in a neutral position.
Switch and repeat the procedure for the right side.

END

TYPE
Procedure

TITLE
Suspension Trainer Chest Press

PAGE
1139-1140

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Assume a position away from the anchor point while grabbing the handles of the suspension trainer in each hand.
With the elbows extended, move the hands and feet shoulder-width apart while placing the body into a straight line, or plank position.
Brace the trunk and slowly step back until there is tension on the straps and the body is in an inclined position.
Movement
Initiate the movement by flexing the elbows and lowering the chest, similar to a push-up.
Ending Position
At the end of the movement the chest should be between the suspension trainer's handles.
Extend the elbows to return to the starting position.

END

TYPE
Procedure

TITLE
Suspension Trainer Inverted Row

PAGE
1140-1141

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Face the anchor point while grabbing the handles of the suspension trainer with the palms of the hands facing each other or upward.
While maintaining a neutral body position, lean back while simultaneously allowing the arms to extend in front of the body until they are at or above shoulder height.
Movement
Pull the torso toward the hands by flexing at the elbows and extending the shoulders. Throughout the movement, maintain a straight body posture.
Ending Position
The elbows are flexed, and the hands are next to the chest.
Extend the elbows, and lower the torso back to the starting position.

END

TYPE
Procedure

TITLE
Suspension Trainer Y Pull

PAGE
1141-1142

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Face the anchor point while grabbing the handles of the suspension trainer with the palms of the hands facing each other.
While maintaining a neutral body position, lean back while simultaneously allowing the arms to extend in front of the body until they are at or above shoulder height.
Movement
Without flexing the elbows, flex the shoulders while pushing the hands overhead in a diagonal movement pattern to form a Y with the arms and body.
Throughout the movement, maintain a straight body posture.
Ending Position
At the top of the movement the arms and body should form a Y.
After pausing in this position, slowly lower the body back to the starting position.

END

TYPE
Procedure

TITLE
Stability Ball Rollout

PAGE
1143-1144

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Kneel facing the stability ball with the upper body in an upright position, the elbows fully extended, and the hands touching the ball.
While keeping the hands on the ball, create a 90-degree angle at the knees and ankles with the knees, hips, and shoulders in a near-vertical plane.
Ending Position
Keep the knees and toes on the floor; elbows fully extended; arms parallel to each other; and knees, hips, and shoulders in a straight line.
Extend the knees and flex the shoulders to roll the ball forward and the arms across the top of the ball until it comes very close to the face.
Isometrically hold the torso in a rigid position; do not let the hips sag toward the floor.

END

TYPE
Procedure

TITLE
Stability Ball Pike

PAGE
1144-1145

SECTION
17.3 — Variable-Resistance Training

ORIGINAL TEXT
Starting Position
Kneel down in front of a stability ball.
Position the body facing away from the ball.
In a quadruped position with the hands underneath the shoulders and the knees extended, place both feet on the stability ball.
Isometrically hold the torso in a rigid position with the elbows fully extended and the head in a neutral position.
All repetitions begin from this position.
Upward Movement Phase
Keeping the knees and elbows fully extended and the torso in a rigid position, begin the exercise by flexing the hips to roll the ball toward the chest.
Continue lifting the hips until the toes are on top of the ball and the hips are directly over the shoulders.
Keep the head in a neutral position.
Downward Movement Phase
Return to the starting position by allowing the hips to extend under control.
Keep the knees and elbows fully extended and the torso held rigid.

END