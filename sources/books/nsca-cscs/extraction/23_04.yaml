## Item 13

```
TYPE
Recommendation

TITLE
Metabolic Training Specificity for Rehabilitation

PAGE
1663

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
For the marathon runner's goals, aerobic fitness is of much greater concern and must be addressed immediately. The metabolic demands for the wrestler involve a combination of aerobic and anaerobic systems; therefore, interval training is more appropriate (27). In contrast, the weightlifter's program would focus on maintaining anaerobic fitness.

END
```

