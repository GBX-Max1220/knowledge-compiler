Rhabdomyolysis

PAGE
1668

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
Rhabdomyolysis is characterized by the breakdown of skeletal muscle tissue, leading to the release of myoglobin into the bloodstream. Myoglobin can pose a risk to kidney function, potentially causing kidney damage or failure if left untreated.

