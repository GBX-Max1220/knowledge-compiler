## Item 25

```
TYPE
Warning

TITLE
Rhabdomyolysis Symptoms

PAGE
1668

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
Symptoms of rhabdomyolysis may manifest as severe muscle pain and weakness, dark urine (often resembling cola, properly termed myoglobinuria), swelling, tenderness of affected muscles, alongside fatigue, nausea, vomiting, and confusion. In severe instances, individuals may experience dehydration, electrolyte imbalances, and acute kidney injury (43).

END
```

## Item 26

```
TYPE
Warning

TITLE
Rhabdomyolysis Emergency Response

PAGE
1668

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
If rhabdomyolysis is suspected, immediately discontinue activity, lie the client down, implement proper hydration protocols, and closely monitor to ensure stability while awaiting further medical assistance (10). Prompt referral to a medical professional is necessary to prevent more serious medical complications (10).

END
```

