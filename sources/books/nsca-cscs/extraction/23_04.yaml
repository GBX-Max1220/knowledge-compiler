## Item 5

```
TYPE
Procedure

TITLE
DeLorme Resistance Training Program

PAGE
1659

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
DeLorme's program progresses from light to heavy resistance. The initial set involves 10 repetitions of 50% of the athlete's 10-repetition maximum (10RM), the second set increases the resistance to 75% of the 10RM, and the final set requires 100% of the 10RM (16, 17).

END
```

## Item 6

```
TYPE
Procedure

TITLE
Oxford Resistance Training System

PAGE
1659

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
The Oxford system (104) is the reverse of DeLorme's system; that is, it progresses from heavy to light resistance. The first set performed is 100% of the athlete's 10RM, the second is 75% of the 10RM, and the third is 50% of the 10RM (104).

END
```

## Item 7

```
TYPE
Warning

TITLE
Oxford System Warm-Up Requirement

PAGE
1659

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
Unlike the DeLorme system, which has a built-in warm-up from progressive increases in resistance, the Oxford system begins with heavy resistance. Thus, a non-fatiguing warm-up set should be considered.

END
```

## Item 8

```
TYPE
Procedure

TITLE
Knight's Daily Adjustable Progressive Resistive Exercise (DAPRE) System

PAGE
1659-1660

SECTION
23.4 — Rehabilitation Goals

ORIGINAL TEXT
Knight's (47) daily adjustable progressive resistive exercise (DAPRE) system requires and allows more manipulation of intensity and volume than either the DeLorme or the Oxford system (16, 17, 104); DAPRE involves 4 sets, with repetitions ranging from 10 to possibly only 1 during the final set. The first set requires 10 repetitions of 50% of the estimated 6RM, and the second set requires 6 repetitions of 75% of the estimated 6RM. The third set in the DAPRE requires the maximum number of repetitions of 100% of the estimated 6RM; the number of repetitions performed during the third set determines the adjustment made in resistance for the fourth set (table 23.2) (48).

END
```

