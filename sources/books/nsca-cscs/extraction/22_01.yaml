Hypertrophy Phase Training Intensity

PAGE
1596

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The hypertrophy or strength–endurance phase involves low to moderate intensity (50%-75% of the 1RM) and high volumes (3 to 6 sets of 8-20 repetitions).

END

---

TYPE
Threshold

TITLE
Basic Strength Phase Training Intensity

PAGE
1597

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The basic strength phase involves higher intensity (80%-95% of the 1RM) and moderate to high volumes (2 to 6 sets of 2 to 6 repetitions).

END

---

TYPE
Threshold

TITLE
Strength/Power Phase Training Load

PAGE
1598

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The strength/power phase involves low to very high loads (30%-95% of the 1RM, depending on the exercise) and low volumes (2 to 5 sets for 2 to 5 repetitions).

END

---

TYPE
Threshold

TITLE
Competitive Period Training Loads (Peaking)

PAGE
1599

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The competitive period includes peaking and maintenance. For peaking, athletes use very high to low intensities (50% to ≥93% of the 1RM) and very low volume (1 to 3 sets of 1 to 3 repetitions) for one to two weeks.

END

---

TYPE
Threshold

TITLE
Competitive Period Training Loads (Maintenance)

PAGE
1599

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
For maintenance, athletes modulate training between moderate and high intensities (85%-93% of the 1RM) with moderate volumes (about 2 to 5 sets of 3 to 6 repetitions).

END

---

TYPE
Threshold

TITLE
Second Transition Period Duration

PAGE
1599

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Therefore, it is generally recommended that the second transition period last no longer than four weeks unless an athlete requires additional time to recover from an injury.

END

