TITLE
Research Findings on Daily Undulating vs. Traditional Periodization Models

PAGE
1605

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Some research studies suggest that the daily undulating model is more effective than the traditional model (21, 57, 67, 68, 79), although other evidence suggests that no difference exists between these models (2, 10, 31, 78, 100, 101) or that traditional models are superior (47, 48, 74, 75, 101).

END

