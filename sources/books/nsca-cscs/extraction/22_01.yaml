TITLE
Periodization (Formal Definition)

PAGE
1582

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Periodization is the logical and systematic process of sequencing and integrating training interventions in order to manage the training process and to increase the potential of achieving peak performance at appropriate time points.

END

---

TYPE
Definition

TITLE
General Adaptation Syndrome (GAS)

PAGE
1582

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
In the 1930s, Hans Selye, a pioneering researcher on the biological effects of exposure to stressful stimuli, presented the basic concepts of the GAS in which a three-stage response to stress (alarm, resistance, and exhaustion) was presented.

CHILDREN
Alarm Phase, Resistance Phase, Exhaustion Phase

END

---

TYPE
Definition

TITLE
Alarm Phase

PAGE
1582

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Any time the body experiences a novel, new, or more intense stress than previously applied (e.g., lifting a heavier training load or a greater volume-load; see chapter 18), the initial response, or alarm phase, is marked by an accumulation of fatigue, soreness, stiffness, or reduction in energetic stores that results in a reduction in performance capacity (20, 92).

PARENT
General Adaptation Syndrome (GAS)

END

---

TYPE
Definition

TITLE
Resistance Phase

PAGE
1582

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
After this initial response, the body moves into the resistance phase, when it adapts to the stimulus and returns to a normal functional capacity.

PARENT
General Adaptation Syndrome (GAS)

END

---

TYPE
Definition

TITLE
Supercompensation

PAGE
1582

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
If the training stress is appropriately structured and not excessive, these adaptive responses can result in specific biochemical, structural, and mechanical adjustments that further elevate the athlete’s performance capacity, resulting in what is termed supercompensation (91).

END

---

TYPE
Definition

TITLE
Exhaustion Phase

PAGE
1583

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
If, however, the stress persists (either physical or psychoemotional) for an extended period of time, the athlete can move into the exhaustion phase.

PARENT
General Adaptation Syndrome (GAS)

END

---

TYPE
Definition

TITLE
Stimulus–Fatigue–Recovery–Adaptation Theory

PAGE
1583

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The stimulus–fatigue–recovery–adaptation theory is an extension of the GAS and suggests that training stimuli produce a general response (figure 22.3) that is influenced by the overall magnitude of the training stressor (38, 92).

END

---

TYPE
Definition

TITLE
Fitness–Fatigue Paradigm

PAGE
1585

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
In 1995, Zatsiorsky (106) presented the classic explanation of these relationships as the two-factor model, more commonly referred to as the fitness–fatigue paradigm (figure 22.4).

END

---

TYPE
Definition

TITLE
Parallel Training Models

PAGE
1589

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The parallel training models, as shown in figure 22.5, involve targeting all training factors simultaneously within one training session, training day, series of training days, or a microcycle (33, 35, 37, 38).

END

---

TYPE
Definition

TITLE
Sequential Training Models

PAGE
1589

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Sequential training models, as shown in figure 22.5, were created to address the limitations associated with the parallel model of training, such as the inability to simultaneously develop multiple motor and technical abilities, the need for longer preparation periods, and the inability to accommodate dense competitive schedules (38, 52).

END

---

TYPE
Definition

TITLE
Emphasis Training Models

PAGE
1590

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Emphasis training models, as shown in figure 22.5, contain aspects of both parallel and sequential models of periodization (35, 37, 38).

END

---

TYPE
Definition

TITLE
Macrocycle

PAGE
1591

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Typically, the macrocycle lasts several months up to a year, depending on the sport or the number of sports participated in within the year.

END

---

TYPE
Definition

TITLE
Mesocycle

PAGE
1591

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Within each macrocycle are mesocycles, each lasting several weeks to months, typically two to six weeks, with four weeks being the most common duration.

END

---

TYPE
Definition

TITLE
Microcycle

PAGE
1591

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Each mesocycle is then broken down into individual microcycles that last from several days to weeks; the most common duration is one week (35, 38).

END

---

TYPE
Definition

TITLE
Preparatory Period

PAGE
1594

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
In outlining a periodized training plan, the starting point is usually the preparatory period.

END

---

TYPE
Definition

TITLE
General Preparatory Phase

PAGE
1595

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The general preparatory phase typically occurs during the early part of the period and often targets the development of a general physical base (38, 69).

PARENT
Preparatory Period

END

---

TYPE
Definition

TITLE
Specific Preparatory Phase

PAGE
1595

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The specific preparatory phase occurs after the completion of the general preparatory phase and involves a shift in training focus.

PARENT
Preparatory Period

END

---

TYPE
Definition

TITLE
Hypertrophy Phase (Strength–Endurance Phase)

PAGE
1595

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The hypertrophy phase, which is also referred to as the strength–endurance phase, generally occurs during the early portion of the preparatory period (i.e., the general preparatory phase) (24, 40, 41, 93).

END

---

TYPE
Definition

TITLE
Basic Strength Phase

PAGE
1597

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
In the later portion of the preparatory period, during the specific preparatory phase, the primary aim of the basic strength phase is to increase the strength of the muscles that are essential to the primary sport movements (12-14).

END

---

TYPE
Definition

TITLE
First Transition Period

PAGE
1597

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
As originally described by Stone and colleagues (89-91), the first transition period is a link between the preparatory and competitive periods.

END

---

TYPE
Definition

TITLE
Strength/Power Phase

PAGE
1597

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The main phase within the first transition period is the strength/power phase.

PARENT
First Transition Period

END

---

TYPE
Definition

TITLE
Competitive Period

PAGE
1598

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
The central training target during the competitive period is preparing the athlete for competition by further increasing strength and power via additional increases in training intensity while decreasing volume.

END

---

TYPE
Definition

TITLE
Peaking

