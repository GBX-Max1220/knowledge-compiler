1598

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
For team sports, this period spans an entire season and may last for many months, requiring the use of a maintenance program (5).

END

---

TYPE
Definition

TITLE
Second Transition Period (Active Rest)

