Slow SSC vs. Fast SSC Classification

PAGE
1267

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Schmidtbleicher (56) categorized plyometric activities as either slow SSC (>0.25 s) or fast SSC (<0.25 s), depending on their ground contact time.

END

