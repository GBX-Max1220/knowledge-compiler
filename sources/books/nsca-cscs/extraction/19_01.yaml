TYPE
Definition

TITLE
Plyometric Exercise

PAGE
1260-1261

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Plyometric exercise refers to those activities that enable a muscle to reach maximal force in the shortest possible time. Plyometric is a combination of Greek words that literally means to increase measurement (plio = more; metric = measure) (67). Practically defined, plyometric exercise is a quick, powerful movement using a prestretch, or countermovement, that involves the stretch-shortening cycle (SSC) (64). Furthermore, plyometric exercises are typically classified as being either ballistic or rebounding.

END

TYPE
Definition

TITLE
Ballistic Exercises

PAGE
1261

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

PARENT
Plyometric Exercise

ORIGINAL TEXT
Ballistic exercises are those that minimally include contributions from the neuromuscular component of the SSC (e.g., squat jump, medicine ball overhead throw).

END

TYPE
Definition

TITLE
Rebound Exercises

PAGE
1261

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

PARENT
Plyometric Exercise

ORIGINAL TEXT
In contrast, rebound exercises are those that require physiomechanical SSC contributions (e.g., drop jumps or repeat countermovement jumps).

END

TYPE
Definition

TITLE
Power

PAGE
1261

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The term used to define this force–velocity relationship is power.

END

TYPE
Definition

TITLE
Impulse

PAGE
1261

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Impulse, defined as the integral of force over time, directly influences an athlete's performance by changing momentum.

END

TYPE
Definition

TITLE
Series Elastic Component (SEC)

PAGE
1262

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Of the mechanical model's many elements, it is the series elastic component (SEC) that is the workhorse of plyometric exercise. While the SEC includes some muscular components, it is the tendons that constitute the majority of the SEC.

END

TYPE
Definition

TITLE
Stretch Reflex

PAGE
1263

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The stretch reflex is the body's involuntary response to an external stimulus that stretches the muscles (31, 49).

END

TYPE
Definition

TITLE
Muscle Spindles

PAGE
1263

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Muscle spindles are proprioceptive organs that are sensitive to the rate and magnitude of a stretch; when a quick stretch is detected, muscular activity reflexively increases (31, 49).

END

TYPE
Definition

TITLE
Parallel Elastic Component (PEC)

PAGE
1263

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The series elastic component (SEC) and parallel elastic component (PEC) are two elastic structures that can be stretched within the muscle during plyometric exercises. The SEC includes tendons and muscle fiber crossbridges. The PEC contains collagenous structures (e.g., fascicular membranes), which provide stability and protection to musculature.

END

TYPE
Definition

TITLE
Stretch-Shortening Cycle (SSC)

PAGE
1264

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The stretch-shortening cycle (SSC) employs the energy storage capabilities of the SEC and stimulation of the stretch reflex to facilitate a maximal increase in muscle recruitment over a minimal amount of time.

END

TYPE
Definition

TITLE
Stretch Reflex Latency

PAGE
1265

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Stretch reflex latency (the time from reflex stimulation to the beginning of agonist muscle activity) largely depends on nerve conduction velocities and therefore increases with greater distances from the spinal cord (i.e., longer nerves) (40, 42, 44, 54).

END

TYPE
Definition

TITLE
Amortization (or Coupling) Phase

PAGE
1265

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Phase II is the time between the eccentric and concentric phases and is termed the amortization (or coupling) phase. This is the time from the end of the eccentric phase to the initiation of the concentric muscle action.

END

TYPE
Definition

TITLE
Golgi Tendon Organ

PAGE
1268

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The Golgi tendon organ is encapsulated within the serial components of the myotendinous junction. This is a proprioceptive mechanism that detects the rate and magnitude of force being applied to the respective tendon and will cause an inverse stretch reflex to occur past a tensile threshold, which immediately inhibits the excitatory signal through the motor neuron to the motor unit.

END

TYPE
Definition

TITLE
Progressive Overload

PAGE
1279

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Plyometrics is a form of resistance training and thus must follow the principles of progressive overload, which is the systematic increase in training frequency, volume, and intensity in various combinations.

END

TYPE
Definition

TITLE
Complex Training

PAGE
1287

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
However, many athletes may benefit from complex training, a combination of resistance training and plyometric training within the same training session to enhance fast and slow force expression.

END

TYPE
Definition

TITLE
Contrast Training

PAGE
1288

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Contrast training involves alternating high-load exercises and high-velocity exercises in contrast pairs in a set-by-set fashion with sufficient inter-set rest to avoid fatigue-induced interference.

END

TYPE
Definition

TITLE
Ascending Complex Training

PAGE
1288

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Ascending complex training involves sets of a high-velocity exercise followed by sets of a contrasting high-force exercise.

END

TYPE
Definition

TITLE
Descending Sets

PAGE
1288

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Descending sets require multiple high-force exercises to be completed before the execution of high-velocity exercises.

END

TYPE
Definition

TITLE
Dynamic Valgus

PAGE
1290

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Inward movement of the knees—also termed dynamic valgus—is a significant risk factor for knee injuries of all types, including patellofemoral pain and tears or ruptures of the anterior cruciate ligament (ACL) (45).

END

TYPE
Definition

TITLE
Balance

PAGE
1293

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Balance is the maintenance of a position without movement for a given period of time.

END

TYPE
Definition

TITLE
Back Squat Equivalent Strength

PAGE
1292

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Back squat equivalent strength is a descriptive term used to infer the necessary strength capacity required to tolerate the impact stress of the exercise so that it does not acutely overreach the athlete and become injurious.

END

TYPE
Recommendation

TITLE
Recovery Time Between Plyometric Sessions

PAGE
1277

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Forty-eight to 72 hours between plyometric sessions is a typical recovery time guideline for prescribing plyometrics (19); using these typical recovery times, athletes commonly perform two to three plyometric sessions per week.

END

TYPE
Recommendation

TITLE
Recovery for Depth Jumps

PAGE
1277-1278

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Recovery for depth jumps may consist of 5 to 10 seconds of rest between repetitions and 2 to 5 minutes between sets.

END

TYPE
Recommendation

TITLE
Work-to-Rest Ratio for Plyometrics

PAGE
1278

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The time between sets is determined by a proper work-to-rest ratio (i.e., 1:5 to 1:10) and is specific to the volume and type of drill being performed.

END

TYPE
Recommendation

TITLE
Combining Resistance Training and Plyometrics

PAGE
1287

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Combine lower body resistance training with upper body plyometrics, and upper body resistance training with lower body plyometrics.

END

TYPE
Recommendation

TITLE
Order of Plyometric and Aerobic Exercise

PAGE
1289

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Because aerobic exercise may have an interfering effect on power production (17), it is advisable to perform plyometric exercise before aerobic endurance training.

END

TYPE
Recommendation

TITLE
Landing Surface for Lower Body Plyometrics

PAGE
1297

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
A grass field, suspended floor, or rubber mat is a good surface choice (36). Surfaces such as concrete, tile, and hardwood are not recommended because they lack effective shock-absorbing properties (36).

END

TYPE
Recommendation

TITLE
Recommended Depth Jump Box Height

PAGE
1299

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The recommended height for depth jumps ranges from 16 to 42 inches (41-107 cm), with 30 to 32 inches (76-81 cm) being the norm (4, 21, 30, 43, 44, 48).

END

TYPE
Recommendation

TITLE
Depth Jump Box Height for Heavy Athletes

PAGE
1299

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
The depth jump box height for athletes who weigh over 220 pounds (100 kg) should be 18 inches (46 cm) or less.

END

TYPE
Procedure

TITLE
Steps for Implementing a Plyometric Training Program

PAGE
1282

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
Steps for Implementing a Plyometric Training Program
1. Evaluate the athlete, including the athlete's sport and training history.
2. Establish sport-, position-, and athlete-specific goals.
3. Teach the athlete proper jumping, landing, and throwing technique.
4. Assign proper plyometric training program design variables, addressing intensity, frequency, recovery, and volume.
5. Properly progress the plyometric training program.

END

