TITLE
Table 19.1 — Stretch-Shortening Cycle

PAGE
1264-1265

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
TABLE 19.1  Stretch-Shortening Cycle
Phase Action Physiological event
I—Eccentric Stretch of the agonist muscle Elastic energy is stored in the series elastic component. Muscle spindles are stimulated.
II—Amortization Pause between phases I and III Type Ia afferent nerves synapse with alpha motor neurons. Alpha motor neurons transmit signals to agonist muscle group.
III—Concentric Shortening of agonist muscle fibers Elastic energy is released from the series elastic component. Alpha motor neurons stimulate the agonist muscle group.

END

TYPE
Table

TITLE
Table 19.2 — Lower Body Plyometric Drills

PAGE
1271-1272

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
TABLE 19.2  Lower Body Plyometric Drills
Type Description
Hops Takeoff from one foot and landing on the same foot. Volume is either measured by distance traveled or number of foot contacts. This movement develops acceleration and deceleration capabilities in a single limb, with intensity defined by displacement velocity and volume defined by foot contacts. These drills may be singular (ballistic hop) that is in place or horizontal, or reactive (multiple repetitive actions for height or distance).
Bounds Takeoff from one foot and landing, or transitioning through, to the other foot. Depending on the training status of the athlete (rehab vs. performance), these drills may be singular (ballistic bound) or reactive (multiple repetitive actions with alternating ground contact). Bounds may result in greater horizontal velocity than hops and jumps and therefore are ideal for developing accelerations and decelerations with bilateral weight transfer. Intensity is defined by the horizontal velocity of the action. Volume is typically measured by distance but may be through the number of repetitions performed.
Jumps Takeoff and landing with two feet that may be horizontal or vertical in nature. The height or length of a jump determines the intensity of the action. Volume is determined by the number of foot contacts. Jumps may be in place, have multiple repetitive actions, involve equipment such as boxes or hurdles, or consist of a combination of these attributes.
Depth jumps and depth hops Depth jumps and hops ("shock" actions) use gravity and the athlete's weight to increase exercise intensity. The athlete assumes a position on a box, steps off, lands, and immediately transitions vertically, horizontally, laterally, or to another box. The height of the box determines the intensity of the action, and the volume is determined by the number of foot contacts. Repetitive jumps onto boxes or over barriers may be added in sequence.

END

TYPE
Table

TITLE
Table 19.3 — Upper Body Plyometric Drills

PAGE
1272-1273

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
TABLE 19.3  Upper Body Plyometric Drills
Type Description
Throws Single or both arms projecting a medicine ball or other external weight either horizontally or vertically. Progressions include increased mass of the implement, increased target distance, or change of emphasis in complexity of the movement (e.g., kneeling vs. standing throw).
Slams Generally, a double-arm movement forcefully bringing a medicine ball or other implement directly down to the ground. Progressions include increased mass of the medicine ball or increased target velocity of the medicine ball.
Pull Ballistically pulling the body in a vertical direction such as an explosive supine row or a pull-up. The position of the center of mass and range of action will be determined by the athlete's strength and movement competence.
Push Pressing the body away from the ground in a prone position. Progressions need to consider the athlete's relative strength levels and include incorporating shock methodology with varying depth of drop-to-ground contact, decreasing flight time to increase movement velocity, or increasing complexity through lateral or overhead movements.

END

TYPE
Table

TITLE
Table 19.4 — Trunk Plyometric Drills

PAGE
1273-1274

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
TABLE 19.4  Trunk Plyometric Drills
Type Description
Lower body anchored Either suspended in a prone position or in a traditional sit-up position with the feet anchored so that the upper body is free to move. Movements can be progressed by incorporating or increasing an external resistance or movement velocity.
Upper body anchored Lying supine, holding a fixed object or a partner's legs, while the lower body is free to move. Movements can be progressed by incorporating or increasing external resistance, movement velocity, or plane of motion (e.g., increased transverse plane involvement is more complex than sagittal plane only).
Throws Forcefully projecting a medicine ball or other external weight in a specified direction. The mass of the implement will influence the resultant movement velocity and should be considered in respect to the mass–velocity–momentum equation and the force production capability of the athlete.

END

TYPE
Table

TITLE
Table 19.5 — Factors Affecting the Prescribed Intensity of Lower Body Plyometric Drills

PAGE
1275-1276

SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
TABLE 19.5  Factors Affecting the Prescribed Intensity of Lower Body Plyometric Drills
Factor Effect
Points of contact The ground reaction force during single-leg lower body plyometric drills places more stress on an extremity's muscles, connective tissues, and joints than during double-leg plyometric drills.
Speed Greater horizontal velocity increases the intensity of the drill.
Technique Ankle, knee, and hip stiffness and the ability to maintain postural alignment influence ground contact time, ground reactional forces, eccentric muscle actions, and injury risk.
Strength Higher levels of strength–to–body weight reduce the relative intensity of a drill where mass is accelerated toward the ground by gravity (i.e., any form of reactive plyometric drill).
Directional change Changing direction requires deceleration and redirected acceleration of the athlete's center of mass. This increases the impulse required in the action and typically requires increased ground contact time.
Vertical component of the drill The higher the body's center of gravity, the greater the force on landing.
Mass The greater the athlete's body weight, the more stress is placed on muscles, connective tissues, and joints. External load in the form of bars, weight vests, ankle weights, and wrist weights can be added to the body to increase a drill's intensity.

END

