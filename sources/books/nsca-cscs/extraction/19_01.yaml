ORIGINAL TEXT
Various authors have theorized that basic in-place jumps such as repeated pogo jumps and countermovement jumps require relatively low levels of strength; repeated hops and jumps may require a basic strength level equivalent to a back squat of 1 × body weight, bounding and depth jumps using a box 12 inches (30 cm) tall or shorter may have a back squat strength equivalent of 1.5 × body weight, and depth or box jumps with a box higher than 12 inches (30 cm) may require a back squat strength equivalent of 2 × body weight (58).

END

