Research has shown that increasing time in the amortization phase results in increases in elastic energy lost in the bench press compared to no delay between eccentric and concentric phases (energy losses were 0.35 s = 25%, 0.9 s = 52%, 1 s = 55%, and 1.5 s = 70%) (66).

END

