SECTION
Chapter 19: Program Design and Technique for Plyometric Training

ORIGINAL TEXT
FIGURE 19.3 Proper plyometric landing technique. (a) When learning to land and stop, the shoulders are in line with the knees, which helps place the center of gravity over the body's base of support. The knees are over the toes; excessive inward (valgus) movement increases the risk of lower extremity injury; weight is evenly distributed through a flat foot to allow a balanced deceleration position. Learning to land and stop, decelerating body mass completely, is a precursor to learning to land and rebound (i.e., reaccelerate body mass). (b) Proper landing technique to facilitate reactionary rebound actions; the shoulders are in line with the knees, the ankles are stiff, and athlete contacts the ground with the midfoot and forefoot to enable a rebound acceleration to occur. Note the alignment of the hips, knees and toes, with the feet hip-width apart to optimize vertical or horizontal force (depending on the subsequent movement).

