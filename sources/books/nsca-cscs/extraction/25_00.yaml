TYPE
Table

TITLE
Calculations for Space Needs

PAGE
1757-1760

SECTION
25 — Facility Design, Layout, and Organization

ORIGINAL TEXT
TABLE 25.2  Calculations for Space Needs
Exercise type Examples of exercises Formulas and examples
Prone and supine exercises with bar Bench press; lying triceps extension; hip thrust Formula: DEPTH: actual weight bench lengtha (6-8 ft [1.8-2.4 m]) + a safety cushion of 3 ft (0.9 m) multiplied by WIDTH: actual bar length (4-7 ft [1.2-2.1 m]) + a double-wide safety cushion of 6 ft (1.8 m)
Example 1: If using a 6 ft long weight bench and a 7 ft Olympic bar for the bench press exercise: DEPTH: (6 ft [bench] + 3 ft [safety cushion]) × WIDTH: (7 ft [bar] + 6 ft [double-wide safety cushion]) = 117 ft2
Example 2 (metric approximations): If using a 2 m long weight bench and a 1 m long bar for the lying triceps extension exercise: DEPTH: (2 m [bench] + 1 m [safety cushion]) × WIDTH: (1 m [bar] + 2 m [double-wide safety cushion]) = 9 m2
Standing exercises Biceps curl; upright row Formula: DEPTH: a suggested user space of 2 ft (0.6 m) for a standing exercise + a safety cushion of 3 ft (0.9 m) multiplied by WIDTH: actual bar lengthb (4-7 ft [1.2-2.1 m]) + a double-wide safety cushion of 6 ft (1.8 m)
Example 1: If using a 4 ft curl bar for the biceps curl exercise: DEPTH: (2 ft [user space] + 3 ft [safety cushion]) × WIDTH: (4 ft [bar] + 6 ft [double-wide safety cushion]) = 50 ft2
Example 2 (metric approximations): If using a 2 m bar for the upright row exercise: DEPTH: (1 m [user space] + 1 m [safety cushion]) × WIDTH: (2 m [bar] + 2 m [double-wide safety cushion]) = 8 m2
Standing exercises from a rack Back squat; shoulder press Formula: DEPTH: a suggested user space of 8-10 ft (2.4-3.0 m) for a standing exercise (from a rack) multiplied by WIDTH: actual bar length (5-7 ft [1.5-2.1 m]) + a double-wide safety cushion of 6 ft (1.8 m)
Example 1: If using a 7 ft Olympic bar for the back squat exercise: DEPTH: (10 ft [user space]) × WIDTH: (7 ft [bar] + 6 ft [double-wide safety cushion]) = 130 ft2
Example 2 (metric approximations): If using a 2 m Olympic bar for the shoulder press exercise: DEPTH: (3 m [user space]) × WIDTH: (2 m [bar] + 2 m [double-wide safety cushion]) = 12 m2
Weightlifting exercises Power clean; power snatch Formula (on inlaid rubber flooring): DEPTH: a suggested user space of 8-10 ft (2.4-3.0 m) for a weightlifting exercise multiplied by WIDTH: actual bar length (6-7 ft [1.8-2.1 m]) + a double-wide safety cushion of 6 ft (1.8 m)
Formula (on an elevated wood platform): DEPTH: lifting platform length (typically 8 ft [2.4 m]) + a safety cushion of 3 ft (0.9 m) multiplied by WIDTH: lifting platform width (typically 8 ft [2.4 m]) + a double-wide safety cushion of 6 ft (1.8 m)
Example 1 (on inlaid rubber flooring): DEPTH: (10 ft [user space]) × WIDTH: (7 ft [bar] + 6 ft [double-wide safety cushion]) = 130 ft2
Example 2 (on an elevated wood platform; metric approximations): DEPTH: (2.5 m [platform length] + 1 m [safety cushion]) × WIDTH: (2.5 m [platform width] + 2 m [double-wide safety cushion]) ≈ 16 m2
Landmine exercises Landmine squat; half-kneeling landmine press Formula: The minimum space need is based on the area (A) of a circle (A = π × r2): The radius (r) of the circle is comprised of the actual bar length (5-7 ft [1.5-2.1 m]) + a suggested user space of 2 ft (0.6 m) for a landmine exercise + a safety cushion of 3 ft (0.9 m). A minimum of 90 degrees of movement is required for the range of motion at the user end of the bar for a landmine exercise; 90 degrees is one-quarter of a 360-degree circle. Thus, the formula is (π × [actual bar length + user space + safety cushion]2) divided by 4. (Use 3.14 for the value of π.)
Example 1: If using a 7 ft Olympic bar for the landmine squat exercise: (π × [7 ft {bar} + 2 ft {user space} + 3 ft {safety cushion}]2) ÷ 4 ≈ 113 ft2
Example 2 (metric approximations): If using a 2 m Olympic bar for the half-kneeling landmine press exercise: (π × [2 m {bar} + 1 m {user space} + 1 m {safety cushion}]2) ÷ 4 ≈ 12.5 m2
Suspension training exercises Suspension row; foot-elevated knee tuck Formula: DEPTH: actual distance of the foot position (the farthest foot position if the feet are staggered) from the anchor point of the suspension strap (measure out from a spot on the ground directly under the anchor point) + the athlete's height + a safety cushion of 3 ft (0.9 m) multiplied by WIDTH: a suggested user space of 2 ft (0.6 m) for a suspension exercise + a double-wide safety cushion of 6 ft (1.8 m)
Example 1 (angled use): If a 6 ft tall athlete is doing an angled suspension exercise (e.g., a suspension row) with both feet positioned 3 ft from the suspension strap anchor point: DEPTH: (3 ft [distance out from under the anchor point] + 6 ft [athlete's height] + 3 ft [perimeter walkway safety cushion]) × WIDTH: (2 ft [user space] + 6 ft [safety cushion]) = 96 ft2
Example 2 (vertical or perpendicular use; metric approximations): If a 1.6 m tall athlete is doing a prone suspension exercise (e.g., a foot-elevated knee tuck) with the feet in the straps directly below the anchor point: DEPTH: (0 m [distance out from under the anchor point] + 1.6 m [athlete height] + 1 m [safety cushion]) × WIDTH: (1 m [user space] + 2 m [safety cushion]) ≈ 8 m2
aFor prone and supine ground-based barbell exercises with no bench, use the athlete's height for the DEPTH.
bFor dumbbell and kettlebell exercises (i.e., standing exercises without a bar), use a user space of 2 ft (0.6 m) for the WIDTH.

END

