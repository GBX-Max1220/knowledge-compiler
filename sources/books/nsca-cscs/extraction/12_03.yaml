PAGE
720

SECTION
12.3 — Dietary Supplements

ORIGINAL TEXT
In doses of 3 to 9 milligrams per kilogram body weight consumed approximately 60 minutes before exercise or during prolonged exercise, caffeine is ergogenic. No further benefit is observed when it is consumed at higher dosages (≥9 mg/kg). It can decrease feelings of perceived exertion, improve work capacity, and increase mental alertness. The scientific literature does not support caffeine-induced diuresis during exercise or any harmful change in fluid balance that would negatively affect performance.

