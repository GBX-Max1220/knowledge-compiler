TYPE
Procedure

TITLE
Signaling Process for Skeletal Muscle

PAGE
234-235

SECTION
Chapter 4: Endocrine Responses to Resistance Exercise and Training — Understanding Signaling Concepts

ORIGINAL TEXT
Here is a simplified breakdown of the signaling process for skeletal muscle:
1. Stimulating the muscle. Resistance exercise activates muscles, prompting a hormonal response.
2. Hormonal response. Hormones are released and travel to muscle cells.
3. Hormone–receptor interaction. Hormones bind to specific receptors in the cell membrane of muscle cells (peptide hormones) or inside the muscle cells (steroid hormones), signaling the need for action inside the cell.
4. Intracellular signaling. This binding triggers a series of events that lead to DNA signaling inside the nucleus.
5. DNA translation. DNA instructions are transcribed to messenger ribonucleic acid (mRNA), which carries the instructions to the cell's protein-making machinery (ribosome).
6. Protein production. The mRNA instructions are translated into specific proteins, the building blocks for muscle repair and growth.
7. Muscle growth and repair. Regular training uses this muscle development and repair mechanism, which is essential for developing lean muscle mass and athletic performance.

