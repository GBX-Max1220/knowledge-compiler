TITLE
Certified Strength and Conditioning Specialist (CSCS)

PAGE
1788

SECTION
26.2 — Staff Policies

ORIGINAL TEXT
Certified Strength and Conditioning Specialists are professionals who practically apply foundational knowledge to assess, motivate, educate, and train athletes for the primary goal of improving sports performance. They conduct sport-specific testing sessions, design and implement safe and effective strength training and conditioning programs, and provide guidance for athletes in nutrition and injury prevention. Recognizing their area of expertise is separate and distinct from the medical, dietetic, athletic training, and sport coaching fields, Certified Strength and Conditioning Specialists consult with and refer athletes to these professionals when appropriate. (30, p. 13)

END
