TITLE
Certification Requirement for Strength and Conditioning Coaches

PAGE
1787

SECTION
26.2 — Staff Policies

ORIGINAL TEXT
The possession of a certification from an independently accredited organization, such as the Certified Strength and Conditioning Specialist (CSCS) certification, establishes a standard of care. On August 1, 2015, National Collegiate Athletic Association (NCAA) Division I adopted legislation "to specify that a strength and conditioning coach shall be certified and maintain current certification through a nationally accredited strength and conditioning certification program" (27, p. 1).

END
```

```
TYPE
Recommendation

TITLE
Continuing Education for Professional Certification and Liability Reduction

PAGE
1787

SECTION
26.2 — Staff Policies

ORIGINAL TEXT
Continuing education is a necessary part of maintaining a professional certification and reducing liability exposure, especially in the area of supervision and instruction (1). Litigation issues in this area often involve questions of "professional instructor qualifications," which include continuing education (30). Thus, assistant strength and conditioning professionals should also achieve and maintain a professional certification including standard first aid, cardiopulmonary resuscitation (CPR), and automated external defibrillation (AED).

END
