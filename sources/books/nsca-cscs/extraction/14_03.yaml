ORIGINAL TEXT
Mean —the average of the scores (i.e., the sum of the scores divided by the number of scores). This is the most commonly used measure of central tendency.

CHILDREN
Mean

END

TYPE
Definition

TITLE
Median

PAGE
822

SECTION
14.3 — Statistical Evaluation of Test Data

ORIGINAL TEXT
Median —the middlemost score when a set of scores is arranged in order of magnitude. With an even number of scores, the median is the average of the two middlemost scores. Half a group of scores falls above the median and half falls below the median. Depending on the distribution of scores, the median can be a better measure of central tendency than the mean. This is particularly true when very high or very low scores of one or a few members of the group tested raise or lower the group mean to the extent that it does not adequately describe the ability of most group members.

CHILDREN
Median

END

TYPE
Definition

TITLE
Mode

PAGE
822

SECTION
14.3 — Statistical Evaluation of Test Data

ORIGINAL TEXT
Mode —the score that occurs with the greatest frequency. If each numerical score appears only once, there is no mode. If two or more scores are tied for greatest frequency, all of the similar scores are modes. The mode is generally regarded as the least useful measure of central tendency.

CHILDREN
Mode

END

