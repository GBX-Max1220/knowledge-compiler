TYPE
Procedure

TITLE
Developing an Athletic Profile — Six Steps

PAGE
824-825

SECTION
14.3 — Statistical Evaluation of Test Data

ORIGINAL TEXT
1. Select tests that will measure the specific parameters most closely related to the physical characteristics of the sport or sports in question. For example, a testing battery for wrestlers should include tests for pulling strength, pushing strength, and local muscular endurance.
2. Choose valid and reliable tests to measure these parameters, and arrange the testing battery in an appropriate order with sufficient rest between tests to promote test reliability (see chapter 13 for more detail). For example, appropriate tests for wrestling might include push-ups and sit-ups for maximum repetitions in a given time interval. These two tests should be separated by at least 10 minutes of rest to allow recovery from fatigue and thus promote accurate scores.
3. Administer the test battery with as many athletes as possible.
4. Determine the smallest worthwhile change for the tests and compare to normative data where appropriate. It is recommended that coaches store testing results and develop their own norms when standardized procedures are used.
5. Conduct repeat testing (e.g., pre- and posttraining program) and use the results to present a visual profile with figures.
6. Use the results of the testing in some meaningful way. Ideally, the results will enable the strength and conditioning professional to identify the strengths and weaknesses of the athletes and to design the training program with these in mind.

END

