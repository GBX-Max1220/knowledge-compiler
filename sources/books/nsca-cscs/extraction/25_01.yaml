TYPE
Definition

TITLE
Minimally Compliant Facility

PAGE
1735

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
In accordance with the NSCA Strength and Conditioning Professional Standards and Guidelines (16), and as explained in this chapter, a minimally compliant facility must be in agreement with mandated building codes and regulations, including accessibility (i.e., wheelchair access and ADA compliance), HVAC, electrical, lighting, flooring, storage, square footage, safety spaces, and overhead clearance and must possess well-maintained equipment and surfaces.

END

---

TYPE
Definition

TITLE
Predesign Phase

PAGE
1729

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The predesign phase is the first step in building a new facility. This phase should consist of a needs analysis, a feasibility study, and master plan formation.

CHILDREN
Needs Analysis, Feasibility Study, Master Plan

END

---

TYPE
Definition

TITLE
Needs Analysis

PAGE
1729

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The needs analysis is the step when the designers and experts collaborate to determine the needs of the strength and conditioning program (10).

PARENT
Predesign Phase

END

---

TYPE
Definition

TITLE
Feasibility Study

PAGE
1729-1730

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The second part of the predesign phase is called a feasibility study. This process should analyze strengths, weaknesses, opportunities, and threats (known as a SWOT analysis) (10). The goal of the feasibility study is to ensure that the financial investment will yield a viable and sustainable return.

PARENT
Predesign Phase

END

---

TYPE
Definition

TITLE
Master Plan

PAGE
1730

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The master plan is the general plan for all phases of the new facility. The master plan should include the building and construction plan, facility design, budget information, and an operational plan to act on once the facility is completed (10).

PARENT
Predesign Phase

END

---

TYPE
Definition

TITLE
Design Phase

PAGE
1731

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The design phase is the second phase in the process of building a new facility. In the design phase, ideas from the committee come together with regard to the structure and design elements of the facility.

END

---

TYPE
Definition

TITLE
Construction Phase

PAGE
1732

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The construction phase is the period of time from the beginning of building the facility until completion.

END

---

TYPE
Definition

TITLE
Preoperation Phase

PAGE
1732

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The preoperation phase consists of the final steps before the facility can open.

END

---

TYPE
Recommendation

TITLE
Committee Composition for New Facility Design

PAGE
1728

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The committee should consist of a builder, architect, designers, lawyers, financial departments, and people who will be involved in using the facility. At least one strength and conditioning professional, or other expert who will be working in the facility, should be included in the committee to provide a perspective that will help maximize the utility and safety of the space.

END

---

TYPE
Recommendation

TITLE
Minimum Space Requirement

PAGE
1740-1741

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The recommended minimum amount of space is 100 square feet (9.3 m2) per individual, including all athletes, strength and conditioning professionals, and any additional staff (e.g., athletic trainers) or persons present (16).

END

---

TYPE
Recommendation

TITLE
Facility Location

PAGE
1742

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The strength and conditioning facility ideally should be located on the ground floor away from offices and classrooms.

END

---

TYPE
Recommendation

TITLE
Supervision Location

PAGE
1742

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
An office area for supervision should be in a central location with a clear line of sight and windows or mirrors providing the opportunity to look out and see everyone, including individuals and groups entering or exiting the room.

END

---

TYPE
Recommendation

TITLE
Ceiling Height

PAGE
1743

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
A recommended height is 12 to 14 feet (3.7-4.3 m), which should give enough clearance to allow athletes to comfortably perform most activities (14, 18).

END

---

TYPE
Recommendation

TITLE
Lighting Levels for General Gym Areas

PAGE
1744

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Lighting is recommended between 20 to 30 foot candles (fc; 1 fc = lumen/ft2) or 200 to 300 lux (lx; 1 lx = lumen/m2) at floor level for general gym areas and up to 50 foot candles or 500 lux for dedicated resistance training and group exercise areas (2, 11, 18).

END

---

TYPE
Recommendation

TITLE
Lighting Color Temperature

PAGE
1744

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Lights with color temperatures between 4,000° and 5,000° Kelvin are considered best for strength and conditioning facilities because they resemble daylight, provide optimal visibility for enhanced safety, and can have an energizing effect.

END

---

TYPE
Recommendation

TITLE
Room Temperature Range

PAGE
1745

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Most sources indicate that between 68 °F and 78 °F (20-26 °C) is an appropriate temperature range, with many suggesting an optimal range of 68 °F to 74 °F (20-23 °C) (2, 5, 18).

END

---

TYPE
Threshold

TITLE
Maximum Relative Humidity

PAGE
1745

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
In any space where there is physical activity, relative humidity should not exceed 60%.

END

---

TYPE
Threshold

TITLE
Load-Bearing Capacity

PAGE
1742

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
The load-bearing capacity should be at least 100 foot-pounds per square foot (4.8 kN/m2) (7).

END

---

TYPE
Recommendation

TITLE
Flooring Surface Safety

PAGE
1744

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
As a general rule for safety, floor surfaces in physical activity areas should be slip-resistant to minimize the risk of exercise and fall-related injuries (2).

END

---

TYPE
Recommendation

TITLE
Accessibility for Persons with Disabilities

PAGE
1742

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Every facility should be accessible to people with disabilities, with either a ramp or a wheelchair lift for any change in height exceeding 0.5 inches (1.3 cm).

END

---

TYPE
Recommendation

TITLE
Emergency Phone Accessibility

PAGE
1742-1743

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Every facility should have at least one phone that is accessible to persons in wheelchairs.

END

---

TYPE
Recommendation

TITLE
Outdoor Training Surface Safety

PAGE
1736

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Outdoor training surfaces must offer proper traction for athletic activity and should not be wet or damp from recent storms.

END

---

TYPE
Warning

TITLE
Outdoor Training Surface Temperature

PAGE
1736

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
Ground surface temperatures should also be considered to avoid injury due to excessive heat or burns (e.g., artificial turf may have higher temperatures than surrounding surfaces).

END

---

TYPE
Recommendation

TITLE
Equipment Inspection for Outdoor Use

PAGE
1736-1737

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
All strength and conditioning equipment should be inspected regularly, especially if used outdoors, because being exposed to the elements can accelerate wear.

END

---

TYPE
Recommendation

TITLE
Satellite Facility Equipment and Layout

PAGE
1735

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
A satellite training facility that does not have dedicated walkways separating the equipment areas should be set up with equipment bolted and secured around the perimeter. The center of the room should remain open for transitions between training stations while allowing unimpeded access to emergency exits.

END

---

TYPE
Warning

TITLE
Equipment and Safety Spacing in Satellite Facilities

PAGE
1735

SECTION
25.1 — Facility Design Principles

ORIGINAL TEXT
As a rule, equipment and safety spacing should never be compromised due to limited space.

END

