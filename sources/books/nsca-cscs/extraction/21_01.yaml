TYPE
Definition

TITLE
Training Specificity

PAGE
1513

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Training specificity refers to the distinct adaptations to the physiological systems that arise from the training program.

END

TYPE
Definition

TITLE
Minimum Effective Dose (MED)

PAGE
1514

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
MED was originally used in the pharmaceutical industry to reflect the understanding that there is a minimum dose of medication needed to elicit the desired physiological response; the use of medications results in varying side effects, and the higher the dose of medication, the greater the side effects. In strength and conditioning, this term has been adapted to applying the minimum amount of training stimuli required to maximize adaptations while simultaneously minimizing the damage and injury risks associated with training.

END

TYPE
Definition

TITLE
Maximum Tolerated Dose (MTD)

PAGE
1514

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
This can be considered the maximum training workload that provides measurable benefits to the athlete.

END

TYPE
Definition

TITLE
Maximal Aerobic Capacity (V̇O2max)

PAGE
1516

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
high maximal aerobic capacity (V̇O2max) is necessary for success in aerobic endurance events (87).

END

TYPE
Definition

TITLE
Lactate Threshold (LT)

PAGE
1517

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Lactate threshold is that speed of movement or percentage of V̇O2max at which a specific blood lactate concentration is observed (i.e., 4 mmol/L of blood) or the point at which blood lactate concentration begins to increase above resting levels (136).

END

TYPE
Definition

TITLE
Maximal Lactate Steady State (MLSS)

PAGE
1517

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
The MLSS is defined as the exercise intensity at which maximal lactate production is equal to maximal lactate clearance within the body (14).

END

TYPE
Definition

TITLE
Exercise Economy

PAGE
1518

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
A measure of the energy cost of activity at a given exercise velocity is referred to as exercise economy.

END

TYPE
Definition

TITLE
Exercise Mode

PAGE
1520

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Exercise mode refers to the specific activity performed by the athlete: cycling, running, swimming, and so on.

END

TYPE
Definition

TITLE
Training Frequency

PAGE
1520

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Training frequency refers to the number of training sessions conducted per day or per week.

END

TYPE
Definition

TITLE
Heart Rate Reserve (HRR)

PAGE
1525

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
HRR is the difference between an athlete's maximal heart rate and their resting heart rate (24).

END

TYPE
Definition

TITLE
Age-Predicted Maximal Heart Rate (APMHR)

PAGE
1525

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
the individual's age-predicted maximal heart rate (APMHR) is often used as the basis for determining exercise intensity.

END

TYPE
Definition

TITLE
Metabolic Equivalent (MET)

PAGE
1529

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
One metabolic equivalent (MET) is equal to 3.5 ml · kg−1 · min−1 of oxygen consumption and is considered the amount of oxygen required by the body at rest (3).

END

TYPE
Definition

TITLE
Exercise Duration

PAGE
1532

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Exercise duration refers to the length of time of the training session.

END

TYPE
Definition

TITLE
Extensive Endurance Training

PAGE
1537

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
the term extensive endurance training is a more appropriate term and the one used in this text.

END

TYPE
Definition

TITLE
Pace/Tempo Training

PAGE
1539

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Pace/tempo training employs an intensity at or slightly higher than race competition intensity.

END

TYPE
Definition

TITLE
Interval Training

PAGE
1540

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Interval training involves exercise at intensities close to V̇O2max.

END

TYPE
Definition

TITLE
High-Intensity Interval Training (HIIT)

PAGE
1540

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
High-intensity interval training (HIIT) is a form of training that uses repeated high-intensity exercise bouts above MLSS or critical V̇O2 interspersed with brief recovery periods (76).

END

TYPE
Definition

TITLE
Fartlek Training

PAGE
1541

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Fartlek training (the word Fartlek originates from the Swedish term for speed play) is a combination of several of the previously mentioned types of training.

END

TYPE
Definition

TITLE
Cross-Training

PAGE
1551

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Cross-training is a mode of training that can be used to maintain general conditioning in athletes during periods of reduced training due to injury or during recovery from a training cycle (96).

END

TYPE
Definition

TITLE
Detraining

PAGE
1551

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Detraining occurs when the athlete reduces the training duration or intensity or stops training altogether due to a break in the training program, injury, or illness.

END

TYPE
Definition

TITLE
Tapering

PAGE
1552

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Tapering involves the systematic reduction of training duration and intensity, combined with an increased emphasis on technique work and nutritional intervention.

END

TYPE
Definition

TITLE
Altitude

PAGE
1558

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Altitude is classified into several categories, ranging from sea level (>500 m [1,640 ft]) to low (>500-2,000 m [1,640-6,562 ft]), moderate (>2,000-3,000 m [6,562-9,843 ft]), high (>3,000-5,500 m [6,562-18,045 ft]), and extreme (>5,500 m [>18,045 ft]) (39).

END

TYPE
Definition

TITLE
Live High, Train Low (LHTL)

PAGE
1558

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Live high, train low (LHTL) is a method commonly used by athletes seeking to benefit from altitude training. LHTL requires individuals to live at moderate altitudes, between 2,000 meters and 3,000 meters (6,562-9,843 ft), and train at or near sea level (66).

END

TYPE
Recommendation

TITLE
Training Frequency for V̇O2max Improvement

PAGE
1521

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
Research has shown that it is necessary to train more than twice per week in order to increase V̇O2max (138).

END

TYPE
Recommendation

TITLE
Exercise Progression Guideline (10% Rule)

PAGE
1533

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
it is recommended that from week to week within a longer-term training plan, exercise frequency, intensity, or duration should not increase more than 10% each week to avoid overtraining or injury (57).

END

TYPE
Recommendation

TITLE
Heat Acclimation Protocol Duration

PAGE
1559

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
it is generally recommended that athletes aim for 60 minutes of heat exposure (108) and a maximum of 90 minutes, although 120 minutes has been shown to be effective (115, 144).

END

TYPE
Recommendation

TITLE
Heat Acclimation Environmental Condition

PAGE
1561

SECTION
Chapter 21 — Program Design and Technique for Aerobic Endurance and Metabolic Training

ORIGINAL TEXT
It is recommended that the environment have a wet-bulb globe temperature >30 °C (>86 °F) to provide the necessary stress to elicit heat adaptations in core body temperature as well as induce a higher sweat response (28).

END

