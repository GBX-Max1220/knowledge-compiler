TITLE
Landmine Rotation

PAGE
1166-1167

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Starting Position
Stand facing the free end of the barbell, then squat down to grasp the end of the barbell sleeve with both hands (not shown) and pick it up.
After standing, press the free end of the barbell up to position it in front of the midline of the body approximately level with the eyes.
Stand with the feet approximately shoulder-width apart and knees slightly flexed.
The body weight should be shifted to the balls of the feet but with the heels remaining in contact with the floor.
Brace the trunk with the head and spine in a neutral position (4).
Rotate to the Left
Lower the bar by rotating to the left while also allowing the torso, hips, and back foot (i.e., the foot opposite the direction of the bar rotation) to rotate in the same direction of the barbell (4) (somewhat more than what is shown).
Return to the Starting Position
Using a forceful and rapid motion, rotate the bar back to the starting position while keeping the torso and hips aligned with a neutral head position.
During this motion keep the arms extended and in front of the torso throughout the rotational elevation of the barbell while returning to the starting position (4).
Rotate to the Right
Lower the bar by rotating to the right while also allowing the torso, hips, and back foot (i.e., the foot opposite the direction of the bar rotation) to rotate in the same direction of the barbell (4) (somewhat more than what is shown).
Return to the Starting Position
Using a forceful and rapid motion, rotate the bar back to the starting position while keeping the torso and hips aligned with a neutral head position.
During this motion keep the arms extended and in front of the torso throughout the rotational elevation of the barbell while returning to the starting position (4).
MAJOR MUSCLES INVOLVED
rectus abdominis, obliques, erector spinae

END

TYPE
Procedure

TITLE
Single-Arm Landmine Row

PAGE
1168-1169

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Setup and Starting Position
While standing facing away from the axis of rotation of the landmine barbell, assume a hip-width stance with the unfixed side of the barbell just outside of the working-side leg with the toes behind the barbell sleeve.
While maintaining a 25- to 45-degree knee angle, hinge at the hips until able to grasp the end of the barbell with one hand while the elbow is extended and reaching downward. In this position the forward trunk inclination should be roughly 30 to 60 degrees relative to the ground. This trunk angle should remain constant throughout the movement (80).
Upward Movement Phase
The upward movement phase (i.e., concentric phase) is initiated from the starting position and ends at the top position where the barbell reaches the greatest angle relative to the floor and contacts the torso.
Throughout this motion remain stationary with an approximately neutral axial alignment while simultaneously retracting the shoulder girdle, extending the glenohumeral joint, and flexing the elbow to pull the barbell along the natural arc of the landmine barbell device (80).
Downward Movement Phase
Allow the shoulder girdle to protract, the glenohumeral joint to flex, and the elbow to extend simultaneously to return to the starting position (80).
Note: As part of a balanced training program, this movement is performed on both sides of the body.
MAJOR MUSCLES INVOLVED
latissimus dorsi, trapezius, teres major, posterior deltoid, triceps brachii, rhomboids, brachioradialis, biceps brachii, brachialis

END

TYPE
Procedure

TITLE
Landmine Squat to Press

PAGE
1169-1171

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Setup and Starting Position
Stand facing the axis of rotation of the landmine barbell with a slight forward lean, while assuming a shoulder-width stance with the knees slightly flexed and grasping the end of the bar with one hand.
The bar should be positioned about 4 to 6 inches (10.2-15.2 cm) away from the shoulder of the arm that is holding the bar (135). The other arm is held out to the side of the body and used for balance during the exercise.
Downward Movement Phase
Begin the exercise by flexing the hips and knees slowly and under control while keeping the torso-to-floor angle relatively constant.
Maintain a flat-foot position with the knees aligned over the feet as they flex.
Continue flexing the hips and knees until the thighs are parallel to the floor, the torso begins to round or flex forward, or the heels begin to rise off the floor.
Upward Movement Phase
Extend the hips and knees while keeping the torso-to-floor angle relatively constant.
Keep the torso erect, shoulders back, and chest up and out.
Keep the heels on the floor and the knees aligned over the feet.
Continue extending the hips and knees; as the fully-standing position is reached, press the bar up and slightly forward until the elbow of the arm holding the bar is fully extended; full knee and elbow extension should be attained at about the same time.
Return to the Starting Position
Keeping the lower body and torso stationary, slowly lower the bar in a controlled manner until it is returned to the starting position.
Note: As part of a balanced training program, this movement is performed on both sides of the body.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, deltoid (anterior, medial, and posterior), trapezius, triceps brachii

END

TYPE
Procedure

TITLE
Two-Arm Kettlebell Swing

PAGE
1173-1175

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Starting Position
Stand with feet flat and placed between hip- and shoulder-width apart with the toes pointed straight ahead, straddling a kettlebell.
Squat down with the hips lower than the shoulders and grasp the kettlebell with a closed, pronated grip.
Place the hands on the kettlebell with index fingers touching or close together, inside of the legs, keeping the elbows fully extended.
Position the body with the back in a neutral spine position, shoulders retracted and depressed, feet flat on the floor, and eyes focused straight ahead or slightly upward.
Maintain a neutral spine or normal lordotic position while flexing the hips and knees to approximately a quarter-squat position, with the kettlebell hanging at arm's length between the thighs.
All repetitions begin from this position.
Backward Movement Phase
Begin the exercise by flexing at the hips to swing the kettlebell between the legs.
Keep the knees in a moderately flexed position with the back neutral and the elbows extended.
Keep swinging the kettlebell backward until the torso is nearly parallel to the floor and the kettlebell is past the vertical line of the body.
Forward and Upward Movement Phase
When the backward swing reaches its end point, reverse the movement by extending the hips and knees to move the kettlebell in an upward arc.
Allow momentum to raise the kettlebell to eye level, keeping the elbows extended and the back in a neutral spine position.
Downward and Backward Movement Phase
Allow the kettlebell to drop into the downswing; flex the hips and knees to absorb the weight. Keep the elbows fully extended and the back neutral.
Continue the downward-then-backward movement until the kettlebell passes under then behind the body, then begin the upward movement phase for the next repetition.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris

END

TYPE
Procedure

TITLE
Single-Leg Squat

PAGE
1175-1177

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Note: The single-leg squat is not typically done with a spotter. If spotting is needed, two spotters are used with one on each side of the bar. The positions of the spotters are not pictured in order to show the athlete's position at the various stages of the single-leg squat more clearly.
Starting Position: Athlete
Grasp a barbell with a closed, pronated grip (for dumbbell variation, hold dumbbells with a closed, neutral grip with a dumbbell in each hand).
Stand in front of a bench or box that is approximately knee height with the feet approximately shoulder- to hip-width apart.
Facing away from the bench or box, take a moderate step forward with one leg and place the instep of the back foot on top of the bench or box.
Allow both knees to be slightly flexed, with the torso in a nearly erect position and the shoulders held back and chest up and out.
All repetitions begin from this position.
Starting Position: Two Spotters
The spotters should stand erect at opposite ends of the bar with the feet hip-width apart and the knees slightly flexed.
Hold the hands 2 to 3 inches (5-8 cm) below the end of the bar.
Note: If dumbbells are used, no spotter is needed.
Downward Movement Phase: Athlete
Flex the hip and knee of the forward leg simultaneously to lower the body in a vertical plane while keeping the torso-to-floor angle constant.
Keep the heel of the forward foot flat on the floor and the instep of the back foot on top of the bench or box.
Continue flexing the hip and knee until the front thigh is approximately parallel to the floor.
Downward Movement Phase: Two Spotters
Keep the cupped hands close to but not touching the bar as it descends.
Slightly flex the knees, hips, and torso to keep a neutral spine position when following the bar.
Upward Movement Phase: Athlete
Raise the bar under control by actively extending the forward hip and knee; extend the other hip and knee also to keep the torso-to-floor angle constant.
Maintain a neutral spine position and keep the torso upright.
Keep the forward knee aligned over the forward foot.
Do not flex the torso forward or round the spine.
Continue extending the hip and knee of the forward leg to reach the starting position.
Repeat for the desired number of repetitions and then switch the forward leg.
Upward Movement Phase: Two Spotters
Keep cupped hands close to but not touching the bar as it ascends.
Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris

END

TYPE
Procedure

TITLE
Single-Leg Romanian Deadlift (RDL)

PAGE
1177-1179

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Note: This exercise can be performed with the weight held in the hand of the same side of the body as the support leg (ipsilateral) or in the hand of the opposite side of the body as the support leg (contralateral). The description and the photos describe the contralateral single-leg RDL.
Starting Position
With the right hand, grasp a dumbbell or kettlebell with a closed, pronated grip.
Stand on the left leg (as the support leg) with the hips and shoulders over the left foot.
Hold the dumbbell or kettlebell in front of the right thigh with the right elbow fully extended and the right foot slightly staggered back.
All repetitions begin from this position.
Downward Movement Phase
Allow the left support knee to flex until it reaches a moderately flexed position, and then rigidly hold that position throughout the movement.
Begin the exercise by allowing the torso to flex forward at the hip of the left support leg.
Keep the right shoulder, hip, knee, and ankle in one line as the torso flexes forward.
Keep the back neutral and the right elbow still fully extended.
Lower the dumbbell or kettlebell until the torso and right leg are approximately parallel to the floor.
Upward Movement Phase
Extend the hip of the left support leg to return to the starting position.
Do not hyperextend the torso or flex the elbow holding the dumbbell or kettlebell.
Repeat for the desired number of repetitions and then switch the support leg.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris

END

TYPE
Procedure

TITLE
One-Arm Dumbbell Snatch

PAGE
1179-1181

SECTION
17.5 — Unilateral Training

ORIGINAL TEXT
Starting Position
Straddle a dumbbell and place the feet between hip- and shoulder-width apart with the toes pointed slightly outward.
Squat down with the hips lower than the shoulders; grasp the dumbbell with a closed, pronated grip and the elbow fully extended.
All repetitions begin with the back neutral or slightly arched, scapulae depressed and retracted, and chest held up and out.
The head is in line with the vertebral column or slightly hyperextended and the body's weight balanced between the middle and balls of the feet with feet flat on the floor. The eyes are focused straight ahead or slightly upward. The shoulders of the hand that is holding the dumbbell should be placed over or slightly in front of the dumbbell.
Upward Movement Phase
Begin the exercise by extending the knees, hips, and ankles forcefully to accelerate the dumbbell.
The dumbbell should slide up the thigh or remain very close to the thigh as it accelerates upward.
Keep the elbow of the arm holding the dumbbell fully extended as the knees, hips, and ankles are extending.
Once the knees, hips, and ankles reach full extension, rapidly shrug the shoulder of the arm holding the dumbbell.
As the shoulder reaches its highest elevation, flex the elbow holding the dumbbell and keep it close to the torso.
Keep the arm that is not holding the dumbbell on the opposite hip or held to the side.
Continue pulling the dumbbell as high as possible.
Catch Phase
Pull the body under the dumbbell by rotating the arm and hand holding the dumbbell around then under the dumbbell and by flexing the hips and knees to approximately a quarter-squat position.
Once the arm holding the dumbbell is under the dumbbell, extend the elbow quickly to push the dumbbell up and the body downward under the dumbbell.
Catch the dumbbell in full extension at the same time the body reaches the quarter-squat position.
Keep the arm that is not holding the dumbbell on the opposite hip or held to the side.
After gaining control and balance, stand up to a fully erect position.
Downward Movement Phase
Slowly allow the dumbbell to lower to the shoulder, then the thigh, and finally to the floor between the feet using a squatting movement.
MAJOR MUSCLES INVOLVED
rectus femoris, vastus medialis, vastus lateralis, vastus intermedius, gluteus maximus, semimembranosus, semitendinosus, biceps femoris, deltoids, trapezius

END

