TABLE 8.2  General Exercise Recommendations and Associated Signs and Symptoms of Exercising During Pregnancy

Trimester Exercise recommendations and exercise-related signs and symptoms
First Continue activity at prepregnancy levels and intensities but monitor for adverse signs and symptoms.
Misinterpretation of maximum heart rate, reaching it sooner in pregnancy. Use combined approach of heart rate and perceived exertion to monitor intensity.
Initiate pelvic floor exercises to assist in labor and delivery and help with urinary incontinence.
Increase squatting activities with body weight and loaded to maintain strength and improve labor and delivery.
Increase water intake.
Second (in addition to prior trimesters) Avoid supine positions and exercises; switch to incline, side-lying, or vertical positions.
Continue pelvic floor exercises to assist in labor and delivery and help with urinary incontinence.
Third (in addition to prior trimesters) Modify activity based on signs, symptoms, and maternal comfort.
Continue to monitor for adverse signs and symptoms.
Avoid supine positions and exercises; switch to incline, side-lying, or vertical positions.
Modify activities to decrease discomfort or symptoms of neuropathy.
10 weeks postpartum Pelvic floor exercises (i.e., Kegel exercises) immediately after delivery for at least 12-24 weeks.
Core stabilization exercises immediately after delivery for at least 12-24 weeks.
Gradual return to physical activity and sport-related activities.
Increase water intake.
With Cesarean deliveries, more time may be needed to restore abdominal muscles to prepregnancy strength and stabilization.

Sources: (86a, 89b, 96a, 162a, 186a, 187a)

