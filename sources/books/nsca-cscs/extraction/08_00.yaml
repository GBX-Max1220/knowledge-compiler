Increase in minute ventilation (40%-50%) and V̇O2max Weight gain and increased forces on joints
Increase in ligament laxity
Changes in micro-architecture of bone but not overall bone mass Increase in metabolic rate
Increase in body temperature
Second (in addition to prior trimesters) Increased cardiac output by 40%
Decrease in peripheral vascular resistance by 25%-30%
Increase in blood volume, with steady fall in hemoglobin
Fluid retention and edema
Supine positions decrease venous return to heart, which decreases stroke volume and cardiac output Changes in center of gravity
Increase in loss of balance
Third (in addition to prior trimesters) Slight decrease in cardiac output at term with stroke volume decreasing and heart rate increasing
Peripheral vascular resistance begins to increase from 32 weeks
Blood volume increases 50% of prepregnancy levels with a 50% increase in plasma volume by 34 weeks Increase in lumbar lordosis
Increase in foot size
Increase in compression neuropathies
10 weeks postpartum Most cardiovascular and respiratory changes return to prepregnancy levels within the first 1-2 weeks after delivery Pelvic floor dysfunction
Urinary incontinence
Increase in ligament laxity (may persist up to 5 months after delivery)

