TITLE
Injury Risk Reduction for Female Athletes

PAGE
448

SECTION
Chapter 8 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
To help female athletes reduce their injury risk, strength and conditioning professionals should do the following:
Recommend preparticipation screening by a sports medicine physician. This should include identification of risk factors for injury along with musculoskeletal testing.
Encourage female athletes to participate in a year-round conditioning program that includes resistance, plyometric, speed and agility, and flexibility training. The conditioning program should meet the specific needs of each athlete and should progress in a periodized fashion that allows for training adaptations to continually manifest.
Ensure that females learn, and can repeatedly demonstrate, correct movement mechanics (e.g., jumping, landing, twisting, and cutting) within a variety of environments.
Precede every exercise session with a general dynamic warm-up and a specific warm-up using movements that resemble those involved in the activity and that target the activation of key muscle groups (e.g., posterior chain muscle groups).
Provide augmented feedback within training sessions to optimize skill transfer and enhance biomechanics related to injury.

