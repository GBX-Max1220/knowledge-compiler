Recommend working with appropriate medical staff to provide resources and services as needed when they have identified signs and symptoms of concerns that increase risk of health issues
Encourage females to seek services from a mental health provider when initial symptoms of mental health disorders arise
Educate females on the appropriate amount and quality of sleep needed and the important role it plays in the body's recovery and for decreasing risk of injury
Provide information to females about the variety of impairments that can occur in the pelvic floor and encourage females to seek a specialized physical therapist in PFD when signs and symptoms occur

