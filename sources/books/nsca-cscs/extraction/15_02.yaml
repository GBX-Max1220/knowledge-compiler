TYPE
Definition

TITLE
Hold-relax

PAGE
885

SECTION
15.2 — Mobility Training

ORIGINAL TEXT
The hold-relax technique begins with a passive prestretch that is held at the point of mild discomfort for 10 seconds (figure 15.3). The partner then applies a hip flexion force and instructs the athlete, "Hold and do not let me move the leg." The athlete holds and resists the movement so that an isometric muscle action occurs and is held for 6 seconds (figure 15.4). The athlete then relaxes, and a passive stretch is performed and held for 30 seconds (figure 15.5). The final stretch should be of greater magnitude due to autogenic inhibition (i.e., activation of the hamstrings).

PARENT
Proprioceptive neuromuscular facilitation (PNF)

CHILDREN
None

RELATIONSHIPS
None

END

TYPE
Definition

TITLE
Contract-relax

PAGE
887

SECTION
15.2 — Mobility Training

ORIGINAL TEXT
The contract-relax technique also begins with a passive prestretch of the hamstrings that is held at the point of mild discomfort for 10 seconds (figure 15.6). The athlete then extends the hip against resistance from the partner so that a concentric muscle action through the full ROM occurs (figure 15.7). The athlete then relaxes, and a passive hip flexion stretch is applied and held for 30 seconds (figure 15.8) while the athlete concentrically contracts the agonist. The increased ROM is facilitated due to autogenic inhibition (i.e., activation of the hamstrings).

PARENT
Proprioceptive neuromuscular facilitation (PNF)

CHILDREN
None

RELATIONSHIPS
None

END

TYPE
Definition

TITLE
Hold-relax with agonist contraction

PAGE
887

SECTION
15.2 — Mobility Training

ORIGINAL TEXT
The hold-relax with agonist contraction technique is identical to hold-relax in the first two phases (figures 15.9 and 15.10). During the third phase, a partner applies force to the antagonist muscle groups while the athlete is required to maintain the position through a concentric action of the agonist, thus adding to the stretch force (figure 15.11). Following the isometric hold, the athlete flexes the hip, thereby moving further into the new ROM. With this technique, the final stretch should be greater, primarily because of reciprocal inhibition (i.e., activation of the hip flexors) (63) and secondarily because of autogenic inhibition (i.e., activation of the hamstrings) (63).

PARENT
Proprioceptive neuromuscular facilitation (PNF)

CHILDREN
None

RELATIONSHIPS
None

END

