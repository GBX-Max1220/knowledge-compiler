ORIGINAL TEXT
Effective mobility requires the integration of aspects such as balance coordination, postural control coordination, and perception (19). In this way, mobility automatically frames flexibility as a dynamic quality, with the athlete required to demonstrate control, coordination, and force through any demonstrated ROM, essentially being analogous to dynamic flexibility.

