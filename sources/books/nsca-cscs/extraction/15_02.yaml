TITLE
Static flexibility

PAGE
873

SECTION
15.2 — Mobility Training

ORIGINAL TEXT
Static flexibility refers to the range of possible movement about a joint (28) and its surrounding muscles during a passive movement (40). Static flexibility requires no voluntary muscular activity; an external force such as gravity, a partner, or a machine provides the force for a stretch.

