PAGE
85

SECTION
Cardiovascular Responses — Heart Rate — How Can Athletes Estimate Maximal Heart Rate?

ORIGINAL TEXT
A meta-analysis determined that the equation 208 – 0.7 × age could be used in healthy adults to more accurately predict maximal heart rate (40).

