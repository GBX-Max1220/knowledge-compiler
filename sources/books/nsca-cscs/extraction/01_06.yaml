TITLE
Maximal Heart Rate Estimation Formula

PAGE
85

SECTION
Cardiovascular Responses — Heart Rate — How Can Athletes Estimate Maximal Heart Rate?

ORIGINAL TEXT
A simple estimate of maximal heart rate is to subtract one's age from 220; for example, the estimated maximal heart rate for a 47-year-old person is 220 – 47 (age in years) = 173 beats/min.

END

TYPE
