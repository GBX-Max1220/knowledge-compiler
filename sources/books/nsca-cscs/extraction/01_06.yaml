TYPE
Definition

TITLE
Cardiac Output

PAGE
83

SECTION
Cardiovascular Responses — Cardiac Output

ORIGINAL TEXT
Cardiac output is the amount of blood pumped by the heart in liters per minute and is determined by the quantity of blood ejected with each beat (stroke volume) and the heart’s rate of pumping (heart rate):
Q̇ = Stroke volume × Heart rate (1.1)
where Q̇ is the cardiac output. Stroke volume is measured in milliliters of blood per beat, and heart rate is measured in beats (contractions) per minute (17).

END

TYPE
Definition

TITLE
Stroke Volume

PAGE
83-84

SECTION
Cardiovascular Responses — Stroke Volume

ORIGINAL TEXT
Two physiological mechanisms are responsible for the regulation of stroke volume. The first is a result of the end-diastolic volume, the volume of blood available to be pumped by the left ventricle at the end of the filling phase, or diastole. The second is due to the action of catecholamines, including epinephrine and norepinephrine, which are hormones of the sympathetic nervous system that produce a more forceful ventricular contraction and greater systolic emptying of the heart.

END

TYPE
Definition

TITLE
Frank-Starling Mechanism

PAGE
84

SECTION
Cardiovascular Responses — Stroke Volume

ORIGINAL TEXT
This principle, called the Frank-Starling mechanism, is related to the concept that the force of contraction is a function of the length of the fibers of the muscle wall.

END

TYPE
Definition

TITLE
Ejection Fraction

PAGE
84

SECTION
Cardiovascular Responses — Stroke Volume

ORIGINAL TEXT
This increase in cardiac emptying is characterized by an increase in the ejection fraction, or the fraction of the end-diastolic volume ejected from the heart (14, 17).

END

TYPE
Definition

TITLE
Oxygen Uptake

PAGE
85

SECTION
Cardiovascular Responses — Oxygen Uptake

ORIGINAL TEXT
Oxygen uptake is the amount of oxygen consumed by the body's tissues.

END

TYPE
Definition

TITLE
Maximal Oxygen Uptake

PAGE
85

SECTION
Cardiovascular Responses — Oxygen Uptake

ORIGINAL TEXT
Maximal oxygen uptake is the greatest amount of oxygen that can be used at the cellular level for the entire body.

END

TYPE
Definition

TITLE
Metabolic Equivalent (MET)

PAGE
85

SECTION
Cardiovascular Responses — Oxygen Uptake

ORIGINAL TEXT
Resting oxygen uptake is estimated at 3.5 mL of oxygen per kilogram of body weight per minute (mL · kg−1 · min−1) for an average person; this value is defined as 1 metabolic equivalent (MET).

END

TYPE
Definition

TITLE
Fick Equation

PAGE
85

SECTION
Cardiovascular Responses — Oxygen Uptake

ORIGINAL TEXT
Oxygen uptake (V̇O2) can be calculated with the Fick equation, which expresses the relationship of cardiac output, oxygen uptake, and arteriovenous oxygen difference:
V̇O2 = Q̇ × a-vO2 difference    (1.2)
where Q̇ is the cardiac output in milliliters per minute and a-vO2 difference is the arteriovenous oxygen difference (the difference in the oxygen content between arterial and venous blood) in milliliters of oxygen per 100 mL of blood.

END

TYPE
Definition

TITLE
Arteriovenous Oxygen Difference

PAGE
85

SECTION
Cardiovascular Responses — Oxygen Uptake

ORIGINAL TEXT
a-vO2 difference is the arteriovenous oxygen difference (the difference in the oxygen content between arterial and venous blood) in milliliters of oxygen per 100 mL of blood.

END

TYPE
Definition

TITLE
Systolic Blood Pressure

PAGE
86

SECTION
Cardiovascular Responses — Blood Pressure

ORIGINAL TEXT
Systolic blood pressure estimates the pressure exerted against the arterial walls as blood is forcefully ejected during ventricular contraction (systole) and, when combined with heart rate, can be used to describe the myocardial oxygen consumption (work) of the heart.

END

TYPE
Definition

TITLE
Rate-Pressure Product (Double Product)

PAGE
86

SECTION
Cardiovascular Responses — Blood Pressure

ORIGINAL TEXT
This estimate of the work of the heart is obtained according to the following equation and is referred to as the rate–pressure product, or double product:
Rate–pressure product = Heart rate × Systolic blood pressure    (1.3)

END

TYPE
Definition

TITLE
Diastolic Blood Pressure

PAGE
86

SECTION
Cardiovascular Responses — Blood Pressure

ORIGINAL TEXT
Diastolic blood pressure is used to estimate the pressure exerted against the arterial walls when no blood is being forcefully ejected through the vessels (diastole).

END

TYPE
Definition

TITLE
Mean Arterial Pressure

PAGE
86-87

SECTION
Cardiovascular Responses — Blood Pressure

ORIGINAL TEXT
The mean arterial pressure is the average blood pressure throughout the cardiac cycle (equation 1.4). Mean arterial pressure is not the average of systolic and diastolic pressures, because the arterial pressure usually remains nearer the diastolic level than the systolic level during a greater portion of the cardiac cycle.

END

TYPE
Formula

TITLE
Mean Arterial Blood Pressure Equation

PAGE
87

SECTION
Cardiovascular Responses — Blood Pressure

ORIGINAL TEXT
Mean arterial blood pressure = [(Systolic blood pressure − Diastolic blood pressure) ÷ 3] + Diastolic blood pressure    (1.4)

END

