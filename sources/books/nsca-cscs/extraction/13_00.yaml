measurement— The process of collecting test data (15).

END

TYPE
Definition

TITLE
Evaluation

PAGE
733-734

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
evaluation— The process of analyzing test results for the purpose of making decisions. For example, a strength and conditioning professional examines the results of physical performance tests to determine whether the athlete’s training program is effective in helping achieve the training goals or whether modifications in the program are needed.

END

TYPE
Definition

TITLE
Pretest

PAGE
734

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
pretest— A test administered before the beginning of training to determine the athlete’s initial basic ability levels. A pretest allows the strength and conditioning professional to design the training program in keeping with the athlete’s initial training level and the overall program objectives.

END

TYPE
Definition

TITLE
Midtest

PAGE
734

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
midtest— A test administered one or more times during the training period to assess progress and modify the program as needed to maximize benefit.

END

TYPE
Definition

TITLE
Formative Evaluation

PAGE
734

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
formative evaluation— Periodic reevaluation based on midtests administered during the training, usually at regular intervals (2). It enables monitoring of the athlete’s progress and adjustment of the training program according to the athlete’s individual needs. It also allows evaluation of different training methods and collection of normative data. Regular modification of the training program based on formative evaluation keeps the training program fresh and interesting and helps avoid physical and mental staleness.

END

TYPE
Definition

TITLE
Posttest

PAGE
735

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
posttest— Test administered after the training period to determine the success of the training program in achieving the training objectives.

END

TYPE
Definition

TITLE
Validity

PAGE
735

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Validity refers to the degree to which a test or test item measures what it is supposed to measure and is one of the most important characteristics of testing (2, 25).

END

TYPE
Definition

TITLE
Construct Validity

PAGE
736

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Construct validity is the ability of a test to represent the underlying construct (the theory developed to organize and explain some aspects of existing knowledge and observations). Construct validity refers to overall validity, or the extent to which the test actually measures what it was designed to measure (24).

END

TYPE
Definition

TITLE
Convergent Validity

PAGE
736

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Convergent validity is evidenced by high positive correlations between results of the test being assessed and those of the recognized measure of the construct (the “gold standard”).

END

TYPE
Definition

TITLE
Discriminant Validity

PAGE
736-737

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Discriminant validity is the ability of a test to distinguish between two different constructs and is evidenced by a low correlation between the results of the test and those of tests of a different construct (2).

END

TYPE
Definition

TITLE
Face Validity

PAGE
737

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Face validity is the appearance to the athlete and other casual observers that the test measures what it is purported to measure.

END

TYPE
Definition

TITLE
Content Validity

PAGE
737

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Content validity is the assessment by experts that the testing covers all relevant subtopics or component abilities in appropriate proportions (1).

END

TYPE
Definition

TITLE
Criterion Validity

PAGE
737-738

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Criterion validity is the extent to which test scores are associated with some other measure of the same ability.

END

TYPE
Definition

TITLE
Concurrent Validity

PAGE
738

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Concurrent validity is the extent to which test scores are associated with those of other accepted tests that measure the same ability.

END

TYPE
Definition

TITLE
Predictive Validity

PAGE
738

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Predictive validity is the extent to which the test score corresponds with future behavior or performance.

END

TYPE
Definition

TITLE
Reliability

PAGE
738

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Reliability is a measure of the degree of consistency or repeatability of a test (2, 8).

END

TYPE
Definition

TITLE
Intrasubject Variability

PAGE
739

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Intrasubject variability is a lack of consistent performance by the person being tested.

END

TYPE
Definition

TITLE
Interrater Reliability

PAGE
739

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Interrater reliability, also referred to as objectivity or interrater agreement (2), is the degree to which different raters agree in their test results over time or on repeated occasions; it is a measure of consistency.

END

TYPE
Definition

TITLE
Intrarater Variability

PAGE
741

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Intrarater variability is the lack of consistent scores by a given tester.

END

TYPE
Definition

TITLE
Readiness

PAGE
758

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Athlete readiness has been defined as “the state of being fully prepared to train and perform physically and mentally” (3).

END

TYPE
Recommendation

TITLE
Guidelines for Aerobic Endurance Testing in the Heat

PAGE
753-754

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Follow these guidelines to minimize health risks and obtain accurate results when testing athletes in hot environments (9, 23, 30):
During the weeks before the test, athletes should engage in enough training to establish a baseline of fitness in the activity being tested. Strength and conditioning professionals should be aware that responses to exercise in the heat are highly individual.
Avoid testing under extreme combinations of heat and humidity. Figure 13.2 illustrates the combinations of temperature and humidity at which heat injury risk is present.
Using temperature limits of at least 5 °F (3 °C) below those listed is recommended, especially on sunny days, to provide a safety margin and enable better test performance. On days when the temperature has exceeded or is expected to exceed the recommended limits, indoor facilities should be used if available, or testing should be conducted during morning or early evening hours when temperatures are acceptable.
The athletes, especially those coming from cool climates, should be acclimated to the heat and humidity for at least one week before testing. Start with short workouts and progress to workouts of longer duration.
Athletes should make sure they are well hydrated in the 24-hour period preceding aerobic endurance testing in the heat. A good indication of adequate hydration is a plentiful volume of clear urine (refer to chapter 10 for more detailed preexercise hydration guidelines). Salt tablets should generally be avoided.
Athletes should be encouraged to drink during exercise in the heat. Plain water is most appropriate for exercise up to 1 hour in duration. Snack breaks during longer durations of training can help replenish fluids and be important in replacing electrolytes. The amount and rate of fluid replacement depend on individual sweat rates, duration of exercise, and environment. Refer to chapter 10 for specific guidelines and how to calculate sweat rate if needed.
Athletes should wear a light-colored, loose-fitting tank top and shorts that are breathable (i.e., synthetic porous, moisture-wicking material). Male athletes may be allowed to go shirtless.
Heart rate may be monitored to detect reactions to the heat.
Be attentive to possible symptoms of heatstroke or heat exhaustion: cramps, nausea, dizziness, difficulty in walking or standing, faintness, garbled speech, lack of sweat, red or ashen skin, and goose bumps.
Be aware of the symptoms of hyponatremia or water intoxication, a potentially fatal condition in which excess water intake reduces blood sodium to dangerously low levels. Symptoms may include extremely diluted urine in combination with bloated skin, altered consciousness, or loss of consciousness, with no increase in body temperature. A victim of hyponatremia should never be given fluid and should be treated by a physician.
Proficient medical coverage should be readily available so that an athlete encountering a test-related health problem can be very rapidly treated or evacuated (or both).

END

TYPE
Recommendation

TITLE
Recommended Sequence of Tests

PAGE
756-757

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
A logical sequence, although there are some variations, is to administer tests in this order:
1. Nonfatiguing tests (e.g., height, weight, flexibility, skinfolds and girth measurements, vertical jump)
2. Agility tests (e.g., T-test, 5-10-5 test, 5-0-5 test, Illinois test)
3. Maximum power and strength tests (e.g., 1RM power clean, 1RM squat, 1RM bench press)
4. Sprint tests (e.g., 40 m sprint with split times at 10 m and 20 m)
5. Local muscular endurance tests (e.g., push-up test, partial curl-up, YMCA bench press test)
6. Fatiguing anaerobic capacity tests (e.g., 300-yard [274 m] shuttle, 90 s box hop test)
7. Aerobic capacity tests (e.g., 1.5-mile [2.4 km] run, 12-minute run test, Yo-Yo intermittent recovery test, maximal aerobic speed test, and 30-15 intermittent fitness test)

END

TYPE
Recommendation

TITLE
Rest Periods Between Test Trials

PAGE
756

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
There should be at least 2 minutes of rest between attempts that are not close to the athlete’s maximum and 3 minutes between attempts that are close to the maximum, as judged by the relative difficulty of the previous trial or testing set (21).

END

TYPE
Recommendation

TITLE
Rest Period Between Tests in a Battery

PAGE
756

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
When administering a test battery (e.g., one in which wrestlers perform maximal repetition pull-up and push-up tests for assessment of local muscular endurance), tests should be separated by at least 5 minutes to prevent the effects of fatigue from confounding test results (also see the following section, Sequence of Tests).

END

TYPE
Warning

TITLE
Symptoms Warranting Medical Referral

PAGE
752

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Medical referral may be warranted for an athlete who persistently has any of the following symptoms: chest pressure, pain, or discomfort; listlessness; light-headedness; dizziness; confusion; headache; deeply reddened or cold and clammy skin; irregular pulse; bone or joint pain; blurred vision; nausea; or shortness of breath, rapid pulse, or weakness either not commensurate with the level of exertion or unresponsive to rest.

END

TYPE
Warning

TITLE
Symptoms of Heatstroke or Heat Exhaustion

PAGE
754

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Be attentive to possible symptoms of heatstroke or heat exhaustion: cramps, nausea, dizziness, difficulty in walking or standing, faintness, garbled speech, lack of sweat, red or ashen skin, and goose bumps.

END

TYPE
Warning

TITLE
Symptoms of Hyponatremia

PAGE
754

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Be aware of the symptoms of hyponatremia or water intoxication, a potentially fatal condition in which excess water intake reduces blood sodium to dangerously low levels. Symptoms may include extremely diluted urine in combination with bloated skin, altered consciousness, or loss of consciousness, with no increase in body temperature.

END

TYPE
Threshold

TITLE
Temperature and Humidity Limits for Strenuous Exercise Testing

PAGE
749

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Aerobic endurance performance (29, 35) and intermittent sprint performance (17) may be impaired when the temperature approaches 80 °F (27 °C), especially if the humidity exceeds 50% (20).

END

TYPE
Threshold

TITLE
Altitude Threshold for Aerobic Endurance Test Adjustment

PAGE
750

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Norms on aerobic endurance tests should be adjusted when testing at altitudes exceeding 1,900 feet (579 m).

END

TYPE
Threshold

TITLE
Altitude-Related Decline in Maximal Oxygen Uptake

PAGE
750

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Up to about 9,000 feet (2,743 m), maximal oxygen uptake declines by approximately 5% for each 3,000 feet (914 m) of elevation (25).

END

TYPE
Threshold

TITLE
Acclimation Period for High Altitude Testing

PAGE
750

SECTION
13 — Principles of Test Selection and Administration

ORIGINAL TEXT
Athletes who arrive at a relatively high altitude after living near sea level for an extended period of time should be given at least 10 days to acclimate before undergoing aerobic endurance tests (34).

END

