TYPE
Definition

TITLE
Electrocardiogram

PAGE
72-73

SECTION
— Cardiovascular System — Heart — Electrocardiogram

ORIGINAL TEXT
The electrical activity of the heart can be recorded at the surface of the body; a graphic representation of this activity is called an electrocardiogram (ECG). A normal ECG, seen in figure 1.13, is composed of a P-wave, a QRS complex (the QRS complex is often three separate waves: a Q-wave, an R-wave, and an S-wave), and a T-wave. The P-wave and the QRS complex are recordings of electrical depolarization—that is, the electrical stimulus that leads to mechanical contraction. Depolarization is the reversal of the membrane electrical potential, whereby the normally negative potential inside the membrane becomes slightly positive and the outside becomes slightly negative. The P-wave is generated by the changes in the electrical potential of cardiac muscle cells that depolarize the atria and result in atrial contraction. The QRS complex is generated by the electrical potential that depolarizes the ventricles and results in ventricular contraction. In contrast, the T-wave is caused by the electrical potential generated as the ventricles recover from the state of depolarization; this process, called repolarization, occurs in ventricular muscle shortly after depolarization. Although atrial repolarization occurs as well, its wave formation usually occurs during the time of ventricular depolarization and is thus masked by the QRS complex (41).

CHILDREN
P-wave, QRS complex, T-wave, Depolarization, Repolarization

END