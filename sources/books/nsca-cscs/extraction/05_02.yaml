Definition

TITLE
Cross-Education

PAGE
296

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
Exercising muscle undergoing unilateral resistance training produces increased strength and neural activity in the contralateral resting muscle, a phenomenon known as cross-education (79).

END

TYPE
Definition

TITLE
Bilateral Deficit

PAGE
296

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
In untrained individuals, a bilateral deficit is evident. The force produced when both limbs contract together is lower than the sum of the forces they produce when contracting unilaterally.

END

TYPE
Definition

TITLE
Bilateral Facilitation

PAGE
297

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
In fact, trained or stronger individuals often show a bilateral facilitation effect whereby an increase in voluntary activation of the agonist muscle groups is observed during bilateral contraction (64a).

END

TYPE
Definition

TITLE
Muscle Hypertrophy

PAGE
299

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
Muscle hypertrophy is the term given to the enlargement of muscle fiber cross-sectional area (CSA) following training.

END

TYPE
Definition

TITLE
Hyperplasia

PAGE
302

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
Hyperplasia is the term given to an increase in the number of muscle fibers via longitudinal fiber splitting in response to high-intensity resistance training.

END

TYPE
Definition

TITLE
Pennation Angle

PAGE
306

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
Pennation angle affects the force production capabilities as well as the range of motion of a muscle.

END

TYPE
Definition

TITLE
Exercise-Induced Muscle Damage (EIMD)

PAGE
300

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
Exercise-induced muscle damage (EIMD) and disruption of myofibrils and the uniform structure of muscle fiber sarcomeres following high-intensity anaerobic training (e.g., resistance training) also have a marked effect on muscle growth (35).

END

TYPE
Evidence

TITLE
Strength Increase in Untrained Limb via Cross-Education

PAGE
296

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
A literature review has shown that strength in the untrained limb may increase up to 22%, with an average strength increase of approximately 8% following training periods ranging from 4 to 12 weeks (125).

END

TYPE
Evidence

TITLE
EMG Activity in Untrained Limb During Cross-Education

PAGE
296

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
The increase in strength of the untrained limb is accompanied by greater EMG activity in that limb (154), thereby suggesting that a central neural adaptation accounts for most of the strength gains, considering no change or reduction in the cross-sectional area (CSA) of muscle during the unilateral training period (22, 139).

END

TYPE
Evidence

TITLE
Load Dependency of Cross-Education Effect

PAGE
296

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
The cross-education effect does appear to be load dependent, with untrained limb strength improving when the contralateral trained limb performs higher-load (8RM-12RM) intensities (22).

END

