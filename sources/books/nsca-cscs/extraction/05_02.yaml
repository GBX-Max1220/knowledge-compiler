TITLE
Figure 5.4 — Bone Modeling in Response to Mechanical Loading

PAGE
309

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
FIGURE 5.4 Bone modeling in response to mechanical loading. (a) Application of a longitudinal weight-bearing force causes the bone to bend (as depicted by the dotted line), creating a stimulus for new bone formation at the regions experiencing the greatest deformation. (b) Osteoblasts lay down additional collagen fibers at the site. (c) Previously dormant osteoblasts migrate to the area experiencing the strain. (d) The collagen fibers become mineralized, and the bone diameter effectively increases.

END

