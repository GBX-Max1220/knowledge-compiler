Figure 5.3 — Muscle Fiber Transitions

PAGE
304-305

SECTION
5.2 — Muscular Adaptations

ORIGINAL TEXT
FIGURE 5.3 Muscle fiber transitions occur during training, and these changes are not influenced by sex (17, 158). This means that a shift of the type of myosin adenosine triphosphatase (ATPase) and heavy chains takes place during training. Transformations from IIx to IIax to IIa can be seen, and then small percentages change to IIac and IIc. Exercise activities that recruit motor units with type IIx muscle fibers initiate a shift toward IIa fibers.

END

