TYPE
Definition

TITLE
Adrenal Gland

PAGE
266

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
The adrenal gland is integral to the body’s adaptation to stress, particularly during and after exercise. Structurally, it consists of two main components: the medulla and the cortex, each responding to stress in distinct ways.

END

TYPE
Definition

TITLE
Adrenal Medulla

PAGE
266

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
The adrenal medulla, the inner core of the gland, is directly stimulated by the autonomic nervous system during acute stress. It rapidly secretes catecholamines such as epinephrine and norepinephrine, alongside dopamine and specific enkephalin-containing polypeptides like peptide F, which are implicated in immediate stress responses and immune enhancement (129).

PARENT
Adrenal Gland

END

TYPE
Definition

TITLE
Adrenal Cortex

PAGE
266

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
The adrenal cortex is stimulated by adrenocorticotropic hormone (ACTH) from the anterior pituitary gland to produce and release cortisol.

PARENT
Adrenal Gland

END

TYPE
Definition

TITLE
Cortisol

PAGE
266-267

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Cortisol has critical roles in modulating inflammation and managing metabolic responses to stress. As such, cortisol is regulated on a systemic level by the hypothalamic-pituitary-adrenal (HPA) axis and locally within tissues by enzymes such as 11β-hydroxy-steroid dehydrogenase (11β-HSD) to maintain glucocorticoid balance (25, 27, 99). Cortisol is crucial for sustaining energy during prolonged stress by facilitating glucose availability through selective glucose sparing and mobilization, gluconeogenesis, and fat and protein catabolism.

END

TYPE
Warning

TITLE
Prolonged Cortisol Elevation

PAGE
267

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
However, prolonged elevation of cortisol levels—if not returned to baseline within 24 hours—can adversely affect the body, because cortisol in this context is considered catabolic and anti-anabolic. Sustained high cortisol can impair immune function, affect fat metabolism and deposition, reduce protein synthesis, increase protein degradation, and interfere with anabolic signaling pathways, thereby promoting a catabolic state that can undermine muscle repair and growth (75, 87, 89, 92, 129).

END

TYPE
Definition

TITLE
Catecholamines

PAGE
269-270

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Catecholamines, primarily epinephrine but also including norepinephrine and dopamine, are secreted by the adrenal medulla and play a crucial role in enhancing strength and power during resistance training. These hormones facilitate the fight-or-flight response by acting as central motor stimulators and peripheral vascular dilators, enhancing enzyme activity and calcium release in muscles (89).

END

TYPE
Recommendation

TITLE
To Increase Serum Testosterone Concentrations

PAGE
272

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Serum testosterone concentrations have been shown to increase acutely by using these methods independently or in various combinations:
Large muscle group exercises (e.g., deadlift, power clean, squat)
Heavy resistance (85% to 95% 1RM)
Moderate to high volume of exercise, achieved with multiple sets or multiple exercises
Short rest intervals (30-60 s)

END

TYPE
Recommendation

TITLE
To Increase 22 kD Growth Hormone Concentrations

PAGE
272

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Growth hormone levels have been shown to increase acutely with use of either of these methods or both in combination:
Use workouts with higher lactate concentrations and associated acid–base disruptions; that is, use high intensity (10RM, or heavy resistance) with three sets of each exercise (high total work) and short (1 min) rest periods.
Supplement diet with carbohydrates and protein before and after workouts.

END

TYPE
Recommendation

TITLE
To Optimize Responses of Adrenal Hormones

PAGE
272-273

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Use high volume, large muscle groups, and short rest periods to expose the body to adrenergic stress.
Be careful to vary the training protocol and the rest period length from short to long over time.
Provide days of complete rest, and use lower-volume workouts to allow the adrenal gland to engage in recovery processes to reduce stress on the adrenal medulla so as not to experience adrenergic exhaustion and to reduce stress on the adrenal cortex and prevent chronic cortisol secretions from the adrenal cortex. This way, the stress of the exercises will not result in a nonfunctional overreaching or overtraining.

END

TYPE
Definition

TITLE
Thyroid Hormones

PAGE
274

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Thyroid hormones, particularly triiodothyronine (T3) and thyroxine (T4), play a significant role in both acute and chronic responses to resistance exercise and training.

END

TYPE
Definition

TITLE
Insulin Response to Resistance Exercise

PAGE
275-276

SECTION
4.4 — Muscle Tissue Recruitment

ORIGINAL TEXT
Physiologically, resistance exercise induces an acute increase in insulin sensitivity, which enhances glucose uptake into skeletal muscle, facilitating glycogen synthesis and promoting anabolic processes essential for muscle repair and growth (36, 51).

END

