## Item 1

**TYPE**
Definition

**TITLE**
Bioenergetics

**PAGE**
175

**SECTION**
Essential Terminology

**ORIGINAL TEXT**
Bioenergetics, or the flow of energy in a biological system, concerns primarily the conversion of macronutrients—carbohydrate, protein, and fats, which contain chemical energy—into biologically usable forms of energy.

**END**

