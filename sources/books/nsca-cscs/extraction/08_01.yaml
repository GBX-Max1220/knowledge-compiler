PAGE
444

SECTION
8.1 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
Modify activity based on signs, symptoms, and maternal comfort. Continue to monitor for adverse signs and symptoms. Avoid supine positions and exercises; switch to incline, side-lying, or vertical positions. Modify activities to decrease discomfort or symptoms of neuropathy.

END

TYPE
Recommendation

TITLE
General Exercise Recommendations During Pregnancy — 10 Weeks Postpartum

PAGE
444

SECTION
8.1 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
Pelvic floor exercises (i.e., Kegel exercises) immediately after delivery for at least 12-24 weeks. Core stabilization exercises immediately after delivery for at least 12-24 weeks. Gradual return to physical activity and sport-related activities. Increase water intake. With Cesarean deliveries, more time may be needed to restore abdominal muscles to prepregnancy strength and stabilization.

END

TYPE
Recommendation

TITLE
How Female Athletes Can Reduce Their Injury Risk

PAGE
448

SECTION
8.1 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
To help female athletes reduce their injury risk, strength and conditioning professionals should do the following: Recommend preparticipation screening by a sports medicine physician. This should include identification of risk factors for injury along with musculoskeletal testing. Encourage female athletes to participate in a year-round conditioning program that includes resistance, plyometric, speed and agility, and flexibility training. The conditioning program should meet the specific needs of each athlete and should progress in a periodized fashion that allows for training adaptations to continually manifest. Ensure that females learn, and can repeatedly demonstrate, correct movement mechanics (e.g., jumping, landing, twisting, and cutting) within a variety of environments. Precede every exercise session with a general dynamic warm-up and a specific warm-up using movements that resemble those involved in the activity and that target the activation of key muscle groups (e.g., posterior chain muscle groups). Provide augmented feedback within training sessions to optimize skill transfer and enhance biomechanics related to injury.

END

TYPE
Recommendation

TITLE
How Females Can Improve Their Health Outcomes

PAGE
450

SECTION
8.1 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
To help females improve their health outcomes, strength and conditioning professionals should do the following: Recommend working with appropriate medical staff to provide resources and services as needed when they have identified signs and symptoms of concerns that increase risk of health issues. Encourage females to seek services from a mental health provider when initial symptoms of mental health disorders arise. Educate females on the appropriate amount and quality of sleep needed and the important role it plays in the body's recovery and for decreasing risk of injury. Provide information to females about the variety of impairments that can occur in the pelvic floor and encourage females to seek a specialized physical therapist in PFD when signs and symptoms occur.

END

