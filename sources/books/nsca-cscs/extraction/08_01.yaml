TITLE
Risk Factors for ACL Injury in Female Athletes

PAGE
445

SECTION
8.1 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
Anatomical factors, such as femoral notch size reducing tensile strength, greater tibial slope increasing strain, and ligament laxity (45, 74, 98, 163), may contribute to heightened ACL injury risk in females. However, it is believed that the most significant contributing factor is a neuromuscular deficiency, which ultimately leads to abnormal biomechanics such as increased dynamic knee valgus upon contact with the ground (128). Therefore, sociocultural factors such as motor development experience, training opportunities and resources, gendered development, and sex inequality in sporting opportunities (27, 130, 142) should be examined as causal for the higher ACL injury risk for female athletes.

END

