TITLE
General Exercise Recommendations During Pregnancy — First Trimester

PAGE
443

SECTION
8.1 — Sex-Related Differences and Their Implications for Resistance Training

ORIGINAL TEXT
Continue activity at prepregnancy levels and intensities but monitor for adverse signs and symptoms. Misinterpretation of maximum heart rate, reaching it sooner in pregnancy. Use combined approach of heart rate and perceived exertion to monitor intensity. Initiate pelvic floor exercises to assist in labor and delivery and help with urinary incontinence. Increase squatting activities with body weight and loaded to maintain strength and improve labor and delivery. Increase water intake.

END

