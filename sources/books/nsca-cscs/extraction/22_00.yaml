TITLE
Peak Performance Duration

PAGE
1581

SECTION
Chapter 22 — Periodization — Central Concepts Related to Periodization

ORIGINAL TEXT
Ultimately, peak performance can be optimized only for short periods of time (7-14 days), and the average time it can be maintained is inversely related to the average intensity of the training plan (35, 36).

END

TYPE
Evidence

TITLE
Fatigue Dissipation Rate

PAGE
1585

SECTION
Chapter 22 — Periodization — Central Concepts Related to Periodization — Fitness–Fatigue Paradigm

ORIGINAL TEXT
An important thing to remember is that fatigue dissipates at a rate two-thirds faster than fitness, thus allowing preparedness to become elevated if appropriate training strategies are used to retain fitness while reducing fatigue (35, 38, 41).

END

