TYPE
Definition

TITLE
Periodization

PAGE
1579-1580

SECTION
Chapter 22 — Periodization

ORIGINAL TEXT
Periodization is the logical and systematic process of sequencing and integrating training interventions in order to manage the training process and to increase the potential of achieving peak performance at appropriate time points.

END

TYPE
Definition

TITLE
General Adaptation Syndrome (GAS)

PAGE
1582

SECTION
Chapter 22 — Periodization — Central Concepts Related to Periodization — The General Adaptation Syndrome

ORIGINAL TEXT
In the 1930s, Hans Selye, a pioneering researcher on the biological effects of exposure to stressful stimuli, presented the basic concepts of the GAS in which a three-stage response to stress (alarm, resistance, and exhaustion) was presented.

END

TYPE
Definition

TITLE
Stimulus–Fatigue–Recovery–Adaptation Theory

PAGE
1583

SECTION
Chapter 22 — Periodization — Central Concepts Related to Periodization — Stimulus–Fatigue–Recovery–Adaptation Theory

ORIGINAL TEXT
The stimulus–fatigue–recovery–adaptation theory is an extension of the GAS and suggests that training stimuli produce a general response that is influenced by the overall magnitude of the training stressor.

END

TYPE
Definition

TITLE
Fitness–Fatigue Paradigm

PAGE
1585

SECTION
Chapter 22 — Periodization — Central Concepts Related to Periodization — Fitness–Fatigue Paradigm

ORIGINAL TEXT
In 1995, Zatsiorsky (106) presented the classic explanation of these relationships as the two-factor model, more commonly referred to as the fitness–fatigue paradigm.

END

TYPE
Definition

TITLE
Parallel Training Models

PAGE
1589

SECTION
Chapter 22 — Periodization — Models of Periodization — Parallel Training Models

ORIGINAL TEXT
The parallel training models, as shown in figure 22.5, involve targeting all training factors simultaneously within one training session, training day, series of training days, or a microcycle.

END

TYPE
Definition

TITLE
Sequential Training Models

PAGE
1589

SECTION
Chapter 22 — Periodization — Models of Periodization — Sequential Training Models

ORIGINAL TEXT
Sequential training models, as shown in figure 22.5, were created to address the limitations associated with the parallel model of training, such as the inability to simultaneously develop multiple motor and technical abilities, the need for longer preparation periods, and the inability to accommodate dense competitive schedules.

END

TYPE
Definition

TITLE
Emphasis Training Models

PAGE
1590

SECTION
Chapter 22 — Periodization — Models of Periodization — Emphasis Training Models

ORIGINAL TEXT
Emphasis training models, as shown in figure 22.5, contain aspects of both parallel and sequential models of periodization.

END

TYPE
Definition

TITLE
Preparatory Period

PAGE
1594

SECTION
Chapter 22 — Periodization — Periodization Periods — Preparatory Period

ORIGINAL TEXT
The preparatory period occurs when there are no competitions, and technical, tactical, or sport-specific work is limited. This period often corresponds to what is termed the off-season.

END

TYPE
Definition

TITLE
Hypertrophy or Strength–Endurance Phase

PAGE
1595

SECTION
Chapter 22 — Periodization — Periodization Periods — Preparatory Period — Hypertrophy or Strength–Endurance Phase

ORIGINAL TEXT
The hypertrophy phase, which is also referred to as the strength–endurance phase, generally occurs during the early portion of the preparatory period (i.e., the general preparatory phase).

END

TYPE
Threshold

TITLE
Hypertrophy or Strength–Endurance Phase Intensity and Volume

PAGE
1596

SECTION
Chapter 22 — Periodization — Periodization Periods — Preparatory Period — Hypertrophy or Strength–Endurance Phase

ORIGINAL TEXT
The hypertrophy or strength–endurance phase involves low to moderate intensity (50%-75% of the 1RM) and high volumes (3 to 6 sets of 8-20 repetitions).

END

TYPE
Definition

TITLE
Basic Strength Phase

PAGE
1597

SECTION
Chapter 22 — Periodization — Periodization Periods — Preparatory Period — Basic Strength Phase

ORIGINAL TEXT
In the later portion of the preparatory period, during the specific preparatory phase, the primary aim of the basic strength phase is to increase the strength of the muscles that are essential to the primary sport movements.

END

TYPE
Threshold

TITLE
Basic Strength Phase Intensity and Volume

PAGE
1597

SECTION
Chapter 22 — Periodization — Periodization Periods — Preparatory Period — Basic Strength Phase

ORIGINAL TEXT
The basic strength phase involves higher intensity (80%-95% of the 1RM) and moderate to high volumes (2 to 6 sets of 2 to 6 repetitions).

END

TYPE
Definition

TITLE
First Transition Period

PAGE
1597

SECTION
Chapter 22 — Periodization — Periodization Periods — First Transition Period

ORIGINAL TEXT
The first transition period is a link between the preparatory and competitive periods.

END

TYPE
Definition

TITLE
Strength/Power Phase

PAGE
1597

SECTION
Chapter 22 — Periodization — Periodization Periods — First Transition Period

ORIGINAL TEXT
The main phase within the first transition period is the strength/power phase.

END

TYPE
Threshold

TITLE
Strength/Power Phase Intensity and Volume

PAGE
1598

SECTION
Chapter 22 — Periodization — Periodization Periods — First Transition Period

ORIGINAL TEXT
The strength/power phase involves low to very high loads (30%-95% of the 1RM, depending on the exercise) and low volumes (2 to 5 sets for 2 to 5 repetitions).

END

TYPE
Definition

TITLE
Competitive Period

PAGE
1598

SECTION
Chapter 22 — Periodization — Periodization Periods — Competitive Period

ORIGINAL TEXT
The central training target during the competitive period is preparing the athlete for competition by further increasing strength and power via additional increases in training intensity while decreasing volume.

END

TYPE
Definition

TITLE
Peaking

PAGE
1598

SECTION
Chapter 22 — Periodization — Periodization Periods — Competitive Period

ORIGINAL TEXT
Peaking programs attempt to place the athlete in peak condition for about one or two weeks.

END

TYPE
Definition

TITLE
Maintenance

PAGE
1598

SECTION
Chapter 22 — Periodization — Periodization Periods — Competitive Period

ORIGINAL TEXT
For team sports, this period spans an entire season and may last for many months, requiring the use of a maintenance program.

END

TYPE
Threshold

TITLE
Competitive Period Peaking Intensity and Volume

PAGE
1599

SECTION
Chapter 22 — Periodization — Periodization Periods — Competitive Period

ORIGINAL TEXT
The competitive period includes peaking and maintenance. For peaking, athletes use very high to low intensities (50% to ≥93% of the 1RM) and very low volume (1 to 3 sets of 1 to 3 repetitions) for one to two weeks. For maintenance, athletes modulate training between moderate and high intensities (85%-93% of the 1RM) with moderate volumes (about 2 to 5 sets of 3 to 6 repetitions).

END

TYPE
Definition

TITLE
Second Transition Period (Active Rest)

PAGE
1599

SECTION
Chapter 22 — Periodization — Periodization Periods — Second Transition Period (Active Rest)

ORIGINAL TEXT
Between the competitive season and the next annual training plan or the preparatory period of a macrocycle, a second transition period is often used to create a linkage.

END

TYPE
Recommendation

TITLE
Second Transition Period Duration

PAGE
1599

SECTION
Chapter 22 — Periodization — Periodization Periods — Second Transition Period (Active Rest)

ORIGINAL TEXT
Therefore, it is generally recommended that the second transition period last no longer than four weeks unless an athlete requires additional time to recover from an injury.

END

TYPE
Definition

TITLE
Macrocycle

PAGE
1591

SECTION
Chapter 22 — Periodization — Periodization Hierarchy

ORIGINAL TEXT
Macrocycle: Several months to a year. It contains preparatory, competitive, and transitional periods of training. If it encompasses one year, some authors refer to this as an annual plan.

END

TYPE
Definition

TITLE
Mesocycle

PAGE
1591

SECTION
Chapter 22 — Periodization — Periodization Hierarchy

ORIGINAL TEXT
Mesocycle: 2-6 weeks. This medium-sized training cycle is sometimes called a block of training. It consists of microcycles that are linked together. The most common duration is 4 weeks.

END

TYPE
Definition

TITLE
Microcycle

PAGE
1591

SECTION
Chapter 22 — Periodization — Periodization Hierarchy

ORIGINAL TEXT
Microcycle: Several days to 2 weeks. This small-sized training cycle is comprised of multiple workouts. It can range from several days to 2 weeks in duration; the most common duration is 1 week (7 days).

END

TYPE
Definition

TITLE
Off-Season

PAGE
1601

SECTION
Chapter 22 — Periodization — Applying Sport Seasons to the Periodization Periods — Off-Season

ORIGINAL TEXT
The off-season should be considered the preparatory period; it typically lasts from the end of the postseason to the beginning of the preseason, which can be about six weeks before the first major competition (although this varies greatly).

END

TYPE
Definition

TITLE
Preseason

PAGE
1602

SECTION
Chapter 22 — Periodization — Applying Sport Seasons to the Periodization Periods — Preseason

ORIGINAL TEXT
After the completion of the off-season, the preseason is used to lead into the first major competition. The first transition period is often undertaken at this time with a focus on the strength/power phase of resistance training.

END

TYPE
Definition

TITLE
In-Season

PAGE
1602

SECTION
Chapter 22 — Periodization — Applying Sport Seasons to the Periodization Periods — In-Season

ORIGINAL TEXT
The competitive, or in-season, period contains all the contests scheduled for the given year, including any tournament games.

END

TYPE
Definition

TITLE
Postseason

PAGE
1603

SECTION
Chapter 22 — Periodization — Applying Sport Seasons to the Periodization Periods — Postseason

ORIGINAL TEXT
After the final contest, the postseason or second transition period provides the athlete with a relative or active rest before the beginning of the next year's off-season or preparatory period.

END

TYPE
Definition

TITLE
Daily Undulating Periodization

PAGE
1604

SECTION
Chapter 22 — Periodization — Undulating Versus Linear Periodization Models

ORIGINAL TEXT
Alternatively, this model is sometimes described as an undulating or daily undulating periodization model because it involves larger daily (i.e., within the microcycle) fluctuations in the load and volume (e.g., repetitions and volume-load) of the assigned core resistance training exercise.

END

TYPE
Definition

TITLE
Traditional Periodization Model

PAGE
1604

SECTION
Chapter 22 — Periodization — Undulating Versus Linear Periodization Models

ORIGINAL TEXT
These modifications are in contrast to what occurs with the traditional periodization model, falsely referred to as the linear periodization model, according to which the athlete performs the same number of sets and repetitions across the training days and varies the training load.

END

TYPE
Table

TITLE
Table 22.1 — Interrelationship of Periodization, Planning, and Programming

PAGE
1588

SECTION
Chapter 22 — Periodization — Periodization and Planning the Training Process

ORIGINAL TEXT
TABLE 22.1  Interrelationship of Periodization, Planning, and Programming

Management level | Structure | General description | Specific description
Macro-management | Periodization | The bird's-eye overview of the program direction and goals of the training process; typically depicted as the annual or multiyear training plan | Uses the competitive schedule to create the scaffold from which training is planned and implemented
Macro-management | Planning | Provides the model of periodization used to guide the training process and programmatic decisions | Applies a training model: parallel, sequential, or emphasis model
Macro-management | Programming | Defines the structure of the actual training interventions (modes and methods) | Structures the training plan and provides the modes and methods used to create the training program
Micro-management

