TITLE
Karvonen Method — Target Heart Rate Calculation

PAGE
1527

SECTION
Chapter 21: Program Design and Technique for Aerobic Endurance and Metabolic Training — Designing an Aerobic Endurance Program

ORIGINAL TEXT
Karvonen Method
Formula
Age-predicted maximum heart rate (APMHR) = 220 - age
Heart rate reserve (HRR) = APMHR - resting heart rate (RHR)
Target heart rate (THR) = (HRR × exercise intensity) + RHR
To determine the target heart rate range (THRR), calculate THR using both the prescribed minimum and maximum intensity values.

END

