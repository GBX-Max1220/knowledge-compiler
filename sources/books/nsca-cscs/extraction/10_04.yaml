TYPE
Definition

TITLE
Water-Soluble Vitamins

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Water-soluble vitamins, including the B vitamins and vitamin C, dissolve in water and are transported in the blood. With the exception of vitamin B12, which is stored in the liver for years, water-soluble vitamins are not stored in appreciable amounts in the body; instead the body uses what is needed and then excretes the remaining amounts in urine (165).

END

TYPE
Definition

TITLE
Fat-Soluble Vitamins

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Vitamins A, D, E, and K are fat soluble and therefore carried by fat in the blood and stored in fat tissue in the body (109).

END

TYPE
Warning

TITLE
Excess Preformed Vitamin A Toxicity

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Excess preformed vitamin A (not beta carotene, alpha carotene, or beta crypto xanthin, which are converted into vitamin A in the body) is toxic and associated with significant adverse effects including liver damage, intracranial pressure (pseudotumor cerebri), dizziness, nausea, headaches, skin irritation, pain in joints and bones, coma, and even death (23). Excess vitamin A intake can occur through diet but typically results from high levels of vitamin A in supplements (72, 109).

END

TYPE
Warning

TITLE
Excess Vitamin D Toxicity

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Toxic levels of vitamin D can lead to heart arrhythmias and increased levels of blood calcium, which can cause blood vessel and tissue calcification, as well as damage to the heart, blood vessels, and kidneys (109).

END

TYPE
Warning

TITLE
Excess Vitamin E and Hemorrhagic Stroke Risk

PAGE
579-580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Vitamin E acts as an anticoagulant and therefore thins the blood. Regular intake of excessive amounts of vitamin E can lead to high serum vitamin E levels, which is associated with increased risk of hemorrhagic stroke, particularly in individuals on blood thinners (125).

END

TYPE
Warning

TITLE
Excess Vitamin K Interference with Anticlotting Medications

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Because vitamin K helps blood clot, excess intake of this vitamin can interfere with the effects of some anticlotting medications such as warfarin (Coumadin) (94).

END

TYPE
Definition

TITLE
Antioxidants

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Antioxidants are substances that modify cell-signaling pathways and counteract oxidative stress-induced cell damage caused by reactive oxygen and nitrogen species (free radicals).

END

TYPE
Definition

TITLE
Free Radicals

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Free radicals are both beneficial and harmful to human health.

END

TYPE
Warning

TITLE
Oxidative Stress from Free Radical Overproduction

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
An overproduction of, or overexposure to, free radicals combined with a deficiency in antioxidants can result in oxidative stress and subsequent damage to cellular lipids, proteins, and DNA (71, 166).

END

TYPE
Definition

TITLE
Dietary Reference Intake (DRI)

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Dietary Reference Intake (DRI): A set of nutrient recommendations that include the values Recommended Dietary Allowance (RDA), Adequate Intake (AI), Estimated Average Requirement (EAR), and the Tolerable Upper Level Intake (UL).

END

TYPE
Definition

TITLE
Tolerable Upper Level Intake (UL)

PAGE
579

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Tolerable Upper Level Intake (UL): The highest daily intake of a nutrient that is likely to not pose a risk of adverse health effects in most of the general population.

END

TYPE
Evidence

TITLE
Vitamin D Deficiency Prevalence in Adults Over 19

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
According to the Scientific Report of the 2020 Dietary Guidelines Advisory Committee, more than 90 percent of men and women over 19 years of age do not consume enough vitamin D (56, 154).

END

TYPE
Recommendation

TITLE
Dietary Sources for Vitamin D

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Eating a diet containing seafood, and choosing foods that are fortified with vitamin D, including milk, fortified soy beverages, fortified soy yogurt, and some whole-grain cereals, can help adults meet their needs for vitamin D.

END

TYPE
Recommendation

TITLE
Vitamin D Supplementation for Deficiency Prevention

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
As such, vitamin D supplementation may be necessary for many individuals to prevent deficiency.

END

TYPE
Evidence

TITLE
Vitamin D Supplementation Effect on Muscular Strength and Power

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
A meta-analysis of 11 randomized control trials and 436 athletes showed that vitamin D supplementation only had a small or trivial effect on upper and lower body muscular strength or power (150).

END

TYPE
Evidence

TITLE
Adequate Vitamin D for Athletes: Stress Fractures and Illness

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Despite lack of a notable performance effect, adequate vitamin D levels may be important for athletes to protect against stress fractures and acute illness (35, 39, 91).

END

TYPE
Definition

TITLE
Minerals

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Minerals contribute to the structure of bone, teeth, and nails; are a component of enzymes; and perform a wide variety of metabolic functions.

END

TYPE
Definition

TITLE
Major Minerals

PAGE
580

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Calcium; phosphorus; magnesium; iron; and the electrolytes sodium, potassium, and chloride are often called the major minerals.

END

TYPE
Definition

TITLE
Iron

PAGE
585

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Iron is essential for both the functioning and synthesis of hemoglobin, a protein that transfers oxygen throughout the body (158). In addition, iron is a component of the protein myoglobin, which transports oxygen to muscles (63). This mineral plays important roles in growth, development, cell functioning, and the synthesis and functioning of some hormones (30, 160).

END

TYPE
Evidence

TITLE
Iron Deficiency Prevalence in American Females

PAGE
585

SECTION
10.4 — Vitamins

ORIGINAL TEXT
The National Health and Nutrition Examination Survey (NHANES) from 2015-16 found that approximately 11% of American females aged 12 to 49 had iron deficiency, with the goal to reduce that level to 7.2% (99).

END

TYPE
Evidence

TITLE
Iron Deficiency in Female Athletes

PAGE
585

SECTION
10.4 — Vitamins

ORIGINAL TEXT
(In studies examining iron deficiency in female athletes, more than 25% tested positive for iron deficiency [65, 102].)

END

TYPE
Definition

TITLE
Stages of Iron Deficiency

PAGE
585

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Iron deficiency occurs in three stages (in order of severity): depletion, marginal deficiency, and anemia (90, 117).

CHILDREN
Iron Depletion, Marginal Iron Deficiency, Iron Deficiency Anemia

END

TYPE
Definition

TITLE
Iron Deficiency Anemia

PAGE
585

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Iron deficiency anemia develops when low iron stores persist for a period of time and the body cannot make enough healthy red blood cells to deliver oxygen throughout the body (158).

PARENT
Stages of Iron Deficiency

END

TYPE
Warning

TITLE
Symptoms of Iron Deficiency and Iron Deficiency Anemia

PAGE
585-586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Symptoms of iron deficiency or iron deficiency anemia may include weakness, fatigue, irritability, poor concentration, headache, decreased exercise capacity, hair loss, and dry mouth (15). Other symptoms associated with iron deficiency anemia include feeling cold often, inflamed tongue (glossitis), shortness of breath during routine activities, and pica (the desire to eat nonfood substances such as laundry starch, dirt, clay, and ice) (52).

END

TYPE
Evidence

TITLE
Iron Deficiency and Mental Health

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Iron deficiency has also been shown to negatively affect mental health and contribute to depression (30, 99).

END

TYPE
Risk Factor

TITLE
Risk Factors for Iron Deficiency Anemia

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Women of childbearing age, teenage girls, pregnant women, infants, and toddlers have the greatest need for iron and therefore an increased risk of becoming deficient. In addition, distance runners, vegetarian athletes, female athletes, those who lose a significant amount of blood during their menstrual cycle, people who take excessive amounts of antacids, and people with certain digestive diseases such as celiac disease have an increased risk of developing iron deficiency anemia (72).

END

TYPE
Definition

TITLE
Heme Iron

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Heme iron, derived from hemoglobin, is found in foods that originally contained hemoglobin and myoglobin— animal foods including red meats, fish, and poultry.

END

TYPE
Definition

TITLE
Nonheme Iron

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Nonheme iron is the form of iron found in all other, non-meat foods including vegetables, grains, and iron-fortified breakfast cereal.

END

TYPE
Threshold

TITLE
Heme Iron Absorption Rate

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Approximately 15% to 35% of the heme iron consumed is actually absorbed (112).

END

TYPE
Threshold

TITLE
Nonheme Iron Absorption Rate

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Only 2% to 20% of nonheme iron is absorbed (160).

END

TYPE
Recommendation

TITLE
Enhancing Nonheme Iron Absorption

PAGE
586

SECTION
10.4 — Vitamins

ORIGINAL TEXT
A person can increase the amount of nonheme iron absorbed by consuming vitamin C–rich foods or beverages at the same time or consuming a nonheme source at the same time heme iron is consumed.

END

TYPE
Recommendation

TITLE
Iron Supplement Form

PAGE
587

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Ferrous iron has a high bioavailability and is most recommended; it is often paired with vitamin C, which enhances iron absorption (157).

END

TYPE
Recommendation

TITLE
Iron Supplement Timing

PAGE
587

SECTION
10.4 — Vitamins

ORIGINAL TEXT
It is recommended to take iron supplements on an empty stomach, at least an hour before meals, because many foods, drinks, and other dietary supplements can interfere with iron absorption.

END

TYPE
Warning

TITLE
Substances That Impair Iron Absorption

PAGE
587

SECTION
10.4 — Vitamins

ORIGINAL TEXT
For example, whole grains, coffee, black tea, red wine, and hot chocolate can impair iron absorption. Additionally, both calcium and supplemental magnesium may interfere with iron absorption (169).

END

TYPE
Recommendation

TITLE
Medical Supervision for Iron Supplementation

PAGE
587

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Because of the many factors affecting iron intake and absorption, including intake of other minerals the athlete may not be consuming in adequate quantities, only a medical doctor or registered dietitian should recommend iron supplements and how to take an iron supplement for maximum absorption and minimal stomach upset (157).

END

TYPE
Definition

TITLE
Calcium

PAGE
587-588

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Adequate calcium intake throughout childhood and adolescence is essential for the development of strong bones. Calcium helps bones grow in length and density during adolescence, with up to 90% of peak bone mineral density occurring during late adolescence (61). In adults, calcium helps maintain bone density. When dietary calcium intake falls short, calcium is pulled from its storage site in bone to meet the demands of the body and keep calcium concentrations in the blood, muscle, and intercellular fluids constant. Calcium is essential for attaining peak bone mass, and calcium deficiencies can impair the attainment of peak bone mineral density and increase risk of fracture later in life (109). Calcium also keeps teeth strong, helps regulate muscle contraction, and plays a role in nerve functioning, blood vessel expansion and contraction, and hormone and enzyme secretion (109).

END

TYPE
Evidence

TITLE
Calcium Intake in Females

PAGE
588

SECTION
10.4 — Vitamins

ORIGINAL TEXT
The NHANES found that just 15% of 9- to 13-year-old females and less than 10% of females aged 14 to 18 and over the age of 51 met the adequate intake (AI) for calcium from diet alone (11).

END

TYPE
Recommendation

TITLE
Calcium Intake for Athletes

PAGE
588

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Therefore, athletes should be encouraged to include dairy products and other calcium-rich foods in their diets. The athlete's medical doctor or registered dietitian may suggest a calcium supplement if calcium needs cannot be met through diet alone.

END

TYPE
Definition

TITLE
Nutrient Density

PAGE
589

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Though there is no standardized definition of the term nutrient density, in general, choosing nutrient-dense foods means looking for foods based on the nutrients such as vitamins, minerals, and fiber, as well as the healthy plant-based compounds that they provide, whereas caloric density refers to the caloric content of a food.

END

TYPE
Definition

TITLE
Caloric Density

PAGE
589

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Caloric density refers to the caloric content of a food.

END

TYPE
Definition

TITLE
Water in the Human Body

PAGE
589-590

SECTION
10.4 — Vitamins

ORIGINAL TEXT
Water is the largest component of the body, representing 45% to 75% of a person's body weight (75). In the human body, water acts as a lubricant, shock absorber, building material, and solvent. Additionally, water is essential for body temperature regulation (water loss through sweat helps cool off skin, particularly in hot environments and during exercise), nutrient transport and waste product removal, and maintaining fluid balance and therefore normal blood pressure (81).

END

TYPE
Warning

TITLE
Consequences of Hypohydration in Athletes

PAGE
590

SECTION
10.4 — Vitamins

ORIGINAL TEXT
While maintaining adequate hydration is important for all individuals, athletes must pay close attention to their hydration status since sweat losses that exceed fluid intake can quickly lead to a hypohydrated state with a subsequent increase in core body temperature, decrease in blood plasma volume, and increase in heart rate and perceived exertion (32, 139).

END

TYPE
Risk Factor

TITLE
Risk Factors for Dehydration and Heat Stress

PAGE
590

SECTION
10.4 — Vitamins

ORIGINAL TEXT
In addition, athletes with less training may be more prone to heat stress than trained athletes (32). Due to physiological changes that alter water conservation in the body as well as age-related decline in fluid intake, the elderly have an increased risk of dehydration and hypohydration (32). Children may have a greater risk of dehydration as well, resulting from increased heat gain from the environment due to greater surface area–body mass ratio compared to adults, increased heat production during exercise, decreased ability to dissipate heat through sweat, and a decreased sensation of thirst compared to adults (12, 46).

END

