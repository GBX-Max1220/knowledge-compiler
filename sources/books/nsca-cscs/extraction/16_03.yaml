TYPE
Procedure

TITLE
Step-Up Exercise Technique

PAGE
1031-1034

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Note: The box used should be 12 to 18 inches (30-46 cm) high, or high enough to create a 90-degree angle at the knee joint when the foot is on the box. To allow an optimal view of the exercise technique, a rack is not shown in the photos.

Starting Position: Athlete
Grasp the bar with a closed, pronated grip.
Step under the bar and position the feet parallel to each other.
Place the bar in a balanced position on the upper back and shoulders above the posterior deltoids at the base of the neck (using a handgrip only slightly wider than shoulder width).
Lift the elbows up to create a shelf for the bar using the upper back and shoulder muscles.
Hold the chest up and out.
Tilt the head slightly up.
Once in position, signal the spotter for assistance in moving the bar off the supports.
Extend the hips and knees to lift the bar.
Move to a spot near the front of the box.
All repetitions begin from this position.

Starting Position: Spotter
Stand erect and very close to the athlete (but do not distract the athlete).
Place the feet shoulder-width apart with the knees slightly flexed.
At the athlete's signal, assist with lifting and balancing the bar as it is moved out of the rack.
Move in unison with the athlete as the athlete moves to the starting position.
Once the athlete is in position, get into a hip-width stance with the knees slightly flexed and the torso erect.
Stay in a ready position with hips and knees slightly flexed, and assist only if necessary to keep the athlete balanced.

Upward Movement Phase: Athlete
Step up with one leg (the lead leg) to place the entire foot on the top of the box.
Keep the torso erect; do not lean forward.
Keep the trailing foot in the starting position, but shift the body weight to the lead leg.
Forcefully extend the lead hip and knee to move the body to a standing position on top of the box.
Do not push off or hop up with the trailing leg or foot.
At the highest position, stand erect and pause before beginning the downward movement phase.

Upward Movement Phase: Spotter
Take a small step forward with the lead leg as the athlete steps up on the box.
As the athlete reaches the highest position, bring the trailing leg forward to be next to the lead leg.
Stay in a ready position with hips and knees flexed, and assist only when necessary to keep the athlete balanced.

Downward Movement Phase: Athlete
Shift the body weight to the same lead leg.
Step off the box with the same trailing leg.
Maintain an erect torso position.
Place the trailing foot on the floor the same distance from the box as the starting position.
When the trailing foot is in full contact with the floor, shift the body weight to the trailing leg.
Step off the box with the lead leg.
Bring the lead foot back to a position next to the trailing foot.
Stand erect in the starting position, pause, and then alternate lead legs for the next repetition.
At the end of the set, step toward the rack and place the bar in the supports.

Downward Movement Phase: Spotter
Take a small step backward with the same trailing leg as the athlete steps back down to the floor.
As the athlete steps off the box with the lead leg, take a step backward with the same lead leg.
Keep the hands near the athlete's hips, waist, or torso.
Stand erect in the starting position and pause to wait for the athlete.
Assist only if necessary to keep the athlete balanced.
At the end of the set, help the athlete rack the bar.

END

TYPE
Procedure

TITLE
Good Morning Exercise Technique

PAGE
1035-1036

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Note: To allow an optimal view of the exercise technique, a rack is not shown in the photos.

Starting Position
Grasp the bar with a closed, pronated grip.
Step under the bar and position the feet parallel to each other.
Place the bar in a balanced position on the upper back and shoulders above the posterior deltoids at the base of the neck (using a handgrip only slightly wider than shoulder width).
Lift the elbows up to create a shelf for the bar using the upper back and shoulder muscles.
Hold the chest up and out.
Tilt the head slightly up.
Position the feet shoulder-width apart (or wider), even with each other, with the toes pointed slightly outward.
Extend the hips and knees to lift the bar off the supports.
Take two or three steps backward.
All repetitions begin from this position.

Downward Movement Phase
Begin the exercise by slowly permitting the hips to flex. The buttocks should move straight back during the descent.
Maintain a neutral spine and high elbow position; do not round the upper back during the descent.
Keep the knees slightly flexed and the feet flat on the floor during the descent.
Continue the downward movement until the torso is approximately parallel to the floor.

Upward Movement Phase
Raise the bar by extending the hips.
Keep the back neutral and the knees slightly flexed during the ascent.
Continue extending the hips to reach the starting position.
At the end of the set, step toward the rack and place the bar in the supports.

END

TYPE
Procedure

TITLE
Deadlift Exercise Technique

PAGE
1037-1039

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Stand with the feet flat and placed between hip- and shoulder-width apart with the toes pointed slightly outward.
Squat down with the hips lower than the shoulders (farther than shown in the first photo and video clip), and grasp the bar with a closed, pronated grip. If the load is too heavy to hold the bar with a pronated grip, change to a closed, alternated grip.
Place the hands on the bar slightly wider than shoulder-width apart, outside of the knees, with the elbows fully extended.
Place the feet flat on the floor and position the bar approximately 1 inch (3 cm) in front of the shins and over the balls of the feet.
Position the body with the
back neutral or slightly arched,
scapulae depressed and retracted,
chest held up and out,
head in line with the vertebral column or slightly hyperextended,
heels in contact with the floor,
shoulders over or slightly in front of the bar, and
eyes focused straight ahead or slightly upward.
All repetitions begin from this position.

Upward Movement Phase
Lift the bar off the floor by extending the hips and knees.
Keep the torso-to-floor angle constant; do not let the hips rise before the shoulders.
Maintain a neutral spine position.
Keep the elbows fully extended and the shoulders over or slightly ahead of the bar.
As the bar is raised, keep it as close to the shins as possible.
As the bar rises just above the knees, keep the shoulders over the bar and extend the hips to keep the bar close to the body.
Continue to extend the hips and knees until the body reaches a fully erect torso position.

Downward Movement Phase
Allow the hips and knees to flex to slowly lower the bar to the floor.
Maintain the neutral spine position; do not flex the torso forward.

END

TYPE
Procedure

TITLE
Stiff-Leg Deadlift Exercise Technique

PAGE
1039-1041

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
After performing the deadlift exercise to lift the bar off the floor, slightly to moderately flex the knees and keep them in this position throughout this exercise.
All repetitions begin from this position.

Downward Movement Phase
Begin the exercise by forming a neutral spine, then flex at the hips to lower the bar slowly, and under full control, toward the floor.
Keep the knees in the same slightly or moderately flexed position with the back neutral or slightly arched and the elbows fully extended during the descent.
Lower the bar until the plates touch the floor; the back cannot move out of the neutral position, the knees fully extend, or the heels rise off of the floor.

Upward Movement Phase
Extend at the hips to return to the standing starting position.
Keep the knees slightly flexed and the torso in a neutral spine position.
Do not jerk the torso backward or flex the elbows.

END

TYPE
Procedure

TITLE
Romanian Deadlift (RDL) Exercise Technique

PAGE
1041-1043

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Place the hands on the bar in a closed, pronated position using either a clean or snatch grip.
After performing the deadlift exercise to lift the bar off the floor, slightly to moderately flex the knees and keep them in this position throughout this exercise. (Note: The knees should be slightly more flexed than shown in the video.)
All repetitions begin from this position.

Downward Movement Phase
Begin the exercise by flexing the hips and pushing them backward, allowing the torso to move forward, keeping the bar in contact with the thighs.
Keep the knees slightly flexed as the hips flex.
Maintain a rigid torso, neutral spine, and keep the shoulders retracted until the barbell is aligned with the patella tendon and the torso is parallel to floor. (Note: If using a snatch grip with this exercise, the torso will be slightly below parallel, depending on the athlete's anthropometrics.)
Keep a normal lordotic position throughout the movement.

Upward Movement Phase
Extend the hips, raising the torso back to the starting standing position.
Keep the knees slightly flexed and the torso in a neutral spine position.
Make sure the barbell maintains contact with the thighs throughout the movement.
Do not hyperextend the back or flex the elbows.

END

TYPE
Procedure

TITLE
Leg (Knee) Extension (Machine) Exercise Technique

PAGE
1043-1045

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Sit down in the machine and press the back firmly against the back pad.
Place the feet behind and in contact with the roller pad.
Position the legs parallel to each other.
Align the knees with the axis of the machine. If necessary, adjust the back pad or the roller pad to position the legs correctly.
Grasp the handles or the sides of the seat.
All repetitions begin from this position.

Upward Movement Phase
Raise the roller pad by fully extending the knees.
Keep the torso erect and the back firmly pressed against the back pad.
Keep the thighs, lower legs, and feet parallel to each other.
Maintain a tight grip on the handles or the sides of the seat.
Do not forcefully lock out the knees.

Downward Movement Phase
Allow the knees to slowly flex back to the starting position.
Keep the torso erect and the back firmly pressed against the back pad.
Keep the thighs, lower legs, and feet parallel to each other.
Do not allow the buttocks to lift off the seat.
Maintain a tight grip on the handles or the sides of the seat.

END

TYPE
Procedure

TITLE
Seated Leg (Knee) Curl (Machine) Exercise Technique

PAGE
1045-1047

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Sit down in the machine and press the back firmly against the back pad.
Place the ankles on top of and in contact with the roller pad.
Position the legs parallel to each other.
Align the knees with the axis of the machine. If necessary, adjust the back pad to position the legs correctly.
Grasp the handles or the sides of the seat.
All repetitions begin from this position.

Downward Movement Phase
Curl the roller pad below the seat by fully flexing the knees.
Keep the torso stationary and the hips and torso firmly pressed against the pads.
Do not allow the hips or low back to lift off the pads.
Maintain a tight grip on the handles or the sides of the seat.

Upward Movement Phase
Allow the knees to slowly extend back to the starting position.
Keep the torso stationary and the hips and low back firmly pressed against the pads.
Maintain a tight grip on the handles or the sides of the seat.
Do not forcefully lock out the knees.

END

TYPE
Procedure

TITLE
Shoulder Press (Machine) Exercise Technique

PAGE
1047-1049

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Sit down and lean back to place the body in the five-point body contact position.
Grasp the handles with a closed, pronated grip.
Align the handles with the top of the shoulders. If necessary, adjust the seat height to position the handles correctly.

Upward Movement Phase
Push the handles upward until the elbows are fully extended.
Maintain the five-point body contact position.
Do not arch the lower back or forcefully lock out the elbows.

Downward Movement Phase
Allow the elbows to slowly flex to lower the handles to the starting position.
Maintain the five-point body contact position.

END

TYPE
Procedure

TITLE
Seated Barbell Shoulder Press Exercise Technique

PAGE
1049-1052

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
This exercise can also be performed with two dumbbells, using a closed, pronated grip. When using dumbbells, the spotter assists by spotting the athlete's forearms near the wrists instead of the bar.

Starting Position: Athlete
Sit down on a vertical shoulder press bench and lean back to place the body in the five-point body contact position.
Grasp the bar with a closed, pronated grip.
Grip should be slightly wider than shoulder width.
Signal the spotter for assistance in moving the bar off the supports.
Press the bar over the head until the elbows are fully extended.
All repetitions begin from this position.

Starting Position: Spotter
Stand erect behind the bench with the feet shoulder-width apart and the knees slightly flexed.
Grasp the bar with a closed, alternated grip inside the athlete's hands.
At the athlete's signal, assist with moving the bar off the supports.
Guide the bar to a position over the athlete's head.
Release the bar smoothly.

Downward Movement Phase: Athlete
Allow the elbows to slowly flex to lower the bar.
Keep the wrists stiff and the forearms parallel to each other.
Extend the neck slightly to allow the bar to pass by the face as it is lowered to touch the clavicles and anterior deltoids.
Maintain the five-point body contact position.

Downward Movement Phase: Spotter
Keep the hands in the alternated grip position close to—but not touching—the bar as it descends.
Keep the knees slightly flexed and the back neutral when following the bar.

Upward Movement Phase: Athlete
Push the bar upward until the elbows are fully extended.
Extend the neck slightly to allow the bar to pass by the face as it is raised.
Keep the wrists stiff and the forearms parallel to each other.
Maintain the five-point body contact position.
Do not arch the back or rise off the seat.
At the end of the set, signal the spotter for assistance in racking the bar.
Keep a grip on the bar until it is racked.

Upward Movement Phase: Spotter
Keep the hands in the alternated grip position close to—but not touching—the bar as it ascends.
Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.
At the athlete's signal after the set is completed, grasp the bar with an alternated grip inside the athlete's hands.
Guide the bar back onto the supports.
Keep a grip on the bar until it is racked.

END

TYPE
Procedure

TITLE
Upright Row Exercise Technique

PAGE
1052-1053

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Grasp the bar with a closed, pronated grip approximately shoulder-width apart or slightly wider.
Stand erect with feet shoulder-width apart, knees slightly flexed.
Rest the bar on the front of the thighs with the elbows fully extended and pointing out to the sides.

Upward Movement Phase
Pull the bar up along the abdomen and chest toward the chin.
Keep the elbows pointed out to the sides as the bar brushes against the body.
Keep the torso and knees in the same position.
Do not rise up on the toes or swing the bar upward.
At the highest bar position, the elbows should be level with or slightly higher than the shoulders and wrists.

Downward Movement Phase
Allow the bar to slowly descend back to the starting position.
Keep the torso and knees in the same position.

END

TYPE
Procedure

TITLE
Lateral Shoulder Raise Exercise Technique

PAGE
1053-1055

SECTION
16.3 — Exercise Technique Guidelines

ORIGINAL TEXT
Starting Position
Grasp two dumbbells with a closed, neutral grip.
Position the feet shoulder- or hip-width apart, with the knees slightly flexed, torso erect, shoulders back, and eyes focused ahead.
Move the dumbbells to the front of the thighs, positioning them with the palms facing each other.
Slightly flex the elbows and hold this flexed position throughout the exercise. (Note: The elbows should be slightly more flexed than what is seen in the photos.)

Upward Movement Phase
Raise the dumbbells up and out to the sides; the elbows and upper arms should rise together ahead of the forearms, hands, and dumbbells.
Maintain an erect upper body position with the knees slightly flexed and feet flat.
Do not jerk the body or swing the dumbbells upward.
Continue raising the dumbbells until the arms are approximately parallel to the floor or nearly level with the shoulders.

Downward Movement Phase
Allow the dumbbells to descend slowly back to the starting position.
Keep the torso and knees in the same position.

END

