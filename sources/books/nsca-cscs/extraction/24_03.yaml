TITLE
Physiological Testing for Overtraining Syndrome

PAGE
1708-1709

SECTION
24.3 — Nonfunctional Overreaching

ORIGINAL TEXT
Although the strength and conditioning professional does not typically order medical or laboratory tests to monitor the health of his or her athletes and the risk of overtraining, it is helpful to know what types of tests are available and what information they provide. Numerous types of medical and physiological tests have been used to help combat the onset of overtraining syndrome. In general, the meaningfulness of these tests has been equivocal, dependent on the subjects being studied, the training program being performed, and the sport being monitored. A detailed description of all the tests possible is beyond the scope of this chapter, but the reader is welcome to examine some of the following references to get an idea of what is available (9, 10, 19, 34, 36, 37, 39, 40, 45, 50, 54-57, 59, 65, 72, 78-81, 84, 88, 89, 98, 104, 113, 123, 124, 126, 131, 138). In general, numerous potentially helpful variables can be assessed from the blood (e.g., hormones and neurohormones, interleukins, cytokines, markers of muscle disruption or damage, immune factors), cardiovascular measures (e.g., resting heart rate, heart rate variability, oxygen uptake, muscle oxygen saturation), skeletal muscle measures (e.g., heat shock proteins, cell-signaling pathways, receptors), neuromuscular measures (e.g., motor unit recruitment or EMG activity), and orthopedic factors (e.g., joint inflammation or inhibitory input). Data of this type can help the researcher and the practitioner better understand the effects of overtraining and perhaps eventually provide reliable biomarkers of a developing overtraining syndrome.

