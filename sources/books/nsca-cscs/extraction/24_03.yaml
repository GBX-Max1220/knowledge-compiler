TITLE
Athlete Monitoring Program Requirements

PAGE
1706

SECTION
24.3 — Nonfunctional Overreaching

ORIGINAL TEXT
Ideally, a carefully designed athlete monitoring program is developed to determine the training and recovery capabilities of each individual. Qualities of the tests included in this program must be specific to the training being performed or the physiological system involved (i.e., valid), reliable (i.e., capable of providing consistent results), sensitive to the training and competition stimulus, and easy to incorporate into the regular athlete monitoring program. Furthermore, those administering the tests must precisely follow correct protocols and must ensure that each person performing the tests provides a maximal effort. If the tests are not administered correctly, the data acquired will be meaningless. Once the tests are performed, an efficient data management system must be used to help best interpret the results rapidly and correctly. Rapid turnaround of test results is important to permit adjustments in the training program when needed.

