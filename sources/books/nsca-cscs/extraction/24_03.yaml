ORIGINAL TEXT
In general, when overtraining in the weight room, speed (e.g., sprinting) is most sensitive to overtraining and decreases before most other variables. This is closely followed by decreases in power (force × velocity), with maximal strength consistently being one of the last performances to decrease.

