TITLE
Physiological Mechanisms Associated with Overreaching and Overtraining

PAGE
1705-1706

SECTION
24.3 — Nonfunctional Overreaching

ORIGINAL TEXT
As discussed earlier, not all forms of overtraining and the resulting overtraining syndrome are identical. Furthermore, the symptoms and physiological responses can also be quite different depending on the individual and the characteristics of the training program. However, a number of physiological systems have either been shown or theorized to be affected by overtraining. It should be noted that although these mechanisms can be the result of an overtraining stimulus, it is also possible that if these conditions are preexisting, they can also contribute to an overtraining syndrome and be considered part of the allostatic load. Understanding the underlying physiology can, in some cases, provide insight on preventive strategies to help minimize the risk of developing overtraining syndrome and the accompanying impairments in performance. Table 24.2 provides example references for each of the proposed mechanisms, as well as the strength of the data supporting each.

