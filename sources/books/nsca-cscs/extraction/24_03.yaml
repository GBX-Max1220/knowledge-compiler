ORIGINAL TEXT
We will see that even though overtraining and overreaching can be contributors to underperformance, many other factors can contribute as well. Many may be beyond our control, but recognizing possible contributing factors will permit the strength and conditioning professional to determine what appropriate measures can be taken to help the athlete when, despite all the effort, he or she comes up short. In summary, not all cases of underperformance are due to overtraining or overreaching (figure 24.11).

