Recommendation

TITLE
Multiple sets for intermediate and advanced athletes

PAGE
1247

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
many studies indicate that higher volumes are necessary to promote further gains in strength, especially for intermediate and advanced resistance-trained athletes (126, 177, 182)

END

TYPE
Recommendation

TITLE
Volume progression based on training status

PAGE
1247

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
It is appropriate for an athlete to perform only 1 or 2 sets as a beginner and to add sets as he or she becomes better trained. As the athlete adapts to a consistent and well-designed program, more sets can be added gradually to match the guidelines associated with the given training goal.

END

TYPE
Recommendation

TITLE
2-for-2 rule for load increases

PAGE
1241

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
A conservative method that can be used to increase an athlete's training loads is called the 2-for-2 rule (2). If the athlete can perform 2 or more repetitions over his or her assigned repetition goal for a given exercise in the last set in two consecutive workouts, weight should be added to that exercise for the next training session.

END

TYPE
Warning

TITLE
Limitations of the 2-for-2 rule

PAGE
1241-1242

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
While the 2-for-2 rule may provide strength and conditioning professionals with a tool to progress load in novice athletes, this method may eventually promote training to failure because it does not account for exercise technique, the goals of a given training phase, or relative intensity. ... it is advised that the professionals understand the limitations of the 2-for-2 rule when adjusting the load during training.

END

