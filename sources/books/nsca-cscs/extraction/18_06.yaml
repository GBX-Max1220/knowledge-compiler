TYPE
Definition

TITLE
Volume in running exercise

PAGE
1247

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
In running exercise, the common (rep) volume measure is distance. If an intensity value is known or measured (e.g., running pace, which relates to percent V̇O2max), total metabolic energy cost (which is proportional to mechanical work done) can be calculated. This value is comparable to volume–load in resistance exercise.

END

