TYPE
Definition

TITLE
Volume-load

PAGE
1247

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
Volume–load relates to the total amount of weight lifted in a training session, and a set is a group of repetitions sequentially performed before the athlete stops to rest. Repetition-volume is the total number of repetitions performed during a workout session, and volume–load is the total number of sets multiplied by the number of repetitions per set, then multiplied by the weight lifted per repetition.

END

