SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
One strategy to counterbalance the monotony associated with lifting heavy loads is to alter the loads (%1RMs) for the power and other core exercises so that only one training day each week (e.g., Monday) is a heavy day.

END

TYPE
Recommendation

TITLE
Light day load prescription

PAGE
1241

SECTION
18.6 — Step 6: Volume

ORIGINAL TEXT
Friday may serve as the light day of the week in which 80% of the loads lifted in the power and other core exercises on the heavy day (Monday) are performed with the same number of goal repetitions. Even if the athlete is able to perform more repetitions than the designated goal number, he or she should not do so.

END

