TYPE
Procedure

TITLE
Diaphragmatic Breathing Technique

PAGE
491

SECTION
9.3 — Energy Management: Arousal and Anxiety

ORIGINAL TEXT
Diaphragmatic breathing requires that attention be directed to the abdominal region. It is best to get familiar with this starting from a standing position so that breathing is not inhibited. The athlete should let the arms hang loosely and concentrate on relaxing, particularly in the neck and shoulder region, by first taking a couple of deep breaths. Next, the athlete should relax the abdominal muscles so that they appear flaccid. The initiation of each breath should occur simultaneously with the relaxed protrusion of the abdomen; placing a hand on the abdomen gives feedback to ensure that the abdomen protrudes with the initiation of each breath. With each breath the abdomen should become naturally distended. When this portion of the technique is performed properly, the diaphragm (a muscle at the base of the lungs) contracts and drops, allowing a deeper breath to occur. This is the first stage of taking a maximal inhalation. The entire process of inhalation takes place in three different areas and stages: the lower abdomen, the mid-chest, and finally the upper chest.

END

TYPE
Procedure

TITLE
Progressive Muscle Relaxation (PMR) Procedure

PAGE
491-492

SECTION
9.3 — Energy Management: Arousal and Anxiety

ORIGINAL TEXT
These tensing and relaxing cycles progress from one muscle group to the next until all muscle groups are optimally relaxed. Each cycle involves maximally tensing each muscle for a short period of time (10-15 s), followed by a conscious attempt to relax that muscle completely, before moving on to the next muscle group.

END

TYPE
Procedure

TITLE
Systematic Desensitization Procedure

PAGE
493-494

SECTION
9.3 — Energy Management: Arousal and Anxiety

ORIGINAL TEXT
To practice the technique, an athlete should be reasonably skilled at both PMR and mental imagery. The athlete should construct a hierarchy, or progression, of events and situations that he or she specifically perceives as fearful. For example, a competitive gymnast who suffered a serious injury on the balance beam may list a series of fearful scenes, proceeding from warming up before the event to the actual movement that precipitated the injury. In a relaxed setting the athlete visualizes the first scene and experiences a mild degree of anxiety. At the same time, diaphragmatic breathing, PMR, or another physical relaxation technique is instituted, and a strong relaxation response theoretically should overcome the relatively weak fight-or-flight syndrome. This technique is practiced until the athlete can hold the image clearly while maintaining a relaxed state. The athlete progresses through the hierarchy, experiencing conditioned fear in small, manageable doses that are overcome by the relaxation achieved with the relaxation technique.

END

TYPE
Procedure

TITLE
Imagery Skill Development Procedure

PAGE
495

SECTION
9.3 — Energy Management: Arousal and Anxiety

ORIGINAL TEXT
During the initial stages of using imagery, the athlete may start with a relatively simple, somewhat familiar visual image. This helps successful practice of the technique. As with learning any skill by proceeding from simple to complex, the person starts with static images, such as visualizing a golf ball or mentally examining the visual characteristics of a tennis racket. The vividness or detail of the image should become clearer and clearer with continued practice. After the athlete successfully visualizes a stationary object with vivid detail, he or she may start to move the object or begin to walk around it in the mind, viewing it from a number of different perspectives. For an image such as a basketball, the athlete may attempt to bounce the ball and feel it against the fingertips. In this manner, the athlete increases complexity by controlling the image or moving it with control (e.g., bouncing the ball) and by bringing a multisensory perspective to bear (i.e., using tactile or kinesthetic as well as visual sensation).

END

