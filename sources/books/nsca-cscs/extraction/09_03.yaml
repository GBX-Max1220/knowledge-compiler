TYPE
Definition

TITLE
Sources of Self-Efficacy

PAGE
497

SECTION
9.3 — Energy Management: Arousal and Anxiety

ORIGINAL TEXT
According to Bandura’s theory (4), a person’s self-efficacy is derived from a number of sources: Performance accomplishments—past experiences of success or failure; Vicarious experiences—watching others (modeling); Verbal persuasion—encouragement from self or others; Imaginal experience—using imagery to see oneself perform; Physiological states—perception of arousal as facilitative or debilitative; Emotional states—affect or mood.

END

TYPE
Definition

TITLE
Attentional Styles (Nideffer's Quadrants)

PAGE
488-489

SECTION
9.3 — Energy Management: Arousal and Anxiety

ORIGINAL TEXT
Nideffer (41) formulated an important concept in sport psychology when he theorized that individuals tend to experience shifting categories of attentional styles during performance. These categories are characterized by two dimensions: direction (internal–external) and width (broad–narrow). The first dimension refers to an introspective versus an externally oriented perspective, whereas the second dimension refers to an integrative (expansive) versus a highly selective orientation. These dimensions each occur on overlapping continuums, creating four quadrants of attentional focus: broad external, in which the athlete assesses the situation by looking at the environment and various elements within it; broad internal, in which the athlete processes information and develops a strategy; narrow internal, in which the athlete mentally rehearses the upcoming action; and narrow external, in which the athlete specifically focuses on one or two external cues to generate action.

CHILDREN
Broad External Attentional Focus, Broad Internal Attentional Focus, Narrow Internal Attentional Focus, Narrow External Attentional Focus

END

