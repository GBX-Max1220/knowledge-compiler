TYPE
Evidence

TITLE
Biomechanical Differences in Acceleration Between Sprint and Team-Sport Athletes

PAGE
1469-1470

SECTION
20.4 — Agility Performance

ORIGINAL TEXT
Wild and colleagues (107) examined the first three steps during initial acceleration and observed that sprinters achieved greater step velocities and greater normalized average horizontal external power, and they displayed greater normalized step length and flight length, greater normalized touchdown distance (i.e., foot impact under or behind COM), and greater toe-off distance (i.e., effective push-off behind COM) compared to rugby forwards and backs. Conversely, rugby backs displayed slightly shorter contact times and slightly greater step rates compared to sprinters. From a kinetics perspective for later acceleration at matched velocities (step 8-12 for sprinters and 9-20 for soccer), while no differences were observed in the initial 20% of the stance phase between sprinters and soccer athletes, sprinters produced greater anterior–posterior force across most of the propulsive phase and greater net forces over similar contact times, thus resulting in greater relative net impulse (25). As such, the sprinters achieved greater average horizontal external power, which allowed them to accelerate beyond the velocity plateau of the soccer athletes.

