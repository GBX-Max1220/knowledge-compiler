TABLE 20.12  Monitoring Agility Development

Measure: Completion time; Description: Total time to complete the task; Interpretation: Represents the duration it takes the athlete to get from A to B but can be biased toward athletes with superior linear speed; provides limited information regarding COD ability, technique, or strategy. Can be simply assessed using a stopwatch or ETGs.
Measure: COD deficit; Description: The difference in time between a straight-line sprint and a COD test of equal length; Interpretation: Assessing the COD deficit provides insight into the additional amount of time required by the athlete due to the demands of COD. An example is subtraction of 10 m sprint time from 5-0-5 COD time (a common COD test is 10 m in length). However, COD deficit can be biased toward slower athletes and provides limited information regarding COD ability, technique, or strategy.
Measure: Ground contact time (GCT); Description: The total time the foot is in contact with the ground during the COD (length of the plant phase, main execution plant foot contact); Interpretation: Shorter ground contact times are generally associated with faster COD performance and indicate the athlete is spending less time performing the COD (if the athlete deflects their COM at the same angle). Insight into GCT can establish whether the athlete is improving their COD ability irrespective of total time. GCT can be measured using a built-in force platform, contact mat, or verified using 2D analysis.
Measure: Exit velocity; Description: The horizontal velocity of the athlete during the initial step out of the plant of the COD; Interpretation: Considered the first step of reacceleration from plant foot to foot strike; Unlike the situation for total time, using a high-speed video camera or 3D motion analysis to assess the velocity of the athlete (at the hip or COM) can give a direct measure of the ability to change direction. Improved exit velocity with the same or faster ground contact times implies greater RFD relevant to improving COD ability.
Measure: Entry velocity; Description: Velocity of the athlete before the plant phase; can be measured over several steps or as the last step entering the plant phase of the COD; Interpretation: Entry velocity is a strong determinant of COD completion time, and the ability to enter the COD with high velocity can be advantageous for COD actions. Insight into entry velocity can be used to establish whether any pacing or self-regulatory strategies are adopted. Assessed using the above methods for exit