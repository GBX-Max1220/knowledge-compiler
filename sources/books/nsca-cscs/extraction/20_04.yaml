TABLE 20.6  Mechanical and Perceptual-Cognitive Factors That Can Be Manipulated During Agility Drills

Variable: Mechanical; Factor: Spacing and pitch or court dimensions; Interpretation: Altering the space and pitch or court dimensions will vary the distances traveled and subsequent entry and exit velocities and momentum achieved, and therefore allow athletes to develop agility from lower velocity, intensive scenarios, to higher velocity, extensive scenarios. Additionally, entry velocity regulates intensity and subsequent mechanical loading experienced.
Variable: Mechanical; Factor: Entry and exit velocity momentum; Interpretation: NONE
Variable: Mechanical; Factor: Agility actions and angle of COD; Interpretation: Practitioners can put restrictions on the type of COD action performed or allow athletes to try a range of different COD actions to develop between-skill variability and movement solutions. Additionally, varying the location of end or target zones can allow athletes to develop shallow, moderate, and sharp COD ability to enable them to be proficient in changing direction across a spectrum of angles.
Variable: Mechanical; Factor: Starting position (static or transitional movements); Interpretation: Athletes can begin the drill from different static initiation (e.g., drop step, jab step) and from different transitional movements (i.e., backpedal, crossover running, lateral shuffle) to create drill variability and to increase game representativeness and ability to evade or defend from different locomotor actions.
Variable: Perceptual-cognitive; Factor: Location and number of attackers or defenders; Interpretation: The location of the defenders and attackers can be manipulated. For example, in addition to front-on situations, defenders can be located to the side or behind the attackers. This is pertinent for 360-degree sports in which defenders and attackers can be located in various locations on the pitch or court. The addition of multiple attackers and defenders can increase game representativeness, allowing the opportunity for decoy runs; attacking and defensive transitions and set plays; team communication; and increased chaos, task complexity, cognitive loading, and variability.
Variable: Perceptual-cognitive; Factor: Temporal constraints; Interpretation: Temporal or time constraints can be administered (i.e., athlete has 5 s to achieve the objective) to maintain quality and intensity (and often to replicate the reduced temporal constraints associated in random sports). Work-to-rest ratios can be manipulated for energy system development and to represent peak demands of sports.
Variable: Perceptual-cognitive; Factor: Rules and conditions; Interpretation: Practitioners can be creative and vary the rules (i.e., one-hand or two-hand tags) and put constraints on the attackers or defenders to create variation (i.e., only two evasive actions can be performed before committing to a specific direction within the drill).
Variable: Perceptual-cognitive; Factor: Environment and surfaces; Interpretation: To increase game representativeness, drills should be performed on the sport-specific surface. However, certain sports may play on different surfaces (i.e., grass and artificial turf) with different hardness and frictional properties, and thus these should be considered.
Variable: Perceptual-cognitive; Factor: Generic to sport-specific stimulus (developing representative learning environments); Interpretation: Generic stimuli and sources of information can be used such as auditory commands, generic visual commands, and stimuli such as flashing lights, arrows, and coach- or player-dictated directional commands to increase cognitive loading and increase mechanical loading in a controlled environment. Typically, the timing of stimuli can be controlled as well using specific equipment. However, to increase game representativeness, develop perceptual-cognitive speed, knowledge of situations, memory recall, and anticipation, sport-specific stimuli (i.e., multiple attackers or defenders, inclusion of sport-specific implements and scenarios) can be included to develop movement solutions and transfer to sporting performance. These drills can be developed collaboratively with the skills coach for simultaneous technical and tactical development.
Variable: Perceptual-cognitive; Factor: Task complexity and cognitive loading; Interpretation: To challenge more advanced athletes and to ensure athletes are prepared for the chaotic demands of sport when returning to sports, drills can begin with relatively simple closed and open drills with one or two stimuli and sources of information, before progressing to more chaotic open drills of increased game representativeness with various sources of stimuli and information (i.e., multiple attackers or defenders, inclusion of sport-specific implements and stimuli can be included).

