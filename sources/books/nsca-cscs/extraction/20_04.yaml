Block and emphasis: Block 1; Primary aim: Acceleration development; Training tool and notes: 1. Use incline sprinting to develop proper acceleration mechanics, providing an opportunity to maximize propulsion forces in the initial stages of a sprint. 2. Emphasize low heel recovery; driving the foot down and through the ground; aggressive and complete arm action; neutral head position in line with the spine. Resisted acceleration bounds could be incorporated to emphasize lower limb extension and forceful thigh retraction during late swing.; Load prescription (rest periods between sets) for an example microcycle within each block: Monday: Incline sprints 1 × 3 × 15 m (1.5 min) 1 × 4 × 20 m (2 min); Wednesday: Resisted or sled acceleration bounds (2 min) 1 × 4 × 15 m 1 × 2 × 20 m (2 min); Friday: Incline sprints 1 × 2 × 15 m (1.5 min) 1 × 3 × 20 m (2 min) 1 × 2 × 25 m (2.5 min)
Block and emphasis: Block 2; Primary aim: Long acceleration development; Secondary aim: Improve transition to upright sprinting; Training tool and notes: 1. Introduce flat-ground sprinting from a low starting position or towing mechanism. 2. Promote the correct biomechanics of transition sprinting from acceleration to maximal velocity through the inclusion of acceleration holds.; Load prescription (rest periods between sets) for an example microcycle within each block: Monday: Incline sprints 1 × 3 × 30 m (3 min) 1 × 3 × 40 m (4 min); Wednesday: Push-up starts 1 × 4 × 15 m (2 min) Sled tows 2 × 3 × 20 m (2 min /4 min); Friday: Crouch starts 1 × 4 × 15 m (2 min) Acceleration holds 1 × 3 × 40 m (4 min)
Block and emphasis: Block 3; Primary aim: Introduction to max speed training; Secondary aim: Maintain accelerative ability; Tertiary aim: Exposure to speed–endurance; introduction to special endurance; Training tool and notes: 1. Maintain acceleration abilities through inclusion of short sprints at the beginning of most sessions. 2. Begin exposure to maximum speed training through exercises that use upright sprinting mechanics. 3. Prescribe speed–endurance or special endurance sessions later in the week when effects of summated fatigue may dampen neural drive.; Load prescription (rest periods between sets) for an example microcycle within each block: Monday: Block starts 1 × 2 × 20 m (2.5 min) 1 × 2 × 30 m (3.5 min) Accelerations from crouch stance 1 × 3 × 40 m (5 min); Wednesday: High-stance starts 1 × 3 × 20 m (2.5 min) Fly-ins 1 × 4 × 20 m build/20 m fly (4 min); Friday: Block starts 1 × 4 × 20 m (3 min) Accelerations from crouch stance 1 × 2 × 40 m (5 min) Speed–endurance from two-point stance 1 × 2 × 60 m (5.5 min)
Block and emphasis: Block 4; Primary aim: Enhance maximal speed ability; Secondary aim: Maintain accelerative ability; Tertiary aim: Continued exposure to speed–endurance and special endurance; Training tool and notes: 1. Continue exposure to maximum speed training through longer fly-in zones or race-modeling practices. 2. Maintain acceleration abilities through incorporation of short sprints at the beginning of most sessions. 3. Prescribe speed–endurance or special endurance sessions relevant to the athlete's primary events.; Load prescription (rest periods between sets) for an example microcycle within each block: Monday: Block starts 1 × 2 × 30 m (3.5 min) Acceleration holds 1 × 2 × 40 m (5 min) Fly-float-fly 1 × 4 × 20/20/20 (7 min); Wednesday (technical session): Ankling 2 × 15 m (1 min) A-skip 2 × 20 m (1 min) Ankle dribble 1 × 20 m (1 min) Calf dribble 1 × 20 m (1 min) Knee dribble 1 × 20 m (1 min) Dribble bleed 1 × 30 m Straight-leg bound 2 × 20 m (2 min) Wicket 2 × 30 m (3 min) Wicket with run-off 2 × 30 m + 15 m (4 min) Dribble blend 2 × 2 × 40 m (5 min); Friday: Block starts 1 × 3 × 25 m (3 min) Speed–endurance from two-point stance 1 × 2 × 50 m (6 min) 1 × 2 × 70 m (6.5 min) 1 × 2 × 90 m (7 min)

