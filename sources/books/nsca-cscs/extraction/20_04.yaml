Block and emphasis: Block 1; Primary aim: COD (deceleration capacity—linear); Secondary aim: Maneuverability (body position); Training tools and notes: Braking tasks are eccentric focused; therefore, start with low volumes similar to those used to introduce eccentric tasks (plyometrics). Focus on the athlete staying low; sacrifice speed for positioning, and emphasize optimal deceleration mechanics.; Load prescription for week 1: 2-3 sessions per week; rest period between sets; COD Drill: Decelerations* (5 yd [5 m] start-stop) 1 × 6 (30 s) (Alternate nonpreferred, preferred leg finish braking [split stance] position and bilateral athletic ready position.); Maneuverability Drill: Lateral shuffling @ height or backpedaling 1 × 4 × 11 yd [10 m] (30 s)
Block and emphasis: Block 2; Primary aim: COD (deceleration capacity—lateral); Secondary aim: Maneuverability (transition between modes of COD—shuffle to sprint to shuffle); Training tools and notes: Ensure that the athlete can use body position to effectively brake when oriented both forward and laterally; focus on the athlete absorbing into stop. Expand to a single effort in reaction to generic stimulus. Promote effective application of force into the ground ("pushing the ground away"); watch shank angle and trunk position for visual feedback.; Load prescription for week 1: 2-3 sessions per week; rest periods between sets; COD Drill: Decelerations* (11 yd [10 m] start-stop) 1 × 6 (30 s) as with week 1; use same variations; Decelerations (lateral) 1 × 4 (30 s); Maneuverability Drill: Z-drill (forward) 2 × 4 (30 s; 2 min) (Always alternate start direction: left to right vs. right to left direction); Y-drill using different cutting maneuvers; side-step, crossover, or split-step to develop movement solutions. Ensure exit out of directional change is completed into a rapid deceleration. 3 × 4 (1 min; 3 min) (Generic stimuli could be added later within the block)
Block and emphasis: Block 3; Primary aim: COD (effective deceleration to reacceleration); Secondary aim: Maneuverability (combine effective transition and body positioning); Tertiary aim: Agility (focus on keeping COD performance and body position even in response to a generic stimulus); Training tools and notes: Focus on "braking in" and "exploding out" of the COD. Focus on footwork and keeping low, with steps that promote a "drop and drive" out of the COD. This is used to check the transfer of physical training to a more specific (yet still generic) stimulus. Focus on the "decide and go," checking for athletes to reorient effectively or to move as effectively as they decide.; Load prescription for week 1: 1-2 sessions per week (depending on skills volume); rest period between sets; COD Drill: Modified 5-0-5 drill 2 × 4 (30 s; 2 min) (Alternate plant foot); Maneuverability Drill: T-test 1 × 4 (30 s); Agility: Reactive agility (Y agility drill) 1 × 4 (30 s) (Same direction in response to pointing in a direction); Skills training will also inherently contain sport-specific stimulus training

