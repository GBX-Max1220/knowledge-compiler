TITLE
Table 20.8 — Monitoring Speed Development

PAGE
1471-1473

SECTION
20.4 — Agility Performance

ORIGINAL TEXT
TABLE 20.8  Monitoring Speed Development

Measure: Ground contact time; Description: The total time allotted for a single stance phase.; Interpretation: In general, decreased ground contact times coupled with improved sprint completion times may suggest that an athlete has improved the ability to generate high rates of force in a shorter amount of time. However, an athlete may demonstrate slightly longer ground contact times at the initial stages of the sprint due to acceleration mechanics.
Measure: Step length; Description: The distance between the toe and heel of two consecutive footsteps. Example: centimeters between the heel of the right foot and the heel of the left foot.; Interpretation: Improvements in step length (increases in distance covered) may occur through improved sprint mechanics or posture and ultimately enhanced force output.
Measure: Stride length; Description: The distance between the heel in two consecutive steps of the same foot. Example: meters between the heel of the right foot and the heel of the next ground contact made by the right foot.; Interpretation: Improvements in stride length (increases in distance covered by two successive steps) may occur through improved sprint mechanics or posture, and ultimately enhanced force output.
Measure: Flight time; Description: The duration of time that an athlete is not in contact with the ground. This occurs between the end of one step and the beginning of the subsequent step.; Interpretation: Increases in flight time can be interpreted in two ways: An athlete is producing higher vertical forces over a shorter amount of time, resulting in optimal horizontal displacement of the athlete's mass down the track. An athlete is producing higher forces over a longer amount of time, which may result in unnecessary vertical amplitude of the center of mass.
Measure: Stride angle; Description: The angle at which the foot leaves the track.; Interpretation: The angle of stride may provide the strength and conditioning professional with the ability to determine if the athlete is producing forces at the right moment, which is achieved through proper sprint mechanics. Furthermore, data on the stride angle elucidate what stage of sprint the athlete is attaining (acceleratory, transitory, maximum speed) and may relate to ground contact times.
Measure: Speed; Description: The relationship between steps and the sum of the first step's ground contact time and the flight time leading to the subsequent ground contact. Alternatively, instantaneous speed or velocity can be examined using GPS technology, LiDAR, laser, radar, motorized resistance devices, and 2D and 3D motion capture.; Interpretation: Speed dictates how fast an athlete can move the body mass over a specific distance. Instantaneous speed/velocity at time points/distances can be calculated, facilitating a greater insight into sprint strategy
Measure: Acceleration; Description: The change in speed as determined by the delta of two steps (e.g., right heel to left heel) and the sum of ground contact times and flight times of each step.; Interpretation: Acceleration provides insight into how well the athlete changes speed (increasing velocity in a direction) over a prescribed distance. For most athletes, furthering the length an athlete can accelerate will lead to higher top speed, provided that postural integrity and mechanics are sound.
Measure: Technique; Description: Acceleration and maximum velocity techniques can be objectively quantified (i.e., joint angles) or qualitatively examined and compared to technical models to help improve performance and mitigate injury risk.; Interpretation: Qualitative analysis is relatively simple to perform and only requires filming of sprint technique. High-speed video recording is a common feature of most smartphones and tablets, and athletes' technique can be compared to technical models such as Altis Kinogram or Sprint-Mechanics assessment score (16) to help individualize training.

