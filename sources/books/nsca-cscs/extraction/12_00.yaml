TITLE
Definition of Products That Can Be Sold as Dietary Supplements

PAGE
663

SECTION
Chapter 12: Performance-Enhancing Substances and Methods — Types of Performance-Enhancing Substances

ORIGINAL TEXT
The following points define which products can be sold as dietary supplements in the United States:
A product (other than tobacco) intended to supplement the diet that contains one or more of the following dietary ingredients:
A vitamin
A mineral
An herb or other botanical
An amino acid
A dietary substance for use by humans to supplement the diet by increasing the total dietary intake
A concentrate, metabolite, constituent, extract, or combination of any ingredient listed above
The product must also be labeled as a dietary supplement, such that the label must include the term dietary supplement or equivalent and therefore cannot also be advertised for use as a conventional food or as the sole item within a meal or diet.

CHILDREN
A product (other than tobacco) intended to supplement the diet that contains one or more of the following dietary ingredients: A vitamin; A mineral; An herb or other botanical; An amino acid; A dietary substance for use by humans to supplement the diet by increasing the total dietary intake; A concentrate, metabolite, constituent, extract, or combination of any ingredient listed above; The product must also be labeled as a dietary supplement

RELATIONSHIPS
NONE

END

