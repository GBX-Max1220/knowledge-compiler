ORIGINAL TEXT
β-Hydroxy-β-methylbutyrate is most effective when an adequate training stimulus is provided. For untrained individuals, this does not likely require high-volume training. For trained individuals, a high-intensity, high-volume resistance training program is likely needed for benefits to be realized with HMB supplementation.

