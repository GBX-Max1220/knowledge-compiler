COMMON ERRORS
Lack of coordinated triple extension (hips, knees, and ankle plantarflexion) in the takeoff, reducing the vertical force production
Landing with the trunk leaning too far forward so the appropriate split squat position is not achieved
  7  CYCLED SPLIT SQUAT JUMP
Intensity level: Medium
Direction: Vertical
Starting position: Get into a lunge position with one leg forward (hip and knee joints flexed approximately 90 degrees) and the other behind the midline of the body.
Arm action: Double arm or none
Preparatory movement: Begin with a countermovement.
Upward movement: Explosively jump up, using the arms to assist as needed. While off the ground, switch the position of the legs.
1311
Maximum height and power should be emphasized.
Downward movement: Dorsiflex the ankle of the lead landing leg in preparation for an active flat-foot landing. When landing, maintain the lunge position (opposite leg forward) and immediately repeat the jump. Be sure not to absorb ground reaction force and sink too deep into the lunge, because the SSC may not be able to effectively contribute to subsequent jumps.
COMMON ERRORS
Overemphasizing a quick split rather than vertical drive to create time for the leg switch to occur prior to landing
Landing with the trunk leaning too far forward so the necessary split squat position is not achieved
  8  TUCK HOP
Intensity level: High
Direction: Vertical
1312
Starting position: Get into a comfortable, upright stance on one foot. The non-hopping leg is held in a stationary position with the knee flexed during the exercise.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Explosively hop up. Pull the knee of the hopping leg to the chest, grasp the knee with both hands, and release before landing.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing. Land in the starting position, and immediately repeat the jump using the same leg. Complete a set, then repeat with the opposite leg after a brief rest.
COMMON ERRORS
Lack of vertical height achieved before achieving the tuck position
Poorly coordinated sequencing of the arm action relative to the upward drive from the legs
1313
  9  PIKE JUMP
Intensity level: Medium
Direction: Vertical
Starting position: Get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Explosively jump up. Keeping the legs straight and together, try to lift them to the front and try to touch the toes with the hands.
Downward movement: Land in the starting position, and immediately repeat the jump.
COMMON ERRORS
1314
Overemphasis on bringing the legs forward rather than pushing into the ground to achieve vertical height
Poor landing position due to lack of recovery from the pike
Standing Jumps
  10  VERTICAL JUMP
Intensity level: Low
Direction: Vertical
Starting position: Get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Explosively jump up, using both arms to assist, and reach for a target.
1315
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing. (Note: The second photo does not yet show the feet in the ideal position for landing, because the athlete is still rising.) Land in the starting position, and immediately repeat the action for repetitions.
COMMON ERRORS
Poor sequencing of the forward and upward arm (shoulder) flexion in sequence with lower limb triple extension, which results in a coordination loss of upward momentum
Inappropriately deep countermovement, which increases the amortization phase and therefore the ground contact time between jumps
1316
  11  VERTICAL HOP
Intensity level: Medium
Direction: Vertical
Starting position: Get into a comfortable, upright stance on one foot. The non-jumping leg is held in a stationary position with the knee flexed.
Arm action: Double arm
Preparatory movement: Begin with a countermovement on the hopping leg. Bring the other leg behind the body.
Upward movement: Explosively hop up, driving the non-hopping leg forward and up to assist momentum. Use both arms to assist, and
1317
reach for a target.
Downward movement: Dorsiflex the ankle in preparation for an active flat-foot landing. Land in the starting position, and immediately repeat the action for repetitions. Repeat with the opposite leg after a brief rest.
COMMON ERRORS
Not using the non-hopping leg in a coordinated manner to increase vertical momentum
Not sequencing the arm action with the upward movement of the lower limb so vertical momentum is lost
  12  JUMP OVER BARRIER
Intensity level: Medium
Direction: Horizontal and vertical
Equipment: A barrier such as a cone or hurdle
Starting position: Get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Take off with a full triple extension of hips, knees, and ankles. (Note: The second photo should show the athlete in a tall position to demonstrate full triple extension after takeoff. It also does not yet show the feet in the correct position for landing.) Jump over the barrier with both legs, maximizing the height of the center of mass and using only sufficient hip and knee flexion to clear the barrier. Keep the knees and feet together without lateral deviation.
Downward movement: Dorsiflex the ankles in preparation for a stable flat-foot landing. Land in the starting position and reset. Repeat until the set is complete.
1318
Note: The height of the barrier should be progressively increased (e.g., from a cone to a hurdle to a higher hurdle) as the athlete adapts to the intensity of the drill.
COMMON ERRORS
Hurdle height insufficient to challenge the athlete to maximally push from the ground to achieve an extended position above the hurdle
Inappropriate landing position whereby the athlete lands in an unstable position
  13  STANDING LONG JUMP
Intensity level: Low
Direction: Horizontal
Starting position: Get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
1319
Upward movement: Explosively jump forward and up, using both arms to assist, with a goal of achieving maximal horizontal distance.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing. Land on both feet. Allow recovery time between jumps.
Note: This is typically a single ballistic effort, with several repetitions in a set. However, it can be done as multiple jumps in sequence. Care should be taken so that the forward momentum of the athlete does not cause overrotation in the sagittal plane. Coach the athlete to jump up and out; otherwise the tendency is for too much horizontal momentum for the athlete to control.
COMMON ERRORS
Inefficient takeoff angle, resulting in suboptimal flight distance; the lean should be far enough forward to optimize horizontal propulsion but not so far that the center of mass is too anteriorly located to optimize ground reaction forces
Lack of full extension in the legs and full flexion in the shoulders at takeoff, which reduces the opportunity for ground reaction impulse to be created
1320
Multiple Hops and Jumps
  14  MULTIPLE HORIZONTAL LOW HURDLE JUMP
Intensity level: Medium
Direction: Horizontal and vertical
Starting position: Get into a comfortable upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Jump as far forward as possible and over the first barrier. Coach the athlete to jump "upward and outward" and "get as tall as possible over the hurdle" rather than tuck jump to clear and not extend the body fully.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing. Land in the starting position, and
1321
immediately repeat the jump, optimizing ground contact time to control impulse production.
Note: A low hurdle height should encourage low flight time and lower ground contact time. The exercise can be increased in intensity with a higher hurdle height, but this will typically influence the nature of the ground contact.
COMMON ERRORS
Incorrect hurdle height or a less-than-maximal push from the ground to achieve full extension position when clearing the hurdle
Inappropriate landing mechanics that increase ground contact time in between hurdles
1322
  15  DOUBLE-LEG ZIGZAG JUMP
Intensity level: Medium
Direction: Diagonal
Equipment: Place 8 to 12 hurdles 18 to 24 inches (46-61 cm) apart in a zigzag pattern.
Starting position: Get into a comfortable, upright stance with feet hip-width apart. Stand on the outside of the first hurdle. Elbows should be flexed at 90 degrees and held at the sides of the body.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
1323
Upward movement: Jump from the outside of the first hurdle to the outside of the second hurdle, keeping the hips and shoulders facing the direction of travel.
Downward movement: In flight, dorsiflex the ankles in preparation for an active flat-foot landing. Immediately on landing on the outside of the second hurdle, change direction and jump diagonally over the second hurdle to the outside of the third hurdle. Continue jumping over all the hurdles.
Note: Hurdle height can significantly alter the intensity and in-flight body position of the athlete. The athlete should be as extended as possible to clear the hurdle. (Note: The second photo shows the athlete clearing the hurdle too high relative to the hurdle height and with excessive knee flexion.) Correct execution will result in the hips and knees being as stiff as possible on landing to optimize ground contact. Intensity of the drill can be significantly increased by performing hops with only one leg.
COMMON ERRORS
Not adjusting the body angle coming into a landing to keep the center of mass going in the desired direction of the next jump; this significantly increases ground contact time
Not "attacking the ground" from a dorsiflexed ankle position, which increases ground contact time
1324
  16  LINEAR HOP
Intensity level: Medium
Direction: Horizontal and vertical
Starting position: Get into a comfortable, upright stance on one foot. The non-jumping leg is held in a stationary position with the hip and knee flexed during the exercise.
Arm action: Double arm
Preparatory movement: Begin with a countermovement on the hopping leg. Bring the other leg behind the body.
Upward movement: Explosively hop forward, driving from the hip, knee, and ankle, using both arms and the opposite knee to assist the movement.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing. (Note: The second photo does not yet show the feet in the needed position for landing.) Land in the starting position, use an active flat-foot contact to optimize the ground contact time, and immediately repeat the hop for the desired
1325
number of repetitions. Repeat with the opposite leg after a brief rest.
COMMON ERRORS
Excessive flexion of the hip, knee, and ankle on landing, which unnecessarily increases the amortization phase and ground contact time
Hopping with the weight too far forward in the foot, which reduces ground reaction forces and limits optimal force production to maximize flight distance
  17  MULTIPLE BARRIER HOP
1326
Intensity level: Medium to high
Direction: Horizontal and vertical
Equipment: Two to 10 barriers such as cones or hurdles
Starting position: Facing the first barrier, get into a comfortable, single-leg upright stance with the contralateral hip and knee flexed to 90 degrees.
Arm action: Double arm
Preparatory movement: Begin with a countermovement on the hopping leg. Bring the other leg behind the body.
Upward movement: Explosively hop forward, driving from the hip, knee, and ankle over the first barrier as tall as possible, using necessary hip and knee flexion to clear the barrier.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing in the starting position, and immediately repeat the jump over the second barrier.
Note: Intensity level of this exercise can be increased from medium to high by progressively increasing the height of the barrier (e.g., from a cone to a hurdle). Increasing the intensity of the hop may increase the ground contact time and the amortization phase.
COMMON ERRORS
Incorrect hurdle height or a less-than-maximal push from the ground to achieve full extension position when clearing the hurdle
Inappropriate landing mechanics, which increases ground contact time between hurdles
1327
  18  LATERAL BARRIER JUMP
Intensity level: Medium
Direction: Lateral and vertical
Equipment: A barrier such as a cone or hurdle
Starting position: With the barrier to one side, get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Leaning out of the countermovement in the direction of travel, use a powerful triple extension to jump over the barrier as tall as possible with both legs, using necessary hip and knee flexion to clear the barrier. (Note: The second photo shows the
1328
athlete clearing the hurdle too high relative to the hurdle height and with too much knee flexion.) Keep the hips and shoulders square and the knees and feet together without lateral deviation.
Downward movement: Rotate over the hurdle so the lean is in the direction of the subsequent jump on landing. Dorsiflex the ankles in preparation for an active flat-foot landing on the opposite side of the barrier, and immediately repeat the jump to the starting side. (Note: The third photo does not show the athlete leaning back toward the starting side for the return jump.)
Note: The intensity level of the lateral barrier hop can be increased from medium to high by progressively increasing the height of the barrier or by performing movement with one leg only (i.e., a hop), which is an excellent exercise for aiding direction change capacity in the athlete. By reversing the direction of movement, the ground contact time and the amortization phase of the movement are changed compared to movements in the same direction. This will be influenced further by the height of the hurdle.
COMMON ERRORS
Not maintaining a square hip and shoulder position, so the jump does not stay in the frontal plane
Lack of preparatory lean in both takeoff (center of mass should lean in the direction of travel) and landing (orient the body so that it is leaning back toward the start for the return jump), which increases the ground contact time and reduces the effectiveness of the drill
1329
  19  FOUR-HURDLE HOP
Intensity level: High
Direction: Lateral and vertical
Equipment: Four hurdles: two pairs of hurdles. Each hurdle in the pair is separated by 12 inches (30 cm). Each pair is separated by 18 inches (46 cm).
Starting position: Get into a comfortable, upright stance on the right foot; the line of four hurdles will be to the left. The non-jumping leg is held in a stationary position with the hip and knee flexed during the exercise.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Movements:
1. Lean in the direction of travel.
2. Explosively hop left over the first hurdle with the right foot, using both arms to assist.
3. Dorsiflex the ankles in preparation for an active flat-foot landing.
4. Land on the right foot, and immediately repeat the hop over the next hurdle.
5. Land on the right foot, and immediately repeat the hop over the next two hurdles.
6. Land on the left foot, and immediately hop right over the first hurdle with the left foot, using both arms to assist.
7. Land on the left foot, and immediately repeat the hop over the next three hurdles; finish by landing on the right foot.
COMMON ERRORS
Not reflecting subsequent takeoff direction in the body lean (i.e., the center of mass in the takeoff and the landing before direction change should reflect the direction of travel in the subsequent movement; failure to do so increases the ground contact time and reduces the effectiveness of the drill)
Not increasing ground contact time for both the two-hurdle hop and the change of direction movement, meaning insufficient force is produced in the jump
1331
  20  PROGRESSIVE LATERAL JUMP
Intensity level: High
Direction: Diagonally lateral and vertical
Equipment: String tied at athlete's eye level and loosely secured to the ground at a 45-degree angle to the ground
Starting position: Get into a comfortable, upright stance on one side of the string next to the anchor on the ground.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Movements:
1. Explosively jump diagonally (sideways and forward) over the string using both arms to assist the movement.
2. Dorsiflex the ankles in preparation for an active flat-foot landing.
3. Land on the other side of the string, and immediately repeat the jump diagonally forward. Continue the jumping sequence over the string as it gets progressively higher.
1332
Note: As the string gets higher, the athlete will need a longer ground contact time and more hip and knee flexion to clear the string. Ensure that the anchor on the string enables the string to give way should the athlete make contact with it.
COMMON ERRORS
Changing the orientation of the hips (i.e., rotate in the transverse plane) during takeoff, which increases the ground contact time on the subsequent jump
Not increasing ground contact time and hip and knee flexion through the sequence, meaning insufficient force is produced as the required jump height increases
1333
Bounds
  21  SKIP
Intensity level: Low
Direction: Horizontal and vertical
1334
Starting position: One leg is lifted to approximately 90 degrees of hip and knee flexion with the ankle dorsiflexed.
Arm action: Reciprocal (as one leg is lifted, the opposite arm is lifted)
Preparatory movement: Begin with a countermovement on one leg.
Upward movement: Drive up and forward on one leg. The opposite leg should remain in the starting flexed position until landing.
Downward movement: Land in the starting position on the same leg. Immediately repeat the skip with the opposite leg.
COMMON ERRORS
Rotating at the hip and shoulders during the movement (which should be in the sagittal plane only), detracting from the velocity achieved
Coordination errors in the reciprocal arm and leg action, which detract from the forward momentum achieved
1335
  22  POWER SKIP
Intensity level: Low
Direction: Vertical and horizontal
Starting position: One leg is lifted to approximately 90 degrees of hip and knee flexion with the ankle dorsiflexed.
Arm action: Double arm
Preparatory movement: Begin with a countermovement on one leg.
Upward movement: Drive up and forward on one leg. Move the flexed, non-jumping leg up and into greater hip and knee flexion while jumping. Both arms should be used to assist with the upward movement.
Downward movement: Land in the starting position on the same leg. Immediately repeat the skip with the opposite leg.
Note: Emphasis is on high-quality ground contact and leg drive as athletes determine the effectiveness of the skip. This movement should be more vertical and with a faster ground contact than the higher intensity linear bounding drills listed later in the chapter.
COMMON ERRORS
Not attacking the ground with significant intensity to accelerate the center of mass forward in subsequent takeoff; this influences the subsequent flight phases and landings
Coordination errors in the double-arm action, which detracts from the forward momentum achieved
1336
  23  LATERAL SKIP
Intensity level: Medium
Direction: Vertical and lateral
Starting position: One leg is lifted to approximately 90 degrees of hip and knee flexion with the ankle dorsiflexed. This leg should be opposite to the direction of movement (i.e., if the skip is to the right, the left leg should be raised).
Arm action: Reciprocal (as one leg is lifted, the opposite arm is lifted)
Preparatory movement: Drive the lifted leg forcefully toward the ground and away from the direction of movement so that it contacts the ground outside of the base of support.
Upward movement: The lateral drive of the downward leg will cause the body to move up and sideways away from the foot contact. As this happens, the other leg should flex at the hip and knee in flight. The drive leg typically takes a small adjustment step to aid stability and rhythm in the action.
1337
Downward movement: Land in the starting position on the same leg. Immediately repeat the skip, continuing the lateral movement for a number of repetitions or over a given distance, then use the opposite leg.
COMMON ERRORS
Not contacting the ground with sufficient lateral distance from the hip to cause sideways momentum to occur
Not controlling rotations at the hip and shoulders during the movement, which detracts from the lateral velocity achieved
1338
  24  LINEAR BOUND
Intensity level: Medium
Direction: Horizontal and vertical
Starting position: Get into a comfortable, upright stance with feet hip-width apart.
Arm action: Single arm
1339
Preparatory movement: Jog at a comfortable pace; begin the drill with the left foot forward.
Upward movement: Push off with the left foot as it contacts the ground. During push-off, bring the right leg forward by flexing the thigh to a position approximately parallel with the ground and the knee at 90 degrees, with the ankle stiff and dorsiflexed.
During this flight phase of the drill, reach forward with the left arm.
Downward movement: Attack the ground with an active flat-foot contact. Land on the right leg, and immediately repeat the sequence on the opposite side.
Note: A linear bound is an exaggeration of the running gait; the goal is to cover as great a distance as possible during each stride.
COMMON ERRORS
Not achieving sufficient horizontal velocity to initiate the driving action of the bound
Not achieving sufficient height with the lead leg in the flight phase to attack the ground with enough force to accelerate the athlete forward
Overreaching with the lead leg and then not driving down under the hips

