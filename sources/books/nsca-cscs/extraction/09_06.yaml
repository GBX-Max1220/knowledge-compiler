TYPE
Definition

TITLE
Whole Practice

PAGE
524

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Whole practice addresses the skill in its entirety, whereas part practice separates the skill into a series of subcomponents.

CHILDREN
Part Practice

END

TYPE
Definition

TITLE
Part Practice

PAGE
524

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Whole practice addresses the skill in its entirety, whereas part practice separates the skill into a series of subcomponents.

PARENT
Whole Practice

END

TYPE
Definition

TITLE
Segmentation

PAGE
525

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Segmentation breaks down the task into a series of subcomponents that have clear breaks between them (66).

END

TYPE
Definition

TITLE
Fractionalization

PAGE
525

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Fractionalization breaks the tasks into subcomponents that occur simultaneously (66).

END

TYPE
Definition

TITLE
Simplification

PAGE
525

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Simplification adjusts the difficulty of the tasks by changing task characteristics such as the execution speed or the equipment used (66).

END

TYPE
Definition

TITLE
Pure-Part Training (Part–Whole Method)

PAGE
525

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Pure-part training (also known as the part–whole method) has the athlete practice each subcomponent of the skill multiple times independently. After all components have been practiced, the skill is practiced in its entirety (66).

END

TYPE
Definition

TITLE
Progressive-Part Training

PAGE
526

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Progressive-part training has the athlete practice the first two parts in isolation before practicing these parts together (66).

END

TYPE
Definition

TITLE
Repetitive Part Training

PAGE
526

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Repetitive part training has the athlete practice only the first part in isolation; then each subsequent part is added until the whole task is reintegrated (66).

END

TYPE
Definition

TITLE
Random Practice

PAGE
526

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
In random practice, multiple skills are practiced in a random order during a given practice session.

END

TYPE
Definition

TITLE
Variable Practice

PAGE
527

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Variable practice includes variations of the same skill within a single practice session as opposed to specific practice in which a specific skill (i.e., depth jump to second box of a specific height) is repeated multiple times.

END

TYPE
Definition

TITLE
Observational Practice (Action Observation)

PAGE
527

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Observational practice (action observation), or practice through observation of the task or skill to be performed, has important implications for motor skill learning.

END

TYPE
Definition

TITLE
Explicit Instructions

PAGE
528

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Explicit instructions include prescriptive information that gives the athlete the "rules" for effectively executing the given task.

END

TYPE
Definition

TITLE
Guided Discovery

PAGE
528

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Guided discovery provides the athlete with instructions about the overall movement goal and important prompts for task accomplishment without explicitly telling the athlete how to accomplish the task.

END

TYPE
Definition

TITLE
Discovery

PAGE
528

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Discovery instructs the athlete on the overarching goal of the task and the athlete receives little to no direction.

END

TYPE
Definition

TITLE
Intrinsic Feedback

PAGE
529

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Intrinsic feedback is feedback provided to the athlete by the athlete from the senses—for example, sensory information about missing a box during a squat box jump.

END

TYPE
Definition

TITLE
Augmented Feedback

PAGE
529

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Augmented feedback is feedback provided to the athlete by either an observer, such as a coach, or technology, such as video or laboratory equipment.

END

TYPE
Definition

TITLE
Knowledge of Results

PAGE
529

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Knowledge of results provides the athlete with information about the execution of the task goal.

END

TYPE
Definition

TITLE
Knowledge of Performance

PAGE
529

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Knowledge of performance feedback provides the athlete with information about his or her movement pattern.

END

TYPE
Recommendation

TITLE
Regular Communication With All Stakeholders

PAGE
521

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Strength and conditioning professionals should maintain regular communication with all athletic trainers, position coaches, parents (if appropriate), and head coaches.

END

TYPE
Recommendation

TITLE
Specifically Tailored Training Programs

PAGE
521

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
If the time and resources allow it, every effort should be made to customize the training program to accommodate the athlete's current abilities and limitations.

END

TYPE
Recommendation

TITLE
Proper Goal Setting and Acknowledgment of Training Milestones

PAGE
521

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Coaches may consider overlapping appropriate goal-setting techniques with the sports medicine team to encourage and motivate the athlete.

END

TYPE
Recommendation

TITLE
Progressive Integration Into Full-Group or Team Activities

PAGE
522

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Progressively moving from privately scheduled, one-on-one rehabilitation sessions to larger team sessions may be an appropriate tactic to enhance the connection between the athlete and the team.

END

TYPE
Recommendation

TITLE
Improve Self-Efficacy and Motivation

PAGE
522

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Coaches should minimize psychological barriers such as fear or anxiety by providing a psychologically safe and autonomy-supportive environment.

END

TYPE
Recommendation

TITLE
Practice Schedule — Whole Versus Part Practice

PAGE
524

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
As a general rule, tasks that are challenging but have low interrelatedness of the subcomponents are learned better with part practice (40).

END

TYPE
Recommendation

TITLE
Practice Schedule — Whole Versus Part Practice (Safety)

PAGE
524

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Regardless of the task interrelatedness, in instances in which the skill may be dangerous or costly to learn as a whole, part practice is the favored choice.

END

TYPE
Recommendation

TITLE
Internal and External Cues for Coaching Feedback

PAGE
524

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Research has suggested that early in learning, external cues can be very effective. As the movements become refined and minor technique corrections are needed, internal cues may be more appropriate (76).

END

TYPE
Recommendation

TITLE
Random Practice — Integration with Blocked Practice

PAGE
526-527

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
When applied in a sport setting, an integration of blocked and random practice (a few repetitive attempts at each skill before proceeding) maximizes the benefits of both practice schedules (32).

END

TYPE
Recommendation

TITLE
Variable Practice — Combination with Specific Practice

PAGE
527

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
A combination of specific and variable practice allows the athlete to develop sport-specific skills while also providing the athlete with the flexibility to perform in unfamiliar contexts (33).

END

TYPE
Recommendation

TITLE
Observational Learning — Partner Work

PAGE
527-528

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
In a strength and conditioning setting, partner work can facilitate learning. As one athlete completes a lift or a drill, the other athlete can observe during his or her rest period and vice versa.

END

TYPE
Recommendation

TITLE
Feedback Timing and Frequency

PAGE
530

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
While concurrent feedback is beneficial for competition, delayed feedback that is initially frequent and decreases with time will facilitate learning of complex movement patterns.

END

TYPE
Warning

TITLE
Overcoaching (Verbal Overshadowing)

PAGE
524

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
If not, coaches tend to overcoach, a process known as verbal overshadowing, which can disrupt fluid motions by introducing cognitive processing.

END

TYPE
Warning

TITLE
Overcoaching Disrupts Self-Exploration

PAGE
524-525

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
By overcoaching, the athlete cannot self-correct, an important part of autonomous learning.

END

TYPE
Warning

TITLE
Explicit Instructions Impair Performance Under Stress

PAGE
528

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
A discovery instructional style can slow the learning process, while explicit instructions can impair performance in a stressful environment (56).

END

TYPE
Warning

TITLE
Concurrent Feedback Impairs Learning

PAGE
530

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Feedback that is offered concurrently with the task enhances performance while impairing learning; therefore, this feedback is beneficial in a competition setting (69).

END

TYPE
Evidence

TITLE
Observational Practice Combined with Physical Practice Improves Power Clean Technique

PAGE
528

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Sakadjian and colleagues (49) found that observational practice combined with physical practice facilitated improved power clean technique as compared to physical practice alone.

END

TYPE
Evidence

TITLE
Positive Normative Feedback Enhances Skill Learning

PAGE
529

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Both positive normative feedback and feedback without comparison augment skill learning compared to negative normative feedback (34).

END

TYPE
Evidence

TITLE
Decreased Feedback Frequency Enhances Skill Acquisition

PAGE
530

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
While decreased frequency impairs performance during practice, less frequent feedback enhances skill acquisition as compared to feedback after every trial (70), except in instances in which the skill is complex (74).

END