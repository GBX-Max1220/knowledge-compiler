TYPE
Definition

TITLE
Learning–Performance Distinction

PAGE
523

SECTION
9.6 — Psychological Techniques

ORIGINAL TEXT
Learning is a process that results in a relatively permanent change in the capability to perform a motor skill (50). Performance is the execution of the skill in the current environment (29).

CHILDREN
Learning, Performance

RELATIONSHIPS
is_a: Motor Skill Acquisition Concept

END

