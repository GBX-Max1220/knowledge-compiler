ORIGINAL TEXT
One can calculate sweat rate, thereby giving a better idea of fluid needs during exercise, by weighing athletes before exercise and again after an intense 1-hour practice session while also measuring fluid intake and urine volume produced. Sweat rate is equal to preexercise body weight minus postexercise body weight + fluid intake during exercise − urine produced (14, 24).

