PAGE
595

SECTION
10.5 — Minerals

ORIGINAL TEXT
Athletes who exercise intensely or for hours and hydrate excessively with only water or a no- or low-sodium beverage may dilute their blood sodium levels to dangerously low levels—below 130 mmol/L —a condition called hyponatremia. This leads to intracellular swelling, and, when blood sodium levels fall below 125 mmol/L, to headaches, nausea, vomiting, muscle cramps, swollen hands and feet, restlessness, and disorientation. When blood sodium drops below 120 mmol/L, risk of developing cerebral edema, seizures, coma, brain stem herniation, respiratory arrest, and risk of death increase (2, 3, 6).

