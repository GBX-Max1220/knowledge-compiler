Fruit. In general, 1 cup of fruit or 100% fruit juice or 1/2 cup of dried fruit can be considered as 1 cup from the Fruit Group.
Vegetables. Any vegetable or 100% vegetable juice counts as a member of the Vegetable Group. Vegetables may be raw or cooked; fresh, frozen, canned, or dried-dehydrated; and may be whole, cut up, or mashed. Vegetables in their nutrient-dense forms have limited additions such as salt, butter, or creamy sauces.
Grains. Any food made from wheat, rice, oats, cornmeal, barley, or another cereal grain is a grain product. Bread, pasta, breakfast cereals, tortillas, and grits are examples of grain products. Foods such as popcorn, rice, and oatmeal are included in the grains group. Half of one’s grains should be whole grains. Whole grains have the entire kernel, which includes the bran, germ, and endosperm. Some whole grain examples are whole-wheat flour, bulgur, oatmeal, and brown rice.
Protein foods. All foods made from meat, poultry, seafood, beans and peas, eggs, processed soy products, nuts, and seeds are considered part of the Protein Foods Group. Beans and peas are also part of the Vegetable Group. In general, 1 ounce of meat, poultry, or fish; 1/4 cup cooked beans; 1 egg; 1 tablespoon of peanut butter; 1/2 ounce of nuts or seeds; 1/4 cup (about 2 oz) of tofu; or 1 ounce of tempeh, cooked, can be considered as 1 ounce-equivalent from the Protein Foods Group. Many Americans get the right amount of protein needed from meat, poultry, and eggs but do not meet the recommendations for seafood or nuts, seeds, and soy products. Meeting this can help increase the amount of important nutrients the body needs, like unsaturated fats, dietary fiber, and vitamin D.
Dairy. The Dairy Group includes milk, yogurt, cheese, lactose-free milk and fortified soy milk, and yogurt. Foods made from milk that have little to no calcium and a high fat content, such as cream cheese, cream, and butter, are not considered dairy foods.
