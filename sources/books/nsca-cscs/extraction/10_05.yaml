ORIGINAL TEXT
A quick and simple method for estimating hydration status involves measuring changes in body weight from before to after a workout. Athletes should weigh themselves in minimal, lightweight clothing, after drying off and urinating, immediately before and after their workout. Sweaty clothes should be removed before weighing. Each pound (0.45 kg) lost during practice represents 16 ounces (0.47 L) of fluid.

