TYPE
Recommendation

TITLE
Fluid Intake Guidelines for Children and Adolescents During Exercise

PAGE
626

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
According to the American Academy of Pediatrics, children weighing 40 kg (88 pounds) should drink 5 fluid ounces (148 mL) of cold water or a flavored salted beverage every 20 minutes during practice, while adolescents weighing 60 kg (132 pounds) should drink 9 fluid ounces (266 mL) every 20 minutes even if they do not feel thirsty. They also recommend a sodium chloride concentration of 15 to 20 mmol/L (approximately 1 g per liter), which has been shown to increase voluntary hydration by 90% when compared to unflavored water (30, 106, 147).

CHILDREN
(Optional) None

RELATIONSHIPS
(Optional) None

END

TYPE
Warning

TITLE
Stomach Distress Risk from Adolescent Fluid Intake

PAGE
626

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Despite these recommendations, keep in mind that 9 ounces of fluid at one time is a considerable amount for an adolescent and may cause stomach distress. Therefore, these guidelines may need to be adjusted for individual athletes, depending on size and sweat rates.

END

TYPE
Recommendation

TITLE
Carbohydrate Intake for Aerobic Endurance Athletes During Prolonged Activity

PAGE
626

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Aerobic endurance athletes should consume 28 to 144 grams of multiple types of carbohydrates together, such as sucrose, fructose, glucose, or maltodextrin, each hour during prolonged aerobic endurance activity (32, 34, 66, 137).

END

TYPE
Evidence

TITLE
Exogenous Carbohydrate Oxidation Rate Limit

PAGE
626

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Despite greater intakes per hour, as noted earlier, exogenous (external; that which is consumed) carbohydrate oxidation rates do not exceed 1.0 to 1.1 gram per minute, likely due to the rate of glucose absorption and possibly also the limited delivery rate of 1 gram per minute of glucose into the bloodstream (65).

END

TYPE
Evidence

TITLE
Oxidation Rates of Different Carbohydrate Types

PAGE
626

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Glucose, sucrose, maltose, maltodextrins, and amylopectin are oxidized quickly; the oxidation rates of fructose, galactose, and amylose are 25% to 50% slower (65).

END

TYPE
Recommendation

TITLE
Consuming Multiple Types of Carbohydrates During Exercise

PAGE
626-627

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Therefore, consuming multiple types of carbohydrates together, such as sucrose, fructose, and glucose or maltodextrin, increases the rate of carbohydrate absorption and exogenous carbohydrate oxidation compared to consuming an isocaloric amount of just one type of sugar (62).

END

TYPE
Evidence

TITLE
Carbohydrate Mouth Rinsing Improves Performance

PAGE
627

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
In addition to actually ingesting carbohydrates, simply rinsing carbohydrates through the mouth (without actually ingesting them) seems to improve performance lasting approximately 1 hour by 2% to 3%, presumably by affecting the central nervous system (64).

END

TYPE
Recommendation

TITLE
Fluid Intake for Tennis Players During Changeovers

PAGE
628

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Because tennis players cannot drink continuously during a match and can lose more than 2.5 liters (84.5 fl oz) of fluid per hour, a recommendation of 200 to 400 milliliters (6.7-13.5 fl oz) per changeover (switching sides) has been put forth for these athletes (69).

END

TYPE
Recommendation

TITLE
Individualized Hydration Strategies Based on Weight Changes

PAGE
630

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Due to large variations in sweat rates and electrolyte concentrations, athletes should measure weight changes during training and competition in specific weather conditions and develop individualized hydration strategies based on this information (120).

END

TYPE
Recommendation

TITLE
Sport Drink Composition for Prolonged Activity in Hot Weather

PAGE
630

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
During prolonged activity in hot weather, the Institute of Medicine recommends sport drinks containing 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% (2).

END

TYPE
Recommendation

TITLE
Hydration Guidance for Children and Adolescents During Practice

PAGE
630

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Hydration guidance for children and adolescents consists of 5 to 9 fluid ounces (148-266 mL) of cold water or a flavored salted beverage or sport drink depending on their weight. For example, children or adolescents weighing 40 kilograms (88 lb) should drink 5 fluid ounces (148 mL) and those weighing 60 kg (132 lb) should drink 9 fluid ounces (266 mL) every 20 minutes during practice, even if they do not feel thirsty (30, 37, 106).

END

TYPE
Recommendation

TITLE
Carbohydrate Intake for Glycogen Replenishment After Exercise

PAGE
631

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Glycogen synthesis occurs at a rapid rate when large amounts of carbohydrate, 1.0 to 1.85 grams per kilogram body weight per hour, are consumed immediately after exercise or competition and at regular intervals every 15 to 60 minutes thereafter for up to 5 hours (61).

END

TYPE
Recommendation

TITLE
Protein Intake for Muscle Repair After Aerobic Endurance Exercise

PAGE
632

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Because prolonged aerobic endurance exercise breaks down muscle tissue, protein should be included in the aerobic endurance athlete's posttraining meal to help start muscle building and repair, which may attenuate posttraining and postevent muscle soreness (85).

END

TYPE
Recommendation

TITLE
Carbohydrate Intake for Glycogen Replenishment After Resistance Training

PAGE
634

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
During the recovery period after strength and power competitions, athletes should focus on consuming higher-glycemic carbohydrates immediately after exercise if they must compete or train again over the course of the 24-hour period after the initial training session or competition.

END

TYPE
Recommendation

TITLE
Protein Dose for Stimulating Muscle Protein Synthesis After Resistance Training

PAGE
635

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
Varying amounts of protein have been used after resistance training to stimulate muscle protein synthesis, though it appears that 20 to 50 grams (providing about 8.5 g-20 g of essential amino acids) of a high-quality, high-leucine, fast protein (one that leads to a rapid rise in amino acids in the bloodstream) in younger individuals may maximally stimulate muscle protein synthesis, while 40 grams or more may be necessary in older adults (59, 109).

END

TYPE
Threshold

TITLE
Leucine Content for Stimulating Muscle Protein Synthesis

PAGE
635

SECTION
11.2 — During-Event Nutrition

ORIGINAL TEXT
A protein dose that contains 2 to 3 grams of leucine or 0.05 grams of leucine per kilogram body weight will effectively stimulate muscle protein synthesis in younger adults (96, 102, 136).

END