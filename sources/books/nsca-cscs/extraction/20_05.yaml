20.5 — Program Design for Speed and Agility

ORIGINAL TEXT
Lift one leg so the foot is above the opposing ankle with toes pointed up, then sweep the foot down and back to make foot contact. As the center of mass moves ahead of the foot, the foot should drive up and over the ankle. Repeat this circular foot motion with each limb for the designated distance. The foot contact should be with the ankle in a neutral position and may begin heel to toe with each foot contact. The drill will involve a low knee lift but will become larger with progressions. The foot contact will also progress to forefoot contact with these progressions. The trunk leans forward slightly with the head up and eyes looking forward. The athlete adopts a contralateral arm movement at a lower amplitude of maximal sprint running, but the timing and range of motion should match the timing and range of motion of the legs.

