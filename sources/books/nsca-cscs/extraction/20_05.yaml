TYPE
Procedure

TITLE
Sprint Resistance: Incline for Acceleration — Starting Position

PAGE
1497-1498

SECTION
20.5 — Program Design for Speed and Agility

ORIGINAL TEXT
Begin in the correct starting position (commonly called a crouched start). First, split the stance position by placing the dominant leg forward and dropping the back or swing leg by one to two foot lengths. The length of split between the drive and swing leg is largely determined by the compromise between the (a) ability to generate sufficient forces needed to overcome a lower center of gravity and (b) comfort. In addition, the feet should be split in such a manner that the front and back legs are in line with the pelvis, so that no unnecessary twisting of the hips occurs. Once the split stance has been established, drop the back knee straight down so that the shank (shin) is nearer (more parallel) to the ground. This aids in promoting the proper driving position needed to begin acceleration. With a tall and rigid torso, raise the arm that is opposite to the front or drive leg to a position near or slightly above the forehead. The hand should be spaced approximately 6 to 8 inches (15-20 cm) away from the forehead. The rear arm (opposite to the rear or swing leg) should be pulled back to a point at which the hand is near the lateral aspect of the buttocks with an elbow angle that may range from 100 degrees to 120 degrees. This position allows for the arm action to assist in producing sufficient propulsive forces to overcome static inertia. On completion of setup, lean the entire body forward so that 60% of the body weight is on the front leg. Avoid breaking at the waist during this shift. The athlete should continue to feel balanced and stable.

PARENT
Sprint Resistance: Incline for Acceleration

CHILDREN
NONE

RELATIONSHIPS
NONE

END

