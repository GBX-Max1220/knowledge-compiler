ORIGINAL TEXT
Initiate movement by pushing off one limb through the ankle, achieving a small flight phase. For the subsequent foot ground contact, the ankle should be in a neutral position and make contact on the forefoot under the hips or center of mass. During ground contact there should be minimal knee and ankle flexion. The athlete should be cued to "punch the ground" with the limb, emphasizing short, stiff ground contacts with each ground contact. The trunk should remain upright with a slight lean and hips extended (little to no flexion during ground contact). The contralateral arm range of movement will be small, but the speed of the arm movement should match the rate of foot contacts.

