Measure Description Interpretation
comprehensively assess how athletes respond during game scenarios: (a) defensive (move in the same direction as the stimulus); (b) offensive (move in the opposite direction to the stimulus).directional change before the stimulus finalized the movement. Negative decision-making time is observed only during response to movements of another person (video or human stimulus), highlighting the importance of stimulus specificity during agility protocols. The measurement of decision-making time in both defensive and offensive situations allows strength and conditioning professionals to identify whether athletes need to develop perceptual-cognitive ability in a specific game scenario.
COD phase-specific information Kinetic or kinematic data pertaining to the approach or acceleration, deceleration, turn, and reacceleration phases of a COD task This enables the practitioner to examine the overall COD by splitting the task into several phases (e.g., approach, COD, and exit). This information enables the identification of COD strategy and establishes strengths and areas for development. Essentially, it provides further information regarding how the athlete achieved that completion time. Advanced technology such as LiDAR or radar may provide information regarding time and distance braking and speed at braking onset.
Alternative considerations Practitioners should also consider the athlete's momentum into the COD task because greater momentums require greater braking impulse to decelerate. Additional monitoring of pacing strategies is also essential because athletes may regulate entry speed to reduce momentum to make deceleration or braking easier. Finally, video analysis is also recommended to observe technique to understand compensatory strategies, areas for development, and comparison to technical models.
Note: COD = change of direction; COM = center of mass; ETG = electronic timing gate; 2D = two-dimensional; 3D= three-dimensional; LiDAR = light detection and ranging.

