ORIGINAL TEXT
Initiate movement by lifting one leg to a flexed knee position in which the top of the thigh is near parallel (i.e., front-side mechanics). The foot of the lifted leg (swing leg) should be approximately at knee height of the stance leg, with the heel pulled up under the buttocks and the ankle dorsiflexed. This will result in the appearance of a figure four at the legs. The swing leg will always accord with this description. Begin the first skip by aggressively driving the swing leg down to the ground through an active foot, established through slight dorsiflexion. Lift the big toe up to establish appropriate dorsiflexion. (The main difference between the A- and B-skip is the more aggressive driving down of the swing leg to emphasize correct touchdown mechanics and increased angular velocities.) Complete the drive down of the swing leg through the forefoot until near–triple extension of the new stance leg occurs. The fore- to mid-foot of the new stance leg should land under the hips, maintaining the appearance of stacked joints. At the initiation of contact, the opposing leg should pop up rapidly to create a swing leg. The force generated from the active push down should coincide with a skipping motion that will result in a horizontal displacement of the body down the track.

