TYPE
Recommendation

TITLE
Guidelines for Aerobic Endurance Testing in the Heat

PAGE
753

SECTION
13.4 — Test Selection

ORIGINAL TEXT
Follow these guidelines to minimize health risks and obtain accurate results when testing athletes in hot environments (9, 23, 30):
During the weeks before the test, athletes should engage in enough training to establish a baseline of fitness in the activity being tested. Strength and conditioning professionals should be aware that responses to exercise in the heat are highly individual.
Avoid testing under extreme combinations of heat and humidity. Figure 13.2 illustrates the combinations of temperature and humidity at which heat injury risk is present.
Using temperature limits of at least 5 °F (3 °C) below those listed is recommended, especially on sunny days, to provide a safety margin and enable better test performance. On days when the temperature has exceeded or is expected to exceed the recommended limits, indoor facilities should be used if available, or testing should be conducted during morning or early evening hours when temperatures are acceptable.
The athletes, especially those coming from cool climates, should be acclimated to the heat and humidity for at least one week before testing. Start with short workouts and progress to workouts of longer duration.
Athletes should make sure they are well hydrated in the 24-hour period preceding aerobic endurance testing in the heat. A good indication of adequate hydration is a plentiful volume of clear urine (refer to chapter 10 for more detailed preexercise hydration guidelines). Salt tablets should generally be avoided.
Athletes should be encouraged to drink during exercise in the heat. Plain water is most appropriate for exercise up to 1 hour in duration. Snack breaks during longer durations of training can help replenish fluids and be important in replacing electrolytes. The amount and rate of fluid replacement depend on individual sweat rates, duration of exercise, and environment. Refer to chapter 10 for specific guidelines and how to calculate sweat rate if needed.
Athletes should wear a light-colored, loose-fitting tank top and shorts that are breathable (i.e., synthetic porous, moisture-wicking material). Male athletes may be allowed to go shirtless.
Heart rate may be monitored to detect reactions to the heat.
Be attentive to possible symptoms of heatstroke or heat exhaustion: cramps, nausea, dizziness, difficulty in walking or standing, faintness, garbled speech, lack of sweat, red or ashen skin, and goose bumps.
Be aware of the symptoms of hyponatremia or water intoxication, a potentially fatal condition in which excess water intake reduces blood sodium to dangerously low levels. Symptoms may include extremely diluted urine in combination with bloated skin, altered consciousness, or loss of consciousness, with no increase in body temperature. A victim of hyponatremia should never be given fluid and should be treated by a physician.
Proficient medical coverage should be readily available so that an athlete encountering a test-related health problem can be very rapidly treated or evacuated (or both).

END

TYPE
Warning

TITLE
Symptoms Warranting Medical Referral During Testing

PAGE
752

SECTION
13.4 — Test Selection

ORIGINAL TEXT
Medical referral may be warranted for an athlete who persistently has any of the following symptoms: chest pressure, pain, or discomfort; listlessness; light-headedness; dizziness; confusion; headache; deeply reddened or cold and clammy skin; irregular pulse; bone or joint pain; blurred vision; nausea; or shortness of breath, rapid pulse, or weakness either not commensurate with the level of exertion or unresponsive to rest. Such symptoms can occur long after exercise is terminated. Even symptoms that occur only once, if severe (such as loss of consciousness), call for immediate medical attention.

END

TYPE
Warning

TITLE
Risk of Heat Injury During Strenuous Exercise in Hot Environments

PAGE
751-752

SECTION
13.4 — Test Selection

ORIGINAL TEXT
Heat injury is also a risk during heavy physical exertion in hot environments, especially when humidity is high. Athletes should wear light clothing in warm weather and drink water ad libitum according to the dictates of thirst before and during heavy physical exertion in the heat (refer to chapters 10 and 11 for more detailed hydration guidelines).

END

TYPE
Warning

TITLE
Risk of Exacerbating Heart Problems During Maximal Exertion

PAGE
751-752

SECTION
13.4 — Test Selection

ORIGINAL TEXT
Strenuous exercise, such as maximal runs or 1-repetition maximum (1RM) tests, can uncover or worsen existing heart problems, such as impaired blood flow to the heart muscle and irregular heartbeats. Standard medical screening cannot always reveal hidden heart problems, which occasionally result in fatality among young athletes (30).

END

TYPE
Recommendation

TITLE
Test Sequencing Order

PAGE
757

SECTION
13.4 — Test Selection

ORIGINAL TEXT
A logical sequence, although there are some variations, is to administer tests in this order:
1. Nonfatiguing tests (e.g., height, weight, flexibility, skinfolds and girth measurements, vertical jump)
2. Agility tests (e.g., T-test, 5-10-5 test, 5-0-5 test, Illinois test)
3. Maximum power and strength tests (e.g., 1RM power clean, 1RM squat, 1RM bench press)
4. Sprint tests (e.g., 40 m sprint with split times at 10 m and 20 m)
5. Local muscular endurance tests (e.g., push-up test, partial curl-up, YMCA bench press test)

END

TYPE
Recommendation

TITLE
Rest Periods Between Test Attempts

PAGE
756

SECTION
13.4 — Test Selection

ORIGINAL TEXT
There should be at least 2 minutes of rest between attempts that are not close to the athlete's maximum and 3 minutes between attempts that are close to the maximum, as judged by the relative difficulty of the previous trial or testing set (21).

END

TYPE
Recommendation

TITLE
Rest Period Between Tests in a Battery

PAGE
756

SECTION
13.4 — Test Selection

ORIGINAL TEXT
When administering a test battery (e.g., one in which wrestlers perform maximal repetition pull-up and push-up tests for assessment of local muscular endurance), tests should be separated by at least 5 minutes to prevent the effects of fatigue from confounding test results (also see the following section, Sequence of Tests).

END

