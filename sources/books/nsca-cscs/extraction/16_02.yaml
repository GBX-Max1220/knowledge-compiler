1017-1021

SECTION
16.2 — Machine Exercises

ORIGINAL TEXT
Starting Position: Athlete
Set a barbell at approximately mid torso height on a squat rack or power rack.
Approach the bar and position it in the crease of the elbows, resting on the biceps and held tight to the body.
Step under the bar and position the feet parallel to each other.
Engage the core, retract the shoulder blades, and hold the chest up and out.
Tilt the head slightly up.
Once in position, signal the spotters for assistance in moving the bar off the supports.
Extend the hips and knees to lift the bar.
Take one or two steps backward.
Position the feet shoulder-width apart (or wider), even with each other, with the toes pointed slightly outward.
All repetitions begin from this position.
Starting Position: Two Spotters
Stand erect at opposite ends of the bar with the feet shoulder-width apart and the knees slightly flexed.
Grasp the end of the bar by cupping the hands under the bar with the fingers across each other.
At the athlete's signal, assist with lifting and balancing the bar as it is moved off the supports.
Release the bar smoothly.
Hold the hands 2 to 3 inches (5-8 cm) below the ends of the bar.
Move sideways in unison with the athlete as the athlete moves backward.
Once the athlete is in position, get into a shoulder-width stance with the knees slightly flexed and the torso erect.
Downward Movement Phase: Athlete
Maintain a position with the back neutral, the arms tight to the body, and the chest up and out.
Allow the hips and knees to flex slowly while keeping the torso-to-floor angle relatively constant.
Keep the heels on the floor and the knees aligned over the feet.
Continue flexing the hips and knees until the tops of the thighs are parallel to the floor, the trunk begins to round or flex forward, or the heels rise off the floor.
Downward Movement Phase: Two Spotters
Keep the hands cupped and hands close to—but not touching—the bar as it descends.
Slightly flex the knees, hips, and torso to keep a neutral spine position when following the bar.
Upward Movement Phase: Athlete
Maintain a position with a neutral spine, the elbows held to body, and the chest up and out.
Extend the hips and knees at the same rate (to keep the torso-to-floor angle constant).
Keep the heels on the floor and the knees aligned over the feet.
Do not flex the torso forward or round the back.
Continue extending the hips and knees to reach the starting position.
At the end of the set, step forward toward the rack.
Squat the bar down until it rests on the supports.
Upward Movement Phase: Two Spotters
Keep the hands cupped and close to—but not touching—the bar as it ascends.
Slightly extend the knees, hips, and torso, and keep the back neutral when following the bar.
At the end of the set, move sideways in unison with the athlete back to the rack.
Simultaneously grasp the bar and assist with balancing the bar as it is racked.
Release the bar smoothly.

END

TYPE
Procedure

TITLE
Forward Step Lunge

PAGE
1022-1025

SECTION
16.2 — Machine Exercises

ORIGINAL TEXT
Starting Position: Athlete
Step under the bar and position the feet parallel to each other.
Grasp the bar with a closed, pronated grip.
Place the bar in a balanced position on the upper back and shoulders above the posterior deltoids at the base of the neck (using a handgrip only slightly wider than shoulder width).
Lift the elbows up to create a shelf for the bar using the upper back and shoulder muscles.
Hold the chest up and out.
Tilt the head slightly up.
Once in position, signal the spotter for assistance in moving the bar off the supports.
Extend the hips and knees to lift the bar.
Take two or three steps backward.
All repetitions begin from this position.
Starting Position: Spotter
Stand erect and very close to the athlete (but do not distract the athlete).
Place the feet shoulder-width apart with the knees slightly flexed.
At the athlete's signal, assist with lifting and balancing the bar as it is moved out of the rack.
Move in unison with the athlete as the athlete moves backward to the starting position.
Once the athlete is in position, get into a hip-width stance with the knees slightly flexed and the torso erect.
Stay in position in case the athlete needs assistance. Position the hands near the athlete's hips, waist, or torso if needed to help stabilize the athlete.
Forward Movement Phase: Athlete
Take one exaggerated step directly forward with one leg (the lead leg).
Keep the torso erect as the lead foot moves forward and contacts the floor.
Keep the trailing foot in the starting position, but allow the trailing knee to slightly flex.
Plant the lead foot flat on the floor pointing straight ahead or slightly inward.
Allow the lead hip and knee to flex slowly.
Keep the lead knee directly over the lead foot.
Continue to flex the trailing knee until it is 1 to 2 inches (3-5 cm) above the floor.
Balance the weight evenly between the ball of the trailing foot and the whole lead foot.
Keep the torso perpendicular to the floor by sitting back on the trailing leg.
Forward Movement Phase: Spotter
Stay in a hip-width stance with the knees slightly flexed and the torso erect.
Assist only if necessary to keep the athlete balanced.
Backward Movement Phase: Athlete
Forcefully push off the floor by extending the lead hip and knee.
Maintain the same erect torso position; do not jerk the upper body backward.
Bring the lead foot back to a position next to the trailing foot; do not stutter-step backward.
Stand erect in the starting position, pause, and then alternate lead legs for the next repetition.
At the end of the set, step toward the rack and place the bar in the supports.
Backward Movement Phase: Spotter
Maintain a hip-width stance with the knees slightly flexed and the torso erect.
Stand erect in the starting position, and pause to wait for the athlete to switch legs for the next repetition.
Stay in a ready position with hips and knees slightly flexed, and assist only if necessary to keep the athlete balanced.
At the end of the set, help the athlete rack the bar.

END

