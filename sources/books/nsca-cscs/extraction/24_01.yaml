The preoperation phase consists of the final steps before the facility can open.

END

TYPE
Recommendation

TITLE
Recommended Ceiling Height for Strength and Conditioning Facilities

PAGE
1743

SECTION
Ceiling Height

ORIGINAL TEXT
A recommended height is 12 to 14 feet (3.7-4.3 m), which should give enough clearance to allow athletes to comfortably perform most activities (14, 18).

END

TYPE
Recommendation

TITLE
Recommended Lighting Levels for Strength and Conditioning Facilities

PAGE
1744

SECTION
Lighting

ORIGINAL TEXT
Lighting is recommended between 20 to 30 foot candles (fc; 1 fc = lumen/ft2) or 200 to 300 lux (lx; 1 lx = lumen/m2) at floor level for general gym areas and up to 50 foot candles or 500 lux for dedicated resistance training and group exercise areas (2, 11, 18).

END

TYPE
Recommendation

TITLE
Recommended Room Temperature Range for Strength and Conditioning Facilities

PAGE
1745

SECTION
Room Temperature, Humidity, and Ventilation

ORIGINAL TEXT
Most sources indicate that between 68 °F and 78 °F (20-26 °C) is an appropriate temperature range, with many suggesting an optimal range of 68 °F to 74 °F (20-23 °C) (2, 5, 18).

END

TYPE
Threshold

TITLE
Maximum Relative Humidity for Strength and Conditioning Facilities

PAGE
1745

SECTION
Room Temperature, Humidity, and Ventilation

ORIGINAL TEXT
In any space where there is physical activity, relative humidity should not exceed 60%.

END

TYPE
Recommendation

TITLE
Recommended Air Exchange Rate for Strength and Conditioning Facilities

PAGE
1745

SECTION
Room Temperature, Humidity, and Ventilation

ORIGINAL TEXT
Room air should be exchanged a minimum of 8 to 10 times per hour—optimally 12 to 15 times per hour to prevent odors and stagnant air (5).

END

TYPE
Recommendation

TITLE
Recommended Sound Volume for Sound Systems

PAGE
1746

SECTION
Sound Systems and Noise Control

ORIGINAL TEXT
The sound volume should be less than 90 decibels so that athletes can hear instructions and coaching cues (2).

END

TYPE
Recommendation

TITLE
Recommended Minimum Space per Person in a Strength and Conditioning Facility

PAGE
1740

SECTION
Assessing Athletic Program Needs

ORIGINAL TEXT
The recommended minimum amount of space is 100 square feet (9.3 m2) per individual, including all athletes, strength and conditioning professionals, and any additional staff (e.g., athletic trainers) or persons present (16).

END

TYPE
Recommendation

TITLE
Recommended Minimum Space Between Racks, Barbells, and Dumbbells

PAGE
1752

SECTION
Equipment Placement

ORIGINAL TEXT
Racks, barbells, and dumbbells should have a minimum of 3 feet (0.9 m) of space between equipment to allow for movement without danger to the athlete or spotter.

END

TYPE
Recommendation

TITLE
Recommended Walkway Width in Strength and Conditioning Facilities

PAGE
1752

SECTION
Traffic Flow

ORIGINAL TEXT
This usually creates two or three main walkways that should be 5 to 7 feet (1.5-2.1 m) wide (2, 3, 13).

END

TYPE
Recommendation

TITLE
Recommended Minimum Distance Between Stationary Circuit Training Machines

PAGE
1753

SECTION
Circuit Training Area

ORIGINAL TEXT
Stationary circuit training machines should be at least 30 inches (76 cm) (3), preferably 36 inches (91 cm), away from each other to provide a wide enough area and some extra space for safety.

END

TYPE
Recommendation

TITLE
Recommended Floor Space per Piece of Aerobic Equipment

PAGE
1754

SECTION
Aerobic Area

ORIGINAL TEXT
A general guideline is to allocate approximately 40 to 60 square feet (3.7-5.6 m2) of floor space per piece of equipment (2).

END

TYPE
Recommendation

TITLE
Recommended Anchor Point Height for Suspension Training Equipment

PAGE
1757

SECTION
Suspension Training Equipment

ORIGINAL TEXT
Ideally, the anchor point should be between 7 to 9 feet (2.1-2.7 m) above the floor.

END

TYPE
Recommendation

TITLE
Recommended Load-Bearing Rating for Carabiners Used for Exercise Purposes

PAGE
1757

SECTION
Suspension Training Equipment

ORIGINAL TEXT
In the United States, carabiners used for fall protection must meet OSHA standards, which specify a minimum tensile (breaking) strength of 5,000 lbs (22kN) (17).

END

TYPE
Recommendation

TITLE
Recommended Minimum Distance of Mirrors from Equipment

PAGE
1748

SECTION
Walls and Mirrors

ORIGINAL TEXT
Mirrors should be placed at least 6 inches (15 cm) away from any equipment (e.g., behind a rack of dumbbells) and a minimum of 20 inches (51 cm) above the floor (4).

END

TYPE
Recommendation

TITLE
Recommended Load-Bearing Capacity for Floors Not on Ground Level

PAGE
1742

SECTION
Location

ORIGINAL TEXT
The load-bearing capacity should be at least 100 foot-pounds per square foot (4.8 kN/m2) (7).

END

TYPE
Recommendation

TITLE
Recommended Color Temperature for Lighting

PAGE
1744

SECTION
Lighting

ORIGINAL TEXT
Lights with color temperatures between 4,000° and 5,000° Kelvin are considered best for strength and conditioning facilities because they resemble daylight, provide optimal visibility for enhanced safety, and can have an energizing effect.

END

TYPE
Recommendation

TITLE
Recommended Number of Fans per Square Footage

PAGE
1745

SECTION
Room Temperature, Humidity, and Ventilation

ORIGINAL TEXT
If fans are used, a general guideline is two to four fans for every 1,200 square feet (111 m2).

END

TYPE
Warning

TITLE
Warning Against Using Headphones in Strength and Conditioning Facilities

PAGE
1746

SECTION
Sound Systems and Noise Control

ORIGINAL TEXT
The use of headphones is not recommended. Headphones can interfere with coaching and instruction and limit athletes’ awareness of their surroundings in the case of an emergency.

END

TYPE
Warning

TITLE
Warning Against Power Cords Extending into Exercise Areas

PAGE
1747

SECTION
Electrical Service and Devices

ORIGINAL TEXT
Specifically, power cords should never extend into exercise areas, safety spacing, walkways, or spotter areas.

END

TYPE
Warning

TITLE
Warning Against Compromising Equipment and Safety Spacing Due to Limited Space

PAGE
1735

SECTION
Satellite Training Facilities

ORIGINAL TEXT
As a rule, equipment and safety spacing should never be compromised due to limited space.

END

TYPE
Warning

TITLE
Warning About Outdoor Training Surface Temperatures

PAGE
1736

SECTION
Outdoor Training Spaces

ORIGINAL TEXT
Ground surface temperatures should also be considered to avoid injury due to excessive heat or burns (e.g., artificial turf may have higher temperatures than surrounding surfaces).

END

TYPE
Warning

TITLE
Warning About Frayed Cables

PAGE
1740

SECTION
Assessing Athletic Program Needs

ORIGINAL TEXT
If a cable is frayed or damaged, discontinue using the cable column until the cable is replaced.

END

TYPE
Warning

TITLE
Warning About Suspension Training Equipment in Doorways

PAGE
1757

SECTION
Suspension Training Equipment

ORIGINAL TEXT
Further, suspension training equipment should not be mounted in or near doorways to prevent blocking emergency exits and hindering access to storage areas, cleaning closets, locker rooms, and restrooms.

END

