TYPE
Definition

TITLE
Minimally Compliant Facility

PAGE
1735

SECTION
Satellite Training Facilities

ORIGINAL TEXT
In accordance with the NSCA Strength and Conditioning Professional Standards and Guidelines (16), and as explained in this chapter, a minimally compliant facility must be in agreement with mandated building codes and regulations, including accessibility (i.e., wheelchair access and ADA compliance), HVAC, electrical, lighting, flooring, storage, square footage, safety spaces, and overhead clearance and must possess well-maintained equipment and surfaces.

END

TYPE
Definition

TITLE
Safety Cushion

PAGE
1753

SECTION
Circuit Training Area

ORIGINAL TEXT
Safety spacing in the weight room is generally referred to as a safety cushion.

END

TYPE
Definition

TITLE
Predesign Phase

PAGE
1729

SECTION
Predesign Phase

ORIGINAL TEXT
The predesign phase is the first step in building a new facility. This phase should consist of a needs analysis, a feasibility study, and master plan formation.

END

TYPE
Definition

TITLE
Needs Analysis

PAGE
1729

SECTION
Predesign Phase

ORIGINAL TEXT
The needs analysis is the step when the designers and experts collaborate to determine the needs of the strength and conditioning program (10).

END

TYPE
Definition

TITLE
Feasibility Study

PAGE
1729

SECTION
Predesign Phase

ORIGINAL TEXT
The second part of the predesign phase is called a feasibility study.

END

