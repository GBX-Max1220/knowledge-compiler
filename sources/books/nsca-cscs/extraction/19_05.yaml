TITLE
Half-Kneeling Overhead Medicine Ball Throw for Distance

PAGE
1378-1380

SECTION
19.5 — Program Integration

ORIGINAL TEXT
HALF-KNEELING OVERHEAD MEDICINE BALL THROW FOR DISTANCE
Intensity level: Low
Direction: Forward
Equipment: Medicine or plyometric ball weighing 5 to 30 pounds (2-14 kg); wall or partner
Starting position: Start in a half-kneeling position, with the kneeling knee directly under the hip of the supporting leg and the hip and knee of the stance leg flexed to approximately 90 degrees with the hip, knee, and toe aligned. The trunk should be upright, facing the wall or partner approximately 10 feet (3 m) away (not shown). Raise the ball above the head with the elbows extended.
Preparatory movement: Begin with a countermovement in the trunk as well as the arms, cocking the arms (i.e., moving the arms slightly backward, from the shoulder, before the actual throw).
Arm action: Using both arms, throw the ball to the wall or partner by flexing the trunk and extending the shoulders, maintaining a straight arm position. When the wall or partner returns the ball, return to the starting position, and immediately repeat the movement.
COMMON ERRORS
Overextending the trunk in the start position, detrimentally increasing the involvement of the lumbar spine
Producing a cross-body throwing motion (either from not having the ball directly overhead or by finishing with the hands toward one hip); this produces trunk rotation, which may increase the distance but changes the exercise from an isolated sagittal plane movement

END

