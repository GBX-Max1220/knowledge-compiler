TITLE
Depth Push-Up

PAGE
1386-1388

SECTION
19.5 — Program Integration

ORIGINAL TEXT
DEPTH PUSH-UP
Intensity level: Medium
Direction: Vertical
Equipment: Medicine or plyometric ball (or stable implement of similar height)
Starting position: Lie in a push-up position, with the hands on the medicine ball and elbows extended.
Preparatory movement: None
Downward movement: Quickly remove the hands from the medicine ball and drop down. Contact the ground with hands slightly wider than hip-width apart and elbows slightly flexed. Allow the chest to almost touch the medicine ball by letting the elbows flex.
Upward movement: Immediately and explosively push up by fully extending the elbows. Quickly place the palms on the medicine ball and repeat the movement.
Note: When the upper body is at maximal height during the upward movement, the hands should be higher than the medicine ball.
COMMON ERRORS
Not achieving sufficient tension in the arms to stop the downward movement of the chest, which collapses onto the medicine ball
Not achieving sufficient bilateral vertical force to land with both hands onto the medicine ball in a balanced fashion

END

