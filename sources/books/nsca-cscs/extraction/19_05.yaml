Procedure

TITLE
Lateral Travel Push-Up

PAGE
1388-1389

SECTION
19.5 — Program Integration

ORIGINAL TEXT
LATERAL TRAVEL PUSH-UP
Intensity level: High
Direction: Lateral
Equipment: Medicine ball or a stable implement of similar height
Starting position: Get into a push-up position, with one hand on the medicine ball (elbow partially flexed) and one hand on the ground, elbow extended (not shown).
Preparatory movement: None
Downward movement: Keeping both hands in place, rapidly drop down into a push-up deep enough so that the chest is level with the top of the medicine ball (or lower).
Drill movement: Immediately and explosively push up and sideways by fully extending the elbows. The trunk should move laterally across the medicine ball while quickly switching hands (the hand that was on the ground now lands on the medicine ball, and vice versa). Immediately on landing, repeat the movement in the opposite direction (alternate hands with each repetition).
Note: When the upper body is at maximal height during the upward movement, both hands should be above the medicine ball.
COMMON ERRORS
Leading the vertical movement with the hips rather than pushing through the upper body
Not achieving sufficient vertical height to travel across the ball (which should not move)

END

