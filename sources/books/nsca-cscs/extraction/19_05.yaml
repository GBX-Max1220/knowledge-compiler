TITLE
45-Degree Sit-Up

PAGE
1389-1391

SECTION
19.5 — Program Integration

ORIGINAL TEXT
45-DEGREE SIT-UP
Intensity level: Medium
Equipment: Medicine or plyometric ball weighing 5 to 30 pounds (2-14 kg); a partner
Starting position: Sit on the ground with the trunk at an approximately 45-degree angle. The partner should be in front with the medicine ball.
Preparatory movement: The partner throws the ball to the athlete's outstretched hands.
Drill action: Once the partner throws the ball, the athlete catches it using both arms with minimal trunk extension and immediately returns the ball to the partner.
Note: The force used to return the ball to the partner should come predominantly from the abdominal muscles.
COMMON ERRORS
Extending at the hips to absorb the force of the ball, increasing the amortization phase and reducing the efficacy of the exercise
Not keeping the foot in contact with the ground, reducing the stable base from which to exert force

END

