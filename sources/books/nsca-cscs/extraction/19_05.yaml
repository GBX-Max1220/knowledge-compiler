ORIGINAL TEXT
SEATED ROTATIONAL MEDICINE BALL THROW
Intensity level: Medium
Equipment: Medicine or plyometric ball weighing 5 to 30 pounds (2-14 kg); a wall or partner
Starting position: Sit on the ground with the trunk at an approximately 45-degree angle. The partner should stand to the side with the medicine ball.
Preparatory movement: The partner throws the ball to the athlete's outstretched hands.
Drill action: Once the partner throws the ball, the athlete should track it across the body and catch it using both arms with minimal trunk extension. The rotation of the trunk should be decelerated and then rotated in the opposite direction to immediately return the ball to the partner.
Note: The force used to return the ball to the partner should come predominantly from the abdominal muscles and trunk rotation.
COMMON ERRORS
Not rotating sufficiently to optimize the SSC within the trunk musculature
Not keeping the foot in contact with the ground, reducing the stable base from which to exert force

END

TYPE
Procedure

TITLE
Leg Pushdown

PAGE
1393-1395

SECTION
19.5 — Program Integration

ORIGINAL TEXT
LEG PUSHDOWN
Intensity level: High
Equipment: A partner
Starting position: Lie on the ground with slightly flexed knees and the hips flexed to 90 degrees (not shown). The hands should hold the partner's ankles for stability (shown).
Preparatory movement: Brace the core. Breathe in and pull the ribs down toward the hips to tighten the core musculature to prevent the lumbar spine from going into forced extension during the movement.
Drill action: The athlete raises the legs toward the partner's outstretched hands, and the partner briefly grasps the athlete's lower legs before forcefully pushing the athlete's legs down toward the ground. Before the legs reach the ground, the athlete decelerates and ultimately stops the downward movement before flexing the hips to return to the starting position to reset for the next repetition. Immediately repeat the movement.
Note: Intensity may be increased by using greater force of the downward push or by altering the direction of the push so that the leg action is not purely in the sagittal plane.
COMMON ERRORS
Lowering the legs without waiting for the partner to push them to the ground, reducing the eccentric load of the exercise
Not controlling the lumbopelvic position and extending the spine as the legs are lowered, increasing the pressure on the lower back musculature

END