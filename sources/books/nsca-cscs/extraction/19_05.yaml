TITLE
Viking Throw for Height

PAGE
1383-1384

SECTION
19.5 — Program Integration

ORIGINAL TEXT
VIKING THROW FOR HEIGHT
Intensity level: Low
Direction: Vertical
Equipment: Medicine or plyometric ball weighing 10 to 50 pounds (5-23 kg)
Starting position: Start in an upright stance with the medicine ball held in straight arms in front of the middle of the body.
Preparatory movement: Initiate a countermovement by performing a deep and rapid squat action, keeping the ball held in straight arms.
Arm action: From the base of the counter movement, perform a rapid triple extension of the hips, knees, and ankles to drive the ball vertically. As the body rises, continue the upward momentum of the ball so that it is released and thrown as high as possible at the top of the triple extension.
COMMON ERRORS
Not optimizing leg extension and transferring power to the upper body, reducing the impulse to the medicine ball
Releasing the ball too early (before full leg and trunk extension and shoulder flexion), reducing the impulse to the medicine ball

END

TYPE
Procedure

TITLE
Medicine Ball Slam from Single-Leg Balance

PAGE
1384-1386

SECTION
19.5 — Program Integration

ORIGINAL TEXT
MEDICINE BALL SLAM FROM SINGLE-LEG BALANCE
Intensity level: Low
Direction: Downward
Equipment: Medicine or plyometric ball weighing 10 to 30 pounds (5-14 kg)
Starting position: Start in a single leg Romanian deadlift position, with the trunk parallel to the ground and the hips hinged and level with one leg extended straight behind the body. The stance foot should be flat on the ground with weight distributed toward the heel. The shoulders should be flexed so the straight arms are holding the medicine ball level with the head.
Preparatory movement: Initiate a small countermovement by flexing the shoulders.
Arm action: Keeping the arms straight, slam the ball directly down into the ground, maintaining a stable trunk and hip position. Catch the rebound and repeat the movement, then repeat on the contralateral leg.
Note: With the shoulder position, small increases in load can make a big impact on drill intensity. This drill also can be adapted to a chest-dominant pattern by starting with the ball held at the chest and slammed into the ground from there.
COMMON ERRORS
Not achieving a stable and balanced position at the hips to form a stable platform from which to throw the ball
Hyperextending into the lumbar spine to achieve sufficient power to throw the ball to the ground rather than throwing from the shoulder

END

TYPE
