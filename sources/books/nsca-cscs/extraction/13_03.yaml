TYPE
Definition

TITLE
Metabolic Energy System Specificity

PAGE
744

SECTION
13.3 — Evaluation of Test Quality

ORIGINAL TEXT
A valid test must emulate the energy requirements of the sport for which ability is being assessed. Thus, the strength and conditioning professional should have a thorough understanding of the basic energy systems (phosphagen, glycolytic, and oxidative) and their interrelationships in order to apply the principle of specificity when choosing or designing valid tests to measure athletic ability for specific sports (10, 13, 19, 36). For example, in choosing an appropriate test for running ability in basketball, the strength and conditioning professional must understand that basketball is predominantly an anaerobic running sport (4, 26) and also be familiar with the distances and directions of sprints in a basketball game. It is best for the tests to simulate the physical movements and energy demands of a real game.

END

TYPE
Definition

TITLE
Biomechanical Movement Pattern Specificity

PAGE
748

SECTION
13.3 — Evaluation of Test Quality

ORIGINAL TEXT
All else being equal, the more similar the test is to an important movement in the sport, the better. Sports differ in their physical demands. For example, the vertical jump test is very specific to basketball and volleyball, both of which involve vertical jumping during play, but less relevant to hockey, which does not involve vertical jumping. Positions within a sport differ as well. An American football defensive lineman needs pushing strength to move opposing linemen out of the way and 5- to 15-yard (5 to 14 m) sprint speed to reach the opposing quarterback, while a wide receiver depends less on pushing strength but must be able to sprint 30 to 100 yards (27-91 m) quickly. Thus, the bench press and 10-yard (9 m) sprint test would be more relevant to the lineman, while sprint tests of 30 to 100 yards (27-91 m) would be more relevant to the wide receiver.

END

