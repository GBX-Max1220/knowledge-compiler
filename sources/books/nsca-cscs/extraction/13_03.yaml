TYPE
Recommendation

TITLE
Consideration of Experience and Training Status in Test Selection

PAGE
749

SECTION
13.3 — Evaluation of Test Quality

ORIGINAL TEXT
For a well-trained, experienced athlete, a technique-intensive test may be appropriate because it can be very sport specific, and one can assume that poor technique will not impair performance of the test. However, this assumption cannot be made for an athlete just learning or trying out for a sport. The number of single-leg hops needed to travel 27 yards (25 m) may represent a valid and reliable test of plyometric strength for an experienced long jumper but not for a novice (11). Testers must also consider the training status of the athletes being tested. It would not be ideal, for example, to ask a baseball player to perform a 3-mile (4.8 km) run test a week before the beginning of fall practice, because the player has probably been doing interval training and relatively short runs (32). A lower body strength test using the parallel squat would not be an ideal test for an athlete who has trained using the leg press exclusively.

END

TYPE
Recommendation

TITLE
Consideration of Age and Sex in Test Selection

PAGE
749

SECTION
13.3 — Evaluation of Test Quality

ORIGINAL TEXT
Both age and sex can affect the validity and reliability of a test. For example, the 1.5-mile (2.4 km) run may be a valid and reliable field test of aerobic power for college-aged men and women (21) but may not be appropriate for preadolescents because of their probable lack of experience and interest in sustained running (30). A test of the maximum number of chin-ups that can be performed may be a valid test of elbow flexion muscular endurance for male wrestlers, but it may not be as valid for females due to differences in upper body pulling strength (27). The test may not be capable of differentiating muscular endurance levels in females. Therefore, using a modified prone pull-up with the feet supported may be a more valid test.

END

TYPE
Recommendation

TITLE
Consideration of Environmental Factors in Test Selection and Administration

PAGE
749-750

SECTION
13.3 — Evaluation of Test Quality

ORIGINAL TEXT
It is necessary to consider the environment when selecting and administering tests of basic athletic ability. High ambient temperature, especially in combination with high humidity, can impair endurance exercise performance, pose health risks, and lower the validity of an aerobic endurance exercise test. Aerobic endurance performance (29, 35) and intermittent sprint performance (17) may be impaired when the temperature approaches 80 °F (27 °C), especially if the humidity exceeds 50% (20). The effects of temperature and humidity on testing performance can create problems for comparing the results of tests administered at different times of year, on different days, and even at different times of day. For example, the maximal oxygen uptake of an athlete impaired by the heat is underestimated by the 1.5-mile (2.4 km) run test. Run times can also be impaired by cold temperatures. Thus, outdoor aerobic endurance tests may be inappropriate at locations characterized by wide fluctuations in temperature. In such places, aerobic endurance tests can be administered on an indoor track, if available, or with a treadmill or stationary cycle. Altitude can also impair performance on aerobic endurance tests, although not on tests of strength and power (24). Norms on aerobic endurance tests should be adjusted when testing at altitudes exceeding 1,900 feet (579 m). Up to about 9,000 feet (2,743 m), maximal oxygen uptake declines by approximately 5% for each 3,000 feet (914 m) of elevation (25). At even higher altitudes, maximal oxygen uptake declines more sharply. Athletes who arrive at a relatively high altitude after living near sea level for an extended period of time should be given at least 10 days to acclimate before undergoing aerobic endurance tests (34). For all testing, it is good practice to measure and document the environmental conditions and then to consider these factors when interpreting the results.

END

