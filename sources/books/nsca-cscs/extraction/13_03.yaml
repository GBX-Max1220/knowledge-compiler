ORIGINAL TEXT
TABLE 13.1  Common Tests Used to Assess Physical Characteristics of Various Sports

Physical characteristic | Test name | Sport application examples | Description
Aerobic capacity | Yo-Yo intermittent recovery test | Soccer, hockey | Measures aerobic fitness and ability to recover between bouts of high-intensity exercise
V̇O2max test | Aerobic endurance sports | Measures maximum oxygen uptake during incremental exercise, indicating aerobic endurance capacity
Agility | T-test | Soccer, basketball, American football | Assesses agility by measuring the time taken to navigate a T-shaped course
Illinois test | Soccer, rugby, American football | Measures agility and speed by timing the performance through a set course with changes of direction
Anaerobic capacity | Wingate anaerobic test | Cycling, hockey | Assesses anaerobic power and capacity by measuring power output on a cycle ergometer over 30 s
Anthropometry | Height, body mass, arm span, circumferences, and limb lengths | General | Measures the dimensions and proportions of the human body
Balance and stability | Balance error scoring system (BESS) | General | Assesses static balance by counting errors during six 20-s stance conditions performed on firm and foam surfaces, with errors including opening eyes, lifting hands from hips, stepping or stumbling, or moving from the test position
Star excursion balance test (SEBT) | General | Evaluates dynamic balance and neuromuscular control by having individuals maintain single-leg stance while reaching with their free leg in eight different directions arranged in a star pattern, measuring their maximum reach distance in each direction
Body composition | Air displacement plethysmography | General | Measures body composition by calculating body volume and density through the displacement of air in a sealed chamber (e.g., the Bod Pod device)
Bioelectrical impedance | General | Estimates body fat by measuring the resistance to a small electrical current passed through the body
Dual X-ray absorptiometry (DXA) | General | Measures body composition by using low-dose X-ray beams at two different energy levels to distinguish between bone, fat tissue, and lean mass throughout the body
Skinfolds | General | Estimates body fat percentage by using calipers to measure subcutaneous fat thickness at specific sites on the body, which are then entered into prediction equations
Underwater weighing | General | Measures body composition by submerging a person in water and using their underwater weight to calculate body density and estimate body fat percentage based on Archimedes' principle
Flexibility | Sit and reach | General | Assesses hamstring and lower back flexibility by measuring how far a person can reach forward while sitting with legs extended
Overhead squat | General | Used as a part of movement screens to assess bilateral mobility of hips, knees, and ankles along with shoulder and thoracic spine
Muscular endurance | Plank | General | Measures core strength and endurance by maintaining a plank position for as long as possible
Push-up | General | Measures upper body muscular endurance by completing as many repetitions as possible in a certain time or to the point of exhaustion
Maximum muscular power | Vertical jump | Basketball, volleyball, American football | Measures lower body explosive power by the height achieved in a vertical jump
Standing long jump | Track and field, American football | Measures horizontal explosive power by the distance jumped from a standing position
1RM power clean | Weightlifting, track and field, rugby, American football | Assesses the maximum weight that can be lifted during the power clean exercise
Maximum muscular strength | 1RM for the upper body (e.g., bench press or bench pull) | American football, rugby, powerlifting | Measures maximal upper body strength by determining the maximum weight that can be lifted once
1RM for the lower body (e.g., back squat, front squat, deadlift) | American football, rugby, powerlifting | Measures maximal lower body strength by determining the maximum weight that can be lifted once
Isometric mid-thigh pull | Weightlifting, track and field, American football, rugby | Assesses maximal isometric strength by pulling on an immovable bar
Speed | 40-yard (37 m) sprint | American football, rugby | Measures sprinting speed over a specific distance

