TYPE
Definition

TITLE
Osteopenia

PAGE
418

SECTION
7.2 — Older Adults

ORIGINAL TEXT
Osteopenia is defined by a bone mineral density between −1 and −2.5 standard deviations (SD) of the young adult mean, whereas osteoporosis is defined by a bone mineral density below −2.5 SD of the young adult mean (119).

END

