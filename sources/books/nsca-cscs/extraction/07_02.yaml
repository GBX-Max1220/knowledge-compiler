TYPE
Warning

TITLE
Valsalva Maneuver Risk for Older Adults

PAGE
428-429

SECTION
7.2 — Older Adults

ORIGINAL TEXT
Strength and conditioning professionals should be aware of the potential risks of breath holding (Valsalva maneuver) for older adults (76). While the Valsalva maneuver assists in stabilizing the trunk and vertebral column during performance of various resistance training exercises, owing to the sudden rise in systolic and diastolic blood pressure that the technique creates, this technique is generally discouraged in seniors (1, 149), especially in those individuals with absolute and relative contraindications (e.g., those with coronary heart disease, uncontrolled hypertension, musculoskeletal limitations, and pacemakers or defibrillators) (76).

END

