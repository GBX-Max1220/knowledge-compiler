Evidence

TITLE
Resistance Training Increases Strength in Very Old Adults

PAGE
424

SECTION
7.2 — Older Adults

ORIGINAL TEXT
In a seminal study, the ability of very old men and women (87-96 years old) to improve muscular strength was demonstrated following only eight weeks of resistance training (73).

END

TYPE
Evidence

TITLE
High-Velocity Power Training vs. Traditional Resistance Training in Older Adults

PAGE
425

SECTION
7.2 — Older Adults

ORIGINAL TEXT
Fielding and colleagues (74) showed that older adults who completed high-velocity resistance training made greater gains in peak power and similar gains in maximum strength compared to seniors who trained at slower velocities over a 16-week training period.

END

TYPE
Evidence

TITLE
Resistance Training Increases BMD in Older Adults

PAGE
426

SECTION
7.2 — Older Adults

ORIGINAL TEXT
meta-analytical data on 1,130 participants (mean age ~70 yrs) indicate that progressive resistance training programs stimulated significant increases in muscle strength and BMD of the femur/hip, with adaptations in both strength and BMD favoring lower volumes and higher external loads (173).

END

