SECTION
7.2 — Older Adults

ORIGINAL TEXT
Current recommendations for increasing power in healthy older adults include the performance of 1 to 3 sets per exercise with a light to moderate load (40%-60% 1RM) in concentric movements for 6 to 10 repetitions with high repetition velocity (76).

