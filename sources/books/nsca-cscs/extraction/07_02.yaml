TITLE
Initial Training Intensity and Volume for Untrained Seniors

PAGE
429

SECTION
7.2 — Older Adults

ORIGINAL TEXT
Untrained seniors who begin resistance training should start at a relatively low exercise intensity and volume, and the exercise prescription should be individualized (76).

END

TYPE
Recommendation

TITLE
Progression for Seniors from Low to Higher Intensity

PAGE
430

SECTION
7.2 — Older Adults

ORIGINAL TEXT
Seniors should gradually progress from 1 set of 8 to 12 repetitions at a relatively low intensity (e.g., 40%-50% 1RM) to higher training volumes and intensities (e.g., 3 sets per exercise with 60%-80% of 1RM), depending on individual needs, goals, and abilities (76, 82).

END

TYPE
Recommendation

TITLE
Warm-Up for Older Adults

PAGE
432

SECTION
7.2 — Older Adults

ORIGINAL TEXT
Participants should warm up for 5 to 10 minutes before each exercise session. An acceptable warm-up includes low- to moderate-intensity aerobic activity and calisthenics.

END

