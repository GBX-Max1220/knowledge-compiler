TITLE
Tire Flipping (Shoulders-Against-the-Tire Technique): Common Technical Flaws and Corrections

PAGE
1123-1124

SECTION
17.1 — Exercise Technique for Alternative Modes and Nontraditional Implement Training

ORIGINAL TEXT
Tire Flipping (Shoulders-Against-the-Tire Technique): Common Technical Flaws and Corrections
Flaw: Placing the feet too close to the tire when initiating the movement.
When this occurs, athletes often have to round their back and position their knees close to their chest in order to initiate the movement.
Correction: Have athletes move their feet away from the tire, and instruct them to brace their spine and use a forceful triple extension of the lower extremities that raises their chest and tire off the ground.
Flaw: Hips rise faster than the shoulders during the initial pushing motion.
This flaw is very similar to what can be seen during traditional deadlifting with incorrect technique.
Correction: Instruct athletes to keep their hips low and drive the tire forward rather than lifting it.
Flaw: A lifting motion is used instead of a pushing motion.
With heavier tires, this motion reduces the lifting speed; the tire will lose momentum as it is elevated to hip height, forcing the athlete to "muscle" the tire over. This position places substantially greater load on the biceps and the risk of biceps injury, and the tire is also more likely to fall backward onto the athlete.
Correction: The athlete should be encouraged to drive the tire forward and move forward with the tire as it is elevated. One cue is to strike the tire with the quadriceps at hip height and continue a forward movement pattern.

