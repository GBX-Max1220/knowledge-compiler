ORIGINAL TEXT
Similar to how resistance is applied with the use of chains, the use of bands requires the strength and conditioning professional to determine how much load is provided by the free weight and how much is provided from the bands throughout the range of movement (8). Specifically, the strength and conditioning professional must determine the load of the band at the bottom and top portions of the movement and create an average of these two loads. Based on the recommendations of Baker (8), an athlete who wants to train at a 5RM load of 150 kilograms (331 lb) with bands would subtract the average of the two band positions (i.e., top and bottom) and reduce the load on the bar by that amount. So if the band exerts a zero resistance load at the bottom of the movement and a load of 26.6 kilograms (58.6 lb) at the top position (i.e., lockout in the bench press), based on the length of the band achieved as it is stretched, the athlete would subtract 13.3 kilograms (29.3 lb) from the total weight on the bar without the bands to get 136 to 137 kilograms (300-302 lb).

