TITLE
Stimulating Bone Formation

PAGE
315

SECTION
Chapter 5 — Adaptations to Anaerobic Training — Connective Tissue Adaptations — How Can Athletes Stimulate Bone Formation?

ORIGINAL TEXT
Select multijoint, compound exercises that involve many muscle groups at once.
Select some exercises that direct axial force vectors through the spine and hip.
Use both heavy-load exercises and ballistic or high-impact exercises to expose the bone to different intensities of force.
Use multidirectional movements that incorporate all planes of motion to stimulate growth in different areas of the bone.
Use the principle of progressive overload to stress the musculoskeletal system and continue to progressively increase load as the tissues become accustomed to the stimulus.

