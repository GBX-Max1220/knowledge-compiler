TYPE
Definition

TITLE
Anaerobic Training

PAGE
281-282

SECTION
Chapter 5 — Adaptations to Anaerobic Training

ORIGINAL TEXT
Characterized by high-intensity, intermittent bouts of exercise, anaerobic training requires adenosine triphosphate (ATP) to be regenerated at a faster rate than can be produced by oxidative metabolism alone. Consequently, the energy requirement relies on a greater proportion of energy coming from non-oxidative energy systems, which include the phosphagen or creatine phosphate system and a smaller proportion coming from glycolysis. Thus, the term anaerobic training is used in this text to describe exercise training that is performed at intensities that rely primarily on non-oxidative metabolism to meet energy demands.

END

TYPE
Definition

TITLE
Motor Unit

PAGE
289

SECTION
Chapter 5 — Adaptations to Anaerobic Training — Neural Adaptations — Adaptations of Motor Units

ORIGINAL TEXT
The functional unit of the neuromuscular system is the motor unit. Consisting of the alpha motor neuron and the muscle fibers that it activates, a motor unit may innervate <10 muscle fibers for small, intricate muscles or >100 fibers for large, powerful trunk and limb muscles.

END

TYPE
Definition

TITLE
Henneman's Size Principle

PAGE
290

SECTION
Chapter 5 — Adaptations to Anaerobic Training — Neural Adaptations — Adaptations of Motor Units

ORIGINAL TEXT
The recruitment or decruitment of motor units in an orderly manner is governed by Henneman's size principle (figure 5.2), which represents the relationship between motor unit twitch force and recruitment threshold (140). According to this principle, motor units are recruited in an ascending order according to their soma size. Thus, motor units with small motor neurons have lower recruitment thresholds than do motor units with large motor neurons.

END

