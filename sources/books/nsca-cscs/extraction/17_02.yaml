TYPE
Procedure

TITLE
Tire Flipping Techniques — Sumo, Backlift, and Shoulders-Against-the-Tire

PAGE
1122-1123

SECTION
17.2 — Core Stability and Balance Training

ORIGINAL TEXT
Three basic techniques have been used to describe tire flip techniques: the sumo, the backlift style, and shoulders-against-the-tire technique (21, 147). The sumo and backlift styles are somewhat similar in that the feet are placed close to the tire, but they differ on the width of the feet, somewhat similar to the sumo and conventional deadlift starting positions, respectively (147). With these two techniques, once the tire has been raised to hip or chest height, the hands are rotated so that a forward pressing action can be performed with the arms to flip the tire (147). The shoulders-against-the-tire technique has a similar starting position to a rugby scrum or prowler push, with the athlete's face almost touching the tire, trunk horizontal, and the feet positioned behind the body so that the shins are horizontal, with the knees positioned slightly in front of the hips and flexed to approximately 90 degrees (21).

END

TYPE
Decision Rule

TITLE
Accentuated Eccentric Loading — Set Structure Strategies

PAGE
1116-1117

SECTION
17.2 — Core Stability and Balance Training

ORIGINAL TEXT
When programming AEL, three basic strategies can be implemented: using AEL on every repetition contained within the set, only applying AEL on the first repetition of the set, or using AEL on the first repetition of a cluster set (figure 17.8) (51). When AEL is applied on every repetition of a set the set must be structured with a cluster set format (i.e., 15-40 s interrepetition rest) so that the weight releaser can be reapplied after every repetition (figure 17.8a). The rest interval applied should be structured to account for the time needed to reapply the weight releaser and to re-rack and un-rack the bar. Alternatively, the AEL can be applied on the first repetition of the set, which allows the repetitions contained in the set to be performed in a continuous manner with enhanced movement velocity occurring during the later repetitions contained within the set (figure 17.8b) (51). For example, Merrigan and colleagues (92) report that when supramaximal loads are applied on only the first repetition of a set of 5 the velocity of movement during repetitions 3 and 5 is significantly enhanced. Based on these data, a hybrid strategy could be employed where a series of cluster sets of 3 repetitions could be performed with the AEL applied on the first repetition and 25 to 35 seconds of intraset rest applied between clusters (figure 17.8c).

END

