One variable resistance training strategy that addresses this differential is the use of accentuated eccentric loading (AEL) , which is sometimes referred to as augmented eccentric loading (95, 132). With this loading strategy, an additional load is applied during the eccentric phase of the movement and then removed during the concentric phase of the movement.

