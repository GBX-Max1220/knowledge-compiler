SECTION
Chapter 23 — Rehabilitation, Reconditioning, and Medical Issues

ORIGINAL TEXT
Prevention strategies include proper acclimation to training in hot environments and ensuring proper hydration before, during, and after training. A key element of prevention resides in recognizing that heat illness exists on a continuum of events all related to dysregulation of the body's thermoregulatory capacity. As such, heatstroke is likely to be preceded by heat cramps, syncope, and heat exhaustion. Recognizing the presentation of heat cramps or heat exhaustion before heatstroke is paramount to prevention.

