TITLE
Table 20.2 — Assistance and Resistance Training for Speed Development

PAGE
1432–1435

SECTION
20.3 — Running Speed Development

ORIGINAL TEXT
TABLE 20.2  Assistance and Resistance Training for Speed Development
Type of training | Example exercise modalities | Potential benefits | Potential disadvantages | Practical use suggestions
Assistance training (e.g., overspeed training) | Inclusive of modalities such as rope towing, bungee cord pulls, or downhill running with the intention of allowing the athlete to run at supramaximal speeds | Theoretically, these training tools are used to potentially expose the athlete to higher velocities than one can achieve in unassisted sprinting by inducing an increased step or stride rate and exposing the athlete to higher hip angular velocities (46). This increased step rate is hypothesized to have potential for neuromuscular adaptations to increase maximal sprint velocity. Increases in overspeed should be limited to ≤10%. | Assisted sprinting may prematurely rush an athlete’s stance phase, thus removing time needed to exert optimal forces, and has been shown to result in decreased muscle activation and propulsive force production in comparison to maximal running (66). Therefore, what can be described as chop steps may be observed. Undesirable techniques such as leaning back and overstriding may be present in a protective manner to brake, which is suboptimal. Exercises that rely on the towing of athletes may increase braking forces in comparison to maximal running (66) as athletes attempt to tolerate velocities they cannot naturally create or accommodate because of biomechanical efficiency, training state, or both. Downhill sprinting may expose the athlete to unnecessary eccentric forces through a modified stance leg that results from having to find the ground. This may also affect the SSC, which is optimized through the foot placement occurring just in front of the center of mass on ground contact in flat-surface upright sprinting (66). To date, very little research supports the implementation of overspeed training, because sprint success results from an athlete’s ability to produce large forces in a short ground contact time. | Top-speed sprinting should be developed through more natural and safer training tools that consider an athlete’s training status and support optimal biomechanics. Strength and conditioning professionals should carefully assess the implications of assistance modalities before implementation and these modalities may be best used when working with advanced or elite athletes.
Resistance sprinting | Inclusive of training modalities such as sled towing, sled pushing, wind resistance, incline sprinting, and sled pushing with the intention of improving an athlete’s accelerative abilities | Accentuates the biomechanics of the acceleration phase by placing the athlete in a position that promotes lowered torso (i.e., forward trunk lean), hips, and shin angles. Resisted sprinting may optimize an athlete’s ability to cover short distances quickly by overloading the acceleration phase, resulting in ground contact times that produce higher propulsive forces. Improving acceleration, which is a change in velocity, may lead to an increase in top speed through enhanced RFD. Resisted sprints and loads, and velocity decrements, can be manipulated to target technical, speed–strength, power, and strength–speed qualities (19, 20). It may offer specificity to sporting scenarios when athletes need to push (move) external mass such as in bobsled, rugby, and American football. | Sprint efforts against a load that is too great may lead to longer ground contact times in addition to shorter step lengths that are not task specific (59). Slopes of incline that are too great may modify proper sprinting biomechanics, resulting in a rehearsal of improper technique and thus limiting transfer of training effect. Sled pushing may alter the natural sprinting gait cycle due to the removal of arm action that synchronizes and counterbalances the leg action occurring at the hip. | Strength and conditioning professionals and athletes attempting to improve the acceleration phase of a sprint may adopt resistance training modalities that maintain normal biomechanics involved in unresisted sprints. Loads should be chosen based on the sporting context while also considering the athlete’s physical status. For instance, track and field sprinters may use loads that do not decrease running velocity by more than 10% to 12% (2, 49, 52, 61). In contrast, field sport athletes who overcome external resistance while blocking, tackling, and scrimmaging can use loads 20% to 30% of body weight to improve the initial 5-10 m of movement (28, 52). Frictional properties will influence the amount of resistance experienced, thus prescribing sled pushes and pulls based on velocity decrements is suggested (19, 20).

END

