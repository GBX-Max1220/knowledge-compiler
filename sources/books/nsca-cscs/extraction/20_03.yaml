TYPE
Recommendation

TITLE
Training Goals for Agility Performance

PAGE
1453

SECTION
20.3 — Running Speed Development

ORIGINAL TEXT
The three goals to enhance agility performance through training are to develop the physical qualities to allow athletes to adopt the required postures and positions for a range of different agility movements performed in the sport as well as enhance braking and propulsion of such tasks (action capacity); to develop movement efficiency and competency of range of agility movements pertinent to the athlete’s sport, and to enhance perceptual-cognitive ability in various situations and tactical scenarios (35).

END