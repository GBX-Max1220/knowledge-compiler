TITLE
COD Cutting Angle Threshold — Shallow vs. Aggressive

PAGE
1438–1439

SECTION
20.3 — Running Speed Development

ORIGINAL TEXT
COD and agility movements performed at shallow cutting angles (less than 75 degrees) and associated with shorter ground contact times (less than 250 ms) (94) benefit from training similar to speed training with regard to the physical demands but still require additional perceptual-cognitive training. On the other hand, when a COD involves a more aggressive cutting angle (equal to or greater than 75 degrees), the length of ground contact time can often exceed 250 milliseconds (8, 48, 64, 36) due to the greater braking requirements.

END

