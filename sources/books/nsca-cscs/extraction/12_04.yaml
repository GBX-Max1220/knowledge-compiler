TYPE
Evidence

TITLE
Efficacy of Preworkout Energy Drinks for Resistance Exercise

PAGE
721

SECTION
12.4 — Conclusion

ORIGINAL TEXT
Forbes and colleagues (70) gave 15 physically active college-aged students a commercially available energy drink or an isocaloric noncaffeinated placebo 60 minutes before exercise. The energy drink was standardized with 2 milligrams of caffeine per kilogram body mass. The exercise bout consisted of 3 sets of 70% 1RM bench press conducted to failure on each set with 1 minute of rest between each set. The energy drink significantly increased bench press performance as compared to the placebo treatment. Other studies investigating the effects of preworkout energy drink consumption have also reported improvements in upper and lower body total lifting volume (54, 86).

END

TYPE
Evidence

TITLE
Efficacy of Ephedrine Combined with Caffeine

PAGE
723

SECTION
12.4 — Conclusion

ORIGINAL TEXT
Studies examining the ergogenic effect of ephedrine have shown it to be effective only when it is taken in combination with caffeine (21). These results have been quite consistent with regard to improving aerobic endurance performance (20). In terms of anaerobic exercise performance, the scientific literature investigating the combination of ephedrine and caffeine is equivocal (224). However, side effects (vomiting and nausea) following exercise have been reported in 25% of the subjects ingesting a mixture of 5 milligrams per kilogram caffeine and 1 milligram per kilogram ephedrine (19). A subsequent study performed by the same investigators showed that at a lower dose (4 mg/kg caffeine and 0.8 mg/kg ephedrine), similar ergogenic benefits were realized with no side effects (20).

END

