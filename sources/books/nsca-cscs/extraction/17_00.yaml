TITLE
Determining Load with Chains

PAGE
1104-1105

SECTION
Chapter 17 — Exercise Technique for Alternative Modes and Nontraditional Implement Training

ORIGINAL TEXT
To determine the load used with chains, the absolute chain resistance at the top and at the bottom portion of the movement are summed and then averaged. For example, if athletes wanted to train at a 5-repetition maximum (5RM) load in the bench press, they would first determine the 5RM load without the chains. Then, if their 5RM is 120 kilograms (265 lb), they would subtract the average chain resistance from this load. If at the bottom position the load is 0 kilograms and at the top the chain load is 11.1 kilograms (24.5 lb), the average is 5.55 kilograms (12.2 lb). Thus, the athlete would add 114 to 115 kilograms (251.3-253.5 lb) to the barbell to achieve the appropriate loading.

