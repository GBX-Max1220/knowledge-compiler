TYPE
Recommendation

TITLE
Mental Health Support Considerations

PAGE
511

SECTION
9.5 — Attention and Focus

ORIGINAL TEXT
Social norms and the environment should be considered when helping an athlete seek mental health support. Athletes in team sports may wish to have privacy while getting support. Because social stigmas and mental health treatment can sometimes clash, the strength and conditioning professional should attempt to be aware of individual preferences and readiness for support. Not all mental health issues are covered in this chapter (e.g., substance abuse, eating disorders, bullying or hazing, body dysmorphia, gender identity, social phobias, and trauma) so further education is recommended for strength and conditioning professionals as they work with diverse populations of athletes.

END

