TITLE
Cognitive Appraisal Model

PAGE
516

SECTION
9.5 — Attention and Focus

ORIGINAL TEXT
The Cognitive Appraisal Model (66) proposes four key components that may influence how athletes judge their injury and how it affects their emotional and recovery response due to injury (figure 9.5).

END

TYPE
Definition

TITLE
Personal Factors (Cognitive Appraisal Model)

PAGE
516-517

SECTION
9.5 — Attention and Focus

ORIGINAL TEXT
Personal Factors: History of injury. Is this injury acute or chronic? Has the athlete experienced this injury before? Athletic identity. Does the athlete highly identify as an athlete and look to others for acknowledgment of that role? According to a 2022 study, almost 40% of student-athletes have a high athletic identity, strongly serving as a foundation of their self-worth (2). Personality. Is the athlete naturally confident and outgoing or introverted? Do they chronically worry about what they cannot accomplish or perform? Pain tolerance. How well does the athlete tolerate discomfort during training and rehabilitation? Coping skills. How has the athlete managed stressful situations in the past? Do they engage in positive (e.g., regular physical activity or relaxation strategies) or negative (e.g., risky activities or avoidant behaviors) coping strategies? Age and sex. Does the athlete have specific concerns due to their age (e.g., transportation) or sex (biological differences such as energy availability or hormonal differences)?

PARENT
Cognitive Appraisal Model

END

TYPE
Definition

TITLE
Situational Factors (Cognitive Appraisal Model)

PAGE
518

SECTION
9.5 — Attention and Focus

ORIGINAL TEXT
Situational Factors: Sport type. Is it individual or team based? Is there a high risk of reinjury based on the sport? Level of competition. Is this a high school athlete or a professional athlete? Social support. Is the athlete surrounded by friends, family, and teammates for emotional and social support? Social support helps one learn that they are valued and supported regardless of athletic performance or the identity as a competitive athlete (63). Sports medicine team. Does the athlete have proper access to a professional rehabilitative team? Rehabilitation environment. Similarly, where is the athlete rehabilitating their injury? Does it require a lengthy commute? Is it adequate for proper sport-specific movements? Coach influence. Does the sport coach actively support the athlete during the rehab process? Is there pressure to return as soon as possible with the athlete fearing losing his or her position? Coaches should be attentive to the possibility that athletes could be struggling with challenges related to conflicts with coaches who may not understand the extent of their injuries; suggest that they are weak; and may explicitly minimize, invalidate, or dismiss the athlete's struggles (60).

PARENT
Cognitive Appraisal Model

END

TYPE
Definition

TITLE
Behavioral Responses (Cognitive Appraisal Model)

PAGE
519

SECTION
9.5 — Attention and Focus

ORIGINAL TEXT
Behavioral Responses: Adherence to rehabilitation. Does the athlete demonstrate consistency and commitment to the active process? Use of psychological skills. Are techniques such as goal setting, imagery, and visualization integrated to improve their recovery timeline? Effort and intensity. How does the athlete's level of motivation change over time? Malingering. Does the athlete exacerbate pain or readiness levels to avoid future responsibilities or changes in their timeline? Risk-taking. Does the athlete engage in activities that have not yet been cleared for participation? Do they avoid certain activities because they feel they are not yet ready to perform?

PARENT
Cognitive Appraisal Model

END

TYPE
Definition

TITLE
Emotional Responses (Cognitive Appraisal Model)

PAGE
519-520

SECTION
9.5 — Attention and Focus

ORIGINAL TEXT
Emotional Responses: Injury-related fear. How does the athlete embrace progressive overload into more sport-specific movements? Tension, anger, depression. Has the injury created conflict within the athlete's normal activities of daily living and sports participation? Frustration and boredom. Is the rehabilitation process mentally engaging and motivating? Grief. Was there a loss in a specific competition or season? Did the athlete lose his or her position or formal role with the team due to the injury? Positive outlook. Does the athlete view this setback as an opportunity to rebuild and improve?

PARENT
Cognitive Appraisal Model

END

