```
TYPE
Definition

TITLE
Sample Program Objectives

PAGE
1778-1779

SECTION
26.1 — Mission Statement and Program Goals

ORIGINAL TEXT
Following is a sample list of objectives that can lead to reaching program goals and prepare a strength and conditioning professional to handle the job requirements:
Design and administer strength, flexibility, aerobic, plyometric, and other training programs that reduce the likelihood of injuries and improve athletic performance. More precisely, design training programs that create the desired results in body composition, hypertrophy, strength, muscular endurance, aerobic endurance, speed, agility, and power and enhance movement efficiency.
Develop training programs to account for biomechanical and physiological differences between individual athletes, taking into consideration their ages, sex, training status, physical limitations, and injury status.
Recognize acute and chronic physiological responses and adaptations to training and their implications for the design of sport-specific training programs.
Educate athletes on the importance of proper nutrition as well as sleep and its role in health and performance.
Educate athletes about the effects of performance-enhancing substances and their abuse, relevant school policy, and legislation.

PARENT
Program Objectives

END
