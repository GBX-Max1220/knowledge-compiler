TITLE
Straight-Line Sprint Tests Protocol

PAGE
809-810

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Have the athlete warm up and dynamically stretch for several minutes.
2. Allow at least two practice runs at submaximal speed.
3. The athlete assumes a starting position using a three- or four-point stance.
4. On an auditory signal, the athlete sprints the specified distance at maximal speed.
5. The best split times of two trials are recorded to the nearest 0.1 second.
6. Allow at least 2 minutes of active recovery or rest between trials.

END

TYPE
Procedure

TITLE
Balance Error Scoring System (BESS) Protocol

PAGE
810

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. The six positions of the BESS are shown in figure 14.26.
2. The three stance positions are double-leg stance with feet together, single-leg stance on the nondominant foot with contralateral leg in approximately 90 degrees of flexion, and tandem stance with the dominant foot in front of the nondominant foot (128). The test is conducted on a firm surface and on a soft surface.
3. The stances are held for 20 seconds with eyes closed and hands on hips for each condition.
4. Athletes are told to keep as steady as possible, and if they lose balance, they attempt to regain their initial position as quickly as possible.
5. Errors include opening eyes; lifting the hands from the hips; touchdown of nonstance foot; step, hop, or other movement of the stance foot or feet; lifting the forefeet or heel; moving the hip into more than 30 degrees of hip flexion or abduction; or remaining out of position for more than 5 seconds.
6. The error scores from the BESS test are summed into a single score.

END