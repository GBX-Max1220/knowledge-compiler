TYPE
Procedure

TITLE
Vertical Jump (Countermovement Jump) — Force Plate Protocol

PAGE
786

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure (Using a Force Plate)
1. Before testing, the tester should calibrate and set up the force plate as per the manufacturer’s instructions.
2. The force plate should always be set up on a stable surface (ideally in the same location each time) and the force zeroed with nothing on the plates immediately before the athlete tests. Without a preparatory or stutter step, the athlete performs a countermovement by quickly flexing the knees and hips, moving the trunk forward and downward, and swinging the arms backward.
3. The countermovement jump is most commonly conducted with hands in a fixed position on the hips throughout the takeoff portion of the jump to isolate the power and coordination capacity of the lower limbs. Jumping with the use of an arm swing can also be tested and is referred to as an Abalakov jump. Either way, consistency should be used and each jump should be tracked as to whether it was performed with (Abalakov) or without an arm swing.
4. Figure 14.7 shows an example of how the vertical ground reaction forces change across the five phases of a vertical jump with a countermovement when measured with a force plate testing system.

END

TYPE
Procedure

TITLE
Vertical Jump (Countermovement Jump) — Wall and Chalk Protocol

PAGE
786

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure (Using a Wall and Chalk)
1. The tester rubs chalk on the fingertips of the athlete’s dominant hand.
2. The athlete stands with the dominant shoulder about 6 inches (15 cm) from the wall and, with both feet flat on the floor, reaches as high as possible with the dominant hand and makes a chalk mark on the wall.
3. The athlete then lowers the dominant hand and, without a preparatory or stutter step, performs a countermovement by quickly flexing the knees and hips, moving the trunk forward and downward, and swinging the arms backward. During the jump, the dominant arm reaches upward while the nondominant arm moves downward relative to the body.
4. At the highest point in the jump, the athlete places a second chalk mark on the wall with the fingers of the dominant hand, using a swiping motion of the fingers. The score is the vertical distance between the two chalk marks.
5. The best of three trials is recorded to the nearest 0.5 inch or 1.0 centimeter.

END

TYPE
Procedure

TITLE
Vertical Jump (Countermovement Jump) — Commercial Vertec Device Protocol

PAGE
786-787

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure (Using a Commercial Vertec Device)
1. The tester adjusts the height of the stack of movable color-coded horizontal plastic vanes to be within the athlete’s standing reach height. The highest vane that can be reached and pushed forward with the dominant hand while the athlete stands flat-footed determines the standing touch height.
2. The vane stack is then raised by a measured distance (marked on the shaft holding the vanes) so that the athlete will not jump higher or lower than the set of vanes. This requires a rough estimate of how high the particular athlete will jump, but a correction can be made on the second attempt if necessary.
3. Without a preparatory or stutter step, the athlete performs a countermovement by quickly flexing the knees and hips, moving the trunk forward and downward, and swinging the arms backward (figure 14.8a). During the jump, the dominant arm reaches upward while the nondominant arm moves downward relative to the body.
4. At the highest point in the jump, the athlete taps the highest possible vane with the fingers of the dominant hand (figure 14.8b). The score is the vertical distance between the height of the highest vane tapped during the standing vertical reach and the vane tapped at the highest point of the jump.
5. The best of three trials is recorded to the nearest 0.5 inches or 1 centimeter (the distance between adjacent vanes).

END

TYPE
Warning

TITLE
Potential Sources of Error with Jump-and-Reach-Style Tests

PAGE
787

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
The strength and conditioning professional should be aware of potential sources of error with the jump-and-reach-style tests. These include a disconnect between the moment when the athlete reaches the wall or vanes with the hand and the moment the maximum height of the body’s center of mass is achieved; additionally, shoulder mobility issues may limit some athlete’s reach height. Also, jump height values calculated using common technologies such as force plates and contact mats are most often measured as the maximum total body center of mass height relative to its height at takeoff and not relative to its height when standing still (158). Thus, jump height values from jump-and-reach tests should not be compared directly to, or used interchangeably with, jump height values recorded with such technologies or, indeed, with different jump techniques, such as when keeping arms akimbo.

END

TYPE
Procedure

TITLE
Squat Jump (Static Vertical Jump) Protocol

PAGE
788

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. The test procedures are essentially the same as for the vertical jump, except that the countermovement is removed. Begin with the athlete standing on a calibrated, zeroed force platform. (Note: The squat jump and vertical jump with countermovement can also be tested using a switch or contact mat system (figure 14.9) [158], which estimates jump height [51] but cannot measure force outputs.)
2. The athlete descends into a squat position (knee angle approximately 110 degrees) and holds this position for 2 to 3 seconds before jumping vertically, keeping hands fixed on hips.
3. The takeoff and landing positions, as well as jumping strategy, should be the same for each trial. Specifically, the tester should ensure there is no countermovement (dip) at the start of the jump, both through visual observation and, where a force plate is used, by assessing the force–time curve.
4. The best of three trials is recorded. The ratio of the vertical jump height with countermovement to squat jump height can be calculated as the eccentric utilization ratio (99).
5. Figure 14.10 shows an example of how the vertical ground reaction forces change across the three phases of a static vertical jump when measured with a force plate testing system.

END

TYPE
Procedure

TITLE
Drop Jump Protocol

PAGE
790

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. When performing a drop vertical jump, the athlete should step out before free-falling from as close as possible to the height of the box rather than stepping down (i.e., lowering) or jumping off (i.e., rising) the box. Box height selection for an athlete can vary but is typically 20 centimeters (8 in.), 30 centimeters (12 in.), or 40 centimeters (16 in.) (figure 14.11a). The higher the box, the greater the plyometric demand. When using a device that is not flush with the ground or base of the box when conducting the drop vertical jump test, such as when using a switch mat, the strength and conditioning professional should measure the box height from the top of the box to the top surface of the switch mat.
2. The athlete steps out from the box and lands on the floor, force plate, or switch mat (figure 14.11b) and, as quickly as possible, jumps again (figure 14.11c). Drop jumps should be performed with the athlete attempting to jump with a short ground contact time while still aiming to jump as high as possible. A short ground contact time is achieved by limiting flexion of the ankles, knees, and hips while in contact with the ground by adopting high leg stiffness (high force with shallow range of motion). It is advised that at least 2 to 3 sets are performed.
3. The most reported performance variables following drop vertical jump testing are jump height (from flight time), ground contact time, and reactive strength index (calculated as jump height divided by ground contact time) (91). The reactive strength index is often considered an indication of how well an athlete can recruit the fast component of the stretch-shortening cycle.
4. Figure 14.12 shows an example of the force–time curve with labels pointing out the peak vertical ground reaction force, contact time, and flight time when measured with a force plate testing system.

END

TYPE
Procedure

TITLE
Rebound Jump Protocol

PAGE
791-792

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Rebound-based vertical jumps require the athlete to jump from a preceding vertical jump. When performing a rebound vertical jump, the athlete should first complete a maximal-effort vertical countermovement jump followed by either a predetermined number of rebound vertical jump repetitions or a predetermined set duration (e.g., 10 seconds). Rebound vertical jumps from a ground-start position have been performed with single or multiple repetitions, including the 10-5 repeated jump test (64), which requires 10 maximal vertical rebound jumps following the initial maximum countermovement jump.
2. All styles of rebound vertical jump should be performed with the athlete attempting to jump with a short ground contact time while still aiming to jump as high as possible. A short ground contact time is achieved by limiting flexion of the ankles, knees, and hips while in contact with the ground by adopting high leg stiffness (high force with shallow range of motion).
3. As per the drop jump, the most reported performance variables following rebound vertical jump testing are jump height, ground contact time, and reactive strength index (calculated as jump height divided by ground contact time). For the 10-5 repeated jump test, the best 5 repetitions in terms of reactive strength index are used and averaged for the test outcome.

END

TYPE
Procedure

TITLE
Margaria-Kalamen Test Protocol

PAGE
792-793

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. The height of each step is measured with a ruler or tape measure, and the elevation from the third step to the ninth step is calculated (6 × step height).
2. The timer start switch mechanism is placed on the third step, and the stop switch mechanism is placed on the ninth step.
3. The athlete to be tested is weighed on a scale, warms up, and practices running up the stairs three steps at a time.
4. When ready, the athlete sprints toward the stairs from a standing start 20 feet (6 m) from the base of the stairs and then up the staircase three steps at a time (third step to sixth step to ninth step) as fast as possible.
5. The time from third- to ninth-step contact is determined to the nearest 0.01 second using the timing system.
6. Power in watts is calculated as the athlete’s weight (w) in newtons (lb × 4.45 or kg × 9.807) times height (h) in meters (inches × 0.0254) from the third step to the ninth step divided by the measured time interval (t) in seconds; P (watts) = (w × h) / t.
7. Repeat the test two more times with a 2- to 3-minute recovery period between each trial.

END

TYPE
Formula

TITLE
Margaria-Kalamen Test Power Calculation

PAGE
793

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
P (watts) = (w × h) / t

END

TYPE
Procedure

TITLE
Velocity-Based Testing (VBT) Protocol

PAGE
793

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Place the VBT device in a suitable position based on the type of data collection. For example, a linear position transducer will be placed under the barbell and tethered to the barbell, whereas an IMU sensor will be affixed directly to the barbell.
2. The exercise selected (e.g., bench press, squat, deadlift) will depend on the needs of the athlete, individual sport, and training session being performed. In the case of a back squat, follow the technique described in chapter 16.
3. From the measuring device, obtain the velocity of the barbell typically in meters per second, power measured in watts, and peak forces measured in newtons. Metrics may vary depending on the device used for testing or the individual purposes of the tester and athlete. As outlined earlier in the chapter, VBT data can be used to create a load–velocity profile.

END

TYPE
Procedure

TITLE
300-Yard (274 m) Shuttle Run Protocol

PAGE
794

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Pair off athletes of similar ability.
2. Position two athletes immediately behind one line, facing the other line.
3. On an auditory signal, the athletes sprint to the line 25 yards (23 m) away, making foot contact with it, then immediately sprint back to the first line. Six such round trips are made as fast as possible without stopping (6 × 50 yd = 300 yd [274 m]).
4. On completion of the first trial, record both athletes’ times to the nearest 0.1 second and start a clock to time a 5-minute rest interval. As each pair of athletes completes the first trial, they may walk and stretch but must stay alert for the starting time on the second trial.
5. After the rest period, the pair of athletes does another trial.
6. The average of two trials is recorded to the nearest 0.1 second.

END

TYPE
Procedure

TITLE
90-Second Box Jump Test Protocol

PAGE
795

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. The purpose of this test is to observe how many times the athlete can jump over the box in a left to right fashion over a duration of 90 seconds. The athlete begins on top of the box and then jumps down laterally to one side before jumping back up to the top of the box again. The athlete then repeats this procedure in the opposite direction. Each time the athlete reaches the top of the box counts as 1 repetition.
2. The athlete must leave the ground with two feet and touch the top of the box with two feet before jumping down to the other side. The athlete is not permitted to step up onto the box.
3. This is repeated for as many times as the athlete is able to during the 90-second duration of the test. The tester should record the number of hops taken with proper form over the course of the test.

END

TYPE
Definition

TITLE
Partial Curl-Up Test

PAGE
795

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
The partial curl-up test measures the muscular endurance of the abdominal muscles. It is favored over the sit-up test because it eliminates the use of the hip flexor muscles.

END

TYPE
Procedure

TITLE
Partial Curl-Up Test Protocol

PAGE
795-796

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. The athlete assumes a supine position on a mat with a 90-degree knee angle (figure 14.15a). The arms are at the sides, resting on the floor, with the fingers touching a 4-inch-long (10 cm) piece of masking tape positioned perpendicular to the fingers. A second piece of masking tape is situated parallel to the first tape at a distance determined by the age of the athlete (4.7 inches [12 cm] for those younger than 45 and 3.1 inches [8 cm] for those 45 or older).
2. Set a metronome to 40 beats/min and have the athlete do slow, controlled curl-ups to lift the shoulder blades off the mat (trunk makes a 30-degree angle with the mat; figure 14.15b) in time with the metronome (20 curl-ups per minute). The upper back must touch the floor before each curl-up. The athlete should avoid flexing the neck to bring the chin close to the chest.
3. The athlete performs as many curl-ups as possible without pausing, to a maximum of 75.

END

TYPE
Threshold

TITLE
Partial Curl-Up Tape Distance by Age

PAGE
795-796

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
4.7 inches [12 cm] for those younger than 45 and 3.1 inches [8 cm] for those 45 or older

END

TYPE
Procedure

TITLE
Push-Up Test Protocol

PAGE
796-797

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedures
1. Assume the standard push-up starting position with the hands shoulder-width apart and elbows and body straight (figure 14.16a). The bottom position for the standard push-up is when the chest makes contact with the recorder’s fist held vertically against the ground (not shown in figure 14.16b).
2. A modified version establishes a starting position with the knees rather than the feet contacting the ground; the knees should be flexed to 90 degrees with the ankles crossed (figure 14.17a). There is no standard criterion for the bottom position of the modified push-up (44), but it has been suggested that the torso should come in contact with a foam roller rather than a fist (figure 14.17b).
3. For either version, repetitions that do not achieve the bottom position are not counted.

END

TYPE
Procedure

TITLE
Army Fitness Test (AFT) Hand-Release Push-Up (HRP) Protocol

PAGE
797-798

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. The starting position of this test will begin with the athlete lying prone on the ground with the chest, hips, and legs touching the ground (figure 14.18a). Hands are flat on the ground (rather than what is shown in the photo) with the index fingers inside of the shoulders. The feet should be no more than one boot-width part, and the toes should be touching the ground.
2. The tester will begin the test on the command of “Go,” and the athlete must perform as many push-ups as physically able in a 2-minute time period. The athlete should keep a straight line from the ankles to the head (figure 14.18b). It is not permissible to flex the knees or hips or to lift the feet off of the ground at any point during the test. After the athlete has fully extended the arms, he or she should lower the body back to the ground, allowing the chest, hips, and legs to contact the ground simultaneously. The tester should not count any repetitions in which a straight alignment of the body from head to feet is not maintained.
3. At the point at which the athlete’s body comes back into contact with the ground, two variants of this test are acceptable: the hand lift and the arm extension. If the hand lift variant is to be performed, the athlete should lift both hands so as to create visible space between the palms and the ground (figure 14.18c). The athlete should then return the hands to the starting position and begin another repetition. With the arm extension variant, once the athlete’s body has returned to the ground, the athlete will then extend the arms fully to form a 90-degree angle between the arms and the torso (figure 14.18d). The athlete should then return to the starting position and begin another repetition.
4. The athlete is not allowed to rest at any time during the test with the exception of the front rest position, which consists of the top position of the push-up with the arms fully extended and the body straight. If the tester observes that the athlete has remained motionless for more than 5 seconds, the test should be discontinued and the repetitions performed to this point counted as the athlete’s score for the test. The test will also be discontinued if the athlete lifts a foot off of the ground or touches a knee to the ground. Any breakdown in technique such as flexing the hips or knees should not be counted in the repetition total.

END

TYPE
Procedure

TITLE
YMCA Bench Press Test Protocol

PAGE
799

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Instruct the athlete in proper technique for the flat barbell bench press as described in chapter 16.
2. Allow the athlete to perform a specific warm-up of 5 to 10 repetitions with a light to moderate load.
3. The spotter/recorder stands at the head end of the bench throughout the test to help raise the bar on a failed attempt and to help the athlete place the bar back on the rack.
4. Set the resistance at 80 pounds (36 kg) for males and 35 pounds (16 kg) for females.
5. Set the metronome cadence at 60 beats/min to establish a rate of 30 repetitions per minute (one beat up, one beat down).
6. The athlete grips the bar at shoulder-width, lifts the bar off the rack, and extends the elbows. Then, in time with the metronome, the athlete repeatedly lowers the bar to the chest and raises it up again to full elbow extension, until the athlete can no longer keep up with the metronome. The movement should be smooth and controlled, with the bar reaching its highest and lowest position with each beat of the metronome.

END

TYPE
Procedure

TITLE
1.5-Mile (2.4 km) Run Protocol

PAGE
799-800

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Have each athlete warm up and stretch before the test.
2. Each athlete should be recognizable to the scorer at the finish line. If that is not possible, numbers should be pinned to the athletes’ shirts.
3. At the start, all athletes line up behind the starting line.
4. Instruct the athletes to complete the run as quickly as possible at a steady pace that they can barely maintain over the distance. (Note: Some athletes may have limited experience at pacing long efforts such as this, so some familiarization and prior pacing efforts in training are suggested.)
5. On an auditory signal, the athletes start running and cover the course as quickly as possible.
6. As the athletes cross the finish line, each person’s time is recorded on a form as a timer calls off the time in minutes and seconds (00:00).

END

TYPE
Procedure

TITLE
12-Minute Run Protocol

PAGE
800

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Athletes line up at the starting line.
2. On an auditory signal, the athletes travel by foot as far as possible in 12 minutes, preferably by running but, if necessary, by walking part or all of the time.
3. At 12 minutes, on an auditory signal, all the athletes stop in place.
4. The distance run by each athlete (laps × 400 m—e.g., 5.25 laps × 400 m = 2,100 m) is calculated and recorded.

END

TYPE
Definition

TITLE
Yo-Yo Intermittent Recovery Test

PAGE
800

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
The use of the Yo-Yo intermittent recovery tests (IRT1 and IRT2) is now commonplace in field testing protocols for team sports such as soccer and lacrosse (10, 18, 85). It is suggested that these tests are more specific to team sports because they mimic the demands of short, intense bursts of exercise followed by short recovery periods. Both tests consist of 2 × 20-meter (22 yd) shuttle runs at increasing speeds interspersed with a 10-second period of recovery, with the IRT1 starting at 10 km/h (6.2 mph) and the IRT2 starting at 13 km/h (8.1 mph). It is recommended that strength and conditioning professionals use the IRT1.

END

TYPE
Recommendation

TITLE
Yo-Yo Intermittent Recovery Test — Preferred Version

PAGE
800

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
It is recommended that strength and conditioning professionals use the IRT1.

END

TYPE
Procedure

TITLE
Yo-Yo Intermittent Recovery Test Protocol

PAGE
800-801

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Measure out a 20-meter (22 yd) test course and arrange cones as seen in figure 14.19. Place markers 2 meters (7 ft) apart at both ends of the test course at the start and turning lines. Also measure out a 5-meter (16 ft) distance behind the start line.
2. Have the athletes warm up and stretch before the test. The athletes should run the course with a submaximal effort for practice.
3. The test begins with the athletes standing at the start line.
4. On an auditory signal, the athletes run forward to the turning line. At the sound of the second signal, athletes arrive at the turning line and then run back to the starting line, arriving in time with the next sound.
5. When the start marker is passed, the athletes jog toward the 5-meter (16 ft) mark, then turn back to the start line. At this point the athletes stop and wait for the next sound.
6. The athletes are required to place one foot on or over the starting or turning line at the sound of each beep.
7. The athletes continue running for as long as they can maintain the increasing speed as indicated by the auditory signals.
8. The termination of the test is indicated by the inability of an athlete to maintain the required pace for two trials. A warning is given the first time the start or turning line is not reached.
9. At the end of the test, record the last level and number of 2 × 20-meter (22 yd) intervals performed at that level on a recording sheet.
10. The final Yo-Yo intermittent recovery speed and interval score can be used to calculate the total distance covered by the athlete during the test.

END

TYPE
Procedure

TITLE
Maximal Aerobic Speed Test Protocol

PAGE
802-803

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Marker cones are placed at 25-meter (27 yd) intervals around the running track.
2. The initial speed of the test is set between 8 and 12 km/h (5-7 mph) depending on the fitness level of the athlete. It is generally recommended that athletes start at 10 km/h (6 mph).
3. The speed is then increased by 1 km/h (0.6 mph) every 2 minutes until the athlete cannot maintain the speed.
4. The last speed maintained for at least 2 minutes is considered the speed associated with V̇O2max or MAS.
5. The test is terminated if the athlete fails to reach the next cone on two consecutive occasions in the required time.
6. The speed at the last completed stage is increased by 0.5 km/h if the athlete is able to run a half stage.
7. The V̇O2max of the athlete can be calculated by multiplying 3.5 × MAS (speed in km/h) (87, 88).
8. If the tester does not have access to the audio version, it is possible to conduct the test using a whistle. Calculate the timing of whistles using a set speed for reaching the next cone. For example, when the distance between cones is 25 meters, the timing of whistles for 10 km/h would be every 9 seconds.

END

TYPE
Formula

TITLE
Maximal Aerobic Speed Test — V̇O2max Calculation

PAGE
803

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
V̇O2max = 3.5 × MAS (speed in km/h)

END

TYPE
Procedure

TITLE
30-15 Intermittent Fitness Test (IFT) Protocol

PAGE
803

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Measure out and arrange the cones as shown in figure 14.20 (at lines A, B, and C).
2. Have the athletes warm up before the test by running the course with a submaximal effort for practice.
3. The test begins with the athletes standing at the start line (line A).
4. The first interval begins at a jogging speed of 8.0 km/h (5 mph). The speed is then increased by 0.5 km/h (0.3 mph) in each subsequent stage.
5. Athletes run using the beeps played from the audio file to maintain their pace. They run between lines A and C, and they should pass through each 3-meter (10 ft) zone associated with lines A, B, and C with the sound of each beep.
6. A different type of beep indicates when to stop running. At that point the athletes have 15 seconds as a recovery to walk to the next line, where they will wait for the start of the next interval.
7. Athletes advance stages until they cannot reach the relevant line on three consecutive beeps.
8. Record the running speed (km/h) achieved during the last completed stage (VIFT). The total running distance of each interval is corrected by a factor of 0.7 second per change of direction.

END

TYPE
Procedure

TITLE
T-Test Protocol

PAGE
804

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Arrange four cones as shown in figure 14.21 (points A, B, C, and D). Set the timing gates up at the start and finish line.
2. Have the athlete warm up and stretch before the test. The athlete may run the course with a submaximal effort for practice.
3. The test begins with the athlete standing at point A.
4. On an auditory signal, the athlete sprints forward to point B and touches the base of the cone with the right hand.
5. Then, while facing forward and not crossing the feet, the athlete shuffles to the left 5 yards (4.6 m) and touches the base of the cone at point C with the left hand.
6. The athlete then shuffles to the right 10 yards (9 m) and touches the base of the cone at point D with the right hand.
7. The athlete then shuffles to the left 5 yards (4.6 m) and touches the base of the cone at point B with the left hand, and next runs backward past point A, at which time the watch is stopped.
8. For safety, a spotter and gym mat should be positioned several feet behind point A to catch an athlete who falls while running backward.
9. The best time of two trials is recorded to the nearest 0.1 second.
10. The following are reasons for disqualification of a trial: The athlete fails to touch the base of any cone, crosses one foot in front of the other instead of shuffling the feet, or fails to face forward for the entire test.

END

TYPE
Procedure

TITLE
Hexagon Test Protocol

PAGE
805-806

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Using the adhesive tape, create a hexagon on the floor with 24-inch (61 cm) sides meeting to form 120-degree angles (figure 14.22).
2. The athlete warms up and practices performance of the test at submaximal speed.
3. The test begins with the athlete standing in the middle of the hexagon.
4. On an auditory signal, the athlete begins double-leg hopping from the center of the hexagon over each side and back to the center, starting with the side directly in front of the athlete, in a continuous clockwise sequence until all six sides are covered three times (three revolutions around the hexagon for a total of 18 jumps) and the athlete is again standing at the center. The athlete remains facing the same direction throughout the test.
5. If the athlete lands on a side of the hexagon rather than over it, or loses balance and takes an extra step or changes the direction in which he or she is facing, the trial is stopped and restarted after the athlete is allowed time for full recovery.
6. The best time of three trials is recorded to the nearest 0.1 second.

END

TYPE
Procedure

TITLE
5-10-5 Test Protocol

PAGE
806

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. If using one timing gate for total end time, set this up at the start and finish line. If multiple gates are available, set up at the start and finish line as well as at each turn line to measure each split.
2. The athlete straddles the center line using a three-point stance.
3. On an auditory signal, the athlete sprints 5 yards (4.6 m) to the line on the left, then changes direction and sprints 10 yards (9 m) to the line on the right, then again changes direction and sprints 5 yards (4.6 m) to the center line. Hand (or foot) contact must be made with all indicated lines. (Note: It is important that this is kept consistent for both trials.)
4. The best time of two trials is recorded to the nearest 0.01 second.

END

TYPE
Procedure

TITLE
5-0-5 Test Protocol

PAGE
807

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Arrange the cones as seen in figure 14.24. If timing lights are available, these can also be set up as shown.
2. Have the athlete warm up and stretch before the test. The athlete may run the course with a submaximal effort for practice.
3. The test begins with the athlete standing at the start line.
4. On an auditory signal, the athlete sprints forward 10 meters (11 yd) to the first set of timing lights, then sprints a further 5 meters (5 yd) to the turning line (one foot must be on or over the line), where he or she is required to turn and accelerate off the line.
5. The athlete may slow down only after passing through the timing lights for the second time.
6. The best time of two trials is recorded to the nearest 0.1 second.
7. The athlete completes the trials turning off the preferred leg. Alternatively, trials (at least two) can be administered turning off either the preferred or non-preferred leg.

END

TYPE
Procedure

TITLE
Illinois Test Protocol

PAGE
808-809

SECTION
14.2 — Monitoring Protocols

ORIGINAL TEXT
Procedure
1. Set up the cones on a course of 10 meters (11 yd) in length by 5 meters (5 yd) in width. Four cones should be on the corners of the 10-meter × 5-meter square, with the additional four placed in the center of the 5-meter width equally spaced along the 10-meter length. This will create three aisles of cones in the order of two, four, and two through which the athlete will run (figure 14.25).
2. Instruct the athlete to lie prone at the cone to the outside left of the full 10-meter length. The athlete will be instructed to get up and run when the tester says “Go,” sprint to the cone 10 meters ahead, and then turn around to sprint back to the cones in the middle aisle.
3. The athlete then slaloms through the four cones in the center aisle in both directions before then running to the cone at the opposite end of the third aisle.
4. The athlete sprints the 10 meters of the third aisle to complete the test.
5. The tester will stop the timer once the athlete has completed the third aisle of cones and record the time.

END

