In the Valsalva maneuver, the glottis is closed, thus keeping air from escaping the lungs, and the muscles of the abdomen and rib cage contract, creating rigid compartments of liquid in the lower torso and air in the upper torso.

END

TYPE
Recommendation

TITLE
Neutral-back lifting posture

PAGE
162

SECTION
Joint Biomechanics: Concerns in Resistance Training — Back Injury

ORIGINAL TEXT
The neutral-back lifting posture has been found to be better overall than a rounded (opposite of arched) back in minimizing L5/S1 compressive forces and ligament strain (2).

END

TYPE
Recommendation

TITLE
Lower back position during resistance training

PAGE
162

SECTION
Joint Biomechanics: Concerns in Resistance Training — Back Injury

ORIGINAL TEXT
resistance training exercises should generally be performed with the lower back in a moderately arched position to reduce risk of damage to the disks.

END

TYPE
Recommendation

TITLE
Intra-abdominal pressure technique

PAGE
164

SECTION
Joint Biomechanics: Concerns in Resistance Training — Intra-Abdominal Pressure and Lifting Belts

ORIGINAL TEXT
The diaphragm and the abdominal muscles can contract without the glottis being closed, however, creating the fluid ball in the abdomen without pressurizing the chest compartment. This must be regarded as the safer way, of the two options, to add support to the lower spine without building up pressure in the chest, and it is the technique that should be used for most resistance training.

END

TYPE
Recommendation

TITLE
Weight belt usage

PAGE
164-165

SECTION
Joint Biomechanics: Concerns in Resistance Training — Intra-Abdominal Pressure and Lifting Belts

ORIGINAL TEXT
Conservative recommendations are as follows:
A weight belt is not needed for exercises that do not directly affect the lower back.
For exercises directly stressing the back, an individual should refrain from wearing a belt during lighter sets but may wear one for near-maximal and maximal sets.
Individuals may reasonably choose never to wear lifting belts if they build up the strength of their back muscles and the muscles that generate intra-abdominal pressure in a gradual and systematic manner and if they practice safe resistance training exercise techniques.

END

TYPE
Warning

TITLE
Valsalva maneuver side effects

PAGE
163-164

SECTION
Joint Biomechanics: Concerns in Resistance Training — Intra-Abdominal Pressure and Lifting Belts

ORIGINAL TEXT
pressure in the chest associated with the Valsalva maneuver can have the undesirable side effect of exerting compressive force on the heart, making it more difficult for blood to return to the heart. Also, the Valsalva maneuver can transiently raise blood pressure to slightly elevated levels (20).

END

TYPE
Warning

TITLE
Risk of back injury without belt

PAGE
164

SECTION
Joint Biomechanics: Concerns in Resistance Training — Intra-Abdominal Pressure and Lifting Belts

ORIGINAL TEXT
It is particularly risky for an individual who has become accustomed to wearing a belt to suddenly perform an exercise without one, because the abdominal musculature might not be capable of generating enough intra-abdominal pressure to significantly reduce erector spinae muscle forces. The resulting excessive compressive forces on the disks could increase the chance of back injury.

END

TYPE
Warning

TITLE
Elastic band jumping risk

PAGE
159

SECTION
Sources of Resistance to Muscle Contraction — Elasticity

ORIGINAL TEXT
The bands provide the greatest resistance while the jumper is in the air—serving mainly to pull the jumper back to the ground, rather than resist the muscles, and so increasing the jumper's landing velocity, which may increase injury risk.

END

TYPE
Evidence

TITLE
Injury rates for resistance training

PAGE
160

SECTION
Joint Biomechanics: Concerns in Resistance Training

ORIGINAL TEXT
Rates of injury are the highest for team sports; intermediate for running and aerobics; and lowest for cycling, walking, and resistance training, the latter of which has about 4 injuries per 1,000 hours of participation.

END

TYPE
Evidence

TITLE
Resistance training injury rate in collegiate football

PAGE
160

SECTION
Joint Biomechanics: Concerns in Resistance Training

ORIGINAL TEXT
A study of collegiate American football players showed only 0.35 resistance training–related injuries per 100 players per season. Injuries due to resistance training accounted for only 0.74% of the in-season injury-related time loss of the players (61).

END

TYPE
Evidence

TITLE
Knee wrap spring effect

PAGE
167

SECTION
Joint Biomechanics: Concerns in Resistance Training — Knees

ORIGINAL TEXT
Through a spring effect alone, heavy wraps around the knees added an average of 25 pounds (110 N) to squat lifting force.

END

TYPE
Evidence

TITLE
Elbow and wrist injury incidence in powerlifters

PAGE
167

SECTION
Joint Biomechanics: Concerns in Resistance Training — Elbows and Wrists

ORIGINAL TEXT
A study examining 245 competitive powerlifters found an extremely low incidence of elbow and wrist injury (52).

END