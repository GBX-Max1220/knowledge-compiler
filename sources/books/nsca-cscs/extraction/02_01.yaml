107

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
first-class lever—A lever for which the muscle force and resistive force act on opposite sides of the fulcrum (figure 2.1).

END

TYPE
Definition

TITLE
Fulcrum

PAGE
107

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
fulcrum— The pivot point of a lever.

END

TYPE
Definition

TITLE
Lever

PAGE
107

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
lever— A rigid or semirigid body that, when subjected to a force whose line of action does not pass through its pivot point, exerts force on any object impeding its tendency to rotate (figure 2.2).

END

TYPE
Definition

TITLE
Mechanical advantage

PAGE
108

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
mechanical advantage— The ratio of the moment arm through which an applied force acts to that through which a resistive force acts.

END

TYPE
Definition

TITLE
Moment arm

PAGE
108

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
moment arm (also called force arm, lever arm, or torque arm)— The perpendicular distance from the line of action of the force to the fulcrum.

END

TYPE
Definition

TITLE
Muscle force

PAGE
109

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
muscle force— Force generated by biochemical activity, or the stretching of noncontractile tissue, which tends to draw the opposite ends of a muscle toward each other.

END

TYPE
Definition

TITLE
Resistive force

PAGE
109

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
resistive force— Force generated by a source external to the body (e.g., gravity, inertia, friction) that acts contrary to muscle force.

END

TYPE
Definition

TITLE
Second-class lever

PAGE
109

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
second-class lever— A lever for which the muscle force and resistive force act on the same side of the fulcrum, with the muscle force acting through a moment arm longer than that through which the resistive force acts, as when the calf muscles work to raise the body onto the balls of the feet (figure 2.3).

END

TYPE
Definition

TITLE
Third-class lever

PAGE
109

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
third-class lever— A lever for which the muscle force and resistive force act on the same side of the fulcrum, with the muscle force acting through a moment arm shorter than that through which the resistive force acts (figure 2.4).

END

TYPE
Definition

TITLE
Torque

PAGE
109

SECTION
Levers of the Musculoskeletal System

ORIGINAL TEXT
torque (also called moment)—The degree to which a force tends to rotate an object about a specified fulcrum. It is defined quantitatively as the magnitude of a force times the length of its moment arm.

END

