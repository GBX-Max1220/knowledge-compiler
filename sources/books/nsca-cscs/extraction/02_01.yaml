ORIGINAL TEXT
Traditionally, anatomists define the muscle's origin as its proximal (toward the center of the body) attachment and its insertion as its distal (away from the center of the body) attachment.

END

TYPE
Definition

TITLE
Insertion (muscle)

PAGE
105

SECTION
Skeletal Musculature

ORIGINAL TEXT
Traditionally, anatomists define the muscle's origin as its proximal (toward the center of the body) attachment and its insertion as its distal (away from the center of the body) attachment.

END

TYPE
Definition

TITLE
Fleshy attachments

PAGE
105

SECTION
Skeletal Musculature

ORIGINAL TEXT
In fleshy attachments, which are most often found at the proximal end of a muscle, muscle fibers are directly affixed to the bone, usually over a wide area so that force is distributed rather than localized.

END

TYPE
Definition

TITLE
Fibrous attachments

PAGE
105

SECTION
Skeletal Musculature

ORIGINAL TEXT
Fibrous attachments, such as tendons, blend into and are continuous with both the muscle sheaths and the connective tissue surrounding the bone.

END

