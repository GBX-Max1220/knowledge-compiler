Definition

TITLE
Prime mover (agonist)

PAGE
105

SECTION
Skeletal Musculature

ORIGINAL TEXT
The muscle most directly involved in bringing about a movement is called the prime mover, or agonist.

END

TYPE
Definition

TITLE
Antagonist

PAGE
105

SECTION
Skeletal Musculature

ORIGINAL TEXT
A muscle that can slow down or stop the movement is called the antagonist.

END

TYPE
Definition

TITLE
Synergist

PAGE
106

SECTION
Skeletal Musculature

ORIGINAL TEXT
A muscle is called a synergist when it assists indirectly in a movement.

END

