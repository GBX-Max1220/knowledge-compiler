TITLE
Overreaching (OR) Definition

PAGE
1691

SECTION
24.2 — Functional Overreaching

ORIGINAL TEXT
A lesser form of stressful training than overtraining is called overreaching (OR) and is defined as follows: An accumulation of training and/or non-training stress resulting in short-term decrement in performance capacity with or without related physiological and psychological signs and symptoms of maladaptation in which restoration of performance capacity may take from several days to several weeks (88, 89).

END
