PAGE
1692

SECTION
24.2 — Functional Overreaching

ORIGINAL TEXT
Functional overreaching (FOR) can be beneficial provided appropriate recovery is allowed.

END
```

```
TYPE
Definition

TITLE
Nonfunctional Overreaching (NFOR) Definition

PAGE
1692

SECTION
24.2 — Functional Overreaching

ORIGINAL TEXT
Nonfunctional overreaching (NFOR) is somewhat similar to functional overreaching with two very important differences. First, the short-term accumulated fatigue is greater, and, second, the recovery takes longer (88, 89, 126). In the case of NFOR, the individual does not experience any super compensation and is only able to return to his or her baseline performance levels (see figure 24.1 on page 778) (88, 89, 93, 108, 125, 126).

END
```

