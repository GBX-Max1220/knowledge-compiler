TYPE
Evidence

TITLE
High-Carbohydrate Preexercise Meal Improves Aerobic Endurance Running Capacity

PAGE
617

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Consumption of the high-carbohydrate preexercise meal improved aerobic endurance running capacity by 9% compared to the placebo drink before exercise and water during the run. However, the high-carbohydrate meal plus sport drink during the run improved aerobic endurance capacity by 22% compared to the placebo beforehand and sport drink during the run. These results indicate that a high-carbohydrate preexercise or precompetition meal can help improve aerobic endurance running capacity (28).

END

TYPE
Evidence

TITLE
Carbohydrate Loading in Women Requires Higher Total Calorie Intake

PAGE
622

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
In women, only the higher-carbohydrate plus extra calories diet resulted in significant increases in glycogen storage compared to the habitual diet. In the high-carbohydrate conditions, men increased their total carbohydrate intake to 7.9 grams of carbohydrate per kilogram body weight, whereas women reached just 6.4 grams of carbohydrate per kilogram body weight. No differences were noted between men and women in their ability to use glycogen as measured by enzymatic activity. Therefore, the failure of previous studies to show improved performance from carbohydrate loading in women was likely due to inadequate overall carbohydrate intake (132).

END

TYPE
Evidence

TITLE
Carbohydrate-Electrolyte Beverage Improves Soccer-Specific Skill Performance

PAGE
628

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
The group receiving the carbohydrate-electrolyte drink finished the specific dribble test faster than those receiving the placebo. In addition, ratings of precision were higher in the carbohydrate-electrolyte trial versus placebo. However, there were no differences in the coordination or power tests between groups. In this particular study, supplementation with a carbohydrate-electrolyte drink improved soccer-specific skill performance compared with a placebo (101).

END

TYPE
Evidence

TITLE
Protein Supplementation Improves Performance and Reduces Muscle Breakdown in Elite Orienteers

PAGE
632

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
PRO-CON significantly improved performance and reduced markers of muscle breakdown, while CHO did not improve performance. However, it is not clear from this study if the timing of protein made the difference or the increased total daily intake of protein in the PRO-CON as compared to the CHO group (48).

END

TYPE
Evidence

TITLE
High-Protein Overfeeding Stores More Calories as Lean Body Mass

PAGE
644

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
The subjects who consumed the normal- and high-protein diet stored approximately 45% of the excess calories as lean body mass, whereas those on the low-protein diet stored 95% of the excess calories consumed as body fat (20).

END

TYPE
Decision Rule

TITLE
Glycogen Replenishment Timing Decision Rule

PAGE
631

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes who train two or three times a day or have less than 24 hours to recover may want to consider eating or drinking a high-carbohydrate meal immediately after finishing their event and at regular intervals thereafter to quickly replenish glycogen stores.

END

TYPE
Decision Rule

TITLE
Postexercise Protein Timing Decision Rule

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
If the exercise was performed in a fasted state (first thing in the morning or more than 3 hours after the last protein-rich meal), the protein should be consumed within 30 minutes after the end of the session; but if the exercise was performed in a fed state (preexercise protein-rich meal or supplement), this postexercise time window may be considerably longer (10).

END