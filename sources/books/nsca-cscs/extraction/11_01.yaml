TYPE
Definition

TITLE
Relative Energy Deficiency in Sport (RED-S)

PAGE
649-651

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Relative energy deficiency in sport (RED-S) encompasses various physiological dysfunctions resulting from low energy availability (LEA), where an athlete's energy intake does not match the energy expended during exercise. This mismatch affects metabolic rate, menstrual function, bone health, immunity, protein synthesis, and cardiovascular health, among others.

END

TYPE
Definition

TITLE
Energy Availability (EA)

PAGE
650

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
LEA is quantified by energy availability (EA), calculated as energy intake minus exercise energy expenditure, relative to fat-free mass (FFM).

END

TYPE
Threshold

TITLE
Optimal and Low Energy Availability Thresholds

PAGE
650

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Optimal EA for healthy function is around 45 kilocalories per kilogram FFM per day, while severe perturbations can occur below 30 kilocalories per kilogram FFM per day (25, 88).

END

TYPE
Definition

TITLE
Anorexia Nervosa

PAGE
652

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Anorexia nervosa is characterized by a distorted body image and an intense fear of gaining weight or becoming fat, leading those with this disease to excessive calorie restriction and severe weight loss (8).

END

TYPE
Definition

TITLE
Binge-Eating Disorder

PAGE
653

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Binge-eating disorder is characterized by repeated episodes, occurring at least once a week for a period of three weeks, of uncontrolled binge eating (eating significantly more food in a short period of time than most people would eat under the same circumstances) (55).

END

TYPE
Definition

TITLE
Bulimia Nervosa

PAGE
654

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Bulimia nervosa is characterized by recurrent consumption of food in amounts significantly greater than would customarily be consumed in a discrete period of time—for example, an entire pizza and a half-gallon of ice cream, plus a package of cookies. Purging follows episodes of binge eating and may include one or more of the following: self-induced vomiting, intense exercise, laxative use, or diuretic use. The bingeing and purging occur at least once a week for a period of three months (55).

END

TYPE
Definition

TITLE
Avoidant/Restrictive Food Intake Disorder (ARFID)

PAGE
654

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Avoidant/restrictive food intake disorder (ARFID) is an eating or feeding disturbance, including apparent lack of interest in eating or food; avoidance based on the sensory characteristics of food; or concern about aversive consequences of eating. This disorder is manifested by persistent failure to meet appropriate nutritional or energy needs associated with one (or more) of the following: Significant weight loss (or failure to achieve expected weight gain or faltering growth in children); Significant nutritional deficiency; Dependence on enteral feeding or oral nutritional supplements; Marked interference with psychosocial functioning.

END

TYPE
Definition

TITLE
Pica

PAGE
655

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
People with pica eat nonnutritive substances for a period of at least one month. Common nonnutritive substances include clay, laundry starch, ice, cigarette butts, hair, or chalk (68).

END

TYPE
Definition

TITLE
Rumination Disorder

PAGE
655

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Rumination involves chewing, reswallowing, or spitting of regurgitated food. To be classified as having this disorder, one must display this behavior, unrelated to any medical condition, for at least one month.

END

TYPE
Definition

TITLE
Basal Metabolic Rate (BMR)

PAGE
642

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Basal metabolic rate (BMR) is by far the largest contributor to total energy expenditure, accounting for approximately 65% to 70% of daily energy expenditure (63, 114). It is a measure of the calories required for maintaining normal body functions such as respiration, blood circulation, and gastrointestinal and renal processing.

END

TYPE
Definition

TITLE
Resting Metabolic Rate (RMR)

PAGE
642

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Resting metabolic rate is often used instead of BMR due to the ease of measurement (an overnight fast is not required), yet it is 10% to 20% higher than BMR due to increased energy expenditure resulting from recent food intake or physical activity completed earlier in the day.

END

TYPE
Definition

TITLE
Thermic Effect of Food

PAGE
643

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
The thermic effect of food, also known as diet-induced thermogenesis, is the increase in energy expenditure above the RMR that can be measured for several hours following a meal. The thermic effect of food includes the energy cost of digestion, absorption, metabolism, and storage of food in the body.

END

TYPE
Definition

TITLE
Body Mass Index (BMI)

PAGE
646

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
At a population level, overweight and obesity are typically classified based on a body mass index (BMI) of 25 to 29.9 kg/m2 and ≥30 kg/m2, respectively (table 11.5).

END

TYPE
Definition

TITLE
Carbohydrate Loading

PAGE
620

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Although there are many different variations of carbohydrate loading, all include high carbohydrate intake in the days leading up to an event to maximize glycogen stores and therefore carbohydrate availability in the later stages of the event (32).

END

TYPE
Definition

TITLE
Disordered Eating

PAGE
652

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Signs of disordered eating may include restrictive eating; fasting; skipping meals; and taking diet pills, laxatives, or diuretics. However, those with disordered eating do not meet the full diagnostic criteria for an eating disorder (45).

END

TYPE
Definition

TITLE
Obesity

PAGE
646

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Obesity is categorized as a disease and affects 34.9% of adults and 17% of children in the United States (96).

END

TYPE
Recommendation

TITLE
Precompetition Hydration Recommendation

PAGE
618

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes should prehydrate, if necessary, several hours before exercise to allow for fluid absorption and urine output. Their urine specific gravity (USG) reading should be <1.02 (120).

END

TYPE
Recommendation

TITLE
Precompetition Meal Timing for Sensitive Athletes

PAGE
618

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes who tend to get nauseated easily, who have experienced diarrhea during competition, who get anxious or experience precompetition jitters, or who compete in high-intensity sports (jarring movements can increase the likelihood of stomach upset), as well as those who are competing in the heat, may want to consider eating at least 4 hours before competition, as well as trying a variety of types of low-fiber carbohydrate options.

END

TYPE
Recommendation

TITLE
Precompetition Meal Macronutrient Guidelines (4+ Hours Before)

PAGE
618

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Aerobic endurance athletes who eat at least 4 hours before competition should include approximately 1 to 4 grams of carbohydrate per kilogram body weight and 0.15 to 0.25 grams of protein per kilogram body weight (131).

END

TYPE
Recommendation

TITLE
Precompetition Meal Macronutrient Guidelines (2 Hours Before)

PAGE
618

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
If the precompetition meal is consumed 2 hours before exercise, athletes should aim for approximately 1 gram of carbohydrate per kilogram body weight.

END

TYPE
Recommendation

TITLE
During-Event Hydration and Fluid Loss Limit

PAGE
624

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes should consume enough fluid during exercise to prevent water weight losses exceeding 2% of body weight (120).

END

TYPE
Recommendation

TITLE
Optimal Sports Drink Composition for Prolonged Activity in Hot Weather

PAGE
624

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
During prolonged activity in hot weather, the Institute of Medicine recommends sport drinks containing 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% (2).

END

TYPE
Recommendation

TITLE
Ideal Carbohydrate Concentration in Sports Drinks

PAGE
624

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
A carbohydrate concentration of 6% to 8% may be ideal (120).

END

TYPE
Recommendation

TITLE
During-Event Carbohydrate Intake for Aerobic Endurance Athletes

PAGE
626

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Aerobic endurance athletes should consume 28 to 144 grams of multiple types of carbohydrates together, such as sucrose, fructose, glucose, or maltodextrin, each hour during prolonged aerobic endurance activity (32, 34, 66, 137).

END

TYPE
Recommendation

TITLE
Postcompetition Glycogen Replenishment Guidelines

PAGE
631

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
After exercise, approximately 1.2 to 2.0 grams of carbohydrate per kilogram body weight should be consumed within 30 minutes after stopping the exercise.

END

TYPE
Recommendation

TITLE
Postcompetition Protein Intake for Aerobic Endurance Athletes

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
At least 20 to 40 grams of high-quality protein should also be consumed within a 2-hour time period after aerobic endurance exercise (sooner may be better, though the exact time period has yet to be elucidated in the research) (77).

END

TYPE
Recommendation

TITLE
Daily Carbohydrate Intake for Strength/Speed Athletes

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Strength or speed athletes should consume 5 to 6 grams of carbohydrate per kilogram body weight per day during peak training periods.

END

TYPE
Recommendation

TITLE
Daily Protein Intake for Strength/Speed Athletes

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Strength or speed athletes should consume 1.4 to 2.0 grams of protein per kilogram body weight per day, even if their sport or training includes an aerobic endurance component.

END

TYPE
Recommendation

TITLE
Post-Resistance Training Protein Intake for Younger Individuals

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
After resistance training, younger individuals should consume at least 20 to 50 grams (providing about 8.5 to 20 grams of essential amino acids) of a high-quality, high-leucine protein (2-3 g), while older adults should consume 40 grams or more to maximally stimulate muscle protein synthesis in the acute time period after training (109).

END

TYPE
Recommendation

TITLE
Post-Resistance Training Protein Timing

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
If the exercise was performed in a fasted state (first thing in the morning or more than 3 hours after the last protein-rich meal), the protein should be consumed within 30 minutes after the end of the session; but if the exercise was performed in a fed state (preexercise protein-rich meal or supplement), this postexercise time window may be considerably longer (10).

END

TYPE
Recommendation

TITLE
Carbohydrate Intake to Reduce Muscle Protein Breakdown

PAGE
637

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Between 30 and 100 grams of high-energy carbohydrates should be consumed after muscle-damaging exercise to reduce muscle protein breakdown (18, 43).

END

TYPE
Recommendation

TITLE
Weight Gain Calorie Surplus

PAGE
643

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
A general guideline, which should be adjusted based on the athlete, is to consume approximately 500 additional calories per day in order to gain weight (113).

END

TYPE
Recommendation

TITLE
Weight Gain Protein Intake

PAGE
644

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes should ensure that they are eating enough protein to maximize gains in lean body mass: 1.6 to 2.2 grams per kilogram body weight per day.

END

TYPE
Recommendation

TITLE
Weight Loss Protein Intake for Muscle Maintenance

PAGE
645

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes who want to maintain muscle and lose body fat while dieting should consume about 1.8 to 2.7 grams protein per kilogram body weight per day (or approximately 2.3-3.1 g protein per kilogram fat-free mass per day) in addition to maintaining a moderate energy deficit of approximately 500 calories per day (91).

END

TYPE
Recommendation

TITLE
Initial Weight Loss Goal for Overweight and Obese Individuals

PAGE
646

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
The initial goal for weight loss in overweight and obese individuals should be 10% of initial weight within six months (92).

END

TYPE
Recommendation

TITLE
Carbohydrate Loading Regimen

PAGE
621

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
A commonly used carbohydrate loading regimen includes three days of a high-carbohydrate diet in concert with tapering exercise the week before competition and complete rest the day before the event. The diet should provide adequate calories and carbohydrate per day: 8 to 10 grams of carbohydrate per kilogram body weight.

END

TYPE
Recommendation

TITLE
Carbohydrate Loading for Marathon Runners

PAGE
621

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Higher intakes, 10 to 12 grams of carbohydrate per kilogram body weight, have been suggested for runners during the 36 to 48 hours before a marathon (22).

END

TYPE
Recommendation

TITLE
Hydration Guidelines for Children During Practice

PAGE
626

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
According to the American Academy of Pediatrics, children weighing 40 kg (88 pounds) should drink 5 fluid ounces (148 mL) of cold water or a flavored salted beverage every 20 minutes during practice, while adolescents weighing 60 kg (132 pounds) should drink 9 fluid ounces (266 mL) every 20 minutes even if they do not feel thirsty.

END

TYPE
Recommendation

TITLE
Sodium Chloride Concentration for Children's Hydration

PAGE
626

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
They also recommend a sodium chloride concentration of 15 to 20 mmol/L (approximately 1 g per liter), which has been shown to increase voluntary hydration by 90% when compared to unflavored water (30, 106, 147).

END

TYPE
Recommendation

TITLE
Daily Protein Intake for Optimal Muscle Remodeling

PAGE
636

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
For optimal muscle remodeling, experts suggest consuming at least 20 to 40 grams of protein per meal and eating meals every 3 to 4 hours (81, 107) in order to facilitate meeting daily protein targets.

END

TYPE
Recommendation

TITLE
Minimizing Gastrointestinal Issues Before Competition

PAGE
616

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
To minimize the likelihood of stomach discomfort during competition, athletes should do the following: Try food in practice first. Always try new foods during several practice sessions before competition (7). When the meal is closer in time to the start of the game or event, consume smaller amounts of food and liquids. Avoid high-fat and high-fiber foods. Both fat and fiber slow down the rate of digestion. When food is still being digested as an athlete exercises, he or she may experience stomach cramps (7). Avoid sugar alcohols.

END

TYPE
Warning

TITLE
Warning on Sugar Alcohol Consumption

PAGE
616

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Any product that could result in consumption of 20 grams of mannitol must carry this warning on the label: "Excess consumption may have a laxative effect."

END

TYPE
Warning

TITLE
Dangers of Rapid Weight Loss

PAGE
648

SECTION
11.1 — Nutrition Strategies for Maximizing Performance

ORIGINAL TEXT
Athletes who attempt to lose too much weight too quickly may lose lean body mass, feel fatigued, experience headaches or mood swings, put their training and performance in jeopardy, and suffer from several potentially serious side effects. These include dehydration, heat illness, muscle cramping, fatigue, dizziness, suppressed immune system functioning, hormone imbalances, hyperthermia, reduced muscle strength, decreased plasma and blood volume, low blood pressure, electrolyte imbalances, kidney failure (diuretic abuse), fainting, and death (in extreme cases) (38).

END

