definition: 'Maximum muscular strength tests can be split into dynamic or isometric
  demands; those that involve relatively low movement speeds reflect low-speed muscular
  strength. In this case, muscular strength is related to the force a muscle or muscle
  group can exert in one maximal effort while maintaining proper form, and it can
  be quantified by the maximum weight that can be lifted once (the 1-repetition maximum
  [1RM]) in exercises such as the bench press or back squat, or the maximum force
  that can be exerted at a particular isokinetic velocity (5, 6, 45, 72, 100, 101,
  103, 109, 124).

