definition: 'When older adults were confined to complete bed rest (a catabolic state)
  for 10 days, it was reported that the subjects who were supplemented with 3 grams
  of HMB per day lost significantly less lean body mass (lost only 0.37 lb [0.17 kg])
  as compared to those subjects who were supplemented with a placebo (lost 4.5 lb
