definition: 'On the other hand, nonfunctional overreaching (NFOR) is somewhat similar
  to functional overreaching with two very important differences. First, the short-term
  accumulated fatigue is greater, and, second, the recovery takes longer (88, 89,
  126). In the case of NFOR, the individual does not experience any super compensation
  and is only able to return to his or her baseline performance levels (see figure
  24.1 on page 778) (88, 89, 93, 108, 125, 126).

