definition: 'The provision of the individual guidance on appropriate food and nutrient
  intake for those with special needs, taking into consideration health, cultural,
  socioeconomic, functional, and psychological facts from the nutrition assessment.
  Nutrition counseling may include advice to increase or decrease nutrients in the
  diet; to change the timing and size of and composition of meals; to modify food
  textures, and in extreme instances, to change the route of administration.

