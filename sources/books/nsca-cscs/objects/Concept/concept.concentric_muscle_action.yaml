definition: 'In a concentric muscle action, the muscle shortens because the contractile
  force is greater than the resistive force. The forces generated within the muscle
  and acting to shorten it are greater than the external forces acting at its tendons
  to stretch it. Swimming and cycling involve concentric muscle action almost exclusively.

