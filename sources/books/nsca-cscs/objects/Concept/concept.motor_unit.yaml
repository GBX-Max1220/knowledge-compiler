definition: 'The functional unit of the neuromuscular system is the motor unit. Consisting
  of the alpha motor neuron and the muscle fibers that it activates, a motor unit
  may innervate <10 muscle fibers for small, intricate muscles or >100 fibers for
  large, powerful trunk and limb muscles.

