definition: 'The skeletal muscle pump is the assistance that contracting muscles provide
  to the circulatory system. The muscle pump works with the venous system, which contains
  the one-way valves for blood return to the heart. The contracting muscle compresses
  the veins, but since the blood can flow only in the direction of the valves, it
  is returned to the heart.

  '
