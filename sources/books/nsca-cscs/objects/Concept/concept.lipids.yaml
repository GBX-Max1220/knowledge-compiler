definition: 'Although the terms fat and lipid are often used interchangeably, lipid
  is a broader term. Lipids include triglycerides (fats and oils) as well as related
  fatty compounds, such as sterols and phospholipids. The lipids of greatest significance
  in nutrition are triglycerides, fatty acids, phospholipids, and cholesterol. Triglycerides
  are formed by the union of glycerol with three fatty acids. The majority of lipids
  found in foods and in the body are in the triglyceride form, and within this chapter
  the term fat refers to triglycerides.

  '
