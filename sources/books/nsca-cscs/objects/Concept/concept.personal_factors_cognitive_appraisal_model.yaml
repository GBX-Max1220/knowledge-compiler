definition: 'Personal Factors: History of injury. Is this injury acute or chronic?
  Has the athlete experienced this injury before? Athletic identity. Does the athlete
  highly identify as an athlete and look to others for acknowledgment of that role?
  According to a 2022 study, almost 40% of student-athletes have a high athletic identity,
  strongly serving as a foundation of their self-worth (2). Personality. Is the athlete
  naturally confident and outgoing or introverted? Do they chronically worry about
  what they cannot accomplish or perform? Pain tolerance. How well does the athlete
  tolerate discomfort during training and rehabilitation? Coping skills. How has the
  athlete managed stressful situations in the past? Do they engage in positive (e.g.,
  regular physical activity or relaxation strategies) or negative (e.g., risky activities
  or avoidant behaviors) coping strategies? Age and sex. Does the athlete have specific
  concerns due to their age (e.g., transportation) or sex (biological differences
  such as energy availability or hormonal differences)?

  '
