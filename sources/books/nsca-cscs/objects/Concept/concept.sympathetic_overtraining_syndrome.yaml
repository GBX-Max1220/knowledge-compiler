definition: 'The primary characteristic of sympathetic overtraining syndrome is an
  increased epinephrine response to exercise and training (36, 37, 38, 40, 41, 139).
  Eventually, the elevated catecholamines result in a down-regulation of their primary
  receptor in skeletal muscle, β-2 receptors (41, 124). This is believed to be an
  important part of the sympathetic overtraining syndrome and the accompanying impaired
  contractility of skeletal muscle in this condition.

  '
