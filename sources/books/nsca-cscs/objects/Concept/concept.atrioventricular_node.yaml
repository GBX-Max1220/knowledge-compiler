definition: 'The atrioventricular (AV) node is where the impulse is delayed slightly
  before passing into the ventricles. The AV node is located in the posterior septal
  wall of the right atrium. It is primarily the AV node and its associated conductive
  fibers that delay each impulse entering into the ventricles.

