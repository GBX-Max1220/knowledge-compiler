definition: 'A graphical representation of the proposed physiological mechanisms of
  altitude and heat acclimation training and their subsequent effect on aerobic endurance
  exercise performance. Erythropoietin = EPO; nitric oxide = NO; red cell volume =
  RCV; vascular endothelial growth factor = VEGF; hypoxia-inducible factor alpha =
  HIF-α; maximal aerobic capacity = V̇O2max; arteriovenous oxygen difference = a-vO2
  diff. Solid lines indicate well-established relationship and dashed lines indicate
  limited evidence supporting the relationship.

