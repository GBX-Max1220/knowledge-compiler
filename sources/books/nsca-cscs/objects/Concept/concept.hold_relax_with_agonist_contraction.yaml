definition: 'The hold-relax with agonist contraction technique is identical to hold-relax
  in the first two phases (figures 15.9 and 15.10). During the third phase, a partner
  applies force to the antagonist muscle groups while the athlete is required to maintain
  the position through a concentric action of the agonist, thus adding to the stretch
  force (figure 15.11). Following the isometric hold, the athlete flexes the hip,
  thereby moving further into the new ROM. With this technique, the final stretch
  should be greater, primarily because of reciprocal inhibition (i.e., activation
  of the hip flexors) (63) and secondarily because of autogenic inhibition (i.e.,
  activation of the hamstrings) (63).

