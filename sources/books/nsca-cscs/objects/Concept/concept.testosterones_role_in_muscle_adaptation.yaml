definition: 'Testosterone, the primary androgen affecting skeletal muscle, and dihydrotestosterone,
  which acts mainly on sex-linked tissues, play crucial roles in the body. While circulating
  testosterone levels indicate anabolic activity, the actual binding of testosterone
  to its receptor is vital for stimulating muscle growth. Binding to androgen genomic
  and non-genomic receptors activates various signaling pathways that enhance gene
  expression for muscle hypertrophy and suppress those involved in protein degradation.
  Therefore, increased testosterone levels due to increased motor unit activation
  indicate metabolic demands beyond homeostatic conditions and are associated with
  enhanced receptor binding (124, 133). Testosterone also indirectly affects muscle
  growth by promoting the release of growth hormone from the pituitary, which influences
  muscle protein synthesis. This hormone''s relationship with growth hormone is either
  permissive or synergistic in promoting protein synthesis (103). Furthermore, testosterone
  affects the nervous system by interacting with neuron receptors, altering neurotransmitter
  amounts, and influencing structural protein changes within muscle cells (9, 67,
  91).

