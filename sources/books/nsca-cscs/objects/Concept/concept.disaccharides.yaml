definition: 'Disaccharides (sucrose, lactose, and maltose) are composed of two simple
  sugar units joined together. Sucrose (or table sugar), the most common disaccharide,
  is a combination of glucose and fructose. Sucrose occurs naturally in most fruits
  and is crystallized from the syrup of sugar cane and sugar beets to make brown,
  white, or powdered sugar. Lactose (glucose + galactose) is found only in mammalian
  milk. Maltose (glucose + glucose) occurs primarily when polysaccharides are broken
  down during digestion. It also occurs in the fermentation process of alcohol and
  is the primary carbohydrate in beer.

  '
