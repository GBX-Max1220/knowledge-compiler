definition: 'Although measures of protein quality, such as the protein digestibility
  correct amino acid score (PDCAAS), take protein digestibility (or bioavailability)
  into account as well as a protein''s ability to provide the essential amino acids
  necessary for the synthesis of body proteins and other metabolites, they do not
  take into account how other compounds within the food alter the bioavailability
  of the protein''s amino acids.

