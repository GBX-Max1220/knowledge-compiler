definition: 'The person typically responsible for the day-to-day physical health of
  the athlete is the athletic trainer or athletic therapist. In the United States,
  an athletic trainer is certified by the National Athletic Trainers'' Association
  Board of Certification as a Certified Athletic Trainer (ATC). The athletic trainer
  works under the supervision of the team physician and is employed primarily by secondary
  schools, colleges, or professional teams but may also work in an outpatient physical
  therapy clinic.

