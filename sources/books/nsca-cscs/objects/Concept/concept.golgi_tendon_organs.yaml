definition: 'Golgi tendon organs (GTOs) are proprioceptors located in tendons near
  the myotendinous junction and are in series—that is, attached end to end, with extrafusal
  muscle fibers (figure 1.10). Golgi tendon organs are activated when the tendon attached
  to an active muscle is stretched. As tension in the muscle and tendons increases,
  the discharge of the GTOs increases. The sensory neuron of the GTO synapses with
  an inhibitory interneuron in the spinal cord, which in turn synapses with and inhibits
  a motor neuron that serves the same muscle. The result is a reduction in tension
  within the muscle and tendon. Thus, whereas spindles facilitate activation of the
  muscle, neural input from GTOs inhibits muscle activation. The GTOs'' inhibitory
  process is thought to provide a mechanism that protects against the development
  of excessive tension. The effect of GTOs is therefore minimal at low forces, but
  when an extremely heavy load is placed on the muscle, reflexive inhibition mediated
  by the GTOs causes the muscle to relax. The ability of the motor cortex to override
  this inhibition may be one of the fundamental adaptations to heavy resistance training.

  '
