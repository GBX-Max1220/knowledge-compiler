definition: 'The function of capillaries is to facilitate exchange of oxygen, fluid,
  nutrients, electrolytes, hormones, and other substances between the blood and the
  interstitial fluid in the various tissues of the body. The capillary walls are very
  thin and are permeable to these, but not all, substances (41).

