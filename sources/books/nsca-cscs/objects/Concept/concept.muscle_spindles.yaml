definition: 'Muscle spindles are proprioceptors that consist of several modified muscle
  fibers enclosed in a sheath of connective tissue (figure 1.10). These modified fibers,
  called intrafusal fibers, run parallel to the normal, or extrafusal, fibers. Muscle
  spindles provide information concerning muscle length and the rate of change in
  length. When the muscle lengthens, spindles are stretched. This deformation activates
  the sensory neuron of the spindle, which sends an impulse to the spinal cord, where
  it synapses (connects) with motor neurons. This results in the activation of motor
  neurons that innervate the same muscle. Spindles thus indicate the degree to which
  the muscle must be activated in order to overcome a given resistance. As a load
  increases, the muscle is stretched to a greater extent, and engagement of muscle
  spindles results in greater activation of the muscle. Muscles that perform precise
  movements have many spindles per unit of mass to help ensure exact control of their
  contractile activity. A simple example of muscle spindle activity is the knee jerk
  reflex. Tapping on the tendon of the knee extensor muscle group below the patella
  stretches the muscle spindle fibers. This causes activation of extrafusal muscle
  fibers in the same muscle. A knee jerk occurs as these fibers actively shorten.
  This, in turn, shortens the intrafusal fibers and causes their discharge to cease.

  '
