definition: 'Sex-related differences in hypertrophy and muscle mass (106, 132, 143)
  indicate that absolute muscle strength in females is lower than in males (108, 117),
  whereas males’ greater absolute strength is primarily achieved by larger muscle
  fiber size (117, 146, 160). The absolute lower body strength of females is generally
  closer to male values compared to the absolute values for upper body strength (10,
  82, 84, 117). When considered on a relative basis, sex-related differences in muscular
  strength are greatly reduced. Females have similar number of muscle fibers as males,
  and strength is similar when normalized to muscle volume (113, 117). When expressed
  relative to body weight, the lower body strength of females is similar to that of
  males, while the upper body strength of females is still somewhat less (10, 82,
  84, 117). If comparisons are made relative to fat-free mass, differences in strength
  between males and females tend to disappear (10, 82, 84, 117).

