definition: 'The stress and injury model is a theoretical framework that attempts
  to explain the effects of pre-injury psychological factors on athletic injury (3).
  Revised by Williams and Andersen (68), the model suggests that three unique factors
  can influence an athlete''s stress response, separately or together, contributing
  to an athlete''s risk and frequency of injury (figure 9.4). It includes athletes''
  personality factors such as state or trait anxiety levels, mood states, and perceived
  locus of control of situations and events; history of stressors such as life events,
  academic stressors, daily hassles, and previous injury history; and coping resources
  such as social support, stress management techniques, mental skills, and nutritional
  and lifestyle habits.

  '
