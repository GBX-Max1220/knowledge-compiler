definition: 'When evaluating tests for high levels of validity and reliability, the
  strength and conditioning professional must rely on her or his knowledge and practical
  experience with the sport. The strength and conditioning professional must consider
  sport specificity (e.g., metabolic energy systems, biomechanical movement patterns),
  athlete experience, training status, age, and environmental factors when selecting
  tests.

