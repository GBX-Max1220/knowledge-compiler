definition: 'Pasiakos and colleagues (166) reported that a leucine-enriched EAA beverage
  resulted in a significant elevation of muscle protein synthesis compared to a normal
  leucine-containing EAA beverage. In this study, trained males ingested one of two
  different 10-gram EAA beverages during cycling exercise—one containing 3.5 grams
  of leucine (46 mg/kg body mass) and the other containing 1.87 grams of leucine (~25
  mg/kg body mass). After the exercise bout (during a 3-hr assessment period), muscle
  protein synthesis was 33% greater in the leucine-enriched EAA beverage.

  '
