definition: 'Proprioceptors are specialized sensory receptors located within joints,
  muscles, and tendons. Because these receptors are sensitive to pressure and tension,
  they relay information concerning muscle dynamics to the conscious and subconscious
  parts of the central nervous system. The brain is thus provided with information
  concerning kinesthetic sense, or conscious appreciation of the position of body
  parts with respect to gravity. Most of this proprioceptive information, however,
  is processed at subconscious levels so we do not have to dedicate conscious activity
  toward tasks such as maintaining posture or position of body parts. Proprioceptors
  are specialized sensory receptors that provide the central nervous system with information
  needed to maintain muscle tone and perform complex coordinated movements.

  '
