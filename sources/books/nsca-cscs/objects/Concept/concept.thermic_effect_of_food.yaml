definition: 'The thermic effect of food, also known as diet-induced thermogenesis,
  is the increase in energy expenditure above the RMR that can be measured for several
  hours following a meal. The thermic effect of food includes the energy cost of digestion,
  absorption, metabolism, and storage of food in the body.

