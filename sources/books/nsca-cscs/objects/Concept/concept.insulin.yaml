definition: 'Insulin is a potent anabolic hormone. It is secreted by the pancreas
  in response to elevations in blood glucose or specific amino acid (e.g., leucine)
  concentrations. Its role is to facilitate the uptake of glucose and amino acids
  into the cell. Since insulin increases protein synthesis, it is considered an anabolic
  hormone.

