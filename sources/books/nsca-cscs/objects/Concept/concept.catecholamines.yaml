definition: 'Catecholamines, primarily epinephrine but also including norepinephrine
  and dopamine, are secreted by the adrenal medulla and play a crucial role in enhancing
  strength and power during resistance training. These hormones facilitate the fight-or-flight
  response by acting as central motor stimulators and peripheral vascular dilators,
  enhancing enzyme activity and calcium release in muscles (89).

  '
