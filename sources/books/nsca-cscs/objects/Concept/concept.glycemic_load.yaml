definition: 'The glycemic load (GL) takes the amount of carbohydrate, in grams, in
  a portion of food into account — a factor that also influences glycemic response.
  Because GL takes portion size into account, it is a more realistic gauge of glycemic
  response than the GI, which is based on a standard serving size.

