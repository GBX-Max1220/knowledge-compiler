definition: 'Hormones can also operate through intracrine, autocrine, and paracrine
  mechanisms, which do not rely on the bloodstream. Intracrine and autocrine actions
  involve hormones either binding to internal receptors within their producing cell
  or being released to bind to surface receptors on the same cell. Paracrine action
  occurs when hormones affect adjacent cells, again bypassing the bloodstream.

