definition: 'Joints that allow considerable movement, e.g., elbow and knee. Movements
  in relation to sports and exercise mainly occur at synovial joints, whose most important
  features are low friction and large range of motion. Articulating bone ends are
  covered with smooth hyaline cartilage, and the entire joint is enclosed in a capsule
  filled with synovial fluid.

  '
