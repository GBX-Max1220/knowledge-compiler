definition: 'A physical therapist (or physiotherapist) with specialization in orthopedics
  or sport physical therapy can play a valuable role in reducing pain and restoring
  function to the injured athlete. Although physical therapists are typically based
  in outpatient physical therapy clinics, many collegiate and professional teams now
  directly employ physical therapists as members of the allied health staff.

