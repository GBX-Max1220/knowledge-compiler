definition: 'IGFs, primarily IGF-1 and IGF-2, are small polypeptides crucial for various
  anabolic processes in the body, including cellular growth, development, and metabolism.
  These growth factors are structurally similar to insulin and originate from larger
  precursor molecules modified posttranslationally to become active. IGF-1, the most
  researched, is predominantly synthesized in the liver in response to stimulation
  by 22 kD GH (16, 22, 27, 91). Besides GH, IGF synthesis is also influenced by thyroid
  hormones and testosterone (137, 138, 139, 140).

