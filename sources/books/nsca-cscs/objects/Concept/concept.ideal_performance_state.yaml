definition: 'The ideal performance state has been studied from a number of perspectives.
  Williams and Krane (68) listed the following characteristics that athletes typically
  report about this state: Absence of fear—no fear of failure; No thinking about or
  analysis of performance (related to the motor stage of automaticity); A narrow focus
  of attention concentrated on the activity itself; A sense of effortlessness— an
  involuntary experience; A sense of personal control; A distortion of time and space,
  in which time seems to slow.

  '
