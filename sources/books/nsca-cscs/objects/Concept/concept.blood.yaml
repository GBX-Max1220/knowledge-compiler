definition: 'Two paramount functions of blood are the transport of oxygen from the
  lungs to the tissues for use in cellular metabolism and the removal of carbon dioxide,
  the most abundant by-product of metabolism, from the tissues to the lungs. The transport
  of oxygen is accomplished by hemoglobin, the iron–protein molecule carried by the
  red blood cells. Hemoglobin also has an additional important role as an acid–base
  buffer, a regulator of hydrogen ion concentration, which is crucial to the rates
  of chemical reactions in cells. Red blood cells, the major component of blood, have
  other functions as well. For instance, they contain a large quantity of carbonic
  anhydrase, which catalyzes the reaction between carbon dioxide and water to facilitate
  carbon dioxide removal.

  '
