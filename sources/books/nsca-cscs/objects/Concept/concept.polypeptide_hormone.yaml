definition: 'Polypeptide hormones are composed of chains of amino acids and include
  hormones such as GH and insulin. Due to their non-lipophilic nature, polypeptide
  hormones cannot cross the cell membrane, and, therefore, their effects are mediated
  by secondary messengers within the cell.

