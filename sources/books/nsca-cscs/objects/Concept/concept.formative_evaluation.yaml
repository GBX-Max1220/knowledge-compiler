definition: 'Periodic reevaluation based on midtests administered during the training,
  usually at regular intervals (2). It enables monitoring of the athlete''s progress
  and adjustment of the training program according to the athlete''s individual needs.
  It also allows evaluation of different training methods and collection of normative
  data. Regular modification of the training program based on formative evaluation
  keeps the training program fresh and interesting and helps avoid physical and mental
  staleness.

  '
