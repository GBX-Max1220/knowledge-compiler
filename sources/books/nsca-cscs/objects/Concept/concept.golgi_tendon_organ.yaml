definition: 'The Golgi tendon organ is encapsulated within the serial components of
  the myotendinous junction. This is a proprioceptive mechanism that detects the rate
  and magnitude of force being applied to the respective tendon and will cause an
  inverse stretch reflex to occur past a tensile threshold, which immediately inhibits
  the excitatory signal through the motor neuron to the motor unit.

