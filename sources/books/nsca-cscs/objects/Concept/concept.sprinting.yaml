definition: 'Sprinting is a series of coupled flight and support phases, known as
  strides (e.g., right foot contact to next right foot contact, essentially comprised
  of two steps—right to left, left to right), orchestrated in an attempt to displace
  the athlete''s body down the track at maximal acceleration or velocity (or both),
  usually over brief distances and durations.

