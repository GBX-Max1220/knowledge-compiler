definition: 'Unilateral carries with the load positioned overhead (e.g., kettlebell
  or dumbbell) or at the hip via a kettlebell, dumbbell, or farmer''s handle (suitcase
  carry) impose a unique frontal plane challenge to the athlete (87). These carries
  may be advanced total body exercises that will improve lateral trunk flexor muscles
  (e.g., obliques and quadratus lumborum) and scapular control, thereby allowing better
  lateral stabilization of the spine than more traditional exercises such as dumbbell
  side bends or side planks.

