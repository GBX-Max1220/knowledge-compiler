definition: 'Men have about 15 to 16 g of hemoglobin per 100 mL of blood, and women
  have about 14 g of hemoglobin per 100 mL of blood. One gram of hemoglobin can carry
  1.34 mL of oxygen; thus, the oxygen-carrying capacity of 100 mL of blood is about
  20 mL of oxygen in men and a little less in women (27).

