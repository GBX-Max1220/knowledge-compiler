definition: 'The glycemic index (GI) ranks carbohydrates according to how quickly
  they are digested and absorbed, and therefore raise blood glucose levels, in the
  2-hour time period after a meal, compared to the same amount (by weight in grams)
  of a reference food, typically white bread or glucose, which is given a GI of 100
  (78).

  '
