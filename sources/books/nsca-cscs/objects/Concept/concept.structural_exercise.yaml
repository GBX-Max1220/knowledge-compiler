definition: 'A core exercise that emphasizes loading the spine directly (e.g., back
  squat) or indirectly (e.g., power clean) can be further described as a structural
  exercise. More specifically, a structural exercise involves muscular stabilization
  of posture during performance of the lifting movement (e.g., maintaining a rigid
  torso and a neutral spine during the back squat).

