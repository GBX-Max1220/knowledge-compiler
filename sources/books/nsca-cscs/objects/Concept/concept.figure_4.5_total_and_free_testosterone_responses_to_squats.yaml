definition: 'FIGURE 4.5 Responses of (a) total testosterone and (b) free testosterone
  in response to six sets of squats at 80% of the 1RM with 2 minutes rest between
  sets. The midpoint (Mid) sample is after three sets. * indicates a significant increase
  from pre-exercise values. # indicates a significant difference from women at the
  corresponding time point. Reprinted by permission from J.L. Vingren, W.J. Kraemer,
  D.L. Hatfield, et al., "Effect of Resistance Exercise on Muscle Steroid Receptor
  Protein Content in Strength Trained Men and Women," Steroids, 74 (2009): 1033-1039,
  with permission from Elsevier.

