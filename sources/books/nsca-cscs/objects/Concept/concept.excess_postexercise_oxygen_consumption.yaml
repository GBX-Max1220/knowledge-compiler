definition: 'Postexercise oxygen uptake has been termed the oxygen debt (85, 109),
  recovery O2 (109), or the excess postexercise oxygen consumption (EPOC) (22). The
  EPOC is the oxygen uptake above resting values used to restore homeostasis to the
  pre-exercise condition (141).

