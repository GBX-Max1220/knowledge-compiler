definition: 'The farmer''s walk requires the athlete to hold a load at the sides in
  each hand while walking forward (87, 147). The farmer''s walk can be performed with
  static loads (e.g., farmer''s bar handles or a heavy dumbbell) or variable loads
  (e.g., water-filled objects) (147). Regardless of the type of load used, the farmer''s
  walk offers a unique activation pattern of the core (87), although research in the
  scientific literature is very limited in supporting the use of this exercise as
  a strength and conditioning tool.

