definition: 'Steroid hormones, including cortisol, testosterone, and estradiol produced
  by the adrenal cortex and/or gonads, can diffuse across cell membranes due to their
  lipophilic (fat-soluble) nature. They engage with specific receptors inside the
  cell to form a hormone–receptor complex (H-RC). This complex undergoes a conformational
  change, activates, and pairs with another H-RC. It then moves to the nucleus, interacts
  with the DNA, and promotes the transcription process for specific proteins by "unzipping"
  DNA and identifying regulatory elements of the targeted gene (18, 117). The resulting
  mRNA is then translated by ribosomes in the sarcoplasm into the intended proteins.

  '
