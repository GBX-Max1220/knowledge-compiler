definition: 'The series elastic component (SEC) and parallel elastic component (PEC)
  are two elastic structures that can be stretched within the muscle during plyometric
  exercises. The SEC includes tendons and muscle fiber crossbridges. The PEC contains
  collagenous structures (e.g., fascicular membranes), which provide stability and
  protection to musculature.

