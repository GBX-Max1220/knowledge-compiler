definition: 'Initially named the Addisonoid syndrome since it is often accompanied
  by decreased concentrations of the stress hormone cortisol, this condition is characterized
  by the predominance of parasympathetic activity. In general, the parasympathetic
  overtraining syndrome is most often found in aerobic endurance athletes where very
  large training volumes are common.

