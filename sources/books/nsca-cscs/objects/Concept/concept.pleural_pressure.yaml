definition: 'Pleural pressure is the pressure in the narrow space between the lung
  pleura and the chest wall pleura (membranes enveloping the lungs and lining the
  chest walls). This pressure is normally slightly negative. Because the lung is an
  elastic structure, during normal inspiration the expansion of the chest cage can
  pull on the surface of the lungs and create a more negative pressure, thus enhancing
  inspiration. During expiration, the events are essentially reversed (41).

  '
