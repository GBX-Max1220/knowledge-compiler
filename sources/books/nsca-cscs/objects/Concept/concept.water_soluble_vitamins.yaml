definition: 'Water-soluble vitamins, including the B vitamins and vitamin C, dissolve
  in water and are transported in the blood. With the exception of vitamin B12, which
  is stored in the liver for years, water-soluble vitamins are not stored in appreciable
  amounts in the body; instead the body uses what is needed and then excretes the
  remaining amounts in urine (165).

