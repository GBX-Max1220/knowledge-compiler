definition: 'When a muscle fiber has reached its capacity for protein incorporation,
  or when a chronically elevated concentration of a hormone causes overstimulation,
  receptors may become desensitized or unresponsive—a condition known as receptor
  downregulation; a classic example of this phenomenon is insulin resistance, which
  can be caused by chronically elevated circulating insulin concentrations.

