definition: 'Carry out 5 to 10 repetitions for each movement, either in place or over
  a given distance. Where possible, progressively increase the ROM on each repetition.
  Where appropriate, increase the speed of motion in subsequent sets, but always maintain
  control of the motion. Actively control muscular actions as you move through the
  ROM. Where appropriate, try to replicate the movements required for sport performance.
  Move progressively through the ROM. Move deliberately through the motion but without
  bouncing (movement should be controlled at all times). Do not forsake good technique
  for additional ROM.

  '
