definition: 'Because low glycogen can impair muscle force, athletes should consume
  higher-energy carbohydrates immediately following weightlifting or strength and
  power competitions if they must compete or train again over the course of the 24-hour
  period after their initial competition. Otherwise, they can consume enough carbohydrate
  over the course of the day to restore glycogen levels before the next bout of training
  or competition.

  '
