recommendation_text: 'To optimize HIIT training adaptations for athletes, HIIT sessions
  should maximize the time spent at or near V̇O2max. In comparison to more general
  interval training, during HIIT specifically, the cumulative duration and intensity
  of the active portions of the work bouts should equate to several minutes above
  90% of V̇O2max (24).

  '
