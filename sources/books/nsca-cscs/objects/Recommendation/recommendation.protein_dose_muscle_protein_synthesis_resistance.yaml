definition: 'Varying amounts of protein have been used after resistance training to
  stimulate muscle protein synthesis, though it appears that 20 to 50 grams (providing
  about 8.5 g-20 g of essential amino acids) of a high-quality, high-leucine, fast
  protein (one that leads to a rapid rise in amino acids in the bloodstream) in younger
  individuals may maximally stimulate muscle protein synthesis, while 40 grams or
  more may be necessary in older adults (59, 109).

