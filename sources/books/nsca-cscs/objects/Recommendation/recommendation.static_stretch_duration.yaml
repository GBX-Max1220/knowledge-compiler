definition: 'As to the appropriate duration for a static stretch, 15 to 30 seconds
  is generally recommended (81) and has been shown to be more effective than shorter
  durations (66). Evidence supports the use of 30 seconds (4-6) and suggests diminishing
  returns beyond this duration.

