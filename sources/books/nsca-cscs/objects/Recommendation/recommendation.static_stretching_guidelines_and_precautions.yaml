definition: 'Get into a position that facilitates relaxation. Move to the point in
  the ROM where you experience a sensation of mild discomfort. If performing partner-assisted
  PNF stretching, communicate clearly with your partner. Hold stretches for 15 to
  30 seconds. Repeat unilateral stretches on both sides. Decrease stretch intensity
  if you experience pain, radiating symptoms, or loss of sensation. Use caution when
  stretching a hypermobile joint. Avoid combination movements that involve the spine
  (e.g., extension and lateral flexion). Stabilizing muscles should be active to protect
  other joints and prevent unwanted movements.

