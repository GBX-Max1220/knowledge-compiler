definition: 'Athletes should consider supplementing with carbohydrate before and during
  competition to maintain strength and minimize muscle breakdown. In general, strength
  or speed athletes should consume 5 to 6 grams of carbohydrate per kilogram body
  weight per day during peak training periods. As little as 30 grams of carbohydrate
  after training may reduce muscle breakdown.

