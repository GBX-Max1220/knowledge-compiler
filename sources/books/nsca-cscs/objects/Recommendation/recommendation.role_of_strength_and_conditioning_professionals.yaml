definition: 'Strength and conditioning professionals play an integral part in the
  decision-making process regarding which ergogenic aids athletes choose to take.
  Therefore, it is imperative that strength and conditioning professionals stay up
  to date on the latest scientific findings on what ergogenic aids are safe, effective,
  and legal. If strength and conditioning professionals fail in this area, the athletes
  they serve will be more susceptible to hyped marketing, potentially false advertising,
  and influence by others who may not have the athlete’s best interests in mind.

  '
