recommendation_text: 'The use of appropriate exercise intensities and rest intervals
  (i.e., work-to-rest ratios) allows for the "selection" of specific primary energy
  systems during training and, because this is more reflective of the actual metabolic
  demands of the sport, results in more efficient and productive regimens for specific
  athletic events with various metabolic demands.

