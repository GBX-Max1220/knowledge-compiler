recommendation_text: 'Principles of supervision include the following (5): Always
  be there. Be active and hands on. Be prudent, careful, and prepared. Be qualified.
  Be vigilant. Inform participants of safety and emergency procedures. Know participants’
  health status. Monitor and enforce rules and regulations. Monitor and scrutinize
  the environment.

