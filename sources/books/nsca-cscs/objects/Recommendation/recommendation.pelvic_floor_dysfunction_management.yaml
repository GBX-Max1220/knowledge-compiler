definition: 'Programs should include prevention, lifestyle modifications, pelvic floor
  strengthening, biofeedback, and pharmacological interventions. Female athletes should
  be taught how to properly engage their pelvic floor muscles and abdominal wall muscles,
  and in some cases may need to see a physical therapist that specializes in PFD.

