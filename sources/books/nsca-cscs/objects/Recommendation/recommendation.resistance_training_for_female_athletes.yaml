definition: 'Evidence indicates that resistance exercise can be a safe and effective
  method of training for female athletes of all ages and abilities. The potential
  benefits are multifactorial, including positive effects on a variety of physical
  performance variables (e.g., strength and power), health markers (e.g., body composition
  and cardiac function), and psychosocial development (e.g., self-image and confidence).
  Moreover, regular participation in resistance training programs can better prepare
  female athletes to increase performance and decrease risk of injury. Though the
  fundamental principles of resistance training are similar for people of both sexes,
  there are unique considerations specific to female athletes. Knowledge of sex-related
  differences is essential to the development and evaluation of safe and effective
  resistance training programs. Strength and conditioning professionals should be
  aware that individual responses to resistance exercise may vary greatly independent
  of sex and should be sensitive to the individual needs of all participants.

  '
