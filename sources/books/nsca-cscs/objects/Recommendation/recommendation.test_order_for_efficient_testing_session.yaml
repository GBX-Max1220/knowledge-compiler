definition: 'The test order should also be designed to require minimal recovery time
  between tests, allowing for a more efficient testing session. An effort should be
  made to administer fatiguing anaerobic capacity tests and aerobic tests on a different
  day than the other tests. However, if performed on the same day, these tests should
  be performed last, after an extended rest period.

