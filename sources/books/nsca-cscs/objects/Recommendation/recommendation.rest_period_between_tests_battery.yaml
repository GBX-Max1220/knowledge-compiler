definition: 'When administering a test battery (e.g., one in which wrestlers perform
  maximal repetition pull-up and push-up tests for assessment of local muscular endurance),
  tests should be separated by at least 5 minutes to prevent the effects of fatigue
  from confounding test results (also see the following section, Sequence of Tests).

