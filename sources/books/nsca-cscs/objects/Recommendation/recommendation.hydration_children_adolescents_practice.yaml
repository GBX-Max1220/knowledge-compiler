definition: 'Hydration guidance for children and adolescents consists of 5 to 9 fluid
  ounces (148-266 mL) of cold water or a flavored salted beverage or sport drink depending
  on their weight. For example, children or adolescents weighing 40 kilograms (88
  lb) should drink 5 fluid ounces (148 mL) and those weighing 60 kg (132 lb) should
  drink 9 fluid ounces (266 mL) every 20 minutes during practice, even if they do
  not feel thirsty (30, 37, 106).

  '
