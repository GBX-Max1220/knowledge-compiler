precautions:
- Be aware of the disconnect between the moment the athlete reaches the wall or vanes
  and the moment the maximum height of the body's center of mass is achieved.
- Consider that shoulder mobility issues may limit some athlete's reach height.
- Do not compare or use interchangeably jump height values from jump-and-reach tests
  with values from force plates, contact mats, or different jump techniques.
