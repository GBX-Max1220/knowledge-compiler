definition: 'The strength and conditioning professional should be aware of potential
  sources of error with the jump-and-reach-style tests. These include a disconnect
  between the moment when the athlete reaches the wall or vanes with the hand and
  the moment the maximum height of the body’s center of mass is achieved; additionally,
  shoulder mobility issues may limit some athlete’s reach height. Also, jump height
  values calculated using common technologies such as force plates and contact mats
  are most often measured as the maximum total body center of mass height relative
  to its height at takeoff and not relative to its height when standing still (158).
  Thus, jump height values from jump-and-reach tests should not be compared directly
  to, or used interchangeably with, jump height values recorded with such technologies
  or, indeed, with different jump techniques, such as when keeping arms akimbo.

  '
severity: moderate
