definition: 'Excess preformed vitamin A (not beta carotene, alpha carotene, or beta
  crypto xanthin, which are converted into vitamin A in the body) is toxic and associated
  with significant adverse effects including liver damage, intracranial pressure (pseudotumor
  cerebri), dizziness, nausea, headaches, skin irritation, pain in joints and bones,
  coma, and even death (23). Excess vitamin A intake can occur through diet but typically
  results from high levels of vitamin A in supplements (72, 109).

