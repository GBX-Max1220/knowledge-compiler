warning_text: 'However, pressure in the chest associated with the Valsalva maneuver
  can have the undesirable side effect of exerting compressive force on the heart,
  making it more difficult for blood to return to the heart. Also, the Valsalva maneuver
  can transiently raise blood pressure to slightly elevated levels (20).

