definition: 'Strength and conditioning professionals should be aware of the potential
  risks of breath holding (Valsalva maneuver) for older adults. While the Valsalva
  maneuver assists in stabilizing the trunk and vertebral column during performance
  of various resistance training exercises, owing to the sudden rise in systolic and
  diastolic blood pressure that the technique creates, this technique is generally
  discouraged in seniors, especially in those individuals with absolute and relative
  contraindications.

