definition: 'Athletes who attempt to lose too much weight too quickly may lose lean
  body mass, feel fatigued, experience headaches or mood swings, put their training
  and performance in jeopardy, and suffer from several potentially serious side effects.
  These include dehydration, heat illness, muscle cramping, fatigue, dizziness, suppressed
  immune system functioning, hormone imbalances, hyperthermia, reduced muscle strength,
  decreased plasma and blood volume, low blood pressure, electrolyte imbalances, kidney
  failure (diuretic abuse), fainting, and death (in extreme cases) (38).

  '
severity: critical
