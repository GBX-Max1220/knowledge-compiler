definition: 'Program the device with the athlete''s sex, weight, and height. Have
  the athlete either hold the electrodes in the hands or stand barefoot on the electrodes
  depending on the type of device. Press the start button and wait the specified duration
  of time for that device (usually under 5 seconds). From the measuring device, obtain
  and record the body composition measurements provided. This means of evaluating
  body composition is best done under similar circumstances. To most effectively monitor
  body composition changes, it is recommended that testing be done first thing in
  the morning before the athlete has exercised, before food or water consumption,
  and after having voided.

  '
