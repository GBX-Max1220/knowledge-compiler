definition: 'Take an exaggerated step directly forward with the right leg and assume
  a lunge stance, keeping the right knee directly over the right foot and the rear
  (left) knee about an inch or so off the floor (note: this preparatory position is
  not shown). Flex the torso forward with the hands reaching toward the right foot.
  From this position, lift the hips up and back, extending the right knee to a fully
  (or nearly so) extended position. This will cause the left knee to extend as well
  and result in a stretch of the hamstring muscles. After the stretch is held, extend
  the torso to an erect position, step the rear (left) foot forward, and repeat on
  the other side.

  '
