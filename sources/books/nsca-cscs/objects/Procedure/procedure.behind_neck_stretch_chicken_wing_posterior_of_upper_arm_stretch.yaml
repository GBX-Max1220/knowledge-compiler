definition: '1. Standing or sitting, abduct the right shoulder and flex the elbow.
  2. Reach the right hand down toward the left scapula. 3. Grasp the right elbow with
  the left hand. 4. Pull the elbow behind the head with the left hand to increase
  shoulder abduction. 5. Repeat on the other side.

