definition: 'Stand erect and very close to the head of the bench (but do not distract
  the athlete). Place the feet shoulder-width apart in a staggered stance with the
  knees slightly flexed. Grasp the bar with a closed, alternated grip. Hand the bar
  to the athlete. Guide the bar to a position over the athlete''s chest. Release the
  bar smoothly.

