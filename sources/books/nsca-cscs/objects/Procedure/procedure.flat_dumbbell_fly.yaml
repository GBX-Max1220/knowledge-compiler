definition: 'Starting Position: Athlete Grasp two dumbbells using a closed, neutral
  grip. Lie in a supine position on a bench in the five-point body contact position.
  Signal the spotter for assistance in moving the dumbbells into the starting position.
  Press the dumbbells in unison to an extended-elbow position above the chest. Slightly
  flex the elbows and point them out to the sides. All repetitions begin from this
  position. Starting Position: Spotter Position one knee on the floor with the foot
  of the other leg forward and flat on the floor (or kneel on both knees). Grasp the
  athlete''s forearms near the wrists. At the athlete''s signal, assist with moving
  the dumbbells to a position over the athlete''s chest. Release the athlete''s forearms
  smoothly. Downward Movement Phase: Athlete Lower the dumbbells in a wide arc until
  they are level with the shoulders or chest. Keep the dumbbell handles parallel to
  each other as the elbows move downward. Keep the wrists stiff and the elbows held
  in a slightly flexed position. Keep the hands, wrists, forearms, elbows, upper arms,
  and shoulders in the same vertical plane. Maintain the five-point body contact position.
  Downward Movement Phase: Spotter Keep the hands near—but not touching—the athlete''s
  forearms near the wrists as the dumbbells descend. Upward Movement Phase: Athlete
  Raise the dumbbells up toward each other in a wide arc back to the starting position.
  Keep the wrists stiff and the elbows held in a slightly flexed position. Keep the
  hands, wrists, forearms, elbows, upper arms, and shoulders in the same vertical
  plane. Maintain the five-point body contact position. Upward Movement Phase: Spotter
  Keep the hands near—but not touching—the athlete''s forearms near the wrists as
  the dumbbells ascend.

  '
