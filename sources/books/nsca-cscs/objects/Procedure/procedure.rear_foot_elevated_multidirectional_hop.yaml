definition: 'An exercise drill involving a rear foot–elevated multidirectional hop
  over a mini-hurdle, with medium intensity and vertical and lateral direction.

  '
attributes:
- intensity_level: Medium
- direction: Vertical and lateral
- equipment: Plyometric box, 6 to 18 inches (15-46 cm) high; mini-hurdle, 6 to 24
    inches (15-61 cm) high
purpose:
- perform a rear foot–elevated multidirectional hop
related_concepts: []
steps:
- step_number: 1
  description: Start in a deep split squat position, with the rear foot elevated on
    a plyometric box (or equivalent). The foot on the ground should rest parallel
    to the mini-hurdle.
- step_number: 2
  description: None
- step_number: 3
  description: Push off with the standing leg to rise vertically and sideways over
    the mini-hurdle. Keep the ankle dorsiflexed in preparation for an active flat-foot
    contact with the ground on landing.
- step_number: 4
  description: Land with the same foot on the opposite side of the hurdle. Immediately
    repeat the movement to the opposite side.
common_errors:
- Not producing sufficient vertical force from the front foot to push out of the squat
  position and clear the hurdle with full extension in the hip and knee
- Absorbing too much of the landing impact into the hip and knee of the front leg,
  increasing ground contact time
