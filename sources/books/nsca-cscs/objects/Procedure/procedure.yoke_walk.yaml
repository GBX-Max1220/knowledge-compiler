steps:
- phase: Starting Position
  description: 'Adjust the yoke to a height that would provide sufficient clearance
    to walk safely without tripping over it (perhaps 4-6 in. [10-15 cm] of ground
    clearance). Assume a position under the yoke with the bar positioned on top of
    the upper trapezius muscles, with the feet positioned underneath the hips and
    the rest of the body symmetrically positioned under the frame. This should look
    something similar to the starting position of a partial barbell back squat, except
    that the hands are positioned on the vertical bars around lower chest height.

    '
- phase: Liftoff and Walking Phase
  description: 'After strongly bracing the spine, forcibly push the feet into the
    ground while pushing the elbows and hands forward into the vertical bars to better
    stabilize the yoke. While continuing to brace the spine and push the elbows and
    hands forward, adopt a walking movement pattern in which the spine remains vertical;
    initially focus on performing a series of short and relatively fast steps. While
    accelerating, increase the length of steps and further reduce ground contact times.

    '
- phase: Ending Position
  description: 'After completing the set distance, flex the hips, knees, and ankles
    to lower the frame carefully to the ground. Maintain a strong braced spinal position
    to minimize the risk of impact injury.

    '
