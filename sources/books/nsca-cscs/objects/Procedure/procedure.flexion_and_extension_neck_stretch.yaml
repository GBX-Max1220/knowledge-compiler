definition: '1. Standing or sitting with head and neck upright, flex the neck by tucking
  the chin toward the chest. 2. If the chin touches the chest, try to touch the chin
  lower on the chest. 3. Extend the neck by trying to come as close as possible to
  touching the head to the back.

