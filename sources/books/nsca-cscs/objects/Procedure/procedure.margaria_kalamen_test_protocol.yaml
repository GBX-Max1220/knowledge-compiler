steps:
- order: 1
  description: The height of each step is measured with a ruler or tape measure, and
    the elevation from the third step to the ninth step is calculated (6 × step height).
- order: 2
  description: The timer start switch mechanism is placed on the third step, and the
    stop switch mechanism is placed on the ninth step.
- order: 3
  description: The athlete to be tested is weighed on a scale, warms up, and practices
    running up the stairs three steps at a time.
- order: 4
