definition: 'Lie supine with the knees flexed to approximately 90 degrees and the
  feet hip-width apart and flat on the floor. Pushing the feet into the floor and
  squeezing the glutes, lift the hips up toward the ceiling until the body attains
  a straight-line posture. Hold for a second and then return the hips to the floor.
  The action can use a single leg as an alternative to a double leg.

