definition: 'Stand tall and take a small step forward with the left leg. Flex at the
  waist. Reach forward with the left arm and simultaneously reach back with the right
  leg. Try to keep the hips square. Reach a position in which you feel a stretch in
  the hamstrings but eventually aim to attain a position in which the body is parallel
  to the floor. Reach the right hand down toward the floor. Return to the start by
  actively using the hamstrings and gluteals of the planted leg. Take a step forward
  and repeat on the other side.

