definition: 'A strongman exercise that consists of quickly and forcefully picking
  a log up from the ground to the front of the shoulders and then pressing it overhead.
  The log clean consists of three phases but occurs in two motions, with a pause of
  the log at the shoulders. The log can either be cleaned and pressed each repetition
  or cleaned once and pressed for multiple repetitions.

  '
