definition: 'Stand erect with the feet parallel to each other and shoulder-width apart.
  Take a small step forward with the right leg; place the heel of the right foot on
  the ground first and then continue to dorsiflex the foot. Immediately roll forward
  and rise up as high as possible onto the ball of the right foot. Swing the left
  leg forward in order to take another small step. Repeat with the left leg, progressing
  forward with each step.

  '
