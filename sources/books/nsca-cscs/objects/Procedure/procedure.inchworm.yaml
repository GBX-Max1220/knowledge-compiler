definition: 'Stand erect with the feet placed shoulder-width apart. While slightly
  flexing the knees, flex forward at the waist and place hands shoulder-width apart
  flat on the floor. The weight of the body should be shifted back (i.e., not directly
  over the hands), with the buttocks high in the air—imagine making an inverted V
  with the body. Move the hands alternately forward, as if taking short steps with
  the hands, until the body is in a push-up position. Walk the legs to the hands using
  small steps while keeping the knees slightly flexed. Repeat the motion over a prescribed
  distance.

  '
