definition: 'Starting Position Sit on the end of a bench. Grasp the bar with a closed,
  supinated grip about hip- to shoulder-width apart. Position the feet and legs parallel
  to each other with the toes pointing straight ahead. Lean the torso forward and
  place the elbows and forearms on the top of the thighs. Move the wrists forward
  until they extend slightly beyond the patellae. Allow the wrists to extend and the
  hands to open so that the fingertips hold the bar. Upward Movement Phase Raise the
  bar by flexing the fingers and then the wrists. Flex the wrists as far as possible
  without moving the elbows or forearms. Do not jerk the shoulders backward or swing
  the bar upward. Downward Movement Phase Allow the wrists and fingers to slowly extend
  back to the starting position. Keep the torso and arms in the same position.

  '
