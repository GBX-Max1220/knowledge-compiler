definition: 'An appropriately organized warm-up consists of a general warm-up followed
  by a specific warm-up. Both types of warm-ups include body movements similar to
  those involved in the test. An organized, instructor-led general warm-up ensures
  uniformity. It is acceptable to allow two or three activity-specific warm-up trials,
  depending on the test protocol, and have subsequent trials actually count toward
  the score. Depending on the test protocol, the score can be the best or the average
  of the post-warm-up trials (2).

  '
