definition: 'Lie in a supine position on a bench in the five-point body contact position.
  Grasp the bar from the spotter with a closed, pronated grip about 12 inches (30
  cm) wide. Position the bar over the chest with the elbows fully extended and the
  arms parallel. Point the elbows toward the knees (not out to the sides). All repetitions
  begin from this position.

