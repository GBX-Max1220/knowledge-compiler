evidence_text: 'When used with clinical and recreationally trained populations, kettlebell
  training has been reported to increase muscular strength levels compared to no training
  (68, 103). Additionally, when a battery of kettlebell exercises (i.e., swings, goblet
  squats, accelerated swings) is performed across a six-week training intervention,
  there appears to be an increase in muscular strength and vertical jump performance
  in recreationally trained men (103). However, these strength gains are significantly
  lower than those typically seen with traditional weightlifting-based training methods.
  Specifically, Otto and colleagues (103) reported that six weeks of weightlifting
  training resulted in a 4% increase in vertical jump performance, while kettlebell
  swings increased jumping performance by only 0.8%. Additionally, back squat strength
  was increased by 13.6% after six weeks of traditional weightlifting training, while
  the kettlebell training resulted in only a 4.5% increase (103).

