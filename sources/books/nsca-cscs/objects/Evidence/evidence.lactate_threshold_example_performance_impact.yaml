definition: 'Two individuals can have the same V̇O2max, perhaps 50 mL · kg−1 · min−1;
  however, if one has a lactate threshold of 80% of V̇O2max (i.e., threshold occurs
  at 40 mL · kg−1 · min−1) whereas the other''s occurs at 70% (i.e., 35 mL · kg−1
  · min−1), the first individual will be able to maintain a power output equivalent
  to 5 mL · kg−1· min−1 higher than the second individual.

