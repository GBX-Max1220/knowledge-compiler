definition: 'Forbes and colleagues (70) gave 15 physically active college-aged students
  a commercially available energy drink or an isocaloric noncaffeinated placebo 60
  minutes before exercise. The energy drink was standardized with 2 milligrams of
  caffeine per kilogram body mass. The exercise bout consisted of 3 sets of 70% 1RM
  bench press conducted to failure on each set with 1 minute of rest between each
  set. The energy drink significantly increased bench press performance as compared
  to the placebo treatment. Other studies investigating the effects of preworkout
  energy drink consumption have also reported improvements in upper and lower body
  total lifting volume (54, 86).

  '
