definition: 'The most recent evidence on menstrual cycle and performance from meta-analyses
  did not conclude any systematic relationship between performance and menstrual cycle
  phase in trained female athletes (38, 50, 111, 112). Other considerations are necessary
  to consider, such as varying menstrual cycle symptoms among female athletes and
  the effect on their sleep and recovery during all stages of the menstrual cycle
  (110).

  '
