evidence_text: 'In fact, several studies have demonstrated that recovery in anaerobic
  power output is related to endurance fitness (14, 15, 74). Bogdanis and colleagues
  (14) reported positive relationships in power recovery in the first 10 seconds of
  a cycling sprint, the resynthesis of PCr, and endurance fitness (V̇O2max).

