evidence_text: 'Sedano and colleagues (134) reported improvements in performance of
  highly trained runners as a result of concurrent endurance, resistance, and plyometric
  training. There was no reduction in V̇O2max over the 12 weeks in runners who participated
  in resistance and plyometric training. Furthermore, the concurrent training improved
  performance measures such as maximal strength, peak running velocity, and 3-kilometer
  (1.7 miles) time trial compared to endurance training alone.

