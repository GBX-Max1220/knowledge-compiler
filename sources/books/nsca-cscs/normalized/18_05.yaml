  reviewed: "auto"
evidence_level: ""
relationships: []
steps:
  - step_number: 1
    instruction: "Instruct the athlete to warm up with a light resistance that easily allows 5 to 10 repetitions."
  - step_number: 2
    instruction: "Provide a 1-minute rest period."
  - step_number: 3
    instruction: "Estimate a warm-up load that will allow the athlete to complete three to five repetitions by adding 10 to 20 pounds (4-9 kg) or 5% to 10% for upper body exercise or 30 to 40 pounds (14-18 kg) or 10% to 20% for lower body exercise."
  - step_number: 4
    instruction: "Provide a 2-minute rest period."
  - step_number: 5
    instruction: "Estimate a conservative, near-maximal load that will allow the athlete to complete two or three repetitions by adding 10 to 20 pounds (4-9 kg) or 5% to 10% for upper body exercise or 30 to 40 pounds (14-18 kg) or 10% to 20% for lower body exercise."
  - step_number: 6
    instruction: "Provide a 2- to 4-minute rest period."
  - step_number: 7
    instruction: "Make a load increase: 10 to 20 pounds (4-9 kg) or 5% to 10% for upper body exercise or 30 to 40 pounds (14-18 kg) or 10% to 20% for lower body exercise."
  - step_number: 8
    instruction: "Instruct the athlete to attempt a 1RM."
  - step_number: 9
    instruction: "If the athlete was successful, provide a 2- to 4-minute rest period and go back to step 7. If the athlete failed, provide a 2- to 4-minute rest period; then decrease the load by subtracting 5 to 10 pounds (2-4 kg) or 2.5% to 5% for upper body exercise or 15 to 20 pounds (7-9 kg) or 5% to 10% for lower body exercise. AND then go back to step 8. Continue increasing or decreasing the load until the athlete can complete one repetition with proper exercise technique. Ideally, the athlete's 1RM will be measured within three to five testing sets."
