id: recommendation.exercise_selection_for_1rm_testing
type: Recommendation
canonical_name: Exercise Selection for 1RM Testing
semantic_type: Recommendation
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 18
  chapter_title: "Resistance Training Program Design"
  section: "18.5"
  section_title: "Step 5: Training Load and Repetitions"
  book_page: 1226
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
recommendation_text: >
  When selecting exercises for 1RM testing, the strength and conditioning professional should choose core exercises, because the large muscle groups and multiple joints are better able to handle the heavy loads. Despite this guideline, an exercise should not be selected for 1RM testing if it cannot provide valid and reliable data (i.e., does not accurately and consistently assess maximal muscular strength). For instance, the large upper back musculature and multiple joints involved in the bent-over row exercise can probably tolerate the loads for a 1RM test, but maintaining a correct body position throughout testing would be extremely difficult. The weaker stabilizing muscles of the lower back might become very fatigued after several testing sets, resulting in a loss of proper exercise technique and an invalid test.
rationale: >
  Core exercises involve large muscle groups and multiple joints that are better able to handle heavy loads. Exercises that cannot provide valid and reliable data should not be selected.
