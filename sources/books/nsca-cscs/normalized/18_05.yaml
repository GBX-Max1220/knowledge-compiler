evidence_level: ""
relationships: []
warning_text: >
  One-repetition maximum testing requires an adequate training status and lifting experience, because the assessment of maximal strength places significant stress on the involved muscles, connective tissues, and joints, although this has been shown to be appropriate and reliable in youth and collegiate athletes with approximately 6 months' experience in the power clean and back squat (24, 49). However, it may be more appropriate to complete a 3RM test instead of a maximal 1RM test because ignoring an athlete's training status and exercise technique experience diminishes the safety and accuracy of 1RM test results.
severity: moderate
