  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  To assign training loads based on a percentage of the 1RM, the strength and conditioning professional must first determine the athlete's 1RM. This method of assessment is typically reserved for resistance-trained athletes who are classified as intermediate or advanced and have exercise technique experience in the exercises being tested; however, 1RM testing can be safely performed with youth (19), adolescents (49), inexperienced adults (24), and older adults (127). Individuals who are untrained, inexperienced, injured, or medically supervised may not be appropriate participants for 1RM testing.
