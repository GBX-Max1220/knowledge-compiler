id: table_row.assistance_training
type: TableRow
canonical_name: Assistance Training
semantic_type: Training_Method
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 20
  chapter_title: "Running Speed Development"
  section: "20.3"
  section_title: "Running Speed Development"
  book_page: 1432
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  Assistance training (e.g., overspeed training) inclusive of modalities such as rope towing, bungee cord pulls, or downhill running with the intention of allowing the athlete to run at supramaximal speeds.
attributes:
  - type_of_training: "Assistance training (e.g., overspeed training)"
  - example_exercise_modalities: "Inclusive of modalities such as rope towing, bungee cord pulls, or downhill running with the intention of allowing the athlete to run at supramaximal speeds"
  - potential_benefits: "Theoretically, these training tools are used to potentially expose the athlete to higher velocities than one can achieve in unassisted sprinting by inducing an increased step or stride rate and exposing the athlete to higher hip angular velocities (46). This increased step rate is hypothesized to have potential for neuromuscular adaptations to increase maximal sprint velocity. Increases in overspeed should be limited to ≤10%."
  - potential_disadvantages: "Assisted sprinting may prematurely rush an athlete’s stance phase, thus removing time needed to exert optimal forces, and has been shown to result in decreased muscle activation and propulsive force production in comparison to maximal running (66). Therefore, what can be described as chop steps may be observed. Undesirable techniques such as leaning back and overstriding may be present in a protective manner to brake, which is suboptimal. Exercises that rely on the towing of athletes may increase braking forces in comparison to maximal running (66) as athletes attempt to tolerate velocities they cannot naturally create or accommodate because of biomechanical efficiency, training state, or both. Downhill sprinting may expose the athlete to unnecessary eccentric forces through a modified stance leg that results from having to find the ground. This may also affect the SSC, which is optimized through the foot placement occurring just in front of the center of mass on ground contact in flat-surface upright sprinting (66). To date, very little research supports the implementation of overspeed training, because sprint success results from an athlete’s ability to produce large forces in a short ground contact time."
  - practical_use_suggestions: "Top-speed sprinting should be developed through more natural and safer training tools that consider an athlete’s training status and support optimal biomechanics. Strength and conditioning professionals should carefully assess the implications of assistance modalities before implementation and these modalities may be best used when working with advanced or elite athletes."
purpose: []
related_concepts: []
