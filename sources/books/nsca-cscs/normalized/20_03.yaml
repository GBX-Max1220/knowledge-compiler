# ontology: knowledge-compiler/v1

id: table_row.resistance_sprinting
type: TableRow
canonical_name: Resistance Sprinting
semantic_type: Training_Method
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 20
  chapter_title: "Running Speed Development"
  section: "20.3"
  section_title: "Running Speed Development"
  book_page: 1432
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  Resistance sprinting inclusive of training modalities such as sled towing, sled pushing, wind resistance, incline sprinting, and sled pushing with the intention of improving an athlete’s accelerative abilities.
attributes:
  - type_of_training: "Resistance sprinting"
  - example_exercise_modalities: "Inclusive of training modalities such as sled towing, sled pushing, wind resistance, incline sprinting, and sled pushing with the intention of improving an athlete’s accelerative abilities"
  - potential_benefits: "Accentuates the biomechanics of the acceleration phase by placing the athlete in a position that promotes lowered torso (i.e., forward trunk lean), hips, and shin angles. Resisted sprinting may optimize an athlete’s ability to cover short distances quickly by overloading the acceleration phase, resulting in ground contact times that produce higher propulsive forces. Improving acceleration, which is a change in velocity, may lead to an increase in top speed through enhanced RFD. Resisted sprints and loads, and velocity decrements, can be manipulated to target technical, speed–strength, power, and strength–speed qualities (19, 20). It may offer specificity to sporting scenarios when athletes need to push (move) external mass such as in bobsled, rugby, and American football."
  - potential_disadvantages: "Sprint efforts against a load that is too great may lead to longer ground contact times in addition to shorter step lengths that are not task specific (59). Slopes of incline that are too great may modify proper sprinting biomechanics, resulting in a rehearsal of improper technique and thus limiting transfer of training effect. Sled pushing may alter the natural sprinting gait cycle due to the removal of arm action that synchronizes and counterbalances the leg action occurring at the hip."
  - practical_use_suggestions: "Strength and conditioning professionals and athletes attempting to improve the acceleration phase of a sprint may adopt resistance training modalities that maintain normal biomechanics involved in unresisted sprints. Loads should be chosen based on the sporting context while also considering the athlete’s physical status. For instance, track and field sprinters may use loads that do not decrease running velocity by more than 10% to 12% (2, 49, 52, 61). In contrast, field sport athletes who overcome external resistance while blocking, tackling, and scrimmaging can use loads 20% to 30% of body weight to improve the initial 5-10 m of movement (28, 52). Frictional properties will influence the amount of resistance experienced, thus prescribing sled pushes and pulls based on velocity decrements is suggested (19, 20)."
purpose: []
related_concepts: []
