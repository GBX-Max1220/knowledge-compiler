recommendation_text: >
  During the season, one session per week is appropriate for American football players, while two or three sessions per week are common for track and field athletes (2). During the off-season, plyometric training frequency may increase to two or three sessions per week for American football players and to three or four sessions per week for track and field athletes (2).
population:
