recommendation_text: >
  Recovery for depth jumps may consist of 5 to 10 seconds of rest between repetitions and 2 to 5 minutes between sets. The time between sets is determined by a proper work-to-rest ratio (i.e., 1:5 to 1:10) and is specific to the volume and type of drill being performed.
