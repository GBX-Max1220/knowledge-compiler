definition: >
  In light of these research findings, which training protocol (altitude or heat) should an athlete complete? In answering this question, it is important to remember two points. First, nonhematological adaptations are directly related to the stresses of the training environment, and second, the nonhematological adaptations to both altitude and heat are specific to the environment in which the athlete will compete (118). Or put another way, what is going to have the biggest impact on the athlete’s performance on race day, altitude or heat? For example, if an athlete was preparing for a marathon to be held at an altitude of 2,500 to 3,000 meters (8,202-9,843 ft), the answer would be altitude, because the athlete would notice the change in atmospheric pressure at that altitude if he or she were from a sea-level environment. However, if the athlete was preparing for a marathon at sea level but in a warm to hot and humid environment and notably above his or her temperate, dry training environment, he or she would be best served by undertaking a heat acclimation protocol. Consequently, it is necessary to compare the training and competition environments and consider the athlete’s current level of adaptations to determine what adaptations should be optimized to improve performance on race day. Irrespective of the training method selected to prepare an athlete for competition, establishing how each athlete adapts and providing individualized programs to optimize adaptations is important, because not all athletes will respond to altitude and heat protocols the same (118).

