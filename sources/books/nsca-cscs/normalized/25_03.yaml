definition: >
  Surfaces in the strength and conditioning facility should be cleaned, sanitized, and disinfected consistently to ensure that the equipment is safe and functional. Proper maintenance will reduce cost in the long run, because cleaning supplies are cheaper than replacing padding, flooring, exercise mats, and so on. Microbes will begin to grow if the surfaces are not wiped down with a germicidal cleaner.

attributes: []

purpose:
  - ensure equipment is safe and functional
  - reduce cost in the long run

