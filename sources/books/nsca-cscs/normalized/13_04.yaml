definition: >
  Heat injury is also a risk during heavy physical exertion in hot environments, especially when humidity is high. Athletes should wear light clothing in warm weather and drink water ad libitum according to the dictates of thirst before and during heavy physical exertion in the heat (refer to chapters 10 and 11 for more detailed hydration guidelines).

