  book_page: 753
  pdf_page: 753

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Be aware of the symptoms of hyponatremia or water intoxication, a potentially fatal condition in which excess water intake reduces blood sodium to dangerously low levels. Symptoms may include extremely diluted urine in combination with bloated skin, altered consciousness, or loss of consciousness, with no increase in body temperature. A victim of hyponatremia should never be given fluid and should be treated by a physician.

attributes:
  - extremely diluted urine
  - bloated skin
  - altered consciousness
  - loss of consciousness

purpose: []

