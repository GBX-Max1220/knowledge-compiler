id: warning.symptoms_hyponatremia
type: Warning
canonical_name: Symptoms of Hyponatremia
semantic_type: Warning
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 13
  chapter_title: "Exercise Testing"
  section: "13.4"
