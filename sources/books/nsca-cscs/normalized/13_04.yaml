definition: >
  Strenuous exercise, such as maximal runs or 1-repetition maximum (1RM) tests, can uncover or worsen existing heart problems, such as impaired blood flow to the heart muscle and irregular heartbeats. Standard medical screening cannot always reveal hidden heart problems, which occasionally result in fatality among young athletes (30).

