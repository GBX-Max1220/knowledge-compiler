  A low-intensity plyometric drill involving a hop onto a box using one leg.

attributes:
  - intensity_level: Low
  - direction: Vertical and slightly horizontal
  - arm_action: Double arm
  - equipment: "Plyometric box, 6 to 42 inches (15-107 cm) high"

purpose: []

related_concepts: []

steps:
  - step_number: 1
    action: "Facing the plyometric box, get into a comfortable, upright stance on one foot. The non-jumping leg is held in a stationary position with the hip and knee flexed during the exercise."
    phase: Starting position
  - step_number: 2
    action: "Begin with a countermovement."
    phase: Preparatory movement
  - step_number: 3
    action: "Forcefully triple extend and hop onto the top of the box."
    phase: Upward movement
  - step_number: 4
    action: "Land on the same foot in a triple flexion position (hip, knee, and ankle flexed and stable), step down from the box, and repeat."
    phase: Downward movement

notes:
  - "Although significant force may be required to hop onto boxes in excess of 30 inches (76 cm), this is a low-intensity drill because the athlete is accelerating against gravity and lands with less force than his or her body weight because of this."
