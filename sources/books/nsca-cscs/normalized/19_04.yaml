definition: >
  A medium-intensity plyometric drill involving a bound that is an exaggeration of the running gait, with the goal of covering as great a distance as possible during each stride.

attributes:
  - intensity_level: Medium
  - direction: Horizontal and vertical
  - arm_action: Double arm

purpose:
  - cover as great a distance as possible during each stride

related_concepts: []

steps:
  - step_number: 1
    action: "Get into a comfortable, upright stance with feet hip-width apart."
    phase: Starting position
  - step_number: 2
    action: "Jog at a comfortable pace; begin the drill with the right foot forward."
    phase: Preparatory movement
  - step_number: 3
    action: "Push off with the right foot as it contacts the ground. During push-off, bring the left leg forward by flexing the thigh to a position approximately parallel with the ground, the knee at 90 degrees, and the ankle dorsiflexed. During this flight phase of the drill, reach forward with both arms. Sequence the arm swing so that they come forward from behind the body into landing, and forward from the hips to reach in front of the body during takeoff."
    phase: Upward movement
  - step_number: 4
    action: "Land with an active flat-foot on the left leg and immediately repeat the sequence on the opposite side."
    phase: Downward movement

notes:
  - "A bound is an exaggeration of the running gait; the goal is to cover as great a distance as possible during each stride."
