definition: >
  A high-intensity plyometric drill involving a drop step from a box followed by a lateral bound and return.

attributes:
  - intensity_level: High
  - direction: Lateral and vertical
  - arm_action: None
  - equipment: "Plyometric box, 6 to 18 inches (15-46 cm) high"

