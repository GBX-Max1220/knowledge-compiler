recommendation_text: >
  Ensure proper body alignment via selection of a stable body position. If the exercise is a freestanding ground-based exercise, place the feet slightly wider than shoulder width and keep them flat on the ground. Use the appropriate grip for the exercise based on the type of exercise (see chapter 16 for more detail). Exhale during the concentric portion of the exercise and inhale during the eccentric phase. With heavy loads (80% of maximal voluntary contraction or greater) or with lighter loads performed to failure, the Valsalva maneuver may be a useful technique for maintaining spinal stability.
