definition: >
  Typically, the anatomical core is defined as the axial skeleton and all the soft tissues with proximal attachments that originate on the axial skeleton (13, 14). It is important to note that the appendicular skeleton includes the pelvic and shoulder girdles, while the soft tissues include the articular cartilage and fibrocartilage, ligaments, tendons, muscles, and fascia (13).
