id: concept.carbon_dioxide_transport_in_blood
type: Concept
canonical_name: Carbon Dioxide Transport in Blood
semantic_type: PhysiologicalProcess
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: null
  chapter_title: null
  section: "Blood Transport of Gases and Metabolic By-Products"
  section_title: "Blood Transport of Gases and Metabolic By-Products"
  book_page: 92
  pdf_page: null

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  The way in which carbon dioxide is removed from the system has some similarities to oxygen transport, but the vast amount of carbon dioxide is removed by a more complex process. After carbon dioxide is formed in the cell, it easily diffuses across the cell membranes and is subsequently transported to the lungs. As with oxygen, only a limited quantity of carbon dioxide— about 5% of that produced during metabolism—is carried in the plasma; similar to the situation with oxygen, this limited amount of carbon dioxide contributes to establishing the partial pressure of carbon dioxide in the blood. Some carbon dioxide is also transported via hemoglobin, but this amount is limited (27). The greatest amount of carbon dioxide removal (approximately 70%) is from the combination with water and delivery to the lungs in the form of bicarbonate (HCO3−). The initial step in this reversible reaction is the combination of carbon dioxide in solution with water in the red blood cells to form carbonic acid. The reaction would normally be quite slow except for the impact of the enzyme carbonic anhydrase, which significantly speeds up this process. Once carbonic acid is formed, it is broken down to hydrogen ions and bicarbonate ions. Because hemoglobin is a significant acid–base buffer, hydrogen ions combine with hemoglobin. This process helps to maintain the pH of the blood. Bicarbonate ions diffuse from the red blood cells to the plasma, while chloride ions diffuse into the blood cells to replace them (17, 27).

