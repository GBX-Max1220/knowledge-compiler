definition: >
  Stand erect with the feet parallel to each other and shoulder-width apart. Flex the left hip and knee, and then abduct the left thigh until it is parallel to the floor. Step laterally to the left, stepping laterally over the first hurdle. Place the left foot firmly on the ground, shift the body weight to the left leg, and then proceed to lift the right leg over the first hurdle. After lifting the right leg over the hurdle and placing the right foot firmly on the ground, stand erect, pause, and then flex the hips and knees and dorsiflex the ankles to assume a full squat position. Extend the left leg laterally, as if performing a lateral lunge. Keeping the body weight low, move the body laterally, ducking under the second hurdle. Stand erect, pause, and repeat the motion in the opposite direction, ducking under the second hurdle and stepping over the first.

