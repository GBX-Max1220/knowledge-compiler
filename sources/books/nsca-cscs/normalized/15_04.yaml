definition: >
  Stand with the feet hip-width apart and feet facing forward. Take a relatively large lateral step with the right foot while keeping the left foot in contact with the floor. Hinge at the hips, pushing the hips back, and flex the left hip and knee, lowering the body toward the ground until the left hip and knee are at approximately 90 degrees. The right knee remains fully extended as the left knee and hip flex. Keep the body aligned within the base of support, and do not lean forward. Return to the beginning position and then either repeat for the desired number of repetitions on the same leg or alternate legs for the desired number of repetitions.

