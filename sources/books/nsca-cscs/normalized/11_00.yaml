provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
recommendation_text: >
  All precompetition meals should take timing, meal and fluid composition, event
  or sport, and individual athlete preferences into account. In order to minimize
  the potential for stomach upset, smaller quantities of fluids and food should
  be consumed when the precompetition meal is consumed closer in temporal
  proximity to competition. Precompetition foods and beverages should be familiar
  to the athlete (i.e., tried in practice), low in fat and fiber so that they
  empty rapidly from the stomach and minimize any potential for gastrointestinal
  distress, and moderate in protein (protein promotes longer-lasting satiety and
  accelerates recovery) (7).
rationale: []
