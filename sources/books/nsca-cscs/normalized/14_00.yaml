definition: >
  Agility traditionally has been considered the ability to stop, start, and change the direction of the whole body rapidly (134, 143). Agility consists of two main components: speed in changing direction and cognitive factors (134). The definition of agility has been revised to take into account the perceptual qualities, and it is now considered "a rapid, whole-body, change of direction or speed in response to a sports-specific stimulus" (134, 143).
attributes:
