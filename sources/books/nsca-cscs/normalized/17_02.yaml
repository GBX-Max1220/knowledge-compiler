definition: >
  This practice creates a unique loading problem because it is well documented that muscles are stronger during eccentric (i.e., lengthening) versus concentric (i.e., shortening) muscle actions, resulting in what is referred to as an eccentric strength deficit (figure 17.5) (51, 91).

attributes:
