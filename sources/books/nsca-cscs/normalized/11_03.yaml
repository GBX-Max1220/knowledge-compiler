  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Because low glycogen can impair muscle force, athletes should consume higher-energy carbohydrates immediately following weightlifting or strength and power competitions if they must compete or train again over the course of the 24-hour period after their initial competition. Otherwise, they can consume enough carbohydrate over the course of the day to restore glycogen levels before the next bout of training or competition.

attributes:
  - carbohydrate
  - weightlifting
  - strength_competition

purpose:
  - restore glycogen levels
  - prevent impaired muscle force

