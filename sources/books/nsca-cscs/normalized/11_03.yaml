# ontology: knowledge-compiler/v1

id: recommendation.protein_strength_speed_athletes
type: Recommendation
canonical_name: Protein intake for strength and speed athletes
semantic_type: Nutrition
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 11
  chapter_title: "Nutrition and Athletic Performance"
  section: "11.3"
  section_title: "Postcompetition Nutrition"
  book_page: 637
  pdf_page: 637

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  In general, strength or speed athletes should consume 1.4 to 2.0 grams of protein per kilogram body weight per day, even if their sport or training includes an aerobic endurance component. After resistance training, younger individuals should consume at least 20 to 50 grams (providing about 8.5 to 20 grams of essential amino acids) of a high-quality, high-leucine protein (2-3 g), while older adults should consume 40 grams or more to maximally stimulate muscle protein synthesis in the acute time period after training. If the exercise was performed in a fasted state (first thing in the morning or more than 3 hours after the last protein-rich meal), the protein should be consumed within 30 minutes after the end of the session; but if the exercise was performed in a fed state (preexercise protein-rich meal or supplement), this postexercise time window may be considerably longer.

attributes:
  - protein
  - strength_athletes
  - speed_athletes

purpose:
  - stimulate muscle protein synthesis

related_concepts: []
