definition: >
  Core exercises recruit one or more large muscle areas (i.e., chest, shoulder, back, hip, or thigh), involve two or more primary joints (multijoint exercises; e.g., split squat, bench press, bent-over row), and receive priority when one is selecting exercises because of their direct application to the sport and enhanced dynamic correspondence (i.e., transference of gym-based training to improved performance in athletic tasks).

attributes:
  - recruits large muscle areas
  - involves two or more primary joints
  - multijoint exercises
  - receives priority in exercise selection
  - direct application to sport
  - enhanced dynamic correspondence

purpose:
  - improve performance in athletic tasks

related_concepts:
  - concept.assistance_exercises
  - concept.structural_exercise
  - concept.power_exercise
