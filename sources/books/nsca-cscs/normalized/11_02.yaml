id: recommendation.fluid_intake_children_adolescents_exercise
type: Recommendation
canonical_name: Fluid Intake Guidelines for Children and Adolescents During Exercise
semantic_type: HydrationGuideline
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 11
