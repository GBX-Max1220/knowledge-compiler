id: recommendation.management_of_heat_exhaustion
type: Recommendation
canonical_name: Management of Heat Exhaustion
semantic_type: Management
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 23
  chapter_title: "Medical Conditions"
  section: "23.5"
  section_title: "Medical Conditions"
  book_page: 1671
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  If heat exhaustion is recognized, immediately remove the athlete from the hot environment and, once appropriate, restore oral rehydration. If oral rehydration is not possible due to nausea, parenteral (non-oral method such as intravenous) rehydration may be considered (58). Aggressive cooling measures should be implemented such as forced air conduction or spraying of lukewarm water to cool the body (58). In cases where these measures are not effective, total body cooling in an ice bath may be indicated (12). It is important to immediately respond to symptoms of heat exhaustion to avoid progression to heatstroke.
attributes: []
purpose: []
