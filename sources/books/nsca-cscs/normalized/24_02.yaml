id: concept.nonfunctional_overreaching
type: Concept
canonical_name: Nonfunctional Overreaching
semantic_type: Condition
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 24
  chapter_title: "Overtraining"
  section: "24.2"
  section_title: "Functional Overreaching"
  book_page: 1692
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: is_a
    target: concept.overreaching
definition: >
  Nonfunctional overreaching (NFOR) is somewhat similar to functional overreaching with two very important differences. First, the short-term accumulated fatigue is greater, and, second, the recovery takes longer (88, 89, 126). In the case of NFOR, the individual does not experience any super compensation and is only able to return to his or her baseline performance levels (see figure 24.1 on page 778) (88, 89, 93, 108, 125, 126).
attributes: []
