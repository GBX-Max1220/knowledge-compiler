definition: >
  The role of IGFs extends to exercise response, where resistance exercise particularly influences their production and activity. Mechanical stress from resistance exercise triggers muscle fibers to produce IGF-1 locally, which then acts to stimulate muscle growth and repair. This local production is often more critical than the circulating levels of IGF-1, which may not consistently change with resistance exercise (109, 113).
