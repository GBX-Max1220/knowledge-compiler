definition: >
  A step-up exercise technique involving a box 12 to 18 inches (30-46 cm) high, or high enough to create a 90-degree angle at the knee joint when the foot is on the box. The technique includes starting positions for the athlete and spotter, upward movement phase, and downward movement phase.

