type: Concept
canonical_name: Minimum Effective Dose
semantic_type: Principle
aliases: ["MED"]
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 21
  chapter_title: "Program Design and Technique for Aerobic Endurance and Metabolic Training"
