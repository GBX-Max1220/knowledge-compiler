definition: >
  Limited research has examined frontal carries including sandbags and water bags in athletic populations (22, 60). Calatayud and colleagues (22) compared the muscle activity (anterior deltoid, external oblique, lumbar erector spinae, and gluteus medius) associated with the performance of 20-kilogram (44 lb) clean and jerks with either a barbell, sandbag, or water bag in 21 male university students. While no significant differences were observed between the muscle activity when lifting a barbell or sandbag, the water bag version resulted in significantly greater external oblique, lumbar erector spinae, and gluteus medius activation.
