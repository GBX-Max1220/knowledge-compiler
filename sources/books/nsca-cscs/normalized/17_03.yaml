definition: >
  When working with kettlebells, one must consider the type of kettlebell, of which there are two: the cast iron (figure 17.9) and the sport kettlebell (figure 17.10) (28). The cast iron, or fitness, kettlebells are cast from iron and range in size depending on their weight. The sport or competition kettlebells are made from steel and have universal design and measurements. Specifically, the size of the kettlebell does not change regardless of the weight, and the various weights are indicated by different colors (28). Besides the structural differences in the size and dimensions of the cast iron and sport kettlebell, the other difference is that the cast iron kettlebell is less expensive and probably more prevalent in strength and conditioning facilities.
