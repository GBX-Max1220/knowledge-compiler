definition: >
  Strongman competitions commonly involve a range of weighted carries including the farmer's walk, yoke walk, or sandbag or keg carries, with regular gym programs potentially also involving Zercher carries (using a barbell held across the elbows on the upper abdominals) or unilateral carries in which the load is held overhead or by one hip (i.e., suitcase carry). A primary advantage of these exercises is that they often involve horizontal motion and unilateral ground contact and require coordinated activity of many muscles of the body. Weighted carries may therefore develop total body and trunk stability, grip strength (for farmer's walks) as well as the ability to produce high levels of anterior–posterior and vertical impulse to initiate propulsion and to be able to absorb these forces on impact at heel strike (163). These exercises therefore may mimic performance in a range of occupational and sporting demands (62, 87) or create substantial metabolic demands that can be exploited in a metabolic or anaerobic conditioning circuit (55, 163).
attributes:
  - horizontal motion
  - unilateral ground contact
  - coordinated activity of many muscles
purpose:
  - develop total body stability
  - develop trunk stability
  - develop grip strength
  - produce high levels of anterior-posterior impulse
  - produce high levels of vertical impulse
  - initiate propulsion
  - absorb forces on impact at heel strike
  - mimic performance in occupational demands
  - mimic performance in sporting demands
  - create substantial metabolic demands
related_concepts:
