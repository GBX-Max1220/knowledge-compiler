definition: >
  The athlete holds the wooden dowel overhead with the shoulders fully flexed and with elbows locked. The grip should be twice shoulder-width using biacromial width as the reference measurement point for shoulder width. Biacromial width is the distance between the widest bony points at the superior portion of both shoulders. The feet are approximately shoulder-width apart, with toes pointing forward or slightly out (figure 14.29a). The athlete then squats down; the initial action is flexion of the hips and knees. The heels remain in contact with the floor at all times. The lowering continues until the crease of the hips is below the top of the knee. The athlete should be able to hold this position with the torso remaining upright (parallel to the tibia) and the wooden dowel (or barbell) comfortably overhead (figure 14.29b). The athlete performs a minimum of 5 repetitions, and the tester views the movement from the side. The assessment is qualitative and the goal is to assess the movement competency, with the movement scored as pass/fail. It is important that the athlete be warmed up and familiarized with the movement patterns to increase the test validity.

