## Section F: Formula Application (Q23-Q24)

### Q23
**Question:** How do you estimate VO2max from the Cooper 12-minute run test?
**Type:** Formula
**Object:** `formula.cooper_12min_run`
**Expected:** VO2max (mL·kg⁻¹·min⁻¹) = (distance in meters − 504.9) / 44.73

### Q24
**Question:** What is the Siri formula for percent body fat?
**Type:** Formula
**Object:** `formula.percent_body_fat_siri`
**Expected:** % body fat = (495 / body density) − 450

