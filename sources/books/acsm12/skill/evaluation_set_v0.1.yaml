# Evaluation Set v0.1 — ACSM Exercise Science Assistant

> 25 questions covering Concept, Threshold, Procedure, Recommendation, Warning, and Formula types.
> Expected answers are grounded in the 74 objects from Chapters 1-3.

## Section A: Concept Definitions (Q1-Q5)

### Q1
**Question:** What is the difference between physical activity and exercise?
**Type:** Concept
**Object:** `concept.physical_activity`, `concept.exercise`
**Expected:** PA is any bodily movement produced by skeletal muscle contraction increasing caloric expenditure. Exercise is a subset of PA that is planned, structured, and repetitive, done to improve/maintain physical fitness.

### Q2
**Question:** What is a MET and how is it defined?
**Type:** Concept
**Object:** `concept.met`
**Expected:** One MET is equivalent to resting metabolic rate (~3.5 mL·kg⁻¹·min⁻¹) or the amount of oxygen consumed while sitting at rest.

### Q3
**Question:** What are the health-related components of physical fitness?
**Type:** Concept
**Object:** `concept.health_related_physical_fitness`
**Expected:** Cardiorespiratory endurance, body composition, muscular strength, muscular endurance, and flexibility.

### Q4
**Question:** What is sedentary behavior?
**Type:** Concept
**Object:** `concept.sedentary_behavior`
**Expected:** Any waking behavior characterized by an energy expenditure of ≤1.5 METs while in a sitting, reclining, or lying posture.

### Q5
**Question:** What is VO2max?
**Type:** Concept
**Object:** `concept.vo2max`
**Expected:** The greatest rate at which oxygen can be consumed during exhaustive exercise; the best measure of cardiorespiratory fitness; recognized by AHA as a clinical vital sign.

