## Scoring Rubric

| Question Type | Max Points | Criteria |
|--------------|------------|----------|
| Concept (Q1-5) | 2 each | 1 for correct definition, 1 for source citation |
| Threshold (Q6-10) | 2 each | 1 for correct category, 1 for numerical range |
| Procedure (Q11-15) | 3 each | 1 for goal, 1 for key steps, 1 for source |
| Recommendation (Q16-19) | 3 each | 1 for population, 1 for dosage, 1 for source |
| Warning (Q20-22) | 3 each | 1 for condition, 1 for signs, 1 for action |
| Formula (Q23-24) | 2 each | 1 for correct formula, 1 for variables |
| Scenario (Q25) | 5 | 1 per correct factor identified + correct recommendation |

**Total:** 65 points
**Pass threshold:** 45/65 (70%)
