## Section B: Threshold Classification (Q6-Q10)

### Q6
**Question:** If someone has a BMI of 27, how is this classified?
**Type:** Threshold
**Object:** `threshold.bmi_classification`
**Expected:** Overweight (25.0-29.9 kg·m⁻²).

### Q7
**Question:** A client's blood pressure is 145/95 mm Hg. How is this classified?
**Type:** Threshold
**Object:** `threshold.blood_pressure_classification`
**Expected:** Hypertension Stage 1 (SBP 140-159 or DBP 90-99).

### Q8
**Question:** Walking at 3.0 METs — what intensity category does this fall into?
**Type:** Threshold
**Object:** `threshold.met.moderate`
**Expected:** Moderate intensity (3.0-5.9 METs).

### Q9
**Question:** A male client has a waist circumference of 105 cm. What is the disease risk?
**Type:** Threshold
**Object:** `threshold.waist_circumference`
**Expected:** Increased disease risk (>102 cm for men).

### Q10
**Question:** What are the ACSM body fat percentage ranges for a female athlete?
**Type:** Threshold
**Object:** `threshold.body_fat_percent_women`
**Expected:** Athletes: 14-20%.

