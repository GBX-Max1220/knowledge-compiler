## Section G: Clinical Scenarios (Q25)

### Q25
**Scenario:** A 52-year-old male wants to start a vigorous exercise program. He has a BMI of 32, smokes, and has a family history of heart disease. He reports no current symptoms. What does the ACSM screening algorithm recommend?
**Type:** Multi-object (Threshold + Procedure + Recommendation)
**Objects:** `threshold.cvd_risk_factors`, `procedure.acsm_screening_algorithm`, `recommendation.medical_clearance_exercise`
**Expected:** He does not currently participate in regular exercise. He has no known CV/metabolic/renal disease. He has no signs/symptoms. He has multiple CVD risk factors (age ≥45, BMI ≥30, smoker, family history). Desired intensity is vigorous. The algorithm recommends medical clearance before starting vigorous exercise.

