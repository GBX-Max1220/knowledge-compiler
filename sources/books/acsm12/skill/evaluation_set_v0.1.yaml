## Section D: Recommendation Knowledge (Q16-Q19)

### Q16
**Question:** What is the current aerobic PA recommendation for adults?
**Type:** Recommendation
**Object:** `recommendation.pag_acsa_primary_2018`
**Expected:** At least 150-300 min·wk⁻¹ moderate-intensity OR 75-150 min·wk⁻¹ vigorous-intensity aerobic PA, spread throughout the week. Additional benefits beyond 300 min·wk⁻¹. Muscle strengthening ≥2 d·wk⁻¹.

### Q17
**Question:** Is the 10-minute bout requirement still in effect?
**Type:** Recommendation
**Object:** `recommendation.bout_duration_elimination_2018`
**Expected:** No. The 2018 guidelines eliminated the ≥10-minute bout requirement. Bouts of any duration count.

### Q18
**Question:** Who needs medical clearance before starting exercise?
**Type:** Recommendation
**Object:** `recommendation.medical_clearance_exercise`
**Expected:** Individuals who require medical clearance based on the ACSM screening algorithm — those with known disease, signs/symptoms, or risk factors combined with desired vigorous activity.

### Q19
**Question:** What is the ACSM recommendation for young athletes regarding SCD prevention?
**Type:** Recommendation
**Object:** `recommendation.preparticipation_screening_young`
**Expected:** Preparticipation cardiovascular screening endorsed by IOC and AHA to reduce SCD risk.

