## Section E: Warning Recognition (Q20-Q22)

### Q20
**Question:** What signs and symptoms suggest possible CV disease that should stop exercise?
**Type:** Warning
**Object:** `warning.signs_symptoms_cv_disease`
**Expected:** Chest pain/discomfort, shortness of breath, dizziness/syncope, orthopnea, ankle edema, palpitations, intermittent claudication, heart murmur, unusual fatigue.

### Q21
**Question:** A client says they feel unusual chest discomfort during exercise. What should they do?
**Type:** Warning
**Object:** `warning.signs_symptoms_cv_disease`, `warning.cardiac_prodromal_symptoms`
**Expected:** Stop exercise immediately and seek prompt medical care. This is a cardiac prodromal symptom.

### Q22
**Question:** What is the risk of vigorous exercise for a habitually inactive person?
**Type:** Warning
**Object:** `warning.scd_ami_vigorous_pa`
**Expected:** Acute and transient increase in SCD and AMI risk during and ~1 hour after vigorous PA. Risk is 50x higher for habitually inactive vs. those who exercise vigorously ≥5 d·wk⁻¹.

