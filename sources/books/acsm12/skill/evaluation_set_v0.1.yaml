## Section C: Procedure Knowledge (Q11-Q15)

### Q11
**Question:** How do you measure resting blood pressure?
**Type:** Procedure
**Object:** `procedure.resting_blood_pressure`
**Expected:** 10-step procedure: seated quietly 5 min, no smoking/caffeine 30 min prior, appropriate cuff size, SBP at first Korotkoff sound, DBP at disappearance.

### Q12
**Question:** What are the absolute indications for terminating an exercise test?
**Type:** Procedure
**Object:** `procedure.test_termination`
**Expected:** Drop in SBP ≥10 mm Hg despite increased workload, moderate-to-severe angina, CNS symptoms, signs of poor perfusion, sustained ventricular tachycardia.

### Q13
**Question:** How do you determine a 1-RM?
**Type:** Procedure
**Object:** `procedure.one_rm_testing`
**Expected:** Familiarization session, warm-up, initial weight at 50-70% perceived capacity, 4 trials max with 3-5 min rest between, progressively increase until failure.

### Q14
**Question:** What is the YMCA cycle ergometer protocol?
**Type:** Procedure
**Object:** `procedure.ymca_cycle_protocol`
**Expected:** Multistage submaximal test using 2-4 three-minute stages. Initial workload 150 kg·m·min⁻¹ (25W) or 300 kg·m·min⁻¹ (50W), increase based on HR response.

### Q15
**Question:** How does the ACSM screening algorithm work?
**Type:** Procedure
**Object:** `procedure.acsm_screening_algorithm`
**Expected:** Classify by current PA participation, assess for known disease, assess for signs/symptoms, determine desired exercise intensity, determine medical clearance need.

