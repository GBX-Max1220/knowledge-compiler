# ontology: knowledge-compiler/v1

id: recommendation.aerobic_exercise_intensity_general
type: Recommendation
canonical_name: General Recommendation for Aerobic Exercise Intensity
semantic_type: Clinical Recommendation
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 5
  chapter_title: "Clinical Exercise Testing and Prescription"
  section: "5.13"
  section_title: "Intensity of Aerobic Exercise"
  book_page: 347
  pdf_page: 347

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships:
  - predicate: used_for
    target: concept.aerobic_exercise

definition: >
  Intensity of aerobic exercise is prescribed relative to the individual's level of fitness and goals. The ACSM recommends that most adults engage in moderate-intensity aerobic exercise for a minimum of 30 min·d−1 on at least 5 d·wk−1 for a total of at least 150 min·wk−1, or vigorous-intensity aerobic exercise for a minimum of 20 min·d−1 on at least 3 d·wk−1 for a total of at least 75 min·wk−1, or a combination of moderate- and vigorous-intensity exercise to achieve the equivalent total volume.

attributes:
  - moderate-intensity
  - vigorous-intensity
  - combination

purpose:
  - prescribe aerobic exercise intensity

related_concepts:
  - concept.moderate_intensity_aerobic_exercise
  - concept.vigorous_intensity_aerobic_exercise
