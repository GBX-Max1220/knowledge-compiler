definition: >
  Exercise testing for individuals with neurologic diseases, conditions, and disorders should follow the general guidelines for exercise testing as described in Chapter 4. However, special considerations are necessary for this population. The mode of testing should be appropriate for the individual's functional capacity and neurologic deficit. For example, a treadmill or cycle ergometer may be used for ambulatory individuals, whereas a cycle ergometer or arm ergometer may be used for individuals with lower extremity impairments. For individuals with significant balance or coordination problems, a recumbent cycle ergometer or a seated stepper may be more appropriate. The testing protocol should be individualized and may need to be modified to accommodate the individual's specific limitations. The exercise test should be supervised by a qualified health care professional with experience in working with individuals with neurologic conditions. The test should be terminated according to the absolute and relative indications for terminating an exercise test as described in Chapter 4. Additionally, the test should be terminated if the individual experiences any neurologic symptoms such as dizziness, lightheadedness, or worsening of neurologic symptoms.

