id: recommendation.general_flexibility
type: Recommendation
canonical_name: General Flexibility Recommendations
semantic_type: Recommendation
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 5
