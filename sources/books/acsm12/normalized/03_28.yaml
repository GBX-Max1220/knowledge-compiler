goal: Assess low back and hamstring flexibility
inputs:
  - sit-and-reach box
  - ruler
outputs:
  - reach distance (cm or in)
steps:
  - Individual sits with back flat against wall and legs extended
  - Place feet against the sit-and-reach box
  - Arms extended forward with hands placed on the ruler
  - Slowly reach forward, pushing the ruler as far as possible
  - Hold the position
  - Record the distance reached
