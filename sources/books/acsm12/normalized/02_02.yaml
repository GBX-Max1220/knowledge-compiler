  - signed consent form
steps:
  - Describe the purpose of the test to the participant
  - Explain test protocols and procedures
  - Describe potential risks and discomforts
  - Outline expected benefits
  - Explain confidentiality protections
  - Inform of the right to withdraw at any time
  - Obtain the participant's signature
