goal: Accurately measure resting blood pressure
inputs:
  - sphygmomanometer
  - stethoscope
  - appropriate cuff size
outputs:
  - systolic blood pressure
  - diastolic blood pressure
steps:
  - Seat individual quietly for at least 5 minutes with back support, feet on floor, arm at heart level
  - Ensure no smoking or caffeine for at least 30 minutes prior
  - Select appropriate cuff size
  - Place cuff snugly around upper arm
  - Determine maximum inflation level
  - Place stethoscope bell over brachial artery
  - Inflate cuff to maximum inflation level
  - Release pressure at 2-3 mm·sec⁻¹
  - Record SBP at first Korotkoff sound (Phase I)
  - Record DBP at disappearance of sound (Phase V)
exceptions:
  - Measuring supine and standing values may be indicated in certain populations
