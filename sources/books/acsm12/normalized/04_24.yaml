definition: >
  The 6-min walk test (6MWT) is a self-paced test of the distance a person can walk in 6 min. The 6MWT is performed on a flat, hard surface, and the patient is instructed to cover as much distance as possible in 6 min. The patient may slow down or stop as needed. Standardized instructions and encouragement are provided. The 6MWT is a measure of functional capacity and is used to assess the response to therapeutic interventions and to predict morbidity and mortality in patients with cardiopulmonary disease.

attributes:
  - self-paced
  - duration: 6 minutes
  - surface: flat, hard

purpose:
  - measure functional capacity
  - assess response to therapeutic interventions
  - predict morbidity in patients with cardiopulmonary disease
  - predict mortality in patients with cardiopulmonary disease

related_concepts:
  - concept.functional_capacity
  - concept.cardiopulmonary_disease
