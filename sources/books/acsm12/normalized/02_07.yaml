goal: Determine need for medical clearance before exercise
inputs:
  - individual's PA history
  - medical history
  - current symptoms
outputs:
  - "clearance recommendation: medical clearance needed or not needed"
steps:
  - Classify individual as currently exercising regularly or not
  - Assess for known CV, metabolic, or renal disease
  - Assess for signs or symptoms suggestive of disease
  - Determine desired exercise intensity (moderate or vigorous)
  - Use the algorithm to determine if medical clearance is needed
exceptions:
  - Pulmonary disease patients require special consideration
  - Algorithm should be re-administered periodically
