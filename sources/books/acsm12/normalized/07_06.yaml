type: Warning
canonical_name: Altitude Illness Warning
semantic_type: Warning
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 7
  chapter_title: "Medical Considerations"
  section: "7.6"
  section_title: "Medical Considerations: Altitude Illnesses and Preexisting Conditions"
  book_page: 532
  pdf_page: null

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Altitude illnesses (e.g., acute mountain sickness [AMS], high-altitude cerebral edema [HACE], and high-altitude pulmonary edema [HAPE]) can occur in unacclimatized individuals ascending to altitudes >2,500 m (~8,200 ft). The risk of altitude illness is increased with rapid ascent, a history of altitude sickness, and individual susceptibility.

attributes: []

purpose: []

related_concepts:
