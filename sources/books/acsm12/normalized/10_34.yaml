definition: >
  Moderate-intensity aerobic exercise (40%–59% of heart rate reserve [HRR] or oxygen uptake reserve [VO2R]; 64%–76% of HRmax; rating of perceived exertion [RPE] 12–13 on the Borg 6–20 scale) is recommended for most individuals with chronic diseases and health conditions. For those who are deconditioned or have significant comorbidities, light-intensity exercise (30%–39% HRR or VO2R; 57%–63% HRmax; RPE 9–11) may be more appropriate initially.

attributes:
  - moderate_intensity
  - light_intensity

purpose:
  - guide intensity of aerobic exercise for chronic disease populations

