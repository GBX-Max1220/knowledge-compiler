relationships:
  - predicate: part_of
    target: recommendation.exercise_prescription_chronic_diseases

definition: >
  Special considerations for exercise prescription in individuals with chronic diseases and health conditions include: (a) monitoring for signs and symptoms of exercise intolerance (e.g., chest pain, dizziness, excessive dyspnea); (b) adjusting the prescription based on medication effects (e.g., beta-blockers may blunt heart rate response); (c) ensuring proper warm-up and cool-down periods; and (d) avoiding exercise during acute illness or exacerbation of the chronic condition.

attributes:
  - monitoring_exercise_intolerance
  - adjusting_for_medications
  - warm_up
  - cool_down
  - avoiding_during_acute_illness

purpose:
  - provide special considerations for exercise prescription in chronic disease populations

