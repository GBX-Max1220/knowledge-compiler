definition: >
  In individuals with proliferative or severe nonproliferative diabetic retinopathy, vigorous aerobic or resistance exercise may increase the risk of vitreous hemorrhage or retinal detachment. Such individuals should avoid activities that involve straining, Valsalva maneuver, or jarring.

