  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Individuals taking insulin or insulin secretagogues are at increased risk for hypoglycemia during and after exercise. To reduce the risk of hypoglycemia, individuals should monitor their blood glucose before, during, and after exercise. If blood glucose is <100 mg·dL⁻¹ (5.6 mmol·L⁻¹), additional carbohydrate intake may be needed before exercise.

