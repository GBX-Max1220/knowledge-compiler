goal: "Substantial health benefits from physical activity"
dosage: >
  At least 150–300 min · wk⁻¹ of moderate-intensity OR 75–150 min · wk⁻¹
  of vigorous-intensity aerobic physical activity, or equivalent combination.
  Aerobic activity should be spread throughout the week.
  Additional benefits beyond 300 min · wk⁻¹ moderate-intensity equivalent.
  Muscle strengthening activities of moderate or greater intensity involving
  all major muscle groups on 2 or more d · wk⁻¹.
