population: "Inactive adults"
goal: "Health benefits"
dosage: >
  PA of any intensity (light, moderate, or vigorous) can provide
  health benefits for those who are inactive. Health benefits can
  be experienced following just a single bout of moderate-to-vigorous
  physical activity (MVPA). Any bout of MVPA, regardless of duration,
  can be included when quantifying daily or weekly volumes of PA.
