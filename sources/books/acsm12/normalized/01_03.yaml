population: "Healthy adults aged 18–65 years"
goal: "Health benefits from physical activity"
dosage: >
  Moderate-intensity aerobic PA: minimum 30 minutes on 5 d · wk⁻¹,
  OR vigorous-intensity aerobic activity: minimum 20 minutes on 3 d · wk⁻¹.
  Combinations of moderate- and vigorous-intensity exercise can be combined.
  Moderate-intensity activity can be accumulated in bouts of ≥10 minutes.
  Additionally, activities that maintain or increase muscular strength
  and endurance for a minimum of 2 d · wk⁻¹.
