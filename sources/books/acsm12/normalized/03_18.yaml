goal: Safely terminate a graded exercise test when indicated
inputs:
  - exercise test in progress
  - vital signs monitoring
outputs:
  - test termination decision
steps:
  - "Monitor for absolute indications: drop in SBP ≥10 mm Hg despite increased workload, moderate-to-severe angina, CNS symptoms, signs of poor perfusion, sustained ventricular tachycardia"
  - "Monitor for relative indications: drop in SBP ≥10 mm Hg from baseline, ST or QRS changes, arrhythmias, fatigue, shortness of breath, leg cramps, claudication, hypertensive response"
  - Terminate test if any absolute indication appears
  - Consider termination for relative indications based on clinical judgment
exceptions:
  - Clinical tests with ECG monitoring may have different criteria
