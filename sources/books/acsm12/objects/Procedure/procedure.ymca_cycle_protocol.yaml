goal: Estimate VO2max from submaximal cycle ergometry
inputs:
- cycle ergometer
- HR monitor
- BP cuff
outputs:
- estimated VO2max
steps:
- Set initial workload at 150 kg·m·min⁻¹ (25 W) for low fitness or 300 kg·m·min⁻¹
  (50 W) for most adults
- Individual pedals at 50 rpm
- Monitor HR during each 3-minute stage
- If HR is below threshold, increase workload
- Continue for 2-4 stages until target HR is reached
- Plot HR vs work rate and extrapolate to age-predicted HRmax
- Estimate VO2max from extrapolated work rate
