definition: 'The diagnostic value of exercise testing for the detection of ischemic
  heart disease is determined by the sensitivity and specificity of the test. Sensitivity
  is the percentage of patients with disease who have a positive test (true positive).
  Specificity is the percentage of patients without disease who have a negative test
  (true negative). The sensitivity and specificity of exercise testing vary depending
  on the population studied and the criteria used for a positive test. The most commonly
  used criterion for a positive test is ≥1 mm (0.1 mV) of horizontal or downsloping
  ST-segment depression measured at 60–80 ms after the J point. The sensitivity of
  exercise testing for the detection of ischemic heart disease is approximately 68%
  and the specificity is approximately 77%. The positive predictive value of exercise
  testing is influenced by the prevalence of disease in the population being tested.
  In populations with a low prevalence of disease, a positive test is more likely
  to be a false positive. In populations with a high prevalence of disease, a negative
  test is more likely to be a false negative.

  '
