definition: 'The exercise test should be administered by a properly trained health
  care professional. The American College of Sports Medicine (ACSM) recommends that
  the individual who administers the exercise test be at a minimum certified as an
  ACSM Certified Clinical Exercise Physiologist® (ACSM-CEP) or an ACSM Registered
  Clinical Exercise Physiologist® (ACSM-RCEP). Physicians who administer exercise
  tests should have training in exercise testing commensurate with the level of testing
  being performed.

