dosage: (1) Health care professionals should know pathologic conditions. (2) Individuals
  should know cardiac prodromal symptoms. (3) Athletes should undergo preparticipation
  screening. (4) Athletes with known cardiac conditions should be evaluated. (5) Facilities
  should have trained staff and emergency equipment. (6) Individuals should modify
  exercise programs as needed.
