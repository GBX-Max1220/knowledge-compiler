definition: 'The number of staff required for exercise testing depends on the complexity
  of the test and the patient population. For routine exercise testing in low-risk
  patients, one appropriately trained individual may be sufficient. For testing in
  patients with known or suspected cardiovascular disease, at least two individuals
  should be present: one to conduct the test and one to monitor the patient and respond
  to emergencies.

