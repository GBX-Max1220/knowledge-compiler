definition: 'Intensity of aerobic exercise is prescribed relative to the individual''s
  level of fitness and goals. The ACSM recommends that most adults engage in moderate-intensity
  aerobic exercise for a minimum of 30 min·d−1 on at least 5 d·wk−1 for a total of
  at least 150 min·wk−1, or vigorous-intensity aerobic exercise for a minimum of 20
  min·d−1 on at least 3 d·wk−1 for a total of at least 75 min·wk−1, or a combination
  of moderate- and vigorous-intensity exercise to achieve the equivalent total volume.

  '
