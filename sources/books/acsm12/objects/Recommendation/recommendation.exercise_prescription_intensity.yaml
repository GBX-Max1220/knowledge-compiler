definition: 'Intensity: The intensity of aerobic exercise should be prescribed using
  the heart rate reserve (HRR) method, the peak heart rate method, or the rating of
  perceived exertion (RPE) method. The target heart rate range is typically 40% to
  80% of HRR or 64% to 91% of peak heart rate. RPE of 12 to 16 on the Borg 6–20 scale
  is often used.

