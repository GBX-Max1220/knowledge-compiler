definition: 'Aerobic exercise modalities that involve large muscle groups and are
  rhythmic in nature (e.g., walking, cycling, swimming, rowing) are recommended. Resistance
  training is recommended as a complement to aerobic exercise, with a focus on major
  muscle groups, 2–3 d·wk−1, using 8–10 exercises, 1–3 sets of 8–12 repetitions at
  moderate intensity (40%–60% of 1-RM).

  '
