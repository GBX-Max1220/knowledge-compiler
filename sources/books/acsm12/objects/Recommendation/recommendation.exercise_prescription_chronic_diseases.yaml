definition: 'The exercise prescription for individuals with chronic diseases and health
  conditions should follow the general principles outlined in Chapter 7 (see Table
  7.1) and be individualized based on the patient''s health status, medications, and
  response to exercise. The FITT-VP principle (Frequency, Intensity, Time, Type, Volume,
  and Progression) should be used to guide the prescription.

