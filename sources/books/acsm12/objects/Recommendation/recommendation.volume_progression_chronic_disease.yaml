definition: 'The total volume of exercise should be gradually increased over time,
  with progression based on the individual''s tolerance and response. A general guideline
  is to increase duration by 5–10 min every 1–2 weeks, or increase frequency or intensity
  as tolerated. For resistance training, progression can be achieved by increasing
  the load, number of sets, or frequency.

  '
