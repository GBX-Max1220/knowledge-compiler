definition: 'Because of the loss of parasympathetic and sympathetic innervation, the
  heart rate response to exercise is blunted and delayed. Resting heart rate is typically
  elevated (95–115 bpm), and peak heart rate is lower than age-predicted. The heart
  rate reserve (HRR) method may underestimate the appropriate exercise intensity;
  therefore, the rating of perceived exertion (RPE) is often used to guide intensity.

  '
