definition: 'Safety is of paramount importance during exercise testing. The testing
  area should be equipped with emergency equipment, including a defibrillator, oxygen,
  and appropriate medications. Personnel conducting exercise tests must be trained
  in cardiopulmonary resuscitation (CPR) and advanced cardiac life support (ACLS).
  The test should be terminated immediately if any of the following occur: (1) onset
  of angina or angina-like symptoms, (2) drop in systolic blood pressure of ≥10 mm
  Hg from baseline despite an increase in workload, (3) excessive rise in blood pressure
  (systolic >250 mm Hg or diastolic >115 mm Hg), (4) signs of poor perfusion (lightheadedness,
  confusion, ataxia, pallor, cyanosis, nausea, or cold and clammy skin), (5) failure
  of heart rate to increase with increased exercise intensity, (6) noticeable change
  in heart rhythm, (7) subject requests to stop, (8) physical or verbal manifestations
  of severe fatigue, (9) failure of the testing equipment, or (10) ST-segment elevation
  (≥1.0 mm) in leads without diagnostic Q waves (other than V1 or aVR).

