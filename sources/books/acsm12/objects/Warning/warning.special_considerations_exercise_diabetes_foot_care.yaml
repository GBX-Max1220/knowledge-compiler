definition: 'Individuals with diabetes should be educated about the appropriate foot
  care to prevent and/or treat foot problems. Proper footwear is essential to prevent
  foot injury. Individuals with diabetes should inspect their feet daily for blisters,
  redness, or other signs of irritation. If foot problems are present, non-weight-bearing
  exercise is recommended.

