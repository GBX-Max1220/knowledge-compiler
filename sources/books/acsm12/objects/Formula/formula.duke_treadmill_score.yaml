definition: 'The DTS is calculated as: exercise time (minutes) – (5 × ST-segment deviation
  [mm]) – (4 × angina index). The angina index is 0 for no angina, 1 for nonlimiting
  angina, and 2 for exercise-limiting angina.

  '
expression: exercise time (minutes) – (5 × ST-segment deviation [mm]) – (4 × angina
  index)
variables:
- name: exercise time
  unit: minutes
- name: ST-segment deviation
  unit: mm
- name: angina index
  values:
  - value: 0
    description: no angina
  - value: 1
    description: nonlimiting angina
  - value: 2
    description: exercise-limiting angina
