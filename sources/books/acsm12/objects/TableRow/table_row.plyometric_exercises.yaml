definition: 'Plyometric exercises are explosive resistance training exercises that
  involve rapid stretching of a muscle (eccentric phase) followed immediately by a
  forceful contraction (concentric phase). This stretch-shortening cycle enhances
  power output. Examples include box jumps, depth jumps, and medicine ball throws.

