TITLE
Relative Indications for Terminating Exercise Testing

PAGE
285

SECTION
4.6 — Monitoring and Test Termination

ORIGINAL TEXT
Relative Indications for Terminating Exercise Testing
• Drop in systolic blood pressure of ≥10 mm Hg from baseline systolic blood pressure despite an increase in workload, in the absence of other evidence of ischemia
• ST or QRS changes such as excessive ST depression (>2 mm of horizontal or downsloping ST-segment depression) or marked axis shift
• Arrhythmias other than sustained ventricular tachycardia, including multifocal PVCs, triplets of PVCs, supraventricular tachycardia, heart block, or bradyarrhythmias
• Fatigue, shortness of breath, wheezing, leg cramps, or claudication
• Development of bundle-branch block that cannot be distinguished from ventricular tachycardia
• Increasing chest pain
• Hypertensive response (systolic blood pressure >250 mm Hg; diastolic blood pressure >115 mm Hg)

CHILDREN
Drop in systolic blood pressure of ≥10 mm Hg from baseline systolic blood pressure despite an increase in workload, in the absence of other evidence of ischemia; ST or QRS changes such as excessive ST depression (>2 mm of horizontal or downsloping ST-segment depression) or marked axis shift; Arrhythmias other than sustained ventricular tachycardia, including multifocal PVCs, triplets of PVCs, supraventricular tachycardia, heart block, or bradyarrhythmias; Fatigue, shortness of breath, wheezing, leg cramps, or claudication; Development of bundle-branch block that cannot be distinguished from ventricular tachycardia; Increasing chest pain; Hypertensive response (systolic blood pressure >250 mm Hg; diastolic blood pressure >115 mm Hg)

RELATIONSHIPS
NONE

END

