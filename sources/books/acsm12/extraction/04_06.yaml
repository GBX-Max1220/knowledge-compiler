TITLE
Absolute Indications for Terminating Exercise Testing

PAGE
285

SECTION
4.6 — Monitoring and Test Termination

ORIGINAL TEXT
Absolute Indications for Terminating Exercise Testing
• Drop in systolic blood pressure of ≥10 mm Hg from baseline systolic blood pressure despite an increase in workload, when accompanied by other evidence of ischemia
• Moderate-to-severe angina (see Table 4.1)
• Increasing nervous system symptoms (e.g., ataxia, dizziness, or near-syncope)
• Signs of poor perfusion (cyanosis or pallor)
• Technical difficulties monitoring the ECG or systolic blood pressure
• Subject’s request to stop
• Sustained ventricular tachycardia
• ST elevation (≥1 mm) in leads without diagnostic Q waves (other than V1 or aVR)
• ST or QRS changes such as marked ST depression (>2 mm of horizontal or downsloping ST-segment depression) or marked axis shift

CHILDREN
Drop in systolic blood pressure of ≥10 mm Hg from baseline systolic blood pressure despite an increase in workload, when accompanied by other evidence of ischemia; Moderate-to-severe angina; Increasing nervous system symptoms; Signs of poor perfusion; Technical difficulties monitoring the ECG or systolic blood pressure; Subject’s request to stop; Sustained ventricular tachycardia; ST elevation (≥1 mm) in leads without diagnostic Q waves; ST or QRS changes such as marked ST depression (>2 mm of horizontal or downsloping ST-segment depression) or marked axis shift

RELATIONSHIPS
NONE

END

