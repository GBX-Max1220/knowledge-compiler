TITLE
Exercise Intensity Thresholds for Individuals with Neurologic Diseases

PAGE
1015–1017

SECTION
11.31 — Exercise Prescription

ORIGINAL TEXT
For individuals with neurologic diseases, exercise intensity should be prescribed based on the individual's functional capacity and disease-specific considerations. Light intensity is defined as 1.6–2.9 METs, moderate intensity as 3.0–5.9 METs, and vigorous intensity as ≥6.0 METs.

