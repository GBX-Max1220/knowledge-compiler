# Extraction: Section 3.15 — The Concept of Maximal Oxygen Uptake
# Pages: 198–200

---
TYPE: Definition
TITLE: Maximal Oxygen Uptake (VO2max)
PAGE: 198
SECTION: 3.15
ORIGINAL: VO2max is the greatest rate at which oxygen can be consumed during exhaustive exercise. It is considered the best measure of cardiorespiratory fitness.
