TYPE
Recommendation

TITLE
General Exercise Recommendations for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
General recommendations for exercise for individuals with neurologic diseases are similar to those for the general population: 150 min·wk−1 of moderate-intensity aerobic activity, 2 d·wk−1 of resistance training, and flexibility exercises at least 2 d·wk−1.

END

TYPE
Recommendation

TITLE
Exercise Precautions for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
However, because of the unique challenges associated with each disease, exercise programs should be individualized and may require modifications to the mode, intensity, duration, and frequency of exercise.

END

TYPE
Recommendation

TITLE
Exercise Testing Considerations for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
Exercise testing may be indicated for some individuals with neurologic diseases to evaluate the safety of exercise participation, to determine the appropriate exercise prescription, and to assess the effectiveness of the exercise program.

END

TYPE
Recommendation

TITLE
Exercise Program Components for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
The exercise program should include aerobic, resistance, and flexibility exercises, as well as neuromotor exercises (e.g., balance, agility, and coordination) as appropriate.

END

TYPE
Recommendation

TITLE
Exercise Intensity Monitoring for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
The use of rating of perceived exertion (RPE) may be more appropriate than heart rate for monitoring exercise intensity in individuals with neurologic diseases because of potential alterations in heart rate response to exercise.

END

TYPE
Recommendation

TITLE
Exercise Progression for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
Progression of the exercise program should be gradual and based on the individual's tolerance and response to exercise.

END

TYPE
Recommendation

TITLE
Exercise Termination Criteria for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
Exercise should be terminated if the individual experiences chest pain, dizziness, severe shortness of breath, or other symptoms that suggest an adverse response to exercise.

END

TYPE
Warning

TITLE
Exercise Risks in Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
Individuals with neurologic diseases may be at increased risk for falls, injuries, and other adverse events during exercise.

END

TYPE
Recommendation

TITLE
Fall Prevention Strategies for Neurologic Diseases

PAGE
967–970

SECTION
11.5 — Exercise Considerations

ORIGINAL TEXT
Therefore, appropriate precautions should be taken to ensure safety, including the use of assistive devices, supervision, and modifications to the exercise environment.

END