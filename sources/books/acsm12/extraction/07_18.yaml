SECTION
7.18 — Medical Considerations: Exertional Heat Illnesses

ORIGINAL TEXT
Table 7.7 Signs and Symptoms of Exertional Heat Illness
Mild: Thirst, flushed skin, muscle cramps, fatigue
Moderate: Headache, nausea, vomiting, dizziness, fainting, profuse sweating, cold clammy skin, weak pulse
Severe: Hot dry skin, confusion, loss of consciousness, seizures, core temperature >40°C (104°F)

