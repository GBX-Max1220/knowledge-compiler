ORIGINAL TEXT
Table 7.5 Risk Factors for Exertional Heat Illness
• High ambient temperature and humidity
• High intensity exercise
• Inadequate heat acclimatization
• Poor physical fitness
• Dehydration
• Obesity
• Sleep deprivation
• Certain medications (e.g., antihistamines, diuretics)
• Recent febrile illness
• History of heat illness
• Excessive clothing or equipment
• Lack of access to fluids
• Lack of shade or cooling

