TITLE
Table 7.8 — Treatment of Exertional Heat Illness

PAGE
559

SECTION
7.18 — Medical Considerations: Exertional Heat Illnesses

ORIGINAL TEXT
Table 7.8 Treatment of Exertional Heat Illness
Mild: Rest in cool environment, remove excess clothing, drink cool fluids
Moderate: Lie down in cool area, elevate legs, cool with ice packs and fanning, seek medical attention if symptoms worsen
Severe: Call 911 immediately, cool rapidly with ice water immersion or cold water dousing, monitor vital signs, transport to hospital

