Recommendation

TITLE
Aerobic Exercise Type for Cancer Survivors

PAGE
846–849

SECTION
10.29 — Exercise Prescription

ORIGINAL TEXT
Type: Aerobic exercise using large muscle groups (e.g., walking, cycling, swimming, rowing, elliptical training).

END

