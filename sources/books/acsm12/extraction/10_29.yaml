END

TYPE
Threshold

TITLE
Aerobic Exercise Intensity for Cancer Survivors

PAGE
846–849

SECTION
10.29 — Exercise Prescription

ORIGINAL TEXT
Intensity: Moderate-intensity (40%–59% HRR or V̇O2R; 64%–76% HRmax; RPE 12–13 on the 6–20 scale) to vigorous-intensity (60%–89% HRR or V̇O2R; 77%–95% HRmax; RPE 14–17 on the 6–20 scale).

END

TYPE
Recommendation

TITLE
Aerobic Exercise Time for Cancer Survivors

PAGE
846–849

SECTION
10.29 — Exercise Prescription

ORIGINAL TEXT
Time: ≥30 min·d−1 of moderate-intensity aerobic activity, or ≥15 min·d−1 of vigorous-intensity aerobic activity, or a combination of moderate- and vigorous-intensity activity to achieve ≥500–1,000 MET·min·wk−1.

END

