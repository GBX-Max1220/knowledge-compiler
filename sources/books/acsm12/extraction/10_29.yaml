TYPE
Recommendation

TITLE
Flexibility Exercise for Cancer Survivors

PAGE
846–849

SECTION
10.29 — Exercise Prescription

ORIGINAL TEXT
Flexibility exercise: Frequency: ≥2 d·wk−1. Intensity: Stretch to the point of feeling tightness or slight discomfort. Time: 10–30 s per stretch; 2–4 repetitions per stretch. Type: Static, dynamic, and/or PNF stretching of major muscle groups.

END

TYPE
Warning

TITLE
Exercise Precautions for Cancer Survivors

PAGE
846–849

SECTION
10.29 — Exercise Prescription

ORIGINAL TEXT
Special considerations: Avoid exercise if hemoglobin <8.0 g·dL−1. Avoid exercise if platelet count <50,000·μL−1. Avoid exercise if absolute neutrophil count <0.5 × 109·L−1. Avoid exercise if temperature >100°F (38°C). Avoid exercise if severe fatigue, anemia, or ataxia. Avoid exercise if uncontrolled pain. Avoid exercise if uncontrolled nausea or vomiting. Avoid exercise if uncontrolled dyspnea. Avoid exercise if uncontrolled cardiac conditions (e.g., unstable angina, uncontrolled arrhythmias, uncontrolled heart failure). Avoid exercise if uncontrolled metabolic conditions (e.g., uncontrolled diabetes, uncontrolled thyroid disease). Avoid exercise if uncontrolled orthopedic conditions (e.g., acute fracture, acute tendonitis, acute bursitis). Avoid exercise if uncontrolled psychiatric conditions (e.g., severe depression, severe anxiety, severe cognitive impairment). Avoid exercise if uncontrolled infection. Avoid exercise if uncontrolled electrolyte abnormalities. Avoid exercise if uncontrolled dehydration. Avoid exercise if uncontrolled malnutrition. Avoid exercise if uncontrolled cachexia. Avoid exercise if uncontrolled lymphedema. Avoid exercise if uncontrolled pain. Avoid exercise if uncontrolled nausea. Avoid exercise if uncontrolled vomiting. Avoid exercise if uncontrolled dyspnea. Avoid exercise if uncontrolled cardiac conditions. Avoid exercise if uncontrolled metabolic conditions. Avoid exercise if uncontrolled orthopedic conditions. Avoid exercise if uncontrolled psychiatric conditions. Avoid exercise if uncontrolled infection. Avoid exercise if uncontrolled electrolyte abnormalities. Avoid exercise if uncontrolled dehydration. Avoid exercise if uncontrolled malnutrition. Avoid exercise if uncontrolled cachexia. Avoid exercise if uncontrolled lymphedema.

END

