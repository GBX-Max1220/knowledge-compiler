TITLE
Sternotomy Precautions and Progression

PAGE
600

SECTION
8.23 — Sternotomy

ORIGINAL TEXT
Sternal precautions are typically recommended for 6–8 wk after surgery to allow for bone and soft tissue healing. These precautions include no pushing or pulling with the upper extremities, no lifting >10 lb (4.5 kg), and no reaching behind the back. After the sternum is healed, the patient can gradually progress to upper-body resistance training.

