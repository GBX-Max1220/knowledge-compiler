END

TYPE
Definition

TITLE
Positive Predictive Value

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
Positive predictive value is the probability that a person with a positive test result actually has the disease.

END

TYPE
Definition

TITLE
Negative Predictive Value

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
Negative predictive value is the probability that a person with a negative test result truly does not have the disease.

END

TYPE
Definition

TITLE
True Positive

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
True positive (TP) = individuals with the disease who have a positive test result.

END

TYPE
Definition

TITLE
False Positive

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
False positive (FP) = individuals without the disease who have a positive test result.

END

TYPE
Definition

TITLE
True Negative

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
True negative (TN) = individuals without the disease who have a negative test result.

END

TYPE
Definition

TITLE
False Negative

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
False negative (FN) = individuals with the disease who have a negative test result.

END

TYPE
Threshold

TITLE
Disease Prevalence Impact on Predictive Value

PAGE
312

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
As disease prevalence decreases, the positive predictive value decreases and the negative predictive value increases.

END

