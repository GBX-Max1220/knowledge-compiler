Procedure

TITLE
Calculating Positive Predictive Value

PAGE
311

SECTION
4.21 — Sensitivity, Specificity, and Predictive Value

ORIGINAL TEXT
Positive predictive value = TP / (TP + FP) × 100

END

TYPE
Procedure

TITLE
Calculating Negative Predictive Value

