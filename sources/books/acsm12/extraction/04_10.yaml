ORIGINAL TEXT
Table 4.5 Heart Rate Response During Exercise Testing

Normal
• Heart rate increases linearly with workload
• Heart rate response is appropriate for the given workload
• Heart rate returns to baseline rapidly after exercise

Abnormal
• Heart rate fails to increase with increasing workload (chronotropic incompetence)
• Excessive heart rate response to low workload
• Heart rate fails to decrease appropriately after exercise (delayed recovery)
• Heart rate variability is reduced

Clinical Significance
• Chronotropic incompetence is associated with increased cardiovascular mortality
• Excessive heart rate response may indicate deconditioning, anemia, hyperthyroidism, or left ventricular dysfunction
• Delayed heart rate recovery (≤12 beats/min decrease in the first minute after exercise) is associated with increased mortality
• Reduced heart rate variability is associated with autonomic dysfunction and increased mortality

