TYPE
Recommendation

TITLE
Exercise Prescription for Hypertension — Resistance Exercise

PAGE
730

SECTION
9.13 — Hypertension

ORIGINAL TEXT
Resistance exercise should be performed on 2–3 d·wk−1, with at least 48 h between sessions. The recommended intensity is 60%–80% of 1-RM, with 8–12 repetitions and 2–3 sets per exercise.

