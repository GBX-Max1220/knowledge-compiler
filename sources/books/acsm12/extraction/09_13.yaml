TYPE
Warning

TITLE
Exercise Caution for Uncontrolled Hypertension

PAGE
730

SECTION
9.13 — Hypertension

ORIGINAL TEXT
In individuals with uncontrolled hypertension (SBP > 180 mm Hg or DBP > 110 mm Hg), exercise should be avoided until blood pressure is controlled with medication or other interventions.

