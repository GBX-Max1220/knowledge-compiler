TYPE
Recommendation

TITLE
Exercise Prescription for Hypertension — Aerobic Exercise

PAGE
730

SECTION
9.13 — Hypertension

ORIGINAL TEXT
Aerobic exercise is recommended as the primary modality for individuals with hypertension. The recommended frequency is most days, preferably daily, for a total of at least 30 min·d−1 of moderate-intensity exercise (e.g., 40%–60% of VO2R or HRR, RPE 11–13 on the 6–20 Borg scale). Accumulation of exercise in multiple bouts of at least 10 min is acceptable.

