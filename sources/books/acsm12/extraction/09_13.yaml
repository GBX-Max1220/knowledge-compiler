PAGE
730

SECTION
9.13 — Hypertension

ORIGINAL TEXT
Regular aerobic exercise lowers resting SBP and DBP by approximately 5–7 mm Hg and 4–6 mm Hg, respectively, in individuals with hypertension (Evidence Category A).

