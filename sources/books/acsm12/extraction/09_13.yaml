TITLE
Stages of Hypertension

PAGE
729

SECTION
9.13 — Hypertension

ORIGINAL TEXT
Stages of hypertension are defined as follows: Stage 1: SBP 130–139 mm Hg or DBP 80–89 mm Hg; Stage 2: SBP ≥ 140 mm Hg or DBP ≥ 90 mm Hg.

