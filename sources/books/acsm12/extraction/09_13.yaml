TITLE
Hypertension Definition

PAGE
729

SECTION
9.13 — Hypertension

ORIGINAL TEXT
Hypertension is defined as a systolic blood pressure (SBP) ≥ 130 mm Hg or a diastolic blood pressure (DBP) ≥ 80 mm Hg, or the use of antihypertensive medication.

