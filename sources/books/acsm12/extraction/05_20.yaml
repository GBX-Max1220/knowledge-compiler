TITLE
Resistance Training Intensity Classification by Repetition Maximum (RM)

PAGE
367–370

SECTION
5.20 — Intensity of Resistance Training Exercise

ORIGINAL TEXT
Intensity of resistance training is typically prescribed based on a percentage of the individual's one-repetition maximum (1-RM) or the maximum number of repetitions that can be performed at a given load (i.e., the repetition maximum [RM] continuum). The RM continuum is a classification system that categorizes the intensity of resistance exercise based on the number of repetitions that can be performed before fatigue. For example, a 10-RM load is the maximum weight that can be lifted 10 times with proper form. The RM continuum is often described as follows: very light (e.g., 20–30 RM), light (e.g., 15–20 RM), moderate (e.g., 10–15 RM), hard (e.g., 6–10 RM), very hard (e.g., 3–6 RM), and near-maximal (e.g., 1–3 RM).

CHILDREN
Very Light (20–30 RM), Light (15–20 RM), Moderate (10–15 RM), Hard (6–10 RM), Very Hard (3–6 RM), Near-Maximal (1–3 RM)

RELATIONSHIPS
classifies: Resistance Training Intensity

