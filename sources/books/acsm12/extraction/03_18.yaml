ORIGINAL: Absolute indications: drop in SBP ≥10 mm Hg from baseline despite increase in workload, moderate-to-severe angina, CNS symptoms, signs of poor perfusion, sustained ventricular tachycardia, technical inability to monitor. Relative indications: drop in SBP ≥10 mm Hg from baseline, ST or QRS changes, arrhythmias, fatigue, shortness of breath, leg cramps, claudication, hypertension, less than desire to stop.
