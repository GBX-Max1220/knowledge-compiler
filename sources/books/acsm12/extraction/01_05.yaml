TYPE: Definition
TITLE: Benefits of Regular Physical Activity and/or Exercise
PAGE: 85–86
SECTION: 1.5
ORIGINAL: Box 1.4: Benefits of Regular Physical Activity and/or Exercise include improvement in cardiovascular and respiratory function, reduction in cardiovascular disease risk factors, decreased morbidity and mortality, decreased anxiety and depression, improved cognitive function, enhanced physical function and independent living in older individuals, enhanced feelings of well-being, enhanced quality of life, improved sleep quality and efficiency, enhanced performance of work/recreational/sport activities, reduced risk of falls and injuries from falls in older individuals, prevention or mitigation of functional limitations in older adults, and effective therapy for many chronic diseases in older adults.
