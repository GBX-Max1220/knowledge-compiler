SECTION
3.5 — Organizing the Fitness Test

ORIGINAL TEXT
The order of testing should be arranged to minimize the influence of one test on another. The following sequence is recommended: (a) resting measurements (e.g., HR, BP, ECG, blood/urine samples, body composition, flexibility), (b) submaximal cardiorespiratory fitness tests, (c) maximal exercise tests, and (d) nonfatiguing muscular fitness tests (e.g., muscular endurance, muscular strength, muscular power) and maximal muscular fitness tests.

END