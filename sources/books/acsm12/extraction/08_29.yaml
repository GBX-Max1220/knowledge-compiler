TITLE
Exercise Prescription for Individuals With Cardiovascular and Pulmonary Diseases — General Principles

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
The exercise prescription for individuals with cardiovascular and pulmonary diseases should be individualized and based on the results of the exercise test and the patient's clinical status. The FITT (Frequency, Intensity, Time, and Type) principle is used to develop the exercise prescription.

END
---
TYPE
Recommendation

TITLE
Exercise Prescription — Frequency

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
Frequency: Aerobic exercise is recommended on most, preferably all, days of the week.

END
---
TYPE
Recommendation

TITLE
Exercise Prescription — Intensity

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
Intensity: The intensity of aerobic exercise should be prescribed using the heart rate reserve (HRR) method, the peak heart rate method, or the rating of perceived exertion (RPE) method. The target heart rate range is typically 40% to 80% of HRR or 64% to 91% of peak heart rate. RPE of 12 to 16 on the Borg 6–20 scale is often used.

END
---
TYPE
Recommendation

TITLE
Exercise Prescription — Time

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
Time: Aerobic exercise sessions should last 20 to 60 minutes of continuous or intermittent (accumulated in bouts of at least 10 minutes) activity.

END
---
TYPE
Recommendation

TITLE
Exercise Prescription — Type

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
Type: Large muscle group activities such as walking, cycling, and swimming are recommended.

END
