TYPE
Recommendation

TITLE
Exercise Prescription — Resistance Training

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
Resistance training is recommended as an adjunct to aerobic training. It should include 8 to 10 exercises involving the major muscle groups, performed 2 to 3 days per week. One set of 10 to 15 repetitions to moderate fatigue is recommended.

END
---
TYPE
Warning

TITLE
Exercise Prescription — Safety Considerations

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
Patients should be monitored for signs and symptoms of exercise intolerance, including angina, excessive dyspnea, dizziness, or significant changes in heart rate and blood pressure. Exercise should be stopped if these occur.

END
---
TYPE
Recommendation

TITLE
Exercise Prescription — Warm-up and Cool-down

PAGE
608–609

SECTION
8.29 — Exercise Prescription

ORIGINAL TEXT
A warm-up period of 5 to 10 minutes of low-intensity aerobic activity and stretching, and a cool-down period of 5 to 10 minutes of gradually decreasing intensity, should be included in each exercise session.

END