SECTION
11.22 — Intellectual Disability and Down Syndrome

ORIGINAL TEXT
Intellectual disability (ID) is a condition characterized by significant limitations in both intellectual functioning and adaptive behavior, which covers many everyday social and practical skills. This disability originates before the age of 18. Down syndrome (DS) is the most common genetic cause of ID, resulting from trisomy 21.

