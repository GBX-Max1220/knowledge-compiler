ORIGINAL: The goals of the screening process are to identify individuals who require medical clearance before initiating a moderate- to vigorous-intensity exercise program, with clinically significant disease who may benefit from participation in a medically supervised exercise program, and with medical contraindications who should not participate in an exercise program.
