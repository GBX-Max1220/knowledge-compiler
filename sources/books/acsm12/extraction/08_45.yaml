TITLE
Interstitial Lung Disease (ILD)

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Interstitial lung disease (ILD) is a heterogeneous group of disorders characterized by inflammation and fibrosis of the pulmonary parenchyma.

END

TYPE
Definition

TITLE
Pulmonary Hypertension (PH)

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Pulmonary hypertension (PH) is defined as a mean pulmonary artery pressure (mPAP) ≥25 mm Hg at rest measured by right heart catheterization.

END

TYPE
Definition

TITLE
Cystic Fibrosis (CF)

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Cystic fibrosis (CF) is an autosomal recessive genetic disorder caused by mutations in the cystic fibrosis transmembrane conductance regulator (CFTR) gene, resulting in defective chloride transport and thick, viscous secretions in the lungs, pancreas, and other organs.

END

TYPE
Definition

TITLE
Exercise-Induced Bronchoconstriction (EIB)

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise-induced bronchoconstriction (EIB) is the transient narrowing of the airways that occurs during or after exercise.

END

TYPE
Procedure

TITLE
Exercise Testing for ILD

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise testing for ILD should include a cardiopulmonary exercise test (CPET) to assess gas exchange, ventilatory limitation, and desaturation. A 6-min walk test (6MWT) is also commonly used to assess functional capacity and oxygen desaturation.

END

TYPE
Procedure

TITLE
Exercise Training for ILD

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise training for ILD should include aerobic exercise (walking, cycling) at 60%–80% of peak work rate or 60%–80% of heart rate reserve, 3–5 d·wk⁻¹, 20–30 min per session, and resistance training (2–3 d·wk⁻¹, 8–10 exercises, 1–3 sets of 8–12 repetitions).

END

TYPE
Procedure

TITLE
Exercise Testing for PH

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise testing for PH should include a CPET to assess peak VO₂, ventilatory efficiency (VE/VCO₂ slope), and oxygen pulse. A 6MWT is also recommended to assess functional capacity and prognosis.

END

TYPE
Procedure

TITLE
Exercise Training for PH

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise training for PH should include aerobic exercise (walking, cycling) at 60%–80% of peak heart rate or 60%–80% of peak work rate, 3–5 d·wk⁻¹, 20–30 min per session, and resistance training (2–3 d·wk⁻¹, 8–10 exercises, 1–3 sets of 8–12 repetitions). Intensity should be monitored using the Borg Rating of Perceived Exertion (RPE) scale (11–14 on the 6–20 scale).

END

TYPE
Warning

TITLE
Exercise Precautions for PH

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Patients with PH should avoid heavy resistance training and Valsalva maneuver. Exercise should be stopped if the patient experiences chest pain, severe dyspnea, dizziness, or syncope.

END

TYPE
Procedure

TITLE
Exercise Testing for CF

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise testing for CF should include a CPET to assess peak VO₂, ventilatory limitation, and oxygen desaturation. A 6MWT is also commonly used.

END

TYPE
Procedure

TITLE
Exercise Training for CF

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise training for CF should include aerobic exercise (walking, cycling, swimming) at 60%–80% of peak heart rate or 60%–80% of peak work rate, 3–5 d·wk⁻¹, 20–30 min per session, and resistance training (2–3 d·wk⁻¹, 8–10 exercises, 1–3 sets of 8–12 repetitions). Airway clearance techniques should be performed before exercise.

END

TYPE
Procedure

TITLE
Exercise Testing for EIB

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise testing for EIB should include a standardized exercise challenge test (e.g., treadmill or cycle ergometer) at 80%–90% of predicted maximal heart rate for 6–8 min, with spirometry measured before and after exercise. A fall in FEV₁ of ≥10% is diagnostic of EIB.

END

TYPE
Threshold

TITLE
Diagnostic Threshold for EIB

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
A fall in FEV₁ of ≥10% is diagnostic of EIB.

END

TYPE
Procedure

TITLE
Exercise Training for EIB

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Exercise training for EIB should include a warm-up of 10–15 min of light aerobic activity, followed by aerobic exercise at 60%–80% of peak heart rate or 60%–80% of peak work rate, 3–5 d·wk⁻¹, 20–30 min per session, and a cool-down of 5–10 min. Inhaled bronchodilators (e.g., short-acting beta-agonists) should be used 15–20 min before exercise.

END

TYPE
Recommendation

TITLE
Pre-exercise Medication for EIB

PAGE
647–659

SECTION
8.45 — Exercise Training for Pulmonary Diseases Other Than Chronic Obstructive Pulmonary Disease

ORIGINAL TEXT
Inhaled bronchodilators (e.g., short-acting beta-agonists) should be used 15–20 min before exercise.

END