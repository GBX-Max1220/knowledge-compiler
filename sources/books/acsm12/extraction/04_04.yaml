TYPE
Recommendation

TITLE
Qualifications for Exercise Testing Personnel

PAGE
279–281

SECTION
4.4 — Testing Staff

ORIGINAL TEXT
The exercise test should be administered by a properly trained health care professional. The American College of Sports Medicine (ACSM) recommends that the individual who administers the exercise test be at a minimum certified as an ACSM Certified Clinical Exercise Physiologist® (ACSM-CEP) or an ACSM Registered Clinical Exercise Physiologist® (ACSM-RCEP). Physicians who administer exercise tests should have training in exercise testing commensurate with the level of testing being performed.

END

TYPE
Recommendation

TITLE
Physician Supervision Requirements for Exercise Testing

PAGE
279–281

SECTION
4.4 — Testing Staff

ORIGINAL TEXT
Physician supervision of exercise testing should be provided when medically indicated. The level of physician supervision required for exercise testing is dependent on the patient population being tested and the type of test being performed. For apparently healthy individuals, physician supervision may not be necessary. For individuals with known cardiovascular disease or those at high risk for cardiovascular disease, physician supervision is recommended.

END

TYPE
Recommendation

TITLE
Emergency Preparedness and Resuscitation Equipment

PAGE
279–281

SECTION
4.4 — Testing Staff

ORIGINAL TEXT
All personnel involved in exercise testing should be trained in cardiopulmonary resuscitation (CPR) and the use of an automated external defibrillator (AED). Advanced cardiac life support (ACLS) training is recommended for physicians and other health care professionals who supervise exercise testing. Emergency equipment, including a defibrillator, should be immediately available in the exercise testing area.

END

