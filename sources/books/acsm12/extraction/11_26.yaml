TITLE
Atlantoaxial Instability in Down Syndrome

PAGE
1005

SECTION
11.26 — Special Considerations for Individuals With Down Syndrome

ORIGINAL TEXT
Atlantoaxial instability (AAI) is a condition characterized by excessive mobility of the articulation of the atlas (C1) and the axis (C2) of the cervical spine.

