TYPE
Warning

TITLE
Risk of Spinal Cord Injury from Atlantoaxial Instability

PAGE
1005

SECTION
11.26 — Special Considerations for Individuals With Down Syndrome

ORIGINAL TEXT
Because of this instability, there is an increased risk of spinal cord injury during physical activity, particularly with activities that involve hyperextension or radical flexion of the neck.

