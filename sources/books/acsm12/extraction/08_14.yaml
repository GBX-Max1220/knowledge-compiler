TYPE
Recommendation

TITLE
Exercise Prescription for Chronic Heart Failure

PAGE
592

SECTION
8.14 — Chronic Heart Failure

ORIGINAL TEXT
Exercise training is recommended for patients with chronic heart failure (HF) who are stable and have no contraindications to exercise. The exercise prescription should include aerobic and resistance training. Aerobic exercise should be performed at an intensity of 40%–70% of heart rate reserve (HRR) or 40%–70% of peak oxygen uptake (VO2peak). Resistance training should be performed at an intensity of 40%–60% of one-repetition maximum (1-RM). Exercise sessions should last 20–60 minutes, 3–5 days per week.

END

