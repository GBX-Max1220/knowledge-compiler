TYPE: Definition
TITLE: Muscular Strength, Endurance, and Power
PAGE: 228
SECTION: 3.22
ORIGINAL: Muscular strength refers to the muscle's ability to exert maximal force. Muscular endurance is the muscle's capacity to continue to perform successive exertions against a submaximal load. Muscular power is the ability to exert force per unit of time.
END