TYPE
Recommendation

TITLE
General Recommendation for Aerobic Exercise Intensity

PAGE
347–356

SECTION
5.13 — Intensity of Aerobic Exercise

ORIGINAL TEXT
Intensity of aerobic exercise is prescribed relative to the individual's level of fitness and goals. The ACSM recommends that most adults engage in moderate-intensity aerobic exercise for a minimum of 30 min·d−1 on at least 5 d·wk−1 for a total of at least 150 min·wk−1, or vigorous-intensity aerobic exercise for a minimum of 20 min·d−1 on at least 3 d·wk−1 for a total of at least 75 min·wk−1, or a combination of moderate- and vigorous-intensity exercise to achieve the equivalent total volume.

END

TYPE
Threshold

TITLE
Classification of Aerobic Exercise Intensity Using %HRR or %VO2R

PAGE
347–356

SECTION
5.13 — Intensity of Aerobic Exercise

ORIGINAL TEXT
Very light: <30% HRR or VO2R; Light: 30%–39% HRR or VO2R; Moderate: 40%–59% HRR or VO2R; Vigorous: 60%–89% HRR or VO2R; Near-maximal to maximal: ≥90% HRR or VO2R.

END

TYPE
Threshold

TITLE
Classification of Aerobic Exercise Intensity Using %HRmax

PAGE
347–356

SECTION
5.13 — Intensity of Aerobic Exercise

ORIGINAL TEXT
Very light: <57% HRmax; Light: 57%–63% HRmax; Moderate: 64%–76% HRmax; Vigorous: 77%–95% HRmax; Near-maximal to maximal: ≥96% HRmax.

END

TYPE
Threshold

TITLE
Classification of Aerobic Exercise Intensity Using METs

PAGE
347–356

SECTION
5.13 — Intensity of Aerobic Exercise

ORIGINAL TEXT
Light: 1.6–2.9 METs; Moderate: 3.0–5.9 METs; Vigorous: ≥6.0 METs.

END

TYPE
Threshold

TITLE
Classification of Aerobic Exercise Intensity Using Rating of Perceived Exertion (RPE)

PAGE
347–356

SECTION
5.13 — Intensity of Aerobic Exercise

ORIGINAL TEXT
Light: RPE 9–11; Moderate: RPE 12–13; Vigorous: RPE 14–17.

END

TYPE
Threshold

TITLE
Classification of Aerobic Exercise Intensity Using Talk Test

PAGE
347–356

SECTION
5.13 — Intensity of Aerobic Exercise

ORIGINAL TEXT
Light: able to sing; Moderate: able to talk comfortably; Vigorous: unable to talk comfortably.

END

