TITLE
Exercise Prescription for Individuals with Chronic Diseases and Health Conditions

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
The exercise prescription for individuals with chronic diseases and health conditions should follow the general principles outlined in Chapter 7 (see Table 7.1) and be individualized based on the patient's health status, medications, and response to exercise. The FITT-VP principle (Frequency, Intensity, Time, Type, Volume, and Progression) should be used to guide the prescription.

END

TYPE
Recommendation

TITLE
Frequency of Exercise for Chronic Disease Populations

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
Aerobic exercise is recommended on most, preferably all, days of the week for individuals with chronic diseases and health conditions. For those with arthritis, joint pain, or other musculoskeletal limitations, lower-impact activities (e.g., walking, cycling, swimming) are recommended.

END

TYPE
Recommendation

TITLE
Intensity of Exercise for Chronic Disease Populations

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
Moderate-intensity aerobic exercise (40%–59% of heart rate reserve [HRR] or oxygen uptake reserve [VO2R]; 64%–76% of HRmax; rating of perceived exertion [RPE] 12–13 on the Borg 6–20 scale) is recommended for most individuals with chronic diseases and health conditions. For those who are deconditioned or have significant comorbidities, light-intensity exercise (30%–39% HRR or VO2R; 57%–63% HRmax; RPE 9–11) may be more appropriate initially.

END

TYPE
Recommendation

TITLE
Time (Duration) of Exercise for Chronic Disease Populations

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
A target of 30–60 min·d−1 of accumulated aerobic exercise is recommended. For those unable to sustain 30 min of continuous exercise, multiple shorter bouts (e.g., 10–15 min) throughout the day are recommended.

END

TYPE
Recommendation

TITLE
Type of Exercise for Chronic Disease Populations

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
Aerobic exercise modalities that involve large muscle groups and are rhythmic in nature (e.g., walking, cycling, swimming, rowing) are recommended. Resistance training is recommended as a complement to aerobic exercise, with a focus on major muscle groups, 2–3 d·wk−1, using 8–10 exercises, 1–3 sets of 8–12 repetitions at moderate intensity (40%–60% of 1-RM).

END

TYPE
Recommendation

TITLE
Volume and Progression of Exercise for Chronic Disease Populations

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
The total volume of exercise should be gradually increased over time, with progression based on the individual's tolerance and response. A general guideline is to increase duration by 5–10 min every 1–2 weeks, or increase frequency or intensity as tolerated. For resistance training, progression can be achieved by increasing the load, number of sets, or frequency.

END

TYPE
Recommendation

TITLE
Special Considerations for Exercise Prescription in Chronic Disease Populations

PAGE
855–858

SECTION
10.34 — Exercise Prescription

ORIGINAL TEXT
Special considerations for exercise prescription in individuals with chronic diseases and health conditions include: (a) monitoring for signs and symptoms of exercise intolerance (e.g., chest pain, dizziness, excessive dyspnea); (b) adjusting the prescription based on medication effects (e.g., beta-blockers may blunt heart rate response); (c) ensuring proper warm-up and cool-down periods; and (d) avoiding exercise during acute illness or exacerbation of the chronic condition.

END