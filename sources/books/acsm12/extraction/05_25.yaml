TYPE
Recommendation

TITLE
General Flexibility Recommendations

PAGE
384

SECTION
5.25 — Flexibility

ORIGINAL TEXT
The American College of Sports Medicine (ACSM) recommends that flexibility training be included as part of a well-rounded exercise program. Flexibility training should be performed on at least 2–3 d·wk−1, with daily training being most effective. Stretching exercises should be performed to the point of feeling tightness or slight discomfort. A total of 60 s of stretching time per flexibility exercise is recommended. For most adults, holding a static stretch for 10–30 s is recommended.

END

