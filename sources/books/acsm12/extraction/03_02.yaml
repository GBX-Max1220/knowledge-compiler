SECTION
3.2 — Purposes of Health-Related Physical Fitness Testing

ORIGINAL TEXT
The purposes of health-related physical fitness testing include: (a) educating participants about their current health-related fitness status relative to health and age- and sex-matched norms, (b) providing data that are helpful in development of exercise prescriptions to address all fitness components, (c) allowing the collection of data to evaluate progress, and (d) motivating participants by establishing reasonable and attainable fitness goals.

