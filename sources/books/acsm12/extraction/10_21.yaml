TITLE
Exercise Testing Threshold for Individuals with Chronic Kidney Disease

PAGE
836–837

SECTION
10.21 — Exercise Testing

ORIGINAL TEXT
Exercise testing is recommended for individuals with CKD who are at moderate to high risk for cardiovascular disease, as defined by the presence of two or more risk factors (e.g., hypertension, diabetes, dyslipidemia, smoking, family history of premature CVD, and physical inactivity) or known CVD.

