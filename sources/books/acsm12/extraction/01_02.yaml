---
TYPE: Definition
TITLE: Physical Activity
PAGE: 69–70
SECTION: 1.2
ORIGINAL: PA is defined as any bodily movement produced by the contraction of skeletal muscles that results in an increase in caloric requirements over resting energy expenditure (7).
PARENT:
CHILDREN:
RELATIONSHIPS:
END

---
TYPE: Definition
TITLE: Exercise
PAGE: 70
SECTION: 1.2
ORIGINAL: Exercise, on the other hand, is a type of PA consisting of planned, structured, and repetitive bodily movement done to improve and/or maintain one or more components of physical fitness (7).
RELATIONSHIPS:
  - is_a: Physical Activity
END

---
TYPE: Definition
TITLE: Physical Fitness
PAGE: 70
SECTION: 1.2
ORIGINAL: Physical fitness, although defined in several ways, has generally been described as a set of attributes or characteristics individuals have or achieve that relate to their ability to perform PA and activities of daily living (7).
PARENT:
CHILDREN:
RELATIONSHIPS:
END

