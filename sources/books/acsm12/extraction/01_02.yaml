---
TYPE: Threshold
TITLE: Light Intensity (MET)
PAGE: 71
SECTION: 1.2
ORIGINAL: Among adults, light-intensity PA is defined as 1.6–2.9 METs.
RELATIONSHIPS:
  - adjacent_to: Moderate Intensity
END

---
TYPE: Threshold
TITLE: Moderate Intensity (MET)
PAGE: 71
SECTION: 1.2
ORIGINAL: Among adults, moderate-intensity PA is defined as 3.0–5.9 METs.
RELATIONSHIPS:
  - adjacent_to: Light Intensity
  - adjacent_to: Vigorous Intensity
END

---
TYPE: Threshold
TITLE: Vigorous Intensity (MET)
PAGE: 71
SECTION: 1.2
ORIGINAL: Among adults, vigorous-intensity PA is defined as ≥6.0 METs.
RELATIONSHIPS:
  - adjacent_to: Moderate Intensity
END

