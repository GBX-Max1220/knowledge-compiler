TYPE: Definition
TITLE: Health-Related Physical Fitness Components
PAGE: 70
SECTION: 1.2
ORIGINAL: Health-Related Physical Fitness Components include cardiorespiratory endurance, body composition, muscular strength, muscular endurance, and flexibility.
PARENT: Physical Fitness
CHILDREN:
  - Cardiorespiratory Endurance
  - Body Composition
  - Muscular Strength
  - Muscular Endurance
  - Flexibility
RELATIONSHIPS:
END

---
TYPE: Definition
TITLE: Cardiorespiratory Endurance
PAGE: 70
SECTION: 1.2
ORIGINAL: Cardiorespiratory endurance: the ability of the circulatory and respiratory system to supply oxygen during sustained physical activity.
PARENT: Health-Related Physical Fitness Components
CHILDREN:
RELATIONSHIPS:
  - part_of: Health-Related Physical Fitness Components
END

---
TYPE: Definition
TITLE: Body Composition
PAGE: 70
SECTION: 1.2
ORIGINAL: Body composition: the relative amounts of muscle, fat, bone, and other vital parts of the body.
