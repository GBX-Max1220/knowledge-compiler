FEV1 Threshold for Long-Acting Bronchodilator Initiation in COPD

PAGE
820

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
Long-acting bronchodilators (LABA or LAMA) are recommended as first-line therapy for patients with COPD who have FEV1 <60% predicted and persistent symptoms.

