TITLE
Blood Pressure Thresholds for Antihypertensive Medication Initiation

PAGE
818

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
Antihypertensive medication should be initiated when blood pressure is ≥140/90 mm Hg in patients with chronic kidney disease or diabetes, and ≥150/90 mm Hg in adults aged 60 years and older without diabetes or chronic kidney disease.

END

