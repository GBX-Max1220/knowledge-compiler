Threshold

TITLE
Blood Pressure Threshold for Antihypertensive Medication Initiation in Older Adults Without CKD or Diabetes

PAGE
818

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
Antihypertensive medication should be initiated when blood pressure is ≥150/90 mm Hg in adults aged 60 years and older without diabetes or chronic kidney disease.

END

