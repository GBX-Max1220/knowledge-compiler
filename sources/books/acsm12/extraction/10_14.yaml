ORIGINAL TEXT
Statin therapy is recommended for patients with diabetes aged 40–75 years with LDL cholesterol 70–189 mg/dL.

END

TYPE
Threshold

TITLE
HbA1c Threshold for Metformin Initiation

PAGE
819

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
Metformin should be initiated at the time of diagnosis of type 2 diabetes, regardless of HbA1c level, and is the preferred initial pharmacologic agent for type 2 diabetes.

END

TYPE
Threshold

TITLE
HbA1c Threshold for Additional Antihyperglycemic Therapy

PAGE
819

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
If HbA1c remains ≥7.0% after 3 months of metformin monotherapy, consider adding a second agent such as a sulfonylurea, DPP-4 inhibitor, or SGLT2 inhibitor.

END

TYPE
Threshold

TITLE
GFR Threshold for Metformin Contraindication

PAGE
819

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
Metformin is contraindicated when estimated glomerular filtration rate (eGFR) falls below 30 mL/min/1.73 m².

END

