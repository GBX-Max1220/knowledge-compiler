Threshold

TITLE
LDL Cholesterol Threshold for Statin Therapy Initiation

PAGE
819

SECTION
10.14 — Pharmacological Treatment Options

ORIGINAL TEXT
Statin therapy is recommended for patients with LDL cholesterol ≥190 mg/dL, and for those with diabetes aged 40–75 years with LDL cholesterol 70–189 mg/dL.

END

