TYPE
Warning

TITLE
Altitude Illness Warning

PAGE
532–533

SECTION
7.6 — Medical Considerations: Altitude Illnesses and Preexisting Conditions

ORIGINAL TEXT
Altitude illnesses (e.g., acute mountain sickness [AMS], high-altitude cerebral edema [HACE], and high-altitude pulmonary edema [HAPE]) can occur in unacclimatized individuals ascending to altitudes >2,500 m (~8,200 ft). The risk of altitude illness is increased with rapid ascent, a history of altitude sickness, and individual susceptibility.

END

TYPE
Warning

TITLE
Preexisting Conditions and Altitude Warning

PAGE
532–533

SECTION
7.6 — Medical Considerations: Altitude Illnesses and Preexisting Conditions

ORIGINAL TEXT
Individuals with preexisting medical conditions (e.g., cardiovascular disease, pulmonary disease, sickle cell trait, pregnancy) may be at increased risk for complications at altitude and should consult a physician before traveling to high altitude.

END

TYPE
Recommendation

TITLE
Altitude Acclimatization Recommendation

PAGE
532–533

SECTION
7.6 — Medical Considerations: Altitude Illnesses and Preexisting Conditions

ORIGINAL TEXT
Gradual ascent is recommended to allow for acclimatization; above 2,500 m, ascent should be limited to an increase in sleeping altitude of no more than 500 m per day.

END

