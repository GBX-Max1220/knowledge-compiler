recommendation_text: >
  The productivity of a Strength and Conditioning staff, as well as learning and skill development of individual members, should be enhanced by aligning a performance team comprised of qualified practitioners with interdependent expertise and shared leadership roles. Once the team is assembled, respective activities and responsibilities from the domains identified in the Certified Strength and Conditioning Specialist (CSCS) Examination Content Description, as well as the appropriate liaison assignments, should be delegated according to each member's particular expertise.
