definition: >
  Figure 26.2 Sample strength and conditioning director job description. Direct all facets of staff, program, and facility operations. Design (or have final review of) all training programs. Oversee the athletic performance operation to ensure compliance with institutional, conference, and governing bodies' rules and regulations. Develop and submit the annual budget and ensure budgetary compliance through efficient financial management. Generate income and budget available funds for maintenance and improvement of the facility. Communicate with alumni and stakeholders for fundraising initiatives. Oversee the selection, installation, and maintenance of performance equipment, including cleaning and repair. Conduct orientation meetings for student-athletes on such issues as facility rules, the value of proper training and nutrition, and the dangers of banned substances. Develop staff work and supervision schedules, assign duties, and evaluate performance. Coordinate time schedules for use of the facility by each sport team and individual student-athletes. Assist with on-campus recruiting activities for prospective student-athletes. Serve on various departmental, institutional, conference, governing body, and professional committees and task forces. Work and communicate with coaches in the athletic department. Travel with sport teams (if applicable) and provide remote-site performance training programs, including pregame warm-up, cool-down, and recovery sessions. Maintain a performance training library for professional development. Organize continuing education opportunities for strength and conditioning staff. Achieve and maintain professional certifications with continuing education requirements and a code of ethics, such as the CSCS credential offered through the NSCA; depending on the professional's scope of activities, responsibilities, and knowledge requirements, relevant certifications offered by other governing bodies may also be appropriate (30). Perform other duties and special projects as requested by supervisor. Perform the duties of the assistant strength and conditioning professional and facility supervisor as needed.
