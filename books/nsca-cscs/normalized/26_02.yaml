  The director of strength and conditioning (referred to hereafter as director)—also commonly referred to as the head strength and conditioning professional —is both a practitioner and an administrator. This person is responsible for the overall strength and conditioning program, facility, equipment, staff, and such administrative tasks as preparing a budget, purchasing equipment, preparing proposals, and working with administration and media.
