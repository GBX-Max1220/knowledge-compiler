definition: >
  The responsibilities of the strength and conditioning professional are continually changing as the field grows and becomes better recognized (22). The strength and conditioning staff can be aligned through the hiring of practitioners with formal education and specialization in specific scientific foundations (e.g., anatomy, exercise physiology, biomechanics). An assembled team allows for cooperative expertise by practitioners with complementary skills and provides an educational opportunity for staff members to gain knowledge outside of their specialization. Table 26.1 provides a practical example of a strength and conditioning performance team. The director of strength and conditioning is responsible for delineating the appropriate duties and responsibilities to the strength and conditioning staff for program design, exercise technique, organization and administration, and testing and evaluation.
attributes: []
