recommendation_text: >
  The neutral-back lifting posture has been found to be better overall than a rounded (opposite of arched) back in minimizing L5/S1 compressive forces and ligament strain (2). Therefore, a normal lordotic lumbar spine position is superior to a rounded back for avoiding injury to vertebrae, disks, facet joints, ligaments, and muscles of the back.

