definition: >
  A plyometric exercise where an athlete lies supine and catches a medicine ball dropped by a partner from a box, then immediately throws it back.

attributes:
  - intensity_level: High
  - direction: Upward
  - equipment: Medicine or plyometric ball weighing 5 to 40 pounds (2-18 kg); partner; plyometric box 12 to 42 inches (30-107 cm) high
  - starting_position: Lie supine on the ground with elbows extended and both shoulders in approximately 90 degrees of flexion; the head should be near the base of the box. The partner should be on the box with the medicine ball held above the athlete's arms.
  - preparatory_movement: None
  - arm_action: When the partner drops the ball, catch it using both arms and immediately throw the ball back up to the partner.
  - common_errors:
      - Catching the ball too high and absorbing the impact force, increasing the amortization phase
      - Releasing the medicine ball too early, reducing the potential vertical impulse to the ball

purpose:
  - Improve upper body power
  - Improve reactive strength

