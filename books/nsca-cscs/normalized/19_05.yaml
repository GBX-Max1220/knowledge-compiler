definition: >
  A plyometric exercise performed from a tall-kneeling position, involving a single-arm catch and reverse throw of a medicine ball thrown by a partner.

attributes:
  - intensity_level: Low
  - direction: Backward
  - equipment: Small medicine or plyometric ball weighing 2 to 30 pounds (1-14 kg); partner
  - starting_position: Start in a tall-kneeling position, with the kneeling knee directly under the hip and the trunk upright, facing away from a partner who is standing approximately 1 to 2 feet (30-61 cm) behind the athlete. The partner starts with the ball. The athlete starts with the throwing arm raised above the head with the elbow extended.
  - preparatory_movement: The partner throws the ball over the athlete's head so that its trajectory takes it an arm's length in front of the athlete, traveling toward the opposite knee to the raised arm.
  - arm_action: The athlete tracks the ball in a diagonal pattern with the throwing arm and catches it with an overhand grip before it hits the ground. Once caught, the athlete keeps the elbow extended while flexing the shoulder in the diagonal pattern, moving to a release point where the ball is thrown back to the partner when the elbow is fully extended. Immediately repeat the movement.
  - notes:
      - Because this exercise trains smaller muscle groups involved in scapular control, large increases in implement weight can make a big difference to the intensity of the action.
  - common_errors:
      - Using compensatory muscle recruitments to control the shoulder and throw the ball, compromising the objective of the drill
      - Not catching the ball with sufficient arm extension to challenge the deceleration–reacceleration moments through the rotator cuff as a dynamic shoulder stabilizer

purpose:
  - Improve scapular control
  - Improve shoulder stability

