definition: >
  A plyometric exercise involving a single-arm throw of a medicine or plyometric ball against a wall or to a partner.

attributes:
  - intensity_level: Medium
  - direction: Forward
  - equipment: Medicine or plyometric ball weighing 1 to 5 pounds (0.5-2.3 kg); wall or partner
  - starting_position: Get into a comfortable, upright stance with feet hip-width apart; face the wall or partner approximately 10 feet (3 m) away. Raise the ball in one hand to a position of 90 degrees of shoulder abduction and 90 degrees of elbow flexion, with the arm rotated so the forearm is perpendicular to the ground.
  - preparatory_movement: Begin with a countermovement (i.e., cock the arm by moving it slightly backward before the throw).
  - arm_action: Using one arm, throw the ball to the wall or partner. When the wall or partner returns the ball, catch the ball and return to the starting position, allow the shoulder to externally rotate slightly, and immediately repeat the throw.
  - notes:
      - This drill may also be performed using a natural throwing motion.
      - Performing the action from a half-kneeling position may help isolate the upper body action of the throwing motion.
  - common_errors:
      - Not achieving a stable throwing position due to lack of thoracic mobility and overcompensations through lumbar spine flexion
      - Not throwing from the shoulder but rotating through the trunk (lumbar spine); this is likely to occur when the ball is too heavy for the athlete

purpose:
  - Improve upper body power
  - Improve shoulder stability

