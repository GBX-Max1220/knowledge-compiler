definition: >
  A plyometric exercise performed from a single-leg Romanian deadlift position, involving a downward slam of a medicine ball.

attributes:
  - intensity_level: Low
  - direction: Downward
  - equipment: Medicine or plyometric ball weighing 10 to 30 pounds (5-14 kg)
  - starting_position: Start in a single leg Romanian deadlift position, with the trunk parallel to the ground and the hips hinged and level with one leg extended straight behind the body. The stance foot should be flat on the ground with weight distributed toward the heel. The shoulders should be flexed so the straight arms are holding the medicine ball level with the head.
  - preparatory_movement: Initiate a small countermovement by flexing the shoulders.
  - arm_action: Keeping the arms straight, slam the ball directly down into the ground, maintaining a stable trunk and hip position. Catch the rebound and repeat the movement, then repeat on the contralateral leg.
  - notes:
      - With the shoulder position, small increases in load can make a big impact on drill intensity.
      - This drill also can be adapted to a chest-dominant pattern by starting with the ball held at the chest and slammed into the ground from there.
  - common_errors:
      - Not achieving a stable and balanced position at the hips to form a stable platform from which to throw the ball
      - Hyperextending into the lumbar spine to achieve sufficient power to throw the ball to the ground rather than throwing from the shoulder

purpose:
  - Improve total body power
  - Improve balance and stability

