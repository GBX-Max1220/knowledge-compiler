definition: >
  A plyometric exercise involving a rotational throw of a medicine or plyometric ball against a wall, initiated with a hip drive.

attributes:
  - intensity_level: Low
  - direction: Forward through frontal plane
  - equipment: Medicine or plyometric ball weighing 8 to 35 pounds (4-16 kg); wall
  - starting_position: Start in a lunge stance. The front leg (with the hip, knee, and ankle aligned) should face the wall approximately 3 to 6 feet (1-2 m) away. The rear leg should be externally rotated at the hip so that the foot is flat on the ground and pointing approximately parallel to the wall. Hold the ball at waist height in front of the body.
  - preparatory_movement: Begin with a countermovement so that the ball is brought back outside of the hip furthest from the wall and the weight is shifted to this hip. (A countermovement for plyometric throws requires cocking the arms—that is, moving the arms slightly backward before the actual throw.)
  - arm_action: Initiate the movement with a rotational drive of the hips that continues through the trunk, bringing the ball across the body so that it gains momentum. Using both arms, complete the rotational arc of the ball so that it is released and thrown against the wall as it passes the front hip. Catch the rebound, and immediately repeat the movement.
  - notes:
      - This exercise can be made more of a hip-initiated movement by shifting the weight onto the rear foot and abducting the hip (frontal plane) to bring weight onto the rear foot; this variation may benefit baseball pitchers seeking more leg-driven throwing action.
      - Golfers may find it beneficial to rotate the hip in the transverse plane (not move in the frontal plane).
      - Both variations enable the rear hip to initiate the action and accelerate the trunk rotation.
  - common_errors:
      - Rotating from the lumbar spine and trunk rather than shifting weight to facilitate the hip drive
      - Over-relying on the upper body to throw the ball compared to using the lower body and hip rotation to enable a speed multiplication effect through the trunk to achieve greater impulse on the ball

purpose:
  - Improve rotational power
  - Improve hip-driven movement

