definition: >
  A plyometric exercise involving a two-hand overhead throw of a medicine or plyometric ball against a wall or to a partner.

attributes:
  - intensity_level: Low
  - direction: Forward and down
  - equipment: Medicine or plyometric ball weighing 8 to 20 pounds (4-9 kg); wall or partner
  - starting_position: Get into a comfortable, upright stance with feet hip-width apart; face the wall or partner approximately 10 feet (3 m) away. Raise the ball overhead.
  - preparatory_movement: Begin with a countermovement (i.e., cock the arms by moving them slightly backward before the throw).
  - arm_action: Using both arms, throw the ball to the wall or partner, keeping the elbows extended. When the wall or partner returns the ball, catch the ball and immediately repeat the throw. The partners can also bounce the ball on the ground between them for a downward movement and a catch on the rebound.
  - common_errors:
      - Arching the back in the start position, increasing lumbar spine involvement (rather than hip flexion) in the throwing action
      - Not coordinating or sequencing downward throwing action so the optimal horizontal distance is not achieved

purpose:
  - Improve upper body power
  - Improve coordination

