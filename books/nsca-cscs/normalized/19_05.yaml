definition: >
  A plyometric exercise involving a deep squat countermovement followed by a vertical throw of a medicine ball using triple extension.

attributes:
  - intensity_level: Low
  - direction: Vertical
  - equipment: Medicine or plyometric ball weighing 10 to 50 pounds (5-23 kg)
  - starting_position: Start in an upright stance with the medicine ball held in straight arms in front of the middle of the body.
  - preparatory_movement: Initiate a countermovement by performing a deep and rapid squat action, keeping the ball held in straight arms.
  - arm_action: From the base of the counter movement, perform a rapid triple extension of the hips, knees, and ankles to drive the ball vertically. As the body rises, continue the upward momentum of the ball so that it is released and thrown as high as possible at the top of the triple extension.
  - common_errors:
      - Not optimizing leg extension and transferring power to the upper body, reducing the impulse to the medicine ball
      - Releasing the ball too early (before full leg and trunk extension and shoulder flexion), reducing the impulse to the medicine ball

purpose:
  - Improve total body power
  - Improve triple extension

