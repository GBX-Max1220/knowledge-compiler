id: recommendation.2_for_2_rule_for_load_increases
type: Recommendation
canonical_name: 2-for-2 rule for load increases
semantic_type: TrainingGuideline
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 18
  chapter_title: "Resistance Training"
  section: "18.6"
  section_title: "Step 6: Volume"
  book_page: 1241
  pdf_page: 1241
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
recommendation_text: >
  A conservative method that can be used to increase an athlete's training loads is called the 2-for-2 rule (2). If the athlete can perform 2 or more repetitions over his or her assigned repetition goal for a given exercise in the last set in two consecutive workouts, weight should be added to that exercise for the next training session.
target_population:
  - athlete
rationale: []
citations:
  - "2"
