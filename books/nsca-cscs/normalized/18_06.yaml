# ontology: knowledge-compiler/v1

id: warning.limitations_of_the_2_for_2_rule
type: Warning
canonical_name: Limitations of the 2-for-2 rule
semantic_type: Caution
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 18
  chapter_title: "Resistance Training"
  section: "18.6"
  section_title: "Step 6: Volume"
  book_page: 1241
  pdf_page: 1241
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
warning_text: >
  While the 2-for-2 rule may provide strength and conditioning professionals with a tool to progress load in novice athletes, this method may eventually promote training to failure because it does not account for exercise technique, the goals of a given training phase, or relative intensity. ... it is advised that the professionals understand the limitations of the 2-for-2 rule when adjusting the load during training.
severity: moderate
conditions:
  - does not account for exercise technique
  - does not account for the goals of a given training phase
  - does not account for relative intensity
