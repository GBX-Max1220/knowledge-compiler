recommendation_text: >
  It is appropriate for an athlete to perform only 1 or 2 sets as a beginner and to add sets as he or she becomes better trained. As the athlete adapts to a consistent and well-designed program, more sets can be added gradually to match the guidelines associated with the given training goal.
