id: concept.volume_in_running_exercise
type: Concept
canonical_name: Volume in running exercise
semantic_type: TrainingVariable
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 18
  chapter_title: "Resistance Training"
  section: "18.6"
  section_title: "Step 6: Volume"
  book_page: 1247
  pdf_page: 1247
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: comparable_to
    target: concept.volume_load
definition: >
  In running exercise, the common (rep) volume measure is distance. If an intensity value is known or measured (e.g., running pace, which relates to percent V̇O2max), total metabolic energy cost (which is proportional to mechanical work done) can be calculated. This value is comparable to volume–load in resistance exercise.
attributes:
  - distance
  - running_pace
  - percent_VO2max
  - total_metabolic_energy_cost
  - mechanical_work_done
purpose: []
related_concepts: []
