id: concept.sinoatrial_node
type: Concept
canonical_name: Sinoatrial Node
semantic_type: Anatomical Structure
aliases:
  - SA node
source:
  book: "Essentials of Strength Training and Conditioning"
  edition: 5
  chapter: 1
  chapter_title: "Structure and Function of Body Systems"
  section: "01.03"
  section_title: "Cardiovascular System"
  book_page: 68
  pdf_page: 68
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: part_of
    target: concept.conduction_system
definition: >
  The sinoatrial (SA) node is the intrinsic pacemaker, where rhythmic electrical impulses are normally initiated. The SA node is a small area of specialized muscle tissue located in the upper lateral wall of the right atrium. The fibers of the node are contiguous with the muscle fibers of the atrium, with the result that each electrical impulse that begins in the SA node normally spreads immediately into the atria. The SA node normally controls heart rhythmicity because its discharge rate is considerably greater (60-80 times per minute) than that of either the AV node (40-60 times per minute) or the ventricular fibers (15-40 times per minute). Each time the SA node discharges, its impulse is conducted into the AV node and the ventricular fibers, discharging their excitable membranes.
attributes:
  - intrinsic_pacemaker
  - located_in_right_atrium
  - discharge_rate_60_to_80_per_minute
purpose:
  - initiate rhythmic electrical impulses
  - control heart rhythmicity
related_concepts:
  - concept.atrioventricular_node
  - concept.ventricular_fibers
