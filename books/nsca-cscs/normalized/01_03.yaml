    target: concept.heart
definition: >
  The tricuspid valve and mitral valve (bicuspid valve) (collectively called atrioventricular [AV] valves) prevent the flow of blood from the ventricles back into the atria during ventricular contraction (systole). The aortic valve and pulmonary valve (collectively, the semilunar valves) prevent backflow from the aorta and pulmonary arteries into the ventricles during ventricular relaxation (diastole). Each valve opens and closes passively; that is, each closes when a backward pressure gradient pushes blood back against it, opening when a forward pressure gradient forces blood in the forward direction.
attributes:
  - tricuspid_valve
  - mitral_valve
  - bicuspid_valve
  - atrioventricular_valves
  - aortic_valve
  - pulmonary_valve
  - semilunar_valves
  - passive_opening
  - passive_closing
purpose:
  - prevent backflow of blood from ventricles to atria during systole
  - prevent backflow from aorta and pulmonary arteries into ventricles during diastole
related_concepts:
  - concept.systole
  - concept.diastole
