definition: >
  The thicker myosin filaments (about 16 nm in diameter, or 1/10,000 the diameter of a hair) contain up to 200 myosin molecules. A single myosin molecule consists of two myosin heavy chain proteins and four myosin light chain proteins. This molecule also contains two head-like features (one being from each of the two heavy chains), two hinge points below each head, and two tail-like features that act to keep the two heavy chain proteins bound.

