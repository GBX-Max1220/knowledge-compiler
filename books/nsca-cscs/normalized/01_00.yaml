id: concept.sliding_filament_theory
type: Concept
canonical_name: Sliding-Filament Theory
semantic_type: Theory
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 1
  chapter_title: "Structure and Function of Body Systems"
  section: "1"
  section_title: "Structure and Function of Body Systems"
  book_page: 52
  pdf_page: 52
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: is_a
    target: concept.theory
definition: >
  The sliding-filament theory was proposed by Huxley and Hanson in 1954 to mechanistically explain muscular contraction at the molecular level (22). In its simplest form, the sliding-filament theory indicates that actin filaments anchored to each end of the sarcomere slide inward on myosin filaments. This results in Z-lines being pulled toward the center of the sarcomere and in muscle fiber shortening (figure 1.7). As actin filaments slide over myosin filaments, both the H-zone and I-band shrink. The energy-dependent association of myosin heads with actin filaments (i.e., actin-myosin crossbridge formation), as well as the energy-dependent inward movement of actin filaments over the myosin filaments through what is termed the power stroke, are the bases for muscle contraction.
attributes: []
purpose: []
related_concepts:
  - concept.muscle_contraction
  - concept.sarcomere
  - concept.actin
  - concept.myosin
