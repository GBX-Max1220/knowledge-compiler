id: concept.specificity
type: Concept
canonical_name: Specificity
semantic_type: Principle
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 18
  chapter_title: "Program Design for Resistance Training"
  section: "18.1"
  section_title: "Principles of Anaerobic Exercise Prescription"
  book_page: 1187
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: is_a
    target: concept.training_principle
definition: >
  The term, first suggested by DeLorme in 1945 (39), refers to the method whereby an athlete is trained in a specific manner to produce a specific adaptation or training outcome. In the case of resistance training, specificity refers to aspects such as the muscles involved, the muscle action (e.g., concentric, eccentric, and isometric), and the movement velocity and coordination (i.e., movement pattern; this does not mean replicating specific sporting movements), but it does not always reflect the combination of all these aspects.
attributes: []
purpose: []
related_concepts: []
