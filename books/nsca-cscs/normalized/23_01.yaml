  Often overlooked aspects of an overtraining syndrome are contributing factors outside the training hall or the competition arena. These are many and varied, and in the context of overtraining they have been termed the allostatic load (86, 107). Collectively, the cumulative causes of stress (i.e., antecedents) produce the various stress responses (i.e., allostatic load) (71, 86).
