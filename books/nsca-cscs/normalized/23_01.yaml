recommendation_text: >
  Several considerations when selecting a questionnaire for athlete monitoring include the following: How long is the questionnaire, and how many items need to be completed? Has the questionnaire been validated? Is the wording easy to understand for the intended audience? Is it easy to process the data for a rapid turnaround? Can the questionnaire be answered without any coercion? Is the questionnaire sensitive to an overtraining stimulus?
