definition: >
  Although all our efforts may go to creating training programs to optimize performance, achieving excellence can be very elusive. Seldom are all components of the training and competition processes in complete synchrony. The job of a strength and conditioning professional is to help navigate the athlete through the many hurdles standing in the way of achieving absolute peak performance. Although few, if any, may ever attain that level of performance perfection, the task of the strength and conditioning professional is to develop, prescribe, and apply the type of training program that gives the athlete the best opportunity to reach that goal. Therefore, it is not only necessary to know how to develop the appropriately challenging training program required to reach this level of performance but also to understand what is happening when performance is less than expected (i.e., underperformance).

