id: concept.plyometric_exercise
type: Concept
canonical_name: Plyometric Exercise
semantic_type: Activity
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 19
  chapter_title: "Program Design and Technique for Plyometric Training"
