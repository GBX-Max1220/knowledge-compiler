id: concept.hold_relax
type: Concept
canonical_name: Hold-Relax
semantic_type: Activity
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 15
  chapter_title: "Performance Preparation, Mobility, and Flexibility"
  section: "15.1"
