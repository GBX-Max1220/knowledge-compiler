relationships: []
definition: >
  Knowing that an inherent risk exists with participation in an activity and voluntarily deciding to participate anyway (19). All athletic activities, including strength and conditioning, involve a certain level of risk; athletes must be thoroughly informed of the risk and should sign a statement to that effect. It should be noted that an assumption of risk waiver may not provide protection from legal liability if the strength and conditioning professional is found to be negligent when damage is incurred by an athlete while participating in strength and conditioning activities.
