id: concept.negligence
type: Concept
canonical_name: Negligence
semantic_type: Concept
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 26
  chapter_title: "Legal and Ethical Issues"
  section: "26.3"
  section_title: "Legal and Ethical Issues"
  book_page: 1790
  pdf_page: null
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: has_attribute
    target: concept.duty
  - predicate: has_attribute
    target: concept.breach_of_duty
  - predicate: has_attribute
    target: concept.proximate_cause
  - predicate: has_attribute
    target: concept.damages
definition: >
  Failure to act as a reasonable and prudent person would under similar circumstances. Four elements must exist for a strength and conditioning professional to be found negligent: duty, breach of duty, proximate cause, and damages (30). The strength and conditioning professional must be found to have had a duty to act and to have failed to act (a breach) with the appropriate standard of care, resulting in damages (physical or economic injury) to another person because of the natural and continuous sequence of reasonably foreseeable events (proximate cause). For example, a strength and conditioning professional sees that a cable is excessively worn on a resistance training machine and notes it, but does not post an “Out of Order” sign. An athlete uses the machine and incurs an injury. In this case, the strength and conditioning professional could be found negligent: His or her duty was to fix the cable or post a sign, but he or she failed to act, and an athlete sustained an injury because of the potentially injurious situation of a cable that was ready to break.
attributes:
  - duty
  - breach of duty
  - proximate cause
  - damages
purpose: []
related_concepts: []
