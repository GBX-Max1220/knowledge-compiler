definition: >
  Before an athlete is allowed access to the strength and conditioning facility, preparticipation screening and clearance in accordance with relevant governing bodies (e.g., NCAA, institution sports medicine staff, and high school athletic associations) are required. This requirement is established under Section 1 of NSCA Strength and Conditioning Professional Standards and Guidelines (30). Standard 1.1 "requires participants to undergo health care provider screening and clearance before participation." The strength and conditioning professional does not need an actual copy of the physical examination but should require a signed statement to show proof of medical clearance to participate. Athletes who are returning from an injury or illness or who have special needs (e.g., diabetes, asthma, epilepsy, hypertension) should also be required to show proof of medical clearance before beginning or returning to a strength and conditioning program.

attributes: []

purpose:
  - ensure athlete safety before participation

related_concepts:
