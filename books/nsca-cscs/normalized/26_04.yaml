definition: >
  Figure 26.5  Sample release agreement form for facility use by an outside individual or group.
  (School Name)
  Release Agreement
  I, the undersigned, do hereby acknowledge and understand that I will be using the (school name) strength and conditioning facility.
  I further acknowledge that I have been advised of the risks involved in the use of the strength and conditioning facility and its equipment, and I further acknowledge that I have been warned that my use of the strength and conditioning facility and its equipment could result in injury or harm to myself.
  I acknowledge and assume any such risk to my person should I use the strength and conditioning facility and its equipment.
  In the event that I should sustain injury to myself as a result of my use of the strength and conditioning facility and its equipment, I hereby agree to hold harmless the (school name), the coaches, athletic trainers, supervisors, or any other employees.
