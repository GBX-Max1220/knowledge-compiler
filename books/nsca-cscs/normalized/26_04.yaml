definition: >
  Documentation is fundamental to the effective management of a strength and conditioning facility. Secure records should be kept on file of cleaning and maintenance, safety procedures, manufacturer's warranties and guidelines, assumption-of-risk or other informed consent forms, medical waivers and clearance forms, personnel credentials, professional guidelines and recommendations (e.g., use of weight belts and resistance training techniques), and injury report forms (30). Injury report forms should be maintained as long as possible in case an injury suit is filed. The time during which individuals can file a lawsuit (i.e., the statute of limitations) varies (from state to state in the United States as well as throughout the world), so it is a good practice to maintain files indefinitely or to check with a legal authority (20).

attributes: []

purpose:
  - effective management of strength and conditioning facility
  - protect against injury lawsuits

