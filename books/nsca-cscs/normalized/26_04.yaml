definition: >
  Procedures should therefore be in place to ensure that documentation confirming that each athlete was screened and cleared to participate by the sports medicine staff is on record in the main office of the strength and conditioning program before athletes are allowed to participate. Note, however, that it is the responsibility of the sports medicine staff (e.g., the team or program's certified athletic trainer, physician, or physical therapist) to allow an athlete to begin formal involvement in the strength and conditioning program. In the case of a school location, this applies to both athletes who are new to the school or program and athletes who are just recovering from an injury or illness. This stipulation is important because it is not in the strength and conditioning professional's scope of practice (i.e., proper legal parameters and professional duties) to diagnose or evaluate an individual's medical or health condition.

attributes: []

purpose:
  - ensure documentation of medical clearance is on record

