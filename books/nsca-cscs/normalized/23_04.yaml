  reviewed: "auto"

evidence_level: ""

relationships: []

recommendation_text: >
  For example, during the remodeling phase of an injured marathoner's patellofemoral rehabilitation, his or her quadriceps muscles should be trained with an emphasis on muscular endurance. Therefore, the athlete should perform many repetitions of the rehabilitation exercises to prepare the muscles for the demands of long-distance running. Conversely, a weightlifting athlete rehabilitating from the same injury requires fewer repetitions of high-intensity rehabilitation and reconditioning exercises during the later portions of the remodeling phase to prepare the muscles for the power demands of this sport.

rationale: []

target_audience: []

application_context: "rehabilitation and reconditioning"
