recommendation_text: >
  The area in which strength and conditioning professionals can best contribute to the rehabilitation and reconditioning process is the provision of resistance and aerobic training programs designed for the injured athlete. Their experience in prescribing exercise for uninjured athletes gives strength and conditioning professionals the ability to properly adapt training programs for those recovering from injury.

