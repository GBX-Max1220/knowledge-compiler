  Henneman's size principle shows that as the resistance increases (i.e., heavier loads), more and larger muscle fibers are recruited to meet the increased force demand. This principle outlines the recruitment order of motor units—from smaller, slow-twitch fiber motor units to larger, fast-twitch fiber motor units.
