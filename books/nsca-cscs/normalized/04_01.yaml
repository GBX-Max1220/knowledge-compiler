  Growth hormone levels have been shown to increase acutely with use of either of these methods or both in combination:
  Use workouts with higher lactate concentrations and associated acid–base disruptions; that is, use high intensity (10RM, or heavy resistance) with three sets of each exercise (high total work) and short (1 min) rest periods.
