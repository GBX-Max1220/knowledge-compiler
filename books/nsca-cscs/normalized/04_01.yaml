  Growth hormone (GH) is produced in the pituitary gland by somatotroph cells, divided into two types based on their secretion patterns and the forms of GH. Band 1 somatotrophs generate the smaller, newly synthesized 22 kD molecular weight isoform of GH, a 191 amino acid polypeptide. Conversely, band 2 somatotrophs produce aggregates of these smaller isoforms (e.g., two 22 kD units combining to form a 44 kD molecule), which are considered older and are potential GH storage forms (61).
