steps:
  - number: 1
    description: "Stimulating the muscle. Resistance exercise activates muscles, prompting a hormonal response."
  - number: 2
    description: "Hormonal response. Hormones are released and travel to muscle cells."
  - number: 3
    description: "Hormone–receptor interaction. Hormones bind to specific receptors in the cell membrane of muscle cells (peptide hormones) or inside the muscle cells (steroid hormones), signaling the need for action inside the cell."
  - number: 4
    description: "Intracellular signaling. This binding triggers a series of events that lead to DNA signaling inside the nucleus."
  - number: 5
    description: "DNA translation. DNA instructions are transcribed to messenger ribonucleic acid (mRNA), which carries the instructions to the cell's protein-making machinery (ribosome)."
