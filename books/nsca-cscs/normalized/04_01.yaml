recommendation_text: >
  Use high volume, large muscle groups, and short rest periods to expose the body to adrenergic stress.
  Be careful to vary the training protocol and the rest period length from short to long over time.
  Provide days of complete rest, and use lower-volume workouts to allow the adrenal gland to engage in recovery processes to reduce stress on the adrenal medulla so as not to experience adrenergic exhaustion and to reduce stress on the adrenal cortex and prevent chronic cortisol secretions from the adrenal cortex.
