definition: >
  Intensity level: Medium. Direction: Horizontal and vertical. Equipment: A barrier such as a cone or hurdle. Starting position: Get into a comfortable, upright stance with feet hip-width apart. Arm action: Double arm. Preparatory movement: Begin with a countermovement. Upward movement: Take off with a full triple extension of hips, knees, and ankles. (Note: The second photo should show the athlete in a tall position to demonstrate full triple extension after takeoff. It also does not yet show the feet in the correct position for landing.) Jump over the barrier with both legs, maximizing the height of the center of mass and using only sufficient hip and knee flexion to clear the barrier. Keep the knees and feet together without lateral deviation. Downward movement: Dorsiflex the ankles in preparation for a stable flat-foot landing. Land in the starting position and reset. Repeat until the set is complete. Note: The height of the barrier should be progressively increased (e.g., from a cone to a hurdle to a higher hurdle) as the athlete adapts to the intensity of the drill.

