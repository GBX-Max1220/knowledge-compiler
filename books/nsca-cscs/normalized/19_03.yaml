definition: >
  Intensity level: Low. Direction: Horizontal. Starting position: Get into a comfortable, upright stance with feet hip-width apart. Arm action: Double arm. Preparatory movement: Begin with a countermovement. Upward movement: Explosively jump forward and up, using both arms to assist, with a goal of achieving maximal horizontal distance. Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing. Land on both feet. Allow recovery time between jumps. Note: This is typically a single ballistic effort, with several repetitions in a set. However, it can be done as multiple jumps in sequence. Care should be taken so that the forward momentum of the athlete does not cause overrotation in the sagittal plane. Coach the athlete to jump up and out; otherwise the tendency is for too much horizontal momentum for the athlete to control.

