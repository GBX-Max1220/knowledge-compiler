definition: >
  Intensity level: Medium. Direction: Vertical. Starting position: Get into a lunge position with one leg forward (hip and knee joints flexed approximately 90 degrees) and the other behind the midline of the body. Arm action: Double arm or none. Preparatory movement: Begin with a countermovement. Upward movement: Explosively jump up, using the arms to assist as needed. While off the ground, switch the position of the legs. Maximum height and power should be emphasized. Downward movement: Dorsiflex the ankle of the lead landing leg in preparation for an active flat-foot landing. When landing, maintain the lunge position (opposite leg forward) and immediately repeat the jump. Be sure not to absorb ground reaction force and sink too deep into the lunge, because the SSC may not be able to effectively contribute to subsequent jumps.

