evidence_level: ""

relationships: []

definition: >
  Studies examining the ergogenic effect of ephedrine have shown it to be effective only when it is taken in combination with caffeine (21). These results have been quite consistent with regard to improving aerobic endurance performance (20). In terms of anaerobic exercise performance, the scientific literature investigating the combination of ephedrine and caffeine is equivocal (224). However, side effects (vomiting and nausea) following exercise have been reported in 25% of the subjects ingesting a mixture of 5 milligrams per kilogram caffeine and 1 milligram per kilogram ephedrine (19). A subsequent study performed by the same investigators showed that at a lower dose (4 mg/kg caffeine and 0.8 mg/kg ephedrine), similar ergogenic benefits were realized with no side effects (20).

