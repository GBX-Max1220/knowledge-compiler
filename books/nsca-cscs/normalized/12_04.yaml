definition: >
  Ephedra, also called ma huang, is a plant that contains ephedrine. In the United States before 2004, most over-the-counter sport and weight-loss products contained ephedra. However, in April 2004, the FDA banned all products containing ephedra after determining that it posed an unreasonable risk to those who used it. The FDA ban was based on a report published by the Rand Institute (188) indicating that 16,000 adverse events were linked to the use of ephedra-containing dietary supplements. Further, Shekelle and colleagues (188) reported that the use of ephedra-containing dietary supplements or ephedrine plus caffeine was associated with an increased incidence of nausea, vomiting, psychiatric symptoms such as anxiety and change in mood, autonomic hyperactivity, palpitations, and, in a few cases, death. As a result of the many adverse effects, ephedrine use has been banned by most sport governing bodies, including the International Olympic Committee.

attributes:
