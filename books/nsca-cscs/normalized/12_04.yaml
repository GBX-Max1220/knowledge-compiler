definition: >
  The side effects associated with caffeine include anxiety, gastrointestinal disturbances, restlessness, insomnia, tremors, and heart arrhythmias. Caffeine is also physically addicting, and discontinuation can result in some withdrawal symptoms, such as headache, fatigue, dysphoric mood, difficulty concentrating, and flu-like somatic symptoms (200). Caffeine intakes greater than 9 milligrams per kilogram appear to result in a greater risk for side effects (99). Caffeine overdose is an issue that can have potentially fatal consequences. A lethal dose of caffeine is typically in excess of 5 grams, which equates to about 42 cups of coffee at 120 milligrams of caffeine per cup (128) or twenty-five 200-milligram tablets of caffeine.

attributes:
