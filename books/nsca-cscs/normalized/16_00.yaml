definition: >
  The athlete should position the body to achieve a five-point body contact position:
  1. Head is placed firmly on the bench or back pad.
  2. Shoulders and upper back are placed firmly and evenly on the bench or back pad.
  3. Buttocks are placed evenly on the bench or seat.
  4. Right foot is flat on the floor.
  5. Left foot is flat on the floor.

attributes:
  - head placed firmly on bench or back pad
  - shoulders and upper back placed firmly and evenly on bench or back pad
  - buttocks placed evenly on bench or seat
  - right foot flat on floor
  - left foot flat on floor

purpose:
  - achieve stable body position

