definition: >
  Plyometric exercise refers to those activities that enable a muscle to reach maximal force in the shortest possible time. Plyometric is a combination of Greek words that literally means to increase measurement (plio = more; metric = measure) (67). Practically defined, plyometric exercise is a quick, powerful movement using a prestretch, or countermovement, that involves the stretch-shortening cycle (SSC) (64). Furthermore, plyometric exercises are typically classified as being either ballistic or rebounding.
attributes:
  - quick
  - powerful
  - uses prestretch
  - uses countermovement
  - involves stretch-shortening cycle
purpose: []
related_concepts:
  - concept.ballistic_exercise
  - concept.rebound_exercise
  - concept.stretch_shortening_cycle
