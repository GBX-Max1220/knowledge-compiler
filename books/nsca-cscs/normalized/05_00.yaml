id: concept.hennemans_size_principle
type: Concept
canonical_name: Henneman's Size Principle
semantic_type: Principle
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 5
  chapter_title: "Adaptations to Anaerobic Training"
  section: "5"
  section_title: "Adaptations to Anaerobic Training"
  book_page: 290
  pdf_page: 290
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  The recruitment or decruitment of motor units in an orderly manner is governed by Henneman's size principle (figure 5.2), which represents the relationship between motor unit twitch force and recruitment threshold (140). According to this principle, motor units are recruited in an ascending order according to their soma size. Thus, motor units with small motor neurons have lower recruitment thresholds than do motor units with large motor neurons.
attributes:
  - orderly_recruitment
  - ascending_order
purpose: []
related_concepts:
