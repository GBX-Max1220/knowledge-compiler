definition: >
  Relative energy deficiency in sport (RED-S) encompasses various physiological dysfunctions resulting from low energy availability (LEA), where an athlete's energy intake does not match the energy expended during exercise. This mismatch affects metabolic rate, menstrual function, bone health, immunity, protein synthesis, and cardiovascular health, among others.
