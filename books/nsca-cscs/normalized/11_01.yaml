  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  Avoidant/restrictive food intake disorder (ARFID) is an eating or feeding disturbance, including apparent lack of interest in eating or food; avoidance based on the sensory characteristics of food; or concern about aversive consequences of eating. This disorder is manifested by persistent failure to meet appropriate nutritional or energy needs associated with one (or more) of the following: Significant weight loss (or failure to achieve expected weight gain or faltering growth in children); Significant nutritional deficiency; Dependence on enteral feeding or oral nutritional supplements; Marked interference with psychosocial functioning.
attributes:
  - lack_of_interest_in_eating
  - avoidance_based_on_sensory_characteristics
  - concern_about_aversive_consequences
  - significant_weight_loss
  - significant_nutritional_deficiency
  - dependence_on_enteral_feeding
  - dependence_on_oral_nutritional_supplements
  - marked_interference_with_psychosocial_functioning
