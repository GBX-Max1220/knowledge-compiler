recommendation_text: >
  The athlete should attempt to distribute a balanced body weight through a set position (blocks, three- or four-point staggered start) that uses segment angles critical to produce forces necessary to deliver explosive forces from the start. Front lower leg angle should be approximately 90 degrees. Rear lower leg angle should be approximately 120 to 135 degrees. Aggressive extension of the hip, knee, and ankle of the front leg against the block or ground should be observed. After initially extending at the hip and knee, the rear leg should then be rapidly flexed at the hip (to ~90 degrees), knee (to ~90 degrees), and ankle (to neutral position) in preparation for foot contact of the first step. As the rear leg is driven forward, the opposite arm should also drive forward, mirroring the range of motion and timing of the rear leg. The range of motion at the shoulder of each arm is large. The head should be neutral, looking a few yards or meters ahead along the track.

