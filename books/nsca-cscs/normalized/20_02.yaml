definition: >
  The differences between elite and novice sprinters can be traced to a single component. Much of the current literature on sprinting (17, 105, 106) suggests that the amount of vertical force applied to the ground during the stance phase at top speed may be the most critical component to improving top speed. In addition, these greater forces must be applied to the ground in the shortest period possible. Application of force is needed to displace a mass. In sprinting, step length represents the displacement of mass. Elite male sprinters achieve a step length of 2.70 m (8.9 ft), whereas novice sprinters display a step length of 2.56 m (8.4 ft) at maximum velocity (figure 20.6a) (62). Since contact with the ground is needed to continue force production and subsequent alterations in velocity, increasing the step frequency theoretically would maximize the time available to produce force. Elite male sprinters demonstrate step frequency near 4.63 steps per second compared to novice sprinters, who produce a lesser step frequency of 4.43 steps per second (figure 20.6b) (62). In other words, elite sprinters need less ground contact time with each step to exert the effort needed to displace their mass due to their ability to create greater impulses. Thus, these faster sprinters also spend more time in the air. Interestingly, elite sprinters display times to reposition the swing leg that are similar to those of their slower counterparts (62, 106).

