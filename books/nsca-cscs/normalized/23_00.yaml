  Because proper nutrition is crucial in recovery from injury, a nutritionist or a registered dietitian with a background in sport nutrition may provide guidelines regarding proper food choices to optimize tissue recovery. Ideally, the nutritionist has been formally trained in food and nutrition sciences and may be a registered dietitian (RD) recognized by the Academy of Nutrition and Dietetics Commission on Dietetic Registration (15).

