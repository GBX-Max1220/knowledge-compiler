# ontology: knowledge-compiler/v1

id: recommendation.mirror_placement_guidelines
type: Recommendation
canonical_name: Mirror Placement Guidelines
semantic_type: Facility Design Guideline
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 25
  chapter_title: "Facility Design and Equipment Selection"
  section: "25.2"
  section_title: "Equipment Selection and Layout"
  book_page: 1747
  pdf_page: 1747

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Mirrors should be placed at least 6 inches (15 cm) away from any equipment (e.g., behind a rack of dumbbells) and a minimum of 20 inches (51 cm) above the floor (4). The purpose of the height guideline is to ensure that weights do not roll, bounce, or slide into the bottom of the mirror and cause the glass to break. The standard weight plate is 18 inches (46 cm) in diameter, giving mirrors a 2-inch (5 cm) clearance if the plate is dropped near the mirror or leaned against the wall behind the mirror (14).

attributes: []

purpose:
  - prevent glass breakage from weights

related_concepts:
  - threshold.mirror_distance_from_equipment
