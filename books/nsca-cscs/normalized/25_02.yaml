id: recommendation.sound_system_volume_and_placement
type: Recommendation
canonical_name: Sound System Volume and Placement
semantic_type: Facility Design Guideline
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 25
  chapter_title: "Facility Design and Equipment Selection"
  section: "25.2"
  section_title: "Equipment Selection and Layout"
  book_page: 1746
  pdf_page: 1746

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  The sound volume should be less than 90 decibels so that athletes can hear instructions and coaching cues (2). To avoid damage, speakers should be elevated above the height of all training equipment. Placing speakers in the corner allows sound to project toward the middle of the room so that it is more evenly distributed. The use of headphones is not recommended. Headphones can interfere with coaching and instruction and limit athletes' awareness of their surroundings in the case of an emergency.

attributes: []

purpose:
  - ensure athletes can hear instructions and coaching cues
  - avoid damage to speakers
  - evenly distribute sound

related_concepts:
  - threshold.sound_volume_maximum
  - warning.headphone_use_safety_concern
