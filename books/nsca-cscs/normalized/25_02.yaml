id: recommendation.ventilation_and_circulation_requirements
type: Recommendation
canonical_name: Ventilation and Circulation Requirements
semantic_type: Facility Design Guideline
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 25
  chapter_title: "Facility Design and Equipment Selection"
  section: "25.2"
  section_title: "Equipment Selection and Layout"
  book_page: 1746
  pdf_page: 1746

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Ventilation and circulation are primary concerns with regard to facility design and the HVAC system. The HVAC system, a fresh air exchange system, and ceiling or box fans should provide necessary ventilation and circulation that are in accordance with ANSI/ASHRAE 62.1 requirements for health clubs and weight rooms (6). Air systems must provide air circulation at proper levels according to the needs of specific equipment areas and occupant loads (6). For example, aerobic training areas require a higher circulation rate than resistance training spaces (2). Room air should be exchanged a minimum of 8 to 10 times per hour—optimally 12 to 15 times per hour to prevent odors and stagnant air (5). If fans are used, a general guideline is two to four fans for every 1,200 square feet (111 m2).

attributes: []

purpose:
  - provide necessary ventilation and circulation
  - prevent odors and stagnant air

related_concepts:
  - threshold.room_air_exchange_rate_minimum_and_optimal
