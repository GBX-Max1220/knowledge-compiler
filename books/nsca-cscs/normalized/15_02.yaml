  reviewed: "auto"
evidence_level: ""
relationships:
  - predicate: part_of
    target: concept.proprioceptive_neuromuscular_facilitation
definition: >
  The contract-relax technique also begins with a passive prestretch of the hamstrings that is held at the point of mild discomfort for 10 seconds (figure 15.6). The athlete then extends the hip against resistance from the partner so that a concentric muscle action through the full ROM occurs (figure 15.7). The athlete then relaxes, and a passive hip flexion stretch is applied and held for 30 seconds (figure 15.8) while the athlete concentrically contracts the agonist. The increased ROM is facilitated due to autogenic inhibition (i.e., activation of the hamstrings).
