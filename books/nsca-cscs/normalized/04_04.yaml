definition: >
  The adrenal medulla, the inner core of the gland, is directly stimulated by the autonomic nervous system during acute stress. It rapidly secretes catecholamines such as epinephrine and norepinephrine, alongside dopamine and specific enkephalin-containing polypeptides like peptide F, which are implicated in immediate stress responses and immune enhancement (129).

attributes:
  - inner core

purpose:
  - immediate stress responses
  - immune enhancement

