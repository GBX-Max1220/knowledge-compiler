id: recommendation.optimize_responses_of_adrenal_hormones
type: Recommendation
canonical_name: To Optimize Responses of Adrenal Hormones
semantic_type: TrainingRecommendation
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 4
  chapter_title: ""
  section: "4.4"
  section_title: "Muscle Tissue Recruitment"
  book_page: 272
  pdf_page: null

provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships: []

recommendation_text: >
  Use high volume, large muscle groups, and short rest periods to expose the body to adrenergic stress.
  Be careful to vary the training protocol and the rest period length from short to long over time.
  Provide days of complete rest, and use lower-volume workouts to allow the adrenal gland to engage in recovery processes to reduce stress on the adrenal medulla so as not to experience adrenergic exhaustion and to reduce stress on the adrenal cortex and prevent chronic cortisol secretions from the adrenal cortex. This way, the stress of the exercises will not result in a nonfunctional overreaching or overtraining.

methods:
  - Use high volume, large muscle groups, and short rest periods to expose the body to adrenergic stress
  - Vary the training protocol and the rest period length from short to long over time
  - Provide days of complete rest
  - Use lower-volume workouts to allow the adrenal gland to engage in recovery processes

outcome: optimize responses of adrenal hormones
