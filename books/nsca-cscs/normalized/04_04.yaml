  reviewed: "auto"

evidence_level: ""

relationships: []

definition: >
  Cortisol has critical roles in modulating inflammation and managing metabolic responses to stress. As such, cortisol is regulated on a systemic level by the hypothalamic-pituitary-adrenal (HPA) axis and locally within tissues by enzymes such as 11β-hydroxy-steroid dehydrogenase (11β-HSD) to maintain glucocorticoid balance (25, 27, 99). Cortisol is crucial for sustaining energy during prolonged stress by facilitating glucose availability through selective glucose sparing and mobilization, gluconeogenesis, and fat and protein catabolism.

attributes: []

purpose:
  - modulate inflammation
  - manage metabolic responses to stress
  - sustain energy during prolonged stress

related_concepts:
  - concept.hypothalamic_pituitary_adrenal_axis
