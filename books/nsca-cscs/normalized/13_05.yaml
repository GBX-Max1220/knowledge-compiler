id: recommendation.cool_down_after_strenuous_tests
type: Recommendation
canonical_name: Cool-Down After Strenuous Tests
semantic_type: Recommendation
aliases: []

source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
