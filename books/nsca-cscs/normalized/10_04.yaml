id: warning.excess_preformed_vitamin_a_toxicity
type: Warning
canonical_name: Excess Preformed Vitamin A Toxicity
semantic_type: Toxicity
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 10
  chapter_title: "Nutrition and Exercise"
  section: "10.4"
  section_title: "Vitamins"
  book_page: 579
  pdf_page: 579
provenance:
  extraction: "reasonix-code-v1"
  generation: "reasonix-code-v1"
  reviewed: "auto"
evidence_level: ""
relationships: []
definition: >
  Excess preformed vitamin A (not beta carotene, alpha carotene, or beta crypto xanthin, which are converted into vitamin A in the body) is toxic and associated with significant adverse effects including liver damage, intracranial pressure (pseudotumor cerebri), dizziness, nausea, headaches, skin irritation, pain in joints and bones, coma, and even death (23). Excess vitamin A intake can occur through diet but typically results from high levels of vitamin A in supplements (72, 109).
attributes: []
purpose: []
related_concepts:
  - concept.vitamin_a
