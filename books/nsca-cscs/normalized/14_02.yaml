definition: >
  Procedure for conducting a vertical jump (countermovement jump) using a wall and chalk.

attributes: []

purpose:
  - measure vertical jump height

related_concepts:
  - concept.vertical_jump
  - concept.countermovement_jump

steps:
  - order: 1
    description: "The tester rubs chalk on the fingertips of the athlete’s dominant hand."
  - order: 2
    description: "The athlete stands with the dominant shoulder about 6 inches (15 cm) from the wall and, with both feet flat on the floor, reaches as high as possible with the dominant hand and makes a chalk mark on the wall."
  - order: 3
    description: "The athlete then lowers the dominant hand and, without a preparatory or stutter step, performs a countermovement by quickly flexing the knees and hips, moving the trunk forward and downward, and swinging the arms backward. During the jump, the dominant arm reaches upward while the nondominant arm moves downward relative to the body."
  - order: 4
    description: "At the highest point in the jump, the athlete places a second chalk mark on the wall with the fingers of the dominant hand, using a swiping motion of the fingers. The score is the vertical distance between the two chalk marks."
  - order: 5
    description: "The best of three trials is recorded to the nearest 0.5 inch or 1.0 centimeter."
