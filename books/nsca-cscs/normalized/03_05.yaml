warning_text: >
  However, aerobic endurance training may reduce anaerobic performance capabilities, particularly for high-strength, high-power performance (82). This reduction in high-strength, high-power performance capabilities could be due to an interference in anaerobic energy production capabilities due to aerobic endurance training (153). Additionally, combined anaerobic and aerobic endurance training can reduce gains in muscle girth (36, 128), maximum strength (36, 76, 128), and speed- and power-related performance (44, 73).

