definition: >
  Lower the barbell under control to reduce the movement of the weight releasers.
  The weight releasers will disengage from the barbell about 2 to 4 inches (5-10 cm) before touching the chest at approximately nipple level.
  Keep the wrists stiff and the forearms perpendicular to the floor and parallel to each other.
  Maintain the five-point body contact position.
  Upward Movement Phase
  Push the barbell upward and very slightly backward as fast as possible until the elbows are fully extended.
  Keep the wrists stiff and the forearms perpendicular to the floor and parallel to each other.
  Maintain the five-point body contact position.
  Do not arch the back or raise the chest to meet the bar.
  At the end of the set, signal the spotter for assistance in racking the bar.
  Keep a grip on the bar until it is racked.
  MAJOR MUSCLES INVOLVED
  pectoralis major, anterior deltoids, triceps brachii

