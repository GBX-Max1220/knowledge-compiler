definition: 'Grasp the bar with a closed, pronated grip 6 to 12 inches (16-30 cm)
  wide. Stand erect with feet shoulder-width apart, knees slightly flexed. Place the
  body close enough to the machine to allow the cable to hang straight down when it
  is held in the starting position. Pull the bar down to position the upper arms against
  the sides of the torso. Flex the elbows to position the forearms parallel to the
  floor or slightly above. All repetitions begin from this position.

  '
