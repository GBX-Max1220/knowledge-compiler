definition: '1. Sitting with the legs straight and the upper body nearly vertical,
  place the right foot to the left side of the left knee. 2. Place the back of the
  left elbow on the right side of the right knee, which is now flexed. 3. Place the
  right palm on the floor 12 to 16 inches (30-41 cm) behind the hips. 4. Push the
  right knee to the left with the left elbow while turning the shoulders and head
  to the right as far as possible. Try to look behind the back. 5. Repeat on the other
  side.

