definition: 'Stand erect with the feet parallel to each other and shoulder-width apart.
  Step forward with the left leg and flex the right hip and knee to move the right
  thigh upward toward the chest. Grasp the front of the right knee or upper shin and
  use the arms to pull the right knee up further and to squeeze the thigh against
  the chest. Dorsiflex the left foot as the right hip and knee are flexed. Keeping
  the torso erect, pause for a moment, then proceed to step down with the right leg.
  Shift the body weight to the right leg and repeat the motion with the left leg.
  Progress forward with each step, increasing the ROM and speed on subsequent steps.

