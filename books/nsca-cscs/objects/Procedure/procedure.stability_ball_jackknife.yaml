definition: 'An exercise performed on a stability ball that involves rolling the ball
  toward the chest by flexing the hips and knees while keeping the torso rigid.

  '
attributes:
- requires_stability_ball
- closed_kinetic_chain
purpose:
- strengthen rectus abdominis
- strengthen iliopsoas
