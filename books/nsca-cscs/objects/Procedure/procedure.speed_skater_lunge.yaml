definition: 'Assume an upright stance with feet hip-width apart and arms to the side
  (note: this preparatory position is not shown). Shift the body weight to the left
  foot and at the same time drop the hips back and down, reaching the right leg behind
  the body and as far as possible to the opposite (right) side. The result is a fully
  extended rear (right) knee and a contralateral (opposite) lateral reach of the other
  (left) arm. Push back to the beginning position and repeat on the other side. For
  a more advanced exercise, the movement can be initiated by a lateral hop.

