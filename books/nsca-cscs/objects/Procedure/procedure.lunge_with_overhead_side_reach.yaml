definition: 'Stand erect with the feet parallel to each other and shoulder-width apart.
  Take an exaggerated step directly forward with the left leg, planting the left foot
  flat on the floor pointing straight ahead. Allow the left hip and knee to slowly
  flex, keeping the left knee directly over the left foot. Slightly flex the right
  knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right
  foot should be pointed straight ahead. Reach up high with the right arm and bend
  the torso laterally toward the left leg. Return to an erect torso position, and
  then forcefully push off the floor by extending the left hip and knee. Pick up the
  right foot and place it next to the left foot; do not stutter-step forward. Stand
  erect, pause, and then step forward with the right leg, progressing forward with
  each step.

  '
