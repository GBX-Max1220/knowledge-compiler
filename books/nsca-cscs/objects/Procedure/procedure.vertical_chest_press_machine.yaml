definition: 'Starting Position Sit down and lean back on the seat in the five-point
  body contact position. Grasp the handles with a closed, pronated grip. Align handles
  with the nipples. If necessary, adjust the seat height to correctly position the
  handles. All repetitions begin from this position. Forward Movement Phase Push the
  handles away from the chest to a fully extended elbow position. Do not arch the
  lower back or forcefully lock out the elbows. Maintain the five-point body contact
  position. Backward Movement Phase Allow the handles to slowly move backward to the
  starting position. Maintain the five-point body contact position.

  '
