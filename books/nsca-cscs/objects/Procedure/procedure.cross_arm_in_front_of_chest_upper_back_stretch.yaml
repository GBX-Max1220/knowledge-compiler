definition: '1. Stand or sit with the left elbow slightly flexed (15-30 degrees) and
  the arm across the body (i.e., shoulder in horizontal adduction). 2. Grasp the upper
  arm just above the elbow, placing the right hand on the posterior side of the upper
  arm. 3. Pull the left arm across the chest (toward the right) with the right hand.
  4. Repeat on the other side.

