definition: 'Assume a quadruped position. Raise the left hand and extend the hand
  under the body, reaching as far to the right as possible. Reverse the action, pulling
  the left hand back to the beginning position before pulling the arm back and turning
  the body away from the support arm. Keep the lumbar spine in a neutral position
  so that the action occurs mainly in the thoracic spine. Carry out the action in
  a slow and controlled manner. Repeat on the other side.

  '
