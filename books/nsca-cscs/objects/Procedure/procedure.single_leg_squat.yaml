definition: 'Note: The single-leg squat is not typically done with a spotter. If spotting
  is needed, two spotters are used with one on each side of the bar. The positions
  of the spotters are not pictured in order to show the athlete''s position at the
  various stages of the single-leg squat more clearly. Starting Position: Athlete
  Grasp a barbell with a closed, pronated grip (for dumbbell variation, hold dumbbells
  with a closed, neutral grip with a dumbbell in each hand). Stand in front of a bench
  or box that is approximately knee height with the feet approximately shoulder- to
  hip-width apart. Facing away from the bench or box, take a moderate step forward
  with one leg and place the instep of the back foot on top of the bench or box. Allow
  both knees to be slightly flexed, with the torso in a nearly erect position and
  the shoulders held back and chest up and out. All repetitions begin from this position.
  Starting Position: Two Spotters The spotters should stand erect at opposite ends
  of the bar with the feet hip-width apart and the knees slightly flexed. Hold the
  hands 2 to 3 inches (5-8 cm) below the end of the bar. Note: If dumbbells are used,
  no spotter is needed. Downward Movement Phase: Athlete Flex the hip and knee of
  the forward leg simultaneously to lower the body in a vertical plane while keeping
  the torso-to-floor angle constant. Keep the heel of the forward foot flat on the
  floor and the instep of the back foot on top of the bench or box. Continue flexing
  the hip and knee until the front thigh is approximately parallel to the floor. Downward
  Movement Phase: Two Spotters Keep the cupped hands close to but not touching the
  bar as it descends. Slightly flex the knees, hips, and torso to keep a neutral spine
  position when following the bar. Upward Movement Phase: Athlete Raise the bar under
  control by actively extending the forward hip and knee; extend the other hip and
  knee also to keep the torso-to-floor angle constant. Maintain a neutral spine position
  and keep the torso upright. Keep the forward knee aligned over the forward foot.
  Do not flex the torso forward or round the spine. Continue extending the hip and
  knee of the forward leg to reach the starting position. Repeat for the desired number
  of repetitions and then switch the forward leg. Upward Movement Phase: Two Spotters
  Keep cupped hands close to but not touching the bar as it ascends. Slightly extend
  the knees, hips, and torso and keep the back neutral when following the bar. MAJOR
  MUSCLES INVOLVED gluteus maximus, semimembranosus, semitendinosus, biceps femoris,
  vastus lateralis, vastus intermedius, vastus medialis, rectus femoris

  '
