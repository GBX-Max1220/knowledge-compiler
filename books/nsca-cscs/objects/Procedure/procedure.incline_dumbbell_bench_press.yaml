definition: 'Starting Position: Athlete Grasp two dumbbells using a closed, pronated
  grip. Lie in a supine position on an incline bench in the five-point body contact
  position. Signal the spotter for assistance in moving the dumbbells into the starting
  position. Press the dumbbells in unison to an extended-elbow, parallel-arm position
  above the head and face. All repetitions begin from this position. Starting Position:
  Spotter Stand erect and very close to the head of the bench (but do not distract
  the athlete). Place the feet shoulder-width apart with the knees slightly flexed.
  Grasp the athlete''s forearms near the wrists. At the athlete''s signal, assist
  with moving the dumbbells to a position over the athlete''s head and face. Release
  the athlete''s forearms smoothly. Downward Movement Phase: Athlete Lower the dumbbells
  down and slightly out to be near the armpits and in line with the upper one-third
  area of the chest (between the clavicles and the nipples). Keep the wrists stiff
  and directly above the elbows, with the dumbbell handles aligned with each other.
  Maintain the five-point body contact position. Do not arch the back or raise the
  chest to meet the dumbbells. Downward Movement Phase: Spotter Keep the hands near—but
  not touching—the athlete''s forearms near the wrists as the dumbbells descend. Slightly
  flex the knees, hips, and torso and keep the back neutral when following the dumbbells.
  Upward Movement Phase: Athlete Push the dumbbells upward at the same rate and very
  slightly toward each other until the elbows are fully extended. Keep the wrists
  stiff and directly above the elbows, with the dumbbell handles aligned with each
  other. Maintain the five-point body contact position. Upward Movement Phase: Spotter
  Keep the hands near—but not touching—the athlete''s forearms near the wrists as
  the dumbbells ascend. Slightly extend the knees, hips, and torso and keep the back
  neutral when following the dumbbells.

  '
