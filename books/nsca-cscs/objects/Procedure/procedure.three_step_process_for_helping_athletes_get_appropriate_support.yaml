steps:
- step_number: 1
  action: Identify the signs and symptoms of distress related to affect, behavior,
    and cognitions.
- step_number: 2
  action: Determine the duration of distress (lasting greater than 2-3 weeks) and
    potential disruption (e.g., sleep patterns, nutritional habits, social relationships).
    Specifically, is the distress temporary or persistent, and how will it affect
    behaviors outside of sports?
- step_number: 3
  action: Determine how to support the athlete.
