definition: 'Starting Position Sit on the end of a bench. Grasp the bar with a closed,
  pronated grip about hip- to shoulder-width apart. Position the feet and legs parallel
  to each other with the toes pointing straight ahead. Lean the torso forward and
  place the elbows and forearms on the top of the thighs. Move the wrists forward
  until they are slightly beyond the patellae. Keep a closed grip on the bar but allow
  the wrists to flex toward the floor. Upward Movement Phase Raise the bar by extending
  the wrists. Extend the wrists as far as possible without moving the elbows or forearms.
  Do not jerk the body backward or swing the bar upward. Downward Movement Phase Allow
  the wrists to slowly flex back to the starting position. Keep the torso and arms
  in the same position. Maintain a closed grip.

  '
