definition: 'An exercise drill involving a single-leg push-off from a plyometric box,
  with low intensity and vertical direction.

  '
attributes:
- intensity_level: Low
- direction: Vertical
- arm_action: Double arm
- equipment: Plyometric box, 6 to 18 inches (15-46 cm) high
purpose:
- perform a single-leg push-off
related_concepts: []
steps:
- step_number: 1
  description: Stand facing the plyometric box with one foot on the ground and one
    foot on the box. The heel of the foot on the box should be near the box's closest
    edge.
- step_number: 2
  description: Lift the front foot slightly so that it can be driven down into the
    box.
- step_number: 3
  description: Drive the front foot down into the box to cause an upward jumping action.
- step_number: 4
  description: Land with the same foot on the box; this foot should land just before
    the ground foot. Immediately repeat the movement.
common_errors:
- Not orienting the body at takeoff to optimally generate vertical force
- Not creating sufficient vertical force with the front foot
