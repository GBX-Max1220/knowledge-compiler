definition: 'Setup and Starting Position Stand facing the axis of rotation of the
  landmine barbell with a slight forward lean, while assuming a shoulder-width stance
  with the knees slightly flexed and grasping the end of the bar with one hand. The
  bar should be positioned about 4 to 6 inches (10.2-15.2 cm) away from the shoulder
  of the arm that is holding the bar (135). The other arm is held out to the side
  of the body and used for balance during the exercise. Downward Movement Phase Begin
  the exercise by flexing the hips and knees slowly and under control while keeping
  the torso-to-floor angle relatively constant. Maintain a flat-foot position with
  the knees aligned over the feet as they flex. Continue flexing the hips and knees
  until the thighs are parallel to the floor, the torso begins to round or flex forward,
  or the heels begin to rise off the floor. Upward Movement Phase Extend the hips
  and knees while keeping the torso-to-floor angle relatively constant. Keep the torso
  erect, shoulders back, and chest up and out. Keep the heels on the floor and the
  knees aligned over the feet. Continue extending the hips and knees; as the fully-standing
  position is reached, press the bar up and slightly forward until the elbow of the
  arm holding the bar is fully extended; full knee and elbow extension should be attained
  at about the same time. Return to the Starting Position Keeping the lower body and
  torso stationary, slowly lower the bar in a controlled manner until it is returned
  to the starting position. Note: As part of a balanced training program, this movement
  is performed on both sides of the body. MAJOR MUSCLES INVOLVED gluteus maximus,
  semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius,
  vastus medialis, rectus femoris, deltoid (anterior, medial, and posterior), trapezius,
  triceps brachii

  '
