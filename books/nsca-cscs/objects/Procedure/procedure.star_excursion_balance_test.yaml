definition: 'The athlete stands in the center of a grid with eight lines (120 cm [47
  in.]) extending out at 45-degree increments as shown in figure 14.27 (115, 126).
  The athlete maintains a single-leg stance facing in one direction while reaching
  with the contralateral leg as far as possible for each taped line, touching the
  farthest point possible and then returning to the bilateral position. Within a single
  trial, the athlete remains facing in the beginning direction and the stance leg
  remains the same, with the other leg doing all of the reaching. The distance from
  the center of the star to the touch position is measured. The starting direction
  and support leg are chosen randomly. Three trials are performed for each condition
  and averaged. A 15-second rest is allowed between each reach. Trials are discarded
  if the athlete does not touch the line, lifts the stance foot from the center grid,
  loses balance, or does not maintain start and return positions for 1 full second.
  Athletes should be given a minimum of four practice trials before being tested (103).
  It has been suggested that testing the anteromedial, medial, and posteromedial positions
  is sufficient for most situations (66).

  '
