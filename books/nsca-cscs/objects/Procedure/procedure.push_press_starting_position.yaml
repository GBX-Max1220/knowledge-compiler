definition: 'Grasp the bar with a closed, pronated grip. Grip should be slightly wider
  than shoulder-width (clean grip). Step under the bar and position the feet hip-width
  apart and parallel to each other. Move up to the bar to place it on top of the anterior
  deltoids and clavicles. Extend the hips and knees to lift the bar off the supports.
  Step back away from the supports and stand in the middle of the lifting platform.
  Position the feet hip- to shoulder-width apart and even with each other, with the
  toes pointed slightly outward. All repetitions begin from this position.

  '
