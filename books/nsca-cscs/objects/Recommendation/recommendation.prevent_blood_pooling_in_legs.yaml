recommendation_text: 'This mechanism is one of the reasons why it is important to
  periodically contract leg muscles or to take walking breaks during prolonged sitting.
  These activities act to prevent blood pooling in the legs and facilitate venous
  blood return to the heart.

  '
rationale: 'The skeletal muscle pump works with the venous system, which contains
  the one-way valves for blood return to the heart. The contracting muscle compresses
  the veins, but since the blood can flow only in the direction of the valves, it
  is returned to the heart.

  '
