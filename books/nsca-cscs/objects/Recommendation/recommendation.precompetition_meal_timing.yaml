definition: 'Athletes who eat at least 4 hours before competition should include approximately
  1 to 4 grams of carbohydrate per kilogram body weight and 0.15 to 0.25 grams of
  protein per kilogram body weight. If the precompetition meal is consumed 2 hours
  before exercise, athletes should aim for approximately 1 gram of carbohydrate per
  kilogram body weight and 0.15 to 0.25 grams of easily digestible protein per kilogram
  body weight.

