recommendation_text: 'The diaphragm and the abdominal muscles can contract without
  the glottis being closed, however, creating the fluid ball in the abdomen without
  pressurizing the chest compartment. This must be regarded as the safer way, of the
  two options, to add support to the lower spine without building up pressure in the
  chest, and it is the technique that should be used for most resistance training.

