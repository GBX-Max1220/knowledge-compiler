definition: 'After resistance training, younger individuals should consume at least
  20 to 50 grams (providing about 8.5 to 20 grams of essential amino acids) of a high-quality,
  high-leucine protein (>2-3 g), while older adults should consume 40 grams or more
  to maximally stimulate muscle protein synthesis in the acute time period after training.

