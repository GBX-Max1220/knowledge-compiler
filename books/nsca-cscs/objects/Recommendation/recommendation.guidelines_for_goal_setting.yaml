recommendation_text: 'In general, guidelines for goal setting include the following:
  Long-term goals and short-term goals are interdependent. Long-term goals provide
  a sense of meaningfulness and direction for pursuing short-term goals. The attainment
  of short-term goals provides a hierarchical sense of mastery and success that builds
  self-confidence. Athletes should define process goals to focus on elements of their
  performance over which they have control.

  '
