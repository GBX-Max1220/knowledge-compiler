recommendation_text: 'A common application of assistance exercises is for injury prevention
  and rehabilitation, because these exercises often isolate a specific muscle or muscle
  group. The muscles that are predisposed to injury from the unique demands of a sport
  skill (e.g., the shoulder external rotators for overhand pitching) or those that
  require reconditioning after an injury (e.g., a quadriceps contusion) can be specifically
  conditioned by an assistance exercise. However, it is important that the chosen
  exercises improve a physical characteristic within the program (flexibility, strength,
  etc.) and that the professional prescribes them appropriately with specific volumes
  and intensities.

  '
