recommendation_text: 'According to the Drucker Foundation (31), the following are
  suggested criteria for an effective mission statement: It should be short and sharply
  focused. It should be clear and easy to understand. It defines why the organization
  exists. It does not prescribe means. It is broad in scope. It provides direction
  for upholding a code of ethics. It addresses and matches the organization’s scope
  of practice. It inspires commitment.

  '
