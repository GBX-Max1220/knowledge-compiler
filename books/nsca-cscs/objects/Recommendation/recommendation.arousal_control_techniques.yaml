recommendation_text: 'An athlete should employ arousal reduction techniques when performing
  a new skill or one that is complex or when performing in high-pressure situations.
  Athletes should employ arousal enhancement techniques when executing simple skills,
  ones that are well learned, or in situations of minimal pressure.

