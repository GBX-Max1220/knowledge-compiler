definition: 'In general, strength or speed athletes should consume 1.4 to 2.0 grams
  of protein per kilogram body weight per day, even if their sport or training includes
  an aerobic endurance component. After resistance training, younger individuals should
  consume at least 20 to 50 grams (providing about 8.5 to 20 grams of essential amino
  acids) of a high-quality, high-leucine protein (2-3 g), while older adults should
  consume 40 grams or more to maximally stimulate muscle protein synthesis in the
  acute time period after training. If the exercise was performed in a fasted state
  (first thing in the morning or more than 3 hours after the last protein-rich meal),
  the protein should be consumed within 30 minutes after the end of the session; but
  if the exercise was performed in a fed state (preexercise protein-rich meal or supplement),
  this postexercise time window may be considerably longer.

  '
