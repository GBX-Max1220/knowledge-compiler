recommendation_text: 'Serum testosterone concentrations have been shown to increase
  acutely by using these methods independently or in various combinations: Large muscle
  group exercises (e.g., deadlift, power clean, squat) Heavy resistance (85% to 95%
  1RM) Moderate to high volume of exercise, achieved with multiple sets or multiple
  exercises Short rest intervals (30-60 s)

