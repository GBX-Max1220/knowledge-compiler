recommendation_text: 'Moderate-intensity anaerobic exercise seems to be adequate for
  increasing cartilage thickness. Strenuous exercise does not appear to cause any
  degenerative joint disease when progressively overloaded appropriately. Tissue viability
  can be maintained by adopting a variety of exercise modalities and ensuring that
  load is applied throughout the range of motion.

