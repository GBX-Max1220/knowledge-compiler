recommendation_text: 'To mitigate this injury risk, it is generally recommended that
  the tires used should be dry and have sufficient tread to allow the athlete to maintain
  grip and properly execute the exercise (21). Additionally, it is important that
  the tire is selected based on the individual athlete''s strength levels and that
  the movement is performed with appropriate exercise technique so that injury risk
  is minimized.

