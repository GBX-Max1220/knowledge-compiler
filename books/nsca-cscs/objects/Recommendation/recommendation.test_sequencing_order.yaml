definition: 'A logical sequence, although there are some variations, is to administer
  tests in this order: 1. Nonfatiguing tests (e.g., height, weight, flexibility, skinfolds
  and girth measurements, vertical jump) 2. Agility tests (e.g., T-test, 5-10-5 test,
  5-0-5 test, Illinois test) 3. Maximum power and strength tests (e.g., 1RM power
  clean, 1RM squat, 1RM bench press) 4. Sprint tests (e.g., 40 m sprint with split
  times at 10 m and 20 m) 5. Local muscular endurance tests (e.g., push-up test, partial
  curl-up, YMCA bench press test)

  '
