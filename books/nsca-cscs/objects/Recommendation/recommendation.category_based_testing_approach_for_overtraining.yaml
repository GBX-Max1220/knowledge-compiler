recommendation_text: 'Before implementing an athlete monitoring program or a system
  to diagnose an overtraining syndrome, Bernaciková and colleagues (9) suggest classifying
  any intended tests using three categories of assessments: Category I. Daily tests,
  easy to administer, inexpensive, rapid turnaround of results, convenient for the
  coach and athlete. Category II. Every few days, more complex, longer questionnaires,
  slightly more inconvenient to the athlete than category I, rapid turnaround of results.
  Category III. Occasionally administered (e.g., once a month), more involved and
  intrusive, more expensive, longer turnaround time for the results. It is suggested
  that category I testing be performed first. If the results suggest possible overtraining
  concerns, testing for category II is warranted. Likewise, if the category II test
  suggests an overtraining problem, a category III test may be performed.

  '
