definition: 'After exercise, approximately 1.2 to 2.0 grams of carbohydrate per kilogram
  body weight should be consumed within 30 minutes after stopping the exercise. The
  addition of protein appears to facilitate glycogen replenishment if carbohydrate
  intake is below 1.2 grams per kilogram.

