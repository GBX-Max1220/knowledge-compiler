recommendation_text: 'Use active and passive recovery methods during training. Allow
  one or more days of routine training abstinence to enhance recovery. Rest days are
  critical. Limit excessively long training sessions and too many sessions in a day.
  Exercise caution with excessive training volumes and large increases in training
  volume (>30% increases). Prior exposure to stressful training enhances training
  stress tolerance. Variation in the training stimulus is critical, and use of periodized
  training is important. Avoid excessive training to failure. Coordinate resistance
  exercise with other stressors (e.g., sport training and other conditioning). Incorporate
  recovery strategies (e.g., sleep, diet, mental skills). Appropriate diet for training
  (e.g., adequate Kcal, protein ingestion, glycogen repletion, sufficient vitamins
  and minerals, adequate fluid intake). Dietary supplements may help (e.g., recovery
  drinks, protein and carbohydrate supplements, creatine, oral ATP). Monitor outside
  stressors. Monitor internal and external training loads. Incorporate an athlete
  monitoring program.

