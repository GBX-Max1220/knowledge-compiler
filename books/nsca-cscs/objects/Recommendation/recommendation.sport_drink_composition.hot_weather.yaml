recommendation_text: During prolonged activity in hot weather, the IOM recommends
  sport drinks containing 20 to 30 mEq of sodium (460-690 mg with chloride as the
  anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate
  in a concentration of 5% to 10% (70).
