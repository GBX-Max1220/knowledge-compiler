definition: 'Administer a supervised cool-down period to athletes following tests
  that dramatically increase heart rate and at the completion of the test battery.
  For example, after the 300-yard (274 m) shuttle, the athlete should not sit or lie
  down; active recovery using low-intensity movement and light stretching will enhance
  the recovery process (10).

  '
