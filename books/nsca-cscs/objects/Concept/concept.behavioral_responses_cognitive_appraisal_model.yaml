definition: 'Behavioral Responses: Adherence to rehabilitation. Does the athlete demonstrate
  consistency and commitment to the active process? Use of psychological skills. Are
  techniques such as goal setting, imagery, and visualization integrated to improve
  their recovery timeline? Effort and intensity. How does the athlete''s level of
  motivation change over time? Malingering. Does the athlete exacerbate pain or readiness
  levels to avoid future responsibilities or changes in their timeline? Risk-taking.
  Does the athlete engage in activities that have not yet been cleared for participation?
  Do they avoid certain activities because they feel they are not yet ready to perform?

