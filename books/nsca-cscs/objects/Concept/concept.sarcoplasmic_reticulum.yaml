definition: 'Each myofibril is encased by an intricate system of tubules, called the
  sarcoplasmic reticulum (figure 1.5, page 5), which terminates as vesicles in the
  vicinity of the Z-lines. Calcium ions are stored in the sarcoplasmic reticulum,
  and muscle activation leads to the release of these calcium stores to facilitate
  muscular contraction.

