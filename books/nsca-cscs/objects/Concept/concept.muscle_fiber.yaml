definition: 'Muscle cells, often called muscle fibers or myofibers, are long (sometimes
  running the entire length of a muscle), cylindrical cells 50 to 100 μm in diameter
  (about the diameter of a human hair). Muscle fibers have all their nuclei situated
  on the outer periphery of the cell and have a striated appearance when viewed with
  a microscope under low magnification.

