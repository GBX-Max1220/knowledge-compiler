definition: 'The primary roles of the cardiovascular system are to transport nutrients
  and remove waste and by-products while assisting with maintaining the environment
  for all the body’s functions. The cardiovascular system plays key roles in the regulation
  of the body’s acid–base system, fluids, and temperature, as well as a variety of
  other physiological functions.

