definition: 'The part of the skeleton including the shoulder (or pectoral) girdle
  (left and right scapula and clavicle); bones of the arms, wrists, and hands (left
  and right humerus, radius, ulna, carpals, metacarpals, and phalanges); the pelvic
  girdle (left and right coxal or innominate bones); and the bones of the legs, ankles,
  and feet (left and right femur, patella, tibia, fibula, tarsals, metatarsals, and
  phalanges).

