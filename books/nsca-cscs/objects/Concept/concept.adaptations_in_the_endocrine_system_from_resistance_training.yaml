definition: 'Resistance training affects muscles and connective tissues and significantly
  affects the other physiological systems, including the endocrine system. This type
  of training also trains the endocrine glands, with the gland''s involvement dependent
  on the demands of the motor units activated during exercise. The endocrine system''s
  adaptations to resistance training include changes in the following: Hormone synthesis
  and storage; Hormone transport via binding proteins; Clearance and degradation rates
  of hormones; Fluid shifts from blood to tissues during exercise; Hormone–receptor
  binding affinity; The number of tissue receptors; Glandular cell changes; The intensity
  of signals sent to cell nuclei by hormone–receptor complexes; Cellular interactions
  influencing muscle protein production.

  '
