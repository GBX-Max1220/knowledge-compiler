definition: 'Bulimia nervosa is characterized by recurrent consumption of food in
  amounts significantly greater than would customarily be consumed in a discrete period
  of time—for example, an entire pizza and a half-gallon of ice cream, plus a package
  of cookies. Purging follows episodes of binge eating and may include one or more
  of the following: self-induced vomiting, intense exercise, laxative use, or diuretic
  use. The bingeing and purging occur at least once a week for a period of three months
  (55).

  '
