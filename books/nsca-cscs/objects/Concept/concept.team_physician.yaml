definition: 'The team physician provides medical care to an organization, school,
  or team. The team physician is most often a medical doctor (MD) or doctor of osteopathy
  (DO). The team physician may have specialized training (residency or fellowship)
  in a variety of fields, including family medicine, internal medicine, pediatrics,
  and orthopedics (67) but should be proficient in the care of musculoskeletal injuries
  and sport-related medical conditions (32).

