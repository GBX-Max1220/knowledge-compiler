definition: 'Exercise classification should also consider the skill level and complexity
  involved in performing a particular movement. Basic compound movements like squats,
  deadlifts, and presses may serve as foundational tests for assessing general strength
  and movement proficiency. Conversely, more advanced or sport-specific movements
  require greater neuromuscular coordination and may be included to evaluate athletic
  prowess in specific contexts.

