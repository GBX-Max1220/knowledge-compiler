definition: 'The tricuspid valve and mitral valve (bicuspid valve) (collectively called
  atrioventricular [AV] valves) prevent the flow of blood from the ventricles back
  into the atria during ventricular contraction (systole). The aortic valve and pulmonary
  valve (collectively, the semilunar valves) prevent backflow from the aorta and pulmonary
  arteries into the ventricles during ventricular relaxation (diastole). Each valve
  opens and closes passively; that is, each closes when a backward pressure gradient
  pushes blood back against it, opening when a forward pressure gradient forces blood
  in the forward direction (41).

  '
