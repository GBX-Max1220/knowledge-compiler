definition: 'The SA node is a small area of specialized muscle tissue located in the
  upper lateral wall of the right atrium. The fibers of the node are contiguous with
  the muscle fibers of the atrium, with the result that each electrical impulse that
  begins in the SA node normally spreads immediately into the atria. The SA node normally
  controls heart rhythmicity because its discharge rate is considerably greater (60-80
  times per minute) than that of either the AV node (40-60 times per minute) or the
  ventricular fibers (15-40 times per minute). Each time the SA node discharges, its
  impulse is conducted into the AV node and the ventricular fibers, discharging their
  excitable membranes.

  '
