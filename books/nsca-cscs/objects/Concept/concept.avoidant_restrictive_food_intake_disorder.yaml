definition: 'Avoidant/restrictive food intake disorder (ARFID) is an eating or feeding
  disturbance, including apparent lack of interest in eating or food; avoidance based
  on the sensory characteristics of food; or concern about aversive consequences of
  eating. This disorder is manifested by persistent failure to meet appropriate nutritional
  or energy needs associated with one (or more) of the following: Significant weight
  loss (or failure to achieve expected weight gain or faltering growth in children);
  Significant nutritional deficiency; Dependence on enteral feeding or oral nutritional
  supplements; Marked interference with psychosocial functioning.

  '
