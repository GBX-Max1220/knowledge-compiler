definition: 'Exercises can also be categorized based on the primary energy system
  they predominantly engage, such as the phosphagen system, glycolytic system, or
  oxidative system. Different energy systems contribute to various aspects of athletic
  performance, including power, strength, and endurance. Assessing performance across
  these energy systems provides valuable insights into an athlete’s metabolic capacity
  and helps tailor conditioning strategies accordingly.

