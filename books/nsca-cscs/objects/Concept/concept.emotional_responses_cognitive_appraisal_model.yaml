definition: 'Emotional Responses: Injury-related fear. How does the athlete embrace
  progressive overload into more sport-specific movements? Tension, anger, depression.
  Has the injury created conflict within the athlete''s normal activities of daily
  living and sports participation? Frustration and boredom. Is the rehabilitation
  process mentally engaging and motivating? Grief. Was there a loss in a specific
  competition or season? Did the athlete lose his or her position or formal role with
  the team due to the injury? Positive outlook. Does the athlete view this setback
  as an opportunity to rebuild and improve?

  '
