definition: 'After the first week of the resistance training protocol, urinary 3-methyl-histidine
  was increased by 94% in the control group and by 85% and 50% in those individuals
  ingesting 1.5 and 3 grams of HMB per day, respectively. During the second week of
  the study, urinary 3-methyl-histidine levels were still elevated by 27% in the control
  group but were 4% and 15% below basal levels for the 1.5 and 3 grams of HMB per
  day groups.

