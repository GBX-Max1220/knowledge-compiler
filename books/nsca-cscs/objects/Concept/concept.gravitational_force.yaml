definition: 'The downward force on an object from the pull of gravity, the interaction
  of mass and gravity, is equal to the object''s mass times the local acceleration
  due to gravity: Fg = m × ag (2.8) where Fg is the force due to gravity (same as
  the object''s weight, measured in newtons [N]), m is the object''s mass (measured
  in kilograms [kg]), and ag is the local acceleration due to gravity (measured in
  meters per second per second [m·s−2]).

