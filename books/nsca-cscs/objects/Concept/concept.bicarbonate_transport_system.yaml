definition: 'The greatest amount of carbon dioxide removal (approximately 70%) is
  from the combination with water and delivery to the lungs in the form of bicarbonate
  (HCO3−). The initial step in this reversible reaction is the combination of carbon
  dioxide in solution with water in the red blood cells to form carbonic acid. The
  reaction would normally be quite slow except for the impact of the enzyme carbonic
  anhydrase, which significantly speeds up this process. Once carbonic acid is formed,
  it is broken down to hydrogen ions and bicarbonate ions. Because hemoglobin is a
  significant acid–base buffer, hydrogen ions combine with hemoglobin. This process
  helps to maintain the pH of the blood. Bicarbonate ions diffuse from the red blood
  cells to the plasma, while chloride ions diffuse into the blood cells to replace
  them (17, 27).

  '
