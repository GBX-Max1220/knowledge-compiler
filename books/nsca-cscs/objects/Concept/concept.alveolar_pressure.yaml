definition: 'Alveolar pressure is the pressure inside the alveoli when the glottis
  is open, and no air is flowing into or out of the lungs. In fact, in this instance
  the pressure in all parts of the respiratory tree is the same all the way to the
  alveoli and is equal to the atmospheric pressure. To cause inward flow of air during
  inspiration, the pressure in the alveoli must fall to a value slightly below atmospheric
  pressure. During expiration, alveolar pressure must rise above atmospheric pressure
  (41).

  '
