definition: 'Monosaccharides (glucose, fructose, and galactose) are single-sugar molecules.
  In the body, glucose is present as circulating sugar in the blood, where it is used
  as the primary energy substrate for cells. In addition, glucose molecules make up
  glycogen, a polysaccharide stored in muscle and liver cells. In food, glucose is
  typically combined with other monosaccharides to form various sugars, such as sucrose.
  Isolated glucose found in candy or sport drinks is found in the form of dextrose,
  a chemical isomer of glucose. Fructose has the same chemical formula as glucose,
  but because the atoms are arranged differently, it tastes much sweeter and has different
  properties. Fructose accounts for the sweet taste of honey and occurs naturally
  in fruits and vegetables. In the body, fructose causes less insulin secretion than
  other sugars, which has made it a focus of much research in the area of aerobic
  endurance performance. Galactose, the third monosaccharide, combines with glucose
  to form lactose, milk sugar.

  '
