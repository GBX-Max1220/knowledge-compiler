definition: 'The heart is a muscular organ composed of two interconnected but separate
  pumps; the right side of the heart pumps blood through the lungs, and the left side
  pumps blood through the rest of the body. Each pump has two chambers: an atrium
  and a ventricle (figure 1.11). The right and left atria deliver blood into the right
  and left ventricles. The right and left ventricles supply the main force for moving
  blood through the pulmonary and peripheral circulations, respectively (41).

  '
