definition: 'In an isometric muscle action, the muscle length does not change, because
  the contractile force is equal to the resistive force. The forces generated within
  the muscle and acting to shorten it are equal to the external forces acting at its
  tendons to stretch it. During a sit-up with the trunk held straight, the abdominal
  muscles act isometrically to maintain the rigidity of the trunk, while the hip flexors
  carry out the sit-up movement.

