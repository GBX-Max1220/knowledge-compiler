definition: 'Exercises can be classified based on the primary movement patterns they
  involve, such as pushing, pulling, squatting, hinging, rotating, and stabilizing
  (7, 8). Each movement pattern places specific demands on the musculoskeletal system
  and requires distinct biomechanical considerations. By including tests that cover
  a spectrum of movement patterns, practitioners can obtain a complete understanding
  of an athlete’s functional capabilities.

