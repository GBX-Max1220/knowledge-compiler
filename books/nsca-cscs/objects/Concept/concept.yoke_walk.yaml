definition: 'The yoke walk is another common strongman event whereby a heavy frame
  is carried on the shoulders of the athlete over a set distance. As McGill and colleagues
  (87) observed significantly greater spinal compression forces during the performance
  of the yoke walk when compared to six other strongman events, it is likely that
  this exercise has the potential to challenge and improve core stability. However,
  it must be performed with appropriate loads and technique to reduce the risk of
  injury, especially since Winwood and colleagues (154) reported that 213 strongman
  athletes ranked this exercise as the second most dangerous strongman lift in terms
  of injury risk. Similar to the farmer''s walk (71), faster yoke walks were characterized
  by increased stride length and stride rate, lower limb range of motion, and reduced
  ground contact time (61). Based on the impulse–momentum relationship, it would appear
  that weighted carries (e.g., farmer''s and yoke walks) require the production of
  high levels of anterior–posterior and vertical forces over short contact times,
  perhaps suggesting some potential to improve horizontal motion such as acceleration
  sprinting or initiating body contact in tackling or blocking opponents in contact
  or combat sports.

  '
