definition: 'The atrioventricular (AV) node is where the impulse is delayed slightly
  before passing into the ventricles. The AV node is located in the posterior septal
  wall of the right atrium (41). It is primarily the AV node and its associated conductive
  fibers that delay each impulse entering into the ventricles. Its discharge rate
  is 40-60 times per minute.

  '
