definition: 'Human growth hormone (HGH), a protein secreted from the anterior pituitary
  gland, has several important physiological functions that enhance its ergogenic
  effect. It is anabolic due to its stimulation of bone and skeletal muscle growth,
  but it also has important metabolic functions such as maintaining blood glucose
  levels, increasing the uptake of glucose and amino acids into muscle cells (67),
  and stimulating release of fatty acids from the fat cells.

