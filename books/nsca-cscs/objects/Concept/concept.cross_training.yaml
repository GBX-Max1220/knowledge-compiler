definition: 'In contrast, cross-training deliberately involves incorporating different
  types of exercise with the same underlying metabolic adaptation profile (i.e., enhancing
  aerobic capacity), without overstressing the primary activity muscles (e.g., including
  rowing in a program for a runner), often with the aim of complementing the main
  sport performance.

