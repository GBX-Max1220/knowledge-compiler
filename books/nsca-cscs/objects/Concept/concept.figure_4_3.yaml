definition: 'A simplified model of steroid hormone action. The figure illustrates
  how steroid hormones like testosterone in skeletal muscle or dihydrotestosterone
  in sex-linked tissues migrate into target cells. Although the pathways for both
  hormones are represented, each targets only one specific cell type but they are
  shown together for clarity. Each hormone pathway leads to different physiological
  outcomes, emphasizing the selective nature of steroid–hormone interactions.

