definition: 'Aerobic capacity, also called aerobic power, is the maximum rate at which
  an athlete can produce energy through oxidation of energy sources (carbohydrates,
  fats, and proteins) and is usually expressed as a volume of oxygen consumed per
  kilogram of body weight per minute (i.e., mL · kg−1 · min−1) (95).

