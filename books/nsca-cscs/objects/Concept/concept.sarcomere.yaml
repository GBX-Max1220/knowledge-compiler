definition: 'The smallest contractile unit of skeletal muscle. Myosin and actin filaments
  are organized longitudinally in the sarcomere. Sarcomeres average about 2.5 μm in
  length in a relaxed fiber (approximately 4,500 per centimeter of muscle length)
  and are repeated through the entire length of myofibrils that span the muscle fiber.

  '
