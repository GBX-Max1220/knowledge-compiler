definition: 'The mean arterial pressure is the average blood pressure throughout the
  cardiac cycle (equation 1.4). Mean arterial pressure is not the average of systolic
  and diastolic pressures, because the arterial pressure usually remains nearer the
  diastolic level than the systolic level during a greater portion of the cardiac
  cycle.

