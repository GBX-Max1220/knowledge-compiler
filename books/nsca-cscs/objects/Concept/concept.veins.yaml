definition: 'Venules collect blood from the capillaries and gradually converge into
  the progressively larger veins, which transport blood back to the heart. Because
  the pressure in the venous system is very low, venous walls are thin, although muscular.
  This allows them to constrict or dilate to a great degree and thereby act as a reservoir
  for blood, either in small or in large amounts (41). In addition, some veins, such
  as those in the legs, contain one-way valves that help maintain venous return by
  preventing retrograde blood flow.

  '
