definition: 'When properly prescribed, these can be very effective training methods
  that prepare the athlete for later performance gains (88, 89, 106, 126). The short-term
  effect is decrements in performance, but recovery can be attained within days or
  weeks and can result in a super compensation effect. As such, and although stressful
  to the athlete, functional overreaching (FOR) can be beneficial provided appropriate
  recovery is allowed.

