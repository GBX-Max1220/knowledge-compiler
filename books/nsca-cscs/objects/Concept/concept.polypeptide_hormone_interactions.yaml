definition: 'Polypeptide hormones are composed of chains of amino acids and include
  hormones such as GH and insulin. Due to their non-lipophilic nature, polypeptide
  hormones cannot cross the cell membrane, and, therefore, their effects are mediated
  by secondary messengers within the cell. When these hormones bind to their membrane
  receptor, they cause a conformational change that allows the receptor to transmit
  the hormonal signal inside the cell. This transmission initiates a cascade of signaling
  events that, among others, can affect metabolic activities, influence DNA transcription,
  or kick-start mRNA translation at the ribosome.

  '
