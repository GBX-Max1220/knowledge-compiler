definition: 'Phosphagen concentrations in muscle are more rapidly depleted as a result
  of high-intensity anaerobic exercise compared to aerobic exercise (66, 89). CP can
  decrease markedly (50%-70%) during the first stage of high-intensity exercise of
  short and moderate duration (5-30 s) and can be almost completely depleted as a
  result of very intense exercise to exhaustion (86, 93, 97, 110). Muscle ATP concentrations
  may decrease only slightly (34) or may decrease up to 50% to 60% (145) of the pre-exercise
  levels during experimentally induced fatigue.

