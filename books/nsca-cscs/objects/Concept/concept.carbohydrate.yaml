definition: 'Carbohydrate primarily serves as a source of energy. However, carbohydrate
  is not an essential nutrient, because the body can break down the carbon skeletons
  of certain amino acids and convert them into glucose (i.e., gluconeogenesis). Carbohydrates
  are composed of carbon, hydrogen, and oxygen. Carbohydrates can be classified into
  three groups according to the number of sugar (saccharide) units they contain: monosaccharides,
  disaccharides, and polysaccharides.

  '
