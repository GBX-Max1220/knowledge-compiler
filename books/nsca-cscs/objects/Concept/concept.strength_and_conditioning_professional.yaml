definition: 'The strength and conditioning professional typically focuses on strength,
  power, and performance enhancement. The strength and conditioning professional also
  plays a valuable role within the allied health team and is an integral part of the
  rehabilitation and reconditioning process. Ideally, this person should be certified
  by the National Strength and Conditioning Association as a Certified Strength and
  Conditioning Specialist (CSCS) to ensure that he or she has the knowledge and background
  to contribute to the rehabilitation process.

