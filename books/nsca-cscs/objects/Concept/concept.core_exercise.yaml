definition: 'Core exercises recruit one or more large muscle areas (i.e., chest, shoulder,
  back, hip, or thigh), involve two or more primary joints (multijoint exercises;
  e.g., split squat, bench press, bent-over row), and receive priority when one is
  selecting exercises because of their direct application to the sport and enhanced
  dynamic correspondence (i.e., transference of gym-based training to improved performance
  in athletic tasks).

