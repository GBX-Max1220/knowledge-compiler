definition: 'A product (other than tobacco) intended to supplement the diet that contains
  one or more of the following dietary ingredients: A vitamin, A mineral, An herb
  or other botanical, An amino acid, A dietary substance for use by humans to supplement
  the diet by increasing the total dietary intake, A concentrate, metabolite, constituent,
  extract, or combination of any ingredient listed above. The product must also be
  labeled as a dietary supplement, such that the label must include the term dietary
  supplement or equivalent and therefore cannot also be advertised for use as a conventional
  food or as the sole item within a meal or diet.

