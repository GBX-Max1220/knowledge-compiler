definition: 'Characterized by high-intensity, intermittent bouts of exercise, anaerobic
  training requires adenosine triphosphate (ATP) to be regenerated at a faster rate
  than can be produced by oxidative metabolism alone. Consequently, the energy requirement
  relies on a greater proportion of energy coming from non-oxidative energy systems,
  which include the phosphagen or creatine phosphate system and a smaller proportion
  coming from glycolysis. Thus, the term anaerobic training is used in this text to
  describe exercise training that is performed at intensities that rely primarily
  on non-oxidative metabolism to meet energy demands.

  '
