definition: 'The function of arteries is to rapidly transport blood pumped from the
  heart. Because blood pumped from the heart is under relatively high pressure, arteries
  have strong, muscular walls. Small branches of arteries called arterioles act as
  control vessels through which blood enters the capillaries. Arterioles play a major
  role in the regulation of blood flow to the capillaries. Arterioles have strong,
  muscular walls that are capable of closing the arteriole completely or allowing
  it to be dilated many times their size, thus vastly altering blood flow to the capillaries
  in response to the needs of the tissues (41).

  '
