definition: 'Two physiological mechanisms are responsible for the regulation of stroke
  volume. The first is a result of the end-diastolic volume, the volume of blood available
  to be pumped by the left ventricle at the end of the filling phase, or diastole.
  The second is due to the action of catecholamines, including epinephrine and norepinephrine,
  which are hormones of the sympathetic nervous system that produce a more forceful
  ventricular contraction and greater systolic emptying of the heart.

