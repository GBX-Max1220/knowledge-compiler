definition: 'Synephrine has been shown to stimulate peripheral α-1 receptors, resulting
  in vasoconstriction and elevations in blood pressure (31). However, other research
  has shown that when citrus aurantium is ingested alone, no effect on blood pressure
  is seen (103), but in combination with other herbal products it may cause significant
  elevations in systolic blood pressure (103). It should be noted that synephrine
  is currently on the National Collegiate Athletic Association’s banned list of performance-enhancing
  drugs.

  '
