definition: 'Vitamin E acts as an anticoagulant and therefore thins the blood. Regular
  intake of excessive amounts of vitamin E can lead to high serum vitamin E levels,
  which is associated with increased risk of hemorrhagic stroke, particularly in individuals
  on blood thinners (125).

