definition: 'Medical referral may be warranted for an athlete who persistently has
  any of the following symptoms: chest pressure, pain, or discomfort; listlessness;
  light-headedness; dizziness; confusion; headache; deeply reddened or cold and clammy
  skin; irregular pulse; bone or joint pain; blurred vision; nausea; or shortness
  of breath, rapid pulse, or weakness either not commensurate with the level of exertion
  or unresponsive to rest. Such symptoms can occur long after exercise is terminated.
  Even symptoms that occur only once, if severe (such as loss of consciousness), call
  for immediate medical attention.

  '
