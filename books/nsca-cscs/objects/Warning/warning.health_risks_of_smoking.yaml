definition: 'Smokers experience impairments in lung function and are at increased
  risk for chronic obstructive pulmonary diseases (104, 148) including chronic bronchitis
  (79) and emphysema (101). Decrements in exercise tolerance and cardiopulmonary function
  have been observed in teenagers (100), demonstrating that the harmful effects of
  smoking occur in even young smokers within a relatively short period of time.

