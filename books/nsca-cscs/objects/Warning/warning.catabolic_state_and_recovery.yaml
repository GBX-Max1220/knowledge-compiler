warning_text: 'A catabolic state is highly detrimental for an athlete, especially
  when cortisol levels remain chronically elevated. Combined with the presence of
  reactive oxygen species (free radicals) generated by the body''s inflammatory response,
  this condition significantly impairs recovery and hampers performance (77).

