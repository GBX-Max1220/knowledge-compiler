warning_text: 'Both RED-S and OTS can be interrelated since many causes and symptoms
  of each condition contribute to the other. Therefore, when the presence of RED-S
  is suspected, it is important to clearly discern how overtraining may be contributing
  to this problem. To adequately address the serious condition of RED-S, trained professionals
  need to be involved, but the strength and conditioning professional must be able
  to recognize when help of this type is needed.

