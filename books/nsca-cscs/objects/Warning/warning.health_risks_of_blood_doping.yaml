definition: 'The health risks associated with blood doping further complicate the
  controversy surrounding this practice. Theoretically, high hematocrit levels may
  increase risks for embolic events such as stroke, myocardial infarction, deep vein
  thrombosis, or pulmonary embolism. Increased arterial blood pressure, flu-like symptoms,
  and increased plasma potassium levels may present themselves with EPO use (139).
  Finally, there is risk associated with infusion or transfusion, although in most
  cases the risk is relatively small (139).

