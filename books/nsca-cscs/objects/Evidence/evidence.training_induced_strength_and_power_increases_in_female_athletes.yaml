definition: 'During progressive overload and targeted training, female athletes experience
  substantial power and strength increases similar to male athletes (64). In a recent
  study, maximal strength and vertical jump height were increased in collegiate volleyball
  players by using a combination of traditional resistance training exercises and
  weightlifting variations at various loads in addition to volleyball practice, over
  the course of about 2.5 years of training (88). Other research supports plyometrics
  in female basketball players and other velocity-based resistance training in cyclists
  to improve strength, power, and muscle hypertrophy (36, 119). It has also been reported
  that adding heavy strength training to a female athlete’s endurance training increased
  muscle strength, performance, and size without affecting endurance running performance
  or running economy (176).

