evidence_text: 'Hickson and colleagues (82) provide evidence that concurrent training
  that includes progressive endurance running and cycling and heavy resistance training
  may produce a plateau effect and, ultimately, a decrease in strength gains. Specifically,
  it was reported that the concurrent training program of heavy resistance training
  combined with an endurance program provided significant improvements in squat strength
  during the first seven weeks of the program, followed by a two-week plateau and
  then a decrease in squat strength during the final two weeks of the program.

