evidence_text: 'Gibala and coworkers (63) reported equivalent improvements in muscle
  buffering capacity and glycogen content for HIIT at 250% of V̇O2peak during four
  to six 30-second cycling sprints compared to continuous cycling for 90 to 120 minutes
  at 65% of V̇O2peak over six total training sessions. In addition, 750 kilojoules
  cycling time trials decreased in both groups by 10.1% and 7.5% in the HIIT and long,
  slow endurance training groups, respectively.

