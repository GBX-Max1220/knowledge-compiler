evidence_text: 'For example, three weeks of LGD-4033 (e.g., ligandrol) use has been
  shown to promote dose-dependent increases in lean body mass among healthy young
  and middle-aged men (15). As is often observed with oral androgen administration,
  these improvements in lean body mass were observed alongside a dose-dependent suppression
  of total testosterone, sex hormone–binding globulin (SHBG), high-density lipoprotein
  cholesterol (HDL-C), and triglycerides (15). Similarly, other SARMs such as GSK2881078
  and GTx-024 (enobosarm) have been shown to cause dose-dependent increases in lean
  mass and decreases in HDL-C, SHBG, and total testosterone, suggestive of significant
  androgen receptor agonism (43, 157), as well as decreased triglycerides, very-low-density
  lipoprotein, and apolipoprotein A1 (43).

  '
