TITLE
Principle of Training Reversibility

PAGE
379

SECTION
6.4 — Detraining

ORIGINAL TEXT
Detraining is governed by the principle of training reversibility, which states that whereas physical training results in several physiological adaptations that enhance athletic performance, stopping or markedly reducing training induces a partial or complete reversal of these adaptations, compromising athletic performance.

