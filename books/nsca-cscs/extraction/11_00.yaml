TYPE
Recommendation

TITLE
During-Event Hydration and Carbohydrate Recommendations

PAGE
623-624

SECTION
During-Event Nutrition

ORIGINAL TEXT
Proper hydration during competition is essential for performance while also helping to prevent overheating, dehydration, and heat illness. Athletes should hydrate several hours before exercise to allow for fluid absorption and urine output before competing. Additionally, they should consume enough fluid during exercise to prevent water weight losses exceeding 2% of body weight (120). The optimal sport drink contains 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% (2). Sport drinks with a higher concentration of carbohydrate—those that contain more than 8%—delay gastric emptying (how quickly the drink is emptied from the stomach), which could lead to stomach discomfort (87). Therefore, a carbohydrate concentration of 6% to 8% may be ideal (120).

END

