TYPE
Definition

TITLE
Basal Metabolic Rate (BMR)

PAGE
641

SECTION
Nutrition Strategies for Altering Body Composition

ORIGINAL TEXT
Basal metabolic rate (BMR) is by far the largest contributor to total energy expenditure, accounting for approximately 65% to 70% of daily energy expenditure (63, 114). It is a measure of the calories required for maintaining normal body functions such as respiration, blood circulation, and gastrointestinal and renal processing.

END

TYPE
Definition

TITLE
Resting Metabolic Rate (RMR)

PAGE
641

SECTION
Nutrition Strategies for Altering Body Composition

ORIGINAL TEXT
Resting metabolic rate (RMR) is often used instead of BMR due to the ease of measurement (an overnight fast is not required), yet it is 10% to 20% higher than BMR due to increased energy expenditure resulting from recent food intake or physical activity completed earlier in the day.

END

TYPE
Definition

TITLE
Thermic Effect of Food

PAGE
642

SECTION
Nutrition Strategies for Altering Body Composition

ORIGINAL TEXT
The thermic effect of food, also known as diet-induced thermogenesis, is the increase in energy expenditure above the RMR that can be measured for several hours following a meal. The thermic effect of food includes the energy cost of digestion, absorption, metabolism, and storage of food in the body. The thermic effect of food accounts for approximately 10% to 15% of total calories burned each day (63, 114).

END

