Relative Energy Deficiency in Sport (RED-S)

ORIGINAL TEXT
Relative energy deficiency in sport (RED-S) encompasses various physiological dysfunctions resulting from low energy availability (LEA), where an athlete's energy intake does not match the energy expended during exercise.

END

