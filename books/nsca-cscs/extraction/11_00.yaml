ORIGINAL TEXT
Any product that could result in consumption of 20 grams of mannitol must carry this warning on the label: "Excess consumption may have a laxative effect."

END

TYPE
Recommendation

TITLE
Precompetition Nutrition for Aerobic Endurance Athletes - General Guidelines

PAGE
617

SECTION
Aerobic Endurance Sports

ORIGINAL TEXT
Athletes should prehydrate, if necessary, several hours before exercise to allow for fluid absorption and urine output. Their urine specific gravity (USG) reading should be <1.02 (120). Athletes who tend to get nauseated easily, who have experienced diarrhea during competition, who get anxious or experience precompetition jitters, or who compete in high-intensity sports (jarring movements can increase the likelihood of stomach upset), as well as those who are competing in the heat, may want to consider eating at least 4 hours before competition, as well as trying a variety of types of low-fiber carbohydrate options. Aerobic endurance athletes who eat at least 4 hours before competition should include approximately 1 to 4 grams of carbohydrate per kilogram body weight and 0.15 to 0.25 grams of protein per kilogram body weight (131). If the precompetition meal is consumed 2 hours before exercise, athletes should aim for approximately 1 gram of carbohydrate per kilogram body weight. Athletes should follow an individualized hydration plan. During prolonged activity in hot weather, they should consume a sport drink containing 20 to 30 mEq of sodium (460-690 mg with chloride as the anion) per liter, 2 to 5 mEq of potassium (78-195 mg) per liter, and carbohydrate in a concentration of 5% to 10% (120). When consumed closer to the start of competition, the preexercise meal should be smaller. Additionally, liquid sources of carbohydrate may be preferable when the preexercise meal is 1 hour before the event because they are emptied from the stomach faster than solid food (7). Gels, gummies, and similar sources of carbohydrate are also digested very quickly.

END

