TITLE
Precompetition Meal Timing and Composition Guidelines

PAGE
614-615

SECTION
Precompetition Nutrition

ORIGINAL TEXT
All precompetition meals should take timing, meal and fluid composition, event or sport, and individual athlete preferences into account. In order to minimize the potential for stomach upset, smaller quantities of fluids and food should be consumed when the precompetition meal is consumed closer in temporal proximity to competition. Precompetition foods and beverages should be familiar to the athlete (i.e., tried in practice), low in fat and fiber so that they empty rapidly from the stomach and minimize any potential for gastrointestinal distress, and moderate in protein (protein promotes longer-lasting satiety and accelerates recovery) (7).

END

TYPE
Recommendation

TITLE
Minimizing Gastrointestinal Issues Before Competition

PAGE
615

SECTION
Minimizing Gastrointestinal Issues

ORIGINAL TEXT
To minimize the likelihood of stomach discomfort during competition, athletes should do the following: Try food in practice first. Always try new foods during several practice sessions before competition (7). When the meal is closer in time to the start of the game or event, consume smaller amounts of food and liquids. Avoid high-fat and high-fiber foods. Both fat and fiber slow down the rate of digestion. When food is still being digested as an athlete exercises, he or she may experience stomach cramps (7). Avoid sugar alcohols. Despite their name, sugar alcohols contain no alcohol, but their chemical structure resembles that of both sugar and alcohol. Sugar alcohols are a type of carbohydrate that is not completely absorbed in the gut. Consequently, consumption can cause gas, bloating, and cramping and may have a laxative effect. Sugar alcohols are found in some low-carbohydrate and sugar-free products, including sugar-free gum, toothpaste, and energy drinks. The two sugar alcohols most likely to cause gastrointestinal issues are sorbitol and mannitol (4). Any product that could result in consumption of 20 grams of mannitol must carry this warning on the label: "Excess consumption may have a laxative effect." Individual responses to sugar alcohol vary. Sugar alcohols include xylitol (the most common one found in dental products), erythritol, sorbitol, mannitol, maltitol, isomalt, lactitol, hydrogenated starch hydrolysates, and hydrogenated glucose syrups (4).

END

