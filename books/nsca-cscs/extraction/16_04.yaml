TYPE
Procedure

TITLE
Lying Barbell Triceps Extension — Starting Position (Athlete)

PAGE
1056

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lie in a supine position on a bench in the five-point body contact position.
Grasp the bar from the spotter with a closed, pronated grip about 12 inches (30 cm) wide.
Position the bar over the chest with the elbows fully extended and the arms parallel.
Point the elbows toward the knees (not out to the sides).
All repetitions begin from this position.

END

TYPE
Procedure

TITLE
Lying Barbell Triceps Extension — Starting Position (Spotter)

PAGE
1056

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Stand erect and very close to the head of the bench (but do not distract the athlete).
Place the feet shoulder-width apart in a staggered stance with the knees slightly flexed.
Grasp the bar with a closed, alternated grip.
Hand the bar to the athlete.
Guide the bar to a position over the athlete's chest.
Release the bar smoothly.

END

TYPE
Procedure

TITLE
Lying Barbell Triceps Extension — Downward Movement Phase (Athlete)

PAGE
1056

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Keeping the upper arms stationary, allow the elbows to slowly flex to lower the bar toward the face.
Keep the wrists stiff and the upper arms perpendicular to the floor and parallel to each other.
Lower the bar until it almost touches the head or face.
Maintain the five-point body contact position.

END

TYPE
Procedure

TITLE
Lying Barbell Triceps Extension — Downward Movement Phase (Spotter)

PAGE
1056

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Place the hands close to—but not touching—the bar as it descends.
Slightly flex the knees, hips, and torso and keep the back neutral when following the bar.

END

TYPE
Procedure

TITLE
Lying Barbell Triceps Extension — Upward Movement Phase (Athlete)

PAGE
1056-1057

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Push the bar upward by extending the elbows back to the starting position.
Keep the wrists stiff and the elbows pointed toward the knees.
Keep the upper arms parallel to each other and perpendicular to the floor.
Maintain the five-point body contact position.
At the end of the set, signal the spotter to take the bar.
Keep a grip on the bar until the spotter removes it.

END

TYPE
Procedure

TITLE
Lying Barbell Triceps Extension — Upward Movement Phase (Spotter)

PAGE
1057

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Keep the hands close to—but not touching—the bar as it ascends.
Slightly extend the knees, hips, and torso and keep the back neutral when following the bar.
At the athlete's signal after the set is completed, grasp the bar with an alternated grip, take it from the athlete, and set it on the floor.

END

TYPE
Procedure

TITLE
Triceps Pushdown (Machine) — Starting Position

PAGE
1058-1059

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Grasp the bar with a closed, pronated grip 6 to 12 inches (16-30 cm) wide.
Stand erect with feet shoulder-width apart, knees slightly flexed. Place the body close enough to the machine to allow the cable to hang straight down when it is held in the starting position.
Pull the bar down to position the upper arms against the sides of the torso.
Flex the elbows to position the forearms parallel to the floor or slightly above.
All repetitions begin from this position.

END

TYPE
Procedure

TITLE
Triceps Pushdown (Machine) — Downward Movement Phase

PAGE
1059

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Push the bar down until the elbows are fully extended.
Keep the torso erect and the upper arms stationary.
Do not forcefully lock out the elbows.

END

TYPE
Procedure

TITLE
Triceps Pushdown (Machine) — Upward Movement Phase

PAGE
1059

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Allow the elbows to slowly flex back to the starting position.
Keep the torso, arms, and knees in the same position.
At the end of the set, return the bar to its resting position.

END

TYPE
Procedure

TITLE
Push Press — Starting Position

PAGE
1061-1062

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Grasp the bar with a closed, pronated grip.
Grip should be slightly wider than shoulder-width (clean grip).
Step under the bar and position the feet hip-width apart and parallel to each other.
Move up to the bar to place it on top of the anterior deltoids and clavicles.
Extend the hips and knees to lift the bar off the supports.
Step back away from the supports and stand in the middle of the lifting platform.
Position the feet hip- to shoulder-width apart and even with each other, with the toes pointed slightly outward.
All repetitions begin from this position.

END

TYPE
Procedure

TITLE
Push Press — Preparation Phase: Dip

PAGE
1062

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Flex the hips and knees at a controlled speed to move the bar in a straight path downward.
Continue the dip to a depth not to exceed a quarter squat, the catch position of the power clean, or 10% of the athlete's height.
Keep the feet flat on the floor, the torso erect, and the elbows underneath or slightly ahead of the bar.

END

TYPE
Procedure

TITLE
Push Press — Upward Movement Phase: Drive

PAGE
1062

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Immediately on reaching the lowest position of the dip, reverse the movement by forcefully and quickly extending the hips, knees, and ankles and then the elbows to move the bar overhead.

END

TYPE
Procedure

TITLE
Push Press — Catch

PAGE
1062

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
After the hips and knees are fully extended and the bar is overhead from the drive phase, press it up the rest of the way until the elbows are fully extended.
In this position the torso is erect, the head is in a neutral position, the feet are flat on the floor, and the bar is slightly over or behind the ears.

END

TYPE
Procedure

TITLE
Push Press — Downward Movement Phase

PAGE
1062

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lower the bar by gradually reducing the muscular tension of the arms to allow a controlled descent of the bar to the shoulders.
Simultaneously flex the hips and knees to cushion the impact of the bar on the shoulders.
At the end of the set, step toward the rack and place the bar in the supports.

END

TYPE
Procedure

TITLE
Push Jerk — Starting Position

PAGE
1064-1065

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Grasp the bar with a closed, pronated grip.
Grip should be slightly wider than shoulder-width (clean grip).
Step under the bar and position the feet hip- to shoulder-width apart and parallel to each other.
Move close to the bar so that it is resting on the anterior deltoids and clavicles.
Extend the hips and knees to lift the bar out of the supports.
Step back away from the supports and stand in the middle of the lifting platform.
Position the feet hip-width apart or slightly wider with toes pointed straight ahead or slightly outward.
All repetitions begin from this position.

END

TYPE
Procedure

TITLE
Push Jerk — Preparation Phase: Dip

PAGE
1065

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Flex the hips and knees at a controlled speed to move the bar in a straight path downward.
Continue the dip to a depth not to exceed a quarter squat.
Keep the feet flat on the floor, the torso erect, and the elbows underneath or slightly ahead of the bar.

END

TYPE
Procedure

TITLE
Push Jerk — Upward Movement Phase: Drive

PAGE
1065

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Immediately on reaching the lowest position of the dip, reverse the movement by forcefully and quickly extending the hips, knees, and ankles, and then the elbows to move the bar overhead.

END

TYPE
Procedure

TITLE
Push Jerk — Catch

PAGE
1065-1066

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
After the hips and knees are fully extended and the bar is being driven overhead, quickly flex the hips and knees to a dipped position while simultaneously fully extending the elbows so that the bar is received overhead at the same moment that the bar reaches its highest position.
Catch the bar with the torso erect, the head in neutral position, feet flat on the floor, and the bar slightly behind the head, forming a straight line through the body.

END

TYPE
Procedure

TITLE
Push Jerk — Recovery Phase

PAGE
1066

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
After gaining control and balance, stand up by extending the hips and knees to a fully erect position with the feet flat on the floor.
Keep the elbows locked while the bar is stabilized overhead.

END

TYPE
Procedure

TITLE
Push Jerk — Downward Movement Phase

PAGE
1066

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lower the bar by gradually reducing the muscular tension of the arms to allow a controlled descent of the bar to the shoulders.
Simultaneously flex the hips and knees to cushion the impact of the bar on the shoulders.
At the end of the set, step toward the rack and place the bar in the supports.

END

TYPE
Procedure

TITLE
Power Clean (and Hang Power Clean Variation) — Starting Position

PAGE
1067-1068

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Stand with the feet placed between hip- and shoulder-width apart with the toes pointed slightly outward (based on comfort).
Squat down with the hips lower than the shoulders and grasp the bar evenly with a pronated grip and the shoulder directly above or slightly in front of the barbell. If a stronger grip is needed, use a hook grip.
Place the hands on the bar slightly wider than shoulder-width apart (this can vary depending on elbow and wrist mobility and the front rack—catch position), outside of the knees, with the elbows fully extended and pointing out to the side (i.e., arm is internally rotated and the shoulder is retracted).
Place the feet flat on the floor and position the bar approximately 1 inch (3 cm) in front of the shins and over the balls of the feet. The athlete's center of pressure on the floor should be around the bottom shoelace, toward the front of the mid-foot.
Position the body with the
back neutral or slightly arched,
scapulae depressed and retracted,
chest held up and out, strongly braced,
head in line with the vertebral column or slightly hyperextended,
shoulders over or slightly in front of the bar, and
eyes focused straight ahead or slightly upward.
All repetitions begin from this position.

END

TYPE
Procedure

TITLE
Power Clean (and Hang Power Clean Variation) — Upward Movement Phase: First Pull

PAGE
1068-1069

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lift the bar off the floor by forcefully extending the hips and knees, pushing into the floor
Keep the torso-to-floor angle constant; do not let the hips rise before the shoulders.
Maintain a neutral spine position.
Keep the elbows fully extended, pointing out to the side, and the shoulders over or slightly ahead of the bar.
As the bar rises, keep it as close to the shins as possible.
The first pull ends when knees are maximally extended, and the shins should be oriented vertically (or near vertical).

END

TYPE
Procedure

TITLE
Power Clean (and Hang Power Clean Variation) — Upward Movement Phase: Transition

PAGE
1069

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
As the bar rises just above the knees, extend the hips, while moving the knees forward and under the bar, to transition the athlete into the power position.
Maintain bar contact with the thighs.
Keep the back neutral or slightly arched and the elbows fully extended and pointing to the sides.

END

TYPE
Procedure

TITLE
Power Clean (and Hang Power Clean Variation) — Upward Movement Phase: Second Pull

PAGE
1070

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Rapidly extend the hips, knees, and ankles culminating with a shrug. (Note: It is important that the heels stay in contact with the floor for as long as possible in order to maximize force transference to the barbell.)
Keep the bar as close to the body as possible.
Keep the back neutral and the elbows pointing out to the sides.
Keep the shoulders over the bar and the elbows extended as long as possible.
When the lower body joints reach full extension, rapidly shrug the shoulders upward with the elbows still fully extended and pointing to the sides.
As the shoulders reach their highest elevation, flex the elbows to begin pulling the body under the bar.
Due to the explosive nature of this phase, the torso is erect or slightly hyperextended, the head may tilt slightly back, and the heels may lose contact with the floor.

END

TYPE
Procedure

TITLE
Power Clean (and Hang Power Clean Variation) — Upward Movement Phase: Catch

PAGE
1070-1071

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
After the hip and knee have fully extended, pull the body under the bar and rotate the arms around and under the bar.
Simultaneously, flex the hips and knees to a quarter-squat position.
Once the arms are under the bar, lift the elbows to position the upper arms parallel to the floor.
Rack the bar across the front of the clavicles and anterior deltoids.
Catch the bar with a nearly erect torso, the shoulders slightly ahead of the hips, a neutral head position, and flat feet.
After gaining control and balance, stand up by extending the hips and knees to a fully erect position.

END

TYPE
Procedure

TITLE
Power Clean (and Hang Power Clean Variation) — Downward Movement Phase

PAGE
1071

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lower the elbows to unrack the bar from the anterior deltoids and clavicles, then slowly lower the bar down to the thighs.
Simultaneously flex the hips and knees to cushion the impact of the bar on the thighs.
Squat down with the elbows fully extended until the bar touches the floor or drop the bar to the platform if rubber bumper plates are being used.

END

TYPE
Procedure

TITLE
Power Snatch (and Hang Power Snatch Variation) — Starting Position

PAGE
1072-1073

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Stand with the feet placed between hip- and shoulder-width apart with the toes pointed slightly outward.
Squat down with the hips lower than the shoulders and grasp the bar evenly with a pronated grip. If a stronger grip is needed, use a hook grip.
The grip width is wider than for other exercises; a way to estimate it is to measure and use one of these distances for spacing the hands: the distance from the edge of the clenched fist of one hand to the opposite shoulder when the arm is straight out at the side, or the elbow-to-elbow distance when the arms are straight out at the side.
Extend the elbows fully and point them out to the side (i.e., arm is internally rotated, and the shoulder is retracted).
Place the feet flat on the floor and position the bar approximately 1 inch (3 cm) in front of the shins and over the balls of the feet.
Position the body with the
back neutral or slightly arched,
scapulae depressed and retracted,
chest held up and out,
head in line with the vertebral column or slightly hyperextended,
feet flat on the floor,
shoulders over or slightly in front of the bar, and
eyes focused straight ahead or slightly upward.
All repetitions begin from this position.

END

TYPE
Procedure

TITLE
Power Snatch (and Hang Power Snatch Variation) — Upward Movement Phase: First Pull

PAGE
1073-1074

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lift the bar off the floor by forcefully extending the hips and knees.
Keep the torso-to-floor angle constant; do not let the hips rise before the shoulders.
Maintain the neutral spine position.
Keep the elbows fully extended, pointing out to the side, and the shoulders over or slightly ahead of the bar.
As the bar is raised, keep it as close to the shins as possible.

END

TYPE
Procedure

TITLE
Power Snatch (and Hang Power Snatch Variation) — Upward Movement Phase: Transition

PAGE
1074

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
As the bar rises just above the knees, extend the hips while moving the knees forward and under the bar (the "power position").
Maintain bar contact with the thighs.
Keep the back neutral or slightly arched and the elbows fully extended and pointing to the sides.

END

TYPE
Procedure

TITLE
Power Snatch (and Hang Power Snatch Variation) — Upward Movement Phase: Second Pull

PAGE
1074-1075

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Rapidly extend the hips, knees, and ankles moving into an aggressive shrug.
Keep the bar close to the body, the back neutral, and the elbows pointing out to the sides.
Keep the shoulders over the bar and the elbows extended as long as possible.
When the lower body joints reach full extension, rapidly shrug the shoulders with the elbows still fully extended and pointing to the sides.
As the shoulders reach their highest elevation, flex the elbows to begin pulling the body under the bar.
Due to the explosive nature of this phase, the torso is erect or slightly hyperextended, the head may tilt slightly back, and the heels may lose contact with the floor.

END

TYPE
Procedure

TITLE
Power Snatch (and Hang Power Snatch Variation) — Upward Movement Phase: Catch

PAGE
1075

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
After the lower body has fully extended, pull the body under the bar and rotate the hands around and under the bar.
Simultaneously, flex the hips and knees to a quarter-squat position.
Once the body is under the bar, catch the bar over and slightly behind the ears with fully extended elbows, an erect and stable torso, a neutral head position, flat feet, and the body's weight over the middle of the feet.
After gaining control and balance, stand up by extending the hips and knees to a fully erect position and stabilize the bar overhead.

END

TYPE
Procedure

TITLE
Power Snatch (and Hang Power Snatch Variation) — Downward Movement Phase

PAGE
1075-1076

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Lower the bar from the overhead position by gradually reducing the muscular tension of the shoulders to allow a controlled descent of the bar to the thighs.
Simultaneously flex the hips and knees to cushion the impact of the bar on the thighs.
Squat down with the elbows fully extended until the bar touches the floor or drop the bar to the platform if rubber bumper plates are being used.

END

TYPE
Procedure

TITLE
Clean Grip Mid-Thigh Pull (and Snatch Grip Variation) — Starting Position

PAGE
1077-1078

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
The power position is the starting position for the clean grip mid-thigh pull (and snatch grip mid-thigh pull).
Stand with the feet placed between hip- and shoulder width apart with the toes pointed slightly outward.
Grasp the bar with a clean grip (i.e., slightly wider than shoulder-width apart) while using lifting straps with the elbows fully extended and pointing outward (i.e., arms internally rotated and the shoulder retracted). (If performing this exercise with a snatch grip, grasp the bar with a wider grip based on the grip established for the power snatch.)
Move into a position where the trunk is in an upright position and there is a slight knee flex; the shoulder is above or slightly behind the barbell and slack is removed from the body.

END

TYPE
Procedure

TITLE
Clean Grip Mid-Thigh Pull (and Snatch Grip Variation) — Upward Movement Phase

PAGE
1078

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Rapidly extend the knees, hips, and ankles, (Note: it is important that the heels stay in contact with the floor for as long as possible in order to maximize force transference to the barbell.)
Keep the bar as close to the body as possible.
Keep the back neutral and the elbows pointing out to the sides.
Keep the shoulders over the bar and the elbows extended as long as possible.
When the lower body joints reach full extension, rapidly shrug the shoulders upwards with the elbows still fully extended and pointing to the sides.

END

TYPE
Procedure

TITLE
Clean Grip Mid-Thigh Pull (and Snatch Grip Variation) — Downward Movement Phase

PAGE
1078-1079

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
In a controlled manner while maintaining an upright trunk position lower the barbell back to the starting position.
While lowering the barbell it is important that the trunk remains rigid (i.e., in a neutral spine position).
Avoid bouncing the barbell off the blocks.

END

TYPE
Procedure

TITLE
Clean Pull from Knee-Block (and Snatch Grip Variation) — Starting Position

PAGE
1080-1081

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Position the blocks so that the loaded barbell is at a height that corresponds to the athlete's patellar tendon.
Stand with the feet placed between hip- to shoulder-width apart with the toes pointed slightly outward.
Grasp the bar with a clean grip (i.e., slightly wider than shoulder-width apart) while using lifting straps with the elbows fully extended and pointing outward (i.e., arms internally rotated and the shoulder retracted). (If performing this exercise with a snatch grip grasp the bar with a wider grip based upon the grip established for the power snatch.)
Hold the back in a normal lordotic position while slightly flexing the knees and flexing at the hip so that the shoulder is in front of the bar.
Ensure that the shins are perpendicular to the ground and the weight is centered between the feet.

END

TYPE
Procedure

TITLE
Clean Pull from Knee-Block (and Snatch Grip Variation) — Upward Movement Phase: Transition

PAGE
1081-1082

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
As the bar rises just above the knees, extend the hips, while moving the knees forward and under the bar, to transition the athlete into the power position.
Maintain bar contact with the thighs.
Keep the back neutral or slightly arched and the elbows fully extended and pointing to the sides.

END

TYPE
Procedure

TITLE
Clean Pull from Knee-Block (and Snatch Grip Variation) — Upward Movement Phase: Second Pull

PAGE
1082-1083

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Rapidly extend the hips, knees, and ankles, culminating with a shrug. (Note: It is important that the heels stay in contact with the floor for as long as possible in order to maximize force transference to the barbell.)
Keep the bar as close to the body as possible.
Keep the back neutral and the elbows pointing out to the sides.
Keep the shoulders over the bar and the elbows extended as long as possible.
When the lower body joints reach full extension, rapidly shrug the shoulders upward with the elbows still fully extended and pointing to the sides.
As the shoulders reach their highest elevation, flex the elbows to begin pulling the body under the bar.
Due to the explosive nature of this phase, the torso is erect or slightly hyperextended, the head may tilt slightly back, and the heels may lose contact with the floor.

END

TYPE
Procedure

TITLE
Clean Pull from Knee-Block (and Snatch Grip Variation) — Downward Movement Phase

PAGE
1083

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
Flex at the knee and hip while lowering the barbell to the blocks.
Maintain a neutral back and ensure the elbows are pointing to the sides.
Avoid bouncing the barbell off the blocks.

END

TYPE
Definition

TITLE
Power Exercises

PAGE
1060

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
This exercise consists of quickly and forcefully pushing the bar from the shoulders to over the head. Although the ascent consists of two phases, the upward movement of the bar occurs in one continuous motion without interruption. Both the push press and the push jerk exercises involve a rapid hip and knee extension that accelerates the bar off the shoulders, followed immediately by movements that position the bar overhead. The technique used to attain this final bar position varies, however. In the push press, the hip and knee extension thrust is only forceful enough to drive the bar one-half to two-thirds the distance overhead. From this height, the bar is pressed out to the overhead position, with the hips and knees remaining fully extended after the thrust.

END

TYPE
Definition

TITLE
Power Clean (and Hang Power Clean Variation)

PAGE
1067

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
This exercise consists of quickly and forcefully pulling the bar from the floor to a catching position on the front of the shoulders—all in one movement. Although the lift consists of four phases (i.e., first pull, transition, second pull, and catch) the upward movement of the bar occurs in one continuous motion without interruption. While the power clean is commonly performed by taking the barbell from the floor, it can also be performed from a hang position (i.e., at the power position or a position above or below the knee). When a hang power clean is performed, the bar is not returned to the floor or blocks between repetitions.

END

TYPE
Definition

TITLE
Power Snatch (and Hang Power Snatch Variation)

PAGE
1072

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
This exercise consists of quickly and forcefully pulling the bar from the floor to a position overhead with the elbows fully extended. Although the ascent consists of four phases (i.e., first pull, transition, second pull, and catch), the upward movement of the bar occurs in one continuous motion. While the power snatch can be initiated from the floor, it can also be initiated from a hang position (i.e., power position or slightly above or below the knee). When a hang power snatch is performed it is important to note that the bar is not returned to the floor or rack between repetitions. Regardless of where the power clean is initiated from, the bar is received in a position where the top of the thighs are above parallel.

END

TYPE
Definition

TITLE
Clean Grip Mid-Thigh Pull (and Snatch Grip Variation)

PAGE
1077

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
The performance of the mid-thigh pull with the clean or snatch grip requires the use of lifting blocks or a rack that allows the loaded barbell to be positioned so that the athlete initiates the movement from the power position (i.e., second pull position, knee angle ~125-145 degrees and hip angle ~140-150 degrees). When using the clean grip, the bar will generally be positioned across the upper thigh, depending on the athlete's individual anthropometrics (i.e., arm length). If the snatch grip is used, the bar will generally be higher on the thigh and in most instances sit across the hip crease as a result of the wider grip. To accommodate the wider grip used during the snatch grip mid-thigh pull, the loaded bar will need to be placed on higher blocks (or rack position) than what is used with the clean grip mid-thigh pull. While there are differences in the placement of the barbell between the clean and snatch grip variants of this lift the fundamental movement patterns associated with performing the mid-thigh pull are the same regardless of which grip is used.

END

TYPE
Definition

TITLE
Clean Pull from Knee-Block (and Snatch Grip Variation)

PAGE
1080

SECTION
16.4 — Spotting Techniques

ORIGINAL TEXT
The clean pull from the knee-block (and snatch grip variation) is an exercise that is performed from a position that corresponds to the end of the first pull during the performance of the power clean (or power snatch). The start position corresponds to the end of the downward movement of the RDL exercise.

END

