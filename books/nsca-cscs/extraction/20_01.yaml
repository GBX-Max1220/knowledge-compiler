SIDE-TO-SIDE PUSH-OFF
Intensity level: Medium
Direction: Vertical
Equipment: Plyometric box, 10 to 18 inches (25-46 cm) high
Starting position: Stand to one side of the plyometric box with one foot on the ground and one foot on the box. The inside of the foot on the box should be near the box's closest edge.
Arm action: Double arm
Preparatory movement: None
Upward movement: Jump up and over the box using the foot on the box to push off.
Downward movement: Land with the opposite foot on the opposite side of the top of the box; this foot should land just before the ground foot. Immediately repeat the movement to the opposite side.
COMMON ERRORS
Not producing sufficient vertical force from the front foot
Poor coordination or strength deficiencies, which mean that peak height of the center of mass does not occur at the same time as maximal extension of the lower limbs and flexion in the shoulders

