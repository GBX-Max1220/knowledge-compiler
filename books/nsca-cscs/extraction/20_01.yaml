ORIGINAL TEXT
LATERAL PUSH-OFF
Intensity level: Low
Direction: Vertical
Equipment: Plyometric box, 10 to 18 inches (25-46 cm) high
Starting position: Stand to one side of the plyometric box with one foot on the ground and one foot on the box. The inside of the foot on the box should be near the box's closest edge.
Arm action: Double arm
Preparatory movement: None or slightly lift the foot off the box.
Upward movement: Jump up using the foot on the box to push off.
Downward movement: Land with the same foot on the box; this foot should land just before the ground foot. Immediately repeat the movement.
COMMON ERRORS
Not producing sufficient vertical force from the front foot
Poor coordination or strength deficiencies, which means that peak height of the center of mass does not occur at the same time as maximal extension of the lower limbs and flexion in the shoulders

END

