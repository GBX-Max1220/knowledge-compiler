ORIGINAL TEXT
ALTERNATING-LEG PUSH-OFF
Intensity level: Low
Direction: Vertical
Equipment: Plyometric box, 6 to 18 inches (15-46 cm) high
Starting position: Stand facing the plyometric box with one foot on the ground and one foot on the box. The heel of the foot on the box should be near the box's closest edge.
Arm action: Double arm
Preparatory movement: Lift the front foot slightly so that it can be driven down into the box.
Upward movement: Drive the front foot down into the box to cause an upward jumping action.
Downward movement: Land with the opposite foot on the box; this foot should land just before the ground foot. Immediately repeat the movement, reversing the feet each repetition.
COMMON ERRORS
Not creating sufficient vertical force to enable the switch of legs to occur above the box
Asynchronous actions between the front leg and back leg, which means that the high knee position at the end of the jump does not occur at the point of maximum height or leg extension; this results in poor landing positions that prolong ground contact times for the next jump

END

