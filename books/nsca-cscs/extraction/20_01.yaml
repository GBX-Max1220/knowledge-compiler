ORIGINAL TEXT
DOUBLE-ARM LINEAR BOUND
Intensity level: Medium
Direction: Horizontal and vertical
Starting position: Get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Jog at a comfortable pace; begin the drill with the right foot forward.
Upward movement: Push off with the right foot as it contacts the ground. During push-off, bring the left leg forward by flexing the thigh to a position approximately parallel with the ground, the knee at 90 degrees, and the ankle dorsiflexed. During this flight phase of the drill, reach forward with both arms. Sequence the arm swing so that they come forward from behind the body into landing, and forward from the hips to reach in front of the body during takeoff.
Downward movement: Land with an active flat-foot on the left leg and immediately repeat the sequence on the opposite side.
Note: A bound is an exaggeration of the running gait; the goal is to cover as great a distance as possible during each stride.
COMMON ERRORS
Not achieving sufficient horizontal velocity to initiate the driving action of the bound
Coordination errors between arm and leg action; both arms should be forward as the athlete takes off and behind as the athlete lands
Overreaching with the lead leg

END

TYPE
Procedure

TITLE
Drop Step to Lateral Bound and Return

PAGE
1342-1343

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
DROP STEP TO LATERAL BOUND AND RETURN
Intensity level: High
Direction: Lateral and vertical
Equipment: Plyometric box, 6 to 18 inches (15-46 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: None
Preparatory movement: Step from the box with the right foot, ankles dorsiflexed.
Downward movement: Land on the ground with active flat foot contact in the right foot.
Upward movement: Immediately push up and sideways toward the left. Land on the left foot and immediately push back toward the right. Land on the right foot in front of the box and immediately stabilize the landing, with hips and knees aligned with toes.
Note: The trunk orientation should change in the flight so that the athlete is leaning toward the intended direction of travel into the landing.
COMMON ERRORS
Not orienting the body in landing to facilitate optimal lateral takeoff
Absorbing the landing force through excessive hip and knee flexion, prolonging the ground contact time
Crossing the foot of the non-landing leg behind the landing leg

END

TYPE
Procedure

TITLE
Single-Leg Push-Off

PAGE
1344

SECTION
