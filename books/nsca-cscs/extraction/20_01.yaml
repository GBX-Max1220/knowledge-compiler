TYPE
Procedure

TITLE
Box Jump

PAGE
1351-1352

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
BOX JUMP
Intensity level: Low
Direction: Vertical and slightly horizontal
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Facing the plyometric box, get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Forcefully triple extend to jump onto the top of the box using both legs.
Downward movement: Land on both feet in a half-squat position, step down from the box, and repeat.
Note: The arm action contributes significantly to the upward momentum of this jump. By having athletes perform the movement with their hands on their hips, or their fingers interlocked behind the head and elbows pointing sideways, the lower body power required to perform the jump can be significantly increased.
COMMON ERRORS
Focusing on landing on the box and flexing hips and knees early, thus reducing vertical power; the aim should be to land on the box because of powerful extension into the ground, maximizing the forward and upward movement of the body
Not coordinating arm actions with the forward movement of the body; powerful shoulder flexion should be simultaneous with the lower body jumping action

END

TYPE
Procedure

TITLE
Box Hop

PAGE
1353

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
BOX HOP
Intensity level: Low
Direction: Vertical and slightly horizontal
Equipment: Plyometric box, 6 to 42 inches (15-107 cm) high
Starting position: Facing the plyometric box, get into a comfortable, upright stance on one foot. The non-jumping leg is held in a stationary position with the hip and knee flexed during the exercise.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Forcefully triple extend and hop onto the top of the box.
Downward movement: Land on the same foot in a triple flexion position (hip, knee, and ankle flexed and stable), step down from the box, and repeat.
Note: Although significant force may be required to hop onto boxes in excess of 30 inches (76 cm), this is a low-intensity drill because the athlete is accelerating against gravity and lands with less force than his or her body weight because of this.
COMMON ERRORS
Focusing on landing on the box and flexing hips and knees early, thus reducing vertical power; the aim should be to land on the box because of powerful extension into the ground, maximizing the forward and upward movement of the body
Not coordinating arm actions with the forward movement of the body; powerful shoulder flexion should be simultaneous with the lower body jumping action

END

TYPE
Procedure

TITLE
Lateral Box Jump

PAGE
1354

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
LATERAL BOX JUMP
Intensity level: Medium
Direction: Vertical and slightly horizontal
Equipment: Plyometric box, 6 to 42 inches (15-107 cm) high
Starting position: Stand to one side of the plyometric box; get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Jump onto the top of the box using both legs.
Downward movement: Land on both feet in a half-squat position and jump down, landing with an active flat-foot contact and optimal ground contact to enable the jump to be repeated in the opposite direction.
Note: If the athlete steps down rather than jumps down from the box, the drill would be classified as a low-intensity ballistic exercise. Also, this drill can be made into a low-intensity ballistic drill by stepping down off the box and jumping up and laterally only.
COMMON ERRORS
Focusing on landing on the box and flexing hips and knees early, thus reducing vertical power; the aim should be to land on the box because of powerful extension into the ground (and flexion of the shoulders), maximizing the forward and upward movement of the body
Not leaning into the jump; bringing the center of mass outside the base of support in the frontal plane will assist the lateral action of the jump

END

TYPE
Procedure

TITLE
Drop Freeze

PAGE
1355-1356

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
DROP FREEZE
Intensity level: Low
Direction: Vertical
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: None
Preparatory movement: Step from the box.
Downward movement: Land flat footed on the ground with both feet, quickly absorbing the impact on landing. Ensure the hips, knees, and toes align, with the trunk vertical. Step back onto the box and repeat.
Note: This drill teaches joint alignment and landing mechanics and is often the first drill used in plyometric teaching and rehabilitation progressions. Also, this can also be performed as a single-leg landing drill.
COMMON ERRORS
Absorbing ground reaction forces while landing through hip and knee flexion, rather than landing and instantaneously holding position to develop load tolerance
Losing the knee alignment with the toes when landing in a knee valgus position, potentially compromising the knee joint

END

TYPE
Procedure

TITLE
Depth Jump

PAGE
1357-1358

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
DEPTH JUMP
Intensity level: High
Direction: Vertical
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles and land on the ground with an active flat-foot contact with both feet.
Upward movement: On landing, immediately jump up as high as possible.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum; there is an optimal relationship between ground contact time and resultant vertical force production. On landing, emphasis should be on jumping up, with minimal horizontal movement (less than what is shown in the third photo).
COMMON ERRORS
Absorbing ground reaction force as the athlete lands through hip and knee flexion, which increases the amortization phase and ground contact time; hips, knees, and ankles should be stiff when landing to optimize the ground contact time and rebound jump height
Not dorsiflexing the ankle in preparation for ground contact; this negates the active flat-foot contact and increases ground contact time

END

TYPE
Procedure

TITLE
Depth Jump to Box Jump

PAGE
1359-1360

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
DEPTH JUMP TO BOX JUMP
Intensity level: High
Direction: Vertical and horizontal
Equipment: Two plyometric boxes, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box, facing the second box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles in flight in preparation for an active flat-foot landing with both feet.
Upward movement: On landing, immediately jump onto the second box.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum; there is an optimal relationship between ground contact time and resultant vertical force production. Also, the distance between boxes depends on experience and ability; the greater the distance between boxes, the higher the intensity of the jump. Begin with the boxes placed 24 inches (61 cm) apart.
COMMON ERRORS
Absorbing ground reaction force as the athlete lands through hip and knee flexion, which increases the amortization phase and ground contact time; hips, knees, and ankles should be stiff when landing to optimize the ground contact time and rebound jump height
Not dorsiflexing the ankle in preparation for ground contact; this negates active flat-foot contact and increases ground contact time

END

TYPE
Procedure

TITLE
Depth Jump into Directional Sprint

PAGE
1361-1362

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
DEPTH JUMP INTO DIRECTIONAL SPRINT
Intensity level: High
Direction: Vertical and lateral
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high; a partner
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing with both feet. Have a partner point to the right or left just before landing.
Upward movement: On landing, immediately sprint in the direction determined by the partner.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum.
COMMON ERRORS
The athlete prioritizing the sprint over landing mechanics, leading to poor alignment on landing
The partner signaling which direction to sprint too late for the athlete to prepare for landing and a reactionary sprint; body lean and weight distribution between the inside and outside of the feet are important considerations for successful sprints from landing

END

TYPE
Procedure

TITLE
Depth Jump to Long Jump

PAGE
1363-1364

SECTION
Chapter 20: Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
DEPTH JUMP TO LONG JUMP
Intensity level: High
Direction: Vertical and horizontal
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles in preparation for a flat-foot landing on both feet.
Upward movement: On landing, immediately jump forward as far as possible with both feet.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum; there is an optimal relationship between ground contact and resultant horizontal projection.
COMMON ERRORS
Not achieving an optimal forward-leaning angle through landing (i.e., too vertical and the ground contact time is increased or horizontal distance is lost, whereas leaning too far forward reduces the ground reaction force applied)
Not pushing maximally into the ground to optimize the lower limb push for horizontal distance

END

