TITLE
Sex-Related Differences in Power Output

PAGE
459–460

SECTION
8.3 — Resistance Training Considerations

ORIGINAL TEXT
Sex-related differences in power output are similar to those for muscular strength. Measurements comparing power outputs of female athletes relative to lean body mass were reported to be similar for lower body power and still presented differences for upper body power when compared to male athletes (10, 61). Although the data are equivocal, sex-related differences in the rate of force development (147, 148) and the recruitment differences in muscle activation where females express lower levels of type IIa fibers’ percent of myosin heavy chain isoform content (138, 139) could partly explain these findings.

