TYPE
Evidence

TITLE
Interval Training Increases Distance at Higher Intensities

PAGE
215

SECTION
Interval Training

ORIGINAL TEXT
An early paper by Christensen and colleagues (31) compared the total running distance, average oxygen uptake, and blood lactate concentration during continuous running for 5 minutes and interval running totaling 30 minutes with 2:1, 1:1, and 1:2 work-to-rest ratios. Subjects were assigned a continuous running intensity (speed) that would result in fatigue within 5 minutes. At that fast pace during the continuous run, the subjects were able to complete 0.81 miles (1.3 km) before exhaustion. However, by using 2:1, 1:1, and 1:2 work-to-rest ratios and the same running intensity for a total duration of 30 minutes, the subjects were able to complete 4.14 miles (6.66 km), 3.11 miles (5 km), and 2.07 miles (3.33 km), respectively, all while working aerobic capacity in a manner similar to that in the continuous running condition.

END

TYPE
Evidence

TITLE
HIIT Improves Muscle Buffering Capacity and Glycogen Content

PAGE
219

SECTION
High-Intensity Interval Training

ORIGINAL TEXT
Gibala and coworkers (63) reported equivalent improvements in muscle buffering capacity and glycogen content for HIIT at 250% of V̇O2peak during four to six 30-second cycling sprints compared to continuous cycling for 90 to 120 minutes at 65% of V̇O2peak over six total training sessions.

END

TYPE
Evidence

TITLE
Concurrent Training May Inhibit Strength Gains

PAGE
221

SECTION
Combining Training Modalities

ORIGINAL TEXT
Hickson and colleagues (82) provide evidence that concurrent training that includes progressive endurance running and cycling and heavy resistance training may produce a plateau effect and, ultimately, a decrease in strength gains. Specifically, it was reported that the concurrent training program of heavy resistance training combined with an endurance program provided significant improvements in squat strength during the first seven weeks of the program, followed by a two-week plateau and then a decrease in squat strength during the final two weeks of the program.

END

TYPE
Evidence

TITLE
Concurrent Training Improves Performance in Highly Trained Runners

PAGE
221

SECTION
Combining Training Modalities

ORIGINAL TEXT
Sedano and colleagues (134) reported improvements in performance of highly trained runners as a result of concurrent endurance, resistance, and plyometric training. There was no reduction in V̇O2max over the 12 weeks in runners who participated in resistance and plyometric training. Furthermore, the concurrent training improved performance measures such as maximal strength, peak running velocity, and 3-kilometer (1.7 miles) time trial compared to endurance training alone.

END

TYPE
Evidence

TITLE
Endurance Training Increases Oxidative Capacity in Younger and Older Resistance-Trained Men

PAGE
207

SECTION
Similar Response in Younger and Older Resistance-Trained Male Muscle Oxidative Capacity Following Endurance Training

ORIGINAL TEXT
Hendrickse and colleagues (77) tested the hypothesis that superimposing endurance training in both older and younger highly resistance-trained men would lead to an increase in fiber oxidative capacity and a decrease in fiber size. Eight highly resistance-trained younger (mean age = 28 years) and seven older (mean age = 67 years) men participated in a 10-week cycle endurance-training program consisting of five 6-minute intervals at 75% max heart rate (HRmax) separated by 4-minute intervals at 90% HRmax, superimposed on their usual resistance training program of at least 4 sessions per week (2 upper body, 2 lower body). Before and after the 10 weeks of training, V̇O2max, body fat percentage, an MRI of the upper leg, the maximal voluntary isometric contraction torque (MVC) of the knee extensor muscles, and a vastus lateralis muscle biopsy were taken. While there were expected differences in anatomical cross-sectional area of the thigh muscles, following training no relative difference was observed between younger and older men for V̇O2max per kilogram body mass. The imposed endurance training equally increased the succinate dehydrogenase (a Krebs cycle enzyme) activity in both younger and older participants and significantly increased the number of capillaries around type I fibers.

END

