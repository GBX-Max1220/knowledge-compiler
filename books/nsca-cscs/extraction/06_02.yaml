High Environmental Temperature and Humidity as Risk Factors for Performance Impairment

PAGE
364

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
high environmental temperatures and humidity cause significant alterations to heart rate, oxygen uptake, minute ventilation, and blood lactate responses and, ultimately, performance due to interactions between the environmental conditions and an athlete's thermoregulatory systems (117).

END

