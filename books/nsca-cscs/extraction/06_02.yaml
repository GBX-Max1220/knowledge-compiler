TYPE
Definition

TITLE
Aerobic Power (Maximal Oxygen Uptake)

PAGE
356

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Aerobic power (maximal oxygen uptake). Arguably the most significant change in physiological variables with aerobic exercise training is an increase in maximal oxygen uptake (V̇O2max), the criterion index of cardiovascular fitness. The V̇O2max is determined in part by genetics and by the training program undertaken by the athlete.

END

TYPE
Definition

TITLE
Lactate Threshold

PAGE
356

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Lactate threshold. Aerobic training increases the absolute lactate threshold, allowing the highly trained individual to work at both a higher relative and absolute percentage of his or her V̇O2max than a less-trained individual.

END

TYPE
Definition

TITLE
Effective Use of Substrate

PAGE
356

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Effective use of substrate. Carbohydrates are the preferred source of fuel for high-intensity intermittent exercise in many team sports. Aerobic exercise training results in a greater use of fat as a substrate for exercise with a relative sparing of carbohydrate.

END

TYPE
Definition

TITLE
Exercise Economy

PAGE
356-357

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Exercise economy. The economy of exercise is mostly a function of biomechanics and technique, which are influenced by the athlete's metabolic, cardiovascular, and neuromuscular efficiency and training (7).

END

TYPE
Definition

TITLE
Repeated Sprint-Sequence Interval Session

PAGE
357

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
A repeated sprint-sequence interval session can generally be defined as at least two short bouts of ≥10 seconds with a short recovery period of ≤60 seconds; however, this will depend on the athletes' goals (50).

END

TYPE
Definition

TITLE
Altitude Acclimatization — Acute Adjustments

PAGE
360

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
At elevations greater than 3,900 feet (1,189 m), acute physiological adjustments begin to occur to compensate for the reduced partial pressure of oxygen in the atmosphere (61).

END

TYPE
Definition

TITLE
Heat Acclimatization

PAGE
365

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Repeated exposure over a long period of time (often referred to as natural exposure) to a hot environment can result in thermoregulatory and physiological adaptations referred to as heat acclimatization, which can improve an athlete's heat tolerance (10).

END

TYPE
Definition

TITLE
Heat Acclimation

PAGE
365

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
An athlete can undertake heat acclimation protocols (often referred to as artificial exposure) to expose the body to such hot environments, thereby raising core and skin temperatures and increase sweating to elicit the same adaptations (124).

END

TYPE
Threshold

TITLE
Altitude Threshold for Acute Physiological Adjustments

PAGE
360

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
At elevations greater than 3,900 feet (1,189 m), acute physiological adjustments begin to occur to compensate for the reduced partial pressure of oxygen in the atmosphere (61).

END

TYPE
Threshold

TITLE
Altitude Threshold for Decreased Maximal Oxygen Uptake and Aerobic Performance

PAGE
362-363

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
arterial oxygen saturation decreases and results in decreases in maximal oxygen uptake and aerobic performance at altitudes above 3,900 feet (1,189 m).

END

TYPE
Threshold

TITLE
Moderate Altitude Adaptation Period

PAGE
363

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
A minimum of three to six weeks is needed to adapt at moderate altitude (2,200 to 3,000 ft [608 to 914 m]).

END

TYPE
Threshold

TITLE
Heat Acclimation Adaptation Rate — 75% Within First Four to Six Days

PAGE
367

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
the majority of the adaptations (~75%) reported to occur within the first four to six days (121).

END

TYPE
Threshold

TITLE
Heat Acclimation Decay Rate — 2.5% Loss Per Day

PAGE
367

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
for every day that passes without exposure to the heat, there is a 2.5% loss of adaptations (28).

END

TYPE
Threshold

TITLE
Full Heat Acclimation Adaptation Loss Period

PAGE
368

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Typically, full heat acclimation adaptations are expected to be lost after a month if there is no repeated exercise heat stress (128).

END

TYPE
Evidence

TITLE
V̇O2max Increase in Elite vs. Untrained Individuals

PAGE
356

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Elite athletes may show minor changes in V̇O2max with training (5%-10%), while untrained individuals may increase V̇O2max by as much as 20% (67, 75).

END

TYPE
Evidence

TITLE
Lactate Threshold Example — Performance Impact

PAGE
356

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Two individuals can have the same V̇O2max, perhaps 50 mL · kg−1 · min−1; however, if one has a lactate threshold of 80% of V̇O2max (i.e., threshold occurs at 40 mL · kg−1 · min−1) whereas the other's occurs at 70% (i.e., 35 mL · kg−1 · min−1), the first individual will be able to maintain a power output equivalent to 5 mL · kg−1· min−1 higher than the second individual.

END

TYPE
Evidence

TITLE
Muscle Fiber Type Shift with Aerobic Endurance Training

PAGE
356

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Research indicates that after a period of aerobic endurance training such as marathon training, there is a shift toward type I fibers associated with the higher volume of aerobic endurance training.

END

TYPE
Evidence

TITLE
Aerobic Power Improvement Range

PAGE
357

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Aerobic endurance training can improve an athlete's aerobic power by 5% to 30%, depending, in part, on the starting fitness level as well as the genetic potential of the individual (5).

END

TYPE
Evidence

TITLE
Adaptation Timeline for Maximal Oxygen Consumption

PAGE
357

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Most adaptations in maximal oxygen consumption can be achieved within a 6- to 12-month training period.

END

TYPE
Evidence

TITLE
Callister and Colleagues — Long Rest Periods and Sprint Speed

PAGE
357

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Callister and colleagues (20) demonstrated that long rest periods used with sprints improve sprint speed without significant increases in maximal aerobic power.

END

TYPE
Evidence

TITLE
Heat Acclimation and Time-Trial Performance — Rahimi et al. Review

PAGE
366-367

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
in a review by Rahimi and colleagues (130) of the physiological responses to heat acclimation across 11 randomized controlled trials with 215 participants, it was reported that heat acclimation was effective for improving time-trial performance as well as reducing time-trial heart rate and maximal heart rate, despite there being no beneficial effect on maximal oxygen uptake, core or mean skin temperature, plasma volume, or blood lactate, nor meaningful effects on rating of perceived exertion or thermal comfort.

END

TYPE
Evidence

TITLE
Cross-Adaptation Between Hot Environments

PAGE
368

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
in one of the few studies to investigate this aspect of heat acclimation, it was found that cross-adaptation from one environment to the other is achievable (56)

END

TYPE
Evidence

TITLE
Sex Differences in Sweat Response to Heat

PAGE
369

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Females have been found to experience greater increases in body temperature in the heat due to a lower total body sweat response when compared to males (43). This difference in sweat rate is attributed to a smaller increase in sweat rate for a given increase in body temperature (i.e., lower thermosensitivity) (43).

END

TYPE
Evidence

TITLE
Heat Acclimation and Maximal Oxygen Uptake in Thermoneutral and Hot Environments

PAGE
370

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
evidence suggests that heat acclimation can improve maximal oxygen uptake in thermoneutral (164) and hot environments (99, 163) as well as performance in thermoneutral (112) and hot environments (57, 99)

END

TYPE
Recommendation

TITLE
Maintaining Training After Heat Acclimation

PAGE
368

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
it is recommended that athletes maintain their training in the days after heat acclimation to assist retaining their thermoregulatory and physiological adaptations (128).

END

TYPE
Recommendation

TITLE
Informing Athletes About Altitude Responses

PAGE
363

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Strength and conditioning professionals are encouraged to inform athletes of both expected acute responses and chronic adaptations to altitude so that they can maintain appropriately adjusted training regimens and a positive mental approach to the impact of altitude.

END

