358

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
Excessive training may lead to a predominance of catabolic activity in the body and cause an imbalance between catabolic and anabolic processes (141).

END

TYPE
Warning

TITLE
Dehydration and Performance Compromise in Heat

PAGE
364-365

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
If this process continues long enough without sufficient fluid intake, dehydration can result, further compounding the issue and putting the athlete under greater physiological and thermoregulatory stress, leading to further compromised performance (54).

END

