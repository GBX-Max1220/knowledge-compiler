Lower Aerobic Fitness as Risk Factor for Heat Exercise Tolerance

PAGE
369

SECTION
6.2 — Aerobic Endurance Training Adaptations

ORIGINAL TEXT
There is evidence to suggest that athletes who have a higher level of aerobic fitness have a greater ability to exercise in the heat due to the ability to tolerate higher core body temperatures (124) and may also better retain their heat acclimation adaptations (121).

END

