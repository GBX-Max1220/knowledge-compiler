TYPE
Recommendation

TITLE
Test Order for Efficient Testing Session

PAGE
758

SECTION
13.5 — Test Administration

ORIGINAL TEXT
The test order should also be designed to require minimal recovery time between tests, allowing for a more efficient testing session. An effort should be made to administer fatiguing anaerobic capacity tests and aerobic tests on a different day than the other tests. However, if performed on the same day, these tests should be performed last, after an extended rest period.

END

TYPE
Recommendation

TITLE
Consistent Testing Time and Environment

PAGE
758

SECTION
13.5 — Test Administration

ORIGINAL TEXT
It is important that test sessions be conducted at the same time of day to avoid fluctuations in physiological responses due to differences in circadian rhythm (33). It is also recommended that tests be conducted indoors, which will allow for climate and testing surfaces to remain more consistent.

END

TYPE
Recommendation

TITLE
Test Order Design Principle

PAGE
758

SECTION
13.5 — Test Administration

ORIGINAL TEXT
The order of tests should be designed in such a way that the completion of one test does not adversely affect performance in subsequent tests.

END

TYPE
Definition

TITLE
Athlete Readiness

PAGE
758

SECTION
13.5 — Test Administration

ORIGINAL TEXT
Athlete readiness has been defined as "the state of being fully prepared to train and perform physically and mentally" (3).

END

TYPE
Recommendation

TITLE
Pretest Practice or Familiarization Session

PAGE
758

SECTION
13.5 — Test Administration

ORIGINAL TEXT
A short, supervised pretest practice or familiarization session one to three days before the test, in which the athletes exert themselves at somewhat less than full intensity, is often beneficial for athletes who either have never participated in the test before or have not done so for a long time.

END

TYPE
Recommendation

TITLE
Test Instructions Content

PAGE
758-759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
The instructions should cover the purpose of the test, how it is to be performed, the amount of warm-up recommended, the number of practice attempts allowed, the number of trials, test scoring, criteria for disallowing attempts, and recommendations for maximizing performance.

END

TYPE
Recommendation

TITLE
Clear and Concise Instructions for Reliability

PAGE
759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
The instructions that are given to the athletes need to be clear and concise because this will increase the reliability and objectivity of the test (25).

END

TYPE
Recommendation

TITLE
Demonstration of Test Performance

PAGE
759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
As an important supplement to reading test instructions aloud, the test administrator or a competent assistant should demonstrate proper test performance when possible.

END

TYPE
Recommendation

TITLE
Equal Motivation of Athletes

PAGE
759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
It is important to motivate all athletes equally rather than giving special encouragement to only some.

END

TYPE
Recommendation

TITLE
Immediate Feedback of Test Scores

PAGE
759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
Whenever possible, tell athletes their test scores immediately after each trial to motivate them to perform better on subsequent trials (2).

END

TYPE
Recommendation

TITLE
Pretest Warm-Up for Reliability

PAGE
759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
Reliability of testing improves with pretest warm-up (2).

END

TYPE
Procedure

TITLE
Organized Warm-Up Structure

PAGE
759

SECTION
13.5 — Test Administration

ORIGINAL TEXT
An appropriately organized warm-up consists of a general warm-up followed by a specific warm-up. Both types of warm-ups include body movements similar to those involved in the test. An organized, instructor-led general warm-up ensures uniformity. It is acceptable to allow two or three activity-specific warm-up trials, depending on the test protocol, and have subsequent trials actually count toward the score. Depending on the test protocol, the score can be the best or the average of the post-warm-up trials (2).

END

TYPE
Recommendation

TITLE
Cool-Down After Strenuous Tests

PAGE
760

SECTION
13.5 — Test Administration

ORIGINAL TEXT
Administer a supervised cool-down period to athletes following tests that dramatically increase heart rate and at the completion of the test battery. For example, after the 300-yard (274 m) shuttle, the athlete should not sit or lie down; active recovery using low-intensity movement and light stretching will enhance the recovery process (10).

END