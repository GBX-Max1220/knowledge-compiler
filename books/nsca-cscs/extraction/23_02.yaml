TYPE
Recommendation

TITLE
Cryotherapy Recommendation for Acute Inflammatory Stage

PAGE
1646–1647

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
Thus, cryotherapy is recommended in the acute inflammatory stage as part of the POLICE strategy (20). A 15-minute duration is adequate when ice packs, ice massage, and cold-water immersion are used (31). Cold-water immersion (<59 °F [<15 °C]) is a more efficient option when a larger coverage area is needed (e.g., whole hand or ankle) and is likely to have a greater effect on cooling deeper tissue (31). Local cryotherapy applications beyond the acute inflammatory phase are not warranted. Although cryotherapy may reduce DOMS and be effective when rapid recovery is needed, routine use is not recommended because it may impair protein synthesis (23).

END

TYPE
Warning

TITLE
Potential for Ice to Delay Healing

PAGE
1646

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
However, the use of ice has been questioned in both the strength and conditioning and allied health professions due to the potential for delaying natural post-injury healing processes and impeding muscle performance (52). These concerns, largely unsupported in the literature, stem from the potential of ice to cause a vasoconstriction of blood vessels (45), which may limit the ability of healing agents to reach the site of injury.

END

TYPE
Evidence

TITLE
Evidence on Cryotherapy After Injury

PAGE
1646–1647

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
Evidence pertaining to cryotherapy after injury has supported a pain-relieving analgesic effect via reduced nerve conduction velocity, with additional benefits that include a suppression of the inflammatory response with the potential to reduce swelling and enhanced return to sport (6, 31, 35, 37, 51, 96). Following exercise, evidence supports the use of cryotherapy to reduce symptoms of delayed onset muscle soreness (DOMS); however, systemic reductions in insulin-like growth factor (IGF) and protein synthesis may occur, impairing recovery (23, 73, 96).

END

