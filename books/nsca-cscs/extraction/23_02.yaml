TYPE
Recommendation

TITLE
Healing Tissue Must Not Be Overstressed

PAGE
1644

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
First, healing tissue must not be overstressed (70). During tissue healing, controlled therapeutic stress is necessary to optimize collagen matrix formation (8, 29), but too much stress can damage new structures and significantly slow the athlete's return to competition. This means choosing a level of loading that provides neither too much stress nor too little stress to the athlete's healing tissue. It should be obvious that when one is choosing the load, it is necessary to consider the phase of healing and athlete type. For example, an exercise that provides too little tissue loading during the maturation–remodeling phase may provide too much loading (increased tissue stress) during the inflammatory response phase. Further, an exercise that provides too little stress to a professional basketball center may be excessive for an amateur cross country runner. The plane of movement is another necessary consideration. As an example, the medial collateral ligament of the knee is subject to the greatest stress when loaded in the frontal plane (i.e., valgus stress) during terminal knee extension. Therefore, if the athlete has a medial collateral ligament injury, frontal plane movements (valgus stress) such as a lateral box jump or a side (lateral) shuffle should be avoided during early healing phases. However, those frontal plane movements should probably be included in some form during the later phases.

END

TYPE
Recommendation

TITLE
Athlete Must Meet Specific Objectives to Progress Between Healing Phases

PAGE
1644–1645

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
Second, the athlete must meet specific objectives to progress from one phase of healing to the next (98, 99). These objectives may depend on range of motion, strength, or activity. It is the responsibility of the team physician, athletic trainer, physical therapist, or a combination of these professionals to establish these guidelines.

END

TYPE
Recommendation

TITLE
Treatment Goal for Inflammatory Response Phase

PAGE
1645

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
The primary goal for treatment during the inflammatory response phase is to prevent disruption of new tissue. A healthy environment for new tissue regeneration and formation is essential for preventing prolonged inflammation and disruption of new blood vessel and collagen production, which can prolong the injury. Relative rest from strenuous activity and physical agents (e.g., modalities) including ice, compression, elevation, and electrical stimulation are often primary treatment options to minimize tissue damage and decrease acute pain, but results on efficacy have been mixed (63, 93). One important consideration is that evidence has shifted from the Protection Rest Ice Compression Elevation (PRICE) approach to the Protection Optimal Loading Compression Ice Elevation (POLICE) approach for the management of injuries in the inflammatory stage of healing as a result of improved outcome measures and faster recovery (5, 20).

END

TYPE
Recommendation

TITLE
Exercise Strategies for Inflammatory Response Phase

PAGE
1645–1647

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
Maximal protection of the injured structures is the primary goal during this phase. Assuming that this requirement is fulfilled, exercises may include general aerobic and anaerobic training and resistance training of the uninjured extremities. If movement of the injured limb is not contraindicated, isolated exercises that target areas proximal and distal to the injured area may also be permissible provided that they do not stress the injured area. Examples include hip abduction and external rotation exercises following a knee injury (24, 39, 65) or scapula-stabilizing exercises following a shoulder injury (57, 94, 100). Although a rapid return to competition is often a goal, protective loading, also known as active rest, of the injured area is initially necessary to safeguard the damaged tissue from additional injury. Therefore, painful or intense exercise directly involving or stressing the injured area is not recommended during this phase. Exercises that do not directly involve or stress the injured area (e.g., upper extremity exercises for lower extremity injury, single-leg exercises with the uninvolved limb) and pain-free active movement of the involved area of injury may still be performed.

END

TYPE
Recommendation

TITLE
Treatment Goal for Fibroblastic Repair Phase

PAGE
1647–1648

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
The treatment goal during the fibroblastic repair phase is to prevent excessive muscle atrophy and joint deterioration of the injured area. In addition, a precarious balance must be maintained in which disruption of the newly formed collagen fibers is avoided but low-load stresses are gradually introduced to allow increased collagen synthesis and prevent loss of joint motion. To protect the new, relatively weak collagen fibers in the early reparative phase, the athlete should avoid active resistive exercise involving the damaged tissue and may opt for submaximal activities such as functional movements against gravity or isometric resistance. Too little activity, though, can also have a deleterious effect, because newly formed fibers will not optimally align and may form adhesions (abnormal collection of cells and collagen that lack pliability), thereby preventing full motion. Early protected motion hastens the optimal alignment of collagen fibers and promotes improved tissue mobility. As in the inflammatory phase, therapeutic modalities are permissible, but their goal during repair is to promote collagen synthesis and manage pain. Ultrasound, electrical stimulation, and ice are continued in order to support and hasten new tissue formation (40, 82). Again, maintenance of muscular and cardiorespiratory function remains essential for the uninjured areas of the body. The strength and conditioning professional has considerable expertise to offer the other members of the allied health team regarding selection of the appropriate activities. Possible exercise forms during the repair phase include strengthening of the uninjured extremities and areas proximal and distal to the injury, aerobic and anaerobic exercise, and improving strength and neuromuscular control of the involved areas.

END

