TYPE
Definition

TITLE
Tissue Healing

PAGE
1639–1640

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
The process of returning to competition following injury involves the healing of the injured tissues and the preparation of these tissues for the return to function. To better understand the role of the strength and conditioning professional during rehabilitation and reconditioning, it is necessary to review the general phases of tissue healing following musculoskeletal injury (34, 36). The timing of the events occurring within each phase of tissue healing differs for each tissue type and is affected by a variety of systemic and local factors, including age, lifestyle, degree of injury, comorbidities, and the structure that has been damaged. Moreover, the phases of healing progress along a continuum with no definitive timelines. However, all tissues follow the same basic pattern of healing (table 23.1).

PARENT
Tissue Healing

CHILDREN
Inflammatory Response Phase, Fibroblastic Repair Phase, Maturation–Remodeling Phase

END

TYPE
Definition

TITLE
Inflammatory Response Phase

PAGE
1640–1641

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
Inflammation is the initial reaction to injury (34, 36) and is necessary for normal tissue healing to occur. Both local and systemic inflammation occur during the inflammatory response phase, allowing the eventual healing and replacement of damaged tissue. During the inflammatory phase, several events transpire that contribute to both tissue healing and an initial decrease in function. The injured area becomes red and swollen due to changes in vascularity, blood flow, and capillary permeability. After tissues are damaged, a locally hypoxic environment leads to a certain amount of tissue death that allows the release of several chemical mediators, including histamine and bradykinin. These substances further increase blood flow and capillary permeability in this local area, thereby promoting edema and fluid accumulation into the surrounding tissues. Edema elevates intraarticular pressure, which inhibits the motor neurons required for muscle activation (22, 84). Thus, edema can lead to muscle weakness and atrophy as well as limited function (22, 59). Tissue debris and pathogens (i.e., infectious agents) are removed from the injured area by increased blood flow and a process called phagocytosis; phagocytosis involves macrophages (i.e., a type of white blood cell), which engulf cellular debris to speed tissue healing. Additionally, fibroblast cells in nearby tissues are activated and begin to migrate toward the injury site to assist with healing. At this time, macrophages and platelets within the injured area release growth factors that assist in the transition to the fibroblastic repair phase (see next section). The inflammatory substances present during this phase may result in stimulation of pain receptors (i.e., nociceptors), causing the injured athlete to sense pain, further contributing to decreased function. This phase typically lasts 72 hours following an acute injury but may last longer with a compromised blood supply and more severe structural damage. Though the inflammatory phase is critical to tissue healing, if it does not end within a reasonable amount of time, the phases that follow may not occur, thereby delaying the rehabilitation process.

PARENT
Tissue Healing

END

TYPE
Definition

TITLE
Fibroblastic Repair Phase

PAGE
1641–1642

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
Once the inflammatory phase has subsided, tissue repair begins (34, 36); the fibroblastic repair phase, also known as the proliferative phase, is characterized by catabolism (tissue breakdown) and replacement of tissues that are no longer viable following injury. In an attempt to improve tissue integrity, new capillaries and connective tissue (scar tissue) form in the area. Fibroblasts from the inflammatory phase, with the help of growth factors, begin to synthesize type III collagen, which is randomly deposited along the injured structure and serves as the framework for tissue regeneration. This newly formed tissue is weaker than the original tissue; thus optimal strength of the new tissue is not yet achieved. Collagen fibers are strongest when they lie longitudinally (i.e., parallel) to the primary line of stress, yet many of the new fibers are positioned transversely, which limits their ability to efficiently transmit force. This phase of tissue healing begins as early as 72 hours after injury and may last up to two months.

PARENT
Tissue Healing

END

TYPE
Definition

TITLE
Maturation–Remodeling Phase

PAGE
1642–1643

SECTION
23.2 — Types of Injury

ORIGINAL TEXT
The maturation–remodeling phase of healing often overlaps with the fibroblastic reparative phase and may begin as early as a few weeks after injury. During the maturation–remodeling phase of healing the weakened tissue produced during the repair phase is strengthened (34, 36). During this phase, new collagen fibers have shifted to a stronger type I collagen, allowing the newly formed tissue the opportunity to improve its structure, strength, and function. With increased loading, the collagen fibers of the newly formed scar tissue (a collection of cells and collagen that have repaired damaged tissue) begin to hypertrophy and align themselves along the lines of stress (29). The thicker and more optimally aligned collagen fibers become stronger, allowing a return to function. Although strength of the collagen fibers and healing tissue improves, this tissue is not as strong as the normal healthy tissue it has replaced. Tissue remodeling in the maturation–remodeling phase can last months to years after injury (34, 36, 54).

