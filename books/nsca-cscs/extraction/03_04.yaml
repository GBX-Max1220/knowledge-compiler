TITLE
Short-Term Interval Training Studies — Improvements in Muscle Oxidative Potential, Buffering Capacity, Glycogen Content, and Performance

PAGE
216

SECTION
3.4 — Bioenergetic Limiting Factors

ORIGINAL TEXT
A series of short-term (two-week) interval training studies used six sessions of four to seven 30-second maximum cycling efforts interspaced with 4 minutes of recovery (1:8 work-to-rest ratio). These studies demonstrated improvements in muscle oxidative potential (26, 63), muscle buffering capacity (26, 63), muscle glycogen content (25, 26), and time-trial performance (25), as well as a doubled aerobic endurance capacity (26). In addition, a similar four-week interval training program exhibited increases in muscle activation and total work output (38) in trained cyclists.

