TITLE
Work-to-Rest Ratio Study — 40:20 vs. 30:30 in Elite Cyclists

PAGE
217

SECTION
3.4 — Bioenergetic Limiting Factors

ORIGINAL TEXT
The cyclists performed two intermittent protocols that included either a 40:20-second or a 30:30-second work-to-rest interval to exhaustion at a fixed work rate. The 40:20-second work-to-rest ratio resulted in significantly reduced total work and time to exhaustion while producing higher metabolic values (V̇O2max, lactate concentration, ETC). In contrast, the 30:30-second work-to-rest ratio provided sustained but slightly lower metabolic values for a considerably longer period of time.

