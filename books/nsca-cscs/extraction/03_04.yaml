TYPE
Evidence

TITLE
Interval Training — Christensen et al. (1960) Comparison of Continuous vs. Interval Running

PAGE
216

SECTION
3.4 — Bioenergetic Limiting Factors

ORIGINAL TEXT
An early paper by Christensen and colleagues (31) compared the total running distance, average oxygen uptake, and blood lactate concentration during continuous running for 5 minutes and interval running totaling 30 minutes with 2:1, 1:1, and 1:2 work-to-rest ratios. Subjects were assigned a continuous running intensity (speed) that would result in fatigue within 5 minutes. At that fast pace during the continuous run, the subjects were able to complete 0.81 miles (1.3 km) before exhaustion. However, by using 2:1, 1:1, and 1:2 work-to-rest ratios and the same running intensity for a total duration of 30 minutes, the subjects were able to complete 4.14 miles (6.66 km), 3.11 miles (5 km), and 2.07 miles (3.33 km), respectively, all while working aerobic capacity in a manner similar to that in the continuous running condition. Therefore, much more distance can be accomplished at higher intensities with interval training; this concept has been established for over 45 years (31).

