TYPE
Recommendation

TITLE
How Can Athletes Improve Force Production?

PAGE
66

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
Incorporate phases of training that use heavier loads (or explosive actions) to optimize motor unit recruitment and firing frequency patterns. Also incorporate phases of training that promote skeletal muscular hypertrophy given that more myofibrils (and thus more actin-myosin crossbridges) will be available for near-maximal muscle contractions. Finally, implement training methods that specifically target movements where increases in force are desired (e.g., heavy bench press and back squat exercises for increasing pushing forces).

END

TYPE
Recommendation

TITLE
Importance of Periodic Leg Muscle Contraction During Prolonged Sitting

PAGE
75

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
This mechanism is one of the reasons why it is important to periodically contract leg muscles or to take walking breaks during prolonged sitting. These activities act to prevent blood pooling in the legs and facilitate venous blood return to the heart.

END

TYPE
Recommendation

TITLE
How Important Is It to Train the Muscles of Respiration?

PAGE
80

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
Regular exercise in general is beneficial for maintaining respiratory muscle function. Both endurance exercise, which involves repetitive contraction of breathing muscles, and resistance exercise, which taxes the diaphragm and abdominal muscles especially because of their use for stabilization and for increasing intra-abdominal pressure (Valsalva maneuver), can result in some muscle training adaptations. This can help to preserve some of the pulmonary function with aging.

END