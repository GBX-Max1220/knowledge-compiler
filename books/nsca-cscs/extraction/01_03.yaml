TYPE
Definition

TITLE
Muscle Spindle

PAGE
66

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
FIGURE 1.10 Muscle spindle. When a muscle is stretched, deformation of the muscle spindle activates the sensory neuron, which sends an impulse to the spinal cord, where it synapses with a motor neuron, causing the muscle to contract.

END

TYPE
Definition

TITLE
Golgi Tendon Organs (GTOs)

PAGE
67

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
Golgi tendon organs (GTOs) are proprioceptors located in tendons near the myotendinous junction and are in series—that is, attached end to end, with extrafusal muscle fibers (figure 1.10). Golgi tendon organs are activated when the tendon attached to an active muscle is stretched. As tension in the muscle and tendons increases, the discharge of the GTOs increases. The sensory neuron of the GTO synapses with an inhibitory interneuron in the spinal cord, which in turn synapses with and inhibits a motor neuron that serves the same muscle. The result is a reduction in tension within the muscle and tendon. Thus, whereas spindles facilitate activation of the muscle, neural input from GTOs inhibits muscle activation. The GTOs’ inhibitory process is thought to provide a mechanism that protects against the development of excessive tension.

END

TYPE
Definition

TITLE
Cardiovascular System

PAGE
67

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The primary roles of the cardiovascular system are to transport nutrients and remove waste and by-products while assisting with maintaining the environment for all the body’s functions. The cardiovascular system plays key roles in the regulation of the body’s acid–base system, fluids, and temperature, as well as a variety of other physiological functions.

END

TYPE
Definition

TITLE
Heart

PAGE
67

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The heart is a muscular organ composed of two interconnected but separate pumps; the right side of the heart pumps blood through the lungs, and the left side pumps blood through the rest of the body. Each pump has two chambers: an atrium and a ventricle (figure 1.11). The right and left atria deliver blood into the right and left ventricles. The right and left ventricles supply the main force for moving blood through the pulmonary and peripheral circulations, respectively (41).

END

TYPE
Definition

TITLE
Valves

PAGE
68

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The tricuspid valve and mitral valve (bicuspid valve) (collectively called atrioventricular [AV] valves) prevent the flow of blood from the ventricles back into the atria during ventricular contraction (systole). The aortic valve and pulmonary valve (collectively, the semilunar valves) prevent backflow from the aorta and pulmonary arteries into the ventricles during ventricular relaxation (diastole). Each valve opens and closes passively; that is, each closes when a backward pressure gradient pushes blood back against it, opening when a forward pressure gradient forces blood in the forward direction (41).

END

TYPE
Definition

TITLE
Conduction System

PAGE
68-69

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
A specialized electrical conduction system (figure 1.12) controls the mechanical contraction of the heart. The conduction system is composed of the sinoatrial (SA) node —the intrinsic pacemaker—where rhythmic electrical impulses are normally initiated; the internodal pathways that conduct the impulse from the SA node to the atrioventricular node; the atrioventricular (AV) node, where the impulse is delayed slightly before passing into the ventricles; the atrioventricular (AV) bundle, which conducts the impulse to the ventricles; and the left bundle branch and right bundle branch, which further divide into the Purkinje fibers and conduct impulses to all parts of the ventricles.

CHILDREN
Sinoatrial (SA) Node, Internodal Pathways, Atrioventricular (AV) Node, Atrioventricular (AV) Bundle, Left Bundle Branch, Right Bundle Branch, Purkinje Fibers

END

TYPE
Definition

TITLE
Sinoatrial (SA) Node

PAGE
68-69

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The SA node is a small area of specialized muscle tissue located in the upper lateral wall of the right atrium. The fibers of the node are contiguous with the muscle fibers of the atrium, with the result that each electrical impulse that begins in the SA node normally spreads immediately into the atria.

PARENT
Conduction System

END

TYPE
Definition

TITLE
Atrioventricular (AV) Node

PAGE
68-69

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The AV node is located in the posterior septal wall of the right atrium (41).

PARENT
Conduction System

END

TYPE
Definition

TITLE
Left and Right Bundle Branches

PAGE
69

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The left and right bundle branches lead from the AV bundle into the ventricles. Except for their initial portion, where they penetrate the AV barrier, these conduction fibers have functional characteristics quite opposite those of the AV nodal fibers. They are large and transmit impulses at a much higher velocity than the AV nodal fibers. Because these fibers give way to the Purkinje fibers, which more completely penetrate the ventricles, the impulse travels quickly throughout the entire ventricular system and causes both ventricles to contract at approximately the same time (41).

PARENT
Conduction System

END

TYPE
Definition

TITLE
Myocardium

PAGE
72

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The inherent rhythmicity and conduction properties of the myocardium (heart muscle) are influenced by the cardiovascular center of the medulla, which transmits signals to the heart through the sympathetic and parasympathetic nervous systems, both of which are components of the autonomic nervous system.

END

TYPE
Definition

TITLE
Electrocardiogram (ECG)

PAGE
72-73

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The electrical activity of the heart can be recorded at the surface of the body; a graphic representation of this activity is called an electrocardiogram (ECG). A normal ECG, seen in figure 1.13, is composed of a P-wave, a QRS complex (the QRS complex is often three separate waves: a Q-wave, an R-wave, and an S-wave), and a T-wave. The P-wave and the QRS complex are recordings of electrical depolarization—that is, the electrical stimulus that leads to mechanical contraction. Depolarization is the reversal of the membrane electrical potential, whereby the normally negative potential inside the membrane becomes slightly positive and the outside becomes slightly negative. The P-wave is generated by the changes in the electrical potential of cardiac muscle cells that depolarize the atria and result in atrial contraction. The QRS complex is generated by the electrical potential that depolarizes the ventricles and results in ventricular contraction. In contrast, the T-wave is caused by the electrical potential generated as the ventricles recover from the state of depolarization; this process, called repolarization, occurs in ventricular muscle shortly after depolarization. Although atrial repolarization occurs as well, its wave formation usually occurs during the time of ventricular depolarization and is thus masked by the QRS complex (41).

CHILDREN
P-wave, QRS Complex, T-wave, Depolarization, Repolarization

END

TYPE
Definition

TITLE
Blood Vessels

PAGE
73

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The central and peripheral circulation form a single closed-circuit system with two components: an arterial system, which carries blood away from the heart, and a venous system, which returns blood toward the heart (figure 1.14).

CHILDREN
Arterial System, Venous System

END

TYPE
Definition

TITLE
Arteries

PAGE
74

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The function of arteries is to rapidly transport blood pumped from the heart. Because blood pumped from the heart is under relatively high pressure, arteries have strong, muscular walls. Small branches of arteries called arterioles act as control vessels through which blood enters the capillaries. Arterioles play a major role in the regulation of blood flow to the capillaries. Arterioles have strong, muscular walls that are capable of closing the arteriole completely or allowing it to be dilated many times their size, thus vastly altering blood flow to the capillaries in response to the needs of the tissues (41).

CHILDREN
Arterioles

END

TYPE
Definition

TITLE
Capillaries

PAGE
75

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The function of capillaries is to facilitate exchange of oxygen, fluid, nutrients, electrolytes, hormones, and other substances between the blood and the interstitial fluid in the various tissues of the body. The capillary walls are very thin and are permeable to these, but not all, substances (41).

END

TYPE
Definition

TITLE
Veins

PAGE
75

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
Venules collect blood from the capillaries and gradually converge into the progressively larger veins, which transport blood back to the heart. Because the pressure in the venous system is very low, venous walls are thin, although muscular. This allows them to constrict or dilate to a great degree and thereby act as a reservoir for blood, either in small or in large amounts (41). In addition, some veins, such as those in the legs, contain one-way valves that help maintain venous return by preventing retrograde blood flow.

CHILDREN
Venules

END

TYPE
Definition

TITLE
Skeletal Muscle Pump

PAGE
75

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The skeletal muscle pump is the assistance that contracting muscles provide to the circulatory system. The muscle pump works with the venous system, which contains the one-way valves for blood return to the heart. The contracting muscle compresses the veins, but since the blood can flow only in the direction of the valves, it is returned to the heart.

END

TYPE
Definition

TITLE
Blood

PAGE
76-77

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
Two paramount functions of blood are the transport of oxygen from the lungs to the tissues for use in cellular metabolism and the removal of carbon dioxide, the most abundant by-product of metabolism, from the tissues to the lungs. The transport of oxygen is accomplished by hemoglobin, the iron–protein molecule carried by the red blood cells. Hemoglobin also has an additional important role as an acid–base buffer, a regulator of hydrogen ion concentration, which is crucial to the rates of chemical reactions in cells. Red blood cells, the major component of blood, have other functions as well. For instance, they contain a large quantity of carbonic anhydrase, which catalyzes the reaction between carbon dioxide and water to facilitate carbon dioxide removal.

CHILDREN
Hemoglobin, Red Blood Cells

END

TYPE
Definition

TITLE
Respiratory System

PAGE
77

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The primary function of the respiratory system is the basic exchange of oxygen and carbon dioxide. The anatomy of the human respiratory system is shown in figure 1.15. As air passes through the nose, the nasal cavities perform three distinct functions: warming, humidifying, and purifying the air (41). Air is distributed to the lungs by way of the trachea, bronchi, and bronchioles. The trachea is called the first-generation respiratory passage, and the right and left main bronchi are the second-generation passages; each division thereafter is an additional generation (bronchioles). There are approximately 23 generations before the air finally reaches the alveoli, where gases are exchanged in respiration (41).

CHILDREN
Trachea, Bronchi, Bronchioles, Alveoli

END

TYPE
Definition

TITLE
Exchange of Air

PAGE
77-78

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The amount and movement of air and expired gases in and out of the lungs are controlled by expansion and recoil of the lungs. The lungs do not actively expand and recoil themselves but rather are acted on to do so in two ways: by downward and upward movement of the diaphragm to lengthen and shorten the chest cavity and by elevation and depression of the ribs to increase and decrease the back-to-front diameter of the chest cavity (41). Normal, quiet breathing is accomplished almost entirely by movement of the diaphragm. During inspiration, contraction of the diaphragm creates a negative pressure (vacuum) in the chest cavity, and air is drawn into the lungs. During expiration, the diaphragm simply relaxes; the elastic recoil of the lungs, chest wall, and abdominal structures compresses the lungs, and air is expelled. During heavy breathing, the elastic forces alone are not powerful enough to provide the necessary respiratory response. The extra required force is achieved mainly by contraction of the abdominal muscles, which push the abdomen upward against the bottom of the diaphragm (41).

CHILDREN
Muscles of Inspiration, Muscles of Expiration

END

TYPE
Definition

TITLE
Muscles of Inspiration

PAGE
78

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The muscles that elevate the rib cage are called muscles of inspiration and include the external intercostals, the sternocleidomastoids, the anterior serrati, and the scaleni.

PARENT
Exchange of Air

END

TYPE
Definition

TITLE
Muscles of Expiration

PAGE
78

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The muscles that depress the chest are muscles of expiration and include the abdominal muscles (rectus abdominis, external and internal obliques, and transversus abdominis) and the internal intercostals (41).

PARENT
Exchange of Air

END

TYPE
Threshold

TITLE
Resting Heart Rate Classification

PAGE
72

SECTION
01.03 — Cardiovascular System

ORIGINAL TEXT
The resting heart rate normally ranges from 60 to 100 beats/min; fewer than 60 beats/min is called bradycardia, and more than 100 beats/min is called tachycardia.

END

