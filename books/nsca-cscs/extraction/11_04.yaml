---

**TYPE**
Warning

**TITLE**
Potentially Dangerous Weight Loss Techniques

**PAGE**
647

**SECTION**
11.4 — Body Composition Strategies

**ORIGINAL TEXT**
Potentially dangerous weight loss techniques may include fasting, fad diets, voluntary dehydration (diuretics, sauna, water and salt manipulation, wearing multiple layers of clothing), excessive spitting, self-induced vomiting, laxative abuse, and inappropriate or excessive use of thermogenic aids (38).

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

**END**

---

**TYPE**
Warning

**TITLE**
Side Effects of Rapid Weight Loss

**PAGE**
647-648

**SECTION**
11.4 — Body Composition Strategies

**ORIGINAL TEXT**
Athletes who attempt to lose too much weight too quickly may lose lean body mass, feel fatigued, experience headaches or mood swings, put their training and performance in jeopardy, and suffer from several potentially serious side effects. These include dehydration, heat illness, muscle cramping, fatigue, dizziness, suppressed immune system functioning, hormone imbalances, hyperthermia, reduced muscle strength, decreased plasma and blood volume, low blood pressure, electrolyte imbalances, kidney failure (diuretic abuse), fainting, and death (in extreme cases) (38).

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

**END**

