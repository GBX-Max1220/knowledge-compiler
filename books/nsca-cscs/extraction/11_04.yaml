**SECTION**
11.4 — Body Composition Strategies

**ORIGINAL TEXT**
Though there is no uniform definition in the literature, rapid weight loss generally refers to quick weight loss, faster than can be achieved by lowering calorie intake and increasing exercise, in a short period of time (38).

