**SECTION**
11.4 — Body Composition Strategies

**ORIGINAL TEXT**
Overweight and obesity, both of which reflect an accumulation of excess body fat, increase a person's risk of morbidity from hypertension; dyslipidemia; coronary artery disease; gallbladder disease; stroke; type 2 diabetes; sleep apnea; osteoarthritis; respiratory problems; and endometrial, breast, prostate, and colon cancers (92).

