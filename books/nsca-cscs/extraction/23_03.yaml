TYPE
Definition

TITLE
Mechanotransduction

PAGE
1649

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Mechanotransduction occurs when tissues are subject to overload, which communicates a mechanical message from the extracellular to intracellular region of the tissue. This mechanical message upregulates the cellular DNA, which in turn stimulates collagen synthesis (44).

END

TYPE
Definition

TITLE
Neuromuscular Control

PAGE
1650

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Neuromuscular control is the ability of muscles to respond to sensory feedback to maintain joint stability (85).

END

TYPE
Definition

TITLE
Proprioception

PAGE
1650

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
This sensory information is referred to as proprioception and occurs in response to receptors in the skin, muscles, tendons, ligaments, and the joint capsule. Proprioception contributes to the conscious and unconscious efferent control of posture, balance, stability, and sense of position (85).

PARENT
Neuromuscular Control

END

TYPE
Definition

TITLE
Arthrogenic Inhibition

PAGE
1650

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
arthrogenic inhibition, which occurs from swelling within the joint that causes a reflex inhibition of the alpha motor neuron responsible for muscle activation (22).

END

TYPE
Definition

TITLE
Closed Kinetic Chain Exercise

PAGE
1654

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
A closed kinetic chain exercise is one in which the terminal joint meets with considerable resistance that prohibits or restrains its free motion (88); that is, the distal joint segment is stationary (e.g., fixed to the ground).

END

TYPE
Definition

TITLE
Open Kinetic Chain Exercise

PAGE
1656

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
An open kinetic chain exercise uses a combination of successively arranged joints in which the terminal joint is free to move; open kinetic chain exercises allow for greater concentration on an isolated joint or muscle (2).

END

TYPE
Recommendation

TITLE
Return-to-Play Decision Criteria

PAGE
1651

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Return-to-play or activity decisions should be based on an understanding of normal tissue healing time frames as well as a criteria-based progression with predetermined objectives. These objectives usually include measures of range of motion and strength, functional testing, and patient-reported function using established patient-reported outcome forms (1, 57, 100).

END

TYPE
Recommendation

TITLE
Rehabilitation Exercise Specificity

PAGE
1652

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Ultimately, as with other aspects of strength and conditioning, rehabilitation and reconditioning exercises must be functional and must mimic activity demands—that is, reflect specificity.

END

TYPE
Warning

TITLE
Risk of Overactivity During Maturation–Remodeling Phase

PAGE
1651

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
The athlete can be tempted to do too much too soon, which may further damage the injured tissues. It is important to remember that, while there may be less pain with activity at this point, the injured tissues have not fully healed and require further attention to achieve complete recovery (figure 23.3).

END

