TYPE
Definition
TITLE
Rehabilitation and Reconditioning Goals and Strategies — Inflammatory Response Phase

PAGE
1658

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Inflammatory Response Phase
Prevention of new tissue disruption and prolonged inflammation with the use of relative rest and passive modalities
Maintenance of function of the cardiorespiratory and surrounding neuromusculoskeletal systems
No active exercise for the injured area

CHILDREN
Prevention of new tissue disruption and prolonged inflammation with the use of relative rest and passive modalities
Maintenance of function of the cardiorespiratory and surrounding neuromusculoskeletal systems
No active exercise for the injured area

END

TYPE
Definition
TITLE
Rehabilitation and Reconditioning Goals and Strategies — Fibroblastic Repair Phase

PAGE
1658

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Fibroblastic Repair Phase
Prevention of excessive muscle atrophy and joint deterioration of the injured area
Maintenance of function of the neuromusculoskeletal and cardiorespiratory systems
Possible exercise options: submaximal isometric, isokinetic, and isotonic exercise; balance and proprioceptive training activities

CHILDREN
Prevention of excessive muscle atrophy and joint deterioration of the injured area
Maintenance of function of the neuromusculoskeletal and cardiorespiratory systems
Possible exercise options: submaximal isometric, isokinetic, and isotonic exercise; balance and proprioceptive training activities

END

TYPE
Definition
TITLE
Rehabilitation and Reconditioning Goals and Strategies — Maturation–Remodeling Phase

PAGE
1658

SECTION
23.3 — Tissue Healing

ORIGINAL TEXT
Maturation–Remodeling Phase
Optimization of tissue function
Progressive loading of the neuromusculoskeletal and cardiorespiratory systems as indicated
Possible exercise options: joint angle–specific strengthening, velocity-specific muscle activity, closed and open kinetic chain exercises, proprioceptive training activities

CHILDREN
Optimization of tissue function
Progressive loading of the neuromusculoskeletal and cardiorespiratory systems as indicated
Possible exercise options: joint angle–specific strengthening, velocity-specific muscle activity, closed and open kinetic chain exercises, proprioceptive training activities

END