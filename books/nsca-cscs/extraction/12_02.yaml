TYPE
Warning

TITLE
Risk of Contaminated SARM Products

PAGE
683-684

SECTION
12.2 — Hormones

ORIGINAL TEXT
Athletes should be aware, however, that products marketed and sold as SARMs or peptides may be just as likely to contain a different drug or no SARMs or peptides at all. Indeed, a chemical analysis of 44 products sold on the Internet as SARMs indicated that only 52% of these actually contained a SARM, 59% contained substance amounts that were different from that listed on the label, and 39% contained a different unapproved drug altogether (212).

END

