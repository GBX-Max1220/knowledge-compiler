TYPE
Warning

TITLE
Adverse Effects of EPO Misuse

PAGE
695

SECTION
12.2 — Hormones

ORIGINAL TEXT
The increase in hematocrit resulting from EPO injection presents a significant health risk. Increases in red blood cell number increase blood viscosity (the thickening of the blood). This poses several problems that include increased risk of blood clotting, elevations in systolic blood pressure and accentuation of the exercise pressor response stroke, and cerebral or pulmonary embolism (22, 42, 82).

END

