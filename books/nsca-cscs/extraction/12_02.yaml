ORIGINAL TEXT
Possible outcomes in a previously healthy athlete include immediate death or coma due to severe hypoglycemia (106).

END

TYPE
Evidence

TITLE
Efficacy of Testosterone Precursors

PAGE
681-682

SECTION
12.2 — Hormones

ORIGINAL TEXT
Studies examining the efficacy of testosterone precursors have produced varying results. No significant differences in strength or body composition were seen in middle-aged men performing a resistance training program while supplementing with either DHEA, androstenedione (100 mg), or a placebo for three months (219). When DHEA supplementation (150 mg) was examined in a group of younger males (19-29 years) on a two-weeks-on, one-week-off cycle for eight weeks, there were no gains in strength or lean tissue (33). Additionally, the investigators were unable to see any changes in serum testosterone, estrone, estradiol, or lipid concentrations with supplementation. Even in studies using higher dosages (300 mg) of androstenedione for eight weeks, in a similar two-weeks-on, one-week-off protocol, no significant effect was observed in strength, muscle size, or testosterone concentrations (33). However, androstenedione supplementation did cause an increase in serum concentrations of estradiol and estrone and was associated with lower high-density lipoprotein (HDL) levels.

END

TYPE
Evidence

TITLE
Efficacy of SARMs in Healthy Individuals

PAGE
684-685

SECTION
12.2 — Hormones

ORIGINAL TEXT
For example, three weeks of LGD-4033 (e.g., ligandrol) use has been shown to promote dose-dependent increases in lean body mass among healthy young and middle-aged men (15). As is often observed with oral androgen administration, these improvements in lean body mass were observed alongside a dose-dependent suppression of total testosterone, sex hormone–binding globulin (SHBG), high-density lipoprotein cholesterol (HDL-C), and triglycerides (15). Similarly, other SARMs such as GSK2881078 and GTx-024 (enobosarm) have been shown to cause dose-dependent increases in lean mass and decreases in HDL-C, SHBG, and total testosterone, suggestive of significant androgen receptor agonism (43, 157), as well as decreased triglycerides, very-low-density lipoprotein, and apolipoprotein A1 (43).

END

TYPE
Evidence

TITLE
Efficacy of EPO Administration

PAGE
694

SECTION
12.2 — Hormones

ORIGINAL TEXT
A 2013 systematic review and meta-analysis indicated that EPO administration promotes increases in hemoglobin and hematocrit of 5% to 17% and 8% to 19%, respectively (108). These increases are accompanied by increases in aerobic capacity and maximal power output of 7% to 10%, which are in turn linked with improvements in time to exhaustion in open endpoint exercise for both trained (9%-17%) and untrained (22%-50%) individuals (108).

END

TYPE
Evidence

TITLE
Efficacy of β-Blockers on Shooting Accuracy

PAGE
697

SECTION
12.2 — Hormones

ORIGINAL TEXT
Several studies have shown that β-blockers can improve both slow and fast shooting accuracy (7, 135). In addition, the dose taken appears to have significant effects on the magnitude of improvement. In shooters who administered β-blockers in two different doses (80 mg vs. 40 mg of oxprenolol), the group taking the higher dose shot with greater accuracy (7).

END

TYPE
Evidence

TITLE
Efficacy of EAAs on Muscle Protein Synthesis

PAGE
699-700

SECTION
12.2 — Hormones

ORIGINAL TEXT
Tipton and colleagues (206) reported that nonessential amino acids were not necessary to stimulate muscle protein synthesis; rather, only the presence of EAAs is needed. In this research (206), six healthy adults, three males and three females, participated in resistance exercise (8 sets of 8 repetitions at 80% 1RM) and then consumed either 40 grams of mixed amino acids (composed of both nonessential and essential amino acids), 40 grams of EAA, or a placebo. While the mixed amino acids and the EAA induced an anabolic response that was significantly greater than with the placebo treatment, no difference was observed between the amino acid treatments. Since there was no difference, it was concluded that nonessential amino acids are not needed to stimulate muscle protein synthesis.

END

