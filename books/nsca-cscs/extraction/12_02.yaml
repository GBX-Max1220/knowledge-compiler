TITLE
Human Chorionic Gonadotropin (HCG)

PAGE
688

SECTION
12.2 — Hormones

ORIGINAL TEXT
Human chorionic gonadotropin (HCG) is a hormone obtained from the placenta of pregnant women and is very closely related in structure and function to luteinizing hormone.

END

TYPE
Definition

TITLE
Insulin

PAGE
689

SECTION
12.2 — Hormones

ORIGINAL TEXT
Insulin is a potent anabolic hormone. It is secreted by the pancreas in response to elevations in blood glucose or specific amino acid (e.g., leucine) concentrations. Its role is to facilitate the uptake of glucose and amino acids into the cell. Since insulin increases protein synthesis, it is considered an anabolic hormone.

END

TYPE
Definition

TITLE
Human Growth Hormone (HGH)

PAGE
690

SECTION
12.2 — Hormones

ORIGINAL TEXT
Human growth hormone (HGH), a protein secreted from the anterior pituitary gland, has several important physiological functions that enhance its ergogenic effect. It is anabolic due to its stimulation of bone and skeletal muscle growth, but it also has important metabolic functions such as maintaining blood glucose levels, increasing the uptake of glucose and amino acids into muscle cells (67), and stimulating release of fatty acids from the fat cells.

END

TYPE
Definition

TITLE
Erythropoietin (EPO)

PAGE
694

SECTION
12.2 — Hormones

ORIGINAL TEXT
Erythropoietin (EPO) is produced in the kidneys and stimulates the production of new red blood cells. It is also a protein hormone that can be produced by recombinant DNA techniques and is reportedly being abused by athletes (64).

END

TYPE
Definition

TITLE
β-Adrenergic Agonists (β-Agonists)

PAGE
695

SECTION
12.2 — Hormones

ORIGINAL TEXT
Synthetic β-adrenergic agonists, or β-agonists, are substances chemically related to epinephrine, a hormone produced in the adrenal medulla that regulates physiological effects, such as lipolysis (the breakdown of fat) and thermogenesis (increased energy expenditure resulting in the production of heat).

END

TYPE
Definition

TITLE
β-Blockers

PAGE
696

SECTION
12.2 — Hormones

ORIGINAL TEXT
β-Blockers are a class of drugs that block the β-adrenergic receptors, preventing the catecholamines (i.e., norepinephrine and epinephrine) from binding.

END

TYPE
Definition

TITLE
Essential Amino Acids (EAAs)

PAGE
699

SECTION
12.2 — Hormones

ORIGINAL TEXT
Essential amino acids (EAAs) are not produced in the body and must be obtained through the diet. They include histidine, isoleucine, leucine, valine, lysine, methionine, phenylalanine, threonine, and tryptophan.

END

