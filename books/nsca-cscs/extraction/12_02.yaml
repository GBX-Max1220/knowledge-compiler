12.2 — Hormones

ORIGINAL TEXT
All SARMs are also currently prohibited both in and outside of competition (i.e., at all times) for all athletes by WADA. Similarly, hormone (e.g., testosterone, growth hormone, corticotrophin)-stimulating peptides are prohibited at all times by WADA.

