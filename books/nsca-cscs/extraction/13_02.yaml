TYPE
Definition

TITLE
Construct Validity

PAGE
736-737

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Construct validity is the ability of a test to represent the underlying construct (the theory developed to organize and explain some aspects of existing knowledge and observations). Construct validity refers to overall validity, or the extent to which the test actually measures what it was designed to measure (24).

PARENT
Validity

CHILDREN
Convergent Validity, Discriminant Validity

RELATIONSHIPS
is_a: Validity

END

TYPE
Definition

TITLE
Convergent Validity

PAGE
737

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Convergent validity is evidenced by high positive correlations between results of the test being assessed and those of the recognized measure of the construct (the "gold standard").

PARENT
Construct Validity

RELATIONSHIPS
is_a: Construct Validity

END

TYPE
Definition

TITLE
Discriminant Validity

PAGE
737

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Discriminant validity is the ability of a test to distinguish between two different constructs and is evidenced by a low correlation between the results of the test and those of tests of a different construct (2).

PARENT
Construct Validity

RELATIONSHIPS
is_a: Construct Validity

END

TYPE
Definition

TITLE
Face Validity

PAGE
737

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Face validity is the appearance to the athlete and other casual observers that the test measures what it is purported to measure.

PARENT
Validity

RELATIONSHIPS
is_a: Validity

END

TYPE
Definition

TITLE
Content Validity

PAGE
738

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Content validity is the assessment by experts that the testing covers all relevant subtopics or component abilities in appropriate proportions (1).

PARENT
Validity

RELATIONSHIPS
is_a: Validity

END

TYPE
Definition

TITLE
Criterion Validity

PAGE
738

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Criterion validity is the extent to which test scores are associated with some other measure of the same ability.

PARENT
Validity

CHILDREN
Concurrent Validity, Predictive Validity

RELATIONSHIPS
is_a: Validity

END

TYPE
Definition

TITLE
Concurrent Validity

PAGE
738

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Concurrent validity is the extent to which test scores are associated with those of other accepted tests that measure the same ability.

PARENT
Criterion Validity

RELATIONSHIPS
is_a: Criterion Validity

END

