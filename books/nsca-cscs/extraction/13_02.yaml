TITLE
Validity

PAGE
736

SECTION
13.2 — Testing Terminology

ORIGINAL TEXT
Validity refers to the degree to which a test or test item measures what it is supposed to measure and is one of the most important characteristics of testing (2, 25).

PARENT
Evaluation of Test Quality

CHILDREN
Construct Validity, Face Validity, Content Validity, Criterion Validity

