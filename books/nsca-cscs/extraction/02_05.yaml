ORIGINAL TEXT
Injuries due to resistance training accounted for only 0.74% of the in-season injury-related time loss of the players (61).

END

TYPE
Recommendation

TITLE
Neutral-Back Lifting Posture

PAGE
162

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
The neutral-back lifting posture has been found to be better overall than a rounded (opposite of arched) back in minimizing L5/S1 compressive forces and ligament strain (2). Therefore, a normal lordotic lumbar spine position is superior to a rounded back for avoiding injury to vertebrae, disks, facet joints, ligaments, and muscles of the back.

END

TYPE
Recommendation

TITLE
Moderately Arched Lower Back During Resistance Training

PAGE
163

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
Thus, resistance training exercises should generally be performed with the lower back in a moderately arched position to reduce risk of damage to the disks.

END

