160

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
The bands provide the greatest resistance while the jumper is in the air—serving mainly to pull the jumper back to the ground, rather than resist the muscles, and so increasing the jumper's landing velocity, which may increase injury risk.

