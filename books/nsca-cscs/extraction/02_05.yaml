TYPE
Definition

TITLE
Valsalva Maneuver

PAGE
164

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
In the Valsalva maneuver, the glottis is closed, thus keeping air from escaping the lungs, and the muscles of the abdomen and rib cage contract, creating rigid compartments of liquid in the lower torso and air in the upper torso.

END

TYPE
Warning

TITLE
Valsalva Maneuver Side Effects

PAGE
164-165

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
However, pressure in the chest associated with the Valsalva maneuver can have the undesirable side effect of exerting compressive force on the heart, making it more difficult for blood to return to the heart. Also, the Valsalva maneuver can transiently raise blood pressure to slightly elevated levels (20).

END

TYPE
Recommendation

TITLE
Safer Alternative to Valsalva Maneuver

PAGE
165

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
The diaphragm and the abdominal muscles can contract without the glottis being closed, however, creating the fluid ball in the abdomen without pressurizing the chest compartment. This must be regarded as the safer way, of the two options, to add support to the lower spine without building up pressure in the chest, and it is the technique that should be used for most resistance training.

END

TYPE
Recommendation

TITLE
Weight Belt Usage Guidelines

PAGE
165

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
Conservative recommendations are as follows: A weight belt is not needed for exercises that do not directly affect the lower back. For exercises directly stressing the back, an individual should refrain from wearing a belt during lighter sets but may wear one for near-maximal and maximal sets. The beltless sets allow the deep abdominal muscles, which generate intra-abdominal pressure, to receive a training stimulus without placing excessive compressive forces on the intervertebral disks. Individuals may reasonably choose never to wear lifting belts if they build up the strength of their back muscles and the muscles that generate intra-abdominal pressure in a gradual and systematic manner and if they practice safe resistance training exercise techniques.

END

TYPE
Warning

TITLE
Risk of Sudden Belt Removal

PAGE
165

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
It is particularly risky for an individual who has become accustomed to wearing a belt to suddenly perform an exercise without one, because the abdominal musculature might not be capable of generating enough intra-abdominal pressure to significantly reduce erector spinae muscle forces.

END

TYPE
Warning

TITLE
Knee Wrap Side Effects

PAGE
167-168

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
Detrimental side effects have been reported, however, including skin damage and chondromalacia patellae, the wearing down and roughening of the posterior surface of the patella (36).

END

TYPE
Recommendation

TITLE
Minimize Use of Knee Wraps

PAGE
168

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
On the basis of the lack of evidence that knee wraps prevent injury, athletes should minimize their use. If used at all, knee wraps should be limited to the sets with the heaviest loads.

END