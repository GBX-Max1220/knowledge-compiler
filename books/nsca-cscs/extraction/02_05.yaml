TITLE
Low Injury Rate of Resistance Training

PAGE
161

SECTION
2.5 — Joint Biomechanics

ORIGINAL TEXT
Rates of injury are the highest for team sports; intermediate for running and aerobics; and lowest for cycling, walking, and resistance training, the latter of which has about 4 injuries per 1,000 hours of participation.

END

