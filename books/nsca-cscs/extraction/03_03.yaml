ORIGINAL TEXT
Increases in relative exercise intensity of 50%, 75%, and 100% of maximal oxygen uptake result in increases in the rate of muscle glycogenolysis (the breakdown of glycogen) of 0.7, 1.4, and 3.4 mmol · kg−1 · min−1, respectively (133).

