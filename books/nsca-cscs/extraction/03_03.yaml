TYPE
Evidence

TITLE
Similar Response in Younger and Older Resistance-Trained Male Muscle Oxidative Capacity Following Endurance Training

PAGE
207

SECTION
3.3 — Substrate Depletion and Repletion

ORIGINAL TEXT
Hendrickse and colleagues (77) tested the hypothesis that superimposing endurance training in both older and younger highly resistance-trained men would lead to an increase in fiber oxidative capacity and a decrease in fiber size. Eight highly resistance-trained younger (mean age = 28 years) and seven older (mean age = 67 years) men participated in a 10-week cycle endurance-training program consisting of five 6-minute intervals at 75% max heart rate (HRmax) separated by 4-minute intervals at 90% HRmax, superimposed on their usual resistance training program of at least 4 sessions per week (2 upper body, 2 lower body). Before and after the 10 weeks of training, V̇O2max, body fat percentage, an MRI of the upper leg, the maximal voluntary isometric contraction torque (MVC) of the knee extensor muscles, and a vastus lateralis muscle biopsy were taken. While there were expected differences in anatomical cross-sectional area of the thigh muscles, following training no relative difference was observed between younger and older men for V̇O2max per kilogram body mass. The imposed endurance training equally increased the succinate dehydrogenase (a Krebs cycle enzyme) activity in both younger and older participants and significantly increased the number of capillaries around type I fibers. These findings suggest that incorporating endurance training into a resistance training program can promote aerobic metabolic adaptations without compromising muscle size and strength in both younger and older resistance-trained people.

END

