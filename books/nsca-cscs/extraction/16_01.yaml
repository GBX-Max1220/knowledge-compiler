## Item 32

**TYPE**
Warning

**TITLE**
Incorrect Dumbbell Spotting Location

**PAGE**
957-958

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
Although some individuals advocate spotting dumbbell movements by placing the hands on the athlete's upper arms or elbows (figure 16.3a), this technique may lead to injury. If the athlete's elbows "collapse" (i.e., flex), the spotter will not be in a position to stop the dumbbells from striking the athlete's face or chest.

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

END

## Item 33

**TYPE**
Recommendation

**TITLE**
Do Not Spot Power Exercises

**PAGE**
958

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
Power exercises are not spotted due to the safety factors for the athlete and the spotter or spotters, and athletes should be taught how to miss properly when learning these exercises.

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

END

## Item 34

**TYPE**
Recommendation

**TITLE**
Athlete Escape Technique for Power Exercises

**PAGE**
958

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
Athletes should be instructed that when they miss the bar in front, they should push the bar away or simply drop it. They should be taught that if they lose the bar behind the head, they should release it and jump forward.

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

END

## Item 35

**TYPE**
Recommendation

**TITLE**
Liftoff Communication Protocol

**PAGE**
960

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
If a liftoff is needed or requested, the athlete and spotter need to agree in advance on a verbal signal (e.g., the command "up" or "I will give it to you on the count of three"). Typically, the athlete signals that he or she is ready; the spotter says, "One, two, three," and on "three" the bar is moved into position.

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

END

## Item 36

**TYPE**
Recommendation

**TITLE**
Spotting Assistance Amount and Timing

**PAGE**
960-961

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
At the first indication that a repetition will be missed, the athlete should quickly ask or signal the spotter (sometimes with just a grunt or sound) for help, and the spotter needs to immediately attempt to provide the amount of assistance needed.

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

END

## Item 37

**TYPE**
Recommendation

**TITLE**
Athlete Safety During Spotting

**PAGE**
961

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
The athlete should try to stay with the bar until it is racked or placed safely on the floor. This helps to protect both the spotter and athlete from injury.

