## Item 11

**TYPE**
Definition

**TITLE**
Five-Point Body Contact Position

**PAGE**
951

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
The athlete should position the body to achieve a five-point body contact position: 1. Head is placed firmly on the bench or back pad. 2. Shoulders and upper back are placed firmly and evenly on the bench or back pad. 3. Buttocks are placed evenly on the bench or seat. 4. Right foot is flat on the floor. 5. Left foot is flat on the floor.

**PARENT**

**CHILDREN**

**RELATIONSHIPS**

