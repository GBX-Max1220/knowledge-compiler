## Item 25

**TYPE**
Recommendation

**TITLE**
Valsalva Maneuver Duration Limit

**PAGE**
953-954

**SECTION**
16.1 — Exercise Technique for Free Weight and Machine Training

**ORIGINAL TEXT**
the breath-holding phase is—and should be—quite transient, only about 1 to 2 seconds (at most). Even a very well-trained individual should not extend the length of the breath-holding phase, because blood pressure can quickly rise to triple resting levels (7).

