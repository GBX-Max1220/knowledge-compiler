TYPE
Definition

TITLE
Carbohydrate Definition

PAGE
556

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Carbohydrate primarily serves as a source of energy. However, carbohydrate is not an essential nutrient, because the body can break down the carbon skeletons of certain amino acids and convert them into glucose (i.e., gluconeogenesis). Carbohydrates are composed of carbon, hydrogen, and oxygen. Carbohydrates can be classified into three groups according to the number of sugar (saccharide) units they contain: monosaccharides, disaccharides, and polysaccharides.

CHILDREN
Monosaccharides, Disaccharides, Polysaccharides

END

TYPE
Definition

TITLE
Monosaccharides

PAGE
556

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Monosaccharides (glucose, fructose, and galactose) are single-sugar molecules. In the body, glucose is present as circulating sugar in the blood, where it is used as the primary energy substrate for cells. In addition, glucose molecules make up glycogen, a polysaccharide stored in muscle and liver cells. In food, glucose is typically combined with other monosaccharides to form various sugars, such as sucrose. Isolated glucose found in candy or sport drinks is found in the form of dextrose, a chemical isomer of glucose. Fructose has the same chemical formula as glucose, but because the atoms are arranged differently, it tastes much sweeter and has different properties. Fructose accounts for the sweet taste of honey and occurs naturally in fruits and vegetables. In the body, fructose causes less insulin secretion than other sugars, which has made it a focus of much research in the area of aerobic endurance performance. Galactose, the third monosaccharide, combines with glucose to form lactose, milk sugar.

PARENT
Carbohydrate Definition

END

TYPE
Definition

TITLE
Disaccharides

PAGE
559

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Disaccharides (sucrose, lactose, and maltose) are composed of two simple sugar units joined together. Sucrose (or table sugar), the most common disaccharide, is a combination of glucose and fructose. Sucrose occurs naturally in most fruits and is crystallized from the syrup of sugar cane and sugar beets to make brown, white, or powdered sugar. Lactose (glucose + galactose) is found only in mammalian milk. Maltose (glucose + glucose) occurs primarily when polysaccharides are broken down during digestion. It also occurs in the fermentation process of alcohol and is the primary carbohydrate in beer.

PARENT
Carbohydrate Definition

END

TYPE
Definition

TITLE
Polysaccharides

PAGE
560

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Polysaccharides, also known as complex carbohydrates, contain up to thousands of glucose units. Some of the most common polysaccharides of nutritional importance are starch, fiber, and glycogen. Starch is the storage form of glucose in plants. Grains, legumes, and vegetables are good sources of starch. Before starch can be used as a source of energy, it must be broken down into glucose components. Dietary fiber, a constituent of the plant cell wall, is also a form of carbohydrate. Cellulose, hemicellulose, beta-glucans, and pectins are fibers; these and noncarbohydrate fibrous materials (lignins) are partially resistant to human digestive enzymes. Fibers have different physiological effects in the body. Some delay gastric emptying, which may temporarily influence feelings of fullness, while other types of fiber increase bulk and water content, reducing constipation and decreasing transit time of feces. In addition, some soluble fibers decrease the absorption of cholesterol and may therefore help reduce blood cholesterol levels after ingestion (104), while prebiotic dietary fibers selectively stimulate the growth of bacteria in the gut (33, 133). Fiber-rich foods include beans, peas, bran, many fruits and vegetables, and some whole-grain foods.

PARENT
Carbohydrate Definition

CHILDREN
Glycogen

END

TYPE
Definition

TITLE
Glycogen

PAGE
560

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Glycogen is found in small (80, 161) amounts in human liver and muscle, totaling approximately 15 grams of glycogen per kilogram body weight (1) and in animal tissue as a temporary source of stored energy (22). While present in animal meats we eat such as steak, chicken breast, and fish fillets, it is not present to any large extent. When glucose enters the muscles and liver, if it is not metabolized for energy it can be synthesized to form glycogen. Three-quarters of the glycogen in the body is stored in skeletal muscle; the remaining quarter is stored in the liver (22). The process of converting glucose to glycogen is called glycogenesis.

PARENT
Polysaccharides

END

TYPE
Definition

TITLE
Glycemic Index (GI)

PAGE
561

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
The glycemic index (GI) ranks carbohydrates according to how quickly they are digested and absorbed, and therefore raise blood glucose levels, in the 2-hour time period after a meal, compared to the same amount (by weight in grams) of a reference food, typically white bread or glucose, which is given a GI of 100 (78).

END

TYPE
Formula

TITLE
Glycemic Index Formula

PAGE
561

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Glycemic index = Incremental area under the curve for the blood glucose response after consumption of a 25 or 50g carbohydrate portion of a test food ÷ Incremental area under the curve for the blood glucose response after consumption of the same portion (in grams) of a standard food × 100 (10.1)

END

TYPE
Definition

TITLE
Glycemic Load (GL)

PAGE
563

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
The glycemic load (GL) takes the amount of carbohydrate, in grams, in a portion of food into account — a factor that also influences glycemic response. Because GL takes portion size into account, it is a more realistic gauge of glycemic response than the GI, which is based on a standard serving size.

END

TYPE
Formula

TITLE
Glycemic Load Formula

PAGE
563

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Glycemic load = GI of an individual food × grams of carbohydrate per serving of food ÷ 100 (10.2)

END

TYPE
Definition

TITLE
Food Allergy Definition

PAGE
564

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
A food allergy is defined as "an adverse health effect arising from a specific immune response that occurs reproducibly on exposure to a given food," and a food sensitivity, also known as food intolerance, is defined as "nonimmune reactions that include metabolic, toxic, pharmacologic, and undefined mechanisms" (17).

END

TYPE
Definition

TITLE
Lipids and Triglycerides

PAGE
564

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Although the terms fat and lipid are often used interchangeably, lipid is a broader term. Lipids include triglycerides (fats and oils) as well as related fatty compounds, such as sterols and phospholipids. The lipids of greatest significance in nutrition are triglycerides, fatty acids, phospholipids, and cholesterol. Triglycerides are formed by the union of glycerol with three fatty acids. The majority of lipids found in foods and in the body are in the triglyceride form, and within this chapter the term fat refers to triglycerides.

END

TYPE
Definition

TITLE
Saturated Fatty Acids

PAGE
567

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Saturated fatty acids have no double bonds, and their carbon molecules are saturated with hydrogen. Saturated fatty acids are used for certain physiological and structural functions, but the body can make these fatty acids; therefore, there is no dietary requirement for saturated fatty acids.

END

TYPE
Definition

TITLE
Unsaturated Fatty Acids

PAGE
567

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Unsaturated fatty acids contain some carbon molecules that are joined together by double bonds, making them more chemically reactive. Fatty acids containing one double bond are monounsaturated. With two or more double bonds, a fatty acid is polyunsaturated.

END

TYPE
Definition

TITLE
Essential Fatty Acids

PAGE
567

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Two polyunsaturated fatty acids are considered essential, meaning that the body cannot make them: omega-6 and omega-3 fatty acids. These two fatty acids are necessary for the formation of healthy cell membranes, proper development and functioning of the brain and nervous system, and hormone production.

END

TYPE
Definition

TITLE
Cholesterol

PAGE
568

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Cholesterol is a waxy, fat-like substance that is an important structural and functional component of all cell membranes. Additionally, cholesterol is used for the production of bile salts, vitamin D, and several hormones, including the sex hormones (estrogen, androgen, and progesterone) as well as cortisol.

END

TYPE
Definition

TITLE
Vitamins

PAGE
575

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Vitamins are organic substances (i.e., containing carbon atoms) needed in very small amounts to perform specific metabolic functions (71, 166). Vitamins typically act as coenzymes, facilitating numerous reactions in the body. For instance, B vitamins help the body make energy from the metabolism of carbohydrates.

END

TYPE
Recommendation

TITLE
Protein Recommendation for Athletes

PAGE
556

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Athletes require more than the RDA for protein to build and repair muscle. Depending on the sport and the training program, 1.2 to 2.0 grams per kilogram body weight of protein is recommended.

END

