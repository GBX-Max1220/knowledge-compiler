Recommendation

TITLE
Strength Athlete Protein Recommendation

PAGE
573

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Strength athletes should consume 1.4 to 2.0 grams of protein per kilogram body weight per day.

END

TYPE
Recommendation

TITLE
Protein Timing Recommendation

PAGE
573

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Ingest 20 to 40 grams (0.25-0.40 g of protein per kg of body mass) of high-quality protein every 3 to 4 hours throughout the day.

END

TYPE
Recommendation

TITLE
Saturated Fat Limitation Recommendation

PAGE
569

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
For optimal cardiovascular health, and risk reduction of chronic diseases, the Scientific Report of the 2020 Dietary Guidelines Advisory Committee recommends limiting saturated fat to less than 10% of total calories and replacing saturated fat with unsaturated fat, particularly polyunsaturated fat.

END

TYPE
Recommendation

TITLE
Added Sugar Limitation Recommendation

PAGE
569

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
In addition, it is advised that added sugars, particularly from sugar-sweetened beverages, desserts, sweet snacks, candies, and sweetened breakfast cereals, are consumed at a maximum of 10% of total calories (154).

END

TYPE
Recommendation

TITLE
Alcohol Consumption Recommendation

PAGE
574

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
If alcohol is consumed, it should be consumed in moderation—up to one drink per day for women and two drinks per day for men— and only by adults of legal drinking age. Pregnant women should avoid alcohol, and breastfeeding women should be cautious about their intake if they choose to drink and speak to their healthcare provider. Alcohol should be avoided in the time period after exercise because it reduces muscle protein synthesis (124).

END

TYPE
Recommendation

TITLE
Carbohydrate Intake Recommendation

PAGE
574

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Reduce intake of calories from added sugars. Increase intake of vegetables (prepared without added salt or fat) and fruit (prepared without added sugars). Eat a variety of vegetables, including beans; peas; starchy; and dark-green, red, and orange vegetables. Consume at least half of all total grains as whole grains. Individuals who eat refined grains should choose enriched grains.

END

TYPE
Recommendation

TITLE
Fiber DRI Recommendation

PAGE
563

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
The DRI for fiber ranges from 21 to 25 grams per day for women (depending on age, pregnancy, and lactation) and 30 to 38 grams per day for men based on age group.

END

