Recommendation

TITLE
Aerobic Endurance Athlete Protein Recommendation

PAGE
573

SECTION
10.3 — Macronutrients

ORIGINAL TEXT
Aerobic endurance athletes should consume 1.2 to 2.0 grams of protein per kilogram body weight per day.

END

