8.2 — Training Responses and Adaptations

ORIGINAL TEXT
Female endurance athletes have been shown to be more fatigue resistant during prolonged events, despite having overall lower aerobic capacity (V̇O2max) relative to body size and slower performance times than males (17, 48).

