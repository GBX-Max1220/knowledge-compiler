TITLE
Pelvic Floor Dysfunction (PFD)

PAGE
449

SECTION
8.2 — Training Responses and Adaptations

ORIGINAL TEXT
Pelvic floor dysfunction (PFD) is a term used to identify various impairments of the pelvic floor muscles that support the pelvic organs and promote continence (99, 107).

CHILDREN
Urinary Incontinence (UI), Stress Urinary Incontinence (SUI)

RELATIONSHIPS
None

