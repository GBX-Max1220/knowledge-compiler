TITLE
Sleep deprivation threshold for female collegiate athletes

PAGE
449

SECTION
8.2 — Training Responses and Adaptations

ORIGINAL TEXT
Female collegiate athletes may be particularly likely to have low sleep durations that are consistent with sleep deprivation (<7 h/night), in association with daytime sleepiness and dysfunction (30, 69).

END

TYPE
Recommendation

TITLE
Recommendations for improving female health outcomes

PAGE
450

SECTION
8.2 — Training Responses and Adaptations

ORIGINAL TEXT
To help females improve their health outcomes, strength and conditioning professionals should do the following:
Recommend working with appropriate medical staff to provide resources and services as needed when they have identified signs and symptoms of concerns that increase risk of health issues
Encourage females to seek services from a mental health provider when initial symptoms of mental health disorders arise
Educate females on the appropriate amount and quality of sleep needed and the important role it plays in the body’s recovery and for decreasing risk of injury
Provide information to females about the variety of impairments that can occur in the pelvic floor and encourage females to seek a specialized physical therapist in PFD when signs and symptoms occur

END

TYPE
Recommendation

TITLE
Recommendation for pelvic floor dysfunction management

PAGE
449

SECTION
8.2 — Training Responses and Adaptations

ORIGINAL TEXT
Programs should include prevention, lifestyle modifications, pelvic floor strengthening, biofeedback, and pharmacological interventions. Female athletes should be taught how to properly engage their pelvic floor muscles and abdominal wall muscles, and in some cases may need to see a physical therapist that specializes in PFD.

END

TYPE
Evidence

TITLE
Prevalence of urinary incontinence in female athletes

PAGE
449

SECTION
8.2 — Training Responses and Adaptations

ORIGINAL TEXT
It has been reported that UI in female athletes occurs 5 times more compared to male athletes, and 2.7 times more compared to sedentary females (42, 150, 164, 172). Female athletes have an overall 27% prevalence of UI compared to male athletes, and a 36% prevalence of UI compared to sedentary females (42, 150, 164, 172).

END

TYPE
Evidence

TITLE
Similar short-term muscle hypertrophy gains between sexes

PAGE
451

SECTION
8.2 — Training Responses and Adaptations

ORIGINAL TEXT
When sophisticated techniques (e.g., computed tomography) are used to accurately measure changes in muscle cross-sectional area, relative short-term (up to 16 weeks) gains in muscle hypertrophy are similar between sexes (43, 67).

END

