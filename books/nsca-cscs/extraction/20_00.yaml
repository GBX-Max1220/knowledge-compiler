Training activities aimed at improving SSC performance should fulfill two criteria (47, 82, 83, 91, 98):
They should involve skillful, multijoint movements that transmit forces through the kinetic chain and exploit elastic–reflexive mechanisms.
To manage fatigue and emphasize work quality and technique, they should be structured around brief work bouts or clusters separated by frequent rest pauses.

