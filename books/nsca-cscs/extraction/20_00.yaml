TITLE
Agility development steps

PAGE
1473

SECTION
Chapter 20 — Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
The following is an example of steps for determining the appropriate tests, analyzing the results, and using them to program agility development of an athlete. Because agility performance is underpinned by multiple factors, one should target the largest window of opportunity through direct assessment of the strengths and weaknesses of the athlete.
Step 1. Perform a needs analysis of the sport and match tests appropriately to assess these qualities (table 20.9).
Step 2. Determine strengths and weaknesses by comparing results as a standardized score to performance standards or team mean (figure 20.13).
Step 3. Plan the development of a primary area of need and a secondary area of need for the athlete.
Step 4. Distribute the time available for this development based on need identification.
Step 5. Provide a preliminary plan for transition of percent distribution through the training blocks (table 20.10). Determine if this progression is appropriate by monitoring the development of COD and agility as described in table 20.8 (e.g., COD deficit).

