Chapter 20 — Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
Control the trunk leading into the deceleration (decrease large amounts of trunk motion) (80). When decelerating, posterior trunk lean may assist in orienting the force vector posteriorly.
Through the stance phase, reorient the trunk and hips toward the direction of intended travel to allow for a more effective reacceleration (22) and to reduce the redirection demands for a more effective position to produce force (35).
Just as with acceleration mechanics, body lean is paramount in allowing proper force application through the ground with strong alignment of the ankle, knee, and hip to the trunk and shoulders.
Enter and exit changes in direction with a lower center of mass to increase stability and to enable a manipulation of the base of support relative to the center of mass (89).

