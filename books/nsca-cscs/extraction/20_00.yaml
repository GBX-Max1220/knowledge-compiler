Ensure that the athlete can effectively dissipate or tolerate the eccentric braking loads through an effective range of motion at the hip, knee, and ankle (i.e., co-triple flexion) and avoid a stiff-legged braking style (92, 94).
Emphasize a firm base of support for effective push-off and manipulation of base of support relative to center of mass (i.e., wide lateral foot plant when cutting, large anterior foot placement when turning) while pushing the ground away in order to enhance performance (i.e., rapid simultaneous triple extension of ankle, knee, and hip), especially while learning in closed drills. External focus of attention—through instructions to concentrate on the ground instead of a body part—has been shown to improve COD performance (76).

