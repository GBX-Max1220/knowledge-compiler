TYPE
Recommendation

TITLE
Resisted sprinting practical use

PAGE
1434-1435

SECTION
Chapter 20 — Program Design and Technique for Speed and Agility Training

ORIGINAL TEXT
Strength and conditioning professionals and athletes attempting to improve the acceleration phase of a sprint may adopt resistance training modalities that maintain normal biomechanics involved in unresisted sprints.
Loads should be chosen based on the sporting context while also considering the athlete's physical status. For instance, track and field sprinters may use loads that do not decrease running velocity by more than 10% to 12% (2, 49, 52, 61).
In contrast, field sport athletes who overcome external resistance while blocking, tackling, and scrimmaging can use loads 20% to 30% of body weight to improve the initial 5-10 m of movement (28, 52). Frictional properties will influence the amount of resistance experienced, thus prescribing sled pushes and pulls based on velocity decrements is suggested (19, 20).

