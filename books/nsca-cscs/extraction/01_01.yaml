TYPE
Definition

TITLE
Sliding-Filament Theory of Muscular Contraction

PAGE
52

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The sliding-filament theory was proposed by Huxley and Hanson in 1954 to mechanistically explain muscular contraction at the molecular level (22). In its simplest form, the sliding-filament theory indicates that actin filaments anchored to each end of the sarcomere slide inward on myosin filaments. This results in Z-lines being pulled toward the center of the sarcomere and in muscle fiber shortening (figure 1.7). As actin filaments slide over myosin filaments, both the H-zone and I-band shrink. The energy-dependent association of myosin heads with actin filaments (i.e., actin-myosin crossbridge formation), as well as the energy-dependent inward movement of actin filaments over the myosin filaments through what is termed the power stroke, are the bases for muscle contraction.

END

TYPE
Definition

TITLE
Motor Unit

PAGE
43

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
A motor neuron and the muscle fibers it innervates are called a motor unit. All the muscle fibers of a motor unit contract together when they are stimulated by the motor neuron.

END

TYPE
Definition

TITLE
Neuromuscular Junction

PAGE
43

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The junction between a motor neuron (nerve cell) and the muscle fibers it innervates is called the motor end plate, or, more often, the neuromuscular junction (figure 1.4).

END

TYPE
Definition

TITLE
Sarcomere

PAGE
48

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Myosin and actin filaments are organized longitudinally in the smallest contractile unit of skeletal muscle termed the sarcomere. Sarcomeres average about 2.5 μm in length in a relaxed fiber (approximately 4,500 per centimeter of muscle length) and are repeated through the entire length of myofibrils that span the muscle fiber (4).

END

TYPE
Definition

TITLE
Sarcoplasmic Reticulum

PAGE
51

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Each myofibril is encased by an intricate system of tubules, called the sarcoplasmic reticulum (figure 1.5, page 5), which terminates as vesicles in the vicinity of the Z-lines. Calcium ions are stored in the sarcoplasmic reticulum, and muscle activation leads to the release of these calcium stores to facilitate muscular contraction.

END

TYPE
Definition

TITLE
Action Potential

PAGE
51

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Discharge of an action potential (an electrical nerve impulse) arrives nearly simultaneously from the surface to all depths of the muscle fiber. Calcium is thus released throughout the muscle fiber, producing a coordinated contraction of the entire cell.

END

TYPE
Definition

TITLE
Crossbridge Cycling

PAGE
54

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
So long as calcium ions remain bound to troponin during muscle activation, contiguous rapid rounds of actin-myosin crossbridge formation, power strokes, and actin-myosin crossbridge dissociation will occur, and this is termed crossbridge cycling.

END

TYPE
Definition

TITLE
Resting Phase

PAGE
53

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
When a muscle is not active, low levels of calcium are present in the myofibrils of muscle fibers (most of it is stored in the sarcoplasmic reticulum), so very few actin-myosin crossbridges are formed.

END

TYPE
Definition

TITLE
Excitation–Contraction Coupling Phase

PAGE
53

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
When a motor neuron activates a muscle fiber, a cascade of events occur that stimulate the sarcoplasmic reticulum to release calcium ions into the myofibrils of the muscle fiber. Secreted calcium ions bind with a high affinity to the troponin protein, which exists at regular intervals along the actin filament (figure 1.6). This calcium-troponin interaction causes a shift in another protein termed tropomyosin, which is bound to troponin and spans the length of the actin filament. These events expose the myosin binding site on actin and enable the myosin head to attach to the actin filament to form an actin-myosin crossbridge (4).

END

TYPE
Definition

TITLE
Contraction Phase

PAGE
54

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The contraction phase involves the mechanical movement (or pivoting) of the myosin head from the resting phase when the actin-myosin crossbridge is formed, which leads to the pulling of the associated actin filament to the center of the sarcomere. Critically, this mechanical movement is catalyzed from the biochemical energy provided by the hydrolysis (or breakdown) of adenosine triphosphate (ATP) by the myosin adenosine triphosphatase (ATPase) enzyme present on the myosin head. The products of ATP hydrolysis include adenosine diphosphate (ADP) and inorganic phosphate (Pi), metabolites that also serve critical roles in the contraction process.

END

TYPE
Procedure

TITLE
Steps of the Contraction Phase

PAGE
54

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
1. The myosin head hydrolyzes ATP into ADP and Pi, both of which remain bound to the myosin head. The energy provided by this biochemical reaction results in a conformational change whereby the myosin head is cocked into a high-energy state.
2. In its high-energy state, the myosin head binds to actin to form the actin-myosin crossbridge.
3. The release of Pi from the myosin head catalyzes a confirmational change in the myosin molecule, leading to the power stroke, which is the pivoting of the myosin head that pulls the actin filament toward the center of the sarcomere.
4. Following the first power stroke, ADP is released from the myosin head and another ATP molecule binds to the myosin head.
5. The actin-myosin crossbridge is subsequently dissociated, the myosin head returns to its original low-energy state and conformation, and the process is repeated with the hydrolysis of the newly bound ATP molecule.

END

TYPE
Definition

TITLE
Relaxation Phase

PAGE
55

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Relaxation occurs when the stimulation of the motor neuron ceases. Calcium is pumped back into the sarcoplasmic reticulum through specialized transporters that also require ATP, and the restoration of low calcium ion concentrations in myofibrils highly reduces the number of actin-myosin crossbridges.

END

TYPE
Definition

TITLE
Uniaxial Joints

PAGE
41

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Uniaxial joints, such as the elbow, operate as hinges, essentially rotating about only one axis.

END

TYPE
Definition

TITLE
Biaxial Joints

PAGE
41

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Biaxial joints, such as the ankle and wrist, allow movement about two perpendicular axes.

END

TYPE
Definition

TITLE
Multiaxial Joints

PAGE
41

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Multiaxial joints, including the shoulder and hip ball-and-socket joints, allow movement about all three perpendicular axes that define space.

END

TYPE
Definition

TITLE
Fibrous Joints

PAGE
40

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Fibrous joints (e.g., sutures of the skull) allow virtually no movement.

END

TYPE
Definition

TITLE
Cartilaginous Joints

PAGE
40

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Cartilaginous joints (e.g., intervertebral disks) allow limited movement.

END

TYPE
Definition

TITLE
Synovial Joints

PAGE
40

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Synovial joints (e.g., elbow and knee) allow considerable movement. Movements in relation to sports and exercise mainly occur at synovial joints, whose most important features are low friction and large range of motion.

END

TYPE
Definition

TITLE
Axial Skeleton

PAGE
39

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The axial skeleton consists of the skull (cranium), vertebral column (vertebra C1 through the coccyx), ribs, and sternum.

END

TYPE
Definition

TITLE
Appendicular Skeleton

PAGE
39

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The appendicular skeleton includes the shoulder (or pectoral) girdle (left and right scapula and clavicle); bones of the arms, wrists, and hands (left and right humerus, radius, ulna, carpals, metacarpals, and phalanges); the pelvic girdle (left and right coxal or innominate bones); and the bones of the legs, ankles, and feet (left and right femur, patella, tibia, fibula, tarsals, metatarsals, and phalanges).

END

TYPE
Definition

TITLE
Epimysium

PAGE
42

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Fibrous connective tissue, or epimysium, covers the body's more than 430 skeletal muscles. The epimysium is contiguous with the tendons at the ends of the muscle (figure 1.3).

END

TYPE
Definition

TITLE
Perimysium

PAGE
42

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Under the epimysium the muscle fibers are grouped in bundles (fasciculi) that may consist of up to 150 fibers, with the bundles surrounded by connective tissue called perimysium.

END

TYPE
Definition

TITLE
Endomysium

PAGE
42

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Each muscle fiber is surrounded by connective tissue called endomysium, which is encircled by and is contiguous with the muscle fiber membrane, or sarcolemma (41).

END

TYPE
Definition

TITLE
Sarcolemma

PAGE
42

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Each muscle fiber is surrounded by connective tissue called endomysium, which is encircled by and is contiguous with the muscle fiber membrane, or sarcolemma (41).

END

TYPE
Definition

TITLE
Tendon

PAGE
42

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The tendon is attached to bone periosteum, a specialized connective tissue covering all bones.

END

TYPE
Definition

TITLE
Periosteum

PAGE
42

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The tendon is attached to bone periosteum, a specialized connective tissue covering all bones.

END

TYPE
Definition

TITLE
Myofibrils

PAGE
47

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Hundreds of myofibrils (each about 1 μm in diameter, 1/100 the diameter of a hair) exist in the sarcoplasm of one muscle fiber. Myofibrils are the contractile machinery of muscle fibers.

END

TYPE
Definition

TITLE
Myosin

PAGE
47

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The thicker myosin filaments (about 16 nm in diameter, or 1/10,000 the diameter of a hair) contain up to 200 myosin molecules. A single myosin molecule consists of two myosin heavy chain proteins and four myosin light chain proteins.

END

TYPE
Definition

TITLE
Actin

PAGE
47

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The thin actin filaments (about 6 nm in diameter) consist of two strands arranged in a double helix.

END

TYPE
Definition

TITLE
Crossbridge

PAGE
47

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
When examining a thick filament containing hundreds of myosin molecules, the globular heads protrude away from the thick filament at regular intervals, and the head-like structures form crossbridges with actin filaments during muscle contraction.

END

TYPE
Definition

TITLE
A-band

PAGE
48

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The dark A-band corresponds with the alignment of the myosin filaments.

END

TYPE
Definition

TITLE
I-band

PAGE
48

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The light I-band corresponds with the areas in two adjacent sarcomeres that contain only actin filaments (41).

END

TYPE
Definition

TITLE
Z-line

PAGE
48

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The Z-line is in the middle of the I-band and appears as a thin, dark line running longitudinally through the I-band.

END

TYPE
Definition

TITLE
H-zone

PAGE
48

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The H-zone is the area in the center of the sarcomere, where only myosin filaments are present.

END

TYPE
Definition

TITLE
M-line

PAGE
50

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Thick filaments are anchored to specialized proteins in the M-line, which is in the center of the sarcomere (the center of the H-zone).

END

TYPE
Definition

TITLE
Troponin

PAGE
53

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Secreted calcium ions bind with a high affinity to the troponin protein, which exists at regular intervals along the actin filament (figure 1.6).

END

TYPE
Definition

TITLE
Tropomyosin

PAGE
53

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
This calcium-troponin interaction causes a shift in another protein termed tropomyosin, which is bound to troponin and spans the length of the actin filament.

END

TYPE
Definition

TITLE
Power Stroke

PAGE
52

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
The energy-dependent inward movement of actin filaments over the myosin filaments through what is termed the power stroke.

END

TYPE
Evidence

TITLE
Resistance Training and Bone Density

PAGE
41

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Several research studies have supported resistance training as yielding positive bone adaptations. Hence, consistently lifting heavy loads during job tasks or via resistance training increases bone density and bone mineral content. Consistently performing more explosive movements with impact facilitates similar adaptations. Some of the highest bone densities have been observed in people who engage in gymnastics or other activities that involve high-strength, high-power, or high-impact movements (29).

END

TYPE
Recommendation

TITLE
Progressive Overload for Bone Adaptations

PAGE
41

SECTION
01.01 — Introduction and Musculoskeletal System

ORIGINAL TEXT
Since bone adaptations occur less rapidly compared to skeletal muscle, the consistent implementation of progressive overload is important to facilitate positive adaptations.

END

