TITLE
Muscle Fiber Interior Structure

PAGE
43

SECTION
1 — Structure and Function of Body Systems

ORIGINAL TEXT
The interior structure of a muscle fiber is depicted in figure 1.5. The sarcoplasm, which is the cytoplasm of a muscle fiber, is an aqueous medium through which the exchange of ions (sodium, potassium, calcium) and metabolites (ADP, ATP, inorganic phosphate) occur to and from different organelles. Not only is the sarcoplasm of critical importance to muscle fibers because of this role, but intracellular organelles and structures are also suspended in the sarcoplasm. These organelles and structures include the contractile apparatus constructed of thick and thin protein filaments, other proteins including metabolic enzymes and signaling proteins, stored glycogen and fat particles, ribosomes that facilitate protein synthesis, and specialized organelles such as mitochondria and the sarcoplasmic reticulum.

