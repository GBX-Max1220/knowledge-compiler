TITLE
Neuromuscular Junction

PAGE
43

SECTION
1 — Structure and Function of Body Systems

ORIGINAL TEXT
The junction between a motor neuron (nerve cell) and the muscle fibers it innervates is called the motor end plate, or, more often, the neuromuscular junction (figure 1.4). Each muscle cell has only one neuromuscular junction, although a single motor neuron innervates many muscle fibers, sometimes hundreds or even thousands. A motor neuron and the muscle fibers it innervates are called a motor unit. All the muscle fibers of a motor unit contract together when they are stimulated by the motor neuron.

