END

TYPE
Recommendation

TITLE
Estimating Maximal Heart Rate

PAGE
84

SECTION
1 — Structure and Function of Body Systems

ORIGINAL TEXT
A simple estimate of maximal heart rate is to subtract one's age from 220; for example, the estimated maximal heart rate for a 47-year-old person is 220 – 47 (age in years) = 173 beats/min. The variance, or standard deviation, around this estimate is ±10 to 12 beats/min; thus the actual maximal heart rate for this individual could be expected to fall within the range of 161 to 185 beats/min. A meta-analysis determined that the equation 208 – 0.7 × age could be used in healthy adults to more accurately predict maximal heart rate (40).

END

TYPE
Recommendation

TITLE
Improving Force Production in Athletes

PAGE
66

SECTION
1 — Structure and Function of Body Systems

ORIGINAL TEXT
Incorporate phases of training that use heavier loads (or explosive actions) to optimize motor unit recruitment and firing frequency patterns. Also incorporate phases of training that promote skeletal muscular hypertrophy given that more myofibrils (and thus more actin-myosin crossbridges) will be available for near-maximal muscle contractions. Finally, implement training methods that specifically target movements where increases in force are desired (e.g., heavy bench press and back squat exercises for increasing pushing forces).

END

