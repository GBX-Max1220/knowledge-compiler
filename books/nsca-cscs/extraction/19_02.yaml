ORIGINAL TEXT
Balance is the maintenance of a position without movement for a given period of time.

END

TYPE
Recommendation

TITLE
Landing Surface Recommendations for Plyometrics

PAGE
1296-1297

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
A grass field, suspended floor, or rubber mat is a good surface choice (36). Surfaces such as concrete, tile, and hardwood are not recommended because they lack effective shock-absorbing properties (36).

END

TYPE
Recommendation

TITLE
Footwear Recommendations for Plyometrics

PAGE
1298

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Athletes must use footwear with good ankle and foot support; good lateral stability; and a wide, nonslip sole (50).

END