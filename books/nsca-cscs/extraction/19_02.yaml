END

TYPE
Definition

TITLE
Progressive Overload (Plyometric Training)

PAGE
1278

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Plyometrics is a form of resistance training and thus must follow the principles of progressive overload, which is the systematic increase in training frequency, volume, and intensity in various combinations.

PARENT
Plyometric Program Design Variables

END

TYPE
Recommendation

TITLE
Program Length for Plyometric Training

PAGE
1281

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Currently, most programs range from 6 to 10 weeks (2, 34); however, vertical jump height improves as quickly as four weeks after the start of a plyometric training program (54).

END

TYPE
Procedure

TITLE
Steps for Implementing a Plyometric Training Program

PAGE
1282

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Steps for Implementing a Plyometric Training Program
1. Evaluate the athlete, including the athlete's sport and training history.
2. Establish sport-, position-, and athlete-specific goals.
3. Teach the athlete proper jumping, landing, and throwing technique.
4. Assign proper plyometric training program design variables, addressing intensity, frequency, recovery, and volume.
5. Properly progress the plyometric training program.

END

TYPE
Contraindication

TITLE
Contraindication for Depth Jumps and High-Intensity Lower Body Drills in Prepubertal Children

PAGE
1283

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Because the epiphyseal plates of the bones of prepubescent children have yet to close (39, 47), depth jumps and other high-intensity lower body drills are contraindicated (2, 36, 46).

END

TYPE
Recommendation

TITLE
Plyometric Program Design for Children

PAGE
1284

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
The current evidence suggests that a twice-weekly program for 8 to 10 weeks beginning at 50 to 60 jumps a session and increasing exercise load weekly results in the largest changes in running and jumping performance in young children (38). An alternative program for children who do not have the capability or tolerance for a twice-weekly program would be a low-intensity program for a longer duration (38).

END

TYPE
Warning

TITLE
Warning for Masters Athletes with Joint Degeneration or Surgical History

PAGE
1285

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
A masters runner with a history of knee surgery such as partial meniscus removal or with significant joint degeneration should regard depth jumps and single-leg plyometric exercises as contraindicated and use other forms of plyometrics cautiously.

END

TYPE
Recommendation

TITLE
Combining Resistance Training and Plyometrics

PAGE
1287

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Combine lower body resistance training with upper body plyometrics, and upper body resistance training with lower body plyometrics. Performing heavy resistance training sessions and plyometric sessions on the same day is not usually recommended (17, 24).

END

