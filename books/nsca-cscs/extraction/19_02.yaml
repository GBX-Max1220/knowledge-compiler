TYPE
Definition

TITLE
Plyometric Program Design Variables

PAGE
1276

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Effective plyometric programs include the same variables that are essential to any training program design: mode, intensity, frequency, recovery, volume, and progression.

CHILDREN
Mode, Intensity, Frequency, Recovery, Volume, Progression

END

TYPE
Definition

TITLE
Frequency (Plyometric Training)

PAGE
1276

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Frequency refers to the number of plyometric training sessions per week, typically ranging from one to four.

PARENT
Plyometric Program Design Variables

END

TYPE
Recommendation

TITLE
Plyometric Training Frequency Guidelines

PAGE
1276

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
During the season, one session per week is appropriate for American football players, while two or three sessions per week are common for track and field athletes (2). During the off-season, plyometric training frequency may increase to two or three sessions per week for American football players and to three or four sessions per week for track and field athletes (2).

END

TYPE
Recommendation

TITLE
Recovery Time Between Plyometric Sessions

PAGE
1276-1277

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Forty-eight to 72 hours between plyometric sessions is a typical recovery time guideline for prescribing plyometrics (19); using these typical recovery times, athletes commonly perform two to three plyometric sessions per week.

END

TYPE
Recommendation

TITLE
Recovery Between Plyometric Repetitions and Sets

PAGE
1277

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Recovery for depth jumps may consist of 5 to 10 seconds of rest between repetitions and 2 to 5 minutes between sets. The time between sets is determined by a proper work-to-rest ratio (i.e., 1:5 to 1:10) and is specific to the volume and type of drill being performed.

END

TYPE
Definition

TITLE
Volume (Plyometric Training)

PAGE
1277

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Plyometric volume is typically expressed as the number of repetitions and sets performed during a given training session (table 19.6). Lower body plyometric volume is normally given as the number of foot contacts (each time a foot, or the feet together, contact the surface) per workout (2, 19) but may also be expressed as distance, as with plyometric bounding.

PARENT
Plyometric Program Design Variables

END

