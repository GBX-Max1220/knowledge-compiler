TABLE 19.8  Sample Schedule for Integrating Resistance Training and Plyometrics
Day | Resistance training session | Plyometric session | Single session complex*
Monday | Low-intensity (light) upper body | High-intensity (reactive) lower body | High-intensity (heavy) lower body resistance training + Lower body plyometrics
Tuesday | High-intensity (heavy) lower body | Low-intensity upper body | Low-intensity (light) upper body resistance training + Upper body plyometrics
Thursday | High-intensity (heavy) upper body | Low-intensity (ballistic) lower body | High-intensity (heavy) upper body resistance training + Upper body plyometrics
Friday | Low-intensity (light) lower body | High-intensity upper body | Low-intensity (light) lower body resistance training + Lower body plyometrics
*Emphasis on resistance training + plyometrics within a total body session.

END

TYPE
Definition

TITLE
Contrast Training

PAGE
1288

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Contrast training involves alternating high-load exercises and high-velocity exercises in contrast pairs in a set-by-set fashion with sufficient inter-set rest to avoid fatigue-induced interference.

END

TYPE
Definition

TITLE
Ascending Complex Training

PAGE
1288

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Ascending complex training involves sets of a high-velocity exercise followed by sets of a contrasting high-force exercise.

END

TYPE
Definition

TITLE
Descending Sets (Complex Training)

PAGE
1288

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Descending sets require multiple high-force exercises to be completed before the execution of high-velocity exercises.

END

TYPE
Recommendation

TITLE
Order of Plyometric and Aerobic Exercise

PAGE
1289

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Because aerobic exercise may have an interfering effect on power production (17), it is advisable to perform plyometric exercise before aerobic endurance training.

END

TYPE
Definition

TITLE
Dynamic Valgus

PAGE
1290

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Inward movement of the knees—also termed dynamic valgus—is a significant risk factor for knee injuries of all types, including patellofemoral pain and tears or ruptures of the anterior cruciate ligament (ACL) (45).

END

TYPE
Risk Factor

TITLE
Dynamic Valgus as a Risk Factor for Knee Injuries

PAGE
1290

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Inward movement of the knees—also termed dynamic valgus—is a significant risk factor for knee injuries of all types, including patellofemoral pain and tears or ruptures of the anterior cruciate ligament (ACL) (45).

END

TYPE
Recommendation

TITLE
Proper Landing Technique for Lower Body Plyometrics

PAGE
1290

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
The shoulders should be over the knees and the knees should be over the toes during the landing, which the athlete accomplishes through ankle dorsiflexion and knee and hip flexion (figure 19.3).

END

TYPE
Recommendation

TITLE
Active Flat Foot Landing Technique

PAGE
1290-1291

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
In preparation for ground contact, the athlete's ankles should be dorsiflexed (so that the toes are pulled back toward the knees). This means that the bottom of the foot is parallel to the ground as the athlete comes into landing. Immediately before landing, the athlete should be taught to aggressively plantarflex the ankle to "attack the ground with the foot."

END

TYPE
Threshold

TITLE
Back Squat Strength Equivalents for Plyometric Exercises

PAGE
1291-1292

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Various authors have theorized that basic in-place jumps such as repeated pogo jumps and countermovement jumps require relatively low levels of strength; repeated hops and jumps may require a basic strength level equivalent to a back squat of 1 × body weight, bounding and depth jumps using a box 12 inches (30 cm) tall or shorter may have a back squat strength equivalent of 1.5 × body weight, and depth or box jumps with a box higher than 12 inches (30 cm) may require a back squat strength equivalent of 2 × body weight (58).

END

TYPE
Threshold

TITLE
Body Weight Threshold for Increased Injury Risk in Plyometrics

PAGE
1295-1296

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
Athletes who weigh more than 220 pounds (100 kg) may be at an increased risk for injury when performing plyometric exercises (50, 63).

END

TYPE
Recommendation

TITLE
Depth Jump Box Height for Athletes Over 220 Pounds

PAGE
1299

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
The depth jump box height for athletes who weigh over 220 pounds (100 kg) should be 18 inches (46 cm) or less.

END

TYPE
Threshold

TITLE
Recommended Depth Jump Height Range

PAGE
1299

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
The recommended height for depth jumps ranges from 16 to 42 inches (41-107 cm), with 30 to 32 inches (76-81 cm) being the norm (4, 21, 30, 43, 44, 48).

END

TYPE
Warning

TITLE
Warning Against Excessive Depth Jump Height

PAGE
1299

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
A height of 48 inches (122 cm) would provide a significant overload on the muscles, but the resistance may be too great for many athletes to overcome while maintaining correct technique (47). Jumping from such a height increases the possibility of injury; furthermore, the amount of force to be overcome is so great that the amortization phase is extended and thus the purpose of the exercise is defeated.

END

TYPE
Table

TITLE
Table 19.7 — Examples of Plyometric Warm-Up Drills

PAGE
1283

SECTION
19.2 — Plyometric Program Design

ORIGINAL TEXT
TABLE 19.7  Examples of Plyometric Warm-Up Drills
Drill type | Explanation
Marching | Mimics running movements; Emphasizes posture and movement technique; Reinforces proper lower body movements for running
Ground contact | Prepares the body for impact and high-intensity drills: Rapid pogo jump—not allowing the heel to touch the ground (emphasizes ankle dorsiflexion with active front foot ground contact); Straight-leg skip or bound—emphasizes negative foot speed (the rapid backward acceleration of the foot) into the ground, minimizes knee flexion, and maximizes hip extension to prepare for the impact of plyometric drills; Exaggerated form of reciprocal upper and lower extremity movements; Emphasizes quick takeoff and landing; Mimics plyometric activities
Footwork | Targets multiplanar acceleration and deceleration mechanics; Prepares for changes of direction during plyometric drills; Examples: shuttle, shuffle, pattern, and stride drills
Neuromuscular acceleration and deceleration | Multijoint explosive directional changes with full-range movements: Forward, side, and backward lunge (similar to the forward [step] lunge exercise but multidirectional); Squat patterns (e.g., a tall reach into a deep snap-down then a squat jump to a standing landing)
Note: These examples are specific preparatory drills that can be incorporated into the RAMP phases of a warm-up for plyometrics; see chapter 15 for more detail.

END

