TYPE
Evidence

TITLE
Lactate Does Not Cause Fatigue

PAGE
185

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
Although the muscular fatigue experienced during exercise often correlates with high tissue concentrations of lactate, lactate is not the cause of fatigue (22, 27, 125).

END

TYPE
Evidence

TITLE
ATP Hydrolysis as Primary Source of H+ Accumulation

PAGE
185

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
However, evidence suggests that other mechanisms, such as the simple hydrolysis of ATP (125) (equation 3.1), are responsible for most of the H+ accumulation and that lactate itself actually works to decrease metabolic acidosis rather than accelerate it (27, 125).

END

TYPE
Evidence

TITLE
Lactate Clearance in Trained vs. Untrained Individuals

PAGE
187

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
In addition, both aerobically trained (67) and anaerobically trained (62) athletes have faster lactate clearance rates than untrained people.

END

TYPE
Evidence

TITLE
Peak Blood Lactate Timing After Exercise

PAGE
187

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
Peak blood lactate concentrations occur approximately 5 minutes after the cessation of exercise (67)

END

TYPE
Evidence

TITLE
Training Shifts LT and OBLA to the Right

PAGE
193-194

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
Some studies suggest that training at intensities near or above the LT or OBLA pushes the LT and OBLA to the right (i.e., lactate accumulation occurs later at a higher exercise intensity) (39, 43).

END

TYPE
Recommendation

TITLE
Use of Term "Metabolic Acidosis" Instead of "Lactic Acidosis"

PAGE
189

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
Consequently, the term lactic acidosis is indeed a misnomer, and the term metabolic acidosis is recommended to describe the reduced pH within skeletal muscle during high-intensity, fatiguing exercise.

END

TYPE
Recommendation

TITLE
Lactate Clearance as Marker for Recovery

PAGE
187

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
Hence, lactate clearance should be recognized positively as an indirect marker for recovery from metabolic acidosis as the system returns to metabolic homeostasis and not as waste product of metabolism.

END