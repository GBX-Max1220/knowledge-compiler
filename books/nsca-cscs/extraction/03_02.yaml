TYPE
Definition

TITLE
Anaerobic Glycolysis (Fast Glycolysis)

PAGE
184

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
The conversion process of pyruvate to lactate is often called anaerobic glycolysis (or fast glycolysis).

END

TYPE
Definition

TITLE
Aerobic Glycolysis (Slow Glycolysis)

PAGE
184

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
However, when pyruvate is shuttled into the mitochondria to undergo the Krebs cycle, the ATP resynthesis rate is slower because of the numerous reactions but can occur for a longer duration if the exercise intensity is low enough. This process is often referred to as aerobic glycolysis (or slow glycolysis).

END

TYPE
Definition

TITLE
Metabolic Acidosis

PAGE
185

SECTION
3.2 — Biological Energy Systems

ORIGINAL TEXT
Overall, this process of an exercise-induced decrease in pH is referred to as metabolic acidosis (125), and may be responsible for much of the peripheral fatigue that occurs during exercise (42, 156).

END

