TITLE
Training Goals for Sprinting

PAGE
1423

SECTION
20.2 — Neurophysiological Basis for Speed

ORIGINAL TEXT
The overarching goal of sprinting is to achieve optimal step length and step frequency through the correct application of force into the ground. The transmission of high forces must occur within a short stance phase, also known as ground contact time. During the acceleration phase, propulsive forces assist in elevating the hips above the ground to a point at which speed is no longer increasing at large rates. This portion of the sprint, known as maximum velocity, uses the SSC (through stiffness regulation) to propel the athlete’s center of mass down the track horizontally.

