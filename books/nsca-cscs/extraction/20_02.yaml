TITLE
Training Objectives for Speed Development

PAGE
1428-1429

SECTION
20.2 — Neurophysiological Basis for Speed

ORIGINAL TEXT
Emphasize brief ground support times as a means of achieving rapid step rate. As previously mentioned, this requires high levels of ballistic strength. This quality is developed systematically through consistent exposure to speed training as well as properly designed resistance training programs. Emphasize the further development of the SSC as a means to increase the amplitude of impulse for each step of the sprint. Specifically, high achievers at top-speed sprinting produce high forces in a shorter stance phase using the SSC. The complete weightlifting movements and their derivatives are key exercises for overloading the SSC with forces greater than those produced during an open sprint, in addition to plyometric training, which can induce high-impact stretch loads to enhance SSC function and reactive strength. Because sprinting requires an athlete to move at high speeds, strength and conditioning professionals should emphasize the prescription of exercises that span the load–velocity curve while overloading musculature of the hip, knee, and ankle regions involved in the SSC.

