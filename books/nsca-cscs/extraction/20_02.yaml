TITLE
Methods of Developing Speed — Sprinting

PAGE
1429-1430

SECTION
20.2 — Neurophysiological Basis for Speed

ORIGINAL TEXT
Although a variety of training stimuli are important for the optimization of athletic performance, it can be argued that no exercise improves running velocity more than maximum-velocity sprinting (i.e., primary methods). An athlete’s sprint prowess depends on the generation of high forces in short time periods (62, 105). Neurological adaptations resulting from long-term training plans that emphasize maximal strength and movement velocity improve both RFD and impulse generation (1, 100). In the strength and conditioning setting, weightlifting movements and jump training are prescribed to develop RFD and impulse at varying loads, because these movements use the SSC (i.e., tertiary methods). Similarly, upright sprinting uses the SSC, defining it as a plyometric movement. Chronic exposure to movements eliciting the SSC can increase muscle stiffness, which is a potential physiological advantage for sprint ability (39). In addition, sprinting requires near-maximum to maximum muscle activation, which depends on high central nervous system activity. Therefore, chronic exposure to sprinting may lead to improvements in musculoskeletal control via the central nervous system. This would result in a cyclical dose–response relationship.

