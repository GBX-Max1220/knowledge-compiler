## TYPE
Recommendation

## TITLE
What Strength and Conditioning Professionals Can Do to Help Injured Athletes

## PAGE
520-522

## SECTION
Chapter 9 — Psychological Foundations of Performance

## ORIGINAL TEXT
Regular Communication With All Stakeholders: Strength and conditioning professionals should maintain regular communication with all athletic trainers, position coaches, parents (if appropriate), and head coaches. Specifically Tailored Training Programs: Depending on the severity of the injury, athletes could require a modified training program that may require different exercises, tempos, equipment, or arrangements (e.g., smaller, more personalized settings). Proper Goal Setting and Acknowledgment of Training Milestones: During a lengthy return-to-play timeline, setbacks, frustration, and lack of expedient progress are common. Coaches may consider overlapping appropriate goal-setting techniques with the sports medicine team to encourage and motivate the athlete. Progressive Integration Into Full-Group or Team Activities: Progressively moving from privately scheduled, one-on-one rehabilitation sessions to larger team sessions may be an appropriate tactic to enhance the connection between the athlete and the team. Improve Self-Efficacy and Motivation: Coaches should minimize psychological barriers such as fear or anxiety by providing a psychologically safe and autonomy-supportive environment.

