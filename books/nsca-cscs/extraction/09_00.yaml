## TYPE
Recommendation

## TITLE
How Should Positive and Negative Reinforcement Be Applied?

## PAGE
486

## SECTION
Chapter 9 — Psychological Foundations of Performance

## ORIGINAL TEXT
Coaches should generally subscribe to a reinforcement strategy to assist athletes to focus on what they do correctly. Punishment should be used sparingly, because it increases the likelihood that athletes will focus on what they are doing incorrectly. Under conditions that promote a narrow focus of attention, positive reinforcement aids a focus on task-relevant cues, while punishment floods attentional capacity with a predominance of task-irrelevant cues.

## PARENT
None

## CHILDREN
None

## RELATIONSHIPS
None

END

