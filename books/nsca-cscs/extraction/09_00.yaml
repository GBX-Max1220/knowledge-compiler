## TITLE
How Should Athletes Use Arousal Control Techniques?

## PAGE
494

## SECTION
Chapter 9 — Psychological Foundations of Performance

## ORIGINAL TEXT
An athlete should employ arousal reduction techniques when performing a new skill or one that is complex or when performing in high-pressure situations. Athletes should employ arousal enhancement techniques when executing simple skills, ones that are well learned, or in situations of minimal pressure. The purpose of employing such techniques is to allow the athlete to perform with an unburdened mind while matching his or her mental and physical intensity to the demands of the task.

