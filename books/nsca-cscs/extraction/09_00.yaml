## TITLE
Systematic Desensitization Technique

## PAGE
493-494

## SECTION
Chapter 9 — Psychological Foundations of Performance

## ORIGINAL TEXT
To practice the technique, an athlete should be reasonably skilled at both PMR and mental imagery. The athlete should construct a hierarchy, or progression, of events and situations that he or she specifically perceives as fearful. For example, a competitive gymnast who suffered a serious injury on the balance beam may list a series of fearful scenes, proceeding from warming up before the event to the actual movement that precipitated the injury. In a relaxed setting the athlete visualizes the first scene and experiences a mild degree of anxiety. At the same time, diaphragmatic breathing, PMR, or another physical relaxation technique is instituted, and a strong relaxation response theoretically should overcome the relatively weak fight-or-flight syndrome. This technique is practiced until the athlete can hold the image clearly while maintaining a relaxed state. The athlete progresses through the hierarchy, experiencing conditioned fear in small, manageable doses that are overcome by the relaxation achieved with the relaxation technique.

