## TYPE
Procedure

## TITLE
Diaphragmatic Breathing Technique

## PAGE
490-491

## SECTION
Chapter 9 — Psychological Foundations of Performance

## ORIGINAL TEXT
It is best to get familiar with this starting from a standing position so that breathing is not inhibited. The athlete should let the arms hang loosely and concentrate on relaxing, particularly in the neck and shoulder region, by first taking a couple of deep breaths. Next, the athlete should relax the abdominal muscles so that they appear flaccid. The initiation of each breath should occur simultaneously with the relaxed protrusion of the abdomen; placing a hand on the abdomen gives feedback to ensure that the abdomen protrudes with the initiation of each breath. With each breath the abdomen should become naturally distended. When this portion of the technique is performed properly, the diaphragm (a muscle at the base of the lungs) contracts and drops, allowing a deeper breath to occur. This is the first stage of taking a maximal inhalation. The entire process of inhalation takes place in three different areas and stages: the lower abdomen, the mid-chest, and finally the upper chest.

