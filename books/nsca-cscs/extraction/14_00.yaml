ORIGINAL TEXT
1. Place the VBT device in a suitable position based on the type of data collection. For example, a linear position transducer will be placed under the barbell and tethered to the barbell, whereas an IMU sensor will be affixed directly to the barbell.
2. The exercise selected (e.g., bench press, squat, deadlift) will depend on the needs of the athlete, individual sport, and training session being performed. In the case of a back squat, follow the technique described in chapter 16.
3. From the measuring device, obtain the velocity of the barbell typically in meters per second, power measured in watts, and peak forces measured in newtons. Metrics may vary depending on the device used for testing or the individual purposes of the tester and athlete. As outlined earlier in the chapter, VBT data can be used to create a load–velocity profile.

