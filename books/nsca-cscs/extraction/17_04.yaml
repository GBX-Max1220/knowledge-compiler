TITLE
Zercher Carry

PAGE
1154-1156

SECTION
17.4 — Nontraditional Implements

ORIGINAL TEXT
ZERCHER CARRY
Starting Position and Liftoff
The Zercher carry can begin from one of two positions.
1. Starting position from boxes
Position the barbell on some boxes, anywhere from a full squat position to standing almost completely upright.
Position the arms under and around the bar with the palms facing up so that the bar now rests on the inner part of the elbows and is held closer the upper abdominal region. It might be easier to maintain this position by clasping the hands and keeping them close to the chest (not shown).
2. Starting position from the floor
Position the barbell on the floor near the shins with a closed overhand grip and then perform a semi-sumo squat deadlift.
Once the bar is above the knees, drop into a full semi-sumo squat position and reposition the arms under and through the bar so that the bar is on the inner part of the elbows and contacting the upper abdominal region.
While maintaining the position of the bar on the inner elbows and upper abdominals, forcibly push the feet into the ground and extend the knees and hips, now standing upright with the bar kept in the same relative position as liftoff.
Walking Phase
Adopt a walking movement pattern, initially focusing on performing a series of short, relatively fast steps, which will increase total body balance and stability.
When building up speed, increase the length of the steps and further reduce ground contact times.
Note: Lean back a little during the walking phase so as not to lose balance forward due to the barbell positioned in front of the center of mass.
Ending Position
After completing the set distance, reset the bar on the boxes by performing the eccentric phase of a full or partial squatting motion, depending on the height.
Alternatively, if repositioning the bar on the floor, go into a full squat position, and while resting the bar on the upper thighs, rotate the arms out from under the bar so that the hands reach the top of the bar.
From this position, grab the bar with an overhand grip to partially stand upright before replacing the bar on the ground by performing the concentric phase of a deadlift-type motion.
MAJOR MUSCLES INVOLVED
gastrocnemius, soleus, gluteus maximus, rectus femoris, gluteus medius, erector spinae, internal and external obliques

END

