ORIGINAL TEXT
STABILITY BALL JACKKNIFE
Starting Position
Kneel down in front of a stability ball.
Position the body facing away from the ball.
In a quadruped position with the hands underneath the shoulders and the knees extended, place both feet on the stability ball.
Isometrically hold the torso in a rigid position with the elbows fully extended and the head in a neutral position.
All repetitions begin from this position.
Forward Movement Phase
Keeping the knees and elbows fully extended and the torso in a rigid position, begin the exercise by raising the hips slightly and flexing the hips and knees to roll the ball toward the chest.
Continue rolling the ball forward until the hips and knees are fully flexed.
Keep the shoulders over the hands and the head in a neutral position.
Backward Movement Phase
Return to the starting position by allowing the hips and knees to extend under control.
Keep the elbows fully extended and the torso held rigid.
MAJOR MUSCLES INVOLVED
rectus abdominis, iliopsoas

END

