ORIGINAL TEXT
TIRE FLIP
Starting Position
Begin facing the tire with the feet hip- to shoulder-width apart.
Squat down and lean into the tire so that the chin and the anterior deltoids are resting on the tire and the feet are positioned back far enough to maintain a neutral spine position.
Keeping the arms outside the knees and the elbows fully extended, grasp the tire with a supinated grip.
All repetitions begin from this position.
Upward Movement Phase
Begin by extending the knees and hips and plantar flexing the ankles while pushing the tire forward.
Move forward explosively toward the tire by taking two or three steps.
Continue this movement until the body is aligned in a 45-degree angle to the tire.
Consider flexing the hip and knee of one leg fully to drive the knee upward and toward the tire.
Immediately after striking the tire with the thigh (if done), reorient the hands into a pronated grip.
Lean forward and take small steps as required while forcefully extending the arms to push the tire over in front of the body.
MAJOR MUSCLES INVOLVED
