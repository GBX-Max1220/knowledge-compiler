ORIGINAL TEXT
FORWARD SLED PUSH AND PULL
Starting Position (Push)
Stand behind the sled and position the hands on the vertical bars of the prowler at a comfortable height, typically somewhere between hip and knee height in a standing position. (Note: The lower the hands are positioned on the prowler, the more likely this will result in a horizontal trunk and shin position, which will increase the ability to apply propulsive horizontal forces and accelerate the sled.)
Keep the hands closer to the shoulders and elbows near the hips (shown) or extend the arms forward in front of the body (not shown), depending on personal preference.
If the load is heavy, it is advisable to start with the two feet positioned together (not shown) to maximize the ability to apply horizontal force to initiate movement of the heavy sled.
If the load is lighter, it is possible to start in an alternate split stance (shown) to better replicate a sprint starting position.
Forward Pushing Phase
While bracing the spine, initiate a stepping pattern that initially focuses on performing a series of short, relatively fast steps, which will increase the ability to apply horizontal forces to the ground.
While building up speed, increase the length of the steps and further reduce ground contact times. The ability to apply propulsive horizontal forces to the ground can be optimized by ensuring the front foot is positioned behind the hip throughout the entire pushing phase.
Starting Position (Pull)
Stand in front of the sled and attach the sled to the body via a chest and shoulder harness (shown) or hold separate handles in each hand (not shown).
Regardless of the attachment method to the sled, assume a position in which the trunk and shin are close to horizontal (not shown), which will increase the ability to apply propulsive horizontal forces and accelerate the sled. This can be best achieved by placing the hands on the ground (not shown) if connected via a harness to the sled or by leaning forward (not shown) if holding handles in each hand.
If the load is heavy, it is advisable to start with the two feet positioned together (not shown) to maximize the ability to apply horizontal force to initiate movement of the heavy sled. If the load is lighter, it is possible to start in an alternate split stance (shown) to better replicate a sprint starting position.
Forward Pulling Phase
While bracing the spine, initiate a stepping pattern that initially focuses on performing a series of short, relatively fast steps, which will increase the ability to apply horizontal forces to the ground.
While building up speed, increase the length of the steps and further reduce ground contact times. The ability to apply propulsive horizontal forces to the ground can be optimized by ensuring the front foot is positioned behind the hip throughout the entire pushing phase.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, gastrocnemius, soleus

END

