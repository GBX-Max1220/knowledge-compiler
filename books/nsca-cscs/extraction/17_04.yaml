ACCENTUATED ECCENTRICALLY LOADED BENCH PRESS
Note: This exercise requires the use of weight releasers, which allow additional load to be applied during the eccentric phase of the movement. The spotting technique used is identical to that outlined for the bench press in chapter 16.
Set-up
Prior to the athlete initiating the movement the spotter should load the barbell with the appropriate weight and the weight releasers are attached to the barbell.
It is important that the weight releasers are loaded correctly and placed evenly on the barbell so that they release at the completion of the downward movement phase without disrupting the athlete's normal movement pattern. As a general rule, the weight releasers should be set so that they disengage from the barbell approximately 2 to 4 inches (5-10 cm) before the completion of the downward movement (51).
Starting Position
Lie in a supine position on a bench in the five-point body contact position.
Place the body on the bench so that the eyes are below the racked barbell.
Grasp the barbell with a closed, pronated grip slightly wider than shoulder-width apart.
Signal the spotter for assistance in moving the barbell off the supports.
Position the barbell over the chest with the elbows fully extended.
All repetitions begin from this position.
