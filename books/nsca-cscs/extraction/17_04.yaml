ORIGINAL TEXT
BACK SQUAT WITH BANDS
Band Placement
Loop the ends of long elastic bands around the band pegs of each side of a power rack. If the rack does not have band pegs, loop the bands around the handles of heavy dumbbells that will not move during the exercise.
Take the other ends of the bands and place them over the ends of the bar so they rest against the outside of the weight plates on either side.
The bands should be loose enough that there is no tension at the bottom of the squat. Tension should be applied to the bar when the exercise is performed, but at the bottom of the range of motion, the bands should be slack to apply no load to the bar. (Note: Despite their appearance, the bands in the second photo are not creating any tension on the bar.)
Starting Position
Grasp the bar with a closed, pronated grip.
Step under the bar and position the feet parallel to each other.
Place the bar in a balanced position on the upper back and shoulders; follow the guidelines for the back squat in chapter 16 regarding the high or low placement of the bar.
Extend the hips and knees to lift the bar off the supporting pins or ledge, and take one or two steps backward.
Position the feet shoulder-width apart or wider, even with each other, and the toes pointed slightly outward.
Stand with an erect torso by positioning the shoulders back, tilting the head slightly back, and protruding the chest up and out to create a neutral or slightly arched back.
All repetitions begin from this position.
Downward Movement Phase
Begin the exercise by flexing the hips and knees slowly and under control while keeping the torso-to-floor angle relatively constant.
Maintain a flat-foot position with the knees aligned over the feet as they flex.
Continue flexing the hips and knees until the thighs are parallel to the floor, the torso begins to round or flex forward, or the heels begin to rise off the floor.
Upward Movement Phase
Raise the bar by extending the hips and knees while keeping the torso-to-floor angle relatively constant.
Keep the torso erect, shoulders back, and chest up and out.
Keep the heels on the floor and the knees aligned over the feet.
Continue extending the hips and knees until the body is fully erect.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris

END

