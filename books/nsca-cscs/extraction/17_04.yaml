REVERSE SLED DRAG
Starting Position
Stand in front of the sled and attach the sled to the body via a hip harness (not shown) or hold separate handles in each hand (shown).
Regardless of the attachment method to the sled, lean backward a little while maintaining a relatively extended hip position, and keep the feet in front of the knees to increase the ability to apply propulsive horizontal forces and accelerate the sled.
It is advisable to start with the two feet positioned together to maximize the ability to apply horizontal force to initiate movement of the heavy sled.
Backward Pulling Phase
Initiate a stepping pattern that initially focuses on performing a series of short, relatively fast steps, which will increase the ability to apply horizontal forces to the ground.
While building up speed, increase the length of the steps and further reduce ground contact times.
The ability to apply propulsive horizontal forces to the ground can be optimized by ensuring the front foot is typically positioned in front of the knee throughout the entire pulling phase.
MAJOR MUSCLES INVOLVED
gluteus maximus, semimembranosus, semitendinosus, biceps femoris, vastus lateralis, vastus intermedius, vastus medialis, rectus femoris, gastrocnemius, soleus

