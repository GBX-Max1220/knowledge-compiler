TYPE
Recommendation

TITLE
Primary Goal Focus per Training Block

PAGE
1200-1201

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
Despite a potential desire or need to make improvements in two different areas (e.g., strength and muscular endurance), an effort should be made to concentrate on only one training outcome per training block.

END

TYPE
Recommendation

TITLE
Emphasis/De-emphasis Approach

PAGE
1200-1201

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
This can be accomplished using an emphasis/de-emphasis approach wherein specific fitness characteristics are targeted during different training periods while others are de-emphasized (67).

END

TYPE
Recommendation

TITLE
Maintenance of Other Physical Characteristics

PAGE
1201

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
However, while focusing on the development of a specific physical characteristic, it is important to provide sufficient stimuli for the maintenance of other physical characteristics, especially if they are to be emphasized in subsequent blocks of training.

END

TYPE
Recommendation

TITLE
In-Season Strength and Power Alternation Strategy

PAGE
1201

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
A common strategy in many team sports is to alternate between strength (i.e., strength–speed) and power (i.e., speed–strength) development in-season, because the higher volumes associated with strength endurance– and hypertrophy-focused training can induce excessive fatigue and potentially result in an increased injury risk.

END

TYPE
Recommendation

TITLE
Multitargeted Approach for Team Sports

PAGE
1201

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
However, while this may be easier to accomplish with individual sports or events (e.g., track and field), a team-based sport (e.g., basketball, soccer, hockey) that requires several fitness characteristics for success may have to use a multitargeted approach within training to develop those multiple characteristics simultaneously (177).

END

TYPE
Recommendation

TITLE
Training Compatible Fitness Characteristics Simultaneously

PAGE
1201

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
Within this approach, it has been suggested that compatible fitness characteristics (e.g., strength–power and speed) be trained simultaneously while avoiding incompatible characteristics (e.g., speed and cardiovascular endurance).

END

