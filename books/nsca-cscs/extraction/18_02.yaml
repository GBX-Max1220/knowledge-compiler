TYPE
Definition

TITLE
Core Exercises

PAGE
1203

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
Core exercises recruit one or more large muscle areas (i.e., chest, shoulder, back, hip, or thigh), involve two or more primary joints (multijoint exercises; e.g., split squat, bench press, bent-over row), and receive priority when one is selecting exercises because of their direct application to the sport and enhanced dynamic correspondence (i.e., transference of gym-based training to improved performance in athletic tasks).

END

TYPE
Definition

TITLE
Assistance Exercises

PAGE
1203

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
Assistance exercises usually recruit smaller muscle areas (i.e., upper arm, abdominal muscles, calf, neck, forearm, lower back, or anterior lower leg), involve only one primary joint (single-joint exercises; e.g., knee extension and flexion, biceps curls), and are considered less important for improving sport performance.

END

TYPE
Definition

TITLE
Structural Exercise

PAGE
1205

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
A core exercise that emphasizes loading the spine directly (e.g., back squat) or indirectly (e.g., power clean) can be further described as a structural exercise. More specifically, a structural exercise involves muscular stabilization of posture during performance of the lifting movement (e.g., maintaining a rigid torso and a neutral spine during the back squat).

END

TYPE
Definition

TITLE
Power Exercise

PAGE
1205

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
A structural exercise that is performed very quickly or explosively is considered a power exercise.

END

TYPE
Recommendation

TITLE
Emphasis on Strength Development for Weak Athletes

PAGE
1205

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
It should be noted, however, that in weak athletes, or those with a low training age, emphasizing strength development has been shown to enhance power output to an equal or greater extent than ballistic training (26, 28, 29).

END

TYPE
Recommendation

TITLE
Use of Ballistic Tasks for Power Development

PAGE
1205

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
As such, ballistic tasks that emphasize movement velocity (e.g., loaded jumps) should be programmed to emphasize power development.

END

TYPE
Recommendation

TITLE
Use of Semi-Ballistic Exercises for Power Development

PAGE
1205

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
Semi-ballistic exercises, such as weightlifting exercises and their derivatives, can also be used effectively for the development of power because they provide the potential to emphasize a velocity- or force-dominant stimulus (figure 18.6) (21, 170-173).

END

TYPE
Recommendation

TITLE
Application of Assistance Exercises for Injury Prevention and Rehabilitation

PAGE
1203-1205

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
A common application of assistance exercises is for injury prevention and rehabilitation, because these exercises often isolate a specific muscle or muscle group. The muscles that are predisposed to injury from the unique demands of a sport skill (e.g., the shoulder external rotators for overhand pitching) or those that require reconditioning after an injury (e.g., a quadriceps contusion) can be specifically conditioned by an assistance exercise. However, it is important that the chosen exercises improve a physical characteristic within the program (flexibility, strength, etc.) and that the professional prescribes them appropriately with specific volumes and intensities.

END

TYPE
Definition

TITLE
Training Status

PAGE
1196

SECTION
18.2 — Step 2: Exercise Selection

ORIGINAL TEXT
An athlete's current condition or level of preparedness to begin a new or revised program (training status) is an important consideration in the design of training programs.

END

