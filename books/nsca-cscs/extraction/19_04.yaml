TITLE
Box Jump

PAGE
1351-1352

SECTION
19.4 — Lower Body Plyometric Drills

ORIGINAL TEXT
32 BOX JUMP
Intensity level: Low
Direction: Vertical and slightly horizontal
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Facing the plyometric box, get into a comfortable, upright stance with feet hip-width apart.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Forcefully triple extend to jump onto the top of the box using both legs.
Downward movement: Land on both feet in a half-squat position, step down from the box, and repeat.
Note: The arm action contributes significantly to the upward momentum of this jump. By having athletes perform the movement with their hands on their hips, or their fingers interlocked behind the head and elbows pointing sideways, the lower body power required to perform the jump can be significantly increased.

END

TYPE
Procedure

TITLE
Box Hop

PAGE
1353

SECTION
19.4 — Lower Body Plyometric Drills

ORIGINAL TEXT
33 BOX HOP
Intensity level: Low
Direction: Vertical and slightly horizontal
Equipment: Plyometric box, 6 to 42 inches (15-107 cm) high
Starting position: Facing the plyometric box, get into a comfortable, upright stance on one foot. The non-jumping leg is held in a stationary position with the hip and knee flexed during the exercise.
Arm action: Double arm
Preparatory movement: Begin with a countermovement.
Upward movement: Forcefully triple extend and hop onto the top of the box.
Downward movement: Land on the same foot in a triple flexion position (hip, knee, and ankle flexed and stable), step down from the box, and repeat.
Note: Although significant force may be required to hop onto boxes in excess of 30 inches (76 cm), this is a low-intensity drill because the athlete is accelerating against gravity and lands with less force than his or her body weight because of this.

END

