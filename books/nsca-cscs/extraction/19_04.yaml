Procedure

TITLE
Depth Jump to Box Jump

PAGE
1359-1360

SECTION
19.4 — Lower Body Plyometric Drills

ORIGINAL TEXT
37 DEPTH JUMP TO BOX JUMP
Intensity level: High
Direction: Vertical and horizontal
Equipment: Two plyometric boxes, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box, facing the second box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles in flight in preparation for an active flat-foot landing with both feet.
Upward movement: On landing, immediately jump onto the second box.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum; there is an optimal relationship between ground contact time and resultant vertical force production. Also, the distance between boxes depends on experience and ability; the greater the distance between boxes, the higher the intensity of the jump. Begin with the boxes placed 24 inches (61 cm) apart.

END

