39 DEPTH JUMP TO LONG JUMP
Intensity level: High
Direction: Vertical and horizontal
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles in preparation for a flat-foot landing on both feet.
Upward movement: On landing, immediately jump forward as far as possible with both feet.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum; there is an optimal relationship between ground contact and resultant horizontal projection.

