TITLE
Drop Freeze

PAGE
1355-1356

SECTION
19.4 — Lower Body Plyometric Drills

ORIGINAL TEXT
35 DROP FREEZE
Intensity level: Low
Direction: Vertical
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: None
Preparatory movement: Step from the box.
Downward movement: Land flat footed on the ground with both feet, quickly absorbing the impact on landing. Ensure the hips, knees, and toes align, with the trunk vertical. Step back onto the box and repeat.
Note: This drill teaches joint alignment and landing mechanics and is often the first drill used in plyometric teaching and rehabilitation progressions. Also, this can also be performed as a single-leg landing drill.

END

TYPE
Procedure

TITLE
Depth Jump

PAGE
1357-1358

SECTION
19.4 — Lower Body Plyometric Drills

ORIGINAL TEXT
36 DEPTH JUMP
Intensity level: High
Direction: Vertical
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles and land on the ground with an active flat-foot contact with both feet.
Upward movement: On landing, immediately jump up as high as possible.
Note: When stepping from the box, step straight out. Do not first jump up or lower the center of gravity while stepping down, because these adjustments will change the height from which the exercise is performed. The time on the ground should be kept to a minimum; there is an optimal relationship between ground contact time and resultant vertical force production. On landing, emphasis should be on jumping up, with minimal horizontal movement (less than what is shown in the third photo).

END

