ORIGINAL TEXT
27 SINGLE-LEG PUSH-OFF
Intensity level: Low
Direction: Vertical
Equipment: Plyometric box, 6 to 18 inches (15-46 cm) high
Starting position: Stand facing the plyometric box with one foot on the ground and one foot on the box. The heel of the foot on the box should be near the box's closest edge.
Arm action: Double arm
Preparatory movement: Lift the front foot slightly so that it can be driven down into the box.
Upward movement: Drive the front foot down into the box to cause an upward jumping action.
Downward movement: Land with the same foot on the box; this foot should land just before the ground foot. Immediately repeat the movement.

END

