40 DEPTH JUMP TO 180-DEGREE TURN
Intensity level: High
Direction: Vertical and horizontal
Equipment: Plyometric box, 12 to 42 inches (30-107 cm) high
Starting position: Get into a comfortable, upright stance with feet hip-width apart on the plyometric box; toes should be near the edge of the box.
Arm action: Double arm
Preparatory movement: Step from the box.
Downward movement: Dorsiflex the ankles in preparation for an active flat-foot landing with both feet.
