TYPE
Evidence

TITLE
HIIT Benefits for Aerobic Endurance Performance

PAGE
1540

SECTION
21.2 — Metabolic Conditioning

ORIGINAL TEXT
HIIT has been shown to provide a number of benefits to aerobic endurance performance in recreational to well-trained athletes (53, 92, 137). Research has shown that HIIT may result in increases in V̇O2max in beginner (137) and trained athletes (92); however, in well-trained athletes the results are less clear (97). The observed improvements may be, at least in part, the result of increases in mitochondrial biogenesis and function contributing to increased aerobic metabolism (67, 79). HIIT has also been associated with improvements in LT (48, 92) and exercise economy (48, 53), which have both been strongly associated with aerobic endurance performance.

END

TYPE
Evidence

TITLE
Concurrent Training Improves Aerobic Endurance Performance

PAGE
1553

SECTION
21.2 — Metabolic Conditioning

ORIGINAL TEXT
numerous research investigations (25, 32, 45, 82, 84, 109, 114, 119, 127, 135), meta-analyses, and systematic review articles (1, 4, 10, 11, 17, 31, 37, 38, 65, 80, 89, 116, 143) have demonstrated that it can also improve performance (e.g., time trial, middle- and long-distance) across a number of aerobic endurance disciplines including running, cycling, cross-country skiing, and swimming, and performance-related variables such as strength, power, running economy, and maximal sprint speed.

END

