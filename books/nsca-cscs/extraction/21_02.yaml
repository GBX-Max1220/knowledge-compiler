TITLE
Extensive Endurance Training

PAGE
1536-1538

SECTION
21.2 — Metabolic Conditioning

ORIGINAL TEXT
Many aerobic endurance coaches and athletes over the years have used the term long, slow distance (LSD) or high-volume training to reflect training for a long period of time at a slow pace. However, this term can give the wrong impression of what an athlete is actually trying to achieve—that is, to extend their aerobic endurance capabilities, not just exercise slowly for a long duration. Hence, the term extensive endurance training is a more appropriate term and the one used in this text.

