TABLE 21.4  Types of Aerobic Endurance Training
Training type | Frequency per week* | Duration (work bout portion) | Intensity
Extensive endurance | 1-2 | Race distance or longer (~30-120 min) | ≤65% of V̇O2max
Pace/tempo | 1-2 | ~20-30 min | At the LT; at or slightly above race pace
Interval | 1-2 | 3-5 min (with a work:rest ratio of 1:1) | Close to V̇O2max
High-intensity interval training | 1 | 30-90 s (with a work:rest ratio of 1:5) | Greater than V̇O2max
Fartlek | 1 | ~20-60 min | Varies between LSD and pace/tempo training intensities

