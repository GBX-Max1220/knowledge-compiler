Evidence

TITLE
Hypoxic Dose Requirement for Altitude Training Benefit

PAGE
1558

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
In order to experience a benefit from this type of training, it has been reported that an athlete must receive a hypoxic dose of training ≥12 hours per day for a minimum of three weeks at moderate altitude (approximately 2,100-2,500 m [6,890-8,202 ft]) (66, 145).

END

TYPE
Procedure

TITLE
Treadmill Exercise

PAGE
1563

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Starting Position
Begin by attaching the security clip to the clothing where it will not interfere with the action of the lower or upper limbs.
Straddle the belt by placing the feet on the right and left platform.
Read the instructions on the console of the treadmill to gain an understanding of how to adjust the speed and incline of the specific treadmill being used.
Turn on the machine and adjust the speed of the belt so it is at the desired warm-up speed.
Movement Phase
While holding the handrails, allow one leg to swing freely, and using a pawing action, strike the treadmill with the mid-foot.
Once comfortable with the speed of the belt, begin walking or running on the treadmill.
Run or walk, keeping toward the front portion of the machine while remaining in the center of the treadmill deck.
Release the hands from the handrails and adjust the speed and incline until the desired training level is attained.
Avoid holding on to the console or front handrails or leaning backward while walking or running.
Keep the head up and eyes focused forward to avoid looking down at the console for extended periods of time.
Ending Position
Reduce the speed of the treadmill and perform a 3- to 5-minute cooldown to prevent blood pooling in the lower extremities and improve venous return to the heart.
Step onto the platforms on either side of the belt and turn the machine off.

END

TYPE
Procedure

TITLE
Stationary Bike Exercise

PAGE
1564-1565

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Starting Position
Begin by adjusting the seat height so the knee of the extended leg is slightly flexed (25-30 degrees) at the bottom of the pedal stroke.
The foot of the down leg should be flat and parallel to the floor with the balls of the feet in contact with the pedals.
Adjust the seat so the knee is over the center of the pedal on the extended leg and the hips do not rock back and forth during pedaling.
While maintaining a neutral spine position, lean slightly forward at the hips.
Adjust the handlebars so that when the arms are extended at a downward angle the elbows are slightly flexed. Ideally, the lower arm and torso will form an angle of approximately 90 degrees.
Movement Phase
Begin pedaling while keeping the balls of the feet in contact with the pedals throughout the duration of the exercise.
Maintain a neutral spine posture and do not round the shoulders.
With bullhorn handlebars, a variety of hand positions may be used. These include
pronated, palms-facing-downward grip, allowing a more upright posture;
neutral palms-facing grip on the sides of the handlebars, encouraging a greater forward lean; and
racing position, with the forearms resting on the handlebars, creating maximum forward lean.
Ending Position
Slow down until the pedals have come to a complete stop, and then step off the bike.

END

TYPE
Procedure

TITLE
Rowing Machine Exercise

PAGE
1566-1567

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Starting Position (Start)
Keep the back upright, not rounded, with a slight forward lean from the hips.
Hold the head upright while looking straight ahead.
Extend the arms in front of the body and grab the rower handle while flexing the hips and knees until the shins are approximately vertical.
Movement Phase (Drive)
Extend the knees first followed by the hips before using the arms to pull the handle toward the abdomen just below the rib cage. As the knees near their end range of motion, tilt the upper body backward by extending the hips before pulling with the arms to complete the movement.
Adjust the air vent to increase (more air admitted) or decrease (less air admitted) the resistance provided.
Ending Position (Finish)
The knees should be fully extended with the torso leaning slightly backward.
Arms are flexed at the elbows and the handle is at the abdomen just below the rib cage.
Recovery is the movement from the finish position back to the start in the reverse order of drive phase events—that is, extension of the arms first before flexion at the hips (to move the upper body forward), then flexion of the knees back to the start position.

END

TYPE
Procedure

TITLE
Stair Stepper Exercise

PAGE
1568-1569

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Starting Position
Hold the handrails while stepping forward onto the pedals.
Place the whole foot in contact with each pedal.
Movement Phase
Begin stepping, using the handrails for support.
While maintaining an upright posture and with the legs providing the force, take deep (4- to 8-in. [10-20 cm]) steps.
Keep the hips level and centered on the machine to avoid swaying from side to side or step to step.
Do not allow the steps to contact the floor or the upper-limit stop of the machine. The heel typically comes off the pedal as the foot is raised but should make contact again with the pedal when pressing down.
Continue to hold the handrails lightly while looking straight ahead, keeping an upright posture with the shoulders squared and relaxed, the torso over the hips, the knees aligned with the feet, and toes pointed forward.
Ending Position
Hold the handrails while stepping backward off the pedals.

END

