TYPE
Definition

TITLE
Live High, Train Low (LHTL)

PAGE
1558

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Live high, train low (LHTL) is a method commonly used by athletes seeking to benefit from altitude training. LHTL requires individuals to live at moderate altitudes, between 2,000 meters and 3,000 meters (6,562-9,843 ft), and train at or near sea level (66).

END

TYPE
Recommendation

TITLE
Training Sequence Priority

PAGE
1556

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
As a general guide, however, the training sequence should be varied throughout the phases of the training year and reflect the highest priority (e.g., maximizing strength or improving aerobic endurance) for each training cycle; the most important training goal should be trained first within a given workout while the athlete is fresh (125).

END

