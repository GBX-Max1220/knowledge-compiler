TITLE
Altitude Classification

PAGE
1557

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Altitude is classified into several categories, ranging from sea level (>500 m [1,640 ft]) to low (>500-2,000 m [1,640-6,562 ft]), moderate (>2,000-3,000 m [6,562-9,843 ft]), high (>3,000-5,500 m [6,562-18,045 ft]), and extreme (>5,500 m [>18,045 ft]) (39).

CHILDREN
Sea Level Altitude, Low Altitude, Moderate Altitude, High Altitude, Extreme Altitude

RELATIONSHIPS
None

END

