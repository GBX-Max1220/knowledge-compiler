Concurrent Training Effects on V̇O2max in Trained vs. Untrained Athletes

PAGE
1557

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
For example, a systematic review and meta-analysis found that following a concurrent training program, trained or highly trained aerobic endurance athletes did not demonstrate any impairments to improvements in V̇O2max; however, untrained individuals did (65).

END

TYPE
Evidence

TITLE
Heat Adaptation Timeline

PAGE
1559

SECTION
21.3 — High-Intensity Interval Training

ORIGINAL TEXT
Even though the majority (~75%) of heat adaptations occur within the first four to six days of heat exposure (e.g., heart rate and core temperature adaptations) (101), it may take seven or more days for the remainder of the adaptations to take place (e.g., enhanced core body temperature, cardiovascular, sudomotor, and sweat rate adaptations) (28, 81, 101, 108).

END

