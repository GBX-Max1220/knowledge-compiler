TITLE
IGF Binding Proteins (IGFBPs)

PAGE
263

SECTION
4.3 — Endocrine System in Resistance Training

ORIGINAL TEXT
IGF binding proteins (IGFBPs) are a group of proteins that regulate the bioavailability and activity of IGFs. There are six main types of IGFBPs (IGFBP-1 to IGFBP-6) found in humans, each with distinct binding affinities, tissue distributions, and biological functions. IGFBPs can inhibit or enhance the action of IGFs by doing the following: 1. Binding IGFs with high affinity, which prevents their interaction with IGF receptors and modulates their half-life, transport, and tissue localization; 2. Regulating IGF turnover and clearance in the circulation; 3. Interacting with cellular components, influencing various cellular processes independently of IGFs.

