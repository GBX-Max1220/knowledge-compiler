TITLE
Testosterone Transport and Mechanism of Action

PAGE
253

SECTION
4.3 — Endocrine System in Resistance Training

ORIGINAL TEXT
After secretion from the primary production sites, the testes in men and the ovaries and adrenal cortex in women, testosterone is carried to target tissues by binding proteins, primarily sex hormone–binding globulin and albumin. At the target site, testosterone dissociates from these proteins and crosses the cell membrane to bind to intracellular androgen receptors, directly influencing DNA transcription. Testosterone also binds to membrane receptors, enabling rapid intracellular effects like calcium release (21, 131).

