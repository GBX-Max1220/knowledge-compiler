Recommendation

TITLE
Stimulating Connective Tissue Adaptations (Tendons, Ligaments, Fascia)

PAGE
320

SECTION
5.1 — Adaptations to Anaerobic Training

ORIGINAL TEXT
Long-term adaptations in tendons, ligaments, and fascia are stimulated through progressive high-intensity loading patterns using external resistances.
High-intensity loads should be used, because low to moderate intensities do not markedly change the collagen content of connective tissue.
Forces should be exerted throughout the full range of motion of a joint, and wherever possible multijoint exercises should be used.

END
