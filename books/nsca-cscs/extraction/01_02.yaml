TYPE
Procedure

TITLE
Phases of the Contraction Phase

PAGE
54

SECTION
Contraction Phase

ORIGINAL TEXT
1. The myosin head hydrolyzes ATP into ADP and Pi, both of which remain bound to the myosin head. The energy provided by this biochemical reaction results in a conformational change whereby the myosin head is cocked into a high-energy state.
2. In its high-energy state, the myosin head binds to actin to form the actin-myosin crossbridge.
3. The release of Pi from the myosin head catalyzes a confirmational change in the myosin molecule, leading to the power stroke, which is the pivoting of the myosin head that pulls the actin filament toward the center of the sarcomere.
4. Following the first power stroke, ADP is released from the myosin head and another ATP molecule binds to the myosin head.
5. The actin-myosin crossbridge is subsequently dissociated, the myosin head returns to its original low-energy state and conformation, and the process is repeated with the hydrolysis of the newly bound ATP molecule.

