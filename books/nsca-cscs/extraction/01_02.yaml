TITLE
All-or-None Principle

PAGE
56-57

SECTION
01.02 — Neuromuscular System

ORIGINAL TEXT
There is no evidence to date suggesting that an active motor unit only activates a portion of the muscle fibers to contract. Similarly, no evidence to date suggests that individual muscle fibers can be partially activated within an active motor unit. Hence, the all-or-none principle has been generally used to describe this phenomenon; specifically, the activation of any given motor neuron will lead to the activation and contraction of all of the muscle fibers it innervates.

