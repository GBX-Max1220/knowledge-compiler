ORIGINAL TEXT
Breathing oxygen-enriched gas mixtures (hyperoxic breathing) during rest periods or following exercise can result in short-term improvements in oxygen transport, lactate metabolism, power output, and work tolerance when compared to normoxic breathing (21).

END

TYPE
Definition

TITLE
Vaping

PAGE
375

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Vaping refers to the act of inhaling an aerosol often containing nicotine and flavoring through a device, commonly known as an e-cigarette or vape pen, which heats a liquid to generate vapor without the combustion associated with traditional cigarette smoking.

END

TYPE
Definition

TITLE
Blood Doping

PAGE
377

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The practice of artificially increasing red blood cell mass (blood doping) as a means to improve athletic performance has been criticized as unethical and as one that poses serious health risks to the athlete (120).

END

TYPE
Definition

TITLE
Detraining

PAGE
379

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Detraining is defined as the partial or complete loss of training-induced adaptations in response to an insufficient training stimulus (114, 115).

END

TYPE
Definition

TITLE
Tapering

PAGE
379

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Tapering is the planned reduction of volume of training (usually in duration and frequency but not intensity) that occurs before an athletic competition or a planned recovery microcycle.

END

TYPE
Warning

TITLE
Health Risks of Blood Doping

PAGE
378

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The health risks associated with blood doping further complicate the controversy surrounding this practice. Theoretically, high hematocrit levels may increase risks for embolic events such as stroke, myocardial infarction, deep vein thrombosis, or pulmonary embolism. Increased arterial blood pressure, flu-like symptoms, and increased plasma potassium levels may present themselves with EPO use (139). Finally, there is risk associated with infusion or transfusion, although in most cases the risk is relatively small (139).

END

TYPE
Warning

TITLE
Detrimental Effects of Smoking

PAGE
374-375

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The detrimental effects of smoking include increased airway resistance due to nicotine-related bronchiole constriction or increased fluid secretion and swelling in the bronchial tree due to the irritation of smoke; and paralysis of the cilia on the surfaces of the respiratory tract by nicotine, which limits the ability to remove excess fluids and foreign particles, causing debris to accumulate in the respiratory passageways and adding to the difficulty of breathing.

END

TYPE
Warning

TITLE
Short-Term Side Effects of Vaping

PAGE
376

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Studies examining short-term side effects of vaping report inflammation and cellular damage in the lungs, leading to decreased lung capacity and impaired gas exchange (22, 151), which may in turn affect performance and recovery times during exercise.

END

TYPE
Recommendation

TITLE
Maintaining Training After Heat Acclimation

PAGE
368

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Consequently, it is recommended that athletes maintain their training in the days after heat acclimation to assist retaining their thermoregulatory and physiological adaptations (128).

END

TYPE
Recommendation

TITLE
Considerations for Heat Acclimation Protocol

PAGE
370

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
With this information in mind, strength and conditioning professionals need to consider the type of heat acclimation protocol that they will employ, the proximity of the heat acclimation protocol to the athlete's competition, and the training status and sex of the athlete with whom they are working, in order to maximize the potential benefits from the acclimation environment to the competition environment.

END

TYPE
Recommendation

TITLE
Informing Athletes About Altitude

PAGE
363

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Strength and conditioning professionals are encouraged to inform athletes of both expected acute responses and chronic adaptations to altitude so that they can maintain appropriately adjusted training regimens and a positive mental approach to the impact of altitude.

END

TYPE
Evidence

TITLE
Running and Knee Osteoarthritis

PAGE
351

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
A study evaluating thousands of non-elite male and female runners across the life span (ages from 12 to over 50) reported that running did not increase the odds of knee pain or symptomatic knee osteoarthritis (97). Similarly, a study has reported that running does not increase the risk of symptomatic knee osteoarthritis compared to non-running activities (98). In individuals without preexisting osteoarthritis, running does not appear to harm the knees (98). Moreover, some research suggests that running may even offer protection against general knee pain (29).

END

TYPE
Evidence

TITLE
Elite Athletes and Osteoarthritis

PAGE
351-352

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
In a study of over 2,000 former elite athletes, it was found that those from a power and mixed-sports background (e.g., soccer, basketball, track and field) had an increased rate of hospital admissions for premature osteoarthritis compared to aerobic endurance athletes (e.g., long-distance runners), who also experienced admissions but at a notably older age (90).

END

TYPE
Evidence

TITLE
Heat Acclimation and Time-Trial Performance

PAGE
366-367

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
In a review by Rahimi and colleagues (130) of the physiological responses to heat acclimation across 11 randomized controlled trials with 215 participants, it was reported that heat acclimation was effective for improving time-trial performance as well as reducing time-trial heart rate and maximal heart rate, despite there being no beneficial effect on maximal oxygen uptake, core or mean skin temperature, plasma volume, or blood lactate, nor meaningful effects on rating of perceived exertion or thermal comfort.

END

TYPE
Evidence

TITLE
Vaping and Cardiorespiratory Fitness

PAGE
376

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
In young, healthy adults, regular vaping use significantly reduced cardiorespiratory fitness, measured by V̇O2peak when compared to nonvapers of the same demographic (142a).

END

