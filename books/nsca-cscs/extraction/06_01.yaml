Threshold

TITLE
Heat Acclimation Decay Rate

PAGE
367

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
More recent research indicates that for every day that passes without exposure to the heat, there is a 2.5% loss of adaptations (28).

END

