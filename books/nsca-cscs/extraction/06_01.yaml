Threshold

TITLE
Heat Acclimation Adaptation Timeline

PAGE
367

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The physiological changes to the thermoregulatory system start to occur very quickly, commencing from the first day of exposure (124) and continuing over subsequent days, with the majority of the adaptations (~75%) reported to occur within the first four to six days (121).

END

