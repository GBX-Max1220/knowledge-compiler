TYPE
Definition

TITLE
Maximal Cardiac Output Adaptation

PAGE
343

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The most significant change in cardiovascular function with long-term (6-12 months) aerobic endurance training is the increase in maximal cardiac output, resulting primarily from improved stroke volume; maximal heart rate generally remains unaltered or may even decrease slightly.

END

TYPE
Definition

TITLE
Peripheral Cardiovascular Adaptations

PAGE
343-344

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Another notable change that comes with aerobic endurance training is the peripheral cardiovascular adaptations at the level of the arterioles and capillaries within the muscles (108). Increased muscle fiber capillary density has been observed in response to aerobic endurance training and is a function of the volume and intensity of training.

END

TYPE
Definition

TITLE
Bradycardia

PAGE
344

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Aerobic endurance training can increase the heart's ability to pump blood per contraction at rest and thus may account for some of the significant bradycardia (slower heart rate) observed in highly conditioned aerobic endurance athletes, whose resting heart rates commonly range from 40 to 60 beats/min (58, 108).

END

TYPE
Definition

TITLE
Respiratory Adaptations

PAGE
345

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Pulmonary ventilation generally does not limit aerobic exercise and is either unaffected or only moderately affected by training (8, 32).

END

TYPE
Definition

TITLE
Neural Adaptations to Chronic Aerobic Training

PAGE
345

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Chronic aerobic training in disciplines such as cycling and running can lead to beneficial adaptations in movement economy through improvements in motor recruitment. Chronic aerobic training can result in increased muscle coactivation, enhanced leg stiffness, and a greater ratio of eccentric-to-concentric muscle activity, enabling athletes to use stored elastic energy more efficiently, reducing the metabolic cost of exercise (73a).

END

TYPE
Definition

TITLE
Muscular Adaptations to Aerobic Endurance Training

PAGE
346

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
One of the fundamental adaptive responses to aerobic endurance training is an increase in the aerobic capacity of the trained musculature.

END

TYPE
Definition

TITLE
Critical Power

PAGE
346

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
This adaptation occurs as a result of an improvement in what is called the athlete's critical power or, more simply, the athlete's maximal oxidative energy capacity, which also means that the exercising muscle's rate of lactate production matches the rate of clearance by muscles and other tissues (127a).

END

TYPE
Definition

TITLE
Onset of Blood Lactate Accumulation (OBLA)

PAGE
347

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Consequently, the onset of blood lactate accumulation (OBLA) (see chapter 3) occurs at a higher percentage (up to 80%-90%) of the trained athlete's aerobic capacity.

END

TYPE
Definition

TITLE
Myoglobin

PAGE
348

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Myoglobin is a protein that transports oxygen within the cell.

END

TYPE
Definition

TITLE
Mitochondria

PAGE
348

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Mitochondria are the organelles in cells that are responsible for aerobically producing adenosine triphosphate (ATP) via oxidation of pyruvate and lactate (the products of glycolysis) and free fatty acids.

END

TYPE
Definition

TITLE
Bone and Connective Tissue Adaptations

PAGE
349

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The selection of different forms of aerobic exercise has met with some success in bringing about improvements in bone mass.

END

TYPE
Definition

TITLE
Concurrent Training

PAGE
350

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Another method to increase the musculoskeletal system stimulus is to combine aerobic endurance training with resistance training, a known stimulus for improving bone mass (107), in what is commonly referred to as concurrent training (146) (refer to chapter 21 for more information).

END

TYPE
Definition

TITLE
Endocrine Adaptations

PAGE
352

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Just as endocrine responses to resistance training are needed for muscle development (87), the changes in hormone production that contribute to the body's adaptation to aerobic exercise are equally important (45, 46, 82, 108, 113).

END

TYPE
Definition

TITLE
Relative Energy Deficiency in Sport (RED-S)

PAGE
353

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
An important point related to all this information is what is known as relative energy deficiency in sport (RED-S). For more detail, see chapter 11.

END

TYPE
Definition

TITLE
Aerobic Metabolism

PAGE
355

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Aerobic metabolism plays a vital role in human performance and is basic to all sports, if for no other reason than recovery (156). Metabolically, the Krebs cycle and electron transport chain are the main pathways in aerobic energy production. Aerobic metabolism produces far more ATP energy than anaerobic metabolism and uses fats, carbohydrates, and (minimally) proteins as fuel sources for generating ATP.

END

TYPE
Definition

TITLE
Aerobic Power (Maximal Oxygen Uptake)

PAGE
356

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Arguably the most significant change in physiological variables with aerobic exercise training is an increase in maximal oxygen uptake (V̇O2max), the criterion index of cardiovascular fitness.

END

TYPE
Definition

TITLE
Lactate Threshold

PAGE
356

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Aerobic training increases the absolute lactate threshold, allowing the highly trained individual to work at both a higher relative and absolute percentage of his or her V̇O2max than a less-trained individual.

END

TYPE
Definition

TITLE
Exercise Economy

PAGE
357

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
The economy of exercise is mostly a function of biomechanics and technique, which are influenced by the athlete's metabolic, cardiovascular, and neuromuscular efficiency and training (7).

END

TYPE
Definition

TITLE
Repeated Sprint-Sequence Interval Session

PAGE
358

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
A repeated sprint-sequence interval session can generally be defined as at least two short bouts of ≥10 seconds with a short recovery period of ≤60 seconds; however, this will depend on the athletes' goals (50).

END

