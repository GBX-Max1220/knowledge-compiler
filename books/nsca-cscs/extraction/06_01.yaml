SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
If an athlete was preparing for a marathon to be held at an altitude of 2,500 to 3,000 meters (8,202-9,843 ft), the answer would be altitude, because the athlete would notice the change in atmospheric pressure at that altitude if he or she were from a sea-level environment. However, if the athlete was preparing for a marathon at sea level but in a warm to hot and humid environment and notably above his or her temperate, dry training environment, he or she would be best served by undertaking a heat acclimation protocol.

