TYPE
Definition

TITLE
Chronic Adaptations to Aerobic Exercise

PAGE
341

SECTION
6.1 — Chronic Adaptations to Aerobic Exercise

ORIGINAL TEXT
Understanding the effects of aerobic endurance training on the body systems is important for assessing physical or athletic performance and determining the impact of training programs. This section deals with the effects of aerobic endurance training on the cardiovascular, respiratory, nervous, muscular, bone and connective tissue, and endocrine systems of the body (table 6.1).

END

