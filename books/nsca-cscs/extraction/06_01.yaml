ORIGINAL TEXT
Training at altitude causes exposure to a hypobaric-hypoxic environment and a reduction in an athlete's arterial oxygen content, which sets off a sequence of events starting with an increase in the amount of hypoxia-inducible factor and the subsequent expression of the genes associated with the transcription of erythropoietin (EPO) and nitric oxide (6).

END

