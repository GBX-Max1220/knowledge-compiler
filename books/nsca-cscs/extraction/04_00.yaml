## Item 64

**TYPE**
Decision Rule

**TITLE**
Workout Design and Hormonal Response Decision Logic

**PAGE**
250-251

**SECTION**
Interpreting Hormonal Changes in Peripheral Blood

**ORIGINAL TEXT**
While increased hormone levels after exercise indicate heightened glandular activity, they do not directly correlate with muscle gains. Muscle size and strength can improve without significant changes in hormone levels by, for example, using heavy 1RM to 3RM zones with long rest periods of over 3 minutes. Such resistance loads recruit maximal amounts of motor units and enhance receptor binding. However, such workouts' relatively low metabolic demands typically result in only modest, if any, increases in blood concentrations of testosterone, IGF-1, and growth hormone. Nevertheless, slight hormonal changes, combined with paracrine and autocrine signaling, are generally sufficient to effectively signal via receptors and other molecular pathways within tissues in the neuromuscular system to stimulate growth and repair. Conversely, a workout that involves 8RM to 10RM resistances, short rest periods of 1 to 2 minutes, and a higher volume of work produces greater metabolic demands on the body. The metabolic stress is evidenced by significant increases in blood lactate and a surge in both anabolic and catabolic hormones. These hormonal changes signal skeletal muscle receptors effectively, even with the recruitment of fewer motor units using lighter resistances.

