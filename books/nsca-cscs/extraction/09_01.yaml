TYPE
Risk Factor

TITLE
Predisposing Factors for Anxiety

PAGE
507

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Some predisposing factors for anxiety include large social and schedule adjustments, a biological family history of anxiety, negative life events, early trauma, and shyness in childhood (6, 62).

END

---

TYPE
Risk Factor

TITLE
Predisposing Factors for Depression

PAGE
508

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Studies have identified that depression can begin with poor performance, injury, concussion, social comparisons, high expectations, and changes in social or playing status (26, 31).

END

---

TYPE
Risk Factor

TITLE
Psychological Factors Predisposing Athlete to Injury

PAGE
514

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Research has suggested that a variety of psychological factors can help explain the predisposition of athletes suffering an injury (68). The stress and injury model is a theoretical framework that attempts to explain the effects of pre-injury psychological factors on athletic injury (3). Revised by Williams and Andersen (68), the model suggests that three unique factors can influence an athlete's stress response, separately or together, contributing to an athlete's risk and frequency of injury (figure 9.4). It includes athletes' personality factors such as state or trait anxiety levels, mood states, and perceived locus of control of situations and events; history of stressors such as life events, academic stressors, daily hassles, and previous injury history; and coping resources such as social support, stress management techniques, mental skills, and nutritional and lifestyle habits.

END

---

TYPE
Decision Rule

TITLE
Optimal Arousal Point for Skill Level

PAGE
477

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
The optimal arousal point is lower for less skilled athletes than for more advanced athletes. Therefore, coaches should lower arousal and decrease the decision-making responsibilities of developing or unseasoned athletes (players who are skilled but lack competitive experience) and have them focus on simple assignments to prevent attentional overload.

END

---

TYPE
Decision Rule

TITLE
Arousal and Task Complexity

PAGE
477

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Simple or well-learned skills are less affected by a high degree of arousal because they have few task-relevant cues to monitor (64). ... the situation is dramatically reversed for skills that necessitate conscious decision-making effort, such as those required by a goalie in soccer or a baseball catcher who is facing a critical, bases-loaded pitch. In these instances, arousal must be optimized because of the need to maintain a wider focus so as to recognize relevant attentional cues.

END

---

TYPE
Decision Rule

TITLE
MAS vs. MAF and Challenge

PAGE
483

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Generally, MAS-dominated athletes are most intrigued by situations that are either uncertain or challenging, with an approximate 50% probability of success (64). ... On the other hand, MAF-dominated players are more comfortable in situations in which it is either very easy to achieve success (thereby avoiding shame) or so extremely difficult that there would be no expectation of winning (again, eliminating the likelihood of feeling shame) (64).

END

---

TYPE
Decision Rule

TITLE
Self-Talk and Expertise

PAGE
498

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Instructional self-talk can be harmful for expert performers, because relaying specific performance cues may actively interfere with the automaticity of the movement.

END

---

TYPE
Contraindication

TITLE
Punishment for Mistakes

PAGE
485

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Coaches may punish unwarranted lack of effort, but it seems ineffective to punish athletes for mistakes if they are making the effort to perform correctly.

END

---

TYPE
Warning

TITLE
Yips and Choking Require Professional Support

PAGE
504

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
The yips and choking have been linked to the physiological states of fight-or-flight and, in some case, trauma. ... Thus, if athletes are experiencing these issues, professional support is warranted.

END

---

TYPE
Warning

TITLE
Referral for Persistent Distress

PAGE
510

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
When persistent issues or disruptions become more chronic and severe, a professional referral to a mental health specialist is clearly warranted.

END

