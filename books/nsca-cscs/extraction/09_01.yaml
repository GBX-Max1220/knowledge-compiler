Here are the ontology-labeled extraction items from Section 9.1 of "Essentials of Strength and Training Conditioning", 5th Edition.

---

TYPE
Definition

TITLE
Sport Psychology

PAGE
467

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Sport psychology is a multifaceted discipline, drawing on constructs of exercise science and psychological principles, that seeks to understand the influence of behavioral processes and cognitions on sport performance.

END

---

TYPE
Definition

TITLE
Ideal Performance State

PAGE
469

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
The ideal performance state has been studied from a number of perspectives. Williams and Krane (68) listed the following characteristics that athletes typically report about this state: Absence of fear—no fear of failure; No thinking about or analysis of performance (related to the motor stage of automaticity); A narrow focus of attention concentrated on the activity itself; A sense of effortlessness— an involuntary experience; A sense of personal control; A distortion of time and space, in which time seems to slow

END

---

TYPE
Definition

TITLE
Emotions

PAGE
471

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Emotions are temporary feeling states that occur in response to events and that have both physiological and psychological components (19).

END

---

TYPE
Definition

TITLE
Arousal

PAGE
472

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Arousal is simply a blend of physiological and psychological activation in an individual and refers to the intensity of motivation at any given moment (64).

END

---

TYPE
Definition

TITLE
Anxiety

PAGE
472

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Anxiety is a subcategory of arousal in that it is a negatively perceived emotional state characterized by nervousness, worry, apprehension, or fear and is associated with a physiological activation of the body (64).

END

---

TYPE
Definition

TITLE
State Anxiety

PAGE
473

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
State anxiety refers to a subjective experience of apprehension and uncertainty accompanied by elevated autonomic and voluntary neural outflow and increased endocrine activity (57).

END

---

TYPE
Definition

TITLE
Trait Anxiety

PAGE
473

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Trait anxiety is a personality variable or disposition relating to the probability that one will perceive an environment as threatening.

END

---

TYPE
Definition

TITLE
Stress

PAGE
475

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Stress is defined as a substantial imbalance between demand (physical, psychological, or both) and perceived response capability, under conditions in which failure to meet that demand has important consequences (51).

END

---

TYPE
Definition

TITLE
Stressor

PAGE
475

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
A stressor is an environmental or cognitive event that precipitates stress (i.e., the stress response).

END

---

TYPE
Definition

TITLE
Motivation

PAGE
482

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Motivation can be defined as the intensity and direction of effort (64).

END

---

TYPE
Definition

TITLE
Intrinsic Motivation

PAGE
482

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Intrinsic motivation is important for any athlete. Deci (13) defined this construct as a desire to be competent and self-determining.

END

---

TYPE
Definition

TITLE
Extrinsic Motivation

PAGE
483

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
In opposition, extrinsic motivation is motivation that comes from some external as opposed to internal source.

END

---

TYPE
Definition

TITLE
Achievement Motivation

PAGE
483

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Within the general construct of motivation lies a more specifically targeted type called achievement motivation, which refers to a person's efforts to master a task, achieve excellence, overcome obstacles, and engage in competition or social comparison.

END

---

TYPE
Definition

TITLE
Motive to Achieve Success (MAS)

PAGE
483

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
The MAS relates to the capacity to experience pride in one's accomplishments and is characterized by a desire to challenge oneself and evaluate one's abilities.

END

---

TYPE
Definition

TITLE
Motive to Avoid Failure (MAF)

PAGE
483

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
On the other hand, the MAF relates to the desire to protect one's ego and self-esteem.

END

---

TYPE
Definition

TITLE
Self-Controlled Practice

PAGE
484

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Self-controlled practice involves the athlete in decisions related to the practice structure, including when to receive feedback or which skill to practice; it also involves simply asking athletes how they believe they are doing (10, 11, 12, 73).

END

---

TYPE
Definition

TITLE
Positive Reinforcement

PAGE
485

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Positive reinforcement is the act of increasing the probability of occurrence of a given behavior (a target behavior, such as correct footwork in basketball, is termed an operant) by following it with a positive action, object, or event such as praise, decals on the helmet, or prizes and awards.

END

---

TYPE
Definition

TITLE
Negative Reinforcement

PAGE
485

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Negative reinforcement also increases the probability of occurrence of a given operant, but it is accomplished through the removal of an act, object, or event that is typically aversive.

END

---

TYPE
Definition

TITLE
Positive Punishment

PAGE
485

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Positive punishment is the presentation of an act, object, or event following a behavior that could decrease the behavior's occurrence.

END

---

TYPE
Definition

TITLE
Negative Punishment

PAGE
485

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Negative punishment, or the removal of something valued, could take the form of revoking privileges or playing time, as in benching.

END

---

TYPE
Definition

TITLE
Attention

PAGE
487

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Attention is defined as the processing of both external and internal cues that come to awareness.

END

---

TYPE
Definition

TITLE
Selective Attention

PAGE
487

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
The ability to inhibit awareness of some stimuli in order to process others is termed selective attention, and it suppresses task-irrelevant cues (e.g., people on the sidelines, planes flying over the stadium) in order to process the task-relevant cues in the limited attentional space.

END

---

TYPE
Definition

TITLE
Cognitive Stage

PAGE
488

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
The first stage, termed the cognitive stage, is characterized by effortful and conscious regulation of the movement.

END

---

TYPE
Definition

TITLE
Associative Stage

PAGE
488

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
During the second stage, the associative stage, the athlete must focus on the task but is less concerned with the details of the movement.

END

