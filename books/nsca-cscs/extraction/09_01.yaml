---

TYPE
Recommendation

TITLE
How Should Positive and Negative Reinforcement Be Applied?

PAGE
486

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
Coaches should generally subscribe to a reinforcement strategy to assist athletes to focus on what they do correctly. Punishment should be used sparingly, because it increases the likelihood that athletes will focus on what they are doing incorrectly. Under conditions that promote a narrow focus of attention, positive reinforcement aids a focus on task-relevant cues, while punishment floods attentional capacity with a predominance of task-irrelevant cues.

END

---

TYPE
Recommendation

TITLE
How Should Athletes Use Arousal Control Techniques?

PAGE
494

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
An athlete should employ arousal reduction techniques when performing a new skill or one that is complex or when performing in high-pressure situations. Athletes should employ arousal enhancement techniques when executing simple skills, ones that are well learned, or in situations of minimal pressure. The purpose of employing such techniques is to allow the athlete to perform with an unburdened mind while matching his or her mental and physical intensity to the demands of the task.

END

---

TYPE
Recommendation

TITLE
Guidelines for Goal Setting

PAGE
503

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
In general, guidelines for goal setting include the following: Long-term goals and short-term goals are interdependent. Long-term goals provide a sense of meaningfulness and direction for pursuing short-term goals. The attainment of short-term goals provides a hierarchical sense of mastery and success that builds self-confidence. Athletes should define process goals to focus on elements of their performance over which they have control.

END

---

TYPE
Procedure

TITLE
Three-Step Process for Supporting Athlete Mental Health

PAGE
508

SECTION
9.1 — Psychological Foundations of Performance

ORIGINAL TEXT
First, identify the signs and symptoms of distress related to affect, behavior, and cognitions. Second, determine the duration of distress (lasting greater than 2-3 weeks) and potential disruption (e.g., sleep patterns, nutritional habits, social relationships). Specifically, is the distress temporary or persistent, and how will it affect behaviors outside of sports? Third, determine how to support the athlete. A question could follow: Is it important to refer the athlete for more support, allow the athlete time for self-reflection, or collaborate with the athlete to work on centering or environmental management to change disruptive performance-related responses?

END

