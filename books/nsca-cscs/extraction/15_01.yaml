TITLE
Stretching Timing Recommendation

PAGE
893

SECTION
15.1 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
As a general guideline, stretching at the following times can provide optimal benefits: Following practice and competition. Postpractice stretching potentially facilitates ROM improvements (40), although the evidence for this is mixed (79). It should be performed within 5 to 10 minutes after practice. The increased body temperature increases the elastic properties of collagen within muscles and tendons, which potentially allows for a greater stretch magnitude. Postpractice stretching may also decrease muscle soreness, although the evidence on this is again ambiguous (59, 79). As a separate session. If increased levels of flexibility are required, additional stretching sessions may be needed. In this case, stretching should be preceded by a thorough general warm-up to allow for the increase in muscle temperature necessary for effective stretching. This type of session can be especially useful as a recovery session on the day after a competition.

