15.1 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
As the name indicates, raise, activate and mobilize, and potentiate are its three key phases. The first phase of the RAMP protocol involves activities that raise the level of key physiological parameters while also focusing on enhancing the skill level of the athletes. The second phase, activating and mobilizing, could at first glance be confused with the static stretching component of a traditional warm-up. However, here again we see major differences in both the goal of the phase and subsequently the types of activities chosen. Here, a longer-term consideration is played out, whereby the focus is to develop an athlete’s movement competency (48). The third phase, potentiation, could be considered as analogous to the specific warm-up, crucially its focus on the progressive intensity of activities is different.

