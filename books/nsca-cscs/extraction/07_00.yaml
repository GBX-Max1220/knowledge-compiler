TYPE
Recommendation

TITLE
Youth Resistance Training Guidelines

PAGE
417

SECTION
Chapter 7 — Age-Related Differences and Their Implications for Resistance Training — Program Design Considerations for Children

ORIGINAL TEXT
Youth Resistance Training Guidelines
Each child should understand the benefits and risks associated with resistance training.
Competent and caring strength and conditioning professionals should design and supervise training sessions based primarily on the desired training adaptation and technical competency but also with consideration to growth and maturation.
The exercise environment should be safe and free of hazards, and the equipment should be appropriately sized to fit each child.
Dynamic warm-up exercises, movement challenges, and opportunities for exploratory play should be performed before resistance training.
When appropriate, static stretching exercises should be performed after resistance training.
Carefully monitor each child’s tolerance to the exercise stress.
Begin with light loads to allow appropriate adjustments to be made.
Increase the resistance gradually (e.g., 5%-10%) as technique and strength improve.
Depending on individual needs and goals, different set × repetition combinations (e.g., 3 × 5) can be performed on a variety of single- and multijoint exercises (and those targeting the strengthening of the core musculature).
Advanced multijoint exercises, such as the snatch and clean and jerk, may be incorporated into the program, provided that appropriate loads are used and technical proficiency remains a key outcome.
Two or three nonconsecutive training sessions per week are recommended; however, youth with higher training ages may participate in more frequent resistance training sessions per week.
When necessary, adult spotters should be nearby to actively assist the child in the event of a failed repetition (e.g., bench press or squat).
The resistance training program should be systematically periodized throughout the year to ensure that the child or adolescent is exposed to a sequential and varied training stimulus with adequate rest and recovery between training cycles.

END

TYPE
Recommendation

TITLE
Safety Recommendations for Resistance Training for Older Adults

PAGE
432-433

SECTION
Chapter 7 — Age-Related Differences and Their Implications for Resistance Training — Safety Recommendations for Resistance Training for Older Adults

ORIGINAL TEXT
Safety Recommendations for Resistance Training for Older Adults
Older adult participants should be prescreened, since many older people suffer from a variety of age-related medical conditions. If necessary, medical advice should be sought concerning the most appropriate type of activity.
Participants should warm up for 5 to 10 minutes before each exercise session. An acceptable warm-up includes low- to moderate-intensity aerobic activity and calisthenics.
Older adults should perform static stretching exercises either before or after—or both before and after—each resistance training session.
Older adults should use a resistance intensity that does not excessively overload the musculoskeletal system.
Participants should avoid performing the Valsalva maneuver during resistance training to avoid an abnormal increase in blood pressure.
Older adults should be allowed 48 to 72 hours of recovery between exercise sessions.
They should perform all exercises within a range of motion that is pain free.
As with any individual engaging with resistance training, older adults should receive individualized exercise instruction from qualified instructors.

END

