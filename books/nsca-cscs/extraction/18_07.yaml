TYPE
Recommendation

TITLE
Rest Periods for Strength and Power Training

PAGE
1254

SECTION
18.7 — Step 7: Rest Periods

ORIGINAL TEXT
Common guidelines for rest period length range 2 to 5 minutes (50, 162, 163) because these rest periods have been shown to permit greater volumes of work (194), allow for the use of heavier loads (193), and result in greater maximal strength and power adaptations (38, 136) compared to shorter rest intervals.

END

---

TYPE
Recommendation

TITLE
Rest Periods for Hypertrophy Training

PAGE
1254

SECTION
18.7 — Step 7: Rest Periods

ORIGINAL TEXT
While rest periods for hypertrophy are typically 1.5 minutes or less, longer rest periods (i.e., 3 min) have been shown to produced greater increases in muscle hypertrophy compared to those that were shorter (i.e., 1 min) (145).

END

