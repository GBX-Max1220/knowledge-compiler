TABLE 18.15  Rest Period Length Assignments Based on the Training Goal

Training goal* Rest period length
Strength 2-5 min
Power (single- and multiple-effort event) 2-5 min
Hypertrophy 2-3 min for multijoint exercises; 60-90 s for single-joint exercises
Muscular endurance ≤30 s

*Because there are occasions when the prescribed percentage of the 1RM for assistance exercises falls outside the range associated with the training goal (e.g., ≥8RM loads are recommended for assistance exercises as part of a muscular strength training program [2]), the strength and conditioning professional should examine the loads used for each exercise when assigning rest periods rather than generally applying the guidelines for a training goal.

Data from Fleck and Kraemer (2014); Gettman and Pollock (1981); Robinson et al. (1995); Scala et al. (1987); Schoenfeld et al. (2016); Stone and O'Bryant (1987); Stone et al. (2022); Tesch et al. (1986).

END

