TITLE
Longer Rest Periods for Heavier Loads

PAGE
1252

SECTION
18.7 — Step 7: Rest Periods

ORIGINAL TEXT
The amount of rest between sets is strongly related to load; the heavier the loads lifted, the longer the rest periods the athlete will need between sets to safely and successfully complete the prescribed subsequent sets and to promote higher quality training.

END

