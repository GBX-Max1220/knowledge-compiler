TITLE
xRM Testing Based on Goal Repetitions

PAGE
1229

SECTION
18.5 — Step 5: Training Load and Repetitions

ORIGINAL TEXT
A third option for determining training loads requires the strength and conditioning professional to first decide on the number of repetitions (i.e., the goal repetitions) the athlete will perform in the actual program for the exercise being tested. For example, if the strength and conditioning professional decides that the athlete should perform 6 repetitions for the bench press exercise in the training program, the xRM testing protocol should have the athlete perform the exercise with a load that will result in 6 repetitions (6RM). Core and assistance exercises can be selected for xRM testing, but as previously mentioned, high-repetition testing sets can create significant fatigue and may compromise the accuracy of the tested xRM. This effect seems to be more problematic for exercises that involve multiple joints and large muscle areas due to their high metabolic demand (138, 185). Further, xRM testing (and subsequent load assignments) for assistance exercises should be at or above an 8RM to minimize the isolative stress on the involved joint and connective tissue (2, 46). In other words, even if an athlete is following a muscular strength training program that involves 2RM loads for the core exercises, the heaviest load the assistance exercises should be assigned is an 8RM.

