TITLE
Estimating a 1RM

PAGE
1227

SECTION
18.5 — Step 5: Training Load and Repetitions

ORIGINAL TEXT
When maximal strength testing is not warranted, testing with a 3RM or 5RM load (and then estimating or predicting the 1RM) can be a suitable secondary option. This approach is appropriate for nearly all athletes, provided they can demonstrate the proper technique in the exercise tested. Core and assistance exercises can be selected for RM testing, but excessive warm-up and testing sets may fatigue the athlete and compromise the accuracy of the test. It should be noted, however, that the level of accuracy of predicting a 1RM from other xRM tests becomes less accurate (i.e., commonly resulting in overestimations of the 1RM) as the number of repetitions completed increases and may also be affected by the type of training with which the athlete is familiar (134). Additionally, power exercises do not lend themselves well to xRM testing above 5 repetitions for repeated testing sets because technique can deteriorate rapidly (71). Lower (and more accurate) xRM determinations using heavier loads can be made once the athlete has sufficient training and technique experience.

PARENT
None

CHILDREN
None

RELATIONSHIPS
None

END

TYPE
Procedure

TITLE
Multiple RM Testing Protocol

PAGE
1227

SECTION
18.5 — Step 5: Training Load and Repetitions

ORIGINAL TEXT
The protocol for multiple RM testing is similar to that for 1RM testing, but each set requires multiple repetitions, not one. After the completion of warm-up sets, the athlete's sequential load changes for the 10RM test are smaller than those listed in figure 18.8 (approximately one-half). Continue the process of testing until a load allowing the selected number of repetitions is determined. An experienced strength and conditioning professional will be able to adjust the loads so that the multiple RM can be measured within 3 to 5 testing sets.

