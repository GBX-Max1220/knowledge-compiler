TITLE
Set-Repetition Best (SRB)

PAGE
1232

SECTION
18.5 — Step 5: Training Load and Repetitions

ORIGINAL TEXT
Originally proposed by Stone and O'Bryant (162), set-repetition best (SRB) is a load prescription method that uses relative intensities (i.e., percent ranges) where the maximum load is estimated based on performances of a given set and repetition scheme. In other words, SRB determines loads based on percentages of what was performed in training. Specifically, 5% ranges are prescribed to allow strength and conditioning professionals to observe the performance of their athletes and incorporate athlete feedback as a means of autoregulation.

