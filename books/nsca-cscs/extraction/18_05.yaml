The rating of perceived exertion (RPE) provides a subjective measurement of work based on the perception of an individual. While the original RPE scale (i.e., 6-20) was based on aerobic activity (15), a modified CR10 scale (i.e., 0-10) has been examined by researchers when monitoring resistance training exercise intensity within an individual set (92, 135) and during entire training sessions (i.e., session RPE) (37, 107, 181).

