END

TYPE
Definition

TITLE
Aerobic Capacity

PAGE
767

SECTION
14.1 — Measuring Parameters of Athletic Performance

ORIGINAL TEXT
Aerobic capacity, also called aerobic power, is the maximum rate at which an athlete can produce energy through oxidation of energy sources (carbohydrates, fats, and proteins) and is usually expressed as a volume of oxygen consumed per kilogram of body weight per minute (i.e., mL · kg−1 · min−1) (95).

END

TYPE
Definition

TITLE
Agility

PAGE
770

SECTION
14.1 — Measuring Parameters of Athletic Performance

ORIGINAL TEXT
Agility traditionally has been considered the ability to stop, start, and change the direction of the whole body rapidly (134, 143). Agility consists of two main components: speed in changing direction and cognitive factors (134). The definition of agility has been revised to take into account the perceptual qualities, and it is now considered "a rapid, whole-body, change of direction or speed in response to a sports-specific stimulus" (134, 143).

END

