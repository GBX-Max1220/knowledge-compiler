TYPE
Recommendation

TITLE
Developing an Athletic Profile Steps

PAGE
825

SECTION
14.1 — Developing an Athletic Profile

ORIGINAL TEXT
When evaluating athletes, the strength and conditioning professional should follow these six steps:
1. Select tests that will measure the specific parameters most closely related to the physical characteristics of the sport or sports in question.
2. Choose valid and reliable tests to measure these parameters, and arrange the testing battery in an appropriate order with sufficient rest between tests to promote test reliability.
3. Administer the test battery with as many athletes as possible.
4. Determine the smallest worthwhile change for the tests and compare to normative data where appropriate. It is recommended that coaches store testing results and develop their own norms when standardized procedures are used.
5. Conduct repeat testing (e.g., pre- and posttraining program) and use the results to present a visual profile with figures.
6. Use the results of the testing in some meaningful way.

END

TYPE
Procedure

TITLE
1RM Bench Press Procedure

PAGE
776

SECTION
14.1 — 1RM Bench Press

ORIGINAL TEXT
Procedure
1. Instruct the athlete in proper technique for the flat barbell bench press as described in chapter 16.
2. The spotter stands at the head end of the bench throughout the test to help in raising the bar on a failed attempt and to help the athlete place the bar back on the rack.
3. As with any maximal strength test, the athlete first does a specific warm-up of 5 to 10 repetitions with a light to moderate load.
4. Usually, at least two heavier warm-up sets of 2 to 5 repetitions each are completed before the first actual 1RM attempt.
5. Generally, it is desirable to measure the 1RM within three to five attempts after the warm-up; otherwise, fatigue may detract from the final result.
6. A more detailed step-by-step method for the 1RM protocol is shown in figure 18.8 on page 546.

END

TYPE
Procedure

TITLE
1RM Bench Pull Procedure

PAGE
776-777

SECTION
14.1 — 1RM Bench Pull

ORIGINAL TEXT
Procedure
1. Instruct the athlete in proper technique for the bench pull (figure 14.3a).
2. The athlete grasps the bar with a closed pronated grip, wider than shoulder width.
3. Bench height is set so the athlete can use a comfortable grip while the weight is off the ground in the hang position.
4. The athlete starts the lift from the hang position, and the grip should be consistent from test to test.
5. The bar is pulled up toward the lower chest or upper abdomen with the elbows pointed up (figure 14.3b).
6. The head position can remain either down or to the side but must remain in contact with the bench throughout the test.
7. A valid repetition is one in which the bar touches the underside of the bench and the bar is lowered in a controlled manner to the hang position with full elbow extension without touching the ground.
8. The feet should remain off the ground throughout the test and in the same position throughout.
9. A more detailed step-by-step method for the 1RM protocol is shown in figure 18.8 (page 546).

END

TYPE
Procedure

TITLE
1RM Back Squat Procedure

PAGE
778

SECTION
14.1 — 1RM Back Squat

ORIGINAL TEXT
Procedure
1. Instruct the athlete in proper technique for the back squat as described in chapter 16.
2. Warm-up sets are performed as for the 1RM bench press test. However, the loads lifted are typically heavier than in the 1RM bench press test, so the load increments will be greater than those of the 1RM bench press.
3. Refer to figure 18.8 (page 546) for a 1RM testing protocol.

END

TYPE
Procedure

TITLE
Isometric Mid-Thigh Pull (IMTP) Procedure

PAGE
779-781

SECTION
14.1 — Isometric Mid-Thigh Pull

ORIGINAL TEXT
Procedure
1. The testing rack needs to be set to a height that allows the athlete to mirror the "second pull" position used in weightlifting (i.e., clean or power clean). In this position the immovable bar is positioned across the upper portion of the thigh, immediately inferior to the pelvis (58) (figure 14.4).
2. When performing the test, the athlete should have an upright trunk position (62, 63) with the feet roughly hip-width apart and a slight flex of the knee while grasping the bar with a clean grip while using weightlifting straps (58). In this position the knee angle should be approximately 120 degrees and 145 degrees, and the hip angle should be approximately 125 degrees and 150 degrees (62). However, it is important to note that the exact bar position as well as knee and hip angles are difficult to recommend because an individual's anthropometrics will exert a large influence on the exact position during the test.
3. Before conducting the isometric mid-thigh pull test it is important that between one and three familiarization sessions are performed in order to enhance the reliability of the test (62). Less familiarization is needed with trained athletes, especially those who train regularly with weightlifting derivatives. First, the athlete should complete a dynamic warm-up that includes dynamic stretches (e.g., bodyweight squats and lunges) as well as dynamic lifting tasks (e.g., low-load and moderate-load mid-thigh pulls). After this is completed, a series of progressively intense isometric actions should be performed at perceived intensities of 50%, 70%, and 90% of maximum, with 1 to 2 minutes rest between trials (29, 62). During this time the strength and conditioning professional should monitor the athlete's body posture and make corrections as needed.
4. After completing the last submaximal trial, the athlete should complete a minimum of three maximum-effort trials separated by 1 to 2 minutes of rest. If the main goal of the test is to determine the peak force that the athlete can produce, each trial should last between 3 and 5 seconds. If the rate of force development (RFD) is of interest, each trial should last up to 1 second (54). Regardless of which protocol is used, if the peak force between trials varies by more than 15%, additional trials are warranted (105).
5. Regardless of the protocol used to collect the force–time curve, all trials need to be visually screened to determine whether they meet preestablished criteria (29). If the strength and conditioning professional notes any of the following, the trial should be discarded and another trial should be conducted:
A quiet standing period of 1 s with >50 N change in force
Pre-tension (<50 N) while maintaining a rigid torso before initiating force application
A countermovement prior to the onset of force application
Peak force at the end of the pull
6. If the trial is deemed acceptable but the peak force of each trial is not within 15% of the others, additional trials should be conducted.
7. When analyzing the results of an IMTP test, the most common measures include the peak force and the force at specific time points (i.e., 50, 100, 150, 200, and 250 ms) (figure 14.5). These metrics are often reported in absolute and relative terms (i.e., force per kg body weight). Time-dependent variables such as the RFD and impulse are often quantified (and reflect the change in force production during a certain time period as represented by Δ). The peak RFD is typically quantified with a 20-millisecond moving window, while the RFD and impulse are quantified during predetermined time windows (i.e., 0-50, 0-100, 0-200, and 0-250 ms).

END

TYPE
Procedure

TITLE
Nordic Hamstring Test Procedure

PAGE
781-782

SECTION
14.1 — Nordic Hamstring Test

ORIGINAL TEXT
Procedure
1. Set up the instrumented device on a stable surface. The athlete should kneel on the testing device and place the ankles under the hooks (within which force cells are housed to quantify force). The athlete should be careful to only contact the hooks with the back of the ankles and to not push off the board with the toes in order to gain leverage. If not using an instrumented device but using videography instead, the camera (or mobile phone) should be placed in the sagittal view and fixed using a tripod or similar and positioned so that the full range of motion is recorded. The knees of the athlete should be a 90-degree angle of flexion relative to the lower leg and the rest of the body (figure 14.6a). Care should be taken to ensure that the athlete does not flex forward at the hips, because occasionally athletes will do this in order to reduce the eccentric loading on the hamstrings.
2. The athlete should then lean forward under control (i.e., controlled acceleration) by extending the knees, increasing the knee angle, and maintaining a straight line from the knees through the shoulders (figure 14.6b).
3. After lowering to the ground in this fashion, the athlete may then use the hands to push back up to the starting position. Typically, 3 to 6 sets of this test are performed.
4. If using an instrumented device, record absolute force of eccentric hamstring force, typically measured in newtons (N). Ratio or allometric scaling of peak force, as discussed earlier in the chapter, may also be considered with Nordic hamstring force outputs to account for variations in body mass and length on the peak force measurements. Other metrics such as torque in newton-meters (Nm) or the percentage of asymmetry present between left and right hamstrings may also be recorded if desired. If using videography alone, the break point angle (the angle at which the external knee flexor moment can no longer be resisted and the athlete loses active control of downward motion) can be reported as a moderate proxy of eccentric hamstring strength.

END

TYPE
Procedure

TITLE
Standing Long (Broad) Jump Procedure

PAGE
785

SECTION
14.1 — Standing Long (Broad) Jump

ORIGINAL TEXT
Procedure
1. Place a 2- to 3-foot (0.6-0.9 m) length of tape on the floor to serve as a starting line.
2. The athlete stands with the toes just behind the starting line.
3. The athlete performs a countermovement and jumps forward as far as possible.
4. The athlete must land on the feet for the jump to be scored. Otherwise, the trial is repeated.
5. A marker is placed at the back edge of the athlete's rearmost heel, and the tape measure determines the distance between the starting line and the mark.
6. The best of three trials is recorded to the nearest 0.5 inch or 1 centimeter.

END

TYPE
Procedure

TITLE
Vertical Jump Procedure (Using a Force Plate)

PAGE
785-786

SECTION
14.1 — Vertical Jump

ORIGINAL TEXT
Procedure (Using a Force Plate)
1. Before testing, the tester should calibrate and set up the force plate as per the manufacturer's instructions.
2. The force plate should always be set up on a stable surface (ideally in the same location each time) and the force zeroed with nothing on the plates immediately before the athlete tests. Without a preparatory or stutter step, the athlete performs a countermovement by quickly flexing the knees and hips, moving the trunk forward and downward, and swinging the arms backward.
3. The countermovement jump is most commonly conducted with hands in a fixed position on the hips throughout the takeoff portion of the jump to isolate the power and coordination capacity of the lower limbs. Jumping with the use of an arm swing can also be tested and is referred to as an Abalakov jump. Either way, consistency should be used and each jump should be tracked as to whether it was performed with (Abalakov) or without an arm swing.
4. Figure 14.7 shows an example of how the vertical ground reaction forces change across the five phases of a vertical jump with a countermovement when measured with a force plate testing system.

END

TYPE
Procedure

TITLE
Squat Jump (Static Vertical Jump) Procedure

PAGE
787-788

SECTION
14.1 — Squat Jump (Static Vertical Jump)

ORIGINAL TEXT
Procedure
1. The test procedures are essentially the same as for the vertical jump, except that the countermovement is removed. Begin with the athlete standing on a calibrated, zeroed force platform. (Note: The squat jump and vertical jump with countermovement can also be tested using a switch or contact mat system (figure 14.9) [158], which estimates jump height [51] but cannot measure force outputs.)
2. The athlete descends into a squat position (knee angle approximately 110 degrees) and holds this position for 2 to 3 seconds before jumping vertically, keeping hands fixed on hips.
3. The takeoff and landing positions, as well as jumping strategy, should be the same for each trial. Specifically, the tester should ensure there is no countermovement (dip) at the start of the jump, both through visual observation and, where a force plate is used, by assessing the force–time curve.
4. The best of three trials is recorded. The ratio of the vertical jump height with countermovement to squat jump height can be calculated as the eccentric utilization ratio (99).
5. Figure 14.10 shows an example of how the vertical ground reaction forces change across the three phases of a static vertical jump when measured with a force plate testing system.

END

TYPE
Procedure

TITLE
Drop Jump Procedure

PAGE
789-790

SECTION
14.1 — Drop Jump

ORIGINAL TEXT
Procedure
1. When performing a drop vertical jump, the athlete should step out before free-falling from as close as possible to the height of the box rather than stepping down (i.e., lowering) or jumping off (i.e., rising) the box. Box height selection for an athlete can vary but is typically 20 centimeters (8 in.), 30 centimeters (12 in.), or 40 centimeters (16 in.) (figure 14.11a). The higher the box, the greater the plyometric demand. When using a device that is not flush with the ground or base of the box when conducting the drop vertical jump test, such as when using a switch mat, the strength and conditioning professional should measure the box height from the top of the box to the top surface of the switch mat.
2. The athlete steps out from the box and lands on the floor, force plate, or switch mat (figure 14.11b) and, as quickly as possible, jumps again (figure 14.11c). Drop jumps should be performed with the athlete attempting to jump with a short ground contact time while still aiming to jump as high as possible. A short ground contact time is achieved by limiting flexion of the ankles, knees, and hips while in contact with the ground by adopting high leg stiffness (high force with shallow range of motion). It is advised that at least 2 to 3 sets are performed.
3. The most reported performance variables following drop vertical jump testing are jump height (from flight time), ground contact time, and reactive strength index (calculated as jump height divided by ground contact time) (91). The reactive strength index is often considered an indication of how well an athlete can recruit the fast component of the stretch-shortening cycle.
4. Figure 14.12 shows an example of the force–time curve with labels pointing out the peak vertical ground reaction force, contact time, and flight time when measured with a force plate testing system.

END

TYPE
Procedure

TITLE
Margaria-Kalamen Test Procedure

PAGE
792

SECTION
14.1 — Margaria-Kalamen Test

ORIGINAL TEXT
Procedure
1. The height of each step is measured with a ruler or tape measure, and the elevation from the third step to the ninth step is calculated (6 × step height).
2. The timer start switch mechanism is placed on the third step, and the stop switch mechanism is placed on the ninth step.
3. The athlete to be tested is weighed on a scale, warms up, and practices running up the stairs three steps at a time.
4. When ready, the athlete sprints toward the stairs from a standing start 20 feet (6 m) from the base of the stairs and then up the staircase three steps at a time (third step to sixth step to ninth step) as fast as possible.
5. The time from third- to ninth-step contact is determined to the nearest 0.01 second using the timing system.
6. Power in watts is calculated as the athlete's weight (w) in newtons (lb × 4.45 or kg × 9.807) times height (h) in meters (inches × 0.0254) from the third step to the ninth step divided by the measured time interval (t) in seconds; P (watts) = (w × h) / t.
7. Repeat the test two more times with a 2- to 3-minute recovery period between each trial.

END

TYPE
Procedure

TITLE
300-Yard (274 m) Shuttle Run Procedure

PAGE
794

SECTION
14.1 — 300-Yard (274 m) Shuttle Run

ORIGINAL TEXT
Procedure
1. Pair off athletes of similar ability.
2. Position two athletes immediately behind one line, facing the other line.
3. On an auditory signal, the athletes sprint to the line 25 yards (23 m) away, making foot contact with it, then immediately sprint back to the first line. Six such round trips are made as fast as possible without stopping (6 × 50 yd = 300 yd [274 m]).
4. On completion of the first trial, record both athletes' times to the nearest 0.1 second and start a clock to time a 5-minute rest interval. As each pair of athletes completes the first trial, they may walk and stretch but must stay alert for the starting time on the second trial.
5. After the rest period, the pair of athletes does another trial.
6. The average of two trials is recorded to the nearest 0.1 second.

END

TYPE
Procedure

TITLE
Partial Curl-Up Procedure

PAGE
795

SECTION
14.1 — Partial Curl-Up

ORIGINAL TEXT
Procedure
1. The athlete assumes a supine position on a mat with a 90-degree knee angle (figure 14.15a). The arms are at the sides, resting on the floor, with the fingers touching a 4-inch-long (10 cm) piece of masking tape positioned perpendicular to the fingers. A second piece of masking tape is situated parallel to the first tape at a distance determined by the age of the athlete (4.7 inches [12 cm] for those younger than 45 and 3.1 inches [8 cm] for those 45 or older).
2. Set a metronome to 40 beats/min and have the athlete do slow, controlled curl-ups to lift the shoulder blades off the mat (trunk makes a 30-degree angle with the mat; figure 14.15b) in time with the metronome (20 curl-ups per minute). The upper back must touch the floor before each curl-up. The athlete should avoid flexing the neck to bring the chin close to the chest.
3. The athlete performs as many curl-ups as possible without pausing, to a maximum of 75.

END

TYPE
Procedure

TITLE
T-Test Procedure

PAGE
803-804

SECTION
14.1 — T-Test

ORIGINAL TEXT
Procedure
1. Arrange four cones as shown in figure 14.21 (points A, B, C, and D). Set the timing gates up at the start and finish line.
2. Have the athlete warm up and stretch before the test. The athlete may run the course with a submaximal effort for practice.
3. The test begins with the athlete standing at point A.
4. On an auditory signal, the athlete sprints forward to point B and touches the base of the cone with the right hand.
5. Then, while facing forward and not crossing the feet, the athlete shuffles to the left 5 yards (4.6 m) and touches the base of the cone at point C with the left hand.
6. The athlete then shuffles to the right 10 yards (9 m) and touches the base of the cone at point D with the right hand.
7. The athlete then shuffles to the left 5 yards (4.6 m) and touches the base of the cone at point B with the left hand, and next runs backward past point A, at which time the watch is stopped.
8. For safety, a spotter and gym mat should be positioned several feet behind point A to catch an athlete who falls while running backward.
9. The best time of two trials is recorded to the nearest 0.1 second.
10. The following are reasons for disqualification of a trial: The athlete fails to touch the base of any cone, crosses one foot in front of the other instead of shuffling the feet, or fails to face forward for the entire test.

END

TYPE
Procedure

TITLE
5-10-5 Test Procedure

PAGE
805-806

SECTION
14.1 — 5-10-5 Test

ORIGINAL TEXT
Procedure
1. If using one timing gate for total end time, set this up at the start and finish line. If multiple gates are available, set up at the start and finish line as well as at each turn line to measure each split.
2. The athlete straddles the center line using a three-point stance.
3. On an auditory signal, the athlete sprints 5 yards (4.6 m) to the line on the left, then changes direction and sprints 10 yards (9 m) to the line on the right, then again changes direction and sprints 5 yards (4.6 m) to the center line. Hand (or foot) contact must be made with all indicated lines. (Note: It is important that this is kept consistent for both trials.)
4. The best time of two trials is recorded to the nearest 0.01 second.

END

TYPE
Procedure

TITLE
Straight-Line Sprint Tests Procedure

PAGE
809

SECTION
14.1 — Straight-Line Sprint Tests

ORIGINAL TEXT
Procedure
1. Have the athlete warm up and dynamically stretch for several minutes.
2. Allow at least two practice runs at submaximal speed.
3. The athlete assumes a starting position using a three- or four-point stance.
4. On an auditory signal, the athlete sprints the specified distance at maximal speed.
5. The best split times of two trials are recorded to the nearest 0.1 second.
6. Allow at least 2 minutes of active recovery or rest between trials.

END

TYPE
Procedure

TITLE
Sit-and-Reach Test Procedure

PAGE
812

SECTION
14.1 — Sit-and-Reach Test

ORIGINAL TEXT
Procedure
1. Tape the measuring stick or tape measure to the floor. Place one piece of tape about 24 inches (61 cm) long across the measuring stick and at a right angle to it at the 15-inch (38 cm) mark.
2. Have the athlete warm up with nonballistic exercises involving the hamstrings and lower back (e.g., by walking rapidly for 3-5 min); performing several repetitions of flexing forward from a standing, knees-extended position, reaching toward the toes, then reaching upward toward the ceiling (all without jerking); jogging in place while trying to kick the heels into the upper thighs from behind; and finishing with standing toe-touching or similar stretching on the floor.
3. Have the athlete sit shoeless with the measuring stick between the legs with its zero end toward the body, the feet 12 inches (30 cm) apart, the toes pointed upward, and the heels nearly touching the edge of the taped line at the 15-inch (38 cm) mark (figure 14.28a).
4. The athlete slowly reaches forward with both hands as far as possible on the measuring stick, holding this position momentarily. To get the best stretch, the athlete should exhale and drop the head between the arms when reaching. Be sure the athlete keeps the hands adjacent to each other and does not lead with one hand. The fingertips should remain in contact with the measuring stick (figure 14.28b). The tester may hold the athlete's knees down, if necessary, to keep them straight. A score of less than 15 inches indicates that the athlete could not reach the bottom of the feet.
5. The best of three trials is recorded to the nearest 0.25 inch or 1 centimeter.

END

