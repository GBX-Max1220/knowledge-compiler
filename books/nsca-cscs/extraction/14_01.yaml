Definition

TITLE
Anaerobic or Maximum Muscular Power (High-Speed Strength)

PAGE
765-766

SECTION
14.1 — Measuring Parameters of Athletic Performance

ORIGINAL TEXT
High-speed muscular strength or maximal anaerobic muscular power (or anaerobic power) is related to the ability of muscle tissue to exert high force while contracting at a high speed.

END

