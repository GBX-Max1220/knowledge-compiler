TITLE
Amine Hormone Interactions

PAGE
247

SECTION
4.2 — Signaling Concepts

ORIGINAL TEXT
Amine hormones are indeed synthesized from amino acids, including those derived from tyrosine (such as epinephrine, norepinephrine, and dopamine) and tryptophan (such as serotonin), and primarily exert their effects by binding to membrane receptors. These hormones typically act through secondary messenger systems, similar to polypeptide hormones.

