TYPE
Definition

TITLE
Steroid Hormone Interactions

PAGE
242-243

SECTION
4.2 — Signaling Concepts

ORIGINAL TEXT
Steroid hormones, including cortisol, testosterone, and estradiol produced by the adrenal cortex and/or gonads, can diffuse across cell membranes due to their lipophilic (fat-soluble) nature. They engage with specific receptors inside the cell to form a hormone–receptor complex (H-RC). This complex undergoes a conformational change, activates, and pairs with another H-RC. It then moves to the nucleus, interacts with the DNA, and promotes the transcription process for specific proteins by "unzipping" DNA and identifying regulatory elements of the targeted gene (18, 117). The resulting mRNA is then translated by ribosomes in the sarcoplasm into the intended proteins.

PARENT
Categories of Hormones

END

TYPE
Definition

TITLE
Polypeptide Hormone Interactions

PAGE
244

SECTION
4.2 — Signaling Concepts

ORIGINAL TEXT
Polypeptide hormones are composed of chains of amino acids and include hormones such as GH and insulin. Due to their non-lipophilic nature, polypeptide hormones cannot cross the cell membrane, and, therefore, their effects are mediated by secondary messengers within the cell. When these hormones bind to their membrane receptor, they cause a conformational change that allows the receptor to transmit the hormonal signal inside the cell. This transmission initiates a cascade of signaling events that, among others, can affect metabolic activities, influence DNA transcription, or kick-start mRNA translation at the ribosome.

