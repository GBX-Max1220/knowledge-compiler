Recommendation

TITLE
Staff-to-Athlete Ratio Guidelines

PAGE
1806

SECTION
26 — Facility Policies, Procedures, and Legal Issues

ORIGINAL TEXT
Strength and Conditioning activities should be planned, and the requisite number of qualified staff should be available such that recommended guidelines for minimum average floor space allowed per participant (100 ft2), professional-to-participant ratios (1:10 junior high school, 1:15 high school, 1:20 college), and number of participants per barbell or training station are achieved during peak usage times. (30, p. 10)

END

TYPE
Procedure

TITLE
Tiered Penalty System for Facility Rule Violations

PAGE
1801

SECTION
26 — Facility Policies, Procedures, and Legal Issues

ORIGINAL TEXT
First offense. A verbal warning by a staff member, an explanation of the nature and importance of the rule or guideline that was broken, and a reminder of the disciplinary action that will result from a second offense.
Second offense. Dismissal from the facility for one day, documentation of the offense by the staff member, correspondence with the athlete’s sport coach, and a reminder of the disciplinary action that will result from a third offense.
Third offense. Dismissal from the facility for one week, documentation of the offense by the staff member, correspondence with the athlete’s sport coach, and a reminder of the disciplinary action that will result from a fourth offense.
Fourth offense. Dismissal from the facility for the remainder of the year, documentation of the offense by the staff member, correspondence with the athlete’s sport coach and the athletic director, and a reminder of the disciplinary action that will result from a fifth offense.
Fifth offense. Permanent dismissal from the facility, documentation of the offense by the staff member, and correspondence with the athlete’s sport coach and the athletic director.

END

TYPE
Procedure

TITLE
Emergency Procedures Protocol

PAGE
1814-1815

SECTION
26 — Facility Policies, Procedures, and Legal Issues

ORIGINAL TEXT
Fire
Step 1: Activate fire alarm.
Step 2: Evacuate the building.
Life-Threatening Situations
Step 1: Call 911.*
Step 2: Do not move the victim.
Step 3: If the victim is conscious, ask permission to administer first aid.
Step 4: Administer CPR or AED if necessary.
Step 5: Stay with the victim until help arrives.
Step 6: Activate the emergency communication plan to notify appropriate parties.
Step 7: Document the incident on an injury report.
Environmental Situations
Step 1: Activate the appropriate alarm and get everyone directed to a predetermined safe location.
Step 2: Call 911* for medical help if necessary.
Step 3: Account for all parties and notify rescue personnel.
Step 4: Activate the emergency communication plan to notify appropriate parties.
Step 5: Document the incident on an injury report.
Non-Life-Threatening Situations
Step 1: Provide first aid.
Step 2: Call 911* for medical help if necessary.
Step 3: Activate the emergency communication plan to notify appropriate parties.
Step 4: Document the incident on an injury report.
*Or a comparable local emergency response provider. Note that some phone communication systems may require alternative dialing.

END

