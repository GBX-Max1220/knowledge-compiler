TYPE
Procedure

TITLE
Glute Bridge

PAGE
921

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Lie supine with the knees flexed to approximately 90 degrees and the feet hip-width apart and flat on the floor.
2. Pushing the feet into the floor and squeezing the glutes, lift the hips up toward the ceiling until the body attains a straight-line posture.
3. Hold for a second and then return the hips to the floor.
4. The action can use a single leg as an alternative to a double leg.

END

TYPE
Procedure

TITLE
Inchworm

PAGE
921

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet placed shoulder-width apart.
2. While slightly flexing the knees, flex forward at the waist and place hands shoulder-width apart flat on the floor.
3. The weight of the body should be shifted back (i.e., not directly over the hands), with the buttocks high in the air—imagine making an inverted V with the body.
4. Move the hands alternately forward, as if taking short steps with the hands, until the body is in a push-up position.
5. Walk the legs to the hands using small steps while keeping the knees slightly flexed.
6. Repeat the motion over a prescribed distance.

END

TYPE
Procedure

TITLE
Quadruped Reach and Rotate

PAGE
922

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Assume a quadruped position.
2. Raise the left hand and extend the hand under the body, reaching as far to the right as possible.
3. Reverse the action, pulling the left hand back to the beginning position before pulling the arm back and turning the body away from the support arm.
4. Keep the lumbar spine in a neutral position so that the action occurs mainly in the thoracic spine.
5. Carry out the action in a slow and controlled manner.
6. Repeat on the other side.

END

TYPE
Procedure

TITLE
Lunge Walk

PAGE
923

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet parallel to each other and shoulder-width apart.
2. Take an exaggerated step directly forward with the left leg, planting the left foot flat on the floor pointing straight ahead.
3. Allow the left hip and knee to slowly flex, keeping the left knee directly over the left foot.
4. Slightly flex the right knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right foot should be pointed straight ahead.
5. Balance the weight evenly between the ball of the right foot and the entire left foot.
6. Keep the torso perpendicular to the floor by sitting back on the right leg.
7. Forcefully push off of the floor by extending the left hip and knee.
8. Pick up the right foot and place it next to the left foot; do not stutter-step forward.
9. Stand erect, pause, and then step forward with the right leg, progressing forward with each step.

END

TYPE
Procedure

TITLE
Lateral Lunge

PAGE
924

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand with the feet hip-width apart and feet facing forward.
2. Take a relatively large lateral step with the right foot while keeping the left foot in contact with the floor.
3. Hinge at the hips, pushing the hips back, and flex the left hip and knee, lowering the body toward the ground until the left hip and knee are at approximately 90 degrees. The right knee remains fully extended as the left knee and hip flex.
4. Keep the body aligned within the base of support, and do not lean forward.
5. Return to the beginning position and then either repeat for the desired number of repetitions on the same leg or alternate legs for the desired number of repetitions.

END

TYPE
Procedure

TITLE
Lunge Walk with Front Leg Extension

PAGE
925

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Take an exaggerated step directly forward with the right leg and assume a lunge stance, keeping the right knee directly over the right foot and the rear (left) knee about an inch or so off the floor (note: this preparatory position is not shown).
2. Flex the torso forward with the hands reaching toward the right foot. From this position, lift the hips up and back, extending the right knee to a fully (or nearly so) extended position. This will cause the left knee to extend as well and result in a stretch of the hamstring muscles.
3. After the stretch is held, extend the torso to an erect position, step the rear (left) foot forward, and repeat on the other side.

END

TYPE
Procedure

TITLE
Speed Skater Lunge

PAGE
926

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Assume an upright stance with feet hip-width apart and arms to the side (note: this preparatory position is not shown).
2. Shift the body weight to the left foot and at the same time drop the hips back and down, reaching the right leg behind the body and as far as possible to the opposite (right) side. The result is a fully extended rear (right) knee and a contralateral (opposite) lateral reach of the other (left) arm.
3. Push back to the beginning position and repeat on the other side.
4. For a more advanced exercise, the movement can be initiated by a lateral hop.

END

TYPE
Procedure

TITLE
Lunge with Overhead Side Reach

PAGE
928

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet parallel to each other and shoulder-width apart.
2. Take an exaggerated step directly forward with the left leg, planting the left foot flat on the floor pointing straight ahead.
3. Allow the left hip and knee to slowly flex, keeping the left knee directly over the left foot.
4. Slightly flex the right knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right foot should be pointed straight ahead.
5. Reach up high with the right arm and bend the torso laterally toward the left leg.
6. Return to an erect torso position, and then forcefully push off the floor by extending the left hip and knee.
7. Pick up the right foot and place it next to the left foot; do not stutter-step forward.
8. Stand erect, pause, and then step forward with the right leg, progressing forward with each step.

END

TYPE
Procedure

TITLE
Walking Knee Lift

PAGE
929

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet parallel to each other and shoulder-width apart.
2. Step forward with the left leg and flex the right hip and knee to move the right thigh upward toward the chest.
3. Grasp the front of the right knee or upper shin and use the arms to pull the right knee up further and to squeeze the thigh against the chest.
4. Dorsiflex the left foot as the right hip and knee are flexed.
5. Keeping the torso erect, pause for a moment, then proceed to step down with the right leg.
6. Shift the body weight to the right leg and repeat the motion with the left leg.
7. Progress forward with each step, increasing the ROM and speed on subsequent steps.

END

TYPE
Procedure

TITLE
Forward Lunge with Elbow to Instep

PAGE
930

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet parallel to each other and shoulder-width apart.
2. Take an exaggerated step directly forward with the left leg, planting the left foot flat on the floor pointing straight ahead.
3. Allow the left hip and knee to slowly flex, keeping the left knee directly over the left foot.
4. Slightly flex the right knee and lower it until it is 1 to 2 inches (3-5 cm) above the floor; the right foot should be pointed straight ahead.
5. Lean forward, bringing the left arm forward and touching the left elbow to the instep of the left foot; the right hand may be placed on the floor to maintain balance.
6. Lean back to return to an erect torso position, and then forcefully push off the floor by extending the left hip and knee.
7. Pick up the right foot and place it next to the left foot; do not stutter-step forward.
8. Stand erect, pause, and then step forward with the right leg, progressing forward with each step.

END

TYPE
Procedure

TITLE
Heel-to-Toe Walk

PAGE
931

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet parallel to each other and shoulder-width apart.
2. Take a small step forward with the right leg; place the heel of the right foot on the ground first and then continue to dorsiflex the foot.
3. Immediately roll forward and rise up as high as possible onto the ball of the right foot.
4. Swing the left leg forward in order to take another small step.
5. Repeat with the left leg, progressing forward with each step.

END

TYPE
Procedure

TITLE
Walking Over and Under

PAGE
932

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand erect with the feet parallel to each other and shoulder-width apart.
2. Flex the left hip and knee, and then abduct the left thigh until it is parallel to the floor.
3. Step laterally to the left, stepping laterally over the first hurdle.
4. Place the left foot firmly on the ground, shift the body weight to the left leg, and then proceed to lift the right leg over the first hurdle.
5. After lifting the right leg over the hurdle and placing the right foot firmly on the ground, stand erect, pause, and then flex the hips and knees and dorsiflex the ankles to assume a full squat position.
6. Extend the left leg laterally, as if performing a lateral lunge.
7. Keeping the body weight low, move the body laterally, ducking under the second hurdle.
8. Stand erect, pause, and repeat the motion in the opposite direction, ducking under the second hurdle and stepping over the first.

END

TYPE
Procedure

TITLE
Inverted Hamstring Stretch

PAGE
934

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Stand tall and take a small step forward with the left leg.
2. Flex at the waist.
3. Reach forward with the left arm and simultaneously reach back with the right leg.
4. Try to keep the hips square.
5. Reach a position in which you feel a stretch in the hamstrings but eventually aim to attain a position in which the body is parallel to the floor.
6. Reach the right hand down toward the floor.
7. Return to the start by actively using the hamstrings and gluteals of the planted leg.
8. Take a step forward and repeat on the other side.

END

TYPE
Procedure

TITLE
Straight-Leg March

PAGE
936

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Assume a tall standing position with both arms outstretched in front of the chest.
2. Rise up onto the toes of the left leg and simultaneously, using a straight-leg action, raise the right leg forward and up, aiming to actively move it through as large a ROM as possible.
3. Once the highest point is reached, actively pull the leg back to the beginning position.
4. Maintain the tall standing posture throughout.
5. Repeat on alternate legs while moving forward.

END

TYPE
Procedure

TITLE
Bear Crawl

PAGE
938

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Assume a push-up position.
2. Reach forward with the right arm and the left leg, moving the body forward in a crawling motion.
3. Reach forward with the opposite leg and hand combination.
4. Keep the knees 1 to 2 inches (3-5 cm) off the ground.
5. Repeat in a rhythmic manner for the desired distance or repetitions.
6. As competency increases, the ROM can increase. Additionally, the crawl can be performed backward.

END

TYPE
Procedure

TITLE
Spiderman Crawl

PAGE
938

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
1. Assume a push-up position but with elbows flexed so that the position is lower than normal.
2. Lift and externally rotate the left leg, bringing the knee forward at an angle outside the left elbow.
3. Walk the hands forward and across the body.
4. As this progresses, bring the right leg forward outside the right hand and repeat for the given distance.
5. Repeat, alternating sides, for the required distance.

END

TYPE
Recommendation

TITLE
Guidelines and Precautions for PNF Stretching

PAGE
940

SECTION
15.4 — Program Design Considerations

ORIGINAL TEXT
Decide on the muscle to be stretched, the ROM needed for the activity, and whether PNF methods are best suited.
Decide on the stretch to be performed and the type of PNF stretching best suited to the situation.
Communicate clearly with your partner before and throughout the stretch.
Contraction durations should be of a moderate intensity.
Contractions are typically sustained for 6 to 10 seconds.
Passive stretch durations are typically 30 seconds.
Rest periods of 30 seconds are recommended between repetitions, and 2 to 4 repetitions are recommended per stretch.
Ensure a thorough warm-up is performed prior to PNF stretching.
Use moderate contraction intensities rather than high intensities, especially if stretching smaller joints.
Progress the ROM gradually during the protocols.
Effective communication with your partner is essential to ensure the exercise is performed safely.
Take special care if stretching smaller joints such as the shoulders.

END