TYPE
Recommendation

TITLE
Cleaning and Sanitizing Surfaces and Equipment

PAGE
1761

SECTION
25.3 — Facility Maintenance

ORIGINAL TEXT
Surfaces in the strength and conditioning facility should be cleaned, sanitized, and disinfected consistently to ensure that the equipment is safe and functional. Proper maintenance will reduce cost in the long run, because cleaning supplies are cheaper than replacing padding, flooring, exercise mats, and so on. Microbes will begin to grow if the surfaces are not wiped down with a germicidal cleaner.

END

TYPE
Recommendation

TITLE
Frequency of Cleaning High-Use Equipment and Surfaces

PAGE
1761

SECTION
25.3 — Facility Maintenance

ORIGINAL TEXT
Equipment and surfaces that are used more often and have a greater chance of developing bacterial growth (e.g., padding and vinyl), should be cleaned daily or every other day.

END

TYPE
Recommendation

TITLE
Germicidal Cleaner Requirements

PAGE
1761

SECTION
25.3 — Facility Maintenance

ORIGINAL TEXT
It is important that any germicidal cleaner used in the strength facility have the ability to prevent the spread of germs, including bacteria, viruses, parasites, and fungi, and illness, such as the flu, COVID-19, HIV, hepatitis, and ringworm (or other infectious rashes).

END

