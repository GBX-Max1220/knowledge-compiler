TYPE
Figure

TITLE
Figure 25.5 — Checklist for cleaning floors, walls, ceilings, and surfaces

PAGE
1769

SECTION
25.3 — Facility Maintenance

ORIGINAL TEXT
Figure 25.5  Checklist for cleaning floors, walls,
ceilings, and surfaces.

Floors
Check floors for dirt, grime, and chalk buildup.
Nonabsorbent floors should be regularly swept and mopped.
Check carpet for any moisture, mold, mildew, or fungal growth.
Carpet should be vacuumed and cleaned regularly.

Walls
Check walls for dirt and dust buildup.
Dust and clean walls at least once every week or two.
Clean mirrors and windows of smudges at least once per week.

Ceilings
Ceilings and ceiling fixtures should be dusted or cleaned at least once every
week or two.
Open ceilings with exposed pipes and ducts should be cleaned as needed.
Check for dust and cobweb buildup (especially near corners and HVAC
vents).

Surfaces
Dust windowsills and shelving surfaces at least once per week.
Exercise surfaces, mats, and pads that contact skin should be cleaned daily
with germicidal cleaner.
Clean and sanitize hydration and nutrition spaces (drinking fountains, water
bottle refill stations, countertops) daily and additionally as needed.

END

TYPE
Figure

TITLE
Figure 25.6 — NSCA's safety checklist for exercise facility and equipment maintenance

PAGE
1769-1773

SECTION
25.3 — Facility Maintenance

ORIGINAL TEXT
Figure 25.6  NSCA's safety checklist for exercise
facility and equipment maintenance.

Exercise Facility
Flooring and Turf Areas
Wooden platforms should be free of splinters, cracks, holes, protruding nails,
loose screws, and warping.
Tighten bolts and screws and ensure they are secure in attaching equipment
to the floor.
Tile flooring should be resistant to slipping; no moisture or chalk
accumulation should appear.
Rubber flooring should be slip resistant and free of cuts, slits, and gaps
between pieces.
Interlocking mats are secure and arranged with no protruding tabs.
Carpet should be free of tears; any worn areas should be protected by mats.
Flooring and turf are glued or fastened down properly.

Walls
Walls in high-activity areas are free of protruding appliances, equipment, or
wall hangings.
Mirrors and shelves are securely fixed to walls.
Mirrors are placed a minimum of 20 inches (51 cm) off the floor in all areas.
Mirrors and windows are not cracked, broken, or distorted (replace
immediately if damaged).
Bolts and screws are tightened and secure in attaching any balance railing to
the walls.
Wall hooks and suspension anchors are secure for use with attachments.

Ceiling
Ceiling fans, HVAC, and air exchange systems work properly.
Lighting is designed to optimize visibility at floor level.
Ceiling height is sufficient for overhead exercises (12 ft [3.7 m] minimum)
and free of low-hanging apparatus (e.g., beams, pipes, lighting, signs).
Ceiling fixtures and attachments are secure, preventing the risk of falling
objects.
Any damaged or missing ceiling tiles are replaced as soon as possible.

Exercise Equipment
Stretching and Bodyweight Exercise Area
Mat area is free of weight benches and equipment.
Mats and bench upholstery are free of cracks and tears.
Equipment is properly stored after use.
Elastic bands are secured to their base and checked for wear.
Nonslip material appears on the top surface and bottom or base of
plyometric boxes.

Resistance Training Machine Area
Each station is easily accessed (a minimum of 30 in. [76 cm] between
machines; 36 in. [91 cm] is optimal).
Area is free of loose bolts, screws, cables, and chains.
Proper selectorized pins are used and there is adequate storage or hanging
space for equipment accessories.
Securing straps and locking mechanisms must be functional.
Functional parts are properly lubricated.
Protective padding is free of cracks and tears.
No protruding screws or parts need tightening or removed.
Belts, chains, and cables are aligned with machine parts.
No worn parts (e.g., frayed cable, loose chains, worn bolts, cracked joints)
exist.

Resistance Training Free Weight Area
Each bench or area is easily accessible (a minimum of 30 in. [76 cm] access
clearance; 36 in. [91 cm] is optimal).
Olympic bars are properly spaced (a minimum of 36 inches [91 cm])
between ends.
Dumbbell racks and other equipment are placed at least 6 inches (15 cm)
away from mirrors.
All equipment is returned after use to avoid obstruction of pathway.
Safety equipment (e.g., belts, collars, safety bars) is used and returned.
Protective padding is free of cracks and tears.
Bolts and apparatus parts (e.g., collars and attachments) are secure and
tightly fastened.
Olympic bars turn properly and are properly lubricated and tightened.
Benches, weight racks, standards, and similar equipment are secured to the
floor or wall.
Nonfunctional or broken equipment is removed from the area or labeled with
an "out of service" sign.

Weightlifting Area
Olympic bars are properly spaced (a minimum of 36 in. [91 cm]) between
ends.
All equipment is returned after use to avoid obstruction of lifting area.
Olympic bars turn properly and are properly lubricated and tightened.
Bent or rusted Olympic bars are replaced; knurling is brushed and clear of
debris.
Collars are functional.
Bumper plates are inspected regularly; bumper plates should be free of
cracks and any loose bolts.
Sufficient grip chalk is available.
Wrist straps, belts, and knee wraps are available, functional, and stored
properly.
Benches, chairs, and boxes are kept at a distance from weightlifting area.

Aerobic Exercise and Exercise Testing Areas
Each station is easily accessible (minimum of 30 in. [76 cm] between
machines; 36 in. [91 cm] is optimal).
Bolts and screws are secure and tightened.
Functioning parts are easily adjustable.
Parts and surfaces are properly lubricated and cleaned.
Foot and body straps are secure and not ripped.
Recalibration and regular technology device maintenance are performed.
Measurement devices are properly functioning.
Power cords do not extend into exercise areas, safety spacing, walkways, or
spotter areas.

Frequency of Maintenance and Cleaning Tasks
Daily
Inspect all flooring and wooden platforms for damage or wear.
Clean (sweep, vacuum, or mop and disinfect) all flooring.
Inspect upholstery for damage or wear.
Clean and disinfect upholstery.
Clean and disinfect hydration and nutrition areas.
Inspect fixed equipment's connection with floor, walls, or ceiling.
Clean and disinfect equipment surfaces that contact skin.
Inspect mirrors and windows for damage.
Clean mirrors and windows of smudges.
Inspect that wall hooks and suspension anchors are secure for use with
attachments.
Inspect all equipment for damage; wear; fraying; loose or protruding belts,
screws, cables, or chains; insecure or nonfunctioning foot and body straps;
improper functioning or improper use of attachments, pins, or other devices.
Inspect all protective padding for cracks and tears.
Inspect nonslip material and mats for proper placement, damage, and wear.
Clean and sanitize exercise mats.
Remove trash and garbage.
Ensure equipment is returned and stored properly after use.

Two or Three Times Per Week
Clean and lubricate all moving parts of equipment and aerobic machines.
Clean and lubricate the guide rods on selectorized resistance training
machines.
Ensure Olympic bars turn properly and are properly lubricated and tightened.

Once Per Week or Two
Clean and dust ceiling fixtures and attachments.
Clean ceiling tiles.
Clean walls.
Clean light covers, fans, air vents, clocks, and speakers.

As Needed
Replace light bulbs.
Replace damaged or missing ceiling tiles.
Clean open ceilings with exposed pipes or ducts.
Remove or place "out of order" sign on broken equipment.
Fill chalk boxes.
Clean bar knurling.
Remove rust from floor, plates, bars, and equipment with a rust-removing
solution.
Wash and sanitize rags and gym towels per use.

END

