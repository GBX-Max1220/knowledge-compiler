Warning

TITLE
Avoid Overtraining from Heavy Loads

PAGE
1239-1240

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Despite the high training status, this degree of training demand typically cannot be tolerated very long without contributing to an overtrained state (176).

