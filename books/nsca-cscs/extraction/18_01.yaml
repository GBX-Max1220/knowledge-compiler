Weaker, less trained — Upper body: 2.5-5 lb (1-2 kg) — Lower body: 5-10 lb (2-4 kg)
Stronger, more trained — Upper body: 5-10+ lb (2-4+ kg) — Lower body: 10-15+ lb (4-7+ kg)

END

