Evidence

TITLE
Strength Training Enhances Power in Weak Athletes

PAGE
1187

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
specific improvements in force and velocity characteristics may occur following heavy or ballistic resistance training, with greater improvements in power production occurring in response to strength training targeting increases in maximal strength in weak athletes (26, 28, 29).

END

TYPE
Evidence

TITLE
Maximal Strength Adaptations Plateau After Six Weeks

PAGE
1190-1191

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
maximal strength adaptations may plateau if a similar training program with small progressions in loading is prescribed for longer than six weeks (186).

END

TYPE
Evidence

TITLE
Hypertrophy with Low-Load vs. High-Load Training

PAGE
1235

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
researchers have reported that similar magnitudes of hypertrophy can be produced after eight weeks of training when using either a low-load (25-35 repetitions performed to failure with approximately 30%-50% 1RM) or high-load (8-12 repetitions performed with approximately 70%-80% 1RM) training protocol that is performed to muscular failure (144).

END

TYPE
Evidence

TITLE
Greater Muscle Activation with Heavier Loads

PAGE
1235

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
greater muscle activation was shown during multiple heavier versus lighter (i.e., 80% vs. 30% 1RM) sets performed to failure (82)

END

TYPE
Evidence

TITLE
Longer Rest Periods Produce Greater Hypertrophy

PAGE
1253

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
longer rest periods (i.e., 3 min) have been shown to produced greater increases in muscle hypertrophy compared to those that were shorter (i.e., 1 min) (145).

END

TYPE
Evidence

TITLE
3 Minutes Rest Results in Greater Strength Gains than 30 Seconds

PAGE
1253

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Robinson and colleagues (136) observed that, in the back squat exercise, 3 minutes of inter-set rest resulted in greater strength gains than a 30-second rest period.

END

TYPE
Evidence

TITLE
SRB Produces More Favorable Adaptations than RM Training

PAGE
1232-1233

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Researchers have shown that SRB may produce more favorable muscle architectural (e.g., type I and II hypertrophy and myosin heavy chain adaptations) and strength (e.g., isometric peak and rapid force production) adaptations compared to RM training (17, 18).

END

TYPE
Evidence

TITLE
RPE and RIR May Lead to Greater Strength Improvements

PAGE
1231

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
some have shown that load prescription based on RPE for 8 weeks (73) and RIR for 12 weeks (60) may lead to greater strength improvements compared to using percentages of 1RM.

END

TYPE
Evidence

TITLE
Training to Failure Not Necessary for Optimal Adaptations

PAGE
1237

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
it is important to avoid training to failure on a regular basis because it may not be necessary to maximize muscular hypertrophy, strength, or power adaptations (36, 63, 137, 191).

END

TYPE
Evidence

TITLE
Closer Proximity to Failure Increases Fatigue

PAGE
1246-1247

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Refalo and colleagues (132) also demonstrated that the closer the proximity to failure, the greater the magnitude of fatigue over the subsequent 24 hours, which should be carefully considered in relation to the additional training planned for that period.

END

TYPE
Evidence

TITLE
Multiple Sets Enhance Strength Better than Single Set

PAGE
1246

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
performing 3 sets of 10 repetitions without going to failure enhances strength better than one set to failure in 8 to 12 repetitions (90)

END

TYPE
Evidence

TITLE
8 Sets Per Muscle Group Elicits Greatest Strength Increases

PAGE
1248

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Peterson and colleagues (125, 126) also highlighted a dose–response relationship based on the number of sets performed per muscle group: 8 sets per muscle group elicited the greatest increases in strength, with loads of 85% of the 1RM.

END

TYPE
Evidence

TITLE
No Difference in Hypertrophy Between Higher and Lower Frequencies When Volume is Matched

PAGE
1249-1250

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
there does not appear to be a meaningful difference in training-induced hypertrophy of a specific muscle group between higher and lower frequencies when volume is matched (140).

END

TYPE
Evidence

TITLE
No Difference in Hypertrophy Between Low and High Load Training

PAGE
1250

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
it has been reported that there are no differences in hypertrophic adaptations following low (<60% 1RM) or high (>60% 1RM) load training programs (141).

END

TYPE
Evidence

TITLE
No Differences in Hypertrophy or Strength Between Split and Total Body Routines When Volume is Equated

PAGE
1212

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
there are no differences in muscle hypertrophy or strength adaptations between split and total body routines when training volume is equated (131).

END

TYPE
Evidence

TITLE
Hypertrophic Adaptations Comparable Regardless of Training Frequency When Volume-Load is Equated

PAGE
1211

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
When the weekly resistance training volume–load is equated, hypertrophic adaptations (142) and strength adaptations (34) are comparable irrespective of training frequency.

END

TYPE
Warning

TITLE
Caution with Low-Load Sets to Failure

PAGE
1235

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Strength and conditioning professionals should also be cautious in prescribing multiple low-load sets to failure to mitigate potential injury (109).

END

