Training goal: Hypertrophy — Goal reps: 8-12 — Sets (Novice): 1-3 — Sets (Intermediate): ≥3 — Sets (Advanced): ≥3
Training goal: Muscular endurance — Goal reps: 12-15 — Sets (Novice): 1-3 — Sets (Intermediate): ≥3 — Sets (Advanced): ≥3

END

