TYPE
Definition

TITLE
Specificity

PAGE
1187

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
One of the most basic concepts to incorporate in all training programs is specificity. The term, first suggested by DeLorme in 1945 (39), refers to the method whereby an athlete is trained in a specific manner to produce a specific adaptation or training outcome.

END

TYPE
Definition

TITLE
SAID Principle

PAGE
1187

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Sometimes used interchangeably with specificity is the acronym SAID, which stands for specific adaptation to imposed demands. The underlying principle is that the type of demand placed on the body dictates the type of adaptation that will occur.

END

TYPE
Definition

TITLE
Overload

PAGE
1188

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Overload refers to the application of a training stimulus that exceeds what the athlete is accustomed to (i.e., increased load, sets, or repetitions [i.e., volume]) and produces an adaptation beyond the baseline abilities of the athlete.

END

TYPE
Definition

TITLE
Progression

PAGE
1189

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Progression, when applied properly, with loading or volume being sequential and specific to the desired adaptive response, promotes long-term training benefits.

END

TYPE
Definition

TITLE
Variation

PAGE
1190

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Variation within resistance training programs focuses on removing linearity by manipulating overload and specificity to promote the desired adaptations.

END

TYPE
Definition

TITLE
Reversibility

PAGE
1190

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
the removal or reduction of a training stimulus or the involution from monotonous training and poor fatigue management may cause the opposite to occur; this deterioration or loss of fitness characteristics refers to the principle of reversibility.

END

TYPE
Definition

TITLE
Individualization

PAGE
1191

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
The training goals and needs of each athlete are unique and should therefore command a training program suited specifically for them; this training principle is termed individualization.

END

TYPE
Definition

TITLE
Needs Analysis

PAGE
1194

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
The strength and conditioning professional's initial task is to perform a needs analysis, a two-stage process that includes an evaluation of the requirements and characteristics of the sport and an assessment of the athlete.

END

TYPE
Definition

TITLE
Training Status

PAGE
1196

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
An athlete's current condition or level of preparedness to begin a new or revised program (training status) is an important consideration in the design of training programs.

END

TYPE
Definition

TITLE
Core Exercises

PAGE
1202

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Core exercises recruit one or more large muscle areas (i.e., chest, shoulder, back, hip, or thigh), involve two or more primary joints (multijoint exercises; e.g., split squat, bench press, bent-over row), and receive priority when one is selecting exercises because of their direct application to the sport and enhanced dynamic correspondence (i.e., transference of gym-based training to improved performance in athletic tasks).

END

TYPE
Definition

TITLE
Assistance Exercises

PAGE
1202

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Assistance exercises usually recruit smaller muscle areas (i.e., upper arm, abdominal muscles, calf, neck, forearm, lower back, or anterior lower leg), involve only one primary joint (single-joint exercises; e.g., knee extension and flexion, biceps curls), and are considered less important for improving sport performance.

END

TYPE
Definition

TITLE
Structural Exercise

PAGE
1204

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
A core exercise that emphasizes loading the spine directly (e.g., back squat) or indirectly (e.g., power clean) can be further described as a structural exercise. More specifically, a structural exercise involves muscular stabilization of posture during performance of the lifting movement (e.g., maintaining a rigid torso and a neutral spine during the back squat).

END

TYPE
Definition

TITLE
Power Exercise

PAGE
1204

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
A structural exercise that is performed very quickly or explosively is considered a power exercise.

END

TYPE
Definition

TITLE
Training Frequency

PAGE
1211

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Training frequency refers to the number of training sessions completed in a given time period.

END

TYPE
Definition

TITLE
Split Routine

PAGE
1212

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
More highly resistance-trained (intermediate or advanced) athletes can augment their training by using a split routine in which different muscle groups are trained on different days.

END

TYPE
Definition

TITLE
Exercise Order

PAGE
1216

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Exercise order refers to a sequence of resistance exercises performed during one training session.

END

TYPE
Definition

TITLE
Superset

PAGE
1218

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
A superset involves two sequentially performed exercises that stress two opposing muscles or muscle areas (i.e., an agonist and its antagonist) (2), similar to the push–pull approach.

END

TYPE
Definition

TITLE
Compound Set

PAGE
1218

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
A compound set involves sequentially performing two different exercises for the same muscle group (2).

END

TYPE
Definition

TITLE
Load

PAGE
1221

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Load most simply refers to the amount of weight assigned to an exercise set and is often characterized as the most critical aspect of a resistance training program (50, 106, 162, 163).

END

TYPE
Definition

TITLE
Mechanical Work

PAGE
1221

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Mechanical work can be defined as the product of force and displacement (sometimes referred to as distance).

END

TYPE
Definition

TITLE
Volume-Load

PAGE
1221

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Volume–load is a proxy for work, because displacement and force production are not measured in applied settings.

END

TYPE
Definition

TITLE
Volume-Load Displacement

PAGE
1222

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
When monitoring training load, load displacement can be accounted for by calculating volume–load displacement, which multiplies volume–load by the displacement of the exercise.

END

TYPE
Definition

TITLE
1-Repetition Maximum (1RM)

PAGE
1222

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Load is commonly described as either a certain percentage of a 1-repetition maximum (1RM)—the greatest amount of weight that can be lifted with proper technique for only 1 repetition—or the most weight lifted for a specified number of repetitions, an xRM.

END

TYPE
Definition

TITLE
Rating of Perceived Exertion (RPE)

PAGE
1230

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
The rating of perceived exertion (RPE) provides a subjective measurement of work based on the perception of an individual.

END

TYPE
Definition

TITLE
Repetitions in Reserve (RIR)

PAGE
1230

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Similarly, repetitions in reserve (RIR) provides a subjective measure of the perceived number of repetitions that theoretically could be performed following an exercise set (199).

END

TYPE
Definition

TITLE
Set-Repetition Best (SRB)

PAGE
1231

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Originally proposed by Stone and O'Bryant (162), set-repetition best (SRB) is a load prescription method that uses relative intensities (i.e., percent ranges) where the maximum load is estimated based on performances of a given set and repetition scheme.

END

TYPE
Definition

TITLE
2-for-2 Rule

PAGE
1240

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
A conservative method that can be used to increase an athlete's training loads is called the 2-for-2 rule (2). If the athlete can perform 2 or more repetitions over his or her assigned repetition goal for a given exercise in the last set in two consecutive workouts, weight should be added to that exercise for the next training session.

END

TYPE
Definition

TITLE
Rest Period

PAGE
1252

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
The time dedicated to recovery between sets and exercises is called the rest period or inter-set rest.

END

TYPE
Definition

TITLE
Microdosing

PAGE
1214

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
When time is constrained, the subdivision of weekly training volume across multiple short-duration bouts, termed microdosing, has been suggested as a potentially useful strategy, which may mitigate the fatigue associated with longer duration, higher volume training sessions (34, 35).

END

TYPE
Definition

TITLE
Muscle Balance

PAGE
1207

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Note that muscle balance does not always mean equal strength, just a proper ratio of strength, power, or muscular endurance of one muscle or muscle group relative to another muscle or muscle group.

END

TYPE
Definition

TITLE
Circuit Training

PAGE
1217

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
If the exercises are performed with minimal rest periods (20-30 s), this method is also referred to as circuit training (generally not optimal for the development of maximal strength)— a method sometimes also used to improve cardiovascular endurance (58, 130), although to a lesser extent than conventional aerobic exercise training.

END

TYPE
Recommendation

TITLE
Exercise Order: Power, Other Core, Then Assistance Exercises

PAGE
1217

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Power exercises such as weightlifting movements and their derivatives (e.g., snatch, hang power clean, jump shrug) and other ballistic exercises (e.g., jump squat or hexagonal barbell jump) should be performed first in a training session, followed by other non-power core exercises, and then assistance exercises.

END

TYPE
Recommendation

TITLE
Exercise Order: Lower and Upper Body Exercises (Alternated)

PAGE
1217

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
One method of providing the opportunity for athletes to recover more fully between exercises is to alternate lower body exercises with upper body exercises.

END

TYPE
Recommendation

TITLE
Exercise Order: "Push" and "Pull" Exercises (Alternated)

PAGE
1218

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Another method of improving efficiency of training when time is limited is to alternate pushing exercises (e.g., bench press, shoulder press, triceps extension) with pulling exercises (e.g., lat pulldown, bent-over row, biceps curl) (2).

END

TYPE
Recommendation

TITLE
Training Frequency Based on Training Status

PAGE
1211-1212

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
The general guideline is to schedule training sessions to include at least one rest or recovery day—but not more than three—between sessions that stress the same muscle groups (77); however, this may also depend on the intensity of the prescribed exercises.

END

TYPE
Recommendation

TITLE
Training Frequency Based on Sport Season

PAGE
1214

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
For example, the increased emphasis on practicing the sport skill during the in-season necessitates a decrease in the time spent in the weight room and, consequently, reduces the frequency of resistance training (tables 18.4 and 18.7).

END

TYPE
Recommendation

TITLE
