TYPE
Decision Rule

TITLE
2-for-2 Rule for Load Progression

PAGE
1240-1241

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
If the athlete can perform 2 or more repetitions over his or her assigned repetition goal for a given exercise in the last set in two consecutive workouts, weight should be added to that exercise for the next training session.

END

TYPE
Procedure

TITLE
1RM Testing Protocol

PAGE
1227

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
1. Instruct the athlete to warm up with a light resistance that easily allows 5 to 10 repetitions.
2. Provide a 1-minute rest period.
3. Estimate a warm-up load that will allow the athlete to complete three to five repetitions by adding 10 to 20 pounds (4-9 kg) or 5% to 10% for upper body exercise or 30 to 40 pounds (14-18 kg) or 10% to 20% for lower body exercise.
4. Provide a 2-minute rest period.
5. Estimate a conservative, near-maximal load that will allow the athlete to complete two or three repetitions by adding 10 to 20 pounds (4-9 kg) or 5% to 10% for upper body exercise or 30 to 40 pounds (14-18 kg) or 10% to 20% for lower body exercise.
6. Provide a 2- to 4-minute rest period.
7. Make a load increase: 10 to 20 pounds (4-9 kg) or 5% to 10% for upper body exercise or 30 to 40 pounds (14-18 kg) or 10% to 20% for lower body exercise
8. Instruct the athlete to attempt a 1RM.
9. If the athlete was successful, provide a 2- to 4-minute rest period and go back to step 7. If the athlete failed, provide a 2- to 4-minute rest period; then decrease the load by subtracting 5 to 10 pounds (2-4 kg) or 2.5% to 5% for upper body exercise or 15 to 20 pounds (7-9 kg) or 5% to 10% for lower body exercise. AND then go back to step 8.
Continue increasing or decreasing the load until the athlete can complete one repetition with proper exercise technique. Ideally, the athlete's 1RM will be measured within three to five testing sets.

END