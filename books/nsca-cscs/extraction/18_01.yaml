1236-1237

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Training goal: Strength — Load (%1RM): ≥85 — Goal reps: ≤6
Training goal: Power (multiple-effort event) — Load (%1RM): 75-85 — Goal reps: 3-5
Training goal: Hypertrophy — Load (%1RM): 67-80 — Goal reps: 8-12
Training goal: Muscular endurance — Load (%1RM): ≤67 — Goal reps: ≥12

END

