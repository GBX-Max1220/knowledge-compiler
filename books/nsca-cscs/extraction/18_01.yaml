Recommendation

TITLE
Rest Period Length Assignments Based on Training Goal

PAGE
1252-1253

SECTION
18.1 — Program Design for Resistance Training

ORIGINAL TEXT
Training goal: Strength — Rest period length: 2-5 min
Training goal: Power (single- and multiple-effort event) — Rest period length: 2-5 min
Training goal: Hypertrophy — Rest period length: 2-3 min for multijoint exercises; 60-90 s for single-joint exercises
Training goal: Muscular endurance — Rest period length: ≤30 s

END

