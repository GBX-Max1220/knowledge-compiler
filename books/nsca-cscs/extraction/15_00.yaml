TYPE
Definition

TITLE
Flexibility

PAGE
873

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Flexibility is defined as the range of motion (ROM) that occurs about a joint.

END

TYPE
Definition

TITLE
Static Flexibility

PAGE
873

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Static flexibility refers to the range of possible movement about a joint (28) and its surrounding muscles during a passive movement (40).

END

TYPE
Definition

TITLE
Dynamic Flexibility

PAGE
873

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Dynamic flexibility, on the other hand, refers to the available ROM during active movements and therefore requires voluntary muscular actions.

END

TYPE
Definition

TITLE
Mobility

PAGE
862-863

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Mobility involves the capacity to move freely and effectively through movements (67) and is a dynamic quality requiring a combination of motor control, stability, and flexibility; it more closely relates to the movement requirements an athlete will face in his or her sport and in the general activities of life (51).

END

TYPE
Definition

TITLE
Elasticity

PAGE
876

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Elasticity refers to the ability to return to original resting length after a passive stretch, while plasticity refers to the tendency to assume a new and greater length after a passive stretch.

END

TYPE
Definition

TITLE
Plasticity

PAGE
876

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Elasticity refers to the ability to return to original resting length after a passive stretch, while plasticity refers to the tendency to assume a new and greater length after a passive stretch.

END

TYPE
Definition

TITLE
Stretch Tolerance

PAGE
876

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
An important factor in determining an athlete's flexibility is stretch tolerance, or the ability to tolerate the discomfort of stretching (84).

END

TYPE
Definition

TITLE
Active Stretch

PAGE
879

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
An active stretch occurs when the person stretching supplies the necessary forces to enable the end position to be reached.

END

TYPE
Definition

TITLE
Passive Stretch

PAGE
879

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
A passive stretch occurs when a partner or a stretching machine provides external force to cause or enhance a stretch.

END

TYPE
Definition

TITLE
Static Stretch

PAGE
879

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
A static stretch involves a slow and constant movement toward the end position, which is then held for 10 to 30 seconds (66).

END

TYPE
Definition

TITLE
Dynamic Stretching

PAGE
880

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Dynamic stretching is a broad term used to describe actions that involve active motions where a performer moves actively in a controlled and moderate paced manner through a typically large ROM (66).

END

TYPE
Definition

TITLE
Ballistic Stretch

PAGE
881

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
A ballistic stretch can be considered a special type of dynamic stretch. Ballistic stretches similarly involve active muscular efforts, but rather than performing these under control, they instead use intense bouncing-type movements to achieve the required ROM (66).

END

TYPE
Definition

TITLE
Proprioceptive Neuromuscular Facilitation (PNF)

PAGE
882

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Proprioceptive neuromuscular facilitation (PNF) is the most common precontraction stretching methodology.

END

TYPE
Definition

TITLE
Autogenic Inhibition

PAGE
883

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Relaxation that occurs in the same muscle that is experiencing increased tension is called autogenic inhibition (18, 22).

END

TYPE
Definition

TITLE
Reciprocal Inhibition

PAGE
883

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Relaxation that occurs in the muscle opposing the muscle experiencing the increased tension is called reciprocal inhibition (18).

END

TYPE
Definition

TITLE
Hold-Relax

PAGE
885

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The hold-relax technique begins with a passive prestretch that is held at the point of mild discomfort for 10 seconds (figure 15.3).

END

TYPE
Definition

TITLE
Contract-Relax

PAGE
887

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The contract-relax technique also begins with a passive prestretch of the hamstrings that is held at the point of mild discomfort for 10 seconds (figure 15.6).

END

TYPE
Definition

TITLE
Hold-Relax With Agonist Contraction

PAGE
887

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The hold-relax with agonist contraction technique is identical to hold-relax in the first two phases (figures 15.9 and 15.10).

END

TYPE
Definition

TITLE
Postactivation Performance Enhancement (PAPE)

PAGE
867

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Research suggests that an acute stimulus of low-volume exercise can acutely enhance neuromuscular performance, a concept known as postactivation performance enhancement (PAPE), and outlines the potential for residual force enhancement from prior activity (45).

END

TYPE
Definition

TITLE
Raise, Activate and Mobilize, and Potentiate (RAMP) Protocol

PAGE
861

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
One such flexible structure that has been adopted by many coaches and that addresses all of the key aspects of an effective warm-up is the raise, activate and mobilize, and potentiate (RAMP) protocol (51).

END

TYPE
Definition

TITLE
Central Nervous System (CNS) Preparatory Exercise

PAGE
867

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
This is the premise of a central nervous system (CNS) preparatory exercise, when a range of potential activities are used with the goal of enhancing preparedness for another activity via a positive transient performance response (45).

END

TYPE
Definition

TITLE
General Warm-Up

PAGE
859

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The first is a general warm-up period (48), which may consist of 5 minutes of low-intensity aerobic activity such as jogging, skipping, or cycling.

END

TYPE
Definition

TITLE
Specific Warm-Up

PAGE
859

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
In the traditional approach, following the general warm-up is the specific warm-up period, which incorporates movements similar to the biomechanical movement patterns of the athlete's sport.

END

TYPE
Recommendation

TITLE
Warm-Up Planning Principle

PAGE
858

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Given that the structure and content of the warm-up influences potential responses, the warm-up needs to be planned in relation to the activity to be performed, the physiological responses required, the characteristics of the athletes in question, and the logistical requirements of the situation.

END

TYPE
Recommendation

TITLE
Warm-Up as Integral Part of Training Session

PAGE
860-861

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The warm-up is an integral part of the training session. Strength and conditioning professionals should plan warm-ups incorporating short-, medium-, and long-term considerations that will contribute to the overall development of the athlete.

END

TYPE
Recommendation

TITLE
Static Stretch Duration Recommendation

PAGE
892

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
As to the appropriate duration for a static stretch, 15 to 30 seconds is generally recommended (81) and has been shown to be more effective than shorter durations (66).

END

TYPE
Recommendation

TITLE
Optimal Timing for Stretching — Postpractice

PAGE
893

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Following practice and competition. Postpractice stretching potentially facilitates ROM improvements (40), although the evidence for this is mixed (79). It should be performed within 5 to 10 minutes after practice.

END

TYPE
Recommendation

TITLE
Optimal Timing for Stretching — Separate Session

PAGE
893

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
As a separate session. If increased levels of flexibility are required, additional stretching sessions may be needed. In this case, stretching should be preceded by a thorough general warm-up to allow for the increase in muscle temperature necessary for effective stretching.

END

TYPE
Recommendation

TITLE
PNF Stretching Frequency

PAGE
883

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
One or two sessions per week are recommended (81).

END

TYPE
Recommendation

TITLE
PNF Contraction Duration and Intensity

PAGE
883

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
When using static contractions, these should be held for approximately 3 to 6 seconds at no more than 20% of maximum voluntary contraction, with the first repetition generally giving the greatest benefit.

END

TYPE
Recommendation

TITLE
Warm-Up Duration

PAGE
859

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Typically, it should last between 10 and 20 minutes, depending on the specific requirements of the context.

END

TYPE
Recommendation

TITLE
Warm-Up Timing Before Activity

PAGE
859

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The warm-up should ideally end no more than 15 minutes before the start of the subsequent activity; after this time the positive effects of the warm-up start to dissipate (30).

END

TYPE
Recommendation

TITLE
Dynamic Stretching Guidelines

PAGE
881

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
In a dynamic stretch that mirrors a sport skill—such as a sprinter's knee lift drill—it is important that the stretch also emphasize the key skill factors required for the movement so that the most important mechanics of the drill are reinforced.

END

TYPE
Recommendation

TITLE
Focus on Mobility Over Static Flexibility

PAGE
873

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Given that performance in the majority of sports is dynamic in nature, it is advised to look beyond the role of flexibility as a static quality and instead consider its contribution as a dynamic quality (66).

END

TYPE
Procedure

TITLE
RAMP Warm-Up Protocol Phases

PAGE
861-862

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
As the name indicates, raise, activate and mobilize, and potentiate are its three key phases.

END

TYPE
Procedure

TITLE
Hold-Relax PNF Technique Steps

PAGE
885

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The hold-relax technique begins with a passive prestretch that is held at the point of mild discomfort for 10 seconds (figure 15.3). The partner then applies a hip flexion force and instructs the athlete, "Hold and do not let me move the leg." The athlete holds and resists the movement so that an isometric muscle action occurs and is held for 6 seconds (figure 15.4). The athlete then relaxes, and a passive stretch is performed and held for 30 seconds (figure 15.5).

END

TYPE
Procedure

TITLE
Contract-Relax PNF Technique Steps

PAGE
887

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The contract-relax technique also begins with a passive prestretch of the hamstrings that is held at the point of mild discomfort for 10 seconds (figure 15.6). The athlete then extends the hip against resistance from the partner so that a concentric muscle action through the full ROM occurs (figure 15.7). The athlete then relaxes, and a passive hip flexion stretch is applied and held for 30 seconds (figure 15.8) while the athlete concentrically contracts the agonist.

END

TYPE
Procedure

TITLE
Hold-Relax With Agonist Contraction PNF Technique Steps

PAGE
887

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The hold-relax with agonist contraction technique is identical to hold-relax in the first two phases (figures 15.9 and 15.10). During the third phase, a partner applies force to the antagonist muscle groups while the athlete is required to maintain the position through a concentric action of the agonist, thus adding to the stretch force (figure 15.11). Following the isometric hold, the athlete flexes the hip, thereby moving further into the new ROM.

END

TYPE
Warning

TITLE
Static Stretching Performance Decrement Warning

PAGE
863

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Studies have demonstrated negative effects of static stretching on performance in a range of parameters such as force production (9, 23-26, 27, 31, 75), power performance (21, 92, 96, 97), running speed (35), reaction or movement time (8), and strength endurance (70).

END

TYPE
Warning

TITLE
Ballistic Stretching Injury Warning

PAGE
881-882

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Ballistic stretching, if not appropriately controlled or sequenced, may injure muscles or connective tissues, especially when there has been a previous injury (20).

END

TYPE
Warning

TITLE
Hyperflexibility Injury Risk Warning

PAGE
874-875

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Yet increased ROM is not a panacea, and it is important to note that both inflexibility and hyperflexibility can increase injury risk (77, 89).

END

TYPE
Warning

TITLE
Resistance Training ROM Loss Warning

PAGE
877

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The first proviso is that heavy resistance training with limited ROM during the exercises may decrease ROM (28).

END

TYPE
Warning

TITLE
Muscle Bulk ROM Impediment Warning

PAGE
877

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
The second proviso is that a significant increase in muscle bulk may adversely affect ROM by impeding joint movement.

END

TYPE
Contraindication

TITLE
Static Stretching Before Performance Contraindication

PAGE
863

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Some reviews of the literature on the effect of static stretching on performance question the practice (82, 83, 97), suggesting that it can compromise muscle performance (53).

END

TYPE
Risk Factor

TITLE
Inflexibility as Injury Risk Factor

PAGE
874

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
There are clearly optimal ranges of flexibility for different sports and activities, and injury risk may be increased when an athlete is unable to attain this range.

END

TYPE
Risk Factor

TITLE
Flexibility Imbalances as Injury Risk Factor

PAGE
875

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Additionally, general flexibility imbalances between joints, which could increase injury risk, must be considered (87, 88).

END

TYPE
Evidence

TITLE
Positive Effect of Warm-Up on Performance

PAGE
857

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
While the number of quality studies investigating the impact of warm-up on performance is surprisingly low, more than 80% of the published research has demonstrated a positive effect on performance (37, 40).

END

TYPE
Evidence

TITLE
Warm-Up and Injury Prevention Evidence

PAGE
858

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
While the influence of a warm-up on injury prevention is unclear, the evidence suggests that positive effects may exist (36, 84, 85).

END

TYPE
Evidence

TITLE
Short-Duration Static Stretching Evidence

PAGE
863

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
However, other studies show no decrement in performance, and a more recent review by Kay and Blazevich (52) concludes that there is clear evidence that short-duration static stretching has no detrimental effect on subsequent performance unless stretches are held for greater than 60 seconds.

END

TYPE
Evidence

TITLE
Stretching and Injury Prevention Evidence

PAGE
864

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Because no consistent link has been shown between stretching and injury prevention (43, 44, 74, 85, 89), the focus in warm-ups should shift to performance.

END

TYPE
Evidence

TITLE
Resistance Training Increases Flexibility Evidence

PAGE
877

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
A comprehensive and proper resistance training program may increase flexibility (69) and also assist in the development of force capacity through the enhanced ROM.

END

TYPE
Evidence

TITLE
PNF Superiority Evidence

PAGE
883

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
PNF stretching has been purported as being superior to other stretching methods for increasing flexibility (81), possibly because it activates the sensory receptors in the agonist and antagonist muscles (56), although evidence for this has not been consistently shown (38, 56).

END

TYPE
Evidence

TITLE
Frequency vs. Duration for Stretching

PAGE
892

SECTION
15 — Performance Preparation, Mobility, and Flexibility

ORIGINAL TEXT
Interestingly, time stretching per week seems to have a greater impact than time spent stretching within a single session, suggesting that frequency rather than duration may be a more important factor (90).

END

