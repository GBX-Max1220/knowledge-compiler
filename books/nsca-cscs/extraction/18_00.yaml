1188

SECTION
Chapter 18: Program Design for Resistance Training — Principles of Anaerobic Exercise Prescription

ORIGINAL TEXT
Overload refers to the application of a training stimulus that exceeds what the athlete is accustomed to (i.e., increased load, sets, or repetitions [i.e., volume]) and produces an adaptation beyond the baseline abilities of the athlete.

