CHILDREN

RELATIONSHIPS

END

TYPE
Definition

TITLE
SAID Principle

PAGE
1187

SECTION
Chapter 18: Program Design for Resistance Training — Principles of Anaerobic Exercise Prescription

ORIGINAL TEXT
Sometimes used interchangeably with specificity is the acronym SAID, which stands for specific adaptation to imposed demands. The underlying principle is that the type of demand placed on the body dictates the type of adaptation that will occur.

