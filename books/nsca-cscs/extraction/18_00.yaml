CHILDREN

RELATIONSHIPS

END

TYPE
Definition

TITLE
Assistance Exercises

PAGE
1202

SECTION
Chapter 18: Program Design for Resistance Training — Step 2: Exercise Selection — Exercise Type

ORIGINAL TEXT
Assistance exercises usually recruit smaller muscle areas (i.e., upper arm, abdominal muscles, calf, neck, forearm, lower back, or anterior lower leg), involve only one primary joint (single-joint exercises; e.g., knee extension and flexion, biceps curls), and are considered less important for improving sport performance.

