TITLE
Second Transition Period (Active Rest)

PAGE
1599

SECTION
22.2 — Periodization Cycles

ORIGINAL TEXT
Between the competitive season and the next annual training plan or the preparatory period of a macrocycle, a second transition period is often used to create a linkage (89). This period is sometimes referred to as an active rest or restoration period and generally lasts for one to four weeks (38).

