TITLE
Nonlinear Periodization Model

PAGE
1604

SECTION
22.2 — Periodization Cycles

ORIGINAL TEXT
The nonlinear periodization model has been introduced in the strength and conditioning industry (2, 58, 79). Alternatively, this model is sometimes described as an undulating or daily undulating periodization model because it involves larger daily (i.e., within the microcycle) fluctuations in the load and volume (e.g., repetitions and volume-load) of the assigned core resistance training exercise.

