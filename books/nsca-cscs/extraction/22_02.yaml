TITLE
First Transition Period

PAGE
1597

SECTION
22.2 — Periodization Cycles

ORIGINAL TEXT
As originally described by Stone and colleagues (89-91), the first transition period is a link between the preparatory and competitive periods. Classically, the resistance training in this period focuses on the development of strength and power as noted in Stone, O'Bryant, and Garhammer's (89) seminal paper on the periodization of strength training. The central aim of this period is to shift the training focus toward the elevation of strength and its translation into power development (89, 90).

