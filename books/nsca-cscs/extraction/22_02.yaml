TITLE
Maintenance Program

PAGE
1598

SECTION
22.2 — Periodization Cycles

ORIGINAL TEXT
Because of the prolonged duration of the competitive period in this situation, the intensity and volume of training must be manipulated on a microcycle basis to maintain strength and power while managing the fatigue associated with a frequent competition schedule. Generally, a maintenance program is marked by moderate- to high-intensity training (e.g., 85%-93% 1RM) at low to moderate volumes.

