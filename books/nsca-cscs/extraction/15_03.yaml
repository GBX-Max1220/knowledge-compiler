---

TYPE
Recommendation

TITLE
Static Stretching Guidelines and Precautions

PAGE
895

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
Get into a position that facilitates relaxation. Move to the point in the ROM where you experience a sensation of mild discomfort. If performing partner-assisted PNF stretching, communicate clearly with your partner. Hold stretches for 15 to 30 seconds. Repeat unilateral stretches on both sides. Decrease stretch intensity if you experience pain, radiating symptoms, or loss of sensation. Use caution when stretching a hypermobile joint. Avoid combination movements that involve the spine (e.g., extension and lateral flexion). Stabilizing muscles should be active to protect other joints and prevent unwanted movements.

END

---

TYPE
Recommendation

TITLE
Dynamic Stretching Guidelines and Precautions

PAGE
918

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
Carry out 5 to 10 repetitions for each movement, either in place or over a given distance. Where possible, progressively increase the ROM on each repetition. Where appropriate, increase the speed of motion in subsequent sets, but always maintain control of the motion. Actively control muscular actions as you move through the ROM. Where appropriate, try to replicate the movements required for sport performance. Move progressively through the ROM. Move deliberately through the motion but without bouncing (movement should be controlled at all times). Do not forsake good technique for additional ROM.

END

---

TYPE
Procedure

TITLE
Look Right and Left (Neck Stretch)

PAGE
896

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand or sit with the head and neck upright.
2. Turn the head to the right using a submaximal concentric muscle action.
3. Turn the head to the left using a submaximal concentric muscle action.

END

---

TYPE
Procedure

TITLE
Flexion and Extension (Neck Stretch)

PAGE
896

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Standing or sitting with head and neck upright, flex the neck by tucking the chin toward the chest.
2. If the chin touches the chest, try to touch the chin lower on the chest.
3. Extend the neck by trying to come as close as possible to touching the head to the back.

END

---

TYPE
Procedure

TITLE
Straight Arms Behind Back (Shoulders and Chest Stretch)

PAGE
897

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Standing, place both arms behind the back.
2. Interlock fingers with palms facing each other.
3. Straighten the elbows fully.
4. Slowly raise the arms, keeping the elbows straight.
5. Keep the head upright and neck relaxed.

END

---

TYPE
Procedure

TITLE
Seated Lean-Back (Shoulders and Chest Stretch)

PAGE
898

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sitting with the legs straight and arms extended, place palms on the floor about 12 inches (30 cm) behind the hips.
2. Point the fingers away from the body (backward).
3. Slide the hands backward and lean backward.

END

---

TYPE
Procedure

TITLE
Behind-Neck Stretch (Chicken Wing) (Posterior of Upper Arm Stretch)

PAGE
899

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Standing or sitting, abduct the right shoulder and flex the elbow.
2. Reach the right hand down toward the left scapula.
3. Grasp the right elbow with the left hand.
4. Pull the elbow behind the head with the left hand to increase shoulder abduction.
5. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Cross Arm in Front of Chest (Upper Back Stretch)

PAGE
900

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand or sit with the left elbow slightly flexed (15-30 degrees) and the arm across the body (i.e., shoulder in horizontal adduction).
2. Grasp the upper arm just above the elbow, placing the right hand on the posterior side of the upper arm.
3. Pull the left arm across the chest (toward the right) with the right hand.
4. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Arms Straight Up Above Head (Pillar) (Upper Back Stretch)

PAGE
901

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand with the arms in front of the torso, fingers interlocked with palms facing out.
2. Slowly straighten the arms above the head with the palms up.
3. Continue to reach upward with the hands and arms.
4. While continuing to reach upward, slowly reach slightly backward.

END

---

TYPE
Procedure

TITLE
Spinal Twist (Pretzel) (Lower Back Stretch)

PAGE
902

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sitting with the legs straight and the upper body nearly vertical, place the right foot to the left side of the left knee.
2. Place the back of the left elbow on the right side of the right knee, which is now flexed.
3. Place the right palm on the floor 12 to 16 inches (30-41 cm) behind the hips.
4. Push the right knee to the left with the left elbow while turning the shoulders and head to the right as far as possible. Try to look behind the back.
5. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Semi-Leg Straddle (Lower Back Stretch)

PAGE
903

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sit with knees flexed 30 degrees to 50 degrees; let the legs totally relax.
2. Point the knees outward; the sides of the knees may or may not touch the floor.
3. Lean forward from the waist and reach forward with extended arms.

END

---

TYPE
Procedure

TITLE
Cobra Stretch (Lower Back Stretch)

PAGE
904

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Lie prone on the floor or mat.
2. Place the hands on the floor in a push-up position just below the shoulders with the elbows flexed and held close to the body.
3. Keep the legs extended with the top of the toes or feet resting on the floor.
4. Lift the head and chest while pressing down through the hands to extend the spine (arch the back).
5. Be sure to keep the pelvis and lower body in contact with the floor while looking forward. The result is only a partial extension of the elbows unless the athlete is extremely flexible.
6. Hold the position while breathing slowly and deeply.
7. Slowly lower back to the floor to return to the beginning position.

END

---

TYPE
Procedure

TITLE
Forward Lunge (Fencer) (Hip Stretch)

PAGE
905

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Standing, take a long step forward with the left leg and flex the left knee until it is directly over the left foot.
2. Keep the left foot flat on the floor.
3. Keep the right knee moderately flexed.
4. Keep the back foot pointed in the same direction as the front foot; it is not necessary to have the heel on the floor.
5. Keep the torso upright and rest the hands on the hips or the front leg (or allow them to hang at the sides).
6. Slowly lower the hips forward and downward.
7. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Supine Knee Flex (Hip Stretch)

PAGE
906

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Lie on the back with legs straight.
2. Flex the right knee and hip, bringing the thigh toward the chest.
3. Place both hands behind the thigh and continue to pull the thigh toward the chest.
4. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Figure Four Stretch (Hip Stretch)

PAGE
907

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Lie supine on the floor.
2. Flex and externally rotate the left hip to cross the left ankle over the right thigh.
3. Flex the right hip and pull it toward the chest until a comfortable stretch is felt.
4. Hold and then release.
5. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Side Bend with Straight Arms (Torso Stretch)

PAGE
908

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand with feet shoulder-width apart.
2. Interlace the fingers with the palms away from the torso and facing outward.
3. Reach upward with straight arms.
4. Keeping the arms straight, lean from the waist to the left side. Do not flex the knees.
5. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Side Bend with Bent Arm (Torso Stretch)

PAGE
909

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand with feet shoulder-width apart.
2. Flex the right elbow and raise the elbow above the head.
3. Reach the right hand down toward the left shoulder.
4. Grasp the right elbow with the left hand.
5. Pull the elbow behind the head.
6. Keeping the elbow flexed, lean from the waist to the left side. Do not flex the knees.
7. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Lunge with Spinal Twist (Torso Stretch)

PAGE
910

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Assume a lunge position with the right leg forward.
2. Place the left hand on the floor directly parallel to the right foot.
3. Rotate the body, extending the right arm toward the ceiling, and hold.
4. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Side Quadriceps Stretch (Anterior of Thigh and Hip Flexor Stretch)

PAGE
911

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Lie on the right side with both legs straight.
2. Place the right forearm flat on the floor and the upper arm perpendicular to the floor.
3. Place the left forearm at a 45-degree angle to the torso.
4. Flex the left leg (knee), with the heel of the left foot moving toward the buttocks.
5. Grasp the front of the ankle with the left hand and pull toward the buttocks.
6. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Sitting Toe Touch (Posterior of Thigh Stretch)

PAGE
912

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sit with the upper body nearly vertical and legs straight.
2. Lean forward using hip flexion and grasp the toes with each hand. Slightly pull the toes toward the upper body and pull the chest toward the legs. If you have limited flexibility, try to grasp the ankles.

END

---

TYPE
Procedure

TITLE
Semistraddle (Posterior of Thigh Stretch)

PAGE
913

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sit with the upper body nearly vertical and legs straight.
2. Place the sole of the right foot on the inner side of the left knee. The outer side of the right leg should be resting on the floor.
3. Lean forward using hip flexion and grasp the toes of the left foot with the left hand. Slightly pull the toes toward the upper body as the chest is also pulled toward the left leg.
4. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Straddle (Spread Eagle) (Groin Stretch)

PAGE
913

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sit with the upper body nearly vertical and legs straight. Abduct the hips, spreading the legs as far as possible.
2. With both hands, grasp the toes of the left foot and pull on the toes slightly while pulling the chest toward the left leg.
3. Repeat toward the center by grasping the right toes with the right hand and the left toes with the left hand. Pull the torso forward and toward the floor.

END

---

TYPE
Procedure

TITLE
Butterfly (Groin Stretch)

PAGE
914

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Sitting with the upper body nearly vertical and legs straight, flex both knees, bringing the soles of the feet together.
2. Pull the feet toward the body.
3. Place the hands on the feet and the elbows on the legs.
4. Pull the torso slightly forward as the elbows push down, causing hip abduction.

END

---

TYPE
Procedure

TITLE
Wall Stretch (Calf Stretch)

PAGE
915

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand facing the wall with feet shoulder-width apart and toes approximately 2 feet (0.6 m) from the wall.
2. Lean forward, placing the hands on the wall.
3. Step back approximately 2 feet (0.6 m) with the stretch leg while flexing the opposite knee.
4. Extend the knee of the stretch leg and lower the heel to the floor to apply the stretch.
5. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Step Stretch (Calf Stretch)

PAGE
916

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Place the ball of one foot on the edge of a step or board 3 to 4 inches (8-10 cm) high, with the other foot flat on the step.
2. With straight legs, lower the heel of the foot on the edge of the step as far as possible.
3. Repeat on the other side.

END

---

TYPE
Procedure

TITLE
Arm Swings (Dynamic Stretching)

PAGE
918

SECTION
15.3 — Flexibility Training

ORIGINAL TEXT
1. Stand erect and raise the arms in front of the body until they are parallel to the floor.
2. While walking over a prescribed distance, swing the arms in unison to the right so the left arm is in front of the chest, the fingers of the left hand are pointing directly lateral to the left shoulder, and the right arm is behind the body.
3. Immediately reverse the direction of movement to swing the arms in unison to the left.
4. Movement should occur only at the shoulder joints (i.e., keep torso and head facing forward).
5. Alternate swinging the arms in unison to the right and left.

END

