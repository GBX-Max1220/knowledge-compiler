ORIGINAL TEXT
Up to this point, we have discussed exclusively quantitative measurements of performance, training, or physiology. However, it has been suggested that questionnaires using subjective measures may be more useful for monitoring athletes and their risk of overtraining (115). To that end, numerous survey instruments have been developed to help monitor athlete perceptions of training status and recovery. Table 24.3 lists a number of these tools that strength and conditioning professionals may find helpful to use.

END

