TYPE
Recommendation

TITLE
Training Cessation for Recovery From Overtraining

PAGE
1715-1716

SECTION
24.4 — Overtraining Syndrome

ORIGINAL TEXT
When overreaching has occurred, training cessation has permitted performance to return to original levels in as little as one week (36, 37, 87, 88, 111, 139). When more serious levels of overtraining have occurred, recovery can take as long as four weeks after high-intensity resistance exercise (35) or months to a year after high-volume distance running (78). In each case, training volume or intensity was immediately decreased or removed.

END

