Figure 24.16 — Overtraining Risk Factors, Considerations, and Strategies to Minimize Risk of Developing an Overtraining Syndrome

PAGE
1719-1720

SECTION
24.4 — Overtraining Syndrome

ORIGINAL TEXT
Figure 24.16  Overtraining risk factors, considerations, and strategies to minimize risk of developing an overtraining syndrome.
Overtraining Risk Factors
Lack of close monitoring of the training program (rest days, prior exposure to stressful training)
Training and activities outside the weight room, which can be a problem
Use of virtual coaching with no face-to-face contact
Lack of any objective monitoring
Training higher level and more fit athletes
Unmonitored recovery training sessions
Training during Olympic or world championship training blocks (i.e., final training phase for an ultimate competition)
Failure to implement an appropriate training taper
Coaching performed by someone with little coaching experience or training
Change of training environment (e.g., heat or cold, humidity, altitude)
Overtraining Considerations
Not all types of overtraining are identical.
Strength is well-protected.
Speed and power may be more sensitive to overtraining.
Psychological variables may be effective markers.
Hormonal variables indicate stress, not OT.
Orthopedic problems present different OTS.
Autonomic nervous system activity responds rapidly to OT.
Muscle fiber maladaptation can follow.
Overtraining Avoidance Strategies
Use active and passive recovery methods during training.
Allow one or more days of routine training abstinence to enhance recovery.
Rest days are critical.
Limit excessively long training sessions and too many sessions in a day.
Exercise caution with excessive training volumes and large increases in training volume (>30% increases).
Prior exposure to stressful training enhances training stress tolerance.
Variation in the training stimulus is critical, and use of periodized training is important.
Avoid excessive training to failure.
Coordinate resistance exercise with other stressors (e.g., sport training and other conditioning).
Incorporate recovery strategies (e.g., sleep, diet, mental skills).
Appropriate diet for training (e.g., adequate Kcal, protein ingestion, glycogen repletion, sufficient vitamins and minerals, adequate fluid intake).
Dietary supplements may help (e.g., recovery drinks, protein and carbohydrate supplements, creatine, oral ATP).
Monitor outside stressors.
Monitor internal and external training loads.
Incorporate an athlete monitoring program.

END

TYPE
Decision Rule

TITLE
Three Categories of Assessment for Athlete Monitoring

PAGE
1718-1720

SECTION
24.4 — Overtraining Syndrome

ORIGINAL TEXT
Bernaciková and colleagues (9) suggest classifying any intended tests using three categories of assessments:
Category I. Daily tests, easy to administer, inexpensive, rapid turnaround of results, convenient for the coach and athlete
Category II. Every few days, more complex, longer questionnaires, slightly more inconvenient to the athlete than category I, rapid turnaround of results
Category III. Occasionally administered (e.g., once a month), more involved and intrusive, more expensive, longer turnaround time for the results
