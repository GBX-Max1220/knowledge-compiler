Headphone Use Safety Concern

PAGE
1746

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
The use of headphones is not recommended. Headphones can interfere with coaching and instruction and limit athletes' awareness of their surroundings in the case of an emergency.

END

TYPE
Warning

TITLE
Power Cord Safety Hazard

PAGE
1747

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Specifically, power cords should never extend into exercise areas, safety spacing, walkways, or spotter areas.

END

TYPE
Warning

TITLE
Suspension Training Equipment Doorway Mounting Hazard

PAGE
1757

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Further, suspension training equipment should not be mounted in or near doorways to prevent blocking emergency exits and hindering access to storage areas, cleaning closets, locker rooms, and restrooms.

END

TYPE
Warning

TITLE
Carabiner Safety for Suspension Training

PAGE
1757

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
As a general rule, any carabiner and snap hook used for exercise purposes should be load-rated for physical activity and include a secondary screw-locking mechanism to prevent risks of falls or drops causing a potential injury.

END

TYPE
Recommendation

TITLE
Hydration and Nutrition Space Location

PAGE
1748

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Drinking fountains and water bottle refill stations are important additions to a strength and conditioning facility. They should be located away from the training area and should not interrupt traffic flow.

END

TYPE
Recommendation

TITLE
Emergency Equipment Storage

PAGE
1749

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
In addition to the storage of training equipment, all necessary emergency equipment should be kept in or near the training facility to be quickly accessible (16). Such equipment must include a fire extinguisher, AED, CPR equipment, and a stocked first aid kit.

END

TYPE
Recommendation

TITLE
Equipment Grouping and Placement

PAGE
1751

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Equipment should be grouped into sections such as a stretching and warm-up area, agility and plyometrics, free weights, aerobic area, and resistance machines. Ideally, free weights and racks should be organized along the wall, and there should be walkways between the free weights and machines (1). Racks and machines also can be placed in rows with the back of the equipment facing each other.

END

TYPE
Recommendation

TITLE
Tall Machine Securing

PAGE
1751

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Tall machines should be bolted to the floor, a column, or the wall to prevent tipping over.

END

TYPE
Recommendation

TITLE
Weightlifting Rack Securing

PAGE
1754

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Weightlifting racks should be bolted to the floor to ensure that they do not move when in use.

END

TYPE
Recommendation

TITLE
Suspension Training Anchor Point Integrity Check

PAGE
1757

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Because suspension training equipment must be attached to a fixed structure (e.g., load-bearing wall mount, bolted rack, or rig frame), it is suggested that the strength and conditioning professional regularly checks the integrity of the anchor point before each use.

END

