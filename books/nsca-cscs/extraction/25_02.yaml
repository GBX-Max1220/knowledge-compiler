TYPE
Recommendation

TITLE
Ventilation and Circulation Requirements

PAGE
1746

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Ventilation and circulation are primary concerns with regard to facility design and the HVAC system. The HVAC system, a fresh air exchange system, and ceiling or box fans should provide necessary ventilation and circulation that are in accordance with ANSI/ASHRAE 62.1 requirements for health clubs and weight rooms (6). Air systems must provide air circulation at proper levels according to the needs of specific equipment areas and occupant loads (6). For example, aerobic training areas require a higher circulation rate than resistance training spaces (2). Room air should be exchanged a minimum of 8 to 10 times per hour—optimally 12 to 15 times per hour to prevent odors and stagnant air (5). If fans are used, a general guideline is two to four fans for every 1,200 square feet (111 m2).

END

TYPE
Recommendation

TITLE
Sound System Volume and Placement

PAGE
1746

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
The sound volume should be less than 90 decibels so that athletes can hear instructions and coaching cues (2). To avoid damage, speakers should be elevated above the height of all training equipment. Placing speakers in the corner allows sound to project toward the middle of the room so that it is more evenly distributed. The use of headphones is not recommended. Headphones can interfere with coaching and instruction and limit athletes' awareness of their surroundings in the case of an emergency.

END

TYPE
Recommendation

TITLE
Mirror Placement Guidelines

PAGE
1747

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Mirrors should be placed at least 6 inches (15 cm) away from any equipment (e.g., behind a rack of dumbbells) and a minimum of 20 inches (51 cm) above the floor (4). The purpose of the height guideline is to ensure that weights do not roll, bounce, or slide into the bottom of the mirror and cause the glass to break. The standard weight plate is 18 inches (46 cm) in diameter, giving mirrors a 2-inch (5 cm) clearance if the plate is dropped near the mirror or leaned against the wall behind the mirror (14).

END

TYPE
Recommendation

TITLE
Equipment Spacing for Racks, Barbells, and Dumbbells

PAGE
1751

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Racks, barbells, and dumbbells should have a minimum of 3 feet (0.9 m) of space between equipment to allow for movement without danger to the athlete or spotter. If a spotter or multiple spotters are needed (e.g., on a rack), providing additional space may be required.

END

TYPE
Recommendation

TITLE
Walkway Width for Traffic Flow

PAGE
1752

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
This usually creates two or three main walkways that should be 5 to 7 feet (1.5-2.1 m) wide (2, 3, 13).

END

TYPE
Recommendation

TITLE
Circuit Training Machine Spacing

PAGE
1753

SECTION
25.2 — Equipment Selection and Layout

ORIGINAL TEXT
Stationary circuit training machines should be at least 30 inches (76 cm) (3), preferably 36 inches (91 cm), away from each other to provide a wide enough area and some extra space for safety.

END

TYPE
Recommendation

TITLE
