TYPE
Definition

TITLE
Overtraining Defined

PAGE
1686

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
An accumulation of training and/or non-training stress resulting in long-term decrement in performance capacity with or without related physiological and psychological signs and symptoms of maladaptation in which restoration of performance capacity may take several weeks or months (88, p. 2).

END

TYPE
Definition

TITLE
Overtraining Syndrome Defined

PAGE
1688

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
When the ECSS-ACSM Task Force defined overtraining (88, 89), they specifically stated that the OTS was a combination of "related physiological and psychological signs and symptoms of maladaptation," some of which may not be part of the training program. As such, the use of the term syndrome indicates the complex nature of the condition and the fact that the symptoms are associated with each other.

END

TYPE
Definition

TITLE
Parasympathetic Overtraining Syndrome

PAGE
1689-1690

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Initially named the Addisonoid syndrome since it is often accompanied by decreased concentrations of the stress hormone cortisol, this condition is characterized by the predominance of parasympathetic activity. In general, the parasympathetic overtraining syndrome is most often found in aerobic endurance athletes where very large training volumes are common.

PARENT
Overtraining Syndrome

END

TYPE
Definition

TITLE
Sympathetic Overtraining Syndrome

PAGE
1690

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
The primary characteristic of sympathetic overtraining syndrome is an increased epinephrine response to exercise and training (36, 37, 38, 40, 41, 139). Eventually, the elevated catecholamines result in a down-regulation of their primary receptor in skeletal muscle, β-2 receptors (41, 124). This is believed to be an important part of the sympathetic overtraining syndrome and the accompanying impaired contractility of skeletal muscle in this condition.

PARENT
Overtraining Syndrome

END

TYPE
Definition

TITLE
Overreaching Defined

PAGE
1690-1691

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
An accumulation of training and/or non-training stress resulting in short-term decrement in performance capacity with or without related physiological and psychological signs and symptoms of maladaptation in which restoration of performance capacity may take from several days to several weeks (88, 89).

END

TYPE
Definition

TITLE
Functional Overreaching

PAGE
1691-1692

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
When properly prescribed, these can be very effective training methods that prepare the athlete for later performance gains (88, 89, 106, 126). The short-term effect is decrements in performance, but recovery can be attained within days or weeks and can result in a super compensation effect. As such, and although stressful to the athlete, functional overreaching (FOR) can be beneficial provided appropriate recovery is allowed.

PARENT
Overreaching

END

TYPE
Definition

TITLE
Nonfunctional Overreaching

PAGE
1692

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
On the other hand, nonfunctional overreaching (NFOR) is somewhat similar to functional overreaching with two very important differences. First, the short-term accumulated fatigue is greater, and, second, the recovery takes longer (88, 89, 126). In the case of NFOR, the individual does not experience any super compensation and is only able to return to his or her baseline performance levels (see figure 24.1 on page 778) (88, 89, 93, 108, 125, 126).

PARENT
Overreaching

END

TYPE
Definition

TITLE
Allostatic Load

PAGE
1697-1698

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Often overlooked aspects of an overtraining syndrome are contributing factors outside the training hall or the competition arena. These are many and varied, and in the context of overtraining they have been termed the allostatic load (86, 107). Collectively, the cumulative causes of stress (i.e., antecedents) produce the various stress responses (i.e., allostatic load) (71, 86). The allostatic load is created by various antecedents (i.e., contributing factors) that produce adverse responses of the body that are part of the stress responses.

END

TYPE
Definition

TITLE
Performance Stagnation

PAGE
1690-1691

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
The most subtle type is performance stagnation. While sometimes stagnated performances have been considered a type of overtraining (13), this is difficult to differentiate from good training programs since all seriously trained individuals experience periodic plateaus in performance.

PARENT
Overreaching

END

TYPE
Definition

TITLE
General Adaptation Syndrome (GAS)

PAGE
1680-1681

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
In the GAS paradigm as applied to any biological system, a stress creates an initial alarm phase, followed by a resistance phase, and ultimately adaptation. If the stress is too great, the system is unable to successfully resist the stressor and the biological system dies.

END

TYPE
Recommendation

TITLE
Recovery Plan After Overtraining

PAGE
1715

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Once overtraining occurs and overtraining syndrome has developed, the first thing that must be done is a careful revision of the training program. A rapid decrease in the training volume, intensity, or both is typically warranted.

END

TYPE
Recommendation

TITLE
Overtraining Avoidance Strategies

PAGE
1718-1719

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Use active and passive recovery methods during training. Allow one or more days of routine training abstinence to enhance recovery. Rest days are critical. Limit excessively long training sessions and too many sessions in a day. Exercise caution with excessive training volumes and large increases in training volume (>30% increases). Prior exposure to stressful training enhances training stress tolerance. Variation in the training stimulus is critical, and use of periodized training is important. Avoid excessive training to failure. Coordinate resistance exercise with other stressors (e.g., sport training and other conditioning). Incorporate recovery strategies (e.g., sleep, diet, mental skills). Appropriate diet for training (e.g., adequate Kcal, protein ingestion, glycogen repletion, sufficient vitamins and minerals, adequate fluid intake). Dietary supplements may help (e.g., recovery drinks, protein and carbohydrate supplements, creatine, oral ATP). Monitor outside stressors. Monitor internal and external training loads. Incorporate an athlete monitoring program.

END

TYPE
Recommendation

TITLE
Athlete Monitoring Program Test Selection Criteria

PAGE
1706

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Qualities of the tests included in this program must be specific to the training being performed or the physiological system involved (i.e., valid), reliable (i.e., capable of providing consistent results), sensitive to the training and competition stimulus, and easy to incorporate into the regular athlete monitoring program.

END

TYPE
Recommendation

TITLE
Category-Based Testing Approach for Overtraining

PAGE
1719-1720

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Before implementing an athlete monitoring program or a system to diagnose an overtraining syndrome, Bernaciková and colleagues (9) suggest classifying any intended tests using three categories of assessments: Category I. Daily tests, easy to administer, inexpensive, rapid turnaround of results, convenient for the coach and athlete. Category II. Every few days, more complex, longer questionnaires, slightly more inconvenient to the athlete than category I, rapid turnaround of results. Category III. Occasionally administered (e.g., once a month), more involved and intrusive, more expensive, longer turnaround time for the results. It is suggested that category I testing be performed first. If the results suggest possible overtraining concerns, testing for category II is warranted. Likewise, if the category II test suggests an overtraining problem, a category III test may be performed.

END

TYPE
Threshold

TITLE
Training Volume Increase Threshold

PAGE
1719

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
Exercise caution with excessive training volumes and large increases in training volume (>30% increases).

END

