TYPE
Decision Rule

TITLE
Differentiating Overtraining from Overreaching Based on Recovery Time

PAGE
1686, 1690-1691

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
If restoration of performance capacity may take several weeks or months, it is overtraining. If restoration of performance capacity may take from several days to several weeks, it is overreaching.

END

TYPE
Decision Rule

TITLE
Differentiating Functional Overreaching from Nonfunctional Overreaching

PAGE
1691-1692

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
If the short-term effect is decrements in performance, but recovery can be attained within days or weeks and can result in a super compensation effect, it is functional overreaching. If the short-term accumulated fatigue is greater, the recovery takes longer, and the individual does not experience any super compensation and is only able to return to his or her baseline performance levels, it is nonfunctional overreaching.

END