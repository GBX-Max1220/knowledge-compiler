Warning

TITLE
Overtraining as a Serious Condition

PAGE
1686

SECTION
24 — Overreaching, Overtraining, and Recovery

ORIGINAL TEXT
As can be seen in this definition, this is a serious condition for the athlete from which recovery can take a long time, and it greatly interferes or halts the competition training program.

END

