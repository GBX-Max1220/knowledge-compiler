TITLE
Valsalva Maneuver Recommendation for Experienced Athletes

PAGE
953

SECTION
Chapter 16: Exercise Technique for Free Weight and Machine Training — Breathing Considerations

ORIGINAL TEXT
For experienced resistance-trained athletes performing structural exercises (those that load the vertebral column and therefore place stress on it) with high loads, the Valsalva maneuver can be helpful for maintaining proper vertebral alignment and support.

