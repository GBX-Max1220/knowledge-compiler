TITLE
Weight Belt Use Recommendation

PAGE
954

SECTION
Chapter 16: Exercise Technique for Free Weight and Machine Training — Weight Belts

ORIGINAL TEXT
It is recommended that a weight belt be worn for exercises that place stress on the lower back and during sets that use near-maximal or maximal loads.

END

TYPE
Recommendation

TITLE
Weight Belt Non-Use Recommendation

PAGE
954

SECTION
Chapter 16: Exercise Technique for Free Weight and Machine Training — Weight Belts

ORIGINAL TEXT
No weight belt is needed for exercises that do not stress the lower back (e.g., biceps curl or lat pulldown) or for exercises that do stress the lower back (e.g., back squat or deadlift) but involve the use of light loads.

END

