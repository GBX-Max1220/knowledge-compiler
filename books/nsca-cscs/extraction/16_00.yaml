ORIGINAL TEXT
The most strenuous movement of a repetition—typically soon after the transition from the eccentric phase to the concentric phase—is referred to as the sticking point.

END

TYPE
Definition

TITLE
Valsalva Maneuver

PAGE
953

SECTION
Chapter 16: Exercise Technique for Free Weight and Machine Training — Breathing Considerations

ORIGINAL TEXT
The Valsalva maneuver involves expiring against a closed glottis, which, when combined with contracting the abdomen and rib cage muscles, creates rigid compartments of fluid in the lower torso and air in the upper torso (i.e., the "fluid ball").

END

