TYPE
Definition

TITLE
Assumption of Risk

PAGE
1790

SECTION
26.3 — Legal and Ethical Issues

ORIGINAL TEXT
Assumption of risk—Knowing that an inherent risk exists with participation in an activity and voluntarily deciding to participate anyway (19). All athletic activities, including strength and conditioning, involve a certain level of risk; athletes must be thoroughly informed of the risk and should sign a statement to that effect. It should be noted that an assumption of risk waiver may not provide protection from legal liability if the strength and conditioning professional is found to be negligent when damage is incurred by an athlete while participating in strength and conditioning activities.

END

