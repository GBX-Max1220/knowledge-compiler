TYPE
Definition

TITLE
Liability

PAGE
1789

SECTION
26.3 — Legal and Ethical Issues

ORIGINAL TEXT
Liability —A legal responsibility, duty, or obligation. Strength and conditioning professionals have a duty to the athletes they serve by virtue of their employment not only to act when an injury occurs but also to prevent injury (5).

END

TYPE
Definition

TITLE
Standard of Care

PAGE
1789-1790

SECTION
26.3 — Legal and Ethical Issues

ORIGINAL TEXT
Standard of care—What a reasonable and prudent person would do under similar circumstances. A strength and conditioning professional is expected to act according to his or her education, level of training, and certification status (e.g., CSCS, National Strength and Conditioning Association Certified Personal Trainer [NSCA-CPT], Emergency Medical Technician [EMT], CPR, AED, first aid).

END

TYPE
Definition

TITLE
Negligence

PAGE
1790

SECTION
26.3 — Legal and Ethical Issues

ORIGINAL TEXT
Negligence —Failure to act as a reasonable and prudent person would under similar circumstances. Four elements must exist for a strength and conditioning professional to be found negligent: duty, breach of duty, proximate cause, and damages (30). The strength and conditioning professional must be found to have had a duty to act and to have failed to act (a breach) with the appropriate standard of care, resulting in damages (physical or economic injury) to another person because of the natural and continuous sequence of reasonably foreseeable events (proximate cause). For example, a strength and conditioning professional sees that a cable is excessively worn on a resistance training machine and notes it, but does not post an “Out of Order” sign. An athlete uses the machine and incurs an injury. In this case, the strength and conditioning professional could be found negligent: His or her duty was to fix the cable or post a sign, but he or she failed to act, and an athlete sustained an injury because of the potentially injurious situation of a cable that was ready to break.

CHILDREN
Duty, Breach of Duty, Proximate Cause, Damages

END

