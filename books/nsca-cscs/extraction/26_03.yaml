TYPE
Definition

TITLE
Preponderance of the Evidence

PAGE
1791

SECTION
26.3 — Legal and Ethical Issues

ORIGINAL TEXT
The burden of proof for the elements of negligence (i.e., duty, breach, causation, damages) in a civil case is the preponderance of the evidence, which is simply the greater weight of the evidence (12).

END

