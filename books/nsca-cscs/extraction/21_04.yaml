TYPE
Warning

TITLE
Elliptical Trainer — Common Errors

PAGE
1571

SECTION
21.4 — Program Integration

ORIGINAL TEXT
Leaning on the handrails, which disengages the core muscles and affects movement phase execution; if necessary to hold on for balance, ensure an upright posture is always maintained and the core is engaged, and avoid placing hands too low on the handrails, which can cause a forward lean

