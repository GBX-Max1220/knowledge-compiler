TYPE
Procedure

TITLE
Walking (Gait) — Body Position

PAGE
1571

SECTION
21.4 — Program Integration

ORIGINAL TEXT
Hold the head upright with the eyes looking straight ahead. Relax the shoulders, and do not allow them to round. Position the upper body directly over the hips while keeping the ear, shoulder, and hip aligned.

END

TYPE
Procedure

TITLE
Walking (Gait) — Foot Strike

PAGE
1571

SECTION
21.4 — Program Integration

ORIGINAL TEXT
The heel should strike the ground first, followed by a gentle rolling heel-to-ball action, allowing the weight to be spread over the foot. The weight should transfer from the outer side of the heel and continue to shift forward and slightly inward toward the middle of the ball of the foot at push-off.

END

TYPE
Procedure

TITLE
Walking (Gait) — Stride

PAGE
1572

SECTION
21.4 — Program Integration

ORIGINAL TEXT
Without rolling the pelvis (unless racewalking), allow the hips to move freely to increase stride length. Lift the knees and engage the hips and gluteals in the movement.

END

TYPE
Procedure

TITLE
Walking (Gait) — Arm Action

PAGE
1572

SECTION
21.4 — Program Integration

ORIGINAL TEXT
The arms should swing forward and backward in a reciprocating fashion with the lower body (i.e., when the left arm is forward, the right leg is extended, and vice versa). The shoulders should be relaxed, allowing the arms to swing freely. At faster walking speeds, the actions should be as follows: The arms should be flexed at the elbows and maintained at 90 degrees with arm movement originating at the shoulders. The arms and hands should swing backward and forward, not crossing the midline of the body, in order to create forward propulsion. The hands should stay relaxed, with the hand coming up to the level of the chest at the nipple line on the forward swing and the hip bone at the side of the body on the backward swing.

END

TYPE
Procedure

TITLE
Running (Gait) — Body Position

PAGE
1572-1573

SECTION
21.4 — Program Integration

ORIGINAL TEXT
Hold the head upright with the eyes looking straight ahead. Relax the shoulders, but do not allow them to round. Position the upper body during running with an approximately 2- to 4-degree lean from the heels to the athlete's head while keeping the ear, shoulder, and hip aligned.

END

TYPE
Procedure

TITLE
Running (Gait) — Foot Strike

PAGE
1573

SECTION
21.4 — Program Integration

ORIGINAL TEXT
The foot should strike the ground slightly in front of or directly below the athlete's center of gravity (i.e., hips), which may be a heel, mid-, or forefoot strike, followed by a gentle rolling heel-to-ball action, allowing the weight to be spread over the foot during the foot contact phase. The weight will likely transfer from the outer side of the heel and continue to shift.

END

TYPE
Procedure

TITLE
Running (Gait) — Stride

PAGE
1573

SECTION
21.4 — Program Integration

ORIGINAL TEXT
Without rolling the pelvis (unless racewalking), allow the hips to move freely to increase stride length. Lift the knees and engage the hips and gluteals in the movement. With each running step, the foot should land approximately under the hips to avoid braking and minimize contact time with the ground.

END

TYPE
Procedure

TITLE
Running (Gait) — Arm Action

PAGE
1573

SECTION
21.4 — Program Integration

ORIGINAL TEXT
The arms should swing forward and backward in a reciprocating motion with the lower body (i.e., when the left arm is forward, the right leg is extended, and vice versa). The shoulders should be relaxed, allowing the arms to swing freely. The arms and hands should swing backward and forward from the shoulder, not crossing the midline of the body, in order to create forward propulsion. Arm action of ±20-degree oscillation of the hands is acceptable and may improve running economy (91a).

END

TYPE
Recommendation

TITLE
Freestyle Swimming — Technique Improvement

PAGE
1574

SECTION
21.4 — Program Integration

ORIGINAL TEXT
While a number of resources are available to assist athletes and strength and conditioning professionals to address these common errors, the best method to improve swimming performance is to seek expert advice from a qualified swim coach, who can not only assess fitness and performance parameters but also advise from a technical perspective how these areas can be improved.

END

