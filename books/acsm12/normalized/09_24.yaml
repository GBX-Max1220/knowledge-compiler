id: concept.metabolic_syndrome
type: Concept
canonical_name: Metabolic Syndrome
semantic_type: MedicalCondition
aliases: []
source:
  book: "ACSM's Guidelines for Exercise Testing and Prescription"
  edition: 12
  chapter: 9
  chapter_title: ""
