definition: >
  For individuals with neurologic diseases, the exercise prescription should follow the FITT-VP principle (frequency, intensity, time, type, volume, and progression) with modifications based on the specific disease, severity of symptoms, and individual capabilities. The general recommendations for apparently healthy adults should be used as a starting point, with adjustments made as necessary to accommodate the individual's functional limitations, safety concerns, and therapeutic goals.

attributes:
  - FITT-VP principle
  - modifications based on specific disease
  - modifications based on severity of symptoms
  - modifications based on individual capabilities
  - starting point: general recommendations for apparently healthy adults
  - adjustments for functional limitations
  - adjustments for safety concerns
  - adjustments for therapeutic goals

purpose:
  - provide exercise prescription for individuals with neurologic diseases

related_concepts:
