  generation: "reasonix-code-v1"
  reviewed: "auto"

evidence_level: ""

relationships:
  - predicate: part_of
    target: recommendation.exercise_prescription_for_individuals_with_neurologic_diseases

definition: >
  Aerobic exercise: 40%–80% of heart rate reserve (HRR) or oxygen uptake reserve (VO₂R); 11–16 on the Borg Rating of Perceived Exertion (RPE) scale (6–20 scale); or 3–6 on the Borg Category-Ratio (CR-10) scale. Resistance exercise: 40%–70% of one-repetition maximum (1-RM) for upper body; 50%–80% of 1-RM for lower body. Flexibility exercise: stretch to the point of tightness or slight discomfort. Neuromotor exercise: not applicable.

attributes:
  - aerobic exercise: 40%–80% of HRR or VO₂R
  - aerobic exercise: 11–16 on Borg RPE scale (6–20 scale)
  - aerobic exercise: 3–6 on Borg CR-10 scale
  - resistance exercise upper body: 40%–70% of 1-RM
  - resistance exercise lower body: 50%–80% of 1-RM
  - flexibility exercise: stretch to point of tightness or slight discomfort
  - neuromotor exercise: not applicable

purpose:
  - specify intensity of exercise for individuals with neurologic conditions

related_concepts:
