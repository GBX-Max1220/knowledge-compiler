definition: >
  Dysrhythmias may be induced by exercise, particularly in patients with known or suspected CVD. The development of dysrhythmias during exercise testing may be a sign of underlying heart disease, electrolyte abnormalities, or drug toxicity. The exercise test should be terminated if the dysrhythmia results in hemodynamic compromise or if ventricular tachycardia develops.

