condition: Undiagnosed or known CV, metabolic, or renal disease
signs:
  - Pain or discomfort in chest/neck/jaw/arms
  - Shortness of breath at rest or mild exertion
  - Dizziness or syncope
  - Orthopnea or paroxysmal nocturnal dyspnea
  - Ankle edema
  - Palpitations or tachycardia
  - Intermittent claudication
  - Known heart murmur
  - Unusual fatigue or shortness of breath with usual activities
action: Individuals with these signs/symptoms should seek medical evaluation before initiating exercise.
severity: high
