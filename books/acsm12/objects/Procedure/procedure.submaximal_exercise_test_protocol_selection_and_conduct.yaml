steps:
- step_number: 1
  description: Use a multistage protocol with at least two stages, each lasting 2–3
    min to achieve a steady-state HR.
- step_number: 2
  description: The initial work rate should be low and adjusted according to the estimated
    fitness level of the individual.
- step_number: 3
  description: The test should be terminated when 70% HRmax (or 85% HRmax for those
    with a higher fitness level) is reached, or when signs or symptoms of exercise
    intolerance appear.
- step_number: 4
  description: HR should be measured during the last 15–30 s of each stage.
- step_number: 5
  description: BP should be measured during the last minute of each stage.
- step_number: 6
  description: RPE should be measured during the last minute of each stage.
- step_number: 7
  description: The test should be terminated if the subject requests to stop or if
    abnormal signs or symptoms occur.
