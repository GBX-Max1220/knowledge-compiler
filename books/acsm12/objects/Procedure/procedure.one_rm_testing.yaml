goal: Determine the maximum weight an individual can lift once
inputs:
- resistance training equipment
- spotter
outputs:
- 1-RM value
steps:
- Complete familiarization/practice sessions before testing
- Warm up with submaximal repetitions of the exercise
- Select initial weight at ~50-70% of perceived capacity
- Attempt the lift with proper form
- If successful, rest 3-5 minutes and increase weight
- Repeat until failure occurs (unable to complete lift with proper form)
- Record the last successfully completed weight as the 1-RM
- Complete within 4 trials to avoid fatigue
exceptions:
- Older adults or clinical populations may use multiple-RM tests (e.g., 10-RM) instead
