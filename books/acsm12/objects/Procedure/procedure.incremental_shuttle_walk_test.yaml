definition: 'The incremental shuttle walk test (ISWT) is a maximal, externally paced
  test that requires the patient to walk at increasing speeds around a 10-m course.
  The speed is dictated by an audio signal. The test ends when the patient is unable
  to maintain the required speed or becomes too breathless or fatigued to continue.
  The ISWT is used to assess functional capacity and to evaluate the effects of therapeutic
  interventions.

  '
