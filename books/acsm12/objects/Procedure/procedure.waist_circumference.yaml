goal: Measure waist circumference for disease risk assessment
inputs:
- flexible inelastic tape measure
outputs:
- waist circumference measurement
steps:
- Locate the iliac crest
- Place tape measure around the abdomen at the level of the iliac crest
- Ensure tape is placed on skin surface without compressing tissues
- Take measurement at the end of a normal expiration
- Record measurement to nearest 0.1 cm or 0.5 in
