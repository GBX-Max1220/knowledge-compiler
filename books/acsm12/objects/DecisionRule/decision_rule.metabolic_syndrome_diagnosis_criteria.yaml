definition: 'The metabolic syndrome is diagnosed when three or more of the following
  risk factors are present: elevated waist circumference (population- and country-specific
  definitions), elevated triglycerides (≥150 mg·dL−1 [1.7 mmol·L−1]), reduced HDL-C
  (<40 mg·dL−1 [1.0 mmol·L−1] in males; <50 mg·dL−1 [1.3 mmol·L−1] in females), elevated
  blood pressure (systolic ≥130 and/or diastolic ≥85 mm Hg), and elevated fasting
  glucose (≥100 mg·dL−1 [5.6 mmol·L−1]).

  '
