definition: Resistance training is associated with significantly better cardiometabolic
  risk profiles, lower risk of all-cause mortality, fewer CVD events, lower risk of
  developing physical function limitations, and lower risk for nonfatal disease. Benefits
  include improvements in body composition, blood glucose levels, insulin sensitivity,
  and blood pressure in individuals with mild or moderate hypertension.
