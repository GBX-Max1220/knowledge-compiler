definition: 'Altitude illnesses (e.g., acute mountain sickness [AMS], high-altitude
  cerebral edema [HACE], and high-altitude pulmonary edema [HAPE]) can occur in unacclimatized
  individuals ascending to altitudes >2,500 m (~8,200 ft). The risk of altitude illness
  is increased with rapid ascent, a history of altitude sickness, and individual susceptibility.

