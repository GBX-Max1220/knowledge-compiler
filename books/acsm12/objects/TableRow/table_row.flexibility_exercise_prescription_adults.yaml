attributes:
  population: Adults
  frequency: ≥2–3 d·wk−1; daily is most effective
  intensity: Stretch to the point of feeling tightness or slight discomfort
  time: Holding a static stretch for 10–30 s; older individuals may benefit from 30–60
    s
  type: A series of flexibility exercises for each of the major muscle–tendon units;
    static (active or passive), dynamic, ballistic, and PNF stretching are all effective
  volume: A reasonable target is 60 s of total stretching time per flexibility exercise
