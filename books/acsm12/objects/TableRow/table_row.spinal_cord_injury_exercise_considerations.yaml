definition: 'Exercise training considerations for Spinal Cord Injury, including specific
  modifications and precautions for exercise prescription in this neurologic condition.

  '
attributes:
- disease: Spinal Cord Injury
- considerations: Level of injury determines muscle function; autonomic dysreflexia
    risk; impaired thermoregulation; pressure ulcer risk; bowel and bladder considerations
- recommendations: Upper body aerobic exercise 3-5 days/week; resistance training
    for innervated muscles 2-3 days/week; flexibility exercises; monitor for autonomic
    dysreflexia; use appropriate seating and positioning
