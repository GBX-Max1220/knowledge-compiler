definition: 'For cardiorespiratory exercise training, the general recommendation for
  time (duration) is 30–60 minutes per day of moderate-intensity exercise, or 20–60
  minutes per day of vigorous-intensity exercise, or a combination of moderate and
  vigorous exercise to achieve a total of 150–300 minutes per week of moderate-intensity
  or 75–150 minutes per week of vigorous-intensity aerobic physical activity.

