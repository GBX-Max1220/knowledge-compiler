definition: 'Exercise training considerations for Traumatic Brain Injury, including
  specific modifications and precautions for exercise prescription in this neurologic
  condition.

  '
attributes:
- disease: Traumatic Brain Injury
- considerations: Cognitive impairments may affect learning and adherence; balance
    and coordination deficits; fatigue; behavioral or emotional changes; seizure risk
- recommendations: Aerobic exercise 3-5 days/week at moderate intensity; resistance
    training 2-3 days/week; balance and coordination training; flexibility exercises;
    structured and repetitive instructions; monitor for signs of overexertion
