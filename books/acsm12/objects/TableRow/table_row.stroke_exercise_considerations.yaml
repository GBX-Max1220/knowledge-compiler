definition: 'Exercise training considerations for Stroke, including specific modifications
  and precautions for exercise prescription in this neurologic condition.

  '
attributes:
- disease: Stroke
- considerations: Hemiparesis or unilateral weakness; balance and coordination deficits;
    cognitive impairments may affect exercise adherence; risk of falls
- recommendations: Aerobic exercise 3-5 days/week at moderate intensity; resistance
    training 2-3 days/week; balance and coordination training; flexibility exercises;
    use of supportive devices as needed
