definition: 'Aerobic exercise: large muscle group activities (e.g., walking, cycling,
  arm ergometry, aquatic exercise). Resistance exercise: free weights, weight machines,
  resistance bands, or body-weight exercises. Flexibility exercise: static, dynamic,
  or proprioceptive neuromuscular facilitation (PNF) stretching. Neuromotor exercise:
  balance, agility, coordination, and gait training; tai chi; yoga; dance.

  '
