definition: 'For individuals with neurologic diseases, the exercise prescription should
  follow the FITT-VP principle (frequency, intensity, time, type, volume, and progression)
  with modifications based on the specific disease, severity of symptoms, and individual
  capabilities. The general recommendations for apparently healthy adults should be
  used as a starting point, with adjustments made as necessary to accommodate the
  individual''s functional limitations, safety concerns, and therapeutic goals.

  '
