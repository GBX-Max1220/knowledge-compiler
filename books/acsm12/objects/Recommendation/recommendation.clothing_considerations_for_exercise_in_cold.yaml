definition: 'In the cold, clothing should be worn in layers to trap warm air and provide
  insulation. The layer next to the skin should be made of a material that wicks moisture
  away from the skin (e.g., polypropylene) rather than cotton, which retains moisture
  and can increase heat loss.

  '
