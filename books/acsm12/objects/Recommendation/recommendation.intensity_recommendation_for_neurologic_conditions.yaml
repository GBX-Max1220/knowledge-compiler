definition: 'Aerobic exercise: 40%–80% of heart rate reserve (HRR) or oxygen uptake
  reserve (VO₂R); 11–16 on the Borg Rating of Perceived Exertion (RPE) scale (6–20
  scale); or 3–6 on the Borg Category-Ratio (CR-10) scale. Resistance exercise: 40%–70%
  of one-repetition maximum (1-RM) for upper body; 50%–80% of 1-RM for lower body.
  Flexibility exercise: stretch to the point of tightness or slight discomfort. Neuromotor
  exercise: not applicable.

  '
