definition: 'Physician supervision of exercise testing should be provided when medically
  indicated. The level of physician supervision required for exercise testing is dependent
  on the patient population being tested and the type of test being performed. For
  apparently healthy individuals, physician supervision may not be necessary. For
  individuals with known cardiovascular disease or those at high risk for cardiovascular
  disease, physician supervision is recommended.

  '
