definition: 'Exercise prescription for heart transplant recipients should follow the
  general guidelines for apparently healthy individuals, with special considerations
  for the unique physiological limitations of the denervated heart. Because of the
  loss of parasympathetic and sympathetic innervation, the heart rate response to
  exercise is blunted and delayed. Resting heart rate is typically elevated (95–115
  bpm), and peak heart rate is lower than age-predicted. The heart rate reserve (HRR)
  method may underestimate the appropriate exercise intensity; therefore, the rating
  of perceived exertion (RPE) is often used to guide intensity. RPE of 11–14 on the
  Borg 6–20 scale is recommended.

  '
