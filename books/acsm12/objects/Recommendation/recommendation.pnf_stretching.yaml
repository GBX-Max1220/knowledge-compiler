definition: 'Proprioceptive neuromuscular facilitation (PNF) stretching, which involves
  a combination of passive stretching and isometric contractions, is recommended as
  an effective method for increasing range of motion. A 3–6 s low-intensity (20%–75%
  of maximal voluntary contraction) isometric contraction followed by a 10–30 s passive
  stretch is recommended for PNF stretching.

