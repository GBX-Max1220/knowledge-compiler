definition: 'All personnel involved in exercise testing should be trained in cardiopulmonary
  resuscitation (CPR) and the use of an automated external defibrillator (AED). Advanced
  cardiac life support (ACLS) training is recommended for physicians and other health
  care professionals who supervise exercise testing. Emergency equipment, including
  a defibrillator, should be immediately available in the exercise testing area.

