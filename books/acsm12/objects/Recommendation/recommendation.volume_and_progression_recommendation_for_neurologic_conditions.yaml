definition: 'Volume: a weekly total of ≥500–1,000 MET-min·wk⁻¹ is recommended. Progression:
  gradual increases in frequency, intensity, time, or type should be made based on
  individual tolerance and response to exercise. Progression should be slower and
  more conservative in individuals with significant impairments or comorbidities.

  '
