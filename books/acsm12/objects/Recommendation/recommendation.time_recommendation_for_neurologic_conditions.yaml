definition: 'Aerobic exercise: 20–60 min·d⁻¹ (or multiple bouts of 10–15 min if continuous
  exercise is not tolerated). Resistance exercise: 1–3 sets of 8–15 repetitions for
  each major muscle group. Flexibility exercise: hold each stretch for 30–60 s; perform
  2–4 repetitions per stretch. Neuromotor exercise: 20–30 min·d⁻¹.

