definition: 'Special considerations for exercise prescription in individuals with
  chronic diseases and health conditions include: (a) monitoring for signs and symptoms
  of exercise intolerance (e.g., chest pain, dizziness, excessive dyspnea); (b) adjusting
  the prescription based on medication effects (e.g., beta-blockers may blunt heart
  rate response); (c) ensuring proper warm-up and cool-down periods; and (d) avoiding
  exercise during acute illness or exacerbation of the chronic condition.

  '
