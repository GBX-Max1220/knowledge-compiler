definition: 'Exercise testing is contraindicated for persons with severe aortic stenosis
  (peak systolic pressure gradient >50 mm Hg with normal cardiac output or a valve
  area <0.75 cm²), acute myocarditis or pericarditis, suspected or known dissecting
  aneurysm, acute systemic infection, or recent significant change in the resting
  ECG suggesting ischemia or other acute cardiac event.

