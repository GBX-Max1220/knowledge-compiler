TYPE: Evidence
TITLE: MSI Prevalence Data
PAGE: 89
SECTION: 1.8
ORIGINAL: In 2014, over 6.3 million Americans received medical attention for sport-related MSI, with the highest rates found in individuals 12–17 years (83 injury episodes per 1,000 population) and 18–44 years (22 injury episodes per 1,000 population).
