# Extraction: Section 1.8 — Exercise-Related Musculoskeletal Injury
# Source: ACSM's Guidelines for Exercise Testing and Prescription, 12th Ed.
# Pages: 89

---
TYPE: Warning
TITLE: MSI Risk by Activity Type
PAGE: 89
SECTION: 1.8
ORIGINAL: Walking and moderate-intensity PA are associated with a very low risk of MSI compared to more vigorous activities including jogging, running, and competitive sports. The risk of MSI is higher in activities where there is direct contact between participants or where the body may be thrown to the ground.
