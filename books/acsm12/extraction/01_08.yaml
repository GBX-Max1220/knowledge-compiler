TYPE: Evidence
TITLE: Inverse MSI-Fitness Relationship
PAGE: 89
SECTION: 1.8
ORIGINAL: The risk of incurring an MSI is inversely related to physical fitness and PA level. For any given dose of PA, unfit or physically inactive individuals are more likely to experience MSI when compared to their more fit or more active counterparts.
