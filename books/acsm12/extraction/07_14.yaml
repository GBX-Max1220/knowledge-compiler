TYPE
Recommendation

TITLE
Clothing Considerations for Exercise in Rain or Wind

PAGE
546

SECTION
7.14 — Clothing Considerations

ORIGINAL TEXT
An outer layer that is wind and water resistant should be worn in rainy or windy conditions.

END
