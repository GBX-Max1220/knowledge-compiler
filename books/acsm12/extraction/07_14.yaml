TITLE
Clothing Considerations for Exercise in Heat

PAGE
546

SECTION
7.14 — Clothing Considerations

ORIGINAL TEXT
Clothing can significantly influence the ability to thermoregulate during exercise in the heat. Clothing that is lightweight, loose fitting, and light colored is recommended to facilitate heat loss during exercise in the heat.

END
