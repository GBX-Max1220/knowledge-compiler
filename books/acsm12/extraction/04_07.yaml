SECTION
4.7 — Postexercise

ORIGINAL TEXT
Following exercise testing, the patient should be monitored during recovery until heart rate, blood pressure, and ECG have returned to near baseline levels. The recovery period is important for detecting abnormal responses that may not be present during exercise, such as ST-segment depression or ventricular arrhythmias. Patients should be observed for at least 6–8 min after exercise, or longer if clinically indicated. The patient should be seated or supine during recovery, and the ECG should be monitored continuously. Blood pressure should be measured at 1–2 min intervals during recovery.

