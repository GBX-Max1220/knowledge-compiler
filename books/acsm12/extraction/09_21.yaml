TITLE
Special Considerations for Exercise in Individuals with Diabetes

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Individuals with diabetes should be educated about the appropriate foot care to prevent and/or treat foot problems. Proper footwear is essential to prevent foot injury. Individuals with diabetes should inspect their feet daily for blisters, redness, or other signs of irritation. If foot problems are present, non-weight-bearing exercise is recommended.

END

TYPE
Warning

TITLE
Hypoglycemia Risk During Exercise

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Individuals taking insulin or insulin secretagogues are at increased risk for hypoglycemia during and after exercise. To reduce the risk of hypoglycemia, individuals should monitor their blood glucose before, during, and after exercise. If blood glucose is <100 mg·dL⁻¹ (5.6 mmol·L⁻¹), additional carbohydrate intake may be needed before exercise.

END

TYPE
Warning

TITLE
Hyperglycemia and Ketosis Risk

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Exercise should be avoided if blood glucose is >250 mg·dL⁻¹ (13.9 mmol·L⁻¹) and ketones are present, or if blood glucose is >300 mg·dL⁻¹ (16.7 mmol·L⁻¹) without ketones.

END

TYPE
Recommendation

TITLE
Exercise Timing and Insulin Adjustment

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Individuals should be advised to avoid exercise during periods of peak insulin action. Insulin adjustments may be necessary to prevent hypoglycemia. The timing of exercise relative to meals and insulin administration should be individualized.

END

TYPE
Warning

TITLE
Cardiovascular Autonomic Neuropathy Considerations

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Individuals with cardiovascular autonomic neuropathy may have an attenuated heart rate response to exercise, blunted blood pressure response, and impaired thermoregulation. These individuals should be monitored closely during exercise.

END

TYPE
Warning

TITLE
Retinopathy and Exercise Precautions

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
In individuals with proliferative or severe nonproliferative diabetic retinopathy, vigorous aerobic or resistance exercise may increase the risk of vitreous hemorrhage or retinal detachment. Such individuals should avoid activities that involve straining, Valsalva maneuver, or jarring.

END

TYPE
Recommendation

TITLE
Peripheral Neuropathy and Weight-Bearing Exercise

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Individuals with peripheral neuropathy and loss of protective sensation should avoid prolonged weight-bearing exercise and consider non-weight-bearing activities such as swimming, cycling, or arm ergometry.

END

TYPE
Warning

TITLE
Nephropathy and Exercise Intensity

PAGE
746–747

SECTION
9.21 — Special Considerations

ORIGINAL TEXT
Individuals with diabetic nephropathy should avoid high-intensity exercise that causes a significant increase in blood pressure. Exercise intensity should be moderate, and blood pressure should be monitored.

END