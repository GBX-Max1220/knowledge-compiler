SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
Exercise training for return to work should be specific to the job tasks required.

END

---
TYPE
Recommendation

TITLE
Exercise Training for Return to Work — Job-Specific Simulation

PAGE
626

SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
Whenever possible, the exercise training should simulate the actual job tasks (e.g., lifting, carrying, pushing, pulling, climbing, and repetitive arm work).

END

---
TYPE
Recommendation

TITLE
Exercise Training for Return to Work — MET Level Target

PAGE
626

SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
The training program should aim to achieve a MET level that is at least equal to the peak MET demands of the job.

END

