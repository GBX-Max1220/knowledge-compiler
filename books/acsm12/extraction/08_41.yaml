TITLE
Exercise Training for Return to Work — Work Hardening Program

PAGE
626

SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
A work hardening program, which includes a multidisciplinary approach to gradually increase the patient's physical and psychological tolerance for work, may be beneficial.

END