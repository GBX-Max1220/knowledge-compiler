TYPE
Recommendation

TITLE
Exercise Training for Return to Work — Safety Monitoring

PAGE
626

SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
Continuous ECG monitoring is recommended during the initial training sessions for patients who have had a recent cardiac event or who have significant left ventricular dysfunction.

END

---
TYPE
Recommendation

TITLE
Exercise Training for Return to Work — Heart Rate and Blood Pressure Monitoring

PAGE
626

SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
Heart rate and blood pressure should be monitored during exercise and recovery.

END

---
TYPE
Recommendation

TITLE
Exercise Training for Return to Work — Symptom Monitoring

PAGE
626

SECTION
8.41 — Exercise Training for Return to Work

ORIGINAL TEXT
Patients should be instructed to monitor for symptoms such as chest pain, shortness of breath, dizziness, or palpitations.

END

