SECTION
10.18 — Myalgic Encephalomyelitis/Chronic Fatigue Syndrome

ORIGINAL TEXT
Myalgic Encephalomyelitis/Chronic Fatigue Syndrome (ME/CFS) is a complex, debilitating chronic disease characterized by profound fatigue that is not alleviated by rest, postexertional malaise (PEM), unrefreshing sleep, cognitive impairment, and orthostatic intolerance.

END

TYPE
Definition

TITLE
Postexertional Malaise (PEM)

PAGE
831

SECTION
10.18 — Myalgic Encephalomyelitis/Chronic Fatigue Syndrome

ORIGINAL TEXT
Postexertional malaise (PEM) is the hallmark symptom of ME/CFS, defined as a worsening of symptoms following even minor physical, cognitive, or emotional exertion, with symptom exacerbation typically delayed by 24 hours or more and lasting for days or weeks.

PARENT
Myalgic Encephalomyelitis/Chronic Fatigue Syndrome (ME/CFS)

END

TYPE
Recommendation

TITLE
Exercise Prescription for ME/CFS

PAGE
831

SECTION
10.18 — Myalgic Encephalomyelitis/Chronic Fatigue Syndrome

ORIGINAL TEXT
Exercise prescription for individuals with ME/CFS should begin with a very low intensity and duration, such as 2–5 minutes of gentle stretching or light activity, and should be carefully monitored to avoid triggering postexertional malaise.

END

TYPE
Warning

TITLE
Risk of Worsening Symptoms with Exercise

PAGE
831

SECTION
10.18 — Myalgic Encephalomyelitis/Chronic Fatigue Syndrome

ORIGINAL TEXT
Inappropriate exercise prescription can lead to significant worsening of symptoms and prolonged recovery periods in individuals with ME/CFS.

END

TYPE
Contraindication

TITLE
Contraindication to Graded Exercise Therapy

PAGE
831

SECTION
10.18 — Myalgic Encephalomyelitis/Chronic Fatigue Syndrome

ORIGINAL TEXT
Graded exercise therapy (GET), which involves systematically increasing physical activity over time, is contraindicated in ME/CFS as it has been shown to cause harm in this population.

END