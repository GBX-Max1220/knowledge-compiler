ORIGINAL TEXT
Submaximal Exercise Tests

Submaximal exercise tests are often used to estimate cardiorespiratory fitness (CRF) from the heart rate response to several submaximal work rates. The rationale for using submaximal rather than maximal exercise tests is that most daily physical activity is performed at submaximal intensities, and maximal exercise testing requires a high level of subject motivation and is not without risk in certain populations. The primary assumptions of submaximal exercise tests are that a steady-state heart rate is achieved at each exercise work rate and that the maximum heart rate (HRmax) for a given age is uniform among individuals. The accuracy of estimating CRF from submaximal exercise tests is dependent on the accuracy of the age-predicted HRmax equation (see Chapter 4). The standard error of estimate (SEE) for estimating CRF from submaximal exercise tests is typically 10%–20% (i.e., 3.5–7.0 mL·kg⁻¹·min⁻¹). Therefore, the results of submaximal exercise tests should be interpreted with caution.

General Procedures for Submaximal Exercise Tests

1. Use a multistage protocol with at least two stages, each lasting 2–3 min to achieve a steady-state HR.
2. The initial work rate should be low and adjusted according to the estimated fitness level of the individual.
3. The test should be terminated when 70% HRmax (or 85% HRmax for those with a higher fitness level) is reached, or when signs or symptoms of exercise intolerance appear.
4. HR should be measured during the last 15–30 s of each stage.
5. BP should be measured during the last minute of each stage.
6. RPE should be measured during the last minute of each stage.
7. The test should be terminated if the subject requests to stop or if abnormal signs or symptoms occur.

