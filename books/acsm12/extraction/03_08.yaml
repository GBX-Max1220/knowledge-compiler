# Extraction: Section 3.8 — Measurement of Resting Heart Rate and Blood Pressure
# Pages: 173–174

---
TYPE: Procedure
TITLE: Assessment of Resting Blood Pressure
PAGE: 174
SECTION: 3.8
ORIGINAL: 1. Those being tested should be seated quietly for at least 5 minutes in a chair with back support with feet on the floor and arms supported at heart level. Refrain from smoking or caffeine for at least 30 minutes. 2. Select appropriate cuff size. 3. Place the cuff snugly around the upper arm. 4. Determine maximum inflation level. 5. Place stethoscope bell over the brachial artery. 6. Inflate cuff to the maximum inflation level. 7. Release pressure at 2-3 mm·sec⁻¹. 8. Record SBP at first Korotkoff sound and DBP at disappearance of sound.
END