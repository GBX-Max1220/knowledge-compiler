# Extraction: Section 3.10 — Anthropometric Methods
# Pages: 176–186

---
TYPE: Threshold
TITLE: BMI Classification
PAGE: 177
SECTION: 3.10
ORIGINAL: Underweight: <18.5 kg·m⁻². Normal: 18.5–24.9 kg·m⁻². Overweight: 25.0–29.9 kg·m⁻². Obese Class I: 30.0–34.9 kg·m⁻². Obese Class II: 35.0–39.9 kg·m⁻². Obese Class III: ≥40.0 kg·m⁻².
END
---
TYPE: Threshold
TITLE: Waist Circumference Thresholds
PAGE: 179
SECTION: 3.10
ORIGINAL: Increased disease risk: Men >102 cm (>40 in), Women >88 cm (>35 in). For Asian populations: Men ≥90 cm, Women ≥80 cm.
END
---
TYPE: Procedure
TITLE: Waist Circumference Measurement
PAGE: 180–181
SECTION: 3.10
ORIGINAL: Measure at the level of the iliac crest. The tape should be placed on the skin surface without compressing underlying tissues. Measurements should be made at the end of a normal expiration.
END
---
TYPE: Procedure
TITLE: Skinfold Measurement
PAGE: 184–185
SECTION: 3.10
ORIGINAL: All measurements should be taken on the right side of the body. The skinfold is grasped with thumb and index finger and pulled away from underlying muscle. The caliper is placed perpendicular to the fold at approximately 1 cm from the fingers. Read measurement 2 seconds after full pressure is applied. Take at least 2 measurements at each site.
END