TITLE: Sedentary Behavior Health Risks
PAGE: 83–84
SECTION: 1.4
ORIGINAL: High levels of sedentary behavior are associated with increased risks for incidence of diabetes, heart disease, and cancer as well as increased risks for mortality from all causes, CVD, and cancer.
