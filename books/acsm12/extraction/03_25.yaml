TYPE: Procedure
TITLE: 1-Repetition Maximum (1-RM) Testing
PAGE: 237
SECTION: 3.25
ORIGINAL: 1. Complete familiarization/practice sessions. 2. Warm up with submaximal repetitions. 3. Determine 1-RM within four trials with 3–5 minute rest periods between trials. 4. Select initial weight at ~50–70% of perceived capacity. 5. Progressively increase weight until failure occurs.
