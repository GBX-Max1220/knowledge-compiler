5.27 — Volume of Flexibility Exercise (Time, Repetitions, and Frequency)

ORIGINAL TEXT
Table 5.7 Flexibility Exercise Prescription

| | Frequency | Intensity | Time | Type | Volume |
|---|---|---|---|---|---|
| Adults | ≥2–3 d·wk−1; daily is most effective | Stretch to the point of feeling tightness or slight discomfort | Holding a static stretch for 10–30 s; older individuals may benefit from 30–60 s | A series of flexibility exercises for each of the major muscle–tendon units; static (active or passive), dynamic, ballistic, and PNF stretching are all effective | A reasonable target is 60 s of total stretching time per flexibility exercise |
| Older adults | ≥2 d·wk−1 | Stretch to the point of feeling tightness or slight discomfort | Holding a static stretch for 30–60 s | A series of flexibility exercises for each of the major muscle–tendon units; static (active or passive), dynamic, ballistic, and PNF stretching are all effective | A reasonable target is 60 s of total stretching time per flexibility exercise |
| Individuals with spinal cord injury | ≥2 d·wk−1 | Stretch to the point of feeling tightness or slight discomfort | Holding a static stretch for 30–60 s | A series of flexibility exercises for each of the major muscle–tendon units; static (active or passive), dynamic, ballistic, and PNF stretching are all effective | A reasonable target is 60 s of total stretching time per flexibility exercise |

