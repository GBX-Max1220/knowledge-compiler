SECTION
4.12 — Rate-Pressure Product

ORIGINAL TEXT
The rate-pressure product (RPP) is the product of heart rate and systolic blood pressure (RPP = HR × SBP). It is an index of myocardial oxygen demand. The normal RPP response to exercise is an increase from a resting value of approximately 6,000–8,000 mm Hg·bpm to a peak value of approximately 20,000–35,000 mm Hg·bpm. A low RPP (<20,000 mm Hg·bpm) at peak exercise suggests a poor cardiovascular prognosis.

