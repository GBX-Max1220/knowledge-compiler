SECTION
5.14 — Time (Duration) of Aerobic Exercise

ORIGINAL TEXT
A total of 30–60 min·d−1 of purposeful moderate aerobic exercise, or 20–60 min·d−1 of vigorous aerobic exercise, or a combination of moderate and vigorous exercise performed on most days of the week is recommended for most adults.

END

