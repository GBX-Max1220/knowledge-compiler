TYPE
Warning

TITLE
Cold Injury Warning: Hypothermia Risk Factors

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Hypothermia occurs when the body's core temperature falls below 35°C (95°F). Risk factors for hypothermia include cold water immersion, inadequate clothing, wet clothing, fatigue, dehydration, poor nutrition, and certain medications.

END
---
TYPE
Warning

TITLE
Cold Injury Warning: Frostbite Risk Factors

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Frostbite occurs when tissue freezes, most commonly affecting the fingers, toes, ears, nose, and cheeks. Risk factors include prolonged exposure to cold temperatures, inadequate protective clothing, and wind chill.

END
---
TYPE
Warning

TITLE
Cold Injury Warning: Trench Foot (Immersion Foot) Risk Factors

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Trench foot, or immersion foot, results from prolonged exposure to cold and wet conditions, typically between 0°C and 10°C (32°F to 50°F). It can occur even when temperatures are above freezing.

END
---
TYPE
Warning

TITLE
Cold Injury Warning: Chilblains (Pernio) Risk Factors

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Chilblains (pernio) are painful inflammatory lesions of the skin caused by repeated exposure to cold but nonfreezing temperatures.

END
---
TYPE
Recommendation

TITLE
Recommendation for Cold Injury Prevention: Layered Clothing

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
To prevent cold injuries, individuals should wear appropriate clothing in layers, including a moisture-wicking base layer, an insulating middle layer, and a wind- and water-resistant outer layer.

END
---
TYPE
Recommendation

TITLE
Recommendation for Cold Injury Prevention: Hydration and Nutrition

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Maintain adequate hydration and nutrition during cold exposure to help preserve core temperature and prevent hypothermia.

END
---
TYPE
Recommendation

TITLE
Recommendation for Cold Injury Prevention: Avoid Alcohol and Tobacco

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Avoid alcohol and tobacco use during cold exposure, as alcohol impairs thermoregulation and judgment, and tobacco reduces peripheral blood flow.

END
---
TYPE
Warning

TITLE
Cold Injury Warning: Signs and Symptoms of Hypothermia

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Signs and symptoms of hypothermia include shivering, confusion, drowsiness, slurred speech, loss of coordination, and eventually loss of consciousness.

END
---
TYPE
Warning

TITLE
Cold Injury Warning: Signs and Symptoms of Frostbite

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Signs and symptoms of frostbite include numbness, tingling, pale or waxy skin, and blisters in severe cases.

END
---
TYPE
Recommendation

TITLE
Recommendation for Cold Injury Treatment: Rewarming

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
For hypothermia, rewarm the individual gradually using warm blankets, warm fluids (if conscious), and body-to-body contact. Avoid rapid rewarming or vigorous movement.

END
---
TYPE
Recommendation

TITLE
Recommendation for Cold Injury Treatment: Frostbite Management

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
For frostbite, rewarm the affected area in warm water (37°C to 39°C; 98.6°F to 102.2°F) for 15 to 30 minutes. Do not rub or massage the area, and avoid direct heat sources.

END
---
TYPE
Warning

TITLE
Cold Injury Warning: Contraindication for Exercise in Cold

PAGE
540–542

SECTION
7.12 — Medical Considerations: Cold Injuries

ORIGINAL TEXT
Exercise should be avoided or modified in extreme cold conditions, particularly when wind chill values are below -27°C (-16.6°F), due to increased risk of frostbite and hypothermia.

END
