TYPE
Recommendation

TITLE
General Volume Recommendation for Resistance Training

PAGE
376–379

SECTION
5.23 — Volume of Resistance Training Exercise

ORIGINAL TEXT
For most adults, a resistance training program consisting of 2–4 sets per exercise with 8–12 repetitions per set is recommended.

END

---
TYPE
Recommendation

TITLE
Volume Recommendation for Older or Frail Adults

PAGE
376–379

SECTION
5.23 — Volume of Resistance Training Exercise

ORIGINAL TEXT
For older or frail adults, a single set of 10–15 repetitions may be sufficient to improve muscular fitness.

END

---
TYPE
Recommendation

TITLE
Volume Progression Recommendation

PAGE
376–379

SECTION
5.23 — Volume of Resistance Training Exercise

ORIGINAL TEXT
Progression in volume should occur by first increasing the number of repetitions, then the number of sets, and finally the frequency of training.

END

