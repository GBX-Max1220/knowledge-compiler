TYPE
Evidence

TITLE
Evidence on Single vs. Multiple Sets

PAGE
376–379

SECTION
5.23 — Volume of Resistance Training Exercise

ORIGINAL TEXT
Research indicates that multiple sets (2–4) are superior to a single set for improving muscular strength and hypertrophy in trained individuals, although single sets may be adequate for untrained individuals (ACSM, 2009).

