TITLE
Inpatient Cardiac Rehabilitation — Discharge Criteria

PAGE
581–585

SECTION
8.7 — Inpatient Cardiac Rehabilitation

ORIGINAL TEXT
Discharge criteria for Phase I include: (1) stable vital signs for at least 8 hours prior to discharge, (2) ability to perform basic activities of daily living independently, (3) understanding of activity restrictions and home exercise program, (4) knowledge of warning signs and symptoms that require medical attention, and (5) follow-up appointment scheduled with a healthcare provider.

END