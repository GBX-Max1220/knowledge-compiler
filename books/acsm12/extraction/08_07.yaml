TITLE
Inpatient Cardiac Rehabilitation — Phase I

PAGE
581–585

SECTION
8.7 — Inpatient Cardiac Rehabilitation

ORIGINAL TEXT
Inpatient cardiac rehabilitation, also referred to as Phase I cardiac rehabilitation, is the initial phase of cardiac rehabilitation that begins during the hospitalization following a cardiac event or procedure. The primary goals of Phase I are to prevent the deconditioning effects of bed rest, reduce the risk of complications, and prepare the patient for discharge and transition to an outpatient program. The program typically includes early mobilization, patient education, and discharge planning.

END

TYPE
Procedure

TITLE
Inpatient Cardiac Rehabilitation — Patient Assessment

PAGE
581–585

SECTION
8.7 — Inpatient Cardiac Rehabilitation

ORIGINAL TEXT
Prior to initiating any activity, the patient should be assessed for medical stability, including heart rate, blood pressure, rhythm, oxygen saturation, and symptoms. The patient's functional status prior to admission should be considered, as well as any comorbidities that may affect the rehabilitation plan.

END

TYPE
Procedure

TITLE
Inpatient Cardiac Rehabilitation — Activity Progression

PAGE
581–585

SECTION
8.7 — Inpatient Cardiac Rehabilitation

ORIGINAL TEXT
Activity progression should be individualized based on the patient's clinical status and tolerance. Initial activities may include range-of-motion exercises, sitting in a chair, and ambulation in the room. Progression may include walking in the hallway, stair climbing, and light resistance exercises. Vital signs and symptoms should be monitored before, during, and after each activity session.

END

