Inclusion of Caregivers or Support Staff

PAGE
1002–1004

SECTION
11.25 — Special Considerations for Individuals With Intellectual Disability

ORIGINAL TEXT
Whenever possible, include a caregiver or support staff member who is familiar with the individual to assist with communication and behavior management.

END

