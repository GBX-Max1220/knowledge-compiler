TITLE
Accommodations for Sensory Sensitivities

PAGE
1002–1004

SECTION
11.25 — Special Considerations for Individuals With Intellectual Disability

ORIGINAL TEXT
Be aware of potential sensory sensitivities (e.g., to loud noises, bright lights, or certain textures) and make appropriate accommodations.

END

