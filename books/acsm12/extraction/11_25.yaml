TITLE
Pre-Exercise Testing Considerations for Intellectual Disability

PAGE
1002–1004

SECTION
11.25 — Special Considerations for Individuals With Intellectual Disability

ORIGINAL TEXT
Individuals with intellectual disability (ID) may have difficulty understanding instructions or performing exercise tests. Therefore, it is important to use simple language, demonstrate the test procedures, and allow for practice trials before the actual test.

END

---
TYPE
Recommendation

TITLE
Test Selection for Individuals with Intellectual Disability

PAGE
1002–1004

SECTION
11.25 — Special Considerations for Individuals With Intellectual Disability

ORIGINAL TEXT
For individuals with ID, submaximal exercise tests are often preferred over maximal tests because they are easier to perform and require less motivation and cooperation.

END

---
TYPE
Recommendation

TITLE
Motivation and Encouragement During Testing

PAGE
1002–1004

SECTION
11.25 — Special Considerations for Individuals With Intellectual Disability

ORIGINAL TEXT
During exercise testing, provide frequent encouragement and positive reinforcement to maintain motivation and effort.

END

---
TYPE
Recommendation

TITLE
Familiarization with Testing Environment

PAGE
1002–1004

SECTION
11.25 — Special Considerations for Individuals With Intellectual Disability

ORIGINAL TEXT
Familiarization with the testing environment and equipment is essential for obtaining valid and reliable test results in individuals with ID.

END

