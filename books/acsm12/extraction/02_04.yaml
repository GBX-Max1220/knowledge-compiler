ORIGINAL: Signs/symptoms include: pain/discomfort in chest/neck/jaw/arms, shortness of breath at rest or mild exertion, dizziness or syncope, orthopnea or paroxysmal nocturnal dyspnea, ankle edema, palpitations or tachycardia, intermittent claudication, known heart murmur, unusual fatigue or shortness of breath with usual activities.
