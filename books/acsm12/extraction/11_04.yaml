TITLE
Exercise Prescription for Individuals with Neurologic Diseases

PAGE
965–966

SECTION
11.4 — Exercise Prescription

ORIGINAL TEXT
For individuals with neurologic diseases, the exercise prescription should follow the FITT-VP principle (frequency, intensity, time, type, volume, and progression) with modifications based on the specific disease, severity of symptoms, and individual capabilities. The general recommendations for apparently healthy adults should be used as a starting point, with adjustments made as necessary to accommodate the individual's functional limitations, safety concerns, and therapeutic goals.

END

TYPE
Recommendation

TITLE
Frequency Recommendation for Neurologic Conditions

PAGE
965–966

SECTION
11.4 — Exercise Prescription

ORIGINAL TEXT
Aerobic exercise: 3–5 d·wk⁻¹. Resistance exercise: 2–3 d·wk⁻¹. Flexibility exercise: 2–3 d·wk⁻¹ (with daily stretching preferred for those with spasticity). Neuromotor exercise: 2–3 d·wk⁻¹.

END

TYPE
Recommendation

TITLE
Intensity Recommendation for Neurologic Conditions

PAGE
965–966

SECTION
11.4 — Exercise Prescription

ORIGINAL TEXT
Aerobic exercise: 40%–80% of heart rate reserve (HRR) or oxygen uptake reserve (VO₂R); 11–16 on the Borg Rating of Perceived Exertion (RPE) scale (6–20 scale); or 3–6 on the Borg Category-Ratio (CR-10) scale. Resistance exercise: 40%–70% of one-repetition maximum (1-RM) for upper body; 50%–80% of 1-RM for lower body. Flexibility exercise: stretch to the point of tightness or slight discomfort. Neuromotor exercise: not applicable.

END

TYPE
Recommendation

TITLE
Time Recommendation for Neurologic Conditions

PAGE
965–966

SECTION
11.4 — Exercise Prescription

ORIGINAL TEXT
Aerobic exercise: 20–60 min·d⁻¹ (or multiple bouts of 10–15 min if continuous exercise is not tolerated). Resistance exercise: 1–3 sets of 8–15 repetitions for each major muscle group. Flexibility exercise: hold each stretch for 30–60 s; perform 2–4 repetitions per stretch. Neuromotor exercise: 20–30 min·d⁻¹.

END

TYPE
Recommendation

TITLE
Type Recommendation for Neurologic Conditions

PAGE
965–966

SECTION
11.4 — Exercise Prescription

ORIGINAL TEXT
Aerobic exercise: large muscle group activities (e.g., walking, cycling, arm ergometry, aquatic exercise). Resistance exercise: free weights, weight machines, resistance bands, or body-weight exercises. Flexibility exercise: static, dynamic, or proprioceptive neuromuscular facilitation (PNF) stretching. Neuromotor exercise: balance, agility, coordination, and gait training; tai chi; yoga; dance.

END

TYPE
Recommendation

TITLE
Volume and Progression Recommendation for Neurologic Conditions

PAGE
965–966

SECTION
11.4 — Exercise Prescription

ORIGINAL TEXT
Volume: a weekly total of ≥500–1,000 MET-min·wk⁻¹ is recommended. Progression: gradual increases in frequency, intensity, time, or type should be made based on individual tolerance and response to exercise. Progression should be slower and more conservative in individuals with significant impairments or comorbidities.

END