TITLE
Fall Risk in Neurologic Patients

PAGE
1048–1050

SECTION
11.42 — Special Considerations

ORIGINAL TEXT
Patients with neurologic diseases are at an increased risk for falls due to impaired balance, gait disturbances, muscle weakness, and sensory deficits.

END

TYPE
Recommendation

TITLE
Fall Prevention Strategies

PAGE
1048–1050

SECTION
11.42 — Special Considerations

ORIGINAL TEXT
Exercise programs should include balance training, strength training, and gait training to reduce fall risk.

END

TYPE
Warning

TITLE
Autonomic Dysreflexia Risk

PAGE
1048–1050

SECTION
11.42 — Special Considerations

ORIGINAL TEXT
Patients with spinal cord injury above T6 may experience autonomic dysreflexia, a potentially life-threatening condition characterized by a sudden, severe increase in blood pressure.

END

TYPE
Recommendation

TITLE
Blood Pressure Monitoring in Autonomic Dysreflexia

PAGE
1048–1050

SECTION
11.42 — Special Considerations

ORIGINAL TEXT
Blood pressure should be monitored closely during exercise in patients at risk for autonomic dysreflexia.

END

