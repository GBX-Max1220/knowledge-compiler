TYPE: Warning
TITLE: Transient Risk of SCD and AMI During Vigorous PA
PAGE: 93–94
SECTION: 1.10
ORIGINAL: There is an acute and transient increase in the risk of SCD and AMI in individuals performing vigorous-intensity PA, particularly in sedentary men and women with diagnosed or occult CVD. The risk is substantially higher during and immediately (~1 hour) after acute vigorous PA than rest.
