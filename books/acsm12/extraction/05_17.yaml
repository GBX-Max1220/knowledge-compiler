TITLE
Aerobic Exercise Progression Rate for Low-to-Moderate Fitness Individuals

PAGE
362

SECTION
5.17 — Progression of Aerobic Exercise

ORIGINAL TEXT
For individuals with low to moderate fitness, a more gradual increase of 5–10 min every 2–4 wk is recommended.

END

