TITLE
Aerobic Exercise Progression Rate Based on Fitness Level

PAGE
362

SECTION
5.17 — Progression of Aerobic Exercise

ORIGINAL TEXT
The rate of progression depends on the individual's fitness level, health status, age, and goals. For apparently healthy individuals, the duration of exercise can be increased by 5–10 min every 1–2 weeks, especially during the first 4–6 wk of an exercise program.

END

