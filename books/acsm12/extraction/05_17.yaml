TITLE
Aerobic Exercise Progression Rate for Higher Fitness Individuals

PAGE
362

SECTION
5.17 — Progression of Aerobic Exercise

ORIGINAL TEXT
For those with higher fitness levels, the duration can be increased more rapidly, such as 5–10 min every 1–2 wk.

