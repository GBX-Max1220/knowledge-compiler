TITLE
Field Walking Tests — Endurance Shuttle Walk Test (ESWT) Procedure

PAGE
318

SECTION
4.24 — Field Walking Tests

ORIGINAL TEXT
The endurance shuttle walk test (ESWT) is a constant-paced test performed at a predetermined percentage of the patient's maximal performance on the ISWT. The test measures the duration of walking at that intensity. The ESWT is used to assess the effects of therapeutic interventions, particularly in patients with COPD.

END