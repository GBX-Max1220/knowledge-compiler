TYPE
Definition

TITLE
Alzheimer's Disease

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Alzheimer's disease (AD) is a progressive neurodegenerative disorder characterized by the accumulation of amyloid-beta plaques and tau protein tangles in the brain, leading to cognitive decline, memory loss, and functional impairment.

END

TYPE
Definition

TITLE
Alzheimer's Disease — Cognitive Decline

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Cognitive decline in Alzheimer's disease typically begins with mild memory impairment and progresses to severe dementia, affecting language, visuospatial skills, and executive function.

END

TYPE
Recommendation

TITLE
Exercise Prescription for Alzheimer's Disease

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
For individuals with Alzheimer's disease, an exercise program should include aerobic exercise (e.g., walking, cycling) at moderate intensity (40–60% of heart rate reserve) for 30 minutes per day, 5 days per week, combined with resistance training (2–3 days per week) and balance exercises.

END

TYPE
Warning

TITLE
Safety Concerns for Exercise in Alzheimer's Disease

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Exercise in individuals with Alzheimer's disease should be supervised to prevent falls, wandering, or injury, and the environment should be safe and familiar to reduce confusion and anxiety.

END

TYPE
Risk Factor

TITLE
Risk Factors for Alzheimer's Disease

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Risk factors for Alzheimer's disease include advanced age, family history, presence of the apolipoprotein E (APOE) ε4 allele, cardiovascular risk factors (e.g., hypertension, diabetes, obesity), and low educational attainment.

END

TYPE
Evidence

TITLE
Evidence for Exercise in Alzheimer's Disease

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Regular physical activity has been shown to improve cognitive function, reduce the rate of cognitive decline, and enhance quality of life in individuals with Alzheimer's disease (Ahlskog et al., 2011; Lautenschlager et al., 2008).

END

TYPE
Contraindication

TITLE
Contraindications to Exercise in Alzheimer's Disease

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Exercise is contraindicated in individuals with Alzheimer's disease who have acute illness, uncontrolled cardiovascular disease, or severe behavioral disturbances that prevent safe participation.

END

TYPE
Threshold

TITLE
Alzheimer's Disease Severity Classification

PAGE
1019–1022

SECTION
11.34 — Alzheimer's Disease

ORIGINAL TEXT
Alzheimer's disease is classified into stages: mild (Mini-Mental State Examination [MMSE] score 21–26), moderate (MMSE score 10–20), and severe (MMSE score <10).

END

