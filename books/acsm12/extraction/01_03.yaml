TYPE: Recommendation
TITLE: 2018 Physical Activity Guidelines for Americans — Primary Recommendation
PAGE: 78
SECTION: 1.3
ORIGINAL: Adults should move more and sit less throughout the day. Some physical activity is better than none. Adults who sit less and do any amount of moderate-to-vigorous physical activity gain some health benefits. For substantial health benefits, adults should do at least 150–300 min · wk⁻¹ of moderate-intensity or 75–150 min · wk⁻¹ of vigorous-intensity aerobic physical activity, or an equivalent combination of moderate- and vigorous-intensity aerobic activity. Preferably, aerobic activity should be spread throughout the week. Additional health benefits are gained by engaging in physical activity beyond the equivalent of 300 minutes of moderate-intensity physical activity a week. Adults should also do muscle strengthening activities of moderate or greater intensity and that involve all major muscle groups on 2 or more d · wk⁻¹, as these activities provide additional health benefits.
