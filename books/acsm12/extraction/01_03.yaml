TYPE: Recommendation
TITLE: ACSM-AHA Primary Physical Activity Recommendation (2007)
PAGE: 75–76
SECTION: 1.3
ORIGINAL: All healthy adults aged 18–65 years should participate in moderate-intensity aerobic PA for a minimum of 30 minutes on 5 d · wk⁻¹ or vigorous-intensity aerobic activity for a minimum of 20 minutes on 3 d · wk⁻¹. Combinations of moderate- and vigorous-intensity exercise can be performed to meet this recommendation. Moderate-intensity aerobic activity can be accumulated to total 30 minutes by performing bouts, each lasting ≥10 minutes. Every adult should perform activities that maintain or increase muscular strength and endurance for a minimum of 2 d · wk⁻¹.
