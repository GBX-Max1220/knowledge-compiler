TYPE: Evidence
TITLE: Dose-Response Relationship Between PA and CVD
PAGE: 79
SECTION: 1.3
ORIGINAL: A meta-analysis of 23 sex-specific cohorts representing 1,325,004 person-years of follow-up showed a strong inverse dose-response relationship between PA and risk for CVD independent of baseline levels of PA or CRF.
