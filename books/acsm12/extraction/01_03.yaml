TYPE: Recommendation
TITLE: Bout Duration Elimination (2018 Guidelines Change)
PAGE: 78
SECTION: 1.3
ORIGINAL: Elimination of the previous requirement that aerobic activities must occur in bouts of at least 10 minutes in duration to elicit significant health benefits. There is now overwhelming evidence indicating that bouts of PA less than 10 minutes in duration are also associated with favorable outcomes for a variety of health-related indicators.
