TYPE: Warning
TITLE: Cardiac Prodromal Symptoms
PAGE: 100
SECTION: 1.13
ORIGINAL: Cardiac prodromal symptoms include excessive, unusual fatigue and pain in the chest and/or upper back. Individuals should seek prompt medical care if such symptoms develop.
