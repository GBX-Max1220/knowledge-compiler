# Extraction: Section 1.13 — Prevention of Exercise-Related Cardiac Events
# Source: ACSM's Guidelines for Exercise Testing and Prescription, 12th Ed.
# Pages: 100–101

---
TYPE: Recommendation
TITLE: ACSM-AHA Strategies to Reduce Cardiac Event Risk During Vigorous Exercise
PAGE: 100–101
SECTION: 1.13
ORIGINAL: Health care professionals should know the pathologic conditions associated with exercise-related events. Physically active individuals should know the nature of cardiac prodromal symptoms (excessive, unusual fatigue and pain in the chest and/or upper back) and seek prompt medical care. High school and college athletes should undergo preparticipation screening. Athletes with known cardiac conditions or a family history should be evaluated. Health care facilities should ensure staff are trained in managing cardiac emergencies and have a specified plan and appropriate resuscitation equipment. Physically active individuals should modify their exercise program in response to variations in their exercise capacity, habitual activity level, and the environment.
