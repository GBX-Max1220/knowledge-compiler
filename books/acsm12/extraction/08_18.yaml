SECTION
8.18 — Left Ventricular Assist Device

ORIGINAL TEXT
A left ventricular assist device (LVAD) is a mechanical pump that is surgically implanted to support the function of a failing left ventricle. LVADs are used as a bridge to transplant, as a bridge to recovery, or as destination therapy for patients with end-stage heart failure who are not candidates for heart transplantation.

