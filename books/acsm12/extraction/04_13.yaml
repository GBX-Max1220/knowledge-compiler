TITLE
ECG Electrode Placement — Precordial Leads

PAGE
298

SECTION
4.13 — Electrocardiogram

ORIGINAL TEXT
Precordial (chest) leads (V1–V6) are unipolar leads that measure the electrical potential at six specific positions on the chest relative to the Wilson central terminal: V1: 4th intercostal space at the right sternal border; V2: 4th intercostal space at the left sternal border; V3: midway between V2 and V4; V4: 5th intercostal space at the midclavicular line; V5: anterior axillary line at the same horizontal level as V4; V6: midaxillary line at the same horizontal level as V4 and V5.

