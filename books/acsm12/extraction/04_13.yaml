TITLE
ECG Electrode Placement — Standard Limb Leads

PAGE
298

SECTION
4.13 — Electrocardiogram

ORIGINAL TEXT
Standard limb leads (I, II, III) are bipolar leads that measure the electrical potential difference between two electrodes placed on the limbs: Lead I: right arm (−) to left arm (+); Lead II: right arm (−) to left leg (+); Lead III: left arm (−) to left leg (+).

