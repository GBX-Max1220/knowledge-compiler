# ====================================================================
# Schema: Formula
# ====================================================================
# A mathematical formula or equation with variables and limitations.

type: Formula

header:
  id:               string
  type:             Formula
  canonical_name:   string
  semantic_type:    string      # "Equation" | "Formula"

aliases:            string[]

source:
  book:             string
  edition:          integer
  chapter:          integer
  chapter_title:    string
  section:          string
  section_title:    string
  book_page:        integer
  pdf_page:         integer

provenance:
  extraction:       string
  normalization:    string
  reviewed:         string

evidence_level:     string

relationships:      object[]
  - predicate:      string
    target:         string

# --- Type-specific body ---
canonical_form:     string      # formula in standard notation (text)
variables:          object[]
  - name:           string
    description:    string
limitations:        string      # scope / applicability limits
