# ====================================================================
# Schema: Warning
# ====================================================================
# A warning about potential adverse events or safety concerns.

type: Warning

header:
  id:               string
  type:             Warning
  canonical_name:   string
  semantic_type:    string      # "Safety" | "AdverseEvent"

aliases:            string[]

source:
  book:             string
  edition:          integer
  chapter:          integer
  chapter_title:    string
  section:          string
  section_title:    string
  book_page:        integer
  pdf_page:         integer

provenance:
  extraction:       string
  normalization:    string
  reviewed:         string

evidence_level:     string

relationships:      object[]
  - predicate:      string
    target:         string

# --- Type-specific body ---
condition:          string      # triggering condition
signs:              string[]    # observable signs/symptoms
action:             string      # recommended action
severity:           string      # "high" | "medium" | "low"
