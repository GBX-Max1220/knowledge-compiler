# ====================================================================
# Schema: Procedure
# ====================================================================
# A step-by-step process for performing a test or procedure.

type: Procedure

fields:
  required: [goal, steps]
  optional: [inputs, outputs, exceptions]

header:
  id:               string      [required]
  type:             Procedure   [required]
  canonical_name:   string      [required]
  semantic_type:    string      [required]  # "Protocol" | "Process"
  aliases:          string[]    [optional]

source:
  book:             string      [required]
  edition:          integer     [required]
  chapter:          integer     [required]
  section:          string      [required]
  book_page:        integer     [required]

provenance:         object      [optional]
evidence_level:     string      [optional]
relationships:      object[]    [optional]

# --- Type-specific body ---
goal:               string      [required]  # purpose of the procedure
steps:              string[]    [required]  # ordered list of steps
inputs:             string[]    [optional]  # required equipment / inputs
outputs:            string[]    [optional]  # expected outputs / results
exceptions:         string[]    [optional]  # exceptions to the procedure
