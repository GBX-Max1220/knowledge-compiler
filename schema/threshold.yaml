# ====================================================================
# Schema: Threshold
# ====================================================================
# A cutoff value, range, or classification boundary.
# Represents a quantitative threshold used for classification or decision.

type: Threshold

fields:
  required: [metric, range]
  optional: [unit, population, condition, numerical_value, numerical_max, comparison_operator]

header:
  id:               string      [required]  # e.g. "threshold.bmi_classification"
  type:             Threshold   [required]
  canonical_name:   string      [required]  # e.g. "BMI Classification"
  semantic_type:    string      [required]  # "Range" | "Cutoff"
  aliases:          string[]    [optional]

source:
  book:             string      [required]
  edition:          integer     [required]
  chapter:          integer     [required]
  chapter_title:    string      [optional]
  section:          string      [required]
  section_title:    string      [optional]
  book_page:        integer     [required]
  pdf_page:         integer     [optional]

provenance:
  extraction:       string      [optional]
  generation:       string      [optional]
  reviewed:         string      [optional]

evidence_level:     string      [optional]

relationships:      object[]    [optional]
  - predicate:      string      [required]
    target:         string      [required]

# --- Type-specific body ---
metric:             string      [required]  # what is being measured
range:              text        [required]  # the range or classification labels
unit:               string      [optional]  # e.g. "METs", "kg/m²"
population:         string      [optional]  # applicable population
condition:          string      [optional]  # condition / context
numerical_value:    float       [optional]  # the primary numerical value
numerical_max:      float       [optional]  # upper bound if range
comparison_operator: string    [optional]  # "<" | "<=" | ">" | ">=" | "range"
